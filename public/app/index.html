              fontSize: 12, color: CB.amber, fontWeight: 500,
            }}>
              {icons.alertTriangle({ size: 13, color: CB.amber })} Missing: {missingRequired.map(d => d.label).join(", ")}
            </div>
          )}

          {/* Existing documents */}
          {docs.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              {docs.map(doc => {
                const docDef = docTypes.find(d => d.value === doc.doc_type);
                const isExpired = doc.expires_at && new Date(doc.expires_at + "T00:00:00") < now;
                return (
                  <div key={doc.id} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "8px 12px", borderRadius: 8, marginBottom: 4,
                    background: isExpired ? `${CB.red}06` : CB.cream, border: `1px solid ${isExpired ? `${CB.red}20` : CB.border}`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                      {icons.fileText({ size: 14, color: isExpired ? CB.red : CB.teal })}
                      <span style={{ fontSize: 13, fontWeight: 600, color: CB.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc.file_name}</span>
                      <Badge text={docDef?.label || doc.doc_type} color={CB.textMid} />
                      {isExpired && <Badge text="Expired" color={CB.red} />}
                      {doc.expires_at && !isExpired && <span style={{ fontSize: 11, color: CB.textLight }}>exp {new Date(doc.expires_at + "T00:00:00").toLocaleDateString()}</span>}
                    </div>
                    <button onClick={() => removeDoc(doc.id)} style={{
                      padding: "3px 6px", borderRadius: 4, border: "none", background: "transparent",
                      color: CB.textLight, cursor: "pointer",
                    }}>{icons.trash({ size: 12, color: CB.textLight })}</button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Add document form */}
          {adding && entityId && (
            <div style={{ padding: 14, borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, marginBottom: 8 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <div style={{ flex: "1 1 180px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Document Type</label>
                  <select style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.doc_type} onChange={e => setNewDoc(p => ({ ...p, doc_type: e.target.value }))}>
                    <option value="">Select type...</option>
                    {docTypes.map(d => <option key={d.value} value={d.value}>{d.label}{d.required ? " *" : ""}</option>)}
                  </select>
                </div>
                <div style={{ flex: "1 1 160px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>File Name</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.file_name} onChange={e => setNewDoc(p => ({ ...p, file_name: e.target.value }))} placeholder="document.pdf" />
                </div>
                <div style={{ flex: "0 0 130px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Expires</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} type="date" value={newDoc.expires_at} onChange={e => setNewDoc(p => ({ ...p, expires_at: e.target.value }))} />
                </div>
                <button onClick={handleAdd} style={{
                  padding: "8px 14px", borderRadius: 8, border: `2px dashed ${CB.blue}`, marginBottom: 16,
                  background: `${CB.blue}08`, color: CB.blue, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{icons.plus({ size: 12, color: CB.blue })} Add</button>
              </div>
              <div style={{ fontSize: 11, color: CB.textLight, marginTop: -8 }}>
                File upload connects to Supabase Storage in production — for now this logs the document record.
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INTAKE WIZARD — multi-step client onboarding
    // ═══════════════════════════════════════════════════════════════
    function IntakePage() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [step, setStep] = useState(0);
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [complete, setComplete] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "",
        address: "", phone: "", emergency_name: "", emergency_phone: "", emergency_relation: "",
        diagnoses: "", support_coordinator: "", sc_phone: "",
        auths: [],
      });
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const addIntakeAuth = () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select code and enter units", "error");
        const sc = serviceCodes.find(s => s.id === newAuth.service_code_id);
        setForm(prev => ({ ...prev, auths: [...prev.auths, { ...newAuth, code: sc?.code, name: sc?.name }] }));
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      };

      const removeIntakeAuth = (idx) => {
        setForm(prev => ({ ...prev, auths: prev.auths.filter((_, i) => i !== idx) }));
      };

      const handleSubmit = async () => {
        if (!form.first_name || !form.last_name) return addToast("Name is required", "error");
        setSaving(true);
        // Step 1: Create person
        const personPayload = {
          org_id: orgId,
          first_name: form.first_name, last_name: form.last_name,
          date_of_birth: form.date_of_birth || null,
          medicaid_number: form.medicaid_number || null,
          is_active: true,
        };
        const { data: personData, error: personErr } = await supabase.from("persons").insert(personPayload).select();
        if (personErr || !personData?.[0]) {
          addToast("Failed to create client: " + (personErr?.message || "unknown error"), "error");
          setSaving(false);
          return;
        }
        const personId = personData[0].id;

        // Step 2: Create auths
        if (form.auths.length > 0) {
          const authPayloads = form.auths.map(a => ({
            org_id: orgId, person_id: personId,
            service_code_id: a.service_code_id,
            authorized_units: parseInt(a.authorized_units),
            used_units: 0,
            start_date: a.start_date || new Date().toISOString().split("T")[0],
            end_date: a.end_date || null,
            rate_per_unit: a.rate_per_unit ? parseFloat(a.rate_per_unit) : null,
          }));
          const { error: authErr } = await supabase.from("person_service_authorizations").insert(authPayloads);
          if (authErr) addToast("Client created but auth insert failed: " + authErr.message, "warning");
        }

        setSaving(false);
        setComplete(true);
        addToast(`${form.first_name} ${form.last_name} intake complete!`, "success");
      };

      const steps = [
        { label: "Personal Info", icon: icons.heart },
        { label: "Contacts", icon: icons.mail },
        { label: "Service Auths", icon: icons.fileText },
        { label: "Review & Submit", icon: icons.checkCircle },
      ];

      if (complete) {
        return (
          <div>
            <PageHeader title="Intake Complete" subtitle="New client successfully onboarded" />
            <div style={{
              background: CB.white, borderRadius: 20, padding: "60px 40px", textAlign: "center",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "successPop 0.4s ease",
            }}>
              <div style={{
                width: 72, height: 72, borderRadius: 20, background: `${CB.green}12`,
                display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20,
              }}>{icons.checkCircle({ size: 36, color: CB.green })}</div>
              <h3 style={{ fontSize: 22, fontWeight: 800, color: CB.navy, marginBottom: 8 }}>{form.first_name} {form.last_name}</h3>
              <p style={{ fontSize: 15, color: CB.textMid, marginBottom: 24 }}>
                Created with {form.auths.length} service authorization{form.auths.length !== 1 ? "s" : ""}
              </p>
              <PrimaryButton onClick={() => { setComplete(false); setStep(0); setForm({ first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", address: "", phone: "", emergency_name: "", emergency_phone: "", emergency_relation: "", diagnoses: "", support_coordinator: "", sc_phone: "", auths: [] }); }}>
                {icons.plus({ size: 16 })} Start Another Intake
              </PrimaryButton>
            </div>
          </div>
        );
      }

      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      return (
        <div>
          <PageHeader title="Client Intake" subtitle="Multi-step onboarding wizard — creates client record and initial authorizations" />

          {/* Step indicator */}
          <div style={{
            display: "flex", alignItems: "center", marginBottom: 28, padding: "16px 24px",
            background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          }}>
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div onClick={() => i <= step && setStep(i)} style={{
                  display: "flex", alignItems: "center", gap: 8, cursor: i <= step ? "pointer" : "default",
                  opacity: i <= step ? 1 : 0.4, transition: "opacity 0.2s",
                }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: 10,
                    background: i === step ? CB.teal : i < step ? CB.green : CB.cream,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "background 0.2s",
                  }}>
                    {i < step ? icons.checkCircle({ size: 16, color: CB.white }) : s.icon({ size: 16, color: i === step ? CB.white : CB.textLight })}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: i === step ? 700 : 500, color: i === step ? CB.navy : CB.textMid }}>{s.label}</span>
                </div>
                {i < steps.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: i < step ? CB.green : CB.border, margin: "0 12px", borderRadius: 1, transition: "background 0.2s" }} />
                )}
              </React.Fragment>
            ))}
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "32px 36px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            {/* Step 0: Personal Info */}
            {step === 0 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Personal Information</h3>
                <FormRow>
                  <FormField label="First Name" required half>
                    <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
                  </FormField>
                  <FormField label="Last Name" required half>
                    <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Date of Birth" half>
                    <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
                  </FormField>
                  <FormField label="Medicaid Number" half>
                    <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
                  </FormField>
                </FormRow>
                <FormField label="Address">
                  <input style={fieldStyle} value={form.address} onChange={e => set("address", e.target.value)} placeholder="Full address" />
                </FormField>
                <FormField label="Phone">
                  <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
                </FormField>
                <FormField label="Diagnoses / Conditions">
                  <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={form.diagnoses} onChange={e => set("diagnoses", e.target.value)} placeholder="Primary diagnoses, conditions, or relevant medical info" />
                </FormField>
              </>
            )}

            {/* Step 1: Contacts */}
            {step === 1 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Emergency & Support Contacts</h3>
                <FormRow>
                  <FormField label="Emergency Contact Name" half>
                    <input style={fieldStyle} value={form.emergency_name} onChange={e => set("emergency_name", e.target.value)} placeholder="Contact name" />
                  </FormField>
                  <FormField label="Relationship" half>
                    <input style={fieldStyle} value={form.emergency_relation} onChange={e => set("emergency_relation", e.target.value)} placeholder="e.g. Parent, Guardian" />
                  </FormField>
                </FormRow>
                <FormField label="Emergency Phone">
                  <input style={fieldStyle} type="tel" value={form.emergency_phone} onChange={e => set("emergency_phone", e.target.value)} placeholder="(801) 555-0000" />
                </FormField>
                <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
                  <h4 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 14 }}>Support Coordinator</h4>
                  <FormRow>
                    <FormField label="SC Name" half>
                      <input style={fieldStyle} value={form.support_coordinator} onChange={e => set("support_coordinator", e.target.value)} placeholder="Support coordinator name" />
                    </FormField>
                    <FormField label="SC Phone" half>
                      <input style={fieldStyle} type="tel" value={form.sc_phone} onChange={e => set("sc_phone", e.target.value)} placeholder="(801) 555-0000" />
                    </FormField>
                  </FormRow>
                </div>
              </>
            )}

            {/* Step 2: Service Auths */}
            {step === 2 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Service Authorizations</h3>
                {form.auths.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    {form.auths.map((a, i) => (
                      <div key={i} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                        padding: "10px 14px", borderRadius: 10, background: CB.cream,
                        marginBottom: 6, border: `1px solid ${CB.border}`,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <Badge text={a.code} color={CB.blue} />
                          <span style={{ fontSize: 13, color: CB.text, fontWeight: 600 }}>{a.authorized_units} units</span>
                          {a.rate_per_unit && perms.viewRates && <span style={{ fontSize: 12, color: CB.teal, fontWeight: 700 }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                        </div>
                        <button onClick={() => removeIntakeAuth(i)} style={{
                          padding: "4px 8px", borderRadius: 6, border: "none", background: "rgba(229,57,53,0.08)",
                          color: CB.red, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                        }}>{icons.trash({ size: 13, color: CB.red })}</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div style={{ flex: "1 1 160px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Service Code</label>
                    <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={newAuth.service_code_id} onChange={e => setNewAuth(p => ({ ...p, service_code_id: e.target.value }))}>
                      <option value="">Select...</option>
                      {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: "0 0 80px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Units</label>
                    <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="number" value={newAuth.authorized_units} onChange={e => setNewAuth(p => ({ ...p, authorized_units: e.target.value }))} placeholder="0" />
                  </div>
                  {perms.viewRates && (
                    <div style={{ flex: "0 0 100px" }}>
                      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: isWorksheet ? CB.amber : CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>
                        {isWorksheet ? "Rate *" : "Rate"}
                      </label>
                      <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13, borderColor: isWorksheet ? `${CB.amber}40` : CB.border }}
                        type="number" step="0.01" value={newAuth.rate_per_unit}
                        onChange={e => setNewAuth(p => ({ ...p, rate_per_unit: e.target.value }))}
                        placeholder={newAuthRule ? (isWorksheet ? `≤${newAuthRule.max_rate || "?"}` : `$${newAuthRule.rate || "?"}`) : "$0.00"} />
                    </div>
                  )}
                  <div style={{ flex: "0 0 130px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Start</label>
                    <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="date" value={newAuth.start_date} onChange={e => setNewAuth(p => ({ ...p, start_date: e.target.value }))} />
                  </div>
                  <button onClick={addIntakeAuth} style={{
                    padding: "9px 16px", borderRadius: 10, border: `2px dashed ${CB.blue}`,
                    background: `${CB.blue}08`, color: CB.blue, fontSize: 13, fontWeight: 700,
                    cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", marginBottom: 16,
                    display: "flex", alignItems: "center", gap: 6,
                  }}>{icons.plus({ size: 14, color: CB.blue })} Add Auth</button>
                </div>
                {isWorksheet && (
                  <div style={{ fontSize: 12, color: CB.amber, fontWeight: 500, marginTop: -8, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                    {icons.alertTriangle({ size: 13, color: CB.amber })} Worksheet service — rate is person-specific (max ${newAuthRule?.max_rate?.toFixed(2) || "N/A"}/unit)
                  </div>
                )}
              </>
            )}

            {/* Step 3: Review */}
            {step === 3 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Review & Submit</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Personal Info</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{form.first_name} {form.last_name}</div>
                    {form.date_of_birth && <div style={{ fontSize: 13, color: CB.textMid, marginTop: 4 }}>DOB: {new Date(form.date_of_birth + "T00:00:00").toLocaleDateString()}</div>}
                    {form.medicaid_number && <div style={{ fontSize: 13, color: CB.textMid }}>Medicaid: {form.medicaid_number}</div>}
                    {form.address && <div style={{ fontSize: 13, color: CB.textMid }}>{form.address}</div>}
                    {form.phone && <div style={{ fontSize: 13, color: CB.textMid }}>{form.phone}</div>}
                    {form.diagnoses && <div style={{ fontSize: 13, color: CB.textMid, marginTop: 6 }}>{form.diagnoses}</div>}
                  </div>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Contacts</div>
                    {form.emergency_name && <div style={{ fontSize: 13, color: CB.text }}><span style={{ fontWeight: 600 }}>Emergency:</span> {form.emergency_name} ({form.emergency_relation}) {form.emergency_phone}</div>}
                    {form.support_coordinator && <div style={{ fontSize: 13, color: CB.text, marginTop: 6 }}><span style={{ fontWeight: 600 }}>SC:</span> {form.support_coordinator} {form.sc_phone}</div>}
                    {!form.emergency_name && !form.support_coordinator && <div style={{ fontSize: 13, color: CB.textLight }}>No contacts added</div>}
                  </div>
                </div>
                <div style={{ marginTop: 16, padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Service Authorizations ({form.auths.length})</div>
                  {form.auths.length === 0 ? (
                    <div style={{ fontSize: 13, color: CB.textLight }}>No authorizations — you can add them later from the client record</div>
                  ) : (
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {form.auths.map((a, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8, background: CB.white, border: `1px solid ${CB.border}` }}>
                          <Badge text={a.code} color={CB.blue} />
                          <span style={{ fontSize: 13, fontWeight: 600, color: CB.navy }}>{a.authorized_units} units</span>
                          {a.rate_per_unit && perms.viewRates && <span style={{ fontSize: 12, color: CB.teal }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </>
            )}

            {/* Navigation buttons */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28, paddingTop: 20, borderTop: `1px solid ${CB.border}` }}>
              {step > 0 ? (
                <SecondaryButton onClick={() => setStep(step - 1)}>{icons.arrowRight({ size: 15, style: { transform: "rotate(180deg)" } })} Back</SecondaryButton>
              ) : <div />}
              {step < 3 ? (
                <PrimaryButton onClick={() => setStep(step + 1)}>Next {icons.arrowRight({ size: 15 })}</PrimaryButton>
              ) : (
                <PrimaryButton onClick={handleSubmit} loading={saving} color={CB.green}>{icons.checkCircle({ size: 16 })} Create Client</PrimaryButton>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // CLAUDE AI INTELLIGENCE LAYER — shift handoffs & quarterly drafts
    // ═══════════════════════════════════════════════════════════════
    function AIPage() {
      const { addToast } = useToast();
      const [clients, setClients] = useState([]);
      const [selectedClient, setSelectedClient] = useState("");
      const [aiMode, setAiMode] = useState("handoff");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [dateRange, setDateRange] = useState(() => {
        const now = new Date();
        return {
          start: new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split("T")[0],
          end: now.toISOString().split("T")[0],
        };
      });

      useEffect(() => {
        supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name")
          .then(({ data }) => setClients(data || []));
      }, []);

      const generateHandoff = async () => {
        if (!selectedClient) return addToast("Select a client", "error");
        setLoading(true);
        setResult(null);

        // Get today's notes for this client
        const today = new Date().toISOString().split("T")[0];
        const { data: notes } = await supabase.from("service_notes")
          .select("service_date, start_time, end_time, duration_minutes, summary_note, status, staff!service_notes_staff_id_fkey(first_name, last_name), service_code_definitions(code, name)")
          .eq("person_id", selectedClient)
          .gte("service_date", today)
          .order("start_time");

        if (!notes || notes.length === 0) {
          addToast("No notes found for today — try generating a quarterly summary instead", "warning");
          setLoading(false);
          return;
        }

        const client = clients.find(c => c.id === selectedClient);
        const notesSummary = notes.map(n =>
          `${n.service_code_definitions?.code || "?"} (${n.start_time?.slice(0,5) || "?"}-${n.end_time?.slice(0,5) || "?"}) by ${n.staff?.first_name || "?"} ${n.staff?.last_name || ""}: ${n.summary_note || "No notes"}`
        ).join("\n\n");

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: `You are a DSPD compliance assistant for Hope Haven Services Inc. Generate a concise shift handoff summary for the incoming staff.\n\nClient: ${client?.first_name} ${client?.last_name}\nDate: ${today}\n\nToday's service notes:\n${notesSummary}\n\nProvide:\n1. Key events and observations from today\n2. Any behavioral concerns or notable changes\n3. Pending tasks or follow-ups for the next shift\n4. Medication or health notes if mentioned\n\nKeep it concise, professional, and actionable. Use bullet points.` }],
            }),
          });
          const data = await response.json();
          const text = data.content?.map(c => c.text || "").join("") || "No response generated";
          setResult({ type: "handoff", content: text, client: `${client?.first_name} ${client?.last_name}`, date: today, noteCount: notes.length });
        } catch (e) {
          addToast("AI generation failed — check API access", "error");
        }
        setLoading(false);
      };

      const generateQuarterly = async () => {
        if (!selectedClient) return addToast("Select a client", "error");
        setLoading(true);
        setResult(null);

        const { data: notes } = await supabase.from("service_notes")
          .select("service_date, duration_minutes, summary_note, service_code_definitions(code, name)")
          .eq("person_id", selectedClient)
          .gte("service_date", dateRange.start)
          .lte("service_date", dateRange.end)
          .order("service_date");

        if (!notes || notes.length === 0) {
          addToast("No notes found in this date range", "warning");
          setLoading(false);
          return;
        }

        const client = clients.find(c => c.id === selectedClient);
        const notesSummary = notes.map(n =>
          `${n.service_date} — ${n.service_code_definitions?.code || "?"}: ${(n.summary_note || "").substring(0, 300)}`
        ).join("\n\n");

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: `You are a DSPD compliance assistant for Hope Haven Services Inc. Generate a quarterly progress summary to send to the support coordinator.\n\nClient: ${client?.first_name} ${client?.last_name}\nPeriod: ${dateRange.start} to ${dateRange.end}\nTotal service notes: ${notes.length}\n\nService notes for this period:\n${notesSummary}\n\nGenerate a professional quarterly summary including:\n1. Overview of services provided (types, frequency)\n2. Progress on ISP goals\n3. Behavioral trends and observations\n4. Health and medical updates mentioned\n5. Recommendations for the upcoming quarter\n6. Any concerns or areas needing support coordinator attention\n\nFormat professionally for submission to DSPD support coordinators.` }],
            }),
          });
          const data = await response.json();
          const text = data.content?.map(c => c.text || "").join("") || "No response generated";
          setResult({ type: "quarterly", content: text, client: `${client?.first_name} ${client?.last_name}`, period: `${dateRange.start} to ${dateRange.end}`, noteCount: notes.length });
        } catch (e) {
          addToast("AI generation failed — check API access", "error");
        }
        setLoading(false);
      };

      const copyToClipboard = () => {
        if (result?.content) {
          navigator.clipboard.writeText(result.content);
          addToast("Copied to clipboard", "success");
        }
      };

      const ModeTab = ({ value, label }) => (
        <button onClick={() => { setAiMode(value); setResult(null); }} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: aiMode === value ? CB.navy : "transparent",
          color: aiMode === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="AI Intelligence" subtitle="Claude-powered shift handoffs and quarterly summary generation" />

          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <ModeTab value="handoff" label="Shift Handoff" />
            <ModeTab value="quarterly" label="Quarterly Summary" />
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "28px 32px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            <FormField label="Client" required>
              <select style={fieldStyle} value={selectedClient} onChange={e => { setSelectedClient(e.target.value); setResult(null); }}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>

            {aiMode === "quarterly" && (
              <div style={{ display: "flex", gap: 12, alignItems: "flex-end", marginBottom: 16 }}>
                <FormField label="Start Date" half>
                  <input style={fieldStyle} type="date" value={dateRange.start} onChange={e => setDateRange(p => ({ ...p, start: e.target.value }))} />
                </FormField>
                <FormField label="End Date" half>
                  <input style={fieldStyle} type="date" value={dateRange.end} onChange={e => setDateRange(p => ({ ...p, end: e.target.value }))} />
                </FormField>
              </div>
            )}

            <PrimaryButton
              onClick={aiMode === "handoff" ? generateHandoff : generateQuarterly}
              loading={loading}
              color={CB.navy}
            >
              {icons.zap({ size: 16 })} {aiMode === "handoff" ? "Generate Shift Handoff" : "Generate Quarterly Summary"}
            </PrimaryButton>

            {/* Result */}
            {result && (
              <div style={{
                marginTop: 24, padding: 24, borderRadius: 16,
                background: `linear-gradient(135deg, ${CB.navy}04, ${CB.teal}04)`,
                border: `1px solid ${CB.border}`, animation: "fadeIn 0.4s ease",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>
                      {result.type === "handoff" ? "Shift Handoff Summary" : "Quarterly Progress Summary"}
                    </div>
                    <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>
                      {result.client} — {result.type === "handoff" ? result.date : result.period} — {result.noteCount} notes analyzed
                    </div>
                  </div>
                  <button onClick={copyToClipboard} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
                    borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                    color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>{icons.save({ size: 14 })} Copy</button>
                </div>
                <div style={{
                  fontSize: 14, color: CB.text, lineHeight: 1.8, whiteSpace: "pre-wrap",
                  maxHeight: 500, overflowY: "auto", padding: "0 4px",
                }}>{result.content}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // APP SHELL
    // ═══════════════════════════════════════════════════════════════
    function AppShell() {
      const [page, setPage] = useState("dashboard");

      const renderPage = () => {
        switch (page) {
          case "dashboard": return <DashboardPage />;
          case "staff": return <StaffPage />;
          case "clients": return <ClientsPage />;
          case "intake": return <IntakePage />;
          case "training": return <TrainingPage />;
          case "notes": return <ServiceNotesPage />;
          case "evv": return <EVVPage />;
          case "compliance": return <CompliancePage />;
          case "billing": return <BillingPage />;
          case "ai": return <AIPage />;
          case "settings": return <OrgUnitsPage />;
          default: return <DashboardPage />;
        }
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: CB.cream }}>
          <Sidebar active={page} onNavigate={setPage} />
          <main style={{ marginLeft: CB.sidebarW, flex: 1, padding: "32px 36px", maxWidth: `calc(100vw - ${CB.sidebarW}px)` }}>
            {renderPage()}
          </main>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // APP ROOT
    // ═══════════════════════════════════════════════════════════════
    function App() {
      const { user, loading } = useAuth();
      if (loading) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: CB.cream, flexDirection: "column", gap: 16 }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {icons.shield({ size: 24, color: CB.white })}
            </div>
            <Spinner size={22} />
          </div>
        );
      }
      return user ? <AppShell /> : <LoginPage />;
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    ReactDOM.render(
      <AuthProvider><ToastProvider><App /></ToastProvider></AuthProvider>,
      document.getElementById("root")
    );
  </script>
</body>
</html>
