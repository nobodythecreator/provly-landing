        )},
        { label: "Medicaid #", render: (r) => r.medicaid_number || "—" },
        { label: "DOB", render: (r) => r.date_of_birth ? new Date(r.date_of_birth + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Status", render: (r) => <Badge text={r.is_active ? "Active" : "Inactive"} color={r.is_active ? CB.green : CB.textLight} /> },
        { label: "Authorizations", render: (r) => {
          const a = r.person_service_authorizations || [];
          return a.length > 0 ? (
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {a.map((x, i) => <Badge key={i} text={x.service_code_definitions?.code || scLookup[x.service_code_id] || "?"} color={CB.blue} />)}
            </div>
          ) : "—";
        }},
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openEdit(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.edit({ size: 13 })} Edit</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Clients" subtitle="Person management, authorizations, and service tracking"
            action={<PrimaryButton onClick={openAdd}>{icons.plus({ size: 16 })} Add Client</PrimaryButton>}
          />
          <DataTable columns={columns} data={clients} loading={loading} emptyMessage="No clients found" />
          <ClientForm open={formOpen} onClose={() => { setFormOpen(false); loadClients(); }} onSaved={loadClients} editing={editing} />
          <ClientProfileModal open={!!viewing} onClose={() => setViewing(null)} client={viewing} onEdit={openEdit} scLookup={scLookup} onViewFull={onNavigate ? (id) => onNavigate("client-profile", { type: "client", id }) : undefined} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 3: TRAINING TRACKER — per-staff completion logging
    // ═══════════════════════════════════════════════════════════════
    function TrainingLogForm({ open, onClose, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [topics, setTopics] = useState([]);
      const [form, setForm] = useState({ staff_id: "", training_topic_id: "", completed_date: "", certificate_number: "" });

      useEffect(() => {
        if (open) {
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name").then(({ data }) => setStaffList(data || []));
          supabase.from("training_topic_definitions").select("id, topic_name, renewal_months").order("topic_name").then(({ data }) => {
            // Deduplicate by name
            const seen = new Map();
            (data || []).forEach(t => {
              const key = t.topic_name?.trim().toLowerCase();
              if (key && !seen.has(key)) seen.set(key, t);
            });
            setTopics(Array.from(seen.values()));
          });
          setForm({ staff_id: "", training_topic_id: "", completed_date: new Date().toISOString().split("T")[0], certificate_number: "" });
        }
      }, [open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.staff_id || !form.training_topic_id || !form.completed_date) return addToast("Staff, topic, and date are required", "error");
        setSaving(true);
        const topic = topics.find(t => t.id === form.training_topic_id);
        let expiration_date = null;
        if (topic?.renewal_months) {
          const d = new Date(form.completed_date);
          d.setMonth(d.getMonth() + topic.renewal_months);
          expiration_date = d.toISOString().split("T")[0];
        }
        const { error } = await supabase.from("staff_trainings").insert({
          org_id: orgId,
          staff_id: form.staff_id,
          training_topic_id: form.training_topic_id,
          completed_at: form.completed_date,
          expires_at: expiration_date,
          certificate_url: form.certificate_number || null,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Training logged successfully", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="Log Training Completion" subtitle="Record a staff member's completed training">
          <FormField label="Staff Member" required>
            <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
              <option value="">Select staff member...</option>
              {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
            </select>
          </FormField>
          <FormField label="Training Topic" required>
            <select style={fieldStyle} value={form.training_topic_id} onChange={e => set("training_topic_id", e.target.value)}>
              <option value="">Select topic...</option>
              {topics.map(t => <option key={t.id} value={t.id}>{t.topic_name}</option>)}
            </select>
          </FormField>
          <FormRow>
            <FormField label="Completion Date" required half>
              <input style={fieldStyle} type="date" value={form.completed_date} onChange={e => set("completed_date", e.target.value)} />
            </FormField>
            <FormField label="Certificate #" half>
              <input style={fieldStyle} value={form.certificate_number} onChange={e => set("certificate_number", e.target.value)} placeholder="Optional" />
            </FormField>
          </FormRow>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.checkCircle({ size: 16 })} Log Training</PrimaryButton>
          </div>
        </Modal>
      );
    }

    // Training category labels + display order — maps DB category values to human-friendly names.
    // Current DB uses deadline/renewal-based categories (30_day, 90_day, etc.), which represents
    // WHEN training is due relative to hire date. Content-based clusters (RHS / P&P / CPR) can
    // be added later via a category column update — this map accepts both styles gracefully.
    const TRAINING_CATEGORY_META = {
      "30_day":            { label: "Due Within 30 Days of Hire",  color: "#E53935", order: 1, description: "Critical new-hire training — must complete in first month" },
      "90_day":            { label: "Due Within 90 Days of Hire",  color: "#F57F17", order: 2, description: "Must complete in first three months" },
      "180_day":           { label: "Due Within 180 Days of Hire", color: "#E65100", order: 3, description: "Must complete in first six months" },
      "annual":            { label: "Annual Renewal",              color: "#1A73E8", order: 4, description: "Renew every year" },
      "abi":               { label: "ABI-Specific",                color: "#00897B", order: 5, description: "Required for Acquired Brain Injury service codes" },
      "ongoing":           { label: "Ongoing / As-Needed",         color: "#4A5568", order: 6, description: "No fixed renewal deadline" },
      // Content-based clusters (for future migration)
      "rhs":               { label: "RHS (Residential Habilitation)", color: "#00897B", order: 10 },
      "policy_procedure":  { label: "Policy & Procedure",          color: "#1A73E8", order: 11 },
      "cpr_first_aid":     { label: "CPR / First Aid",             color: "#E53935", order: 12 },
      "organizational":    { label: "Organizational",              color: "#4A5568", order: 13 },
      "service_specific":  { label: "Service-Specific",             color: "#F57F17", order: 14 },
      "uncategorized":     { label: "Uncategorized",               color: "#94A3B8", order: 99 },
    };

    // Helper: pull display info for a category, falling back gracefully
    const getCategoryMeta = (cat) => {
      if (!cat) return TRAINING_CATEGORY_META.uncategorized;
      return TRAINING_CATEGORY_META[cat] || { label: cat.replace(/_/g, " "), color: "#4A5568", order: 50 };
    };

    function TrainingPage() {
      const [tab, setTab] = useState("bystaff");
      const [completions, setCompletions] = useState([]);
      const [topics, setTopics] = useState([]);
      const [staff, setStaff] = useState([]);
      const [allTrainings, setAllTrainings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [selectedStaff, setSelectedStaff] = useState(null);

      // v19.3 — training decks + competency state
      const [decks, setDecks] = useState([]);
      const [deckSvcCodes, setDeckSvcCodes] = useState([]); // rows of { id, deck_id, service_code_id }
      const [deckCompletions, setDeckCompletions] = useState([]); // staff_deck_completions
      const [serviceCodes, setServiceCodes] = useState([]);
      const [clients, setClients] = useState([]);
      const [deckEditing, setDeckEditing] = useState(null);
      const [deckFormOpen, setDeckFormOpen] = useState(false);
      const [decksTablesMissing, setDecksTablesMissing] = useState(false);
      // v19.3 — completion logging
      const [completingDeck, setCompletingDeck] = useState(null);
      const [completionFormOpen, setCompletionFormOpen] = useState(false);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [compRes, topicRes, staffRes] = await Promise.all([
          supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at, certificate_url, staff(first_name, last_name), training_topic_definitions(topic_name, category)").order("completed_at", { ascending: false }).limit(200),
          supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification").order("category, topic_name"),
          supabase.from("staff").select("id, first_name, last_name, role, hire_date, is_active").eq("is_active", true).order("last_name"),
        ]);
        if (!compRes.error) { setCompletions(compRes.data || []); setAllTrainings(compRes.data || []); }
        if (!topicRes.error) {
          const raw = topicRes.data || [];
          const seen = new Map();
          raw.forEach(t => {
            const key = t.topic_name?.trim().toLowerCase();
            if (!key) return;
            if (!seen.has(key)) seen.set(key, t);
            else {
              const existing = seen.get(key);
              const score = (x) => (x.renewal_months ? 1 : 0) + (x.deadline_days ? 1 : 0) + (x.requires_certification ? 1 : 0) + (x.category ? 1 : 0);
              if (score(t) > score(existing)) seen.set(key, t);
            }
          });
          setTopics(Array.from(seen.values()));
        }
        if (!staffRes.error) setStaff(staffRes.data || []);

        // v19.3 — load decks, mappings, completions (with graceful fallback)
        const [deckRes, mapRes, complRes, scRes, clRes] = await Promise.all([
          supabase.from("training_decks").select("id, name, deck_type, description, slide_count, file_url, version, is_active").order("deck_type").order("name"),
          supabase.from("training_deck_service_codes").select("id, deck_id, service_code_id"),
          supabase.from("staff_deck_completions").select("id, staff_id, deck_id, person_id, completed_at, expires_at, trainer_name, notes"),
          supabase.from("service_code_definitions").select("id, code, name").order("code"),
          supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true).order("last_name"),
        ]);
        if (deckRes.error && /relation .*training_decks.* does not exist/i.test(deckRes.error.message || "")) {
          setDecksTablesMissing(true);
        } else {
          setDecks(deckRes.data || []);
          setDeckSvcCodes(mapRes.data || []);
          setDeckCompletions(complRes.data || []);
        }
        setServiceCodes(scRes.data || []);
        setClients(clRes.data || []);

        setLoading(false);
      };

      const categoryColors = { "30_day": CB.blue, "90_day": CB.amber, "180_day": CB.red, "abi": CB.teal, "annual": CB.navy, "ongoing": CB.textMid };

      const compColumns = [
        { label: "Staff Member", bold: true, render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Training", render: (r) => r.training_topic_definitions?.topic_name || "—" },
        { label: "Category", render: (r) => <Badge text={r.training_topic_definitions?.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.training_topic_definitions?.category] || CB.textLight} /> },
        { label: "Completed", render: (r) => r.completed_at ? new Date(r.completed_at).toLocaleDateString() : "—" },
        { label: "Expires", render: (r) => r.expires_at ? new Date(r.expires_at).toLocaleDateString() : "N/A" },
        { label: "Status", render: (r) => {
          if (!r.expires_at) return <Badge text="No Expiry" color={CB.textLight} />;
          const exp = new Date(r.expires_at);
          const now = new Date();
          const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
          if (daysLeft < 0) return <Badge text="Expired" color={CB.red} />;
          if (daysLeft < 30) return <Badge text="Expiring Soon" color={CB.amber} />;
          return <Badge text="Current" color={CB.green} />;
        }},
      ];

      const topicColumns = [
        { label: "Training Topic", bold: true, render: (r) => r.topic_name },
        { label: "Category", render: (r) => <Badge text={r.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.category] || CB.textLight} /> },
        { label: "Certification", render: (r) => r.requires_certification ? <Badge text="Cert Required" color={CB.red} /> : <Badge text="No Cert" color={CB.textLight} /> },
        { label: "Due Within", render: (r) => r.deadline_days ? `${r.deadline_days} days` : "—" },
        { label: "Renewal", render: (r) => r.renewal_months ? `Every ${r.renewal_months} mo` : "One-time" },
      ];

      // Build per-staff training matrix
      const getStaffTrainingStatus = (staffMember) => {
        const now = new Date();
        const hireDate = staffMember.hire_date ? new Date(staffMember.hire_date + "T00:00:00") : null;
        const requiredTopics = topics.filter(t => t.deadline_days || t.renewal_months);
        return requiredTopics.map(topic => {
          const completion = allTrainings.find(t => t.staff_id === staffMember.id && t.training_topic_id === topic.id);
          let status = "missing";
          let dueDate = null;
          if (completion) {
            if (completion.expires_at && new Date(completion.expires_at) < now) status = "expired";
            else status = "current";
          } else if (hireDate && topic.deadline_days) {
            dueDate = new Date(hireDate);
            dueDate.setDate(dueDate.getDate() + topic.deadline_days);
            if (now > dueDate) status = "overdue";
            else {
              const daysLeft = Math.ceil((dueDate - now) / (1000*60*60*24));
              status = daysLeft <= 14 ? "due_soon" : "missing";
            }
          }
          return { topic, completion, status, dueDate };
        });
      };

      const statusIcons = {
        current: { color: CB.green, label: "✓ Current" },
        missing: { color: CB.textLight, label: "— Missing" },
        overdue: { color: CB.red, label: "✗ Overdue" },
        expired: { color: CB.red, label: "✗ Expired" },
        due_soon: { color: CB.amber, label: "⚠ Due Soon" },
      };

      const TabButton = ({ value, label }) => (
        <button onClick={() => setTab(value)} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="Training Tracker" subtitle={`${topics.length} training ${topics.length === 1 ? "topic" : "topics"} — view by staff member, completion log, or topic definitions`}
            action={<PrimaryButton onClick={() => setFormOpen(true)}>{icons.plus({ size: 16 })} Log Training</PrimaryButton>}
          />
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content", flexWrap: "wrap" }}>
            <TabButton value="bystaff" label="By Staff" />
            <TabButton value="completions" label="Completions" />
            <TabButton value="topics" label="Topic Definitions" />
            <TabButton value="decks" label="Training Decks" />
            <TabButton value="matrix" label="Competency Matrix" />
          </div>

          {tab === "bystaff" && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>
              ) : (
                <div style={{ display: "grid", gap: 12 }}>
                  {staff.map((s, si) => {
                    const matrix = getStaffTrainingStatus(s);
                    const complete = matrix.filter(m => m.status === "current").length;
                    const issues = matrix.filter(m => ["overdue", "expired", "due_soon"].includes(m.status)).length;
                    const isExpanded = selectedStaff === s.id;

                    return (
                      <div key={s.id} style={{
                        background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`,
                        boxShadow: "0 1px 3px rgba(10,30,51,0.04)", overflow: "hidden",
                        animation: `fadeIn 0.3s ease ${si * 0.03}s both`,
                      }}>
                        {/* Staff row header */}
                        <div onClick={() => setSelectedStaff(isExpanded ? null : s.id)} style={{
                          display: "flex", alignItems: "center", justifyContent: "space-between",
                          padding: "14px 20px", cursor: "pointer", transition: "background 0.15s",
                        }}
                          onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                          onMouseLeave={e => e.currentTarget.style.background = CB.white}
                        >
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{
                              width: 36, height: 36, borderRadius: 10,
                              background: issues > 0 ? `${CB.red}12` : `${CB.green}12`,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: 14, fontWeight: 700, color: issues > 0 ? CB.red : CB.green,
                            }}>{s.first_name?.[0]}{s.last_name?.[0]}</div>
                            <div>
                              <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{s.first_name} {s.last_name}</div>
                              <div style={{ fontSize: 12, color: CB.textLight }}>{STAFF_ROLES.find(r => r.value === s.role)?.label || s.role} — hired {s.hire_date ? new Date(s.hire_date + "T00:00:00").toLocaleDateString() : "?"}</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: issues > 0 ? CB.red : CB.green }}>{complete}/{matrix.length}</span>
                            {issues > 0 && <Badge text={`${issues} issue${issues > 1 ? "s" : ""}`} color={CB.red} />}
                            <span style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "flex" }}>
                              {icons.chevDown({ size: 16, color: CB.textLight })}
                            </span>
                          </div>
                        </div>

                        {/* Expanded training matrix */}
                        {isExpanded && (
                          <div style={{ padding: "0 20px 16px", borderTop: `1px solid ${CB.border}` }}>
                            <div style={{ display: "grid", gap: 4, marginTop: 12 }}>
                              {matrix.map((m, i) => {
                                const si = statusIcons[m.status];
                                return (
                                  <div key={i} style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between",
                                    padding: "8px 12px", borderRadius: 8,
                                    background: m.status === "overdue" || m.status === "expired" ? `${CB.red}06` : m.status === "due_soon" ? `${CB.amber}06` : "transparent",
                                  }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1 }}>
                                      <Badge text={m.topic.category?.replace(/_/g, " ") || "—"} color={categoryColors[m.topic.category] || CB.textLight} />
                                      <span style={{ fontSize: 13, color: CB.text }}>{m.topic.topic_name}</span>
                                    </div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                      {m.completion?.completed_at && <span style={{ fontSize: 11, color: CB.textLight }}>{new Date(m.completion.completed_at).toLocaleDateString()}</span>}
                                      <span style={{ fontSize: 12, fontWeight: 700, color: si.color }}>{si.label}</span>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab === "completions" && (
            <DataTable columns={compColumns} data={completions} loading={loading} emptyMessage="No training completions logged yet" />
          )}
          {tab === "topics" && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>
              ) : topics.length === 0 ? (
                <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>No training topics found</div>
              ) : (() => {
                // Group topics by category
                const grouped = {};
                topics.forEach(t => {
                  const cat = t.category || "uncategorized";
                  if (!grouped[cat]) grouped[cat] = [];
                  grouped[cat].push(t);
                });
                // Sort categories by meta order
                const sortedCats = Object.keys(grouped).sort((a, b) => {
                  return (getCategoryMeta(a).order || 99) - (getCategoryMeta(b).order || 99);
                });
                return (
                  <div>
                    <div style={{ marginBottom: 14, fontSize: 13, color: CB.textMid }}>
                      <strong style={{ color: CB.navy }}>{topics.length}</strong> total topics across <strong style={{ color: CB.navy }}>{sortedCats.length}</strong> {sortedCats.length === 1 ? "category" : "categories"}
                    </div>
                    {sortedCats.map((cat, i) => {
                      const meta = getCategoryMeta(cat);
                      const list = grouped[cat];
                      return (
                        <CollapsibleTimeGroup key={cat} label={meta.label} count={list.length} defaultOpen={i < 2} accentColor={meta.color}>
                          {meta.description && <div style={{ fontSize: 12, color: CB.textLight, fontStyle: "italic", marginBottom: 10 }}>{meta.description}</div>}
                          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                            {list.map(t => (
                              <div key={t.id} style={{
                                display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
                                padding: "10px 14px", borderRadius: 10, background: CB.cream,
                                border: `1px solid ${CB.border}`, flexWrap: "wrap",
                              }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                                  <span style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>{t.topic_name}</span>
                                  {t.requires_certification && <Badge text="Cert Required" color={CB.red} />}
                                </div>
                                <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: CB.textMid }}>
                                  {t.deadline_days && <span>Due within <strong>{t.deadline_days}d</strong></span>}
                                  {t.renewal_months && <span>Renew every <strong>{t.renewal_months}mo</strong></span>}
                                  {!t.deadline_days && !t.renewal_months && <span style={{ fontStyle: "italic" }}>One-time</span>}
                                </div>
                              </div>
                            ))}
                          </div>
                        </CollapsibleTimeGroup>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          )}
          {/* v19.3 — TRAINING DECKS tab */}
          {tab === "decks" && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {decksTablesMissing ? (
                <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 40, textAlign: "center", boxShadow: CB.cardShadow }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>Training Decks table not found</div>
                  <div style={{ fontSize: 13, color: CB.textMid, lineHeight: 1.6, maxWidth: 520, margin: "0 auto" }}>
                    Run the v19.3 migration SQL in Supabase SQL editor to create the <code style={{ background: CB.cream, padding: "1px 6px", borderRadius: 4, fontSize: 12 }}>training_decks</code>, <code style={{ background: CB.cream, padding: "1px 6px", borderRadius: 4, fontSize: 12 }}>training_deck_service_codes</code>, and <code style={{ background: CB.cream, padding: "1px 6px", borderRadius: 4, fontSize: 12 }}>staff_deck_completions</code> tables. The SQL is embedded as a comment block in the v19.3 HTML source.
                  </div>
                </div>
              ) : (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
                    <div style={{ fontSize: 13, color: CB.textMid }}>
                      {decks.length} deck{decks.length === 1 ? "" : "s"} catalogued · {deckSvcCodes.length} service-code mapping{deckSvcCodes.length === 1 ? "" : "s"}
                    </div>
                    <PrimaryButton onClick={() => { setDeckEditing(null); setDeckFormOpen(true); }}>{icons.plus({ size: 15 })} New Deck</PrimaryButton>
                  </div>
                  {decks.length === 0 ? (
                    <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 40, textAlign: "center", boxShadow: CB.cardShadow }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>No training decks yet</div>
                      <div style={{ fontSize: 13, color: CB.textMid, lineHeight: 1.6, maxWidth: 480, margin: "0 auto 16px" }}>
                        Add your universal staff training (SOW 1.8 — 24 topics) and a deck for each service code Hope Haven delivers. Then map each service-code deck to the codes it satisfies.
                      </div>
                      <PrimaryButton onClick={() => { setDeckEditing(null); setDeckFormOpen(true); }}>{icons.plus({ size: 15 })} Create First Deck</PrimaryButton>
                    </div>
                  ) : (
                    <div style={{ display: "grid", gap: 10 }}>
                      {["universal", "service_code", "person_specific", "role_specific"].map(dt => {
                        const meta = DECK_TYPE_META[dt];
                        const groupDecks = decks.filter(d => d.deck_type === dt);
                        if (groupDecks.length === 0) return null;
                        return (
                          <div key={dt} style={{ marginTop: 8 }}>
                            <div style={{ fontSize: 11, fontWeight: 800, color: meta.color, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ width: 7, height: 7, borderRadius: "50%", background: meta.color }} />
                              {meta.label} · {groupDecks.length}
                              <span style={{ color: CB.textLight, fontSize: 10, fontWeight: 500, textTransform: "none", letterSpacing: 0 }}>— {meta.desc}</span>
                            </div>
                            <div style={{ display: "grid", gap: 6 }}>
                              {groupDecks.map(d => {
                                const mappedCodes = deckSvcCodes.filter(m => m.deck_id === d.id)
                                  .map(m => serviceCodes.find(sc => sc.id === m.service_code_id))
                                  .filter(Boolean);
                                const completionCount = deckCompletions.filter(c => c.deck_id === d.id).length;
                                return (
                                  <div key={d.id} style={{
                                    background: CB.white, border: `1px solid ${CB.border}`, borderLeft: `3px solid ${meta.color}`,
                                    borderRadius: 10, padding: "12px 16px", transition: "all 0.15s",
                                    display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap",
                                  }}>
                                    <div style={{ flex: 1, minWidth: 180, cursor: "pointer" }} onClick={() => { setDeckEditing(d); setDeckFormOpen(true); }}>
                                      <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, display: "flex", alignItems: "center", gap: 8 }}>
                                        {d.name}
                                        {d.is_active === false && <Badge text="Inactive" color={CB.textLight} />}
                                      </div>
                                      {d.description && <div style={{ fontSize: 12, color: CB.textMid, marginTop: 3 }}>{d.description}</div>}
                                    </div>
                                    <div style={{ display: "flex", gap: 16, fontSize: 11, color: CB.textMid }}>
                                      {d.slide_count ? <div><b>{d.slide_count}</b> slides</div> : null}
                                      {d.version ? <div>v{d.version}</div> : null}
                                      <div><b>{completionCount}</b> completion{completionCount === 1 ? "" : "s"}</div>
                                    </div>
                                    {mappedCodes.length > 0 && (
                                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", maxWidth: 240, justifyContent: "flex-end" }}>
                                        {mappedCodes.slice(0, 6).map(sc => <Badge key={sc.id} text={sc.code} color={meta.color} />)}
                                        {mappedCodes.length > 6 && <span style={{ fontSize: 11, color: CB.textLight }}>+{mappedCodes.length - 6}</span>}
                                      </div>
                                    )}
                                    <button onClick={(e) => { e.stopPropagation(); setCompletingDeck(d); setCompletionFormOpen(true); }} style={{
                                      padding: "6px 12px", borderRadius: 7, border: `1px solid ${meta.color}40`,
                                      background: `${meta.color}10`, color: meta.color,
                                      fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                                      display: "flex", alignItems: "center", gap: 5, whiteSpace: "nowrap",
                                    }}
                                      onMouseEnter={e => { e.currentTarget.style.background = `${meta.color}25`; }}
                                      onMouseLeave={e => { e.currentTarget.style.background = `${meta.color}10`; }}
                                    >
                                      {icons.checkCircle({ size: 12 })} Log
                                    </button>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              )}
              <TrainingDeckForm
                open={deckFormOpen}
                onClose={() => setDeckFormOpen(false)}
                onSaved={loadAll}
                editing={deckEditing}
                serviceCodes={serviceCodes}
                existingMappings={deckSvcCodes}
              />
              <DeckCompletionForm
                open={completionFormOpen}
                onClose={() => setCompletionFormOpen(false)}
                onSaved={loadAll}
                deck={completingDeck}
                staff={staff}
                clients={clients}
              />
            </div>
          )}

          {/* v19.3 — COMPETENCY MATRIX tab */}
          {tab === "matrix" && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {decksTablesMissing ? (
                <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 40, textAlign: "center", boxShadow: CB.cardShadow }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>Competency Matrix requires the v19.3 migration</div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>Run the v19.3 SQL in Supabase first, then come back here.</div>
                </div>
              ) : decks.length === 0 ? (
                <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 40, textAlign: "center", boxShadow: CB.cardShadow }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>No training decks to evaluate against</div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>Create decks in the Training Decks tab first. Then this matrix will show who's qualified to deliver what.</div>
                </div>
              ) : (
                <CompetencyMatrixView
                  staff={staff}
                  decks={decks}
                  deckSvcCodes={deckSvcCodes}
                  deckCompletions={deckCompletions}
                  serviceCodes={serviceCodes}
                />
              )}
            </div>
          )}

          <TrainingLogForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadAll} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // v19.3 — TRAINING DECK FORM
    // Create/edit a deck + its service-code mappings in one modal.
    // ═══════════════════════════════════════════════════════════════
    function TrainingDeckForm({ open, onClose, onSaved, editing, serviceCodes, existingMappings }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [form, setForm] = useState({
        name: "", deck_type: "service_code", description: "",
        slide_count: "", file_url: "", version: "1.0", is_active: true,
      });
      const [mappedCodeIds, setMappedCodeIds] = useState(new Set());

      useEffect(() => {
        if (!open) return;
        if (editing) {
          setForm({
            name: editing.name || "",
            deck_type: editing.deck_type || "service_code",
            description: editing.description || "",
            slide_count: editing.slide_count || "",
            file_url: editing.file_url || "",
            version: editing.version || "1.0",
            is_active: editing.is_active !== false,
          });
          const existing = new Set(
            (existingMappings || []).filter(m => m.deck_id === editing.id).map(m => m.service_code_id)
          );
          setMappedCodeIds(existing);
        } else {
          setForm({ name: "", deck_type: "service_code", description: "", slide_count: "", file_url: "", version: "1.0", is_active: true });
          setMappedCodeIds(new Set());
        }
      }, [open, editing]);

      const toggleCode = (codeId) => {
        setMappedCodeIds(prev => {
          const next = new Set(prev);
          if (next.has(codeId)) next.delete(codeId); else next.add(codeId);
          return next;
        });
      };

      const handleSave = async () => {
        if (!form.name.trim()) return addToast("Deck name is required", "error");
        setSaving(true);
        const payload = {
          org_id: orgId,
          name: form.name.trim(),
          deck_type: form.deck_type,
          description: form.description || null,
          slide_count: form.slide_count ? parseInt(form.slide_count, 10) : null,
          file_url: form.file_url || null,
          version: form.version || "1.0",
          is_active: form.is_active,
        };
        Object.keys(payload).forEach(k => { if (payload[k] === null) delete payload[k]; });

        let deckId = editing?.id;
        if (editing) {
          const { error } = await supabase.from("training_decks").update(payload).eq("id", editing.id);
          if (error) { setSaving(false); return addToast(error.message, "error"); }
        } else {
          const { data, error } = await supabase.from("training_decks").insert(payload).select("id").single();
          if (error) { setSaving(false); return addToast(error.message, "error"); }
          deckId = data.id;
        }

        // Sync service-code mappings only for service_code decks
        if (form.deck_type === "service_code" && deckId) {
          // Delete existing mappings for this deck, then re-insert the new set.
          // Simple and correct; quantity is always small (< 30).
          await supabase.from("training_deck_service_codes").delete().eq("deck_id", deckId);
          if (mappedCodeIds.size > 0) {
            const rows = Array.from(mappedCodeIds).map(scId => ({ deck_id: deckId, service_code_id: scId }));
            const { error: mapErr } = await supabase.from("training_deck_service_codes").insert(rows);
            if (mapErr) { setSaving(false); return addToast("Deck saved, but mapping failed: " + mapErr.message, "warning"); }
          }
        } else if (form.deck_type !== "service_code" && deckId) {
          // Clean up any stale mappings if type was changed away from service_code
          await supabase.from("training_deck_service_codes").delete().eq("deck_id", deckId);
        }

        setSaving(false);
        addToast(editing ? "Deck updated" : "Deck created", "success");
        onSaved();
        onClose();
      };

      const handleDelete = async () => {
        if (!editing || !window.confirm(`Delete "${editing.name}"? This removes all completion records for this deck.`)) return;
        setDeleting(true);
        const { error } = await supabase.from("training_decks").delete().eq("id", editing.id);
        setDeleting(false);
        if (error) return addToast(error.message, "error");
        addToast("Deck deleted", "success");
        onSaved();
        onClose();
      };

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const meta = DECK_TYPE_META[form.deck_type] || {};

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Training Deck" : "New Training Deck"} subtitle="Decks are reusable training modules staff complete to become qualified" width={680}>
          <FormRow>
            <FormField label="Deck Name" required half>
              <input style={fieldStyle} value={form.name} onChange={e => set("name", e.target.value)} placeholder="e.g. RHS Service Code Training" />
            </FormField>
            <FormField label="Deck Type" required half>
              <select style={fieldStyle} value={form.deck_type} onChange={e => set("deck_type", e.target.value)}>
                {Object.keys(DECK_TYPE_META).map(k => <option key={k} value={k}>{DECK_TYPE_META[k].label}</option>)}
              </select>
              {meta.desc && <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight, fontStyle: "italic" }}>{meta.desc}</div>}
            </FormField>
          </FormRow>

          <FormField label="Description">
            <textarea style={{ ...fieldStyle, minHeight: 60, resize: "vertical", fontFamily: "inherit" }} value={form.description} onChange={e => set("description", e.target.value)} placeholder="What this deck covers, when staff should complete it, etc." />
          </FormField>

          <FormRow>
            <FormField label="Slide Count" half>
              <input type="number" style={fieldStyle} value={form.slide_count} onChange={e => set("slide_count", e.target.value)} placeholder="30" />
            </FormField>
            <FormField label="Version" half>
              <input style={fieldStyle} value={form.version} onChange={e => set("version", e.target.value)} placeholder="1.0" />
            </FormField>
          </FormRow>

          <FormField label="File URL (optional)">
            <input style={fieldStyle} value={form.file_url} onChange={e => set("file_url", e.target.value)} placeholder="https://... link to the .pptx or hosted deck" />
          </FormField>

          {form.deck_type === "service_code" && (
            <FormField label={`Service Codes This Deck Satisfies (${mappedCodeIds.size} selected)`}>
              <div style={{ border: `1px solid ${CB.border}`, borderRadius: 10, padding: 10, maxHeight: 240, overflowY: "auto", background: CB.cream }}>
                {serviceCodes.length === 0 ? (
                  <div style={{ fontSize: 12, color: CB.textLight, padding: 12 }}>No service codes defined.</div>
                ) : (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 4 }}>
                    {serviceCodes.map(sc => {
                      const checked = mappedCodeIds.has(sc.id);
                      return (
                        <label key={sc.id} style={{
                          display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", borderRadius: 6,
                          background: checked ? `${meta.color || CB.teal}15` : "transparent",
                          cursor: "pointer", fontSize: 12,
                        }}>
                          <input type="checkbox" checked={checked} onChange={() => toggleCode(sc.id)} />
                          <span style={{ fontWeight: 700, color: CB.navy }}>{sc.code}</span>
                          <span style={{ color: CB.textMid, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sc.name}</span>
                        </label>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight }}>
                A single deck can satisfy multiple codes (e.g. the BC deck typically covers BC1, BC2, and BC3).
              </div>
            </FormField>
          )}

          <FormField>
            <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: CB.textMid, cursor: "pointer" }}>
              <input type="checkbox" checked={form.is_active} onChange={e => set("is_active", e.target.checked)} />
              Active — staff are expected to complete this deck
            </label>
          </FormField>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 10, flexWrap: "wrap" }}>
            <div>
              {editing && (
                <SecondaryButton onClick={handleDelete} disabled={deleting} style={{ color: CB.red, borderColor: "#fecaca" }}>
                  {deleting ? <Spinner size={14} /> : icons.trash({ size: 14 })} Delete
                </SecondaryButton>
              )}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleSave} disabled={saving}>
                {saving ? <Spinner size={14} /> : icons.save({ size: 14 })} {editing ? "Save Changes" : "Create Deck"}
              </PrimaryButton>
            </div>
          </div>
        </Modal>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // v19.3 — DECK COMPLETION FORM
    // Log a staff member's completion of a training deck.
    // For person_specific decks, also pick which person it's for.
    // ═══════════════════════════════════════════════════════════════
    function DeckCompletionForm({ open, onClose, onSaved, deck, staff, clients }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        staff_id: "", person_id: "",
        completed_at: new Date().toISOString().split("T")[0],
        expires_at: "",
        trainer_name: "",
        notes: "",
      });

      useEffect(() => {
        if (open) {
          setForm({
            staff_id: "", person_id: "",
            completed_at: new Date().toISOString().split("T")[0],
            expires_at: "",
            trainer_name: "",
            notes: "",
          });
        }
      }, [open, deck]);

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handleSave = async () => {
        if (!deck) return;
        if (!form.staff_id) return addToast("Pick a staff member", "error");
        if (deck.deck_type === "person_specific" && !form.person_id) {
          return addToast("Person-specific decks require selecting a client", "error");
        }
        if (!form.completed_at) return addToast("Completion date is required", "error");
        setSaving(true);
        const payload = {
          org_id: orgId,
          staff_id: form.staff_id,
          deck_id: deck.id,
          person_id: form.person_id || null,
          completed_at: form.completed_at,
          expires_at: form.expires_at || null,
          trainer_name: form.trainer_name || null,
          notes: form.notes || null,
        };
        Object.keys(payload).forEach(k => { if (payload[k] === null) delete payload[k]; });
        const { error } = await supabase.from("staff_deck_completions").insert(payload);
        setSaving(false);
        if (error) {
          if (/relation .*staff_deck_completions.* does not exist/i.test(error.message || "")) {
            return addToast("Completions table not found — run the v19.3 migration first", "error");
          }
          return addToast(error.message, "error");
        }
        addToast("Completion logged", "success");
        onSaved();
        onClose();
      };

      if (!deck) return null;
      const meta = DECK_TYPE_META[deck.deck_type] || {};

      return (
        <Modal open={open} onClose={onClose} title="Log Completion" subtitle={deck.name} width={560}>
          <div style={{
            background: `${meta.color}10`, border: `1px solid ${meta.color}30`, borderLeft: `3px solid ${meta.color}`,
            borderRadius: 8, padding: "8px 14px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: CB.textMid,
          }}>
            <span style={{ fontWeight: 800, color: meta.color, textTransform: "uppercase", letterSpacing: 0.4, fontSize: 11 }}>{meta.label}</span>
            {deck.description && <span>· {deck.description}</span>}
          </div>

          <FormField label="Staff Member" required>
            <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
              <option value="">Select staff...</option>
              {staff.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
            </select>
          </FormField>

          {deck.deck_type === "person_specific" && (
            <FormField label="Client" required>
              <select style={fieldStyle} value={form.person_id} onChange={e => set("person_id", e.target.value)}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
              <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight, fontStyle: "italic" }}>
                Person-specific training is logged separately for each client a staff member supports.
              </div>
            </FormField>
          )}

          <FormRow>
            <FormField label="Completed On" required half>
              <input type="date" style={fieldStyle} value={form.completed_at} onChange={e => set("completed_at", e.target.value)} />
            </FormField>
            <FormField label="Expires On" half>
              <input type="date" style={fieldStyle} value={form.expires_at} onChange={e => set("expires_at", e.target.value)} />
              <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight }}>Leave blank for one-time training</div>
            </FormField>
          </FormRow>

          <FormField label="Trainer">
            <input style={fieldStyle} value={form.trainer_name} onChange={e => set("trainer_name", e.target.value)} placeholder="Who delivered the training" />
          </FormField>

          <FormField label="Notes">
            <textarea style={{ ...fieldStyle, minHeight: 60, resize: "vertical", fontFamily: "inherit" }} value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Any context worth recording" />
          </FormField>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 12 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} disabled={saving}>
              {saving ? <Spinner size={14} /> : icons.checkCircle({ size: 14 })} Log Completion
            </PrimaryButton>
          </div>
        </Modal>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // v19.3 — COMPETENCY MATRIX VIEW
    // staff × service-code heatmap: ✓ qualified, ⚠ partial, ✗ not started
    // ═══════════════════════════════════════════════════════════════
    function CompetencyMatrixView({ staff, decks, deckSvcCodes, deckCompletions, serviceCodes }) {
      // Only show codes that actually have a deck mapped (plus universal matters for everyone)
      const mappedCodeIds = new Set(deckSvcCodes.map(m => m.service_code_id));
      const relevantCodes = serviceCodes.filter(sc => mappedCodeIds.has(sc.id));
      const hasUniversal = decks.some(d => d.deck_type === "universal" && d.is_active !== false);

      if (relevantCodes.length === 0 && !hasUniversal) {
        return (
          <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 40, textAlign: "center", boxShadow: CB.cardShadow }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>Map service codes to decks first</div>
            <div style={{ fontSize: 13, color: CB.textMid }}>Open a service-code deck in the Decks tab and check which codes it satisfies. Then this matrix populates.</div>
          </div>
        );
      }

      // Pre-compute cell status for every staff × code combo
      const cellFor = (staffId, codeId) => {
        return computeCompetency({
          staffId, serviceCodeId: codeId, personId: null,
          decks, deckServiceCodes: deckSvcCodes, completions: deckCompletions,
          requirePersonSpecific: false,
        });
      };

      // Universal-only column (no code — just "is this staff baseline-trained?")
      const universalFor = (staffId) => {
        return computeCompetency({
          staffId, serviceCodeId: null, personId: null,
          decks, deckServiceCodes: deckSvcCodes, completions: deckCompletions,
          requirePersonSpecific: false,
        });
      };

      const statusCell = (comp) => {
        if (comp.results.length === 0) return { color: CB.textLight, bg: "transparent", icon: "—", label: "N/A" };
        if (comp.isFullyQualified) return { color: CB.green, bg: `${CB.green}18`, icon: "✓", label: `${comp.complete.length}/${comp.results.length}` };
        if (comp.complete.length > 0) return { color: CB.amber, bg: `${CB.amber}18`, icon: "⚠", label: `${comp.complete.length}/${comp.results.length}` };
        return { color: CB.red, bg: `${CB.red}12`, icon: "✗", label: `0/${comp.results.length}` };
      };

      return (
        <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 780 }}>
            <thead>
              <tr style={{ background: CB.cream }}>
                <th style={{ padding: "12px 14px", textAlign: "left", fontSize: 11, fontWeight: 800, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: `1px solid ${CB.border}`, position: "sticky", left: 0, background: CB.cream, minWidth: 180 }}>Staff Member</th>
                {hasUniversal && (
                  <th style={{ padding: "12px 10px", textAlign: "center", fontSize: 11, fontWeight: 800, color: DECK_TYPE_META.universal.color, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: `1px solid ${CB.border}`, minWidth: 86 }}>Universal</th>
                )}
                {relevantCodes.map(sc => (
                  <th key={sc.id} style={{ padding: "12px 10px", textAlign: "center", fontSize: 11, fontWeight: 800, color: DECK_TYPE_META.service_code.color, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: `1px solid ${CB.border}`, minWidth: 76 }}>
                    {sc.code}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {staff.map(s => (
                <tr key={s.id} style={{ borderBottom: `1px solid ${CB.border}` }}>
                  <td style={{ padding: "10px 14px", position: "sticky", left: 0, background: CB.white, borderRight: `1px solid ${CB.border}`, fontWeight: 700, color: CB.navy, fontSize: 13 }}>
                    {s.first_name} {s.last_name}
                    <div style={{ fontSize: 10, fontWeight: 500, color: CB.textLight, marginTop: 2 }}>
                      {STAFF_ROLES.find(r => r.value === s.role)?.label || s.role || "—"}
                    </div>
                  </td>
                  {hasUniversal && (() => {
                    const cell = statusCell(universalFor(s.id));
                    return (
                      <td style={{ padding: 6, textAlign: "center", background: cell.bg }}>
                        <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                          <span style={{ fontSize: 16, fontWeight: 800, color: cell.color }}>{cell.icon}</span>
                          <span style={{ fontSize: 10, color: cell.color, fontWeight: 700 }}>{cell.label}</span>
                        </div>
                      </td>
                    );
                  })()}
                  {relevantCodes.map(sc => {
                    const cell = statusCell(cellFor(s.id, sc.id));
                    return (
                      <td key={sc.id} style={{ padding: 6, textAlign: "center", background: cell.bg }}>
                        <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 2 }} title={`${s.first_name} ${s.last_name} — ${sc.code}`}>
                          <span style={{ fontSize: 16, fontWeight: 800, color: cell.color }}>{cell.icon}</span>
                          <span style={{ fontSize: 10, color: cell.color, fontWeight: 700 }}>{cell.label}</span>
                        </div>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ padding: "10px 16px", borderTop: `1px solid ${CB.border}`, fontSize: 11, color: CB.textLight, background: CB.cream, display: "flex", gap: 20, flexWrap: "wrap" }}>
            <span><span style={{ color: CB.green, fontWeight: 800 }}>✓</span> Fully qualified</span>
            <span><span style={{ color: CB.amber, fontWeight: 800 }}>⚠</span> Partial — some decks complete</span>
            <span><span style={{ color: CB.red, fontWeight: 800 }}>✗</span> Not started</span>
            <span style={{ marginLeft: "auto" }}>Numbers = decks completed / decks required. Person-specific training is evaluated per-shift, not in this matrix.</span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 4: SERVICE NOTE ENTRY — dynamic forms per service code
    // ═══════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════
    // DHHS91172 BILLING RULES — unit types from SOW Rate Table
    // worksheet: true = rate varies per person (negotiated by support coordinator)
    // max_rate = SOW ceiling; actual rate stored on person_service_authorizations
    // ═══════════════════════════════════════════════════════════════
    const BILLING_RULES = {
      // Behavior Consultation — quarter hour, fixed
      BC1:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 8.67 },
      BC2:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 14.83 },
      BC3:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 22.68 },
      // Homemaker — quarter hour, fixed
      HSQ:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 6.65 },
      // Companion — quarter hour, fixed (also has daily $151.04)
      COM:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 6.30, alt_daily: 151.04 },
      // Day Supports Group — DAILY, *worksheet*

    // ═══════════════════════════════════════════════════════════════
    // PDF DOCUMENT ENGINE — generates Hope Haven forms from data
    // Uses jsPDF + autoTable for client-side PDF generation
    // ═══════════════════════════════════════════════════════════════
    const HopeHavenPDF = {
      // Shared constants
      HEADER_COLOR: [10, 30, 51],   // CB.navy
      ACCENT_COLOR: [0, 137, 123],  // CB.teal
      LIGHT_BG: [250, 251, 253],
      COMPANY: "HOPE HAVEN SERVICES INC.",
      ADDRESS: "4974 W Mellow Way, South Jordan, UT 84009",
      PHONE: "801-558-8070",

      // Utility: add company header to any PDF
      _header(doc, title, subtitle) {
        const w = doc.internal.pageSize.getWidth();
        doc.setFillColor(...this.HEADER_COLOR);
        doc.rect(0, 0, w, 38, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16);
        doc.setFont("helvetica", "bold");
        doc.text(this.COMPANY, 20, 18);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(title, 20, 30);
        if (subtitle) { doc.setFontSize(8); doc.text(subtitle, w - 20, 30, { align: "right" }); }
        doc.setTextColor(0, 0, 0);
        return 48; // y offset after header
      },

      // Utility: field row — label on top, value below with underline
      _fieldRow(doc, y, fields, opts = {}) {
        const w = doc.internal.pageSize.getWidth() - 40;
        const colW = w / fields.length;
        fields.forEach((f, i) => {
          const x = 20 + i * colW;
          doc.setFontSize(8);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(100, 100, 100);
          doc.text(f.label + ":", x, y);
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(0, 0, 0);
          doc.text(String(f.value || ""), x, y + 6);
          // Underline
          const lineY = y + 8;
          doc.setDrawColor(200, 200, 200);
          doc.line(x, lineY, x + colW - 8, lineY);
        });
        return y + 18;
      },

      // Utility: section heading
      _sectionHead(doc, y, text) {
        doc.setFillColor(...this.ACCENT_COLOR);
        doc.rect(20, y, doc.internal.pageSize.getWidth() - 40, 8, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.text(text, 24, y + 6);
        doc.setTextColor(0, 0, 0);
        doc.setFont("helvetica", "normal");
        return y + 14;
      },

      // Utility: signature block
      _signatures(doc, y, signers) {
        y = this._sectionHead(doc, y, "SIGNATURES");
        signers.forEach(s => {
          doc.setFontSize(8);
          doc.setTextColor(100, 100, 100);
          doc.text(s.label + ":", 20, y + 4);
          doc.setDrawColor(0, 0, 0);
          doc.line(80, y + 4, 200, y + 4);
          doc.text("Date:", 210, y + 4);
          doc.line(230, y + 4, 300, y + 4);
          y += 14;
        });
        return y;
      },

      _download(doc, filename) {
        doc.save(filename);
      },

      // ──────────────────────────────────────────────
      // STAFF FORM: Personnel File Cover Sheet
      // ──────────────────────────────────────────────
      staffCoverSheet(staff) {
        const doc = new jspdf.jsPDF();
        let y = this._header(doc, "Staff Personnel File Cover Sheet");
        y = this._fieldRow(doc, y, [
          { label: "Employee Name", value: `${staff.first_name || ""} ${staff.last_name || ""}` },
          { label: "Hire Date", value: staff.hire_date || "" },
        ]);
        y = this._fieldRow(doc, y, [
          { label: "Position/Title", value: STAFF_ROLES.find(r => r.value === staff.role)?.label || staff.role?.replace(/_/g, " ") || "" },
          { label: "Status", value: staff.is_active !== false ? "Active" : "Inactive" },
        ]);
        y = this._fieldRow(doc, y, [
          { label: "Phone", value: staff.phone || "" },
          { label: "Email", value: staff.email || "" },
        ]);
        y += 6;
        y = this._sectionHead(doc, y, "PERSONNEL FILE CONTENTS CHECKLIST");
        const sections = [
          { title: "SECTION A: CREDENTIALS", items: ["Educational transcripts", "Degrees/Diplomas", "Professional licenses", "Relevant certifications", "Letters of recommendation"] },
          { title: "SECTION B: HIRE PAPERWORK", items: ["Employment application", "Resume", "DHHS Code of Conduct (signed)", "Medicaid Exclusion verification", "Background check (BCI)", "I-9 Employment Eligibility", "W-4 Tax Withholding", "Direct deposit authorization", "Emergency contact information", "Driver's license copy", "Auto insurance verification"] },
          { title: "SECTION C: TRAINING", items: ["General training log (24 topics)", "Emergency Mgmt Plan training", "Person-specific training", "ACRE/USU (if EPR)", "ABI training (if ABI)"] },
          { title: "SECTION D: CERTIFICATIONS", items: ["First Aid — Initial", "First Aid — Current", "CPR — Initial", "CPR — Current"] },
        ];
        sections.forEach(sec => {
          doc.setFontSize(9); doc.setFont("helvetica", "bold"); doc.setTextColor(...this.HEADER_COLOR);
          doc.text(sec.title, 24, y); y += 6;
          doc.setFont("helvetica", "normal"); doc.setTextColor(0, 0, 0); doc.setFontSize(9);
          sec.items.forEach(item => {
            doc.rect(24, y - 3, 4, 4); // checkbox
            doc.text(item, 32, y);
            doc.text("________", 160, y);
            y += 7;
            if (y > 270) { doc.addPage(); y = 20; }
          });
          y += 3;
        });
        this._download(doc, `Staff_Cover_Sheet_${staff.last_name || "new"}.pdf`);
      },

      // ──────────────────────────────────────────────
      // STAFF FORM: DHHS Code of Conduct
      // ──────────────────────────────────────────────
      codeOfConduct(staff) {
        const doc = new jspdf.jsPDF();
        let y = this._header(doc, "DHHS Staff Code of Conduct", "Required by Utah DHHS");
        y = this._fieldRow(doc, y, [
          { label: "Employee Name", value: `${staff.first_name || ""} ${staff.last_name || ""}` },
          { label: "Hire Date", value: staff.hire_date || "" },
        ]);
        y += 4;
        const content = [
          { head: "1. PROFESSIONAL CONDUCT", body: "I will treat all Persons with dignity, respect, and courtesy. I will provide services professionally, respect privacy and confidentiality, follow all laws and agency policies, and maintain professional boundaries." },
          { head: "2. ABUSE, NEGLECT, AND EXPLOITATION", body: "I will NOT physically, emotionally, verbally, or sexually abuse any Person. I will NOT neglect health or safety, exploit any Person, use threats or coercion, or use unauthorized restraints. I WILL immediately report suspected abuse/neglect/exploitation." },
          { head: "3. FINANCIAL CONDUCT", body: "I will NOT accept money, gifts, loans, or gratuities from Persons or their families. I will NOT borrow from or lend money to Persons. I will NOT use a Person's property, vehicle, or resources for personal benefit." },
          { head: "4. SUBSTANCE USE", body: "I will NOT report to work under the influence of alcohol or illegal drugs. I will NOT use, possess, or distribute illegal substances while on duty. I will report any prescribed medications that may impair my ability to safely perform duties." },
          { head: "5. CONFIDENTIALITY", body: "I will protect all Person information per HIPAA and state regulations. I will NOT discuss Person information in public areas. I will NOT share information on social media or with unauthorized individuals." },
          { head: "6. REPORTING OBLIGATIONS", body: "I will immediately report: suspected abuse/neglect/exploitation, critical incidents, unsafe conditions, policy violations by any staff, and any arrest or criminal charges I receive." },
        ];
        content.forEach(sec => {
          if (y > 245) { doc.addPage(); y = 20; }
          doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.setTextColor(...this.HEADER_COLOR);
          doc.text(sec.head, 20, y); y += 6;
          doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.setTextColor(60, 60, 60);
          const lines = doc.splitTextToSize(sec.body, 170);
          doc.text(lines, 20, y); y += lines.length * 5 + 6;
        });
        y += 8;
        y = this._sectionHead(doc, y, "ACKNOWLEDGMENT");
        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text("I have read, understand, and agree to comply with this Code of Conduct.", 20, y); y += 12;
        y = this._signatures(doc, y, [
          { label: "Employee Signature" }, { label: "Supervisor Signature" },
        ]);
        this._download(doc, `Code_of_Conduct_${staff.last_name || "new"}.pdf`);
      },

    // Get the effective rate for a service code — either fixed or from client auth
    function getEffectiveRate(serviceCode, authRate) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return null;
      // Worksheet services use the client-specific rate from their authorization
      if (rule.worksheet) return authRate || null;
      // Fixed rate codes use the SOW rate
      return rule.rate || null;
    }

    function calculateBillableUnits(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      switch (rule.unit_type) {
        case "quarter_hour":
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
        case "daily":
          return 1;
        case "session":
          return 1;
        case "tiered_daily":
          return 1;
        default:
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      }
    }

    function getTieredRate(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule || rule.unit_type !== "tiered_daily" || !rule.tiers) return null;
      const hours = Math.ceil((durationMinutes || 0) / 60);
      const tier = rule.tiers.find(t => hours <= t.maxHours) || rule.tiers[rule.tiers.length - 1];
      return tier;
    }

    function getBillingLabel(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? `${Math.ceil(durationMinutes / 15)} units (qtr-hr)` : "—";
      const units = calculateBillableUnits(serviceCode, durationMinutes);
      switch (rule.unit_type) {
        case "quarter_hour":
          return units != null ? `${units} unit${units !== 1 ? "s" : ""} (${rule.label})` : "—";
        case "daily":
          return `1 unit (${rule.label})`;
        case "session":
          return `1 unit (${rule.label})`;
        case "tiered_daily": {
          const tier = getTieredRate(serviceCode, durationMinutes);
          return tier ? `1 unit (${Math.ceil((durationMinutes||0)/60)}hr tier)` : `1 unit (${rule.label})`;
        }
        default:
          return "—";
      }
    }
