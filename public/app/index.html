                  </FormField>
                  <FormField label="Relationship" half>
                    <input style={fieldStyle} value={form.emergency_relation} onChange={e => set("emergency_relation", e.target.value)} placeholder="e.g. Parent, Sibling" />
                  </FormField>
                </FormRow>
                <FormField label="Emergency Phone">
                  <input style={fieldStyle} type="tel" value={form.emergency_phone} onChange={e => set("emergency_phone", e.target.value)} placeholder="(801) 555-0000" />
                </FormField>
              </>
            )}

            {/* Step 2: Medical & Support Coordinator */}
            {step === 2 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Medical Information & Support Coordinator</h3>
                <FormField label="Diagnoses / Conditions">
                  <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={form.diagnoses} onChange={e => set("diagnoses", e.target.value)} placeholder="Primary diagnoses, conditions, or relevant medical information" />
                </FormField>
                <FormRow>
                  <FormField label="Medications on File" half>
                    <div style={{ display: "flex", gap: 12 }}>
                      {[true, false].map(val => (
                        <label key={String(val)} style={{
                          display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                          borderRadius: 10, border: `1px solid ${form.medications_on_file === val ? (val ? CB.green : CB.textLight) : CB.border}`,
                          background: form.medications_on_file === val ? (val ? "rgba(46,125,50,0.06)" : CB.cream) : CB.white,
                          cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.medications_on_file === val ? (val ? CB.green : CB.textMid) : CB.textMid,
                        }}>
                          <input type="radio" name="meds" checked={form.medications_on_file === val} onChange={() => set("medications_on_file", val)} style={{ display: "none" }} />
                          {val ? "Yes" : "No"}
                        </label>
                      ))}
                    </div>
                  </FormField>
                  <FormField label="PCSP on File" half>
                    <div style={{ display: "flex", gap: 12 }}>
                      {[true, false].map(val => (
                        <label key={String(val)} style={{
                          display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                          borderRadius: 10, border: `1px solid ${form.pcsp_on_file === val ? (val ? CB.green : CB.textLight) : CB.border}`,
                          background: form.pcsp_on_file === val ? (val ? "rgba(46,125,50,0.06)" : CB.cream) : CB.white,
                          cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.pcsp_on_file === val ? (val ? CB.green : CB.textMid) : CB.textMid,
                        }}>
                          <input type="radio" name="pcsp" checked={form.pcsp_on_file === val} onChange={() => set("pcsp_on_file", val)} style={{ display: "none" }} />
                          {val ? "Yes" : "No"}
                        </label>
                      ))}
                    </div>
                  </FormField>
                </FormRow>

                <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
                  <h4 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 14 }}>Support Coordinator</h4>
                  <FormRow>
                    <FormField label="SC Name" half>
                      <input style={fieldStyle} value={form.support_coordinator} onChange={e => set("support_coordinator", e.target.value)} placeholder="Support coordinator name" />
                    </FormField>
                    <FormField label="SC Agency" half>
                      <input style={fieldStyle} value={form.sc_agency} onChange={e => set("sc_agency", e.target.value)} placeholder="e.g. Utah Independent Living Center" />
                    </FormField>
                  </FormRow>
                  <FormRow>
                    <FormField label="SC Phone" half>
                      <input style={fieldStyle} type="tel" value={form.sc_phone} onChange={e => set("sc_phone", e.target.value)} placeholder="(801) 555-0000" />
                    </FormField>
                    <FormField label="SC Email" half>
                      <input style={fieldStyle} type="email" value={form.sc_email} onChange={e => set("sc_email", e.target.value)} placeholder="sc@agency.org" />
                    </FormField>
                  </FormRow>
                </div>
              </>
            )}

            {/* Step 3: Service Auths */}
            {step === 3 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Service Authorizations</h3>
                {form.auths.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    {form.auths.map((a, i) => (
                      <div key={i} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                        padding: "10px 14px", borderRadius: 10, background: CB.cream,
                        marginBottom: 6, border: `1px solid ${CB.border}`,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <Badge text={a.code} color={CB.blue} />
                          <span style={{ fontSize: 13, color: CB.text, fontWeight: 600 }}>{a.authorized_units} units</span>
                          {a.rate_per_unit && perms.viewRates && <span style={{ fontSize: 12, color: CB.teal, fontWeight: 700 }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                        </div>
                        <button onClick={() => removeIntakeAuth(i)} style={{
                          padding: "4px 8px", borderRadius: 6, border: "none", background: "rgba(229,57,53,0.08)",
                          color: CB.red, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                        }}>{icons.trash({ size: 13, color: CB.red })}</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div style={{ flex: "1 1 160px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Service Code</label>
                    <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={newAuth.service_code_id} onChange={e => setNewAuth(p => ({ ...p, service_code_id: e.target.value }))}>
                      <option value="">Select...</option>
                      {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: "0 0 80px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Units</label>
                    <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="number" value={newAuth.authorized_units} onChange={e => setNewAuth(p => ({ ...p, authorized_units: e.target.value }))} placeholder="0" />
                  </div>
                  {perms.viewRates && (
                    <div style={{ flex: "0 0 100px" }}>
                      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: isWorksheet ? CB.amber : CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>
                        {isWorksheet ? "Rate *" : "Rate"}
                      </label>
                      <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13, borderColor: isWorksheet ? `${CB.amber}40` : CB.border }}
                        type="number" step="0.01" value={newAuth.rate_per_unit}
                        onChange={e => setNewAuth(p => ({ ...p, rate_per_unit: e.target.value }))}
                        placeholder={newAuthRule ? (isWorksheet ? `≤${newAuthRule.max_rate || "?"}` : `$${newAuthRule.rate || "?"}`) : "$0.00"} />
                    </div>
                  )}
                  <div style={{ flex: "0 0 130px" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Start</label>
                    <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="date" value={newAuth.start_date} onChange={e => setNewAuth(p => ({ ...p, start_date: e.target.value }))} />
                  </div>
                  <button onClick={addIntakeAuth} style={{
                    padding: "9px 16px", borderRadius: 10, border: `2px dashed ${CB.blue}`,
                    background: `${CB.blue}08`, color: CB.blue, fontSize: 13, fontWeight: 700,
                    cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", marginBottom: 16,
                    display: "flex", alignItems: "center", gap: 6,
                  }}>{icons.plus({ size: 14, color: CB.blue })} Add Auth</button>
                </div>
                {isWorksheet && (
                  <div style={{ fontSize: 12, color: CB.amber, fontWeight: 500, marginTop: -8, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                    {icons.alertTriangle({ size: 13, color: CB.amber })} Worksheet service — rate is person-specific (max ${newAuthRule?.max_rate?.toFixed(2) || "N/A"}/unit)
                  </div>
                )}
              </>
            )}

            {/* Step 4: Review */}
            {step === 4 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Review & Submit</h3>
                <RGrid cols={2} gap={16}>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Personal Info</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{form.first_name} {form.last_name}</div>
                    {form.date_of_birth && <div style={{ fontSize: 13, color: CB.textMid, marginTop: 4 }}>DOB: {new Date(form.date_of_birth + "T00:00:00").toLocaleDateString()}</div>}
                    {form.gender && <div style={{ fontSize: 13, color: CB.textMid }}>Gender: {form.gender}</div>}
                    {form.medicaid_number && <div style={{ fontSize: 13, color: CB.textMid }}>Medicaid: {form.medicaid_number}</div>}
                    {form.pid && <div style={{ fontSize: 13, color: CB.textMid }}>PID: {form.pid}</div>}
                    {form.address && <div style={{ fontSize: 13, color: CB.textMid, marginTop: 4 }}>{form.address}{form.city ? `, ${form.city}` : ""}{form.state ? `, ${form.state}` : ""} {form.zip}</div>}
                    {form.phone && <div style={{ fontSize: 13, color: CB.textMid }}>{form.phone}</div>}
                    {form.admission_date && <div style={{ fontSize: 13, color: CB.teal, fontWeight: 600, marginTop: 4 }}>Admission: {new Date(form.admission_date + "T00:00:00").toLocaleDateString()}</div>}
                  </div>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Contacts</div>
                    {form.guardian_name && <div style={{ fontSize: 13, color: CB.text }}><span style={{ fontWeight: 600 }}>Guardian:</span> {form.guardian_name} ({form.guardian_relation}) {form.guardian_phone}</div>}
                    {form.emergency_name && <div style={{ fontSize: 13, color: CB.text, marginTop: 6 }}><span style={{ fontWeight: 600 }}>Emergency:</span> {form.emergency_name} ({form.emergency_relation}) {form.emergency_phone}</div>}
                    {form.support_coordinator && <div style={{ fontSize: 13, color: CB.text, marginTop: 6 }}><span style={{ fontWeight: 600 }}>SC:</span> {form.support_coordinator}{form.sc_agency ? ` (${form.sc_agency})` : ""} {form.sc_phone} {form.sc_email}</div>}
                    {!form.guardian_name && !form.emergency_name && !form.support_coordinator && <div style={{ fontSize: 13, color: CB.textLight }}>No contacts added</div>}
                  </div>
                </RGrid>
                <RGrid cols={2} gap={16} style={{ marginTop: 16 }}>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Medical</div>
                    {form.diagnoses ? <div style={{ fontSize: 13, color: CB.text }}>{form.diagnoses}</div> : <div style={{ fontSize: 13, color: CB.textLight }}>No diagnoses entered</div>}
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <Badge text={form.medications_on_file ? "Meds on file ✓" : "Meds not on file"} color={form.medications_on_file ? CB.green : CB.amber} />
                      <Badge text={form.pcsp_on_file ? "PCSP on file ✓" : "PCSP not on file"} color={form.pcsp_on_file ? CB.green : CB.amber} />
                    </div>
                  </div>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Service Authorizations ({form.auths.length})</div>
                    {form.auths.length === 0 ? (
                      <div style={{ fontSize: 13, color: CB.textLight }}>No authorizations — add later from client record</div>
                    ) : (
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {form.auths.map((a, i) => (
                          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8, background: CB.white, border: `1px solid ${CB.border}` }}>
                            <Badge text={a.code} color={CB.blue} />
                            <span style={{ fontSize: 13, fontWeight: 600, color: CB.navy }}>{a.authorized_units} units</span>
                            {a.rate_per_unit && perms.viewRates && <span style={{ fontSize: 12, color: CB.teal }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </RGrid>
              </>
            )}

            {/* Navigation buttons */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28, paddingTop: 20, borderTop: `1px solid ${CB.border}` }}>
              {step > 0 ? (
                <SecondaryButton onClick={() => setStep(step - 1)}>{icons.arrowRight({ size: 15, style: { transform: "rotate(180deg)" } })} Back</SecondaryButton>
              ) : <div />}
              {step < 4 ? (
                <PrimaryButton onClick={() => setStep(step + 1)}>Next {icons.arrowRight({ size: 15 })}</PrimaryButton>
              ) : (
                <PrimaryButton onClick={handleSubmit} loading={saving} color={CB.green}>{icons.checkCircle({ size: 16 })} Create Client</PrimaryButton>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // STAFF ONBOARDING WIZARD — mirrors client intake for new hires
    // Walks through Hope Haven Staff Personnel File (Sections A–D)
    // ═══════════════════════════════════════════════════════════════
    function StaffOnboardingWizard() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [step, setStep] = useState(0);
      const [saving, setSaving] = useState(false);
      const [complete, setComplete] = useState(false);

      const [form, setForm] = useState({
        // Personal
        first_name: "", last_name: "", date_of_birth: "", email: "", phone: "",
        role: "dsp", hire_date: new Date().toISOString().split("T")[0],
        address: "", city: "", state: "UT", zip: "",
        emergency_name: "", emergency_phone: "", emergency_relation: "",
        // Section B: Hire Paperwork — tracking on-file status
        b_application: false, b_resume: false, b_code_of_conduct: false,
        b_medicaid_exclusion: false, b_background_check: false,
        b_i9: false, b_w4: false, b_direct_deposit: false,
        b_emergency_contact: false, b_drivers_license: false, b_auto_insurance: false,
        // Section A: Credentials
        a_transcripts: false, a_degrees: false, a_professional_license: false,
        // Section C: Training
        c_training_log_started: false, c_emergency_plan_training: false,
        c_person_specific_training: false,
        // Section D: Certifications
        d_first_aid_date: "", d_cpr_date: "",
        d_first_aid_provider: "", d_cpr_provider: "",
      });

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const steps = [
        { label: "Personal Info", icon: icons.heart },
        { label: "Hire Paperwork", icon: icons.fileText },
        { label: "Credentials & Training", icon: icons.book },
        { label: "Certifications", icon: icons.shield },
        { label: "Review & Submit", icon: icons.checkCircle },
      ];

      const handleSubmit = async () => {
        if (!form.first_name || !form.last_name || !form.hire_date) {
          return addToast("Name and hire date are required", "error");
        }
        setSaving(true);
        // Step 1: Create staff record
        const staffPayload = {
          org_id: orgId,
          first_name: form.first_name, last_name: form.last_name,
          date_of_birth: form.date_of_birth || null,
          email: form.email || null, phone: form.phone || null,
          role: form.role || "dsp", hire_date: form.hire_date,
          is_active: true,
        };
        const { data: staffData, error: staffErr } = await supabase.from("staff").insert(staffPayload).select();
        if (staffErr || !staffData?.[0]) {
          addToast("Failed to create staff: " + (staffErr?.message || "unknown error"), "error");
          setSaving(false);
          return;
        }
        const staffId = staffData[0].id;

        // Step 2: Create document records for all items marked "on file"
        const docRecords = [];
        const bDocs = [
          { field: "b_application", type: "b_application", name: "Employment Application" },
          { field: "b_resume", type: "b_resume", name: "Resume" },
          { field: "b_code_of_conduct", type: "b_code_of_conduct", name: "DHHS Code of Conduct (signed)" },
          { field: "b_medicaid_exclusion", type: "b_medicaid_exclusion", name: "Medicaid Exclusion Verification" },
          { field: "b_background_check", type: "b_background_check", name: "Background Check (BCI)" },
          { field: "b_i9", type: "b_i9", name: "I-9 Employment Eligibility" },
          { field: "b_w4", type: "b_w4", name: "W-4 Tax Withholding" },
          { field: "b_direct_deposit", type: "b_direct_deposit", name: "Direct Deposit Authorization" },
          { field: "b_emergency_contact", type: "b_emergency_contact", name: "Emergency Contact Info" },
          { field: "b_drivers_license", type: "b_drivers_license", name: "Driver's License Copy" },
          { field: "b_auto_insurance", type: "b_auto_insurance", name: "Auto Insurance Verification" },
        ];
        const aDocs = [
          { field: "a_transcripts", type: "a_transcripts", name: "Educational Transcripts" },
          { field: "a_degrees", type: "a_degrees", name: "Degrees / Diplomas" },
          { field: "a_professional_license", type: "a_professional_license", name: "Professional License" },
        ];
        [...bDocs, ...aDocs].forEach(d => {
          if (form[d.field]) {
            docRecords.push({
              org_id: orgId, staff_id: staffId,
              doc_type: d.type,
              file_name: d.name, file_url: `onboarding://${d.name}`,
              notes: "Collected during onboarding",
            });
          }
        });
        // Certifications as documents
        if (form.d_first_aid_date) {
          docRecords.push({
            org_id: orgId, staff_id: staffId,
            doc_type: "d_first_aid_initial",
            file_name: `First Aid Cert${form.d_first_aid_provider ? ` — ${form.d_first_aid_provider}` : ""}`,
            file_url: "onboarding://first-aid-cert",
            notes: `Initial cert date: ${form.d_first_aid_date}`,
          });
        }
        if (form.d_cpr_date) {
          docRecords.push({
            org_id: orgId, staff_id: staffId,
            doc_type: "d_cpr_initial",
            file_name: `CPR Cert${form.d_cpr_provider ? ` — ${form.d_cpr_provider}` : ""}`,
            file_url: "onboarding://cpr-cert",
            notes: `Initial cert date: ${form.d_cpr_date}`,
          });
        }
        if (docRecords.length > 0) {
          const { error: docErr } = await supabase.from("documents").insert(docRecords);
          if (docErr) addToast("Staff created but some documents failed: " + docErr.message, "warning");
        }

        setSaving(false);
        setComplete(true);
        addToast(`${form.first_name} ${form.last_name} onboarding complete!`, "success");
      };

      // Count collected items for Section B
      const bFields = ["b_application", "b_resume", "b_code_of_conduct", "b_medicaid_exclusion", "b_background_check", "b_i9", "b_w4", "b_direct_deposit", "b_emergency_contact", "b_drivers_license"];
      const bRequired = bFields.filter(f => f !== "b_auto_insurance");
      const bCollected = bRequired.filter(f => form[f]).length;

      if (complete) {
        return (
          <div style={{
            background: CB.white, borderRadius: 20, padding: "60px 40px", textAlign: "center",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "successPop 0.4s ease",
          }}>
            <div style={{
              width: 72, height: 72, borderRadius: 20, background: `${CB.green}12`,
              display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20,
            }}>{icons.checkCircle({ size: 36, color: CB.green })}</div>
            <h3 style={{ fontSize: 22, fontWeight: 800, color: CB.navy, marginBottom: 8 }}>{form.first_name} {form.last_name}</h3>
            <p style={{ fontSize: 15, color: CB.textMid, marginBottom: 8 }}>
              {STAFF_ROLES.find(r => r.value === form.role)?.label || form.role} — hired {form.hire_date ? new Date(form.hire_date + "T00:00:00").toLocaleDateString() : ""}
            </p>
            <p style={{ fontSize: 14, color: CB.textLight, marginBottom: 24 }}>
              {bCollected}/{bRequired.length} hire paperwork items collected — view staff record to add remaining documents
            </p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <PrimaryButton onClick={() => HopeHavenPDF.staffOnboardingPacket(form)} color={CB.navy}>
                {icons.fileText({ size: 16 })} Download Onboarding Packet
              </PrimaryButton>
              <PrimaryButton onClick={() => { setComplete(false); setStep(0); setForm(prev => {
                const fresh = {};
                Object.keys(prev).forEach(k => fresh[k] = typeof prev[k] === "boolean" ? false : "");
                fresh.role = "dsp"; fresh.state = "UT"; fresh.hire_date = new Date().toISOString().split("T")[0];
                return fresh;
              }); }}>
                {icons.plus({ size: 16 })} Start Another Onboarding
              </PrimaryButton>
            </div>
          </div>
        );
      }

      // Toggle component for checklist items
      const CheckItem = ({ label, field, required }) => (
        <label style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
          borderRadius: 10, cursor: "pointer", transition: "all 0.15s",
          border: `1px solid ${form[field] ? `${CB.green}40` : CB.border}`,
          background: form[field] ? "rgba(46,125,50,0.04)" : CB.white,
        }}>
          <div style={{
            width: 22, height: 22, borderRadius: 6, flexShrink: 0,
            border: `2px solid ${form[field] ? CB.green : CB.border}`,
            background: form[field] ? CB.green : CB.white,
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.15s",
          }}>
            {form[field] && <span style={{ color: CB.white, fontSize: 13, fontWeight: 700 }}>✓</span>}
          </div>
          <input type="checkbox" checked={form[field]} onChange={e => set(field, e.target.checked)} style={{ display: "none" }} />
          <div style={{ flex: 1 }}>
            <span style={{ fontSize: 14, fontWeight: form[field] ? 600 : 400, color: form[field] ? CB.navy : CB.text }}>{label}</span>
            {required && !form[field] && <span style={{ fontSize: 10, color: CB.red, marginLeft: 6, fontWeight: 700 }}>REQUIRED</span>}
          </div>
        </label>
      );

      return (
        <div>
          {/* Step indicator */}
          <div style={{
            display: "flex", alignItems: "center", marginBottom: 28, padding: "16px 24px",
            background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          }}>
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div onClick={() => i <= step && setStep(i)} style={{
                  display: "flex", alignItems: "center", gap: 8, cursor: i <= step ? "pointer" : "default",
                  opacity: i <= step ? 1 : 0.4, transition: "opacity 0.2s",
                }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: 10,
                    background: i === step ? CB.navy : i < step ? CB.green : CB.cream,
                    display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.2s",
                  }}>
                    {i < step ? icons.checkCircle({ size: 16, color: CB.white }) : s.icon({ size: 16, color: i === step ? CB.white : CB.textLight })}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: i === step ? 700 : 500, color: i === step ? CB.navy : CB.textMid }}>{s.label}</span>
                </div>
                {i < steps.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: i < step ? CB.green : CB.border, margin: "0 12px", borderRadius: 1, transition: "background 0.2s" }} />
                )}
              </React.Fragment>
            ))}
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "32px 36px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            {/* Step 0: Personal Info */}
            {step === 0 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Staff Personal Information</h3>
                <FormRow>
                  <FormField label="First Name" required half>
                    <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
                  </FormField>
                  <FormField label="Last Name" required half>
                    <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Date of Birth" half>
                    <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
                  </FormField>
                  <FormField label="Role" required half>
                    <select style={fieldStyle} value={form.role} onChange={e => set("role", e.target.value)}>
                      {STAFF_ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
                    </select>
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Email" half>
                    <input style={fieldStyle} type="email" value={form.email} onChange={e => set("email", e.target.value)} placeholder="email@hopehavenservices.org" />
                  </FormField>
                  <FormField label="Phone" half>
                    <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
                  </FormField>
                </FormRow>
                <FormField label="Hire Date" required>
                  <input style={fieldStyle} type="date" value={form.hire_date} onChange={e => set("hire_date", e.target.value)} />
                </FormField>
                <FormField label="Address">
                  <input style={fieldStyle} value={form.address} onChange={e => set("address", e.target.value)} placeholder="Street address" />
                </FormField>
                <FormRow>
                  <FormField label="City" half>
                    <input style={fieldStyle} value={form.city} onChange={e => set("city", e.target.value)} placeholder="City" />
                  </FormField>
                  <FormField label="State" half>
                    <input style={fieldStyle} value={form.state} onChange={e => set("state", e.target.value)} placeholder="UT" />
                  </FormField>
                </FormRow>
                <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 14 }}>Emergency Contact</div>
                </div>
                <FormRow>
                  <FormField label="Contact Name" half>
                    <input style={fieldStyle} value={form.emergency_name} onChange={e => set("emergency_name", e.target.value)} placeholder="Name" />
                  </FormField>
                  <FormField label="Relationship" half>
                    <input style={fieldStyle} value={form.emergency_relation} onChange={e => set("emergency_relation", e.target.value)} placeholder="Spouse, Parent, etc." />
                  </FormField>
                </FormRow>
                <FormField label="Emergency Phone">
                  <input style={fieldStyle} type="tel" value={form.emergency_phone} onChange={e => set("emergency_phone", e.target.value)} placeholder="(801) 555-0000" />
                </FormField>
              </>
            )}

            {/* Step 1: Section B — Hire Paperwork */}
            {step === 1 && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy }}>Section B — Hire Paperwork</h3>
                  <span style={{
                    fontSize: 12, fontWeight: 700, padding: "4px 10px", borderRadius: 6,
                    background: bCollected === bRequired.length ? `${CB.green}12` : `${CB.amber}12`,
                    color: bCollected === bRequired.length ? CB.green : CB.amber,
                  }}>{bCollected}/{bRequired.length} collected</span>
                </div>
                <div style={{ padding: "10px 14px", borderRadius: 10, background: `${CB.navy}06`, border: `1px solid ${CB.navy}10`, marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: CB.textMid }}>Check each item as it's received. Required items are marked. Files can be uploaded later from the staff record.</div>
                </div>
                <div style={{ display: "grid", gap: 6 }}>
                  <CheckItem label="Employment Application" field="b_application" required />
                  <CheckItem label="Resume" field="b_resume" required />
                  <CheckItem label="DHHS Code of Conduct (signed)" field="b_code_of_conduct" required />
                  <CheckItem label="Medicaid Exclusion Verification (OIG/SAM)" field="b_medicaid_exclusion" required />
                  <CheckItem label="Background Check (BCI)" field="b_background_check" required />
                  <CheckItem label="I-9 Employment Eligibility" field="b_i9" required />
                  <CheckItem label="W-4 Tax Withholding" field="b_w4" required />
                  <CheckItem label="Direct Deposit Authorization" field="b_direct_deposit" required />
                  <CheckItem label="Emergency Contact Info" field="b_emergency_contact" required />
                  <CheckItem label="Driver's License Copy" field="b_drivers_license" required />
                  <CheckItem label="Auto Insurance Verification (if transporting)" field="b_auto_insurance" />
                </div>
              </>
            )}

            {/* Step 2: Section A Credentials + Section C Training */}
            {step === 2 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Credentials & Training Setup</h3>

                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                    <Badge text="Section A" color={CB.blue} /> Credentials on File
                  </div>
                  <div style={{ display: "grid", gap: 6 }}>
                    <CheckItem label="Educational Transcripts" field="a_transcripts" />
                    <CheckItem label="Degrees / Diplomas" field="a_degrees" />
                    <CheckItem label="Professional License (if applicable)" field="a_professional_license" />
                  </div>
                </div>

                <div style={{ paddingTop: 16, borderTop: `1px solid ${CB.border}` }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                    <Badge text="Section C" color={CB.teal} /> Training Setup
                  </div>
                  <div style={{ padding: "10px 14px", borderRadius: 10, background: `${CB.teal}06`, border: `1px solid ${CB.teal}15`, marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: CB.textMid }}>
                      New hires must complete 24 training topics. 30-day topics start from hire date ({form.hire_date ? new Date(form.hire_date + "T00:00:00").toLocaleDateString() : "—"}). Log completions in the Training Tracker as they happen.
                    </div>
                  </div>
                  <div style={{ display: "grid", gap: 6 }}>
                    <CheckItem label="General Training Log (24 topics) — started" field="c_training_log_started" required />
                    <CheckItem label="Emergency Management Plan Training — completed" field="c_emergency_plan_training" required />
                    <CheckItem label="Person-Specific Training — assigned" field="c_person_specific_training" required />
                  </div>
                </div>
              </>
            )}

            {/* Step 3: Section D — Certifications */}
            {step === 3 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Section D — Certifications</h3>
                <div style={{ padding: "10px 14px", borderRadius: 10, background: `${CB.red}06`, border: `1px solid ${CB.red}15`, marginBottom: 20 }}>
                  <div style={{ fontSize: 12, color: CB.textMid }}>
                    All direct care staff must have current First Aid and CPR certification. Enter initial cert dates — renewal tracking will auto-calculate.
                  </div>
                </div>

                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                    {icons.shield({ size: 16, color: CB.red })} First Aid
                  </div>
                  <FormRow>
                    <FormField label="Initial Cert Date" half>
                      <input style={fieldStyle} type="date" value={form.d_first_aid_date} onChange={e => set("d_first_aid_date", e.target.value)} />
                    </FormField>
                    <FormField label="Certifying Provider" half>
                      <input style={fieldStyle} value={form.d_first_aid_provider} onChange={e => set("d_first_aid_provider", e.target.value)} placeholder="e.g. American Red Cross" />
                    </FormField>
                  </FormRow>
                </div>

                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                    {icons.heart({ size: 16, color: CB.red })} CPR
                  </div>
                  <FormRow>
                    <FormField label="Initial Cert Date" half>
                      <input style={fieldStyle} type="date" value={form.d_cpr_date} onChange={e => set("d_cpr_date", e.target.value)} />
                    </FormField>
                    <FormField label="Certifying Provider" half>
                      <input style={fieldStyle} value={form.d_cpr_provider} onChange={e => set("d_cpr_provider", e.target.value)} placeholder="e.g. American Heart Association" />
                    </FormField>
                  </FormRow>
                </div>
              </>
            )}

            {/* Step 4: Review & Submit */}
            {step === 4 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Review & Submit</h3>
                <RGrid cols={2} gap={16}>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Staff Info</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{form.first_name} {form.last_name}</div>
                    <div style={{ fontSize: 13, color: CB.textMid, marginTop: 4 }}>{STAFF_ROLES.find(r => r.value === form.role)?.label || form.role}</div>
                    {form.date_of_birth && <div style={{ fontSize: 13, color: CB.textMid }}>DOB: {new Date(form.date_of_birth + "T00:00:00").toLocaleDateString()}</div>}
                    {form.email && <div style={{ fontSize: 13, color: CB.textMid }}>{form.email}</div>}
                    {form.phone && <div style={{ fontSize: 13, color: CB.textMid }}>{form.phone}</div>}
                    {form.hire_date && <div style={{ fontSize: 13, color: CB.teal, fontWeight: 600, marginTop: 4 }}>Hire: {new Date(form.hire_date + "T00:00:00").toLocaleDateString()}</div>}
                  </div>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Section B — Hire Paperwork</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: bCollected === bRequired.length ? CB.green : CB.amber }}>{bCollected}/{bRequired.length}</div>
                    <div style={{ fontSize: 12, color: CB.textMid, marginTop: 2 }}>required items collected</div>
                    {bCollected < bRequired.length && (
                      <div style={{ fontSize: 11, color: CB.amber, marginTop: 8, fontWeight: 600 }}>
                        {icons.alertTriangle({ size: 11, color: CB.amber })} Missing: {bRequired.filter(f => !form[f]).map(f => {
                          const labels = { b_application: "Application", b_resume: "Resume", b_code_of_conduct: "Code of Conduct", b_medicaid_exclusion: "Medicaid Exclusion", b_background_check: "Background Check", b_i9: "I-9", b_w4: "W-4", b_direct_deposit: "Direct Deposit", b_emergency_contact: "Emergency Contact", b_drivers_license: "Driver's License" };
                          return labels[f] || f;
                        }).join(", ")}
                      </div>
                    )}
                  </div>
                </RGrid>
                <RGrid cols={2} gap={16} style={{ marginTop: 16 }}>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Credentials & Training</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {form.a_transcripts && <Badge text="Transcripts ✓" color={CB.green} />}
                      {form.a_degrees && <Badge text="Degrees ✓" color={CB.green} />}
                      {form.a_professional_license && <Badge text="License ✓" color={CB.green} />}
                      {form.c_training_log_started && <Badge text="Training Log ✓" color={CB.teal} />}
                      {form.c_emergency_plan_training && <Badge text="EMBC Training ✓" color={CB.teal} />}
                      {form.c_person_specific_training && <Badge text="Person Training ✓" color={CB.teal} />}
                      {!form.a_transcripts && !form.a_degrees && !form.c_training_log_started && <span style={{ fontSize: 13, color: CB.textLight }}>None collected yet</span>}
                    </div>
                  </div>
                  <div style={{ padding: 16, background: CB.cream, borderRadius: 12, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 10 }}>Section D — Certifications</div>
                    <div style={{ display: "grid", gap: 6 }}>
                      <div style={{ fontSize: 13, color: form.d_first_aid_date ? CB.text : CB.textLight }}>
                        <span style={{ fontWeight: 600 }}>First Aid:</span> {form.d_first_aid_date ? `${new Date(form.d_first_aid_date + "T00:00:00").toLocaleDateString()}${form.d_first_aid_provider ? ` (${form.d_first_aid_provider})` : ""}` : "Not entered"}
                      </div>
                      <div style={{ fontSize: 13, color: form.d_cpr_date ? CB.text : CB.textLight }}>
                        <span style={{ fontWeight: 600 }}>CPR:</span> {form.d_cpr_date ? `${new Date(form.d_cpr_date + "T00:00:00").toLocaleDateString()}${form.d_cpr_provider ? ` (${form.d_cpr_provider})` : ""}` : "Not entered"}
                      </div>
                    </div>
                  </div>
                </RGrid>
              </>
            )}

            {/* Navigation */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28, paddingTop: 20, borderTop: `1px solid ${CB.border}` }}>
              {step > 0 ? (
                <SecondaryButton onClick={() => setStep(step - 1)}>{icons.arrowRight({ size: 15, style: { transform: "rotate(180deg)" } })} Back</SecondaryButton>
              ) : <div />}
              {step < 4 ? (
                <PrimaryButton onClick={() => setStep(step + 1)}>Next {icons.arrowRight({ size: 15 })}</PrimaryButton>
              ) : (
                <PrimaryButton onClick={handleSubmit} loading={saving} color={CB.green}>{icons.checkCircle({ size: 16 })} Create Staff Member</PrimaryButton>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INTAKE PAGE — tabbed wrapper for Client + Staff intake
    // ═══════════════════════════════════════════════════════════════
    function IntakePage() {
      const [mode, setMode] = useState("client");

      const TabBtn = ({ value, label, icon }) => (
        <button onClick={() => setMode(value)} style={{
          padding: "10px 20px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
          background: mode === value ? CB.navy : "transparent",
          color: mode === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
          display: "flex", alignItems: "center", gap: 8,
        }}>{icon({ size: 16, color: mode === value ? CB.white : CB.textMid })} {label}</button>
      );

      return (
        <div>
          <PageHeader title="Intake & Onboarding" subtitle="Guided wizards for new client admissions and staff onboarding" />
          <div style={{ display: "flex", gap: 4, marginBottom: 24, background: CB.cream, padding: 4, borderRadius: 12, width: "fit-content" }}>
            <TabBtn value="client" label="Client Intake" icon={icons.heart} />
            <TabBtn value="staff" label="Staff Onboarding" icon={icons.users} />
          </div>
          {mode === "client" ? <ClientIntakeWizard /> : <StaffOnboardingWizard />}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // HIPAA-COMPLIANT MESSAGING — internal staff-to-staff messaging
    // ═══════════════════════════════════════════════════════════════
    function MessagingPage() {
      const { orgId, staffProfile } = useAuth();
      const { addToast } = useToast();
      const [tab, setTab] = useState("inbox"); // inbox | sent | compose
      const [messages, setMessages] = useState([]);
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedMsg, setSelectedMsg] = useState(null);
      const [showCompose, setShowCompose] = useState(false);
      const [replyTo, setReplyTo] = useState(null);
      const [searchQ, setSearchQ] = useState("");
      const [compose, setCompose] = useState({ recipient_staff_id: "", subject: "", body: "", is_urgent: false });
      const [thread, setThread] = useState([]);

      const myStaffId = staffProfile?.id;

      const fetchMessages = useCallback(async () => {
        if (!orgId || !myStaffId) return;
        setLoading(true);
        let query;
        if (tab === "inbox") {
          query = supabase.from("messages").select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId).eq("recipient_staff_id", myStaffId).order("sent_at", { ascending: false });
        } else {
          query = supabase.from("messages").select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId).eq("sender_staff_id", myStaffId).order("sent_at", { ascending: false });
        }
        const { data, error } = await query;
        if (error) addToast(error.message, "error");
        else setMessages(data || []);
        setLoading(false);
      }, [orgId, myStaffId, tab]);

      const fetchStaff = useCallback(async () => {
        if (!orgId) return;
        const { data } = await supabase.from("staff").select("id, first_name, last_name, role, is_active").eq("org_id", orgId).eq("is_active", true).order("last_name");
        setStaff((data || []).filter(s => s.id !== myStaffId));
      }, [orgId, myStaffId]);

      useEffect(() => { fetchMessages(); }, [fetchMessages]);
      useEffect(() => { fetchStaff(); }, [fetchStaff]);

      const markAsRead = async (msg) => {
        if (msg.read_at || msg.sender_staff_id === myStaffId) return;
        await supabase.from("messages").update({ read_at: new Date().toISOString() }).eq("id", msg.id);
        setMessages(prev => prev.map(m => m.id === msg.id ? { ...m, read_at: new Date().toISOString() } : m));
      };

      const openMessage = (msg) => {
        setSelectedMsg(msg);
        markAsRead(msg);
      };

      const handleSend = async () => {
        if (!compose.recipient_staff_id) return addToast("Select a recipient", "error");
        if (!compose.body.trim()) return addToast("Message body is required", "error");
        const payload = {
          org_id: orgId,
          sender_staff_id: myStaffId,
          recipient_staff_id: compose.recipient_staff_id,
          subject: compose.subject || "(No subject)",
          body: compose.body,
          is_urgent: compose.is_urgent,
          thread_id: replyTo?.thread_id || replyTo?.id || null,
        };
        const { error } = await supabase.from("messages").insert(payload);
        if (error) return addToast(error.message, "error");
        addToast("Message sent", "success");
        setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false });
        setShowCompose(false);
        setReplyTo(null);
        fetchMessages();
      };

      const handleReply = (msg) => {
        const other = msg.sender_staff_id === myStaffId ? msg.recipient : msg.sender;
        setReplyTo(msg);
        setCompose({
          recipient_staff_id: other?.id || "",
          subject: msg.subject?.startsWith("Re: ") ? msg.subject : `Re: ${msg.subject || ""}`,
          body: "",
          is_urgent: false,
        });
        setSelectedMsg(null);
        setShowCompose(true);
      };

      const unreadCount = useMemo(() => messages.filter(m => !m.read_at && tab === "inbox").length, [messages, tab]);

      const staffName = (s) => s ? `${s.first_name || ""} ${s.last_name || ""}`.trim() : "Unknown";
      const staffRoleLabel = (s) => s ? (STAFF_ROLES.find(r => r.value === s.role)?.label || s.role?.replace(/_/g, " ") || "") : "";

      const filtered = useMemo(() => {
        if (!searchQ.trim()) return messages;
        const q = searchQ.toLowerCase();
        return messages.filter(m =>
          (m.subject || "").toLowerCase().includes(q) ||
          (m.body || "").toLowerCase().includes(q) ||
          staffName(m.sender).toLowerCase().includes(q) ||
          staffName(m.recipient).toLowerCase().includes(q)
        );
      }, [messages, searchQ]);

      const formatTime = (iso) => {
        if (!iso) return "";
        const d = new Date(iso);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return "Just now";
        if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
        if (diff < 86400000) return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
        if (diff < 604800000) return d.toLocaleDateString([], { weekday: "short" });
        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      };

      const TabBtn = ({ value, label, count }) => (
        <button onClick={() => { setTab(value); setSelectedMsg(null); }} style={{
          padding: "10px 20px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
          display: "flex", alignItems: "center", gap: 8, position: "relative",
        }}>
          {label}
          {count > 0 && (
            <span style={{ background: CB.red, color: CB.white, fontSize: 11, fontWeight: 800, padding: "2px 7px", borderRadius: 10, minWidth: 20, textAlign: "center" }}>{count}</span>
          )}
        </button>
      );

      // Load thread when a message is selected
      useEffect(() => {
        if (!selectedMsg || !orgId) { setThread([]); return; }
        const loadThread = async () => {
          const threadId = selectedMsg.thread_id || selectedMsg.id;
          const { data } = await supabase.from("messages")
            .select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId)
            .or(`id.eq.${threadId},thread_id.eq.${threadId}`)
            .order("sent_at", { ascending: true });
          setThread(data || []);
        };
        loadThread();
      }, [selectedMsg?.id, orgId]);

      // ── Detail view ──
      if (selectedMsg) {
        const msg = selectedMsg;
        const isInbound = msg.recipient_staff_id === myStaffId;

        return (
          <div>
            <PageHeader title="Messages" subtitle="HIPAA-compliant internal messaging" action={
              <button onClick={() => { setShowCompose(true); setReplyTo(null); setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false }); }}
                style={{ padding: "10px 20px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
                {icons.edit({ size: 16, color: CB.white })} Compose
              </button>
            } />
            <button onClick={() => setSelectedMsg(null)} style={{
              padding: "8px 16px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 8,
              fontSize: 13, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit", marginBottom: 16,
              display: "flex", alignItems: "center", gap: 6,
            }}>← Back</button>
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {/* Header */}
              <div style={{ padding: "20px 24px", borderBottom: `1px solid ${CB.border}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                    {msg.is_urgent && <span style={{ background: "#FEF2F2", color: CB.red, fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 6 }}>URGENT</span>}
                    <h3 style={{ fontSize: 18, fontWeight: 800, color: CB.navy }}>{msg.subject || "(No subject)"}</h3>
                  </div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>
                    {isInbound ? `From: ${staffName(msg.sender)}` : `To: ${staffName(msg.recipient)}`}
                    <span style={{ margin: "0 8px", color: CB.border }}>•</span>
                    {staffRoleLabel(isInbound ? msg.sender : msg.recipient)}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 12, color: CB.textLight }}>{new Date(msg.sent_at).toLocaleString()}</div>
                  {msg.read_at && <div style={{ fontSize: 11, color: CB.green, marginTop: 2 }}>✓ Read {formatTime(msg.read_at)}</div>}
                </div>
              </div>
              {/* Thread */}
              <div style={{ maxHeight: 500, overflowY: "auto" }}>
                {(thread.length > 1 ? thread : [msg]).map((m, i) => (
                  <div key={m.id} style={{ padding: "16px 24px", borderBottom: i < (thread.length > 1 ? thread.length : 1) - 1 ? `1px solid ${CB.border}` : "none",
                    background: m.id === msg.id ? "#F0FDFA" : "transparent" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: m.sender_staff_id === myStaffId ? CB.teal : CB.navy }}>
                        {m.sender_staff_id === myStaffId ? "You" : staffName(m.sender)}
                      </span>
                      <span style={{ fontSize: 12, color: CB.textLight }}>{formatTime(m.sent_at)}</span>
                    </div>
                    <div style={{ fontSize: 14, color: CB.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{m.body}</div>
                  </div>
                ))}
              </div>
              {/* Reply bar */}
              <div style={{ padding: "16px 24px", borderTop: `1px solid ${CB.border}`, background: CB.cream }}>
                <button onClick={() => handleReply(msg)} style={{
                  padding: "10px 20px", background: CB.navy, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8,
                }}>
                  {icons.arrowRight({ size: 15, color: CB.white })} Reply
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <PageHeader title="Messages" subtitle="HIPAA-compliant internal messaging" action={
            <button onClick={() => { setShowCompose(true); setReplyTo(null); setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false }); }}
              style={{ padding: "10px 20px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
              {icons.edit({ size: 16, color: CB.white })} Compose
            </button>
          } />

          {/* HIPAA Notice */}
          <div style={{
            padding: "12px 18px", borderRadius: 10, background: "#FFFBEB", border: "1px solid #FDE68A",
            marginBottom: 20, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "#92400E",
          }}>
            {icons.lock({ size: 16, color: "#92400E" })}
            <span><strong>HIPAA Notice:</strong> Messages are encrypted and stored within your organization. Do not include PHI in subject lines. All messages are logged for compliance auditing.</span>
          </div>

          {/* Tabs + Search */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", gap: 4, background: CB.cream, padding: 4, borderRadius: 12 }}>
              <TabBtn value="inbox" label="Inbox" count={tab === "inbox" ? unreadCount : 0} />
              <TabBtn value="sent" label="Sent" />
            </div>
            <div style={{ position: "relative" }}>
              {icons.search({ size: 16, color: CB.textLight, style: { position: "absolute", left: 12, top: 11 } })}
              <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search messages..."

          <Modal open={showCompose} onClose={() => { setShowCompose(false); setReplyTo(null); }} title={replyTo ? "Reply" : "New Message"} subtitle="Messages are encrypted and audit-logged" width={600}>

                <input value={compose.subject} onChange={e => setCompose(p => ({ ...p, subject: e.target.value }))} placeholder="Brief subject (no PHI)" style={fieldStyle} />
                <div style={{ fontSize: 11, color: "#92400E", marginTop: 4 }}>⚠ Do not include client names or protected health information in the subject line.</div>

              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 6, display: "block" }}>Message</label>

                  placeholder="Type your message..." style={{ ...fieldStyle, resize: "vertical", minHeight: 140 }} />

              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                <input type="checkbox" checked={compose.is_urgent} onChange={e => setCompose(p => ({ ...p, is_urgent: e.target.checked }))}
                  style={{ width: 18, height: 18, accentColor: CB.red }} />

              {replyTo && (
                <div style={{ padding: "12px 16px", background: CB.cream, borderRadius: 10, borderLeft: `3px solid ${CB.teal}` }}>
                  <div style={{ fontSize: 12, color: CB.textMid, marginBottom: 4 }}>Replying to {staffName(replyTo.sender_staff_id === myStaffId ? replyTo.recipient : replyTo.sender)} — {formatTime(replyTo.sent_at)}</div>
                  <div style={{ fontSize: 13, color: CB.textMid, fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{(replyTo.body || "").substring(0, 150)}</div>

              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                <button onClick={() => { setShowCompose(false); setReplyTo(null); }} style={{
                  padding: "10px 20px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10,
                  fontSize: 14, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                }}>Cancel</button>
                <button onClick={handleSend} style={{
                  padding: "10px 24px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8,
                }}>{icons.arrowRight({ size: 15, color: CB.white })} Send</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // UNIVERSAL PROVIDER DATA MIGRATION TOOL

    const IMPORT_TYPES = {
      staff: {
        label: "Staff / Employees",
        table: "staff",
        icon: icons.users,
        fields: [
          { key: "first_name", label: "First Name", required: true },
          { key: "last_name", label: "Last Name", required: true },

          { key: "phone", label: "Phone" },
          { key: "role", label: "Role", note: "dsp, rn, bcba, house_manager, etc." },
          { key: "hire_date", label: "Hire Date" },
          { key: "date_of_birth", label: "Date of Birth" },
          { key: "is_active", label: "Active Status", note: "true/false, yes/no, active/inactive" },
        ],
      },
      clients: {
        label: "Clients / Individuals",
        table: "persons",
        icon: icons.heart,
        fields: [
          { key: "first_name", label: "First Name", required: true },
          { key: "last_name", label: "Last Name", required: true },
          { key: "date_of_birth", label: "Date of Birth" },
          { key: "medicaid_number", label: "Medicaid Number" },
          { key: "pid", label: "PID / Person ID" },
          { key: "gender", label: "Gender" },
          { key: "phone", label: "Phone" },
          { key: "address", label: "Address" },
          { key: "city", label: "City" },
          { key: "state", label: "State" },
          { key: "zip", label: "ZIP" },
          { key: "is_active", label: "Active Status" },
        ],
      },
      trainings: {
        label: "Training Records",
        table: "staff_trainings",
        icon: icons.book,
        fields: [
          { key: "staff_email", label: "Staff Email", required: true, note: "Used to match existing staff" },
          { key: "topic_name", label: "Training Topic", required: true },
