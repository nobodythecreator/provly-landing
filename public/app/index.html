      // ── Progress Note Form ──
      const NoteForm = ({ goalId }) => {
        const goal = goals.find(g => g.id === goalId);
        const [form, setForm] = useState({
          note_date: new Date().toISOString().split("T")[0],
          progress_rating: 3, narrative: "", data_point: "",
        });
        const [saving, setSaving] = useState(false);
        const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };

        const handleSave = async () => {
          if (!form.narrative) return addToast("Narrative required", "error");
          setSaving(true);
          const { error } = await supabase.from("pcsp_progress_notes").insert({
            org_id: orgId, goal_id: goalId, person_id: selectedClient,
            staff_id: staffProfile?.id || null, note_date: form.note_date,
            progress_rating: form.progress_rating, narrative: form.narrative,
            data_point: form.data_point || null,
          });
          if (error) { addToast(error.message, "error"); setSaving(false); return; }
          addToast("Progress note saved", "success");
          setSaving(false); setShowNoteForm(null); loadGoalData();
        };

        return (
          <Modal open={true} onClose={() => setShowNoteForm(null)} title="Log Progress" subtitle={goal?.goal_description?.substring(0, 60) + "..."} width={480}>
            <div style={{ padding: "20px 28px 24px" }}>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Date</label>
                <input style={fs} type="date" value={form.note_date} onChange={e => setForm(f => ({ ...f, note_date: e.target.value }))} />
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 8 }}>Progress Rating</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {PROGRESS_RATINGS.map(r => (
                    <button key={r.value} onClick={() => setForm(f => ({ ...f, progress_rating: r.value }))} style={{
                      flex: 1, padding: "10px 4px", borderRadius: 10, fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                      border: `1.5px solid ${form.progress_rating === r.value ? r.color : CB.border}`,
                      background: form.progress_rating === r.value ? `${r.color}14` : CB.white,
                      color: form.progress_rating === r.value ? r.color : CB.textMid, cursor: "pointer",
                      textAlign: "center", lineHeight: 1.2,
                    }}>
                      <div style={{ fontSize: 18, marginBottom: 2 }}>{r.value}</div>
                      {r.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Narrative *</label>
                <textarea style={{ ...fs, minHeight: 80 }} value={form.narrative} onChange={e => setForm(f => ({ ...f, narrative: e.target.value }))} placeholder="Describe progress observed, interventions used, and individual's response..." />
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Data Point (optional)</label>
                <input style={fs} value={form.data_point} onChange={e => setForm(f => ({ ...f, data_point: e.target.value }))} placeholder="e.g. 4/5 trials, 80%, 3 out of 5 days" />
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => setShowNoteForm(null)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Saving..." : "Save Note"}
                </button>
              </div>
            </div>
          </Modal>
        );
      };

      // ── AI Quarterly Summary Generator ──
      const generateSummary = () => {
        setGeneratingSummary(true);
        const clientObj = clients.find(c => c.id === selectedClient);
        const clientName = clientObj ? `${clientObj.first_name} ${clientObj.last_name}` : "Individual";
        const now = new Date();
        const threeMonthsAgo = new Date(now); threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
        const quarterStart = threeMonthsAgo.toLocaleDateString();
        const quarterEnd = now.toLocaleDateString();

        let summary = `QUARTERLY PCSP PROGRESS SUMMARY\n`;
        summary += `Individual: ${clientName}\n`;
        summary += `Reporting Period: ${quarterStart} – ${quarterEnd}\n`;
        summary += `Generated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}\n`;
        summary += `${"═".repeat(50)}\n\n`;

        const activeGoals = goals.filter(g => g.status !== "discontinued");

        if (activeGoals.length === 0) {
          summary += "No active goals found for this individual.\n";
        }

        activeGoals.forEach((goal, gi) => {
          const statusDef = GOAL_STATUSES.find(s => s.value === goal.status);
          const goalNotes = progressNotes
            .filter(n => n.goal_id === goal.id && new Date(n.note_date) >= threeMonthsAgo)
            .sort((a, b) => new Date(a.note_date) - new Date(b.note_date));

          summary += `GOAL ${gi + 1}: ${goal.domain}\n`;
          summary += `Status: ${statusDef?.label || goal.status}\n`;
          summary += `Description: ${goal.goal_description}\n`;
          if (goal.objectives) summary += `Objectives: ${goal.objectives}\n`;
          if (goal.baseline) summary += `Baseline: ${goal.baseline}\n`;
          if (goal.target_criteria) summary += `Target: ${goal.target_criteria}\n`;
          summary += `\n`;

          if (goalNotes.length > 0) {
            const avgRating = (goalNotes.reduce((s, n) => s + (n.progress_rating || 0), 0) / goalNotes.length).toFixed(1);
            const firstRating = goalNotes[0].progress_rating || 0;
            const lastRating = goalNotes[goalNotes.length - 1].progress_rating || 0;
            const trend = lastRating > firstRating ? "IMPROVING" : lastRating < firstRating ? "DECLINING" : "STABLE";

            summary += `  Progress Notes: ${goalNotes.length} entries this quarter\n`;
            summary += `  Average Rating: ${avgRating}/5 | Trend: ${trend}\n`;
            summary += `  Rating Range: ${firstRating}/5 → ${lastRating}/5\n`;

            const dataPoints = goalNotes.filter(n => n.data_point);
            if (dataPoints.length > 0) {
              summary += `  Data Points: ${dataPoints.map(d => `${d.note_date}: ${d.data_point}`).join("; ")}\n`;
            }

            summary += `\n  Recent Notes:\n`;
            goalNotes.slice(-3).forEach(n => {
              const ratingDef = PROGRESS_RATINGS.find(r => r.value === n.progress_rating);
              summary += `    ${n.note_date} [${ratingDef?.label || n.progress_rating}]: ${n.narrative}\n`;
            });
          } else {
            summary += `  ⚠ No progress notes recorded this quarter.\n`;
          }
          summary += `\n${"─".repeat(50)}\n\n`;
        });

        // Overall statistics
        const allQuarterNotes = progressNotes.filter(n => new Date(n.note_date) >= threeMonthsAgo);
        const met = goals.filter(g => g.status === "met").length;
        const partial = goals.filter(g => g.status === "partially_met").length;
        const active = goals.filter(g => g.status === "active" || g.status === "in_progress").length;

        summary += `OVERALL SUMMARY\n`;
        summary += `Total Goals: ${activeGoals.length} | Met: ${met} | Partially Met: ${partial} | Active: ${active}\n`;
        summary += `Total Progress Notes This Quarter: ${allQuarterNotes.length}\n`;
        if (allQuarterNotes.length > 0) {
          const overallAvg = (allQuarterNotes.reduce((s, n) => s + (n.progress_rating || 0), 0) / allQuarterNotes.length).toFixed(1);
          summary += `Overall Average Progress Rating: ${overallAvg}/5\n`;
        }
        summary += `\nRecommendations:\n`;
        const noNotes = activeGoals.filter(g => !progressNotes.some(n => n.goal_id === g.id && new Date(n.note_date) >= threeMonthsAgo));
        if (noNotes.length > 0) {
          summary += `  • ${noNotes.length} goal(s) have no progress documentation this quarter — needs attention.\n`;
        }
        const declining = activeGoals.filter(g => {
          const gn = progressNotes.filter(n => n.goal_id === g.id && new Date(n.note_date) >= threeMonthsAgo).sort((a, b) => new Date(a.note_date) - new Date(b.note_date));
          return gn.length >= 2 && gn[gn.length-1].progress_rating < gn[0].progress_rating;
        });
        if (declining.length > 0) {
          summary += `  • ${declining.length} goal(s) showing declining progress — consider strategy review.\n`;
        }
        if (met > 0) {
          summary += `  • ${met} goal(s) met — consider adding new goals or increasing criteria.\n`;
        }

        setSummaryText(summary);
        setGeneratingSummary(false);
        setShowSummary(true);
      };

      // ── PDF Export ──
      const exportPDF = () => {
        if (!summaryText) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const lines = doc.splitTextToSize(summaryText, 170);
        let y = 20;
        doc.setFontSize(10);
        lines.forEach(line => {
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(line, 20, y);
          y += 5;
        });
        const clientObj = clients.find(c => c.id === selectedClient);
        const name = clientObj ? `${clientObj.first_name}_${clientObj.last_name}` : "client";
        doc.save(`PCSP_Quarterly_${name}_${new Date().toISOString().split("T")[0]}.pdf`);
        addToast("PDF exported", "success");

      const clientObj = clients.find(c => c.id === selectedClient);
      const activeGoals = goals.filter(g => g.status !== "discontinued");

      return (
        <div>
          <PageHeader title="PCSP Goal Tracking" subtitle={clientObj ? `${clientObj.first_name} ${clientObj.last_name} — ISP Goals & Progress` : "Select a client"}
            action={
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={generateSummary} disabled={!selectedClient || generatingSummary} style={{
                  display: "flex", alignItems: "center", gap: 8, padding: "10px 18px", borderRadius: 10,
                  border: `1px solid ${CB.navy}`, background: `${CB.navy}08`, color: CB.navy,
                  fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  opacity: !selectedClient ? 0.5 : 1,
                }}>{icons.zap({ size: 15 })} Quarterly Summary</button>
                <button onClick={() => { setEditingGoal(null); setShowGoalForm(true); }} disabled={!selectedClient} style={{
                  display: "flex", alignItems: "center", gap: 8, padding: "10px 18px", borderRadius: 10,
                  border: "none", background: CB.teal, color: CB.white,
                  fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  opacity: !selectedClient ? 0.5 : 1,
                }}>{icons.plus({ size: 15 })} Add Goal</button>
              </div>
            }
          />
          {/* Client Selector */}
          <div style={{ marginBottom: 20 }}>
            <select value={selectedClient} onChange={e => setSelectedClient(e.target.value)} style={{
              padding: "10px 16px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit",
              background: CB.white, minWidth: 220,
            }}>
              <option value="">Select client...</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.last_name}, {c.first_name}</option>)}

          </div>

          {!selectedClient ? (
            <div style={{ textAlign: "center", padding: 48, color: CB.textMid }}>
              <p style={{ fontSize: 15, fontWeight: 600 }}>Select a client to manage PCSP goals</p>
            </div>
          ) : loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <>
              {/* Stats Row */}
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: isMobile ? 10 : 14, marginBottom: 20 }}>
                {[
                  { label: "Active Goals", value: goals.filter(g => g.status === "active" || g.status === "in_progress").length, color: CB.blue },
                  { label: "Goals Met", value: goals.filter(g => g.status === "met").length, color: CB.green },
                  { label: "Progress Notes", value: progressNotes.length, color: CB.teal },
                  { label: "Avg Rating", value: progressNotes.length > 0 ? (progressNotes.reduce((s,n) => s + (n.progress_rating||0), 0) / progressNotes.length).toFixed(1) : "—", color: CB.navy },
                ].map((s, i) => (
                  <div key={i} style={{
                    background: CB.white, borderRadius: 14, padding: isMobile ? "14px 12px" : "16px 20px",
                    border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, textAlign: "center",
                    animation: `fadeIn 0.4s ease ${i * 0.05}s both`,

                    <div style={{ fontSize: 26, fontWeight: 800, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Goals List */}
              {activeGoals.length === 0 ? (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 48, textAlign: "center",
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                }}>
                  <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.teal}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
                    {icons.crosshair({ size: 28, color: CB.teal })}
                  </div>
                  <p style={{ fontSize: 15, fontWeight: 600, color: CB.navy }}>No goals yet</p>
                  <p style={{ fontSize: 13, color: CB.textMid }}>Add ISP goals to start tracking progress.</p>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {activeGoals.map((goal, gi) => {
                    const statusDef = GOAL_STATUSES.find(s => s.value === goal.status);
                    const goalNotes = progressNotes.filter(n => n.goal_id === goal.id).slice(0, 5);
                    const isExpanded = expandedGoal === goal.id;
                    const avgRating = goalNotes.length > 0 ? (goalNotes.reduce((s,n) => s + (n.progress_rating||0), 0) / goalNotes.length).toFixed(1) : null;

                    return (
                      <div key={goal.id} style={{
                        background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`,
                        boxShadow: CB.cardShadow, overflow: "hidden",
                        animation: `fadeIn 0.4s ease ${gi * 0.05}s both`,
                      }}>
                        {/* Goal Header */}
                        <div onClick={() => setExpandedGoal(isExpanded ? null : goal.id)} style={{
                          padding: isMobile ? "16px" : "18px 24px", cursor: "pointer",
                          display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12,
                        }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                              <span style={{
                                padding: "3px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700,
                                background: `${CB.navy}10`, color: CB.navy, textTransform: "uppercase", letterSpacing: 0.5,
                              }}>{goal.domain}</span>
                              <span style={{
                                padding: "3px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700,
                                background: `${statusDef?.color || CB.textLight}14`, color: statusDef?.color || CB.textLight,
                              }}>{statusDef?.label || goal.status}</span>
                              {avgRating && (
                                <span style={{ fontSize: 12, color: CB.textMid, fontWeight: 600 }}>
                                  Avg: {avgRating}/5 ({goalNotes.length} notes)
                                </span>
                              )}
                            </div>
                            <p style={{ fontSize: 14, fontWeight: 600, color: CB.text, margin: 0, lineHeight: 1.4 }}>{goal.goal_description}</p>
                            {goal.target_date && (
                              <span style={{ fontSize: 12, color: CB.textLight, marginTop: 4, display: "inline-block" }}>
                                Target: {new Date(goal.target_date + "T00:00:00").toLocaleDateString()}
                              </span>
                            )}
                          </div>
                          <div style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s", flexShrink: 0 }}>
                            {icons.chevDown({ size: 18, color: CB.textLight })}
                          </div>
                        </div>

                        {/* Expanded Detail */}
                        {isExpanded && (
                          <div style={{ borderTop: `1px solid ${CB.border}` }}>
                            {/* Goal Details */}
                            <div style={{ padding: "16px 24px", background: CB.cream, display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12, fontSize: 13 }}>
                              {goal.objectives && <div><strong style={{ color: CB.textMid }}>Objectives:</strong><br/>{goal.objectives}</div>}
                              {goal.baseline && <div><strong style={{ color: CB.textMid }}>Baseline:</strong><br/>{goal.baseline}</div>}
                              {goal.target_criteria && <div><strong style={{ color: CB.textMid }}>Target Criteria:</strong><br/>{goal.target_criteria}</div>}
                              {goal.teaching_strategies && <div><strong style={{ color: CB.textMid }}>Teaching Strategies:</strong><br/>{goal.teaching_strategies}</div>}
                              {goal.support_needed && <div style={{ gridColumn: isMobile ? "1" : "1/3" }}><strong style={{ color: CB.textMid }}>Support Needed:</strong><br/>{goal.support_needed}</div>}
                            </div>

                            {/* Actions */}
                            <div style={{ padding: "12px 24px", display: "flex", gap: 8, borderTop: `1px solid ${CB.border}`, borderBottom: `1px solid ${CB.border}` }}>
                              <button onClick={() => setShowNoteForm(goal.id)} style={{
                                padding: "8px 16px", borderRadius: 8, border: "none", background: CB.teal, color: CB.white,
                                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6,
                              }}>{icons.plus({ size: 13 })} Log Progress</button>
                              <button onClick={() => { setEditingGoal(goal); setShowGoalForm(true); }} style={{
                                padding: "8px 16px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: CB.textMid,
                              }}>Edit Goal</button>
                            </div>

                            {/* Progress Notes Timeline */}
                            <div style={{ padding: "16px 24px" }}>
                              <h4 style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Progress Notes</h4>
                              {goalNotes.length === 0 ? (
                                <p style={{ fontSize: 13, color: CB.textLight, fontStyle: "italic" }}>No progress notes yet. Click "Log Progress" to add one.</p>
                              ) : (
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                  {goalNotes.map((note, ni) => {
                                    const ratingDef = PROGRESS_RATINGS.find(r => r.value === note.progress_rating);
                                    return (
                                      <div key={note.id} style={{
                                        display: "flex", gap: 12, padding: "10px 14px", borderRadius: 10,
                                        background: CB.cream, border: `1px solid ${CB.border}`,
                                      }}>
                                        <div style={{
                                          width: 32, height: 32, borderRadius: 8, flexShrink: 0,
                                          background: `${ratingDef?.color || CB.textLight}18`,
                                          display: "flex", alignItems: "center", justifyContent: "center",
                                          fontSize: 14, fontWeight: 800, color: ratingDef?.color || CB.textLight,
                                        }}>{note.progress_rating}</div>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ fontSize: 12, fontWeight: 600, color: ratingDef?.color || CB.textMid }}>{ratingDef?.label}</span>
                                            <span style={{ fontSize: 11, color: CB.textLight }}>
                                              {new Date(note.note_date + "T00:00:00").toLocaleDateString()}
                                              {note.staff && ` — ${note.staff.first_name} ${note.staff.last_name}`}
                                            </span>
                                          </div>
                                          <p style={{ fontSize: 13, color: CB.text, margin: 0, lineHeight: 1.4 }}>{note.narrative}</p>
                                          {note.data_point && (
                                            <div style={{ fontSize: 12, color: CB.teal, fontWeight: 600, marginTop: 4 }}>📊 {note.data_point}</div>
                                          )}
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {showGoalForm && <GoalForm />}
          {showNoteForm && <NoteForm goalId={showNoteForm} />}

          {/* Summary Modal */}
          {showSummary && (
            <Modal open={true} onClose={() => setShowSummary(false)} title="Quarterly PCSP Summary" width={700}>
              <div style={{ padding: "20px 28px 24px" }}>
                <pre style={{
                  whiteSpace: "pre-wrap", wordWrap: "break-word", fontSize: 12, lineHeight: 1.6,
                  background: CB.cream, padding: 20, borderRadius: 12, border: `1px solid ${CB.border}`,
                  maxHeight: "55vh", overflowY: "auto", fontFamily: "'Courier New', monospace",
                }}>{summaryText}</pre>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
                  <button onClick={() => { navigator.clipboard.writeText(summaryText); addToast("Copied to clipboard", "success"); }} style={{
                    padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                    color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Copy</button>
                  <button onClick={exportPDF} style={{
                    padding: "10px 20px", borderRadius: 10, border: "none", background: CB.navy, color: CB.white,
                    fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Export PDF</button>
                  <button onClick={() => setShowSummary(false)} style={{
                    padding: "10px 20px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white,
                    fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Close</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // BILLING & CLAIMS — real claim engine from service notes
    // ═══════════════════════════════════════════════════════════════
    function BillingPage() {
      const [claims, setClaims] = useState([]);
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(true);
      const [dateRange, setDateRange] = useState(() => {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split("T")[0];
        const end = now.toISOString().split("T")[0];
        return { start, end };
      });
      const perms = usePermissions();

      useEffect(() => { generateClaims(); }, [dateRange.start, dateRange.end]);

      const generateClaims = async () => {
        setLoading(true);
        try {
          // Pull all service notes in range with related data
          let query = supabase.from("service_notes")
            .select("id, service_date, start_time, end_time, duration_minutes, billable_units, status, staff!service_notes_staff_id_fkey(first_name, last_name), persons(id, first_name, last_name, medicaid_number), service_code_definitions(id, code, name)")
            .gte("service_date", dateRange.start)
            .lte("service_date", dateRange.end)
            .order("service_date", { ascending: false });

          const { data: notes } = await query;

          // Pull all auths for rate lookup
          const { data: auths } = await supabase.from("person_service_authorizations")
            .select("id, person_id, service_code_id, authorized_units, used_units, rate_per_unit, service_code_definitions(code)");

          const authMap = {};
          (auths || []).forEach(a => {
            const key = `${a.person_id}_${a.service_code_id}`;
            authMap[key] = a;
          });

          // Build claims from notes
          const claimRows = (notes || []).map(note => {
            const code = note.service_code_definitions?.code;
            const rule = BILLING_RULES[code];
            const authKey = `${note.persons?.id}_${note.service_code_definitions?.id}`;
            const auth = authMap[authKey];
            const authRate = auth?.rate_per_unit ? Number(auth.rate_per_unit) : null;

            let units = note.billable_units || calculateBillableUnits(code, note.duration_minutes);
            let rate = null;
            let amount = null;

            if (rule) {
              if (rule.unit_type === "tiered_daily" && note.duration_minutes) {
                const tier = getTieredRate(code, note.duration_minutes);
                rate = rule.worksheet ? authRate : (tier?.max_rate || null);
              } else {
                rate = rule.worksheet ? authRate : (rule.rate || null);
              }
              if (rate && units) amount = rate * units;
            }

            return {
              id: note.id,
              date: note.service_date,
              staff: note.staff ? `${note.staff.first_name} ${note.staff.last_name}` : "—",
              client: note.persons ? `${note.persons.first_name} ${note.persons.last_name}` : "—",
              medicaid: note.persons?.medicaid_number || "—",
              code,
              codeName: note.service_code_definitions?.name || "",
              units,
              rate,
              amount,
              status: note.status || "draft",
              worksheet: rule?.worksheet || false,
              unitType: rule?.unit_type || "quarter_hour",
              duration: note.duration_minutes,
            };
          });

          // Summary stats
          const totalClaims = claimRows.length;
          const totalAmount = claimRows.reduce((sum, c) => sum + (c.amount || 0), 0);
          const byStatus = { draft: 0, submitted: 0, approved: 0, rejected: 0 };
          claimRows.forEach(c => { byStatus[c.status] = (byStatus[c.status] || 0) + (c.amount || 0); });

          // Group by client for summary
          const byClient = {};
          claimRows.forEach(c => {
            if (!byClient[c.client]) byClient[c.client] = { client: c.client, medicaid: c.medicaid, notes: 0, amount: 0, codes: new Set() };
            byClient[c.client].notes++;
            byClient[c.client].amount += c.amount || 0;
            if (c.code) byClient[c.client].codes.add(c.code);
          });

          setClaims(claimRows);
          setSummary({ totalClaims, totalAmount, byStatus, byClient: Object.values(byClient) });
        } catch (e) { /* billing error */ }
        setLoading(false);
      };

      const exportCSV = () => {
        const headers = ["Date", "Staff", "Client", "Medicaid #", "Code", "Units", "Rate", "Amount", "Status"];
        const rows = claims.map(c => [
          c.date, c.staff, c.client, c.medicaid, c.code,
          c.units || "", c.rate ? c.rate.toFixed(2) : "", c.amount ? c.amount.toFixed(2) : "", c.status
        ]);
        const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `provly-claims-${dateRange.start}-to-${dateRange.end}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const statusColors = { draft: CB.amber, submitted: CB.blue, approved: CB.green, rejected: CB.red };

      const columns = [
        { label: "Date", bold: true, render: (r) => r.date ? new Date(r.date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Client", render: (r) => r.client },
        { label: "Code", render: (r) => (
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <Badge text={r.code || "?"} color={CB.blue} />
            {r.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700 }}>WS</span>}
          </div>
        )},
        { label: "Staff", render: (r) => r.staff },
        { label: "Units", render: (r) => {
          if (!r.units) return "—";
          const rule = BILLING_RULES[r.code];
          return (
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontWeight: 600 }}>{r.units}</span>
              <span style={{ fontSize: 11, color: CB.textLight }}>{rule?.label || "qtr-hr"}</span>

        }},
        ...(perms.viewRates ? [
          { label: "Rate", render: (r) => r.rate ? <span style={{ fontWeight: 600, color: CB.teal }}>${r.rate.toFixed(2)}</span> : <span style={{ color: CB.textLight }}>—</span> },
          { label: "Amount", render: (r) => r.amount ? <span style={{ fontWeight: 700, color: CB.navy }}>${r.amount.toFixed(2)}</span> : <span style={{ color: CB.textLight }}>—</span> },
        ] : []),
        { label: "Status", render: (r) => <Badge text={r.status} color={statusColors[r.status] || CB.textLight} /> },
      ];

      return (
        <div>
          <PageHeader title="Billing & Claims" subtitle="Auto-calculated claims from service notes with DHHS91172 rate table rules"
            action={
              <div style={{ display: "flex", gap: 8 }}>
                <SecondaryButton onClick={exportCSV}>{icons.barChart({ size: 15 })} Export CSV</SecondaryButton>
                <PrimaryButton onClick={generateClaims}>{icons.refresh({ size: 16 })} Recalculate</PrimaryButton>

          />

          {/* Date range filter */}
          <div style={{
            display: "flex", alignItems: "center", gap: 12, marginBottom: 20, padding: "14px 20px",
            background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, boxShadow: "0 1px 3px rgba(10,30,51,0.04)",
          }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>{icons.calendar({ size: 16, color: CB.navy })} Period:</span>
            <input type="date" value={dateRange.start} onChange={e => setDateRange(p => ({ ...p, start: e.target.value }))} style={{ ...fieldStyle, width: 160, padding: "8px 12px", fontSize: 13 }} />
            <span style={{ color: CB.textLight, fontWeight: 600 }}>to</span>
            <input type="date" value={dateRange.end} onChange={e => setDateRange(p => ({ ...p, end: e.target.value }))} style={{ ...fieldStyle, width: 160, padding: "8px 12px", fontSize: 13 }} />
          </div>

          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : summary && (
            <>
              {/* Summary cards */}
              <RGrid cols={4} gap={18} style={{ marginBottom: 28 }}>
                <StatCard label="Total Claims" value={summary.totalClaims} icon={icons.fileText} color={CB.navy} delay={0} />
                {perms.viewRates && (
                  <StatCard label="Total Amount" value={`$${summary.totalAmount.toFixed(2)}`} icon={icons.barChart} color={CB.teal} delay={0.05} />
                )}
                <StatCard label="Approved" value={`$${(summary.byStatus.approved || 0).toFixed(2)}`} icon={icons.checkCircle} color={CB.green} delay={0.1} />
                <StatCard label="Pending" value={`$${((summary.byStatus.draft || 0) + (summary.byStatus.submitted || 0)).toFixed(2)}`} icon={icons.clock} color={CB.amber} delay={0.15} />
              </RGrid>

              {/* Per-client summary */}
              {perms.viewRates && summary.byClient.length > 0 && (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 24, marginBottom: 20,
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.4s ease",
                }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 16 }}>Revenue by Client</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
                    {summary.byClient.sort((a, b) => b.amount - a.amount).map((c, i) => (
                      <div key={i} style={{
                        padding: "14px 16px", borderRadius: 12, background: CB.cream,
                        border: `1px solid ${CB.border}`, animation: `fadeIn 0.3s ease ${i * 0.05}s both`,
                      }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{c.client}</div>
                        <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>{c.notes} notes — {[...c.codes].join(", ")}</div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: CB.teal, marginTop: 8 }}>${c.amount.toFixed(2)}</div>
                      </div>

              )}

              {/* Claims table */}
              <DataTable columns={columns} data={claims} loading={false} emptyMessage="No claims found for this period" />
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // ORG UNITS — recursive tree builder (UPI-compatible structure)
    // ═══════════════════════════════════════════════════════════════
    function OrgUnitsPage() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [units, setUnits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [addingTo, setAddingTo] = useState(null);
      const [newUnit, setNewUnit] = useState({ name: "", unit_type: "group", address: "", city: "" });
      const [editingUnit, setEditingUnit] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => { loadUnits(); }, []);

      const loadUnits = async () => {
        setLoading(true);
        const { data } = await supabase.from("org_units").select("*").order("sort_order").order("name");
        setUnits(data || []);
        setLoading(false);
      };

      const buildTree = (parentId = null, depth = 0) => {
        return units.filter(u => u.parent_id === parentId).map(unit => ({
          ...unit, depth, children: buildTree(unit.id, depth + 1),
        }));
      };

      const flattenTree = (nodes) => {
        const result = [];
        nodes.forEach(n => { result.push(n); result.push(...flattenTree(n.children)); });
        return result;
      };

      const tree = buildTree();
      const flatTree = flattenTree(tree);

      const handleAdd = async () => {
        if (!newUnit.name) return addToast("Name is required", "error");
        setSaving(true);
        const { error } = await supabase.from("org_units").insert({
          org_id: orgId, parent_id: addingTo, name: newUnit.name,
          unit_type: newUnit.unit_type, address: newUnit.address || null, city: newUnit.city || null,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast(`"${newUnit.name}" added`, "success");
        setAddingTo(null);
        setNewUnit({ name: "", unit_type: "group", address: "", city: "" });
        loadUnits();
      };

      const handleDelete = async (unitId, unitName) => {
        const children = units.filter(u => u.parent_id === unitId);
        if (children.length > 0) return addToast("Remove child units first", "error");
        if (!confirm(`Delete "${unitName}"?`)) return;
        const { error } = await supabase.from("org_units").delete().eq("id", unitId);
        if (error) return addToast(error.message, "error");
        addToast(`"${unitName}" removed`, "success");
        loadUnits();
      };

      const handleEdit = async () => {
        if (!editingUnit || !editingUnit.name) return addToast("Name is required", "error");
        setSaving(true);
        const { error } = await supabase.from("org_units").update({
          name: editingUnit.name,
          unit_type: editingUnit.unit_type,
          address: editingUnit.address || null,
          city: editingUnit.city || null,
        }).eq("id", editingUnit.id);
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast(`"${editingUnit.name}" updated`, "success");
        setEditingUnit(null);
        loadUnits();
      };

      const typeIcons = { admin: icons.shield, region: icons.mapPin, program: icons.fileText, site: icons.heart, placement: icons.users, group: icons.dashboard };

      return (
        <div>
          <PageHeader title="Organization Structure" subtitle="Build your org tree (UPI-compatible) — Administration → Regions → Programs → Sites"
            action={<PrimaryButton onClick={() => setAddingTo(null)} color={CB.navy}>{icons.plus({ size: 16 })} Add Root Unit</PrimaryButton>}
          />

          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <div style={{
              background: CB.white, borderRadius: 16, padding: 24,
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            }}>
              {flatTree.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0", color: CB.textLight }}>
                  <p style={{ fontSize: 15, marginBottom: 16 }}>No org units yet. Start by adding your Administration root.</p>
                  <PrimaryButton onClick={() => { setAddingTo(null); setNewUnit({ name: "Administration", unit_type: "admin", address: "", city: "" }); }} color={CB.navy}>
                    {icons.plus({ size: 16 })} Create Administration Root
                  </PrimaryButton>
                </div>
              ) : (
                <div style={{ display: "grid", gap: 2 }}>
                  {flatTree.map((unit, i) => (
                    <div key={unit.id} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 14px", paddingLeft: 14 + unit.depth * 28,
                      borderRadius: 10, animation: `fadeIn 0.2s ease ${i * 0.02}s both`,
                      transition: "all 0.15s", border: "1px solid transparent",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.background = `${CB.teal}08`; e.currentTarget.style.borderColor = `${CB.teal}20`; }}
                      onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        {unit.depth > 0 && (
                          <span style={{ color: CB.border, fontSize: 14, marginRight: -4 }}>└</span>
                        )}
                        <div style={{
                          width: 28, height: 28, borderRadius: 8,
                          background: `${unit.unit_type === "admin" ? CB.navy : unit.unit_type === "program" ? CB.teal : CB.blue}12`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          {(typeIcons[unit.unit_type] || icons.dashboard)({ size: 14, color: unit.unit_type === "admin" ? CB.navy : unit.unit_type === "program" ? CB.teal : CB.blue })}
                        </div>
                        <div>
                          <span style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>{unit.name}</span>
                          <span style={{ fontSize: 11, color: CB.textLight, marginLeft: 8 }}>{ORG_UNIT_TYPES.find(t => t.value === unit.unit_type)?.label || unit.unit_type}</span>
                          {unit.city && <span style={{ fontSize: 11, color: CB.textLight, marginLeft: 8 }}>— {unit.city}</span>}
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => setEditingUnit({ id: unit.id, name: unit.name, unit_type: unit.unit_type, address: unit.address || "", city: unit.city || "" })} title="Edit" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.blue, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.edit({ size: 12, color: CB.blue })}</button>
                        <button onClick={() => { setAddingTo(unit.id); setNewUnit({ name: "", unit_type: "group", address: "", city: "" }); }} title="Add child" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.teal, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.plus({ size: 12, color: CB.teal })}</button>
                        <button onClick={() => handleDelete(unit.id, unit.name)} title="Delete" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.red, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.trash({ size: 12, color: CB.red })}</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Add Unit Modal */}
          <Modal open={addingTo !== undefined && addingTo !== false} onClose={() => setAddingTo(false)}
            title={addingTo === null ? "Add Root Unit" : `Add Child Unit`}
            subtitle={addingTo ? `Under: ${units.find(u => u.id === addingTo)?.name || ""}` : "Top-level organizational unit"}>
            <FormField label="Unit Name" required>
              <input style={fieldStyle} value={newUnit.name} onChange={e => setNewUnit(p => ({ ...p, name: e.target.value }))} placeholder="e.g. Residential Programs" />
            </FormField>
            <FormField label="Unit Type" required>
              <select style={fieldStyle} value={newUnit.unit_type} onChange={e => setNewUnit(p => ({ ...p, unit_type: e.target.value }))}>
                {ORG_UNIT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </FormField>
            <FormRow>
              <FormField label="City" half>
                <input style={fieldStyle} value={newUnit.city} onChange={e => setNewUnit(p => ({ ...p, city: e.target.value }))} placeholder="City" />
              </FormField>
              <FormField label="Address" half>
                <input style={fieldStyle} value={newUnit.address} onChange={e => setNewUnit(p => ({ ...p, address: e.target.value }))} placeholder="Street address" />
              </FormField>
            </FormRow>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
              <SecondaryButton onClick={() => setAddingTo(false)}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleAdd} loading={saving}>{icons.plus({ size: 16 })} Add Unit</PrimaryButton>
            </div>
          </Modal>

          {/* Edit Unit Modal */}
          <Modal open={!!editingUnit} onClose={() => setEditingUnit(null)} title="Edit Org Unit"
            subtitle={editingUnit ? `Editing: ${editingUnit.name}` : ""}>
            {editingUnit && (
              <>
                <FormField label="Unit Name" required>
                  <input style={fieldStyle} value={editingUnit.name} onChange={e => setEditingUnit(p => ({ ...p, name: e.target.value }))} placeholder="Unit name" />
                </FormField>
                <FormField label="Unit Type" required>
                  <select style={fieldStyle} value={editingUnit.unit_type} onChange={e => setEditingUnit(p => ({ ...p, unit_type: e.target.value }))}>
                    {ORG_UNIT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </FormField>
                <FormRow>
                  <FormField label="City" half>
                    <input style={fieldStyle} value={editingUnit.city} onChange={e => setEditingUnit(p => ({ ...p, city: e.target.value }))} placeholder="City" />
                  </FormField>
                  <FormField label="Address" half>
                    <input style={fieldStyle} value={editingUnit.address} onChange={e => setEditingUnit(p => ({ ...p, address: e.target.value }))} placeholder="Street address" />
                  </FormField>
                </FormRow>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
                  <SecondaryButton onClick={() => setEditingUnit(null)}>Cancel</SecondaryButton>
                  <PrimaryButton onClick={handleEdit} loading={saving}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                </div>
              </>
            )}
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // DOCUMENTS SECTION — reusable for staff and client forms
    // ═══════════════════════════════════════════════════════════════
    function DocumentsSection({ entityType, entityId, orgId, entityData }) {
      const { addToast } = useToast();
      const [docs, setDocs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [adding, setAdding] = useState(false);
      const [showGenerate, setShowGenerate] = useState(false);
      const [newDoc, setNewDoc] = useState({ doc_type: "", file_name: "", expires_at: "", notes: "" });

      const docTypes = entityType === "staff" ? STAFF_DOC_TYPES : CLIENT_DOC_TYPES;
      const requiredTypes = docTypes.filter(d => d.required);

      useEffect(() => {
        if (entityId) loadDocs();
        else { setDocs([]); setLoading(false); }
      }, [entityId]);

      const loadDocs = async () => {
        setLoading(true);
        const field = entityType === "staff" ? "staff_id" : "person_id";
        const { data } = await supabase.from("documents").select("*").eq(field, entityId).eq("is_archived", false).order("uploaded_at", { ascending: false });
        setDocs(data || []);
        setLoading(false);
      };

      const handleAdd = async () => {
        if (!newDoc.doc_type || !newDoc.file_name) return addToast("Document type and file name are required", "error");
        const field = entityType === "staff" ? "staff_id" : "person_id";
        const { error } = await supabase.from("documents").insert({
          org_id: orgId,
          [field]: entityId,
          doc_type: newDoc.doc_type,
          file_name: newDoc.file_name,
          file_url: `pending://${newDoc.file_name}`,
          expires_at: newDoc.expires_at || null,
          notes: newDoc.notes || null,
        });
        if (error) return addToast(error.message, "error");
        addToast("Document record added", "success");
        setAdding(false);
        setNewDoc({ doc_type: "", file_name: "", expires_at: "", notes: "" });
        loadDocs();
      };

      const removeDoc = async (docId) => {
        const { error } = await supabase.from("documents").update({ is_archived: true }).eq("id", docId);
        if (error) return addToast(error.message, "error");
        setDocs(prev => prev.filter(d => d.id !== docId));
        addToast("Document removed", "success");
      };

      const uploadedTypes = new Set(docs.map(d => d.doc_type));
      const missingRequired = requiredTypes.filter(t => !uploadedTypes.has(t.value));
      const completeness = requiredTypes.length > 0 ? Math.round(((requiredTypes.length - missingRequired.length) / requiredTypes.length) * 100) : 100;

      const now = new Date();

      return (
        <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>Documents</h3>
              <span style={{
                fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 6,
                background: completeness === 100 ? `${CB.green}12` : completeness >= 60 ? `${CB.amber}12` : `${CB.red}12`,
                color: completeness === 100 ? CB.green : completeness >= 60 ? CB.amber : CB.red,
              }}>{completeness}% complete</span>
            </div>
            {entityId && (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => setShowGenerate(!showGenerate)} style={{
                  padding: "5px 12px", borderRadius: 8, border: `1px dashed ${CB.teal}`,
                  background: showGenerate ? `${CB.teal}15` : `${CB.teal}08`, color: CB.teal, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4,
                }}>{icons.fileText({ size: 12, color: CB.teal })} Generate PDF</button>
                <button onClick={() => setAdding(!adding)} style={{
                  padding: "5px 12px", borderRadius: 8, border: `1px dashed ${CB.blue}`,
                  background: `${CB.blue}08`, color: CB.blue, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4,
                }}>{icons.plus({ size: 12, color: CB.blue })} Add Document</button>
              </div>
            )}
          </div>

          {/* Generate PDF forms panel */}
          {showGenerate && entityId && entityData && (
            <div style={{
              padding: 14, borderRadius: 10, marginBottom: 10,
              background: `${CB.teal}06`, border: `1px solid ${CB.teal}20`,
            }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: CB.teal, marginBottom: 10 }}>Generate Pre-Filled PDF Forms</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {entityType === "staff" && (
                  <>
                    <button onClick={() => { HopeHavenPDF.staffCoverSheet(entityData); addToast("Cover Sheet PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Cover Sheet</button>
                    <button onClick={() => { HopeHavenPDF.codeOfConduct(entityData); addToast("Code of Conduct PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Code of Conduct</button>
                    <button onClick={() => { HopeHavenPDF.medicaidExclusion(entityData); addToast("Medicaid Exclusion PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Medicaid Exclusion</button>
                    <button onClick={() => { HopeHavenPDF.trainingLog(entityData); addToast("Training Log PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Training Log</button>
                    <button onClick={() => { HopeHavenPDF.staffOnboardingPacket(entityData); addToast("Full packet downloading (4 PDFs)", "success"); }} style={{
                      padding: "6px 14px", borderRadius: 8, border: `2px solid ${CB.teal}`, background: `${CB.teal}08`,
                      color: CB.teal, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>⬇ Full Onboarding Packet</button>
                  </>
                )}
                {entityType === "client" && (
                  <>
                    <button onClick={() => { HopeHavenPDF.dailyServiceLog(entityData); addToast("Daily Service Log PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Daily Service Log</button>
                    <button onClick={() => { HopeHavenPDF.quarterlySummary(entityData); addToast("Quarterly Summary PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Quarterly Summary</button>
                    <button onClick={() => { HopeHavenPDF.rightsGrievance(entityData); addToast("Rights & Grievance PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Rights & Grievance</button>
                    <button onClick={() => { HopeHavenPDF.roomBoardAgreement(entityData); addToast("Room & Board PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Room & Board</button>
                    <button onClick={() => { HopeHavenPDF.clientIntakePacket(entityData, { is_residential: true }); addToast("Full packet downloading (4 PDFs)", "success"); }} style={{
                      padding: "6px 14px", borderRadius: 8, border: `2px solid ${CB.teal}`, background: `${CB.teal}08`,
                      color: CB.teal, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>⬇ Full Intake Packet</button>
                  </>
                )}
              </div>
              <div style={{ fontSize: 10, color: CB.textLight, marginTop: 8 }}>
                PDFs are pre-filled with {entityData.first_name}'s data. Print, sign, and scan back to upload.
              </div>
            </div>
          )}

          {!entityId && (
            <div style={{ fontSize: 13, color: CB.textLight, padding: "8px 0" }}>Save the record first, then add documents.</div>
          )}

          {/* Missing required docs warning */}
          {missingRequired.length > 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 10, marginBottom: 10,
              background: `${CB.amber}06`, border: `1px solid ${CB.amber}20`,
              fontSize: 12, color: CB.amber, fontWeight: 500,
            }}>
              {icons.alertTriangle({ size: 13, color: CB.amber })} Missing: {missingRequired.map(d => d.label).join(", ")}
            </div>
          )}

          {/* Existing documents */}
          {docs.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              {docs.map(doc => {
                const docDef = docTypes.find(d => d.value === doc.doc_type);
                const isExpired = doc.expires_at && new Date(doc.expires_at + "T00:00:00") < now;
                return (
                  <div key={doc.id} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "8px 12px", borderRadius: 8, marginBottom: 4,
                    background: isExpired ? `${CB.red}06` : CB.cream, border: `1px solid ${isExpired ? `${CB.red}20` : CB.border}`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                      {icons.fileText({ size: 14, color: isExpired ? CB.red : CB.teal })}
                      <span style={{ fontSize: 13, fontWeight: 600, color: CB.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc.file_name}</span>
                      <Badge text={docDef?.label || doc.doc_type} color={CB.textMid} />
                      {isExpired && <Badge text="Expired" color={CB.red} />}
                      {doc.expires_at && !isExpired && <span style={{ fontSize: 11, color: CB.textLight }}>exp {new Date(doc.expires_at + "T00:00:00").toLocaleDateString()}</span>}
                    </div>
                    <button onClick={() => removeDoc(doc.id)} style={{
                      padding: "3px 6px", borderRadius: 4, border: "none", background: "transparent",
                      color: CB.textLight, cursor: "pointer",
                    }}>{icons.trash({ size: 12, color: CB.textLight })}</button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Add document form */}
          {adding && entityId && (
            <div style={{ padding: 14, borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, marginBottom: 8 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <div style={{ flex: "1 1 180px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Document Type</label>
                  <select style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.doc_type} onChange={e => setNewDoc(p => ({ ...p, doc_type: e.target.value }))}>
                    <option value="">Select type...</option>
                    {(() => {
                      // Group by section (staff) or tab (client)
                      const groupKey = entityType === "staff" ? "section" : "tab";
                      const groups = {};
                      docTypes.forEach(d => {
                        const g = entityType === "staff" ? (d.section || "Other") : (d.tab ? `Tab ${d.tab}` : "Other");
                        if (!groups[g]) groups[g] = [];
                        groups[g].push(d);
                      });
                      return Object.entries(groups).map(([group, items]) => (
                        <optgroup key={group} label={group}>
                          {items.map(d => <option key={d.value} value={d.value}>{d.label}{d.required ? " *" : ""}</option>)}
                        </optgroup>
                      ));
                    })()}
                  </select>
                </div>
                <div style={{ flex: "1 1 160px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>File Name</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.file_name} onChange={e => setNewDoc(p => ({ ...p, file_name: e.target.value }))} placeholder="document.pdf" />
                </div>
                <div style={{ flex: "0 0 130px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Expires</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} type="date" value={newDoc.expires_at} onChange={e => setNewDoc(p => ({ ...p, expires_at: e.target.value }))} />
                </div>
                <button onClick={handleAdd} style={{
                  padding: "8px 14px", borderRadius: 8, border: `2px dashed ${CB.blue}`, marginBottom: 16,
                  background: `${CB.blue}08`, color: CB.blue, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{icons.plus({ size: 12, color: CB.blue })} Add</button>
              </div>
              <div style={{ fontSize: 11, color: CB.textLight, marginTop: -8 }}>
                File upload connects to Supabase Storage in production — for now this logs the document record.
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INTAKE WIZARD — multi-step client onboarding
    // ═══════════════════════════════════════════════════════════════
    function ClientIntakeWizard() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [step, setStep] = useState(0);
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [complete, setComplete] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "",
        address: "", city: "", state: "UT", zip: "", phone: "",
        pid: "", gender: "", ssn_last4: "", primary_language: "English",
        guardian_name: "", guardian_phone: "", guardian_relation: "",
        emergency_name: "", emergency_phone: "", emergency_relation: "",
        support_coordinator: "", sc_phone: "", sc_email: "", sc_agency: "",
        diagnoses: "", medications_on_file: false, pcsp_on_file: false,
        admission_date: new Date().toISOString().split("T")[0],
        auths: [],
      });
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const addIntakeAuth = () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select code and enter units", "error");
        const sc = serviceCodes.find(s => s.id === newAuth.service_code_id);
        setForm(prev => ({ ...prev, auths: [...prev.auths, { ...newAuth, code: sc?.code, name: sc?.name }] }));
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      };

      const removeIntakeAuth = (idx) => {
        setForm(prev => ({ ...prev, auths: prev.auths.filter((_, i) => i !== idx) }));
      };

      const handleSubmit = async () => {
        if (!form.first_name || !form.last_name) return addToast("Name is required", "error");
        setSaving(true);
        // Step 1: Create person
        const personPayload = {
          org_id: orgId,
          first_name: form.first_name, last_name: form.last_name,
          date_of_birth: form.date_of_birth || null,
          medicaid_number: form.medicaid_number || null,
          is_active: true,
        };
        const { data: personData, error: personErr } = await supabase.from("persons").insert(personPayload).select();
        if (personErr || !personData?.[0]) {
          addToast("Failed to create client: " + (personErr?.message || "unknown error"), "error");
          setSaving(false);
          return;
        }
        const personId = personData[0].id;

        // Step 2: Create auths
        if (form.auths.length > 0) {
          const authPayloads = form.auths.map(a => {
            const startDate = a.start_date || new Date().toISOString().split("T")[0];
            let endDate = a.end_date;
            if (!endDate) {
              const d = new Date(startDate + "T00:00:00");
              d.setFullYear(d.getFullYear() + 1);
              endDate = d.toISOString().split("T")[0];
            }
            return {
              org_id: orgId, person_id: personId,
              service_code_id: a.service_code_id,
              authorized_units: parseInt(a.authorized_units),
              used_units: 0,
              start_date: startDate,
              end_date: endDate,
              rate_per_unit: a.rate_per_unit ? parseFloat(a.rate_per_unit) : null,
            };
          });
          const { error: authErr } = await supabase.from("person_service_authorizations").insert(authPayloads);
          if (authErr) addToast("Client created but auth insert failed: " + authErr.message, "warning");
        }

        setSaving(false);
        setComplete(true);
        addToast(`${form.first_name} ${form.last_name} intake complete!`, "success");
      };

      const steps = [
        { label: "Personal Info", icon: icons.heart },
        { label: "Guardian & Contacts", icon: icons.mail },
        { label: "Medical & SC", icon: icons.shield },
        { label: "Service Auths", icon: icons.fileText },
        { label: "Review & Submit", icon: icons.checkCircle },
      ];

      if (complete) {
        return (
          <div>
            <div style={{
              background: CB.white, borderRadius: 20, padding: "60px 40px", textAlign: "center",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "successPop 0.4s ease",
            }}>
              <div style={{
                width: 72, height: 72, borderRadius: 20, background: `${CB.green}12`,
                display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20,
              }}>{icons.checkCircle({ size: 36, color: CB.green })}</div>
              <h3 style={{ fontSize: 22, fontWeight: 800, color: CB.navy, marginBottom: 8 }}>{form.first_name} {form.last_name}</h3>
              <p style={{ fontSize: 15, color: CB.textMid, marginBottom: 24 }}>
                Created with {form.auths.length} service authorization{form.auths.length !== 1 ? "s" : ""}
              </p>
              <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                <PrimaryButton onClick={() => HopeHavenPDF.clientIntakePacket(form, { pid: form.pid, sc_name: form.support_coordinator, sc_phone: form.sc_phone, is_residential: form.auths.some(a => ["RHS", "HHS", "PPS"].includes(a.code)) })} color={CB.navy}>
                  {icons.fileText({ size: 16 })} Download Intake Packet
                </PrimaryButton>
                <PrimaryButton onClick={() => { setComplete(false); setStep(0); setForm({ first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", address: "", city: "", state: "UT", zip: "", phone: "", pid: "", gender: "", ssn_last4: "", primary_language: "English", guardian_name: "", guardian_phone: "", guardian_relation: "", emergency_name: "", emergency_phone: "", emergency_relation: "", support_coordinator: "", sc_phone: "", sc_email: "", sc_agency: "", diagnoses: "", medications_on_file: false, pcsp_on_file: false, admission_date: new Date().toISOString().split("T")[0], auths: [] }); }}>
                  {icons.plus({ size: 16 })} Start Another Intake
                </PrimaryButton>
              </div>
            </div>
          </div>
        );
      }

      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      return (
        <div>

          {/* Step indicator */}
          <div style={{
            display: "flex", alignItems: "center", marginBottom: 28, padding: "16px 24px",
            background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          }}>
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div onClick={() => i <= step && setStep(i)} style={{
                  display: "flex", alignItems: "center", gap: 8, cursor: i <= step ? "pointer" : "default",
                  opacity: i <= step ? 1 : 0.4, transition: "opacity 0.2s",
                }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: 10,
                    background: i === step ? CB.teal : i < step ? CB.green : CB.cream,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "background 0.2s",
                  }}>
                    {i < step ? icons.checkCircle({ size: 16, color: CB.white }) : s.icon({ size: 16, color: i === step ? CB.white : CB.textLight })}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: i === step ? 700 : 500, color: i === step ? CB.navy : CB.textMid }}>{s.label}</span>
                </div>
                {i < steps.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: i < step ? CB.green : CB.border, margin: "0 12px", borderRadius: 1, transition: "background 0.2s" }} />
                )}
              </React.Fragment>
            ))}
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "32px 36px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            {/* Step 0: Personal Info */}
            {step === 0 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Personal Information</h3>
                <FormRow>
                  <FormField label="First Name" required half>
                    <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
                  </FormField>
                  <FormField label="Last Name" required half>
                    <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Date of Birth" half>
                    <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
                  </FormField>
                  <FormField label="Gender" half>
                    <select style={fieldStyle} value={form.gender} onChange={e => set("gender", e.target.value)}>
                      <option value="">Select...</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="nonbinary">Non-binary</option>
                      <option value="other">Other</option>
                    </select>
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Medicaid Number" half>
                    <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
                  </FormField>
                  <FormField label="PID (Person ID)" half>
                    <input style={fieldStyle} value={form.pid} onChange={e => set("pid", e.target.value)} placeholder="DSPD Person ID" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="SSN (Last 4 digits)" half>
                    <input style={fieldStyle} value={form.ssn_last4} onChange={e => set("ssn_last4", e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="XXXX" maxLength={4} />
                  </FormField>
                  <FormField label="Primary Language" half>
                    <input style={fieldStyle} value={form.primary_language} onChange={e => set("primary_language", e.target.value)} placeholder="English" />
                  </FormField>
                </FormRow>
                <FormField label="Address">
                  <input style={fieldStyle} value={form.address} onChange={e => set("address", e.target.value)} placeholder="Street address" />
                </FormField>
                <FormRow>
                  <FormField label="City" half>
                    <input style={fieldStyle} value={form.city} onChange={e => set("city", e.target.value)} placeholder="City" />
                  </FormField>
                  <FormField label="State" half>
                    <input style={fieldStyle} value={form.state} onChange={e => set("state", e.target.value)} placeholder="UT" maxLength={2} />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="ZIP Code" half>
                    <input style={fieldStyle} value={form.zip} onChange={e => set("zip", e.target.value)} placeholder="84088" />
                  </FormField>
                  <FormField label="Phone" half>
                    <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
                  </FormField>
                </FormRow>
                <FormField label="Admission Date">
                  <input style={fieldStyle} type="date" value={form.admission_date} onChange={e => set("admission_date", e.target.value)} />
                </FormField>
              </>
            )}

            {/* Step 1: Guardian & Emergency Contacts */}
            {step === 1 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Guardian & Emergency Contacts</h3>
                <div style={{ padding: "12px 16px", borderRadius: 10, background: `${CB.teal}06`, border: `1px solid ${CB.teal}20`, marginBottom: 20 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: CB.teal, marginBottom: 4 }}>Legal Guardian / Representative</div>
                  <div style={{ fontSize: 11, color: CB.textMid }}>If the person has a legal guardian, conservator, or representative payee</div>
                </div>
                <FormRow>
                  <FormField label="Guardian Name" half>
                    <input style={fieldStyle} value={form.guardian_name} onChange={e => set("guardian_name", e.target.value)} placeholder="Full name" />
                  </FormField>
                  <FormField label="Relationship" half>
                    <input style={fieldStyle} value={form.guardian_relation} onChange={e => set("guardian_relation", e.target.value)} placeholder="e.g. Parent, Guardian, Conservator" />
                  </FormField>
                </FormRow>
                <FormField label="Guardian Phone">
                  <input style={fieldStyle} type="tel" value={form.guardian_phone} onChange={e => set("guardian_phone", e.target.value)} placeholder="(801) 555-0000" />
                </FormField>

                <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${CB.border}` }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 14 }}>Emergency Contact</div>
                </div>
                <FormRow>
                  <FormField label="Emergency Contact Name" half>
                    <input style={fieldStyle} value={form.emergency_name} onChange={e => set("emergency_name", e.target.value)} placeholder="Contact name" />
