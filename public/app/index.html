          doc.setFont("helvetica", "normal"); doc.setTextColor(0, 0, 0); doc.setFontSize(9);
          sec.items.forEach(item => {
            doc.rect(24, y - 3, 4, 4); // checkbox
            doc.text(item, 32, y);
            doc.text("________", 160, y);
            y += 7;
            if (y > 270) { doc.addPage(); y = 20; }
          });
          y += 3;
        });
        this._download(doc, `Staff_Cover_Sheet_${staff.last_name || "new"}.pdf`);

          { label: "Hire Date", value: staff.hire_date || "" },

        y += 4;
        const content = [
          { head: "1. PROFESSIONAL CONDUCT", body: "I will treat all Persons with dignity, respect, and courtesy. I will provide services professionally, respect privacy and confidentiality, follow all laws and agency policies, and maintain professional boundaries." },
          { head: "2. ABUSE, NEGLECT, AND EXPLOITATION", body: "I will NOT physically, emotionally, verbally, or sexually abuse any Person. I will NOT neglect health or safety, exploit any Person, use threats or coercion, or use unauthorized restraints. I WILL immediately report suspected abuse/neglect/exploitation." },
          { head: "3. FINANCIAL CONDUCT", body: "I will NOT accept money, gifts, loans, or gratuities from Persons or their families. I will NOT borrow from or lend money to Persons. I will NOT use a Person's property, vehicle, or resources for personal benefit." },

    // Get the effective rate for a service code — either fixed or from client auth
    function getEffectiveRate(serviceCode, authRate) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return null;
      // Worksheet services use the client-specific rate from their authorization
      if (rule.worksheet) return authRate || null;
      // Fixed rate codes use the SOW rate
      return rule.rate || null;
    }

    function calculateBillableUnits(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      switch (rule.unit_type) {
        case "quarter_hour":
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
        case "daily":
          return 1;
        case "session":
          return 1;
        case "tiered_daily":
          return 1;
        default:
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      }
    }

    function getTieredRate(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule || rule.unit_type !== "tiered_daily" || !rule.tiers) return null;
      const hours = Math.ceil((durationMinutes || 0) / 60);
      const tier = rule.tiers.find(t => hours <= t.maxHours) || rule.tiers[rule.tiers.length - 1];
      return tier;
    }

    function getBillingLabel(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? `${Math.ceil(durationMinutes / 15)} units (qtr-hr)` : "—";
      const units = calculateBillableUnits(serviceCode, durationMinutes);
      switch (rule.unit_type) {
        case "quarter_hour":
          return units != null ? `${units} unit${units !== 1 ? "s" : ""} (${rule.label})` : "—";
        case "daily":
          return `1 unit (${rule.label})`;
        case "session":
          return `1 unit (${rule.label})`;
        case "tiered_daily": {
          const tier = getTieredRate(serviceCode, durationMinutes);
          return tier ? `1 unit (${Math.ceil((durationMinutes||0)/60)}hr tier)` : `1 unit (${rule.label})`;
        }
        default:
          return "—";
      }
    }

          setExtraFields({});
          setSelectedCode(null);
          setClientAuths([]);
        }
      }, [open]);

      // Load client auths when person changes
      const handleClientChange = async (personId) => {
        setForm(prev => ({ ...prev, person_id: personId }));
        if (personId) {
          const { data } = await supabase.from("person_service_authorizations")
            .select("id, service_code_id, authorized_units, used_units, service_code_definitions(code)")
            .eq("person_id", personId);
          setClientAuths(data || []);
        } else {
          setClientAuths([]);
        }
      };

      // Find the active auth for the selected client + code combo
      const activeAuth = useMemo(() => {
        if (!form.service_code_id || !clientAuths.length) return null;
        return clientAuths.find(a => a.service_code_id === form.service_code_id) || null;
      }, [form.service_code_id, clientAuths]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleCodeChange = (scId) => {
        set("service_code_id", scId);
        const code = serviceCodes.find(s => s.id === scId);
        setSelectedCode(code?.code || null);
        setExtraFields({});
      };

      const dynamicFields = SERVICE_NOTE_FIELDS[selectedCode] || [];

      const handleSave = async () => {
        if (!form.staff_id || !form.person_id || !form.service_code_id || !form.service_date) {
          return addToast("Staff, client, service code, and date are required", "error");
        }
        setSaving(true);
        // Calculate duration
        let duration_minutes = null;
        if (form.start_time && form.end_time) {
          const [sh, sm] = form.start_time.split(":").map(Number);
          const [eh, em] = form.end_time.split(":").map(Number);
          duration_minutes = (eh * 60 + em) - (sh * 60 + sm);
          if (duration_minutes < 0) duration_minutes += 1440;
        }
        // Combine note_text with extra fields
        let fullNote = form.note_text || "";
        if (Object.keys(extraFields).length > 0) {
          const sections = dynamicFields
            .filter(f => extraFields[f.key])
            .map(f => `[${f.label}]\n${extraFields[f.key]}`)
            .join("\n\n");
          fullNote = sections + (fullNote ? `\n\n[Additional Notes]\n${fullNote}` : "");
        }

        const { error } = await supabase.from("service_notes").insert({
          org_id: orgId,
          staff_id: form.staff_id,
          person_id: form.person_id,
          service_code_id: form.service_code_id,
          service_date: form.service_date,
          start_time: form.start_time || null,
          end_time: form.end_time || null,
          duration_minutes,
          billable_units: calculateBillableUnits(selectedCode, duration_minutes),
          summary_note: fullNote,
          status: "draft",
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Service note saved", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="New Service Note" subtitle={selectedCode ? `Dynamic fields for ${selectedCode}` : "Select a service code to load specific fields"} width={640}>
          <FormRow>
            <FormField label="Staff Member" required half>
              <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
                <option value="">Select staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required half>
              <select style={fieldStyle} value={form.person_id} onChange={e => handleClientChange(e.target.value)}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>
          </FormRow>
          <FormField label="Service Code" required>
            <select style={fieldStyle} value={form.service_code_id} onChange={e => handleCodeChange(e.target.value)}>
              <option value="">Select service code...</option>
              {serviceCodes.map(sc => {
                // If client selected, mark which codes they have auths for
                const hasAuth = clientAuths.some(a => a.service_code_id === sc.id);
                return <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}{hasAuth ? " ✓" : ""}</option>;
              })}
            </select>
            {activeAuth && (
              <div style={{ marginTop: 6, fontSize: 12, color: CB.teal, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                {icons.checkCircle({ size: 13, color: CB.teal })}
                Auth: {activeAuth.used_units || 0}/{activeAuth.authorized_units} units used
                {activeAuth.rate_per_unit && perms.viewRates && <span>@ ${Number(activeAuth.rate_per_unit).toFixed(2)}/unit</span>}
              </div>
            )}
          </FormField>
          <FormRow>
            <FormField label="Service Date" required half>
              <input style={fieldStyle} type="date" value={form.service_date} onChange={e => set("service_date", e.target.value)} />
            </FormField>
            <FormField label="Start Time" half>
              <input style={fieldStyle} type="time" value={form.start_time} onChange={e => set("start_time", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="End Time" half>
              <input style={fieldStyle} type="time" value={form.end_time} onChange={e => set("end_time", e.target.value)} />
            </FormField>
            <FormField label="Duration / Units" half>
              <div style={{ ...fieldStyle, background: "#F1F5F9", color: CB.textMid, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                {(() => {
                  const rule = BILLING_RULES[selectedCode];
                  const authRate = activeAuth?.rate_per_unit ? Number(activeAuth.rate_per_unit) : null;
                  const effectiveRate = perms.viewRates && rule ? (rule.worksheet ? authRate : rule.rate) : null;

                  if (!rule) {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      return `${Math.floor(mins/60)}h ${mins%60}m → ${Math.ceil(mins/15)} units`;
                    }
                    return "Select a service code";
                  }
                  // Daily / Session — always 1 unit
                  if (rule.unit_type === "daily" || rule.unit_type === "session") {
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.teal}15`, color: CB.teal, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{rule.label}</span>
                        <span style={{ fontWeight: 600, color: CB.navy }}>1 unit</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : (perms.viewRates && rule.worksheet) ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  // Tiered daily
                  if (rule.unit_type === "tiered_daily") {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      const tier = getTieredRate(selectedCode, mins);
                      return (
                        <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered</span>
                          <span>{Math.floor(mins/60)}h {mins%60}m</span>
                          <span style={{ fontWeight: 700, color: CB.navy }}>→ 1 unit</span>
                          <span style={{ fontSize: 11, color: CB.textLight }}>({Math.ceil(mins/60)}hr tier{perms.viewRates && tier?.max_rate ? `, max $${tier.max_rate.toFixed(2)}` : ""})</span>
                        </span>
                      );
                    }
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered Daily</span>
                        <span style={{ fontSize: 12 }}>Enter times → rate by hours</span>
                      </span>
                    );
                  }
                  // Quarter hour
                  if (form.start_time && form.end_time) {
                    const [sh, sm] = form.start_time.split(":").map(Number);
                    const [eh, em] = form.end_time.split(":").map(Number);
                    let mins = (eh * 60 + em) - (sh * 60 + sm);
                    if (mins < 0) mins += 1440;
                    const units = Math.ceil(mins / 15);
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{Math.floor(mins/60)}h {mins%60}m</span>
                        <span style={{ fontWeight: 700, color: CB.navy }}>→ {units} unit{units !== 1 ? "s" : ""}</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : (perms.viewRates && rule.worksheet) ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  return "Enter start/end times";
                })()}
              </div>
            </FormField>
          </FormRow>

          {/* Dynamic fields per service code */}
          {dynamicFields.length > 0 && (
            <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <Badge text={selectedCode} color={CB.blue} />
                <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>Required Documentation</span>
              </div>
              {dynamicFields.map(field => (
                <FormField key={field.key} label={field.label}>
                  {field.type === "textarea" ? (
                    <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  ) : field.type === "select" ? (
                    <select style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))}>
                      <option value="">Select...</option>
                      {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  ) : (
                    <input style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  )}
                </FormField>
              ))}
            </div>
          )}

          <FormField label="Additional Notes">
            <textarea style={{ ...fieldStyle, minHeight: 64, resize: "vertical" }} value={form.note_text} onChange={e => set("note_text", e.target.value)} placeholder="Any additional observations or notes..." />
          </FormField>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} Save Note</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function ServiceNotesPage() {
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [viewing, setViewing] = useState(null);
      const [editing, setEditing] = useState(false);
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const { addToast } = useToast();
      const perms = usePermissions();

      useEffect(() => {
        loadNotes();
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      const loadNotes = async () => {
        setLoading(true);
        const { data, error } = await supabase.from("service_notes")
          .select("id, service_date, start_time, end_time, duration_minutes, billable_units, status, summary_note, service_code_id, staff!service_notes_staff_id_fkey(first_name, last_name), persons(first_name, last_name), service_code_definitions(code, name)")
          .order("service_date", { ascending: false })
          .limit(100);
        if (!error) setNotes(data || []);
        setLoading(false);
      };

      const openDetail = (note) => {
        setViewing(note);
        setEditing(false);
        setEditForm({
          summary_note: note.summary_note || "",
          status: note.status || "draft",
          start_time: note.start_time?.slice(0, 5) || "",
          end_time: note.end_time?.slice(0, 5) || "",
          service_code_id: note.service_code_id || "",
        });
      };

      const saveEdit = async () => {
        setSaving(true);
        let duration_minutes = null;
        if (editForm.start_time && editForm.end_time) {
          const [sh, sm] = editForm.start_time.split(":").map(Number);
          const [eh, em] = editForm.end_time.split(":").map(Number);
          duration_minutes = (eh * 60 + em) - (sh * 60 + sm);
          if (duration_minutes < 0) duration_minutes += 1440;
        }
        // Use edited code if changed, else fall back to viewing's original code
        const editedCodeDef = serviceCodes.find(sc => sc.id === editForm.service_code_id);
        const code = editedCodeDef?.code || viewing.service_code_definitions?.code;
        const updatePayload = {
          summary_note: editForm.summary_note,
          status: editForm.status,
          start_time: editForm.start_time || null,
          end_time: editForm.end_time || null,
          duration_minutes,
          billable_units: calculateBillableUnits(code, duration_minutes),
        };
        // Only include service_code_id if it changed
        if (editForm.service_code_id && editForm.service_code_id !== viewing.service_code_id) {
          updatePayload.service_code_id = editForm.service_code_id;
        }
        const { error } = await supabase.from("service_notes").update(updatePayload).eq("id", viewing.id);
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Service note updated", "success");
        setViewing(null);
        loadNotes();
      };

      const updateStatus = async (noteId, newStatus) => {
        const { error } = await supabase.from("service_notes").update({ status: newStatus }).eq("id", noteId);
        if (error) return addToast(error.message, "error");
        addToast(`Note marked as ${newStatus}`, "success");
        setViewing(prev => prev ? { ...prev, status: newStatus } : null);
        setEditForm(prev => ({ ...prev, status: newStatus }));
        loadNotes();
      };

      const statusColors = { draft: CB.amber, submitted: CB.blue, approved: CB.green, rejected: CB.red };
      const statusFlow = { draft: "submitted", submitted: "approved" };

      const columns = [
        { label: "Date", bold: true, render: (r) => r.service_date ? new Date(r.service_date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Staff", render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Client", render: (r) => r.persons ? `${r.persons.first_name} ${r.persons.last_name}` : "—" },
        { label: "Code", render: (r) => <Badge text={r.service_code_definitions?.code || "?"} color={CB.blue} /> },
        { label: "Time", render: (r) => r.start_time && r.end_time ? `${r.start_time.slice(0,5)} – ${r.end_time.slice(0,5)}` : "—" },
        { label: "Units", render: (r) => {
          const code = r.service_code_definitions?.code;
          const rule = BILLING_RULES[code];
          if (!rule) {
            const units = r.billable_units || (r.duration_minutes ? Math.ceil(r.duration_minutes / 15) : null);
            return units ? <span><span style={{ fontWeight: 600 }}>{units}</span> <span style={{ fontSize: 11, color: CB.textLight }}>qtr-hr</span></span> : "—";
          }
          if (rule.unit_type === "tiered_daily") {
            const tier = getTieredRate(code, r.duration_minutes);
            return (
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontWeight: 600 }}>1</span>
                <span style={{ fontSize: 11, color: CB.amber, fontWeight: 600 }}>
                  {tier ? `${Math.ceil((r.duration_minutes||0)/60)}hr tier` : "tiered"}
                </span>
              </span>
            );
          }
          const units = r.billable_units || calculateBillableUnits(code, r.duration_minutes);
          if (!units && units !== 0) return "—";
          return (
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontWeight: 600 }}>{units}</span>
              <span style={{ fontSize: 11, color: CB.textLight }}>{rule.label}</span>
              {rule.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700 }}>*</span>}
            </span>
          );
        }},
        { label: "Status", render: (r) => <Badge text={r.status || "draft"} color={statusColors[r.status] || CB.textLight} /> },
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openDetail(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.eye({ size: 13 })} View</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Service Notes" subtitle="Dynamic documentation forms per service code — click any note to view or edit"
            action={<PrimaryButton onClick={() => setFormOpen(true)}>{icons.plus({ size: 16 })} New Service Note</PrimaryButton>}
          />
          <DataTable columns={columns} data={notes} loading={loading} emptyMessage="No service notes yet — create your first one" onRowClick={openDetail} />
          <ServiceNoteForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadNotes} />

          {/* Note Detail / Edit Modal */}
          <Modal open={!!viewing} onClose={() => setViewing(null)} title={editing ? "Edit Service Note" : "Service Note Detail"} width={660}
            subtitle={viewing ? `${viewing.persons?.first_name || ""} ${viewing.persons?.last_name || ""} — ${viewing.service_date || ""}` : ""}>
            {viewing && (
              <div>
                {/* Status bar with actions */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, padding: "12px 16px", borderRadius: 12, background: CB.cream, border: `1px solid ${CB.border}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {editing ? (
                      <select style={{ ...fieldStyle, padding: "6px 10px", fontSize: 12, fontWeight: 700, width: "auto", minWidth: 180, background: CB.white }}
                        value={editForm.service_code_id} onChange={e => setEditForm(p => ({ ...p, service_code_id: e.target.value }))}>
                        {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                      </select>
                    ) : (
                      <Badge text={viewing.service_code_definitions?.code || "?"} color={CB.blue} />
                    )}
                    <Badge text={editForm.status || viewing.status || "draft"} color={statusColors[editForm.status || viewing.status] || CB.textLight} />
                    <span style={{ fontSize: 13, color: CB.textMid }}>by {viewing.staff?.first_name} {viewing.staff?.last_name}</span>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {!editing && statusFlow[viewing.status] && perms.viewCompliance && (
                      <button onClick={() => updateStatus(viewing.id, statusFlow[viewing.status])} style={{
                        padding: "6px 12px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
                        background: CB.green, color: CB.white, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.checkCircle({ size: 13, color: CB.white })} {viewing.status === "draft" ? "Submit" : "Approve"}</button>
                    )}
                    {!editing && viewing.status !== "approved" && (
                      <button onClick={() => { setEditing(true); }} style={{
                        padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, fontSize: 12, fontWeight: 700,
                        background: CB.white, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.edit({ size: 13 })} Edit</button>
                    )}
                    {!editing && viewing.status === "submitted" && perms.viewCompliance && (
                      <button onClick={() => updateStatus(viewing.id, "rejected")} style={{
                        padding: "6px 12px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
                        background: `${CB.red}12`, color: CB.red, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.x({ size: 13, color: CB.red })} Reject</button>
                    )}
                  </div>
                </div>

                {/* Time and billing info */}
                <RGrid cols={3} gap={12} style={{ marginBottom: 20 }}>
                  {editing ? (
                    <>
                      <FormField label="Start Time" half style={{ marginBottom: 0 }}>
                        <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="time" value={editForm.start_time} onChange={e => setEditForm(p => ({ ...p, start_time: e.target.value }))} />
                      </FormField>
                      <FormField label="End Time" half style={{ marginBottom: 0 }}>
                        <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="time" value={editForm.end_time} onChange={e => setEditForm(p => ({ ...p, end_time: e.target.value }))} />
                      </FormField>
                      <FormField label="Status" half style={{ marginBottom: 0 }}>
                        <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={editForm.status} onChange={e => setEditForm(p => ({ ...p, status: e.target.value }))}>
                          {["draft", "submitted", "approved", "rejected"].map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </FormField>
                    </>
                  ) : (
                    <>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Time</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {viewing.start_time && viewing.end_time ? `${viewing.start_time.slice(0,5)} – ${viewing.end_time.slice(0,5)}` : "Not recorded"}
                        </div>
                      </div>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Duration</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {viewing.duration_minutes ? `${Math.floor(viewing.duration_minutes/60)}h ${viewing.duration_minutes%60}m` : "—"}
                        </div>
                      </div>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Billable</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {getBillingLabel(viewing.service_code_definitions?.code, viewing.duration_minutes)}
                        </div>
                      </div>
                    </>
                  )}
                </RGrid>

                {/* Note content */}
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>Service Note</div>
                  {editing ? (
                    <textarea style={{ ...fieldStyle, minHeight: 200, resize: "vertical", lineHeight: 1.7 }}
                      value={editForm.summary_note}
                      onChange={e => setEditForm(p => ({ ...p, summary_note: e.target.value }))}
                    />
                  ) : (
                    <div style={{
                      padding: "16px 20px", borderRadius: 12, background: CB.cream, border: `1px solid ${CB.border}`,
                      fontSize: 14, color: CB.text, lineHeight: 1.8, whiteSpace: "pre-wrap",
                      minHeight: 120, maxHeight: 400, overflowY: "auto",
                    }}>
                      {viewing.summary_note || "No notes recorded"}
                    </div>
                  )}
                </div>

                {/* Edit actions */}
                {editing && (
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
                    <SecondaryButton onClick={() => setEditing(false)}>Cancel</SecondaryButton>
                    <PrimaryButton onClick={saveEdit} loading={saving}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                  </div>
                )}
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 5: EVV CLOCK IN / OUT — GPS-based with geofence
    // ═══════════════════════════════════════════════════════════════
    function EVVPage() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [staffList, setStaffList] = useState([]);
      const [clients, setClients] = useState([]);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [clockingIn, setClockingIn] = useState(false);
      const [clockingOut, setClockingOut] = useState(null);
      const [gpsStatus, setGpsStatus] = useState(null);
      const [showClockIn, setShowClockIn] = useState(false);
      const [clockForm, setClockForm] = useState({ staff_id: "", person_id: "", service_code_id: "" });
      const [viewing, setViewing] = useState(null);
      const [editingEVV, setEditingEVV] = useState(false);
      const [evvEditForm, setEvvEditForm] = useState({});
      const [savingEVV, setSavingEVV] = useState(false);
      const [clientEvvAuths, setClientEvvAuths] = useState([]);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [sessRes, staffRes, clientRes, scRes] = await Promise.all([
          supabase.from("evv_sessions").select("id, clock_in_at, clock_out_at, clock_in_lat, clock_in_lng, clock_out_lat, clock_out_lng, geofence_valid, exceptions, staff(first_name, last_name), persons(first_name, last_name), service_code_definitions(code)").order("clock_in_at", { ascending: false }).limit(50),
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("service_code_definitions").select("id, code, name, evv_required").order("code"),
        ]);
        if (!sessRes.error) setSessions(sessRes.data || []);
        setStaffList(staffRes.data || []);
        setClients(clientRes.data || []);
        setServiceCodes((scRes.data || []).filter(sc => sc.evv_required));
        setLoading(false);
      };

      // When client changes in clock-in form, load their authorized EVV codes
      const handleEvvClientChange = async (personId) => {
        setClockForm(p => ({ ...p, person_id: personId, service_code_id: "" }));
        if (personId) {
          const { data } = await supabase.from("person_service_authorizations")
            .select("service_code_id, service_code_definitions(id, code, name, evv_required)")
            .eq("person_id", personId);
          // Only keep EVV-required codes from their auths
          const evvAuths = (data || []).filter(a => a.service_code_definitions?.evv_required);
          setClientEvvAuths(evvAuths.map(a => a.service_code_definitions));
        } else {
          setClientEvvAuths([]);
        }
      };

      // Determine which codes to show in dropdown: client-filtered if client selected, else all EVV codes
      const evvCodesForDropdown = clockForm.person_id && clientEvvAuths.length > 0 ? clientEvvAuths : serviceCodes;

      // Force a fresh GPS fix — watchPosition is more reliable than getCurrentPosition
      // on mobile browsers that aggressively cache location
      const getGPS = () => new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
        setGpsStatus("locating");
        let resolved = false;
        const watchId = navigator.geolocation.watchPosition(
          pos => {
            if (resolved) return;
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("found");
            resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy });
          },
          err => {
            if (resolved) return;
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("error");
            reject(err);
          },
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
        // Safety timeout — clear watch if it hangs
        setTimeout(() => {
          if (!resolved) {
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("error");
            reject(new Error("GPS timeout — try again or check location permissions"));
          }
        }, 22000);
      });

      const handleClockIn = async () => {
        if (!clockForm.staff_id || !clockForm.person_id || !clockForm.service_code_id) {
          return addToast("Select staff, client, and service code", "error");
        }
        setClockingIn(true);
        try {
          const gps = await getGPS();
          const { error } = await supabase.from("evv_sessions").insert({
            org_id: orgId,
            staff_id: clockForm.staff_id,
            person_id: clockForm.person_id,
            service_code_id: clockForm.service_code_id,
            clock_in_at: new Date().toISOString(),
            clock_in_lat: gps.lat,
            clock_in_lng: gps.lng,
          });
          if (error) throw error;
          addToast("Clocked in successfully", "success");
          setShowClockIn(false);
          loadAll();
        } catch (e) {
          addToast(e.message || "Clock-in failed", "error");
        }
        setClockingIn(false);
        setGpsStatus(null);
      };

      const handleClockOut = async (sessionId) => {
        setClockingOut(sessionId);
        try {
          const gps = await getGPS();
          const { error } = await supabase.from("evv_sessions").update({
            clock_out_at: new Date().toISOString(),
            clock_out_lat: gps.lat,
            clock_out_lng: gps.lng,
          }).eq("id", sessionId);
          if (error) throw error;
          addToast("Clocked out successfully", "success");
          loadAll();
        } catch (e) {
          addToast(e.message || "Clock-out failed", "error");
        }
        setClockingOut(null);
        setGpsStatus(null);
      };

      const activeSessions = sessions.filter(s => !s.clock_out_at);
      const completedSessions = sessions.filter(s => s.clock_out_at);

      const formatTime = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      };

      const formatDate = (iso) => {
        if (!iso) return "—";
        return new Date(iso).toLocaleDateString();
      };

      const openEVVDetail = (session) => {
        setViewing(session);
        setEditingEVV(false);
        setEvvEditForm({
          clock_in_at: session.clock_in_at?.slice(0, 16) || "",
          clock_out_at: session.clock_out_at?.slice(0, 16) || "",
          exceptions: session.exceptions || "",
        });
      };

      const saveEVVEdit = async () => {
        setSavingEVV(true);
        const updates = {};
        if (evvEditForm.clock_out_at) updates.clock_out_at = new Date(evvEditForm.clock_out_at).toISOString();
        if (evvEditForm.exceptions !== undefined) updates.exceptions = evvEditForm.exceptions || null;
        const { error } = await supabase.from("evv_sessions").update(updates).eq("id", viewing.id);
        setSavingEVV(false);
        if (error) return addToast(error.message, "error");
        addToast("EVV session updated", "success");
        setViewing(null);
        loadAll();
      };

      const columns = [
        { label: "Date", bold: true, render: (r) => formatDate(r.clock_in_at) },
        { label: "Staff", render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Client", render: (r) => r.persons ? `${r.persons.first_name} ${r.persons.last_name}` : "—" },
        { label: "Code", render: (r) => <Badge text={r.service_code_definitions?.code || "?"} color={CB.blue} /> },
        { label: "In", render: (r) => formatTime(r.clock_in_at) },
        { label: "Out", render: (r) => formatTime(r.clock_out_at) },
        { label: "GPS", render: (r) => {
          if (r.geofence_valid === true) return <Badge text="✓ Verified" color={CB.green} />;
          if (r.geofence_valid === false) return <Badge text="✗ Invalid" color={CB.red} />;
          const hasIn = r.clock_in_lat && r.clock_in_lng;
          const hasOut = r.clock_out_lat && r.clock_out_lng;
          if (hasIn || hasOut) {
            const label = hasIn && hasOut ? "In + Out" : hasIn ? "In only" : "Out only";
            return (
              <span title={hasIn ? `In: ${Number(r.clock_in_lat).toFixed(4)}, ${Number(r.clock_in_lng).toFixed(4)}${hasOut ? `\nOut: ${Number(r.clock_out_lat).toFixed(4)}, ${Number(r.clock_out_lng).toFixed(4)}` : ""}` : ""} style={{ cursor: "help" }}>
                <Badge text={`📍 ${label}`} color={CB.teal} />
              </span>
            );
          }
          return <Badge text="No GPS" color={CB.textLight} />;
        }},
        { label: "Status", render: (r) => {
          if (!r.clock_out_at) return (
            <button onClick={(e) => { e.stopPropagation(); handleClockOut(r.id); }} disabled={clockingOut === r.id} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
              borderRadius: 8, border: "none", background: CB.red, color: CB.white,
              fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
            }}>
              {clockingOut === r.id ? <Spinner size={12} color={CB.white} /> : icons.stop({ size: 13, color: CB.white })} Clock Out
            </button>
          );
          return <Badge text="Completed" color={CB.green} />;
        }},
      ];

      return (
        <div>
          <PageHeader title="EVV" subtitle="GPS clock in/out for all 9 EVV-required codes with geofence validation"
            action={<PrimaryButton onClick={() => setShowClockIn(true)} color={CB.blue}>{icons.play({ size: 16 })} Clock In</PrimaryButton>}
          />

          {/* Active sessions banner */}
          {activeSessions.length > 0 && (
            <div style={{
              background: `linear-gradient(135deg, ${CB.blue}08, ${CB.teal}08)`,
              border: `1px solid ${CB.blue}20`, borderRadius: 14, padding: "16px 20px",
              marginBottom: 20, animation: "fadeIn 0.3s ease",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: CB.green, animation: "pulse 2s infinite" }} />
                <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{activeSessions.length} Active Session{activeSessions.length > 1 ? "s" : ""}</span>
              </div>
              {activeSessions.map(s => (
                <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0" }}>
                  <span style={{ fontSize: 13, color: CB.text }}>
                    {s.staff?.first_name} {s.staff?.last_name} → {s.persons?.first_name} {s.persons?.last_name} ({s.service_code_definitions?.code}) — clocked in {formatTime(s.clock_in_at)}
                  </span>
                  <button onClick={() => handleClockOut(s.id)} disabled={clockingOut === s.id} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "7px 14px",
                    borderRadius: 8, border: "none", background: CB.red, color: CB.white,
                    fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                  }}>
                    {clockingOut === s.id ? <Spinner size={12} color={CB.white} /> : icons.stop({ size: 14, color: CB.white })} Clock Out
                  </button>
                </div>
              ))}
            </div>
          )}

          <DataTable columns={columns} data={sessions} loading={loading} emptyMessage="No EVV sessions recorded" onRowClick={openEVVDetail} />

          {/* EVV Detail Modal */}
          <Modal open={!!viewing} onClose={() => setViewing(null)} title="EVV Session Detail" width={580}
            subtitle={viewing ? `${viewing.staff?.first_name || ""} ${viewing.staff?.last_name || ""} → ${viewing.persons?.first_name || ""} ${viewing.persons?.last_name || ""}` : ""}>
            {viewing && (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 20 }}>
                  <Badge text={viewing.service_code_definitions?.code || "?"} color={CB.blue} />
                  <Badge text={viewing.clock_out_at ? "Completed" : "Active"} color={viewing.clock_out_at ? CB.green : CB.amber} />
                  {!editingEVV && viewing.clock_out_at && (
                    <button onClick={() => setEditingEVV(true)} style={{
                      marginLeft: "auto", padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`,
                      fontSize: 12, fontWeight: 700, background: CB.white, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                    }}>{icons.edit({ size: 13 })} Edit</button>
                  )}
                </div>

                <RGrid cols={2} gap={12} style={{ marginBottom: 16 }}>
                  <div style={{ padding: 14, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Clock In</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{formatTime(viewing.clock_in_at)}</div>
                    <div style={{ fontSize: 12, color: CB.textMid }}>{formatDate(viewing.clock_in_at)}</div>
                  </div>
                  <div style={{ padding: 14, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Clock Out</div>
                    {editingEVV ? (
                      <input type="datetime-local" style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={evvEditForm.clock_out_at} onChange={e => setEvvEditForm(p => ({ ...p, clock_out_at: e.target.value }))} />
                    ) : (
                      <>
                        <div style={{ fontSize: 15, fontWeight: 700, color: viewing.clock_out_at ? CB.navy : CB.amber }}>{viewing.clock_out_at ? formatTime(viewing.clock_out_at) : "Still active"}</div>
                        {viewing.clock_out_at && <div style={{ fontSize: 12, color: CB.textMid }}>{formatDate(viewing.clock_out_at)}</div>}
                      </>
                    )}
                  </div>
                </RGrid>

                {/* Duration */}
                {viewing.clock_in_at && viewing.clock_out_at && (
                  <div style={{ padding: 14, background: `${CB.teal}06`, borderRadius: 10, border: `1px solid ${CB.teal}20`, marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.teal, textTransform: "uppercase", marginBottom: 4 }}>Session Duration</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: CB.navy }}>
                      {(() => {
                        const mins = Math.round((new Date(viewing.clock_out_at) - new Date(viewing.clock_in_at)) / 60000);
                        return `${Math.floor(mins / 60)}h ${mins % 60}m`;
                      })()}
                    </div>
                  </div>
                )}

                {/* GPS Data */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>GPS Coordinates</div>
                  <RGrid cols={2} gap={12}>
                    <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4 }}>Clock-In Location</div>
                      {viewing.clock_in_lat ? (
                        <div style={{ fontSize: 13, fontWeight: 600, color: CB.navy, fontFamily: "monospace" }}>
                          {Number(viewing.clock_in_lat).toFixed(6)}, {Number(viewing.clock_in_lng).toFixed(6)}
                        </div>
                      ) : <span style={{ fontSize: 13, color: CB.textLight }}>Not captured</span>}
                    </div>
                    <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4 }}>Clock-Out Location</div>
                      {viewing.clock_out_lat ? (
                        <div style={{ fontSize: 13, fontWeight: 600, color: CB.navy, fontFamily: "monospace" }}>
                          {Number(viewing.clock_out_lat).toFixed(6)}, {Number(viewing.clock_out_lng).toFixed(6)}
                        </div>
                      ) : <span style={{ fontSize: 13, color: CB.textLight }}>Not captured</span>}
                    </div>
                  </RGrid>
                </div>

                {/* Exceptions */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>Exception Notes</div>
                  {editingEVV ? (
                    <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={evvEditForm.exceptions}
                      onChange={e => setEvvEditForm(p => ({ ...p, exceptions: e.target.value }))}
                      placeholder="Note any EVV exceptions (missed clock-out, GPS failure, etc.)" />
                  ) : (
                    <div style={{ padding: "12px 16px", borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, fontSize: 13, color: viewing.exceptions ? CB.text : CB.textLight }}>
                      {viewing.exceptions || "No exceptions noted"}
                    </div>
                  )}
                </div>

                {editingEVV && (
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
                    <SecondaryButton onClick={() => setEditingEVV(false)}>Cancel</SecondaryButton>
                    <PrimaryButton onClick={saveEVVEdit} loading={savingEVV}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                  </div>
                )}
              </div>
            )}
          </Modal>

          {/* Clock-in Modal */}
          <Modal open={showClockIn} onClose={() => { setShowClockIn(false); setClientEvvAuths([]); }} title="Clock In" subtitle="GPS coordinates will be captured automatically">
            <FormField label="Staff Member" required>
              <select style={fieldStyle} value={clockForm.staff_id} onChange={e => setClockForm(p => ({ ...p, staff_id: e.target.value }))}>
                <option value="">Select staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required>
              <select style={fieldStyle} value={clockForm.person_id} onChange={e => handleEvvClientChange(e.target.value)}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>
              <FormField label="Service Code (EVV)" required>
                <select style={fieldStyle} value={clockForm.service_code_id} onChange={e => setClockForm(p => ({ ...p, service_code_id: e.target.value }))}>
                  <option value="">{clockForm.person_id ? (evvCodesForDropdown.length > 0 ? "Select code..." : "No EVV auths for this client") : "Select client first..."}</option>
                  {evvCodesForDropdown.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                </select>
                {clockForm.person_id && clientEvvAuths.length > 0 && (
                  <div style={{ marginTop: 4, fontSize: 11, color: CB.teal, fontWeight: 600 }}>
                    {icons.checkCircle({ size: 11, color: CB.teal })} Showing {clientEvvAuths.length} authorized EVV code{clientEvvAuths.length !== 1 ? "s" : ""} for this client
                  </div>
                )}
                {clockForm.person_id && clientEvvAuths.length === 0 && (
                  <div style={{ marginTop: 4, fontSize: 11, color: CB.amber, fontWeight: 600 }}>
                    {icons.alertTriangle({ size: 11, color: CB.amber })} No EVV authorizations found — showing all EVV codes
                  </div>
                )}
              </FormField>

            {gpsStatus && (
              <div style={{
                display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
                borderRadius: 10, marginBottom: 16,
                background: gpsStatus === "found" ? "rgba(46,125,50,0.06)" : gpsStatus === "error" ? "rgba(229,57,53,0.06)" : "rgba(26,115,232,0.06)",
                border: `1px solid ${gpsStatus === "found" ? CB.green : gpsStatus === "error" ? CB.red : CB.blue}20`,
              }}>
                {gpsStatus === "locating" && <Spinner size={14} color={CB.blue} />}
                {gpsStatus === "found" && icons.checkCircle({ size: 16, color: CB.green })}
                {gpsStatus === "error" && icons.alertTriangle({ size: 16, color: CB.red })}
                <span style={{ fontSize: 13, fontWeight: 600, color: gpsStatus === "found" ? CB.green : gpsStatus === "error" ? CB.red : CB.blue }}>
                  {gpsStatus === "locating" ? "Acquiring GPS..." : gpsStatus === "found" ? "GPS location captured" : "GPS error — check permissions"}
                </span>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
              <SecondaryButton onClick={() => setShowClockIn(false)}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleClockIn} loading={clockingIn} color={CB.blue}>
                {icons.crosshair({ size: 16 })} Clock In with GPS
              </PrimaryButton>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 7: COMPLIANCE DASHBOARD — Real-time audit readiness
    // ═══════════════════════════════════════════════════════════════
    function CompliancePage() {
      const [loading, setLoading] = useState(true);
      const [scores, setScores] = useState(null);
      const [issues, setIssues] = useState([]);
      const [tab, setTab] = useState("audit");
      const perms = usePermissions();

      useEffect(() => { runAudit(); }, []);

      const runAudit = async () => {
        setLoading(true);
        try {
          const [staffRes, clientRes, trainingRes, topicRes, authRes, noteRes, evvRes] = await Promise.all([
            supabase.from("staff").select("id, first_name, last_name, role, hire_date, is_active").eq("is_active", true),
            supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true),
            supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at"),
            supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification"),
            supabase.from("person_service_authorizations").select("id, person_id, service_code_id, authorized_units, used_units, end_date, service_code_definitions(code)"),
            supabase.from("service_notes").select("id, person_id, service_code_id, service_date, status").order("service_date", { ascending: false }).limit(500),
            supabase.from("evv_sessions").select("id, staff_id, person_id, clock_in_at, clock_out_at, clock_in_lat, clock_in_lng, geofence_valid").order("clock_in_at", { ascending: false }).limit(200),
          ]);

          const staff = staffRes.data || [];
          const clients = clientRes.data || [];
          const trainings = trainingRes.data || [];
          const topics = topicRes.data || [];
          const auths = authRes.data || [];
          const notes = noteRes.data || [];
          const evvSessions = evvRes.data || [];
          const now = new Date();
          const flaggedIssues = [];

          // ── TRAINING COMPLIANCE ──
          const requiredTopics = topics.filter(t => t.deadline_days || t.renewal_months);
          let trainingComplete = 0, trainingTotal = 0;
          staff.forEach(s => {
            const hireDate = s.hire_date ? new Date(s.hire_date + "T00:00:00") : null;
            requiredTopics.forEach(topic => {
              trainingTotal++;
              const completion = trainings.find(t => t.staff_id === s.id && t.training_topic_id === topic.id);
              if (completion) {
                if (completion.expires_at && new Date(completion.expires_at) < now) {
                  flaggedIssues.push({ severity: "high", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" expired ${new Date(completion.expires_at).toLocaleDateString()}` });
                } else {
                  trainingComplete++;
                }
              } else {
                if (hireDate && topic.deadline_days) {
                  const deadline = new Date(hireDate);
                  deadline.setDate(deadline.getDate() + topic.deadline_days);
                  if (now > deadline) {
                    flaggedIssues.push({ severity: "high", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" overdue (due ${deadline.toLocaleDateString()})` });
                  } else {
                    const daysLeft = Math.ceil((deadline - now) / (1000*60*60*24));
                    if (daysLeft <= 14) {
                      flaggedIssues.push({ severity: "medium", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" due in ${daysLeft} days` });
                    }
                  }
                }
              }
            });
          });
          const trainingScore = trainingTotal > 0 ? Math.round((trainingComplete / trainingTotal) * 100) : 100;

          // ── AUTHORIZATION STATUS ──
          let authActive = 0, authTotal = auths.length;
          auths.forEach(a => {
            const expired = a.end_date && new Date(a.end_date + "T00:00:00") < now;
            const exhausted = a.used_units >= a.authorized_units;
            if (expired) {
              flaggedIssues.push({ severity: "high", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth expired for client (exp ${new Date(a.end_date + "T00:00:00").toLocaleDateString()})` });
            } else if (exhausted) {
              flaggedIssues.push({ severity: "medium", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth — all ${a.authorized_units} units used` });
            } else {
              authActive++;
              if (a.authorized_units && a.used_units / a.authorized_units > 0.8) {
                flaggedIssues.push({ severity: "low", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth — ${Math.round((a.used_units/a.authorized_units)*100)}% units used` });
              }
            }
          });
          const authScore = authTotal > 0 ? Math.round((authActive / authTotal) * 100) : 100;

          // ── SERVICE NOTE COVERAGE ──
          const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
          let docCovered = 0;
          clients.forEach(c => {
            const recentNotes = notes.filter(n => n.person_id === c.id && new Date(n.service_date + "T00:00:00") >= sevenDaysAgo);
            if (recentNotes.length > 0) { docCovered++; }
            else { flaggedIssues.push({ severity: "medium", category: "Documentation", message: `${c.first_name} ${c.last_name} — no service notes in the last 7 days` }); }
          });
          const docScore = clients.length > 0 ? Math.round((docCovered / clients.length) * 100) : 100;

          // ── EVV COMPLIANCE ──
          const recentEVV = evvSessions.filter(e => new Date(e.clock_in_at) >= sevenDaysAgo);
          let evvComplete = 0;
          recentEVV.forEach(e => {
            if (e.clock_out_at && e.clock_in_lat && e.clock_in_lng) { evvComplete++; }
            else {
              if (!e.clock_out_at) flaggedIssues.push({ severity: "high", category: "EVV", message: `Open EVV session (no clock-out) since ${new Date(e.clock_in_at).toLocaleDateString()}` });
              if (!e.clock_in_lat) flaggedIssues.push({ severity: "medium", category: "EVV", message: `Missing GPS on EVV session ${new Date(e.clock_in_at).toLocaleDateString()}` });
            }
          });
          const evvScore = recentEVV.length > 0 ? Math.round((evvComplete / recentEVV.length) * 100) : 100;

          const overall = Math.round((trainingScore * 0.3 + authScore * 0.2 + docScore * 0.25 + evvScore * 0.25));
          const severityOrder = { high: 0, medium: 1, low: 2 };
          flaggedIssues.sort((a, b) => severityOrder[a.severity] - severityOrder[b.severity]);

          setScores({ overall, trainingScore, authScore, docScore, evvScore, staffCount: staff.length, clientCount: clients.length, trainingTotal, trainingComplete });
          setIssues(flaggedIssues);
        } catch (e) { /* audit error */ }
        setLoading(false);
      };

      const ScoreRing = ({ score, size = 120 }) => {
        const radius = (size - 12) / 2;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (score / 100) * circumference;
        const color = score >= 80 ? CB.green : score >= 60 ? CB.amber : CB.red;
        return (
          <div style={{ textAlign: "center" }}>
            <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
              <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={CB.border} strokeWidth="8" />
              <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s ease" }} />
            </svg>
            <div style={{ marginTop: -size/2 - 14, marginBottom: size/2 - 30 }}>
              <div style={{ fontSize: size > 100 ? 32 : 22, fontWeight: 800, color: CB.navy }}>{score}%</div>
            </div>
          </div>
        );
      };

      const severityStyles = {
        high: { bg: "rgba(229,57,53,0.06)", border: `${CB.red}20`, color: CB.red, label: "CRITICAL" },
        medium: { bg: "rgba(245,127,23,0.06)", border: `${CB.amber}20`, color: CB.amber, label: "WARNING" },
        low: { bg: "rgba(26,115,232,0.06)", border: `${CB.blue}20`, color: CB.blue, label: "INFO" },
      };

      const deadlineSeverityColor = { critical: CB.red, high: CB.amber, medium: CB.blue };
      const deadlineCategories = [...new Set(SOW_DEADLINES.map(d => d.category))];
      const [dlFilter, setDlFilter] = useState("all");

      const filteredDeadlines = dlFilter === "all" ? SOW_DEADLINES : SOW_DEADLINES.filter(d => d.category === dlFilter);

      const CompTab = ({ value, label }) => (
        <button onClick={() => setTab(value)} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="Compliance Dashboard" subtitle="Real-time audit readiness — DHHS91172 SOW compliance scoring"
            action={
              <div style={{ display: "flex", gap: 8 }}>
                <SecondaryButton onClick={() => HopeHavenPDF.insuranceTracker()}>{icons.fileText({ size: 15 })} Insurance Tracker</SecondaryButton>
                <PrimaryButton onClick={runAudit} color={CB.navy}>{icons.refresh({ size: 16 })} Re-run Audit</PrimaryButton>
              </div>
            }
          />

          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <CompTab value="audit" label="Audit Scores" />
            <CompTab value="deadlines" label={`SOW Deadlines (${SOW_DEADLINES.length})`} />
          </div>

          {tab === "audit" && (
            <>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
              ) : scores && (
                <>
                  <RGrid cols={5} gap={18} style={{ marginBottom: 28 }}>
                    <div style={{
                      background: CB.white, borderRadius: 16, padding: "28px 20px",
                      border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                      display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeIn 0.5s ease",
                    }}>
                      <ScoreRing score={scores.overall} size={130} />
                      <div style={{ fontSize: 15, fontWeight: 800, color: CB.navy, marginTop: 12 }}>Overall</div>
                      <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>Audit Readiness</div>
                    </div>
                    {[
                      { score: scores.trainingScore, label: "Training", sub: `${scores.trainingComplete}/${scores.trainingTotal} complete` },
                      { score: scores.authScore, label: "Authorizations", sub: "Active & valid" },
                      { score: scores.docScore, label: "Documentation", sub: "Notes last 7 days" },
                      { score: scores.evvScore, label: "EVV", sub: "GPS + clock-out" },
                    ].map((item, i) => (
                      <div key={i} style={{
                        background: CB.white, borderRadius: 16, padding: "24px 16px",
                        border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                        display: "flex", flexDirection: "column", alignItems: "center",
                        animation: `fadeIn 0.5s ease ${0.05 * (i + 1)}s both`,
                      }}>
                        <ScoreRing score={item.score} size={90} />
                        <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginTop: 8 }}>{item.label}</div>
                        <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>{item.sub}</div>
                      </div>
                    ))}
                  </RGrid>

                  <div style={{
                    background: CB.white, borderRadius: 16, padding: 24,
                    border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                    animation: "fadeIn 0.5s ease 0.3s both",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>
                        {issues.length > 0 ? `${issues.length} Issue${issues.length > 1 ? "s" : ""} Found` : "All Clear"}
                      </h3>
                      <div style={{ display: "flex", gap: 8 }}>
                        {["high", "medium", "low"].map(sev => {
                          const count = issues.filter(i => i.severity === sev).length;
                          if (!count) return null;
                          const s = severityStyles[sev];
                          return <Badge key={sev} text={`${count} ${s.label}`} color={s.color} />;
                        })}
                      </div>
                    </div>
                    {issues.length === 0 ? (
                      <div style={{ textAlign: "center", padding: "32px 0", color: CB.green }}>
                        {icons.checkCircle({ size: 32, color: CB.green })}
                        <p style={{ marginTop: 12, fontSize: 15, fontWeight: 600 }}>All compliance checks passed</p>
                      </div>
                    ) : (
                      <div style={{ maxHeight: 400, overflowY: "auto" }}>
                        {issues.map((issue, i) => {
                          const s = severityStyles[issue.severity];
                          return (
                            <div key={i} style={{
                              display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
                              borderRadius: 10, background: s.bg, border: `1px solid ${s.border}`,
                              marginBottom: 6, animation: `fadeIn 0.3s ease ${i * 0.02}s both`,
                            }}>
                              <Badge text={s.label} color={s.color} />
                              <Badge text={issue.category} color={CB.navy} />
                              <span style={{ fontSize: 13, color: CB.text, flex: 1 }}>{issue.message}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </>
              )}
            </>
          )}

          {tab === "deadlines" && (
            <div style={{ animation: "fadeIn 0.4s ease" }}>
              {/* Category filter pills */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                <button onClick={() => setDlFilter("all")} style={{
                  padding: "7px 14px", borderRadius: 8, border: `1px solid ${dlFilter === "all" ? CB.navy : CB.border}`,
                  background: dlFilter === "all" ? CB.navy : CB.white, color: dlFilter === "all" ? CB.white : CB.textMid,
                  fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                }}>All ({SOW_DEADLINES.length})</button>
                {deadlineCategories.map(cat => {
                  const count = SOW_DEADLINES.filter(d => d.category === cat).length;
                  return (
                    <button key={cat} onClick={() => setDlFilter(cat)} style={{
                      padding: "7px 14px", borderRadius: 8, border: `1px solid ${dlFilter === cat ? CB.teal : CB.border}`,
                      background: dlFilter === cat ? `${CB.teal}10` : CB.white, color: dlFilter === cat ? CB.teal : CB.textMid,
                      fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>{cat} ({count})</button>
                  );
                })}
              </div>

              {/* Deadline cards */}
              <div style={{ display: "grid", gap: 10 }}>
                {filteredDeadlines.map((dl, i) => (
                  <div key={dl.id} style={{
                    display: "flex", alignItems: "flex-start", gap: 16, padding: "16px 20px",
                    background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`,
                    boxShadow: "0 1px 3px rgba(10,30,51,0.04)",
                    animation: `fadeIn 0.3s ease ${i * 0.015}s both`,
                  }}>
                    <div style={{
                      width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                      background: `${deadlineSeverityColor[dl.severity] || CB.blue}12`,
                      display: "flex", alignItems: "center", justifyContent: "center", marginTop: 2,
                    }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: deadlineSeverityColor[dl.severity] || CB.blue }}>{dl.id}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{dl.title}</span>
                        <Badge text={dl.category} color={CB.teal} />
                        <Badge text={dl.severity.toUpperCase()} color={deadlineSeverityColor[dl.severity] || CB.blue} />
                        {dl.recurring && <Badge text="Recurring" color={CB.textMid} />}
                      </div>
                      <p style={{ fontSize: 13, color: CB.textMid, lineHeight: 1.5, margin: 0 }}>{dl.description}</p>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: CB.navy }}>{dl.frequency}</div>
                      {dl.daysToComplete !== null && (
                        <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>
                          {dl.daysToComplete === 0 ? "Immediate" : `Within ${dl.daysToComplete}d`}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INCIDENT REPORTING — DHHS-compliant incident documentation
    // ═══════════════════════════════════════════════════════════════
    const INCIDENT_TYPES = [
      { value: "injury_client", label: "Client Injury" },
      { value: "injury_staff", label: "Staff Injury" },
      { value: "behavioral", label: "Behavioral Event" },
      { value: "medication_error", label: "Medication Error" },
      { value: "rights_violation", label: "Rights Violation / Restriction" },
      { value: "property_damage", label: "Property Damage" },
      { value: "abuse_neglect", label: "Abuse / Neglect Allegation" },
      { value: "elopement", label: "Elopement / Missing Person" },
      { value: "emergency", label: "Emergency (Police/Fire/EMS)" },
      { value: "death", label: "Death" },
      { value: "other", label: "Other" },
    ];

    const INCIDENT_SEVERITY = [
      { value: "low", label: "Low", color: "#2E7D32", desc: "Minor, no injury or minimal impact" },
      { value: "medium", label: "Medium", color: "#F57F17", desc: "Moderate impact, may need follow-up" },
      { value: "high", label: "High", color: "#E53935", desc: "Serious injury, rights issue, or pattern" },
      { value: "critical", label: "Critical", color: "#7B1FA2", desc: "Immediate danger, reportable to DHHS" },
    ];

    function IncidentsPage() {
      const { orgId, staffProfile, role } = useAuth();
      const { addToast } = useToast();
      const perms = usePermissions();
      const { isMobile } = useMobile();
      const [incidents, setIncidents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [clients, setClients] = useState([]);
      const [staffList, setStaffList] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [viewing, setViewing] = useState(null);
      const [filter, setFilter] = useState("all"); // all, open, closed

      const blankForm = {
        incident_type: "", severity: "", person_id: "", occurred_at: new Date().toISOString().slice(0, 16),
        location: "", description: "", immediate_actions: "", injuries_desc: "",
        witnesses: "", notifications_sent: "", status: "open",
      };
      const [form, setForm] = useState(blankForm);
      const [saving, setSaving] = useState(false);
      const [reviewNotes, setReviewNotes] = useState("");

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [incRes, clientRes, staffRes] = await Promise.all([
          supabase.from("incidents").select("*, persons(first_name, last_name), reporter:staff!incidents_reported_by_fkey(first_name, last_name), reviewer:staff!incidents_reviewed_by_fkey(first_name, last_name)").eq("org_id", orgId).order("occurred_at", { ascending: false }),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
        ]);
        setIncidents(incRes.data || []);
        setClients(clientRes.data || []);
        setStaffList(staffRes.data || []);
        setLoading(false);
      };

      const handleSubmit = async () => {
        if (!form.incident_type) return addToast("Select incident type", "error");
        if (!form.severity) return addToast("Select severity level", "error");
        if (!form.description.trim()) return addToast("Description is required", "error");
        setSaving(true);
        const payload = {
          org_id: orgId,
          incident_type: form.incident_type,
          severity: form.severity,
          person_id: form.person_id || null,
          occurred_at: form.occurred_at,
          location: form.location || null,
          description: form.description,
          immediate_actions: form.immediate_actions || null,
          injuries_desc: form.injuries_desc || null,
          witnesses: form.witnesses || null,
          notifications_sent: form.notifications_sent || null,
          reported_by: staffProfile?.id || null,
          status: "open",
        };
        const { error } = await supabase.from("incidents").insert(payload);
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Incident report filed", "success");
        setForm(blankForm);
        setShowForm(false);
        loadAll();
      };

      const updateStatus = async (id, status, reviewNotes) => {
        const update = { status, reviewed_by: staffProfile?.id, reviewed_at: new Date().toISOString() };
        if (reviewNotes) update.review_notes = reviewNotes;
        const { error } = await supabase.from("incidents").update(update).eq("id", id);
        if (error) return addToast(error.message, "error");
        addToast(`Incident ${status}`, "success");
        setViewing(null);
        loadAll();
      };

      const filtered = useMemo(() => {
        if (filter === "all") return incidents;
        if (filter === "open") return incidents.filter(i => i.status === "open" || i.status === "under_review");
        return incidents.filter(i => i.status === "closed" || i.status === "resolved");
      }, [incidents, filter]);

      const sevStyle = (sev) => INCIDENT_SEVERITY.find(s => s.value === sev) || INCIDENT_SEVERITY[0];
      const typeLabel = (t) => INCIDENT_TYPES.find(x => x.value === t)?.label || t;
      const statusColors = { open: CB.amber, under_review: CB.blue, resolved: CB.green, closed: CB.textLight };

      // ── Detail View ──
      if (viewing) {
        const inc = viewing;
        const sev = sevStyle(inc.severity);
        return (
          <div>
            <PageHeader title="Incident Report" subtitle={`#${inc.id?.slice(0, 8)} — Filed ${new Date(inc.created_at).toLocaleDateString()}`} action={
