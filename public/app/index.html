    function StaffOverviewTab({ staff }) {
      const fmtDate = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString() : null;
      const roleLabel = STAFF_ROLES.find(r => r.value === staff.role)?.label || staff.role?.replace(/_/g, " ") || "—";
      const tenure = staff.hire_date ? (() => {
        const days = Math.floor((new Date() - new Date(staff.hire_date + "T00:00:00")) / 86400000);
        if (days < 30) return `${days} days`;
        if (days < 365) return `${Math.floor(days / 30)} months`;
        return `${(days / 365).toFixed(1)} years`;
      })() : null;

      return (
        <div>
          <ProfileSection title="Contact">
            <ProfileField label="Email" value={staff.email} />
            <ProfileField label="Phone" value={staff.phone} />
          </ProfileSection>
          <ProfileSection title="Employment">
            <ProfileField label="Role" value={roleLabel} />
            <ProfileField label="Status" value={staff.is_active ? "Active" : "Inactive"} />
            <ProfileField label="Hire Date" value={fmtDate(staff.hire_date)} />
            <ProfileField label="Tenure" value={tenure} />
          </ProfileSection>
          <ProfileSection title="Personal">
            <ProfileField label="Date of Birth" value={fmtDate(staff.date_of_birth)} />
            <ProfileField label="Staff ID" value={staff.id?.slice(0, 8)} />
          </ProfileSection>
        </div>
      );
    }

    function StaffTrainingTab({ staffId, orgId }) {
      const [trainings, setTrainings] = useState([]);
      const [topics, setTopics] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const load = async () => {
        setLoading(true);
        setError(null);
        const [tRes, topRes] = await Promise.all([
          supabase.from("staff_trainings")
            .select("id, completed_at, expires_at, certificate_url, training_topic_definitions(id, topic_name, category, renewal_months, requires_certification)")
            .eq("staff_id", staffId)
            .order("completed_at", { ascending: false }),
          supabase.from("training_topic_definitions").select("id, topic_name, category, renewal_months, requires_certification").order("topic_name"),
        ]);
        if (tRes.error) { console.error("Trainings load error:", tRes.error); setError(tRes.error.message); }
        if (topRes.error) { console.error("Topics load error:", topRes.error); setError(topRes.error.message); }
        setTrainings(tRes.data || []);
        setTopics(topRes.data || []);
        setLoading(false);
      };

      useEffect(() => { load(); }, [staffId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;
      if (error) return <div style={{ padding: 30, background: `${CB.red}10`, borderRadius: 12, border: `1px solid ${CB.red}30`, color: CB.red, fontSize: 13 }}>Error loading training data: {error}</div>;

      // Build a map: for each topic, find the most recent completion for this staff
      const latestByTopic = {};
      trainings.forEach(t => {
        const topicId = t.training_topic_definitions?.id;
        if (!topicId) return;
        if (!latestByTopic[topicId] || new Date(t.completed_at) > new Date(latestByTopic[topicId].completed_at)) {
          latestByTopic[topicId] = t;
        }
      });

      const now = new Date();
      const rows = topics.map(topic => {
        const latest = latestByTopic[topic.id];
        const expires = latest?.expires_at ? new Date(latest.expires_at) : null;
        const daysToExpiry = expires ? Math.ceil((expires - now) / 86400000) : null;
        let status = "missing";
        if (latest) {
          if (!expires) status = "current";
          else if (daysToExpiry < 0) status = "expired";
          else if (daysToExpiry <= 30) status = "expiring";
          else status = "current";
        }
        return { topic, latest, daysToExpiry, status };
      });

      const counts = { current: 0, expiring: 0, expired: 0, missing: 0 };
      rows.forEach(r => counts[r.status]++);

      const statusColor = { current: CB.green, expiring: CB.amber, expired: CB.red, missing: CB.textLight };
      const statusLabel = { current: "Current", expiring: "Expiring Soon", expired: "Expired", missing: "Not Completed" };

      return (
        <div>
          {/* Summary strip */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
            {["current", "expiring", "expired", "missing"].map(s => (
              <div key={s} style={{
                padding: "14px 16px", borderRadius: 12, background: CB.white,
                border: `1px solid ${CB.border}`, textAlign: "center",
              }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: statusColor[s] }}>{counts[s]}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{statusLabel[s]}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>Training Status by Category</h3>
            <SecondaryButton onClick={load}>{icons.refresh({ size: 13 })} Refresh</SecondaryButton>
          </div>

          {rows.length === 0 ? (
            <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 13, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>
              No training topics defined yet. Set them up in the Training module.
            </div>
          ) : (() => {
            // Group rows by category using the global meta map
            const grouped = {};
            rows.forEach(r => {
              const cat = r.topic.category || "uncategorized";
              if (!grouped[cat]) grouped[cat] = [];
              grouped[cat].push(r);
            });
            const sortedCats = Object.keys(grouped).sort((a, b) => (getCategoryMeta(a).order || 99) - (getCategoryMeta(b).order || 99));

            return sortedCats.map((cat, i) => {
              const meta = getCategoryMeta(cat);
              const list = grouped[cat];
              const catCounts = { current: 0, expiring: 0, expired: 0, missing: 0 };
              list.forEach(r => catCounts[r.status]++);
              const catIssues = catCounts.expired + catCounts.missing;
              // Label includes inline status breakdown
              const catLabel = (
                <span>
                  {meta.label}
                  {catIssues > 0 && <span style={{ marginLeft: 8, fontSize: 11, fontWeight: 700, color: CB.red, background: `${CB.red}14`, padding: "2px 8px", borderRadius: 8 }}>{catIssues} {catIssues === 1 ? "issue" : "issues"}</span>}
                </span>
              );
              return (
                <CollapsibleTimeGroup key={cat} label={catLabel} count={list.length} defaultOpen={catIssues > 0 || i < 2} accentColor={meta.color}>
                  <div style={{ background: CB.white, borderRadius: 10, overflow: "hidden" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse" }}>
                      <thead>
                        <tr style={{ background: CB.cream }}>
                          <th style={{ padding: "9px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6 }}>Topic</th>
                          <th style={{ padding: "9px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6 }}>Status</th>
                          <th style={{ padding: "9px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6 }}>Last Completed</th>
                          <th style={{ padding: "9px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6 }}>Expires</th>
                        </tr>
                      </thead>
                      <tbody>
                        {list.map((r, ri) => (
                          <tr key={r.topic.id} style={{ borderBottom: ri < list.length - 1 ? `1px solid ${CB.border}` : "none" }}>
                            <td style={{ padding: "10px 14px", fontSize: 13, fontWeight: 600, color: CB.text }}>
                              {r.topic.topic_name}
                              {r.topic.requires_certification && <span style={{ marginLeft: 6, fontSize: 10, fontWeight: 700, color: CB.amber, background: `${CB.amber}12`, padding: "1px 6px", borderRadius: 4 }}>CERT</span>}
                            </td>
                            <td style={{ padding: "10px 14px" }}><Badge text={statusLabel[r.status]} color={statusColor[r.status]} /></td>
                            <td style={{ padding: "10px 14px", fontSize: 12, color: CB.textMid }}>
                              {r.latest?.completed_at ? new Date(r.latest.completed_at).toLocaleDateString() : <span style={{ color: CB.textLight, fontStyle: "italic" }}>—</span>}
                            </td>
                            <td style={{ padding: "10px 14px", fontSize: 12, color: r.status === "expired" ? CB.red : r.status === "expiring" ? CB.amber : CB.textMid, fontWeight: r.status === "expired" || r.status === "expiring" ? 600 : 400 }}>
                              {r.latest?.expires_at ? new Date(r.latest.expires_at).toLocaleDateString() : <span style={{ color: CB.textLight, fontStyle: "italic" }}>—</span>}
                              {r.daysToExpiry !== null && r.status === "expired" && <span style={{ marginLeft: 6, fontSize: 11 }}>({Math.abs(r.daysToExpiry)}d overdue)</span>}
                              {r.daysToExpiry !== null && r.status === "expiring" && <span style={{ marginLeft: 6, fontSize: 11 }}>({r.daysToExpiry}d)</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </CollapsibleTimeGroup>
              );
            });
          })()}
        </div>
      );
    }

    function StaffNotesTab({ staffId }) {
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        (async () => {
          // Try the OR query first: notes where this staff is primary OR in the co-staff array
          let { data, error } = await supabase.from("service_notes")
            .select("id, service_date, start_time, end_time, duration_minutes, status, staff_id, staff_ids, persons(first_name, last_name), service_code_definitions(code, name)")
            .or(`staff_id.eq.${staffId},staff_ids.cs.{${staffId}}`)
            .order("service_date", { ascending: false })
            .limit(500);

          // Fallback if staff_ids column doesn't exist yet — use plain staff_id filter
          if (error && /column .*staff_ids.* does not exist/i.test(error.message || "")) {
            const retry = await supabase.from("service_notes")
              .select("id, service_date, start_time, end_time, duration_minutes, status, staff_id, persons(first_name, last_name), service_code_definitions(code, name)")
              .eq("staff_id", staffId)
              .order("service_date", { ascending: false })
              .limit(500);
            data = retry.data;
          }

          // Mark notes where this staff is a co-staff rather than primary
          const rows = (data || []).map(n => ({
            ...n,
            is_co_staff: n.staff_id !== staffId && Array.isArray(n.staff_ids) && n.staff_ids.includes(staffId),
          }));
          setNotes(rows);
          setLoading(false);
        })();
      }, [staffId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;
      if (notes.length === 0) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>No service notes found for this staff member.</div>;

      // Group by year-month
      const grouped = {};
      notes.forEach(n => {
        if (!n.service_date) return;
        const d = new Date(n.service_date + "T00:00:00");
        const yearMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        const label = d.toLocaleString("en-US", { month: "long", year: "numeric" });
        if (!grouped[yearMonth]) grouped[yearMonth] = { label, notes: [] };
        grouped[yearMonth].notes.push(n);
      });
      const sortedKeys = Object.keys(grouped).sort().reverse();

      return (
        <div>
          <div style={{ marginBottom: 14, fontSize: 13, color: CB.textMid }}>
            <strong style={{ color: CB.navy }}>{notes.length}</strong> service notes total across {sortedKeys.length} months
          </div>
          {sortedKeys.map((key, idx) => (
            <CollapsibleTimeGroup key={key} label={grouped[key].label} count={grouped[key].notes.length} defaultOpen={idx === 0} accentColor={CB.teal}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {grouped[key].notes.map(n => (
                  <div key={n.id} style={{
                    padding: "10px 14px", borderRadius: 10, background: CB.cream,
                    border: `1px solid ${CB.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: CB.navy, minWidth: 80 }}>
                        {new Date(n.service_date + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" })}
                      </span>
                      {n.service_code_definitions?.code && <Badge text={n.service_code_definitions.code} color={CB.blue} />}
                      <span style={{ fontSize: 13, color: CB.text }}>{n.persons ? `${n.persons.first_name} ${n.persons.last_name}` : "—"}</span>
                      {n.duration_minutes && <span style={{ fontSize: 12, color: CB.textLight }}>{n.duration_minutes}min</span>}
                    </div>
                    <Badge text={n.status || "draft"} color={n.status === "approved" ? CB.green : n.status === "submitted" ? CB.blue : CB.amber} />
                  </div>
                ))}
              </div>
            </CollapsibleTimeGroup>
          ))}
        </div>
      );
    }

    function StaffProfilePage({ staffId, onNavigate, onBack }) {
      const [staff, setStaff] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState("overview");
      const [editOpen, setEditOpen] = useState(false);
      const [noteCount, setNoteCount] = useState(null);
      const [trainingCount, setTrainingCount] = useState(null);
      const { orgId } = useAuth();

      const loadStaff = async () => {
        setLoading(true);
        const { data } = await supabase.from("staff").select("*").eq("id", staffId).single();
        setStaff(data);
        setLoading(false);
        // Prefetch counts for tab badges
        const [nRes, tRes] = await Promise.all([
          supabase.from("service_notes").select("id", { count: "exact", head: true }).eq("staff_id", staffId),
          supabase.from("staff_trainings").select("id", { count: "exact", head: true }).eq("staff_id", staffId),
        ]);
        setNoteCount(nRes.count || 0);
        setTrainingCount(tRes.count || 0);
      };

      useEffect(() => { loadStaff(); }, [staffId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>;
      if (!staff) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight }}>Staff member not found. <button onClick={onBack} style={{ color: CB.teal, background: "none", border: "none", textDecoration: "underline", cursor: "pointer" }}>Back to Staff</button></div>;

      const tabs = [
        { key: "overview", label: "Overview", icon: icons.users, content: <StaffOverviewTab staff={staff} /> },
        { key: "training", label: "Training", icon: icons.book, count: trainingCount, content: <StaffTrainingTab staffId={staffId} orgId={orgId} /> },
        { key: "notes", label: "Service Notes", icon: icons.fileText, count: noteCount, content: <StaffNotesTab staffId={staffId} /> },
        { key: "documents", label: "Documents", icon: icons.folder || icons.fileText, content: (
          <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 20 }}>
            <DocumentsSection entityType="staff" entityId={staffId} orgId={orgId} entityData={staff} />
          </div>
        )},
      ];

      return (
        <>
          <ProfilePageShell
            entity={staff}
            entityType="staff"
            tabs={tabs}
            activeTab={activeTab}
            onTabChange={setActiveTab}
            onBack={onBack}
            onEdit={() => setEditOpen(true)}
          />
          <StaffForm open={editOpen} onClose={() => setEditOpen(false)} onSaved={loadStaff} editing={staff} />
        </>
      );
    }

    function ClientOverviewTab({ client }) {
      const fmtDate = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString() : null;
      const age = client.date_of_birth ? Math.floor((new Date() - new Date(client.date_of_birth + "T00:00:00")) / (365.25 * 86400000)) : null;
      const auths = client.person_service_authorizations || [];
      const [activity, setActivity] = useState([]);
      const [activityLoading, setActivityLoading] = useState(true);

      useEffect(() => {
        let alive = true;
        setActivityLoading(true);
        // Pull last 10 events from each relevant table, merge, sort, take top 15
        Promise.all([
          supabase.from("service_notes").select("id, service_date, service_code_definitions(code)").eq("person_id", client.id).order("service_date", { ascending: false }).limit(10),
          supabase.from("incidents").select("id, occurred_at, incident_type, severity").eq("person_id", client.id).order("occurred_at", { ascending: false }).limit(10),
          supabase.from("medication_logs").select("id, scheduled_date, scheduled_time, status, medications(medication_name)").eq("person_id", client.id).order("scheduled_date", { ascending: false }).limit(10),
        ]).then(([nRes, iRes, mRes]) => {
          if (!alive) return;
          const events = [];
          (nRes.data || []).forEach(n => events.push({
            kind: "note", date: n.service_date + "T00:00:00",
            label: `Service Note — ${n.service_code_definitions?.code || "?"}`,
            color: CB.blue, icon: icons.fileText,
          }));
          (iRes.data || []).forEach(i => events.push({
            kind: "incident", date: i.occurred_at,
            label: `Incident — ${String(i.incident_type || "").replace(/_/g, " ")}${i.severity ? ` (${i.severity})` : ""}`,
            color: i.severity === "critical" || i.severity === "high" ? CB.red : CB.amber,
            icon: icons.alertTriangle,
          }));
          (mRes.data || []).forEach(m => events.push({
            kind: "med", date: (m.scheduled_date + "T" + (m.scheduled_time || "00:00:00")),
            label: `Med Pass — ${m.medications?.medication_name || "?"} (${m.status || "?"})`,
            color: m.status === "missed" ? CB.red : m.status === "refused" ? CB.amber : CB.green,
            icon: icons.capsule,
          }));
          events.sort((a, b) => new Date(b.date) - new Date(a.date));
          setActivity(events.slice(0, 15));
          setActivityLoading(false);
        });
        return () => { alive = false; };
      }, [client.id]);

      return (
        <div>
          <ProfileSection title="Identity">
            <ProfileField label="Full Name" value={`${client.first_name} ${client.last_name}`} />
            <ProfileField label="Date of Birth" value={fmtDate(client.date_of_birth)} />
            <ProfileField label="Age" value={age !== null ? `${age} years` : null} />
            <ProfileField label="Medicaid #" value={client.medicaid_number} />
            <ProfileField label="Primary Language" value={client.primary_language} />
            <ProfileField label="Gender" value={client.gender} />
          </ProfileSection>

          {auths.length > 0 && (
            <div style={{ marginBottom: 20 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 12, textTransform: "uppercase", letterSpacing: 0.8 }}>Active Authorizations ({auths.length})</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {auths.map(a => {
                  const code = a.service_code_definitions?.code || "?";
                  const pct = a.authorized_units > 0 ? Math.min(100, (a.used_units / a.authorized_units) * 100) : 0;
                  const barColor = pct >= 90 ? CB.red : pct >= 75 ? CB.amber : CB.teal;
                  return (
                    <div key={a.id} style={{ padding: "12px 14px", borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}` }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 8, flexWrap: "wrap" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <Badge text={code} color={CB.blue} />
                          <span style={{ fontSize: 13, fontWeight: 600, color: CB.text }}>{a.used_units || 0} / {a.authorized_units} units</span>
                        </div>
                        <span style={{ fontSize: 11, color: CB.textLight }}>
                          {a.start_date ? fmtDate(a.start_date) : "—"} → {a.end_date ? fmtDate(a.end_date) : "—"}
                        </span>
                      </div>
                      <div style={{ height: 6, borderRadius: 3, background: CB.border, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: barColor, transition: "width 0.4s ease" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <ProfileSection title="Admission">
            <ProfileField label="Admission Date" value={fmtDate(client.admission_date)} />
            <ProfileField label="Status" value={client.is_active ? "Active" : "Inactive"} />
          </ProfileSection>

          {client.primary_diagnosis && (
            <ProfileSection title="Clinical">
              <ProfileField label="Primary Diagnosis" full value={client.primary_diagnosis} />
              <ProfileField label="Allergies" full value={client.allergies} />

          {/* Recent Activity feed */}
          <div style={{ marginBottom: 20 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 12, textTransform: "uppercase", letterSpacing: 0.8 }}>Recent Activity</h3>
            {activityLoading ? (
              <div style={{ padding: 30, textAlign: "center", background: CB.white, borderRadius: 12, border: `1px solid ${CB.border}` }}><Spinner size={18} /></div>

                    <div style={{ flex: 1, minWidth: 0 }}>

                    <span style={{ fontSize: 12, color: CB.textLight, whiteSpace: "nowrap" }}>
                      {new Date(a.date).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "2-digit" })}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );

    function ClientContextsTab({ clientId }) {
      const [memberships, setMemberships] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        setLoading(true);
        setError(null);
        supabase.from("service_delivery_context_members")
          .select("id, start_date, end_date, is_active, service_delivery_contexts(id, name, delivery_type, service_code_definitions(code, name), org_units(name))")
          .eq("person_id", clientId)
          .order("start_date", { ascending: false })
          .then(({ data, error: err }) => {
            if (err) {
              if (/relation .*service_delivery_context.* does not exist/i.test(err.message || "")) {
                setError("Service Contexts not configured yet. Run the v19.1 migration SQL, then define contexts in the Service Contexts page.");
              } else {
                setError(err.message);

            setMemberships(data || []);
            setLoading(false);
          });
      }, [clientId]);

      if (error) return <div style={{ padding: 20, background: `${CB.amber}10`, borderRadius: 12, border: `1px solid ${CB.amber}40`, color: CB.amber, fontSize: 13 }}>{error}</div>;
      if (memberships.length === 0) {

      const active = memberships.filter(m => m.is_active !== false && !m.end_date);

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>

    function ClientNotesTab({ clientId }) {
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        supabase.from("service_notes")
          .select("id, service_date, duration_minutes, status, staff!service_notes_staff_id_fkey(first_name, last_name), service_code_definitions(code, name)")
          .eq("person_id", clientId)
          .order("service_date", { ascending: false })
          .limit(1000)
          .then(({ data }) => { setNotes(data || []); setLoading(false); });
      }, [clientId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;
      if (notes.length === 0) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>No service notes found for this client.</div>;

      // Year → Month → notes
      const byYear = {};
      notes.forEach(n => {
        if (!n.service_date) return;
        const d = new Date(n.service_date + "T00:00:00");
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const monthLabel = d.toLocaleString("en-US", { month: "long" });
        if (!byYear[y]) byYear[y] = { months: {}, total: 0 };
        if (!byYear[y].months[m]) byYear[y].months[m] = { label: monthLabel, notes: [] };
        byYear[y].months[m].notes.push(n);
        byYear[y].total++;
      });
      const years = Object.keys(byYear).sort().reverse();

      return (
        <div>
          <div style={{ marginBottom: 14, fontSize: 13, color: CB.textMid }}>
            <strong style={{ color: CB.navy }}>{notes.length}</strong> total service notes across {years.length} {years.length === 1 ? "year" : "years"}
          </div>
          {years.map((y, yi) => (
            <CollapsibleTimeGroup key={y} label={y} count={byYear[y].total} defaultOpen={yi === 0} accentColor={CB.blue}>
              {Object.keys(byYear[y].months).sort().reverse().map((m, mi) => (
                <CollapsibleTimeGroup key={m} label={byYear[y].months[m].label} count={byYear[y].months[m].notes.length} defaultOpen={yi === 0 && mi === 0} accentColor={CB.teal}>

    function ClientMedicationsTab({ clientId }) {
      const [meds, setMeds] = useState([]);
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        setLoading(true);
        setError(null);
        Promise.all([
          supabase.from("medications").select("*").eq("person_id", clientId).order("medication_name"),
          // Real table is medication_logs — uses scheduled_date + scheduled_time, not passed_at
          supabase.from("medication_logs")
            .select("id, scheduled_date, scheduled_time, status, administered_at, notes, medications(medication_name, dosage), staff(first_name, last_name)")
            .eq("person_id", clientId)
            .order("scheduled_date", { ascending: false })
            .order("scheduled_time", { ascending: false })
            .limit(500),
        ]).then(([mRes, lRes]) => {
          if (mRes.error) console.error("Medications load error:", mRes.error);
          if (lRes.error) { console.error("Medication logs load error:", lRes.error); setError(lRes.error.message); }
          setMeds(mRes.data || []);
          setLogs(lRes.data || []);
          setLoading(false);
        });
      }, [clientId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;

      const activeMeds = meds.filter(m => m.is_active !== false);
      const statusColor = { given: CB.green, administered: CB.green, missed: CB.red, refused: CB.amber, held: CB.textMid, scheduled: CB.blue };

      return (
        <div>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Current Medications ({activeMeds.length})</h3>
          {activeMeds.length === 0 ? (
            <div style={{ padding: 30, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, marginBottom: 24 }}>
              No active medications on file.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
              {activeMeds.map(m => {
                const times = Array.isArray(m.schedule_times) ? m.schedule_times.join(", ") : m.schedule_times;
                return (
                  <div key={m.id} style={{
                    padding: "14px 16px", borderRadius: 12, background: CB.white,
                    border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{m.medication_name}</div>
                        <div style={{ fontSize: 13, color: CB.textMid, marginTop: 2 }}>
                          {m.dosage}
                          {m.route && ` • ${m.route}`}
                          {m.frequency && ` • ${m.frequency}`}
                          {times && ` • ${times}`}
                        </div>
                      </div>
                      {m.is_prn && <Badge text="PRN" color={CB.amber} />}
                    </div>
                    {m.indication && <div style={{ fontSize: 12, color: CB.textLight, marginTop: 6 }}>For: {m.indication}</div>}
                    {m.notes && <div style={{ fontSize: 12, color: CB.textLight, marginTop: 4, fontStyle: "italic" }}>{m.notes}</div>}
                  </div>
                );
              })}
            </div>
          )}

          <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Medication Pass Log ({logs.length})</h3>
          {error && <div style={{ padding: 20, background: `${CB.red}10`, borderRadius: 12, border: `1px solid ${CB.red}30`, color: CB.red, fontSize: 13, marginBottom: 16 }}>Error loading log: {error}</div>}
          {logs.length === 0 ? (
            <div style={{ padding: 30, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>
              No medication passes logged yet.
            </div>
          ) : (() => {
            // Group by year-month using scheduled_date
            const grouped = {};
            logs.forEach(p => {
              if (!p.scheduled_date) return;
              const d = new Date(p.scheduled_date + "T00:00:00");
              const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
              const label = d.toLocaleString("en-US", { month: "long", year: "numeric" });
              if (!grouped[key]) grouped[key] = { label, logs: [] };
              grouped[key].logs.push(p);
            });
            const keys = Object.keys(grouped).sort().reverse();
            return keys.map((k, i) => (
              <CollapsibleTimeGroup key={k} label={grouped[k].label} count={grouped[k].logs.length} defaultOpen={i === 0} accentColor={CB.teal}>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {grouped[k].logs.map(p => (
                    <div key={p.id} style={{
                      padding: "10px 14px", borderRadius: 10, background: CB.cream,
                      border: `1px solid ${CB.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: CB.navy }}>
                          {new Date(p.scheduled_date + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" })}
                          {p.scheduled_time && ` ${p.scheduled_time.slice(0, 5)}`}
                        </span>
                        <span style={{ fontSize: 13, color: CB.text }}>{p.medications?.medication_name} {p.medications?.dosage}</span>
                        {p.staff && <span style={{ fontSize: 12, color: CB.textMid }}>by {p.staff.first_name} {p.staff.last_name}</span>}
                      </div>
                      <Badge text={p.status || "scheduled"} color={statusColor[p.status] || CB.textLight} />
                    </div>
                  ))}
                </div>
              </CollapsibleTimeGroup>
            ));
          })()}
        </div>
      );
    }

    function ClientIncidentsTab({ clientId }) {
      const [incidents, setIncidents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        setLoading(true);
        setError(null);
        (async () => {
          const { data, error: err } = await supabase.from("incidents")
            .select("*")
            .eq("person_id", clientId)
            .order("occurred_at", { ascending: false })
            .limit(500);

          if (err) {
            console.error("[Incidents tab] Query error:", err);
            setError(err.message);
            setLoading(false);
            return;
          }

          const rows = data || [];

          // Enrich with reporter staff names client-side
          if (rows.length > 0) {
            const reporterIds = [...new Set(rows.map(r => r.reported_by).filter(Boolean))];
            if (reporterIds.length > 0) {
              const { data: staffData } = await supabase.from("staff")
                .select("id, first_name, last_name")
                .in("id", reporterIds);
              const staffMap = {};
              (staffData || []).forEach(s => { staffMap[s.id] = s; });
              rows.forEach(r => {
                if (r.reported_by && staffMap[r.reported_by]) r.reporter = staffMap[r.reported_by];
              });
            }
          }

          setIncidents(rows);
          setLoading(false);
        })();
      }, [clientId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;
      if (error) return <div style={{ padding: 20, background: `${CB.red}10`, borderRadius: 12, border: `1px solid ${CB.red}30`, color: CB.red, fontSize: 13 }}>Error loading incidents: {error}</div>;
      if (incidents.length === 0) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>No incidents recorded. That's a good thing.</div>;

      const severityColor = { low: CB.blue, moderate: CB.amber, high: "#E65100", critical: CB.red };

      // Group by year-month using occurred_at timestamp
      const grouped = {};
      incidents.forEach(inc => {
        if (!inc.occurred_at) return;
        const d = new Date(inc.occurred_at);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        const label = d.toLocaleString("en-US", { month: "long", year: "numeric" });
        if (!grouped[key]) grouped[key] = { label, items: [] };
        grouped[key].items.push(inc);
      });
      const keys = Object.keys(grouped).sort().reverse();

      return (
        <div>
          <div style={{ marginBottom: 14, fontSize: 13, color: CB.textMid }}>
            <strong style={{ color: CB.navy }}>{incidents.length}</strong> incident{incidents.length === 1 ? "" : "s"} on record across {keys.length} {keys.length === 1 ? "month" : "months"}
          </div>
          {keys.map((k, i) => (
            <CollapsibleTimeGroup key={k} label={grouped[k].label} count={grouped[k].items.length} defaultOpen={i === 0} accentColor={CB.amber}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {grouped[k].items.map(inc => {
                  const occurred = inc.occurred_at ? new Date(inc.occurred_at) : null;
                  return (
                    <div key={inc.id} style={{
                      padding: "12px 14px", borderRadius: 10, background: CB.cream,
                      border: `1px solid ${CB.border}`, borderLeft: `4px solid ${severityColor[inc.severity] || CB.textLight}`,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>
                            {occurred ? occurred.toLocaleDateString() : "—"}
                            {occurred && <span style={{ marginLeft: 6, fontWeight: 500, color: CB.textMid }}>{occurred.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</span>}
                          </span>
                          {inc.incident_type && <Badge text={String(inc.incident_type).replace(/_/g, " ")} color={CB.navy} />}
                          {inc.severity && <Badge text={inc.severity} color={severityColor[inc.severity] || CB.textLight} />}
                          {inc.status && <Badge text={inc.status} color={CB.textMid} />}
                        </div>
                        {inc.reporter && <span style={{ fontSize: 12, color: CB.textMid }}>Reported by {inc.reporter.first_name} {inc.reporter.last_name}</span>}
                      </div>
                      {inc.location && <div style={{ fontSize: 12, color: CB.textMid, marginBottom: 4 }}>{icons.mapPin({ size: 11, color: CB.textLight })} {inc.location}</div>}
                      {inc.description && <div style={{ fontSize: 13, color: CB.text, lineHeight: 1.5 }}>{inc.description}</div>}
                    </div>
                  );
                })}
              </div>
            </CollapsibleTimeGroup>
          ))}
        </div>
      );
    }

    function ClientGoalsTab({ clientId }) {
      const [goals, setGoals] = useState([]);

      const [error, setError] = useState(null);

      useEffect(() => {
        setLoading(true);
        setError(null);
        supabase.from("pcsp_goals")
          .select("*")
          .eq("person_id", clientId)
          .order("created_at", { ascending: false })
          .then(({ data, error: err }) => {
            if (err) { console.error("Goals load error:", err); setError(err.message); }
            setGoals(data || []);
            setLoading(false);
          });

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={24} /></div>;

      if (goals.length === 0) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>No PCSP goals on file. Add goals in the PCSP Goals module.</div>;

          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
              {active.map(g => (
                <div key={g.id} style={{ padding: "14px 16px", borderRadius: 12, background: CB.white, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow }}>

                    <Badge text={g.status || "active"} color={CB.blue} />

                  {g.target_date && <div style={{ fontSize: 12, color: CB.textLight }}>Target: {new Date(g.target_date + "T00:00:00").toLocaleDateString()}</div>}
                  {g.measurement_criteria && <div style={{ fontSize: 12, color: CB.textMid, marginTop: 6 }}>Measurement: {g.measurement_criteria}</div>}

          {done.length > 0 && (
            <>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Completed / Archived ({done.length})</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>

                      {g.domain && <Badge text={g.domain} color={CB.textLight} />}

                    </div>
                    <div style={{ fontSize: 13, color: CB.textMid }}>{g.goal_description || g.title || g.description || "(No description)"}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    function ClientProfilePage({ clientId, onNavigate, onBack }) {
      const [client, setClient] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState("overview");
      const [editOpen, setEditOpen] = useState(false);
      const [counts, setCounts] = useState({ notes: null, incidents: null, goals: null, meds: null });
      const { orgId } = useAuth();

      const loadClient = async () => {
        setLoading(true);
        const { data } = await supabase.from("persons")
          .select("*, person_service_authorizations(id, service_code_id, authorized_units, used_units, start_date, end_date, service_code_definitions(code))")
          .eq("id", clientId).single();
        setClient(data);
        setLoading(false);
        // Prefetch counts
        const [n, inc, g, m] = await Promise.all([
          supabase.from("service_notes").select("id", { count: "exact", head: true }).eq("person_id", clientId),
          supabase.from("incidents").select("id", { count: "exact", head: true }).eq("person_id", clientId),
          supabase.from("pcsp_goals").select("id", { count: "exact", head: true }).eq("person_id", clientId),
          supabase.from("medications").select("id", { count: "exact", head: true }).eq("person_id", clientId).eq("is_active", true),
        ]);
        setCounts({ notes: n.count || 0, incidents: inc.count || 0, goals: g.count || 0, meds: m.count || 0 });
      };

      useEffect(() => { loadClient(); }, [clientId]);

      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>;
      if (!client) return <div style={{ padding: 40, textAlign: "center", color: CB.textLight }}>Client not found. <button onClick={onBack} style={{ color: CB.teal, background: "none", border: "none", textDecoration: "underline", cursor: "pointer" }}>Back to Clients</button></div>;

      const tabs = [
        { key: "overview", label: "Overview", icon: icons.users, content: <ClientOverviewTab client={client} /> },
        { key: "goals", label: "PCSP Goals", icon: icons.crosshair, count: counts.goals, content: <ClientGoalsTab clientId={clientId} /> },
        { key: "medications", label: "Medications", icon: icons.capsule, count: counts.meds, content: <ClientMedicationsTab clientId={clientId} /> },
        { key: "notes", label: "Service Notes", icon: icons.fileText, count: counts.notes, content: <ClientNotesTab clientId={clientId} /> },
        { key: "incidents", label: "Incidents", icon: icons.alertTriangle, count: counts.incidents, content: <ClientIncidentsTab clientId={clientId} /> },
        { key: "contacts", label: "Contacts", icon: icons.heart, content: <ClientContactsTab client={client} /> },
        { key: "services", label: "Services", icon: icons.dashboard, content: <ClientContextsTab clientId={clientId} /> },
        { key: "documents", label: "Documents", icon: icons.fileText, content: (
          <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, padding: 20 }}>
            <DocumentsSection entityType="client" entityId={clientId} orgId={orgId} entityData={client} />
          </div>
        )},
      ];

      return (
        <>
          <ProfilePageShell
            entity={client}
            entityType="client"
            tabs={tabs}
            activeTab={activeTab}
            onTabChange={setActiveTab}
            onBack={onBack}
            onEdit={() => setEditOpen(true)}
          />
          <ClientForm open={editOpen} onClose={() => { setEditOpen(false); loadClient(); }} onSaved={loadClient} editing={client} />
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // v19.3 — COMPLIANCE ENFORCEMENT SETTINGS
    // Provider-configurable knobs for role permissions, training
    // competency, and person-specific training enforcement.
    // ═══════════════════════════════════════════════════════════════
    function EnforcementSettings() {
      const { orgId } = useAuth();
      const { addToast } = useToast();
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [tablesMissing, setTablesMissing] = useState(false);
      const [settings, setSettings] = useState({
        enforcement_role: "soft",
        enforcement_training: "warn",
        enforcement_person_specific: "warn",
      });

      useEffect(() => { loadSettings(); }, [orgId]);

      const loadSettings = async () => {
        if (!orgId) { setLoading(false); return; }
        setLoading(true);
        const { data, error } = await supabase
          .from("organizations")
          .select("enforcement_role, enforcement_training, enforcement_person_specific")
          .eq("id", orgId).maybeSingle();
        if (error && /column .*enforcement_.* does not exist/i.test(error.message || "")) {
          setTablesMissing(true);
        } else if (data) {
          setSettings({
            enforcement_role: data.enforcement_role || "soft",

      return (
