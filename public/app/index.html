          if (r.geofence_valid === false) return <Badge text="✗ Invalid" color={CB.red} />;
          const hasIn = r.clock_in_lat && r.clock_in_lng;
          const hasOut = r.clock_out_lat && r.clock_out_lng;
          if (hasIn || hasOut) {
            const label = hasIn && hasOut ? "In + Out" : hasIn ? "In only" : "Out only";
            return (
              <span title={hasIn ? `In: ${Number(r.clock_in_lat).toFixed(4)}, ${Number(r.clock_in_lng).toFixed(4)}${hasOut ? `\nOut: ${Number(r.clock_out_lat).toFixed(4)}, ${Number(r.clock_out_lng).toFixed(4)}` : ""}` : ""} style={{ cursor: "help" }}>
                <Badge text={`📍 ${label}`} color={CB.teal} />
              </span>
            );
          }
          return <Badge text="No GPS" color={CB.textLight} />;
        }},
        { label: "Status", render: (r) => {
          if (!r.clock_out_at) return (
            <button onClick={(e) => { e.stopPropagation(); handleClockOut(r.id); }} disabled={clockingOut === r.id} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
              borderRadius: 8, border: "none", background: CB.red, color: CB.white,
              fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
            }}>
              {clockingOut === r.id ? <Spinner size={12} color={CB.white} /> : icons.stop({ size: 13, color: CB.white })} Clock Out
            </button>
          );
          return <Badge text="Completed" color={CB.green} />;
        }},
      ];

      return (
        <div>
          <PageHeader title="EVV" subtitle="GPS clock in/out for all 9 EVV-required codes with geofence validation"
            action={<PrimaryButton onClick={() => setShowClockIn(true)} color={CB.blue}>{icons.play({ size: 16 })} Clock In</PrimaryButton>}
          />

          {/* Active sessions banner */}
          {activeSessions.length > 0 && (
            <div style={{
              background: `linear-gradient(135deg, ${CB.blue}08, ${CB.teal}08)`,
              border: `1px solid ${CB.blue}20`, borderRadius: 14, padding: "16px 20px",
              marginBottom: 20, animation: "fadeIn 0.3s ease",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: CB.green, animation: "pulse 2s infinite" }} />
                <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{activeSessions.length} Active Session{activeSessions.length > 1 ? "s" : ""}</span>
              </div>
              {activeSessions.map(s => (
                <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0" }}>
                  <span style={{ fontSize: 13, color: CB.text }}>
                    {s.staff?.first_name} {s.staff?.last_name} → {s.persons?.first_name} {s.persons?.last_name} ({s.service_code_definitions?.code}) — clocked in {formatTime(s.clock_in_at)}
                  </span>
                  <button onClick={() => handleClockOut(s.id)} disabled={clockingOut === s.id} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "7px 14px",
                    borderRadius: 8, border: "none", background: CB.red, color: CB.white,
                    fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                  }}>
                    {clockingOut === s.id ? <Spinner size={12} color={CB.white} /> : icons.stop({ size: 14, color: CB.white })} Clock Out
                  </button>
                </div>
              ))}
            </div>
          )}

          <DataTable columns={columns} data={sessions} loading={loading} emptyMessage="No EVV sessions recorded" onRowClick={openEVVDetail} />

          {/* EVV Detail Modal */}
          <Modal open={!!viewing} onClose={() => setViewing(null)} title="EVV Session Detail" width={680}
            subtitle={viewing ? `${viewing.staff?.first_name || ""} ${viewing.staff?.last_name || ""} → ${viewing.persons?.first_name || ""} ${viewing.persons?.last_name || ""}` : ""}>
            {viewing && (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 20 }}>
                  <Badge text={viewing.service_code_definitions?.code || "?"} color={CB.blue} />
                  <Badge text={viewing.clock_out_at ? "Completed" : "Active"} color={viewing.clock_out_at ? CB.green : CB.amber} />
                  {!editingEVV && viewing.clock_out_at && (
                    <button onClick={() => setEditingEVV(true)} style={{
                      marginLeft: "auto", padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`,
                      fontSize: 12, fontWeight: 700, background: CB.white, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                    }}>{icons.edit({ size: 13 })} Edit</button>
                  )}
                </div>

                <RGrid cols={2} gap={12} style={{ marginBottom: 16 }}>
                  <div style={{ padding: 14, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Clock In</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{formatTime(viewing.clock_in_at)}</div>
                    <div style={{ fontSize: 12, color: CB.textMid }}>{formatDate(viewing.clock_in_at)}</div>
                  </div>
                  <div style={{ padding: 14, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Clock Out</div>
                    {editingEVV ? (
                      <input type="datetime-local" style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={evvEditForm.clock_out_at} onChange={e => setEvvEditForm(p => ({ ...p, clock_out_at: e.target.value }))} />
                    ) : (
                      <>
                        <div style={{ fontSize: 15, fontWeight: 700, color: viewing.clock_out_at ? CB.navy : CB.amber }}>{viewing.clock_out_at ? formatTime(viewing.clock_out_at) : "Still active"}</div>
                        {viewing.clock_out_at && <div style={{ fontSize: 12, color: CB.textMid }}>{formatDate(viewing.clock_out_at)}</div>}
                      </>
                    )}
                  </div>
                </RGrid>

                {/* Duration */}
                {viewing.clock_in_at && viewing.clock_out_at && (
                  <div style={{ padding: 14, background: `${CB.teal}06`, borderRadius: 10, border: `1px solid ${CB.teal}20`, marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.teal, textTransform: "uppercase", marginBottom: 4 }}>Session Duration</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: CB.navy }}>
                      {(() => {
                        const mins = Math.round((new Date(viewing.clock_out_at) - new Date(viewing.clock_in_at)) / 60000);
                        return `${Math.floor(mins / 60)}h ${mins % 60}m`;
                      })()}
                    </div>
                  </div>
                )}

                {/* GPS Data */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>GPS Coordinates</div>
                  <RGrid cols={2} gap={12}>
                    <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4 }}>Clock-In Location</div>
                      {viewing.clock_in_lat ? (
                        <div style={{ fontSize: 13, fontWeight: 600, color: CB.navy, fontFamily: "monospace" }}>
                          {Number(viewing.clock_in_lat).toFixed(6)}, {Number(viewing.clock_in_lng).toFixed(6)}
                        </div>
                      ) : <span style={{ fontSize: 13, color: CB.textLight }}>Not captured</span>}
                    </div>
                    <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4 }}>Clock-Out Location</div>
                      {viewing.clock_out_lat ? (
                        <div style={{ fontSize: 13, fontWeight: 600, color: CB.navy, fontFamily: "monospace" }}>
                          {Number(viewing.clock_out_lat).toFixed(6)}, {Number(viewing.clock_out_lng).toFixed(6)}
                        </div>
                      ) : <span style={{ fontSize: 13, color: CB.textLight }}>Not captured</span>}
                    </div>
                  </RGrid>
                </div>

                {/* Exceptions */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>Exception Notes</div>
                  {editingEVV ? (
                    <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={evvEditForm.exceptions}
                      onChange={e => setEvvEditForm(p => ({ ...p, exceptions: e.target.value }))}
                      placeholder="Note any EVV exceptions (missed clock-out, GPS failure, etc.)" />
                  ) : (
                    <div style={{ padding: "12px 16px", borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, fontSize: 13, color: viewing.exceptions ? CB.text : CB.textLight }}>
                      {viewing.exceptions || "No exceptions noted"}
                    </div>
                  )}
                </div>

                {editingEVV && (
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
                    <SecondaryButton onClick={() => setEditingEVV(false)}>Cancel</SecondaryButton>
                    <PrimaryButton onClick={saveEVVEdit} loading={savingEVV}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                  </div>
                )}
              </div>
            )}
          </Modal>

          {/* Clock-in Modal */}
          <Modal open={showClockIn} onClose={() => { setShowClockIn(false); setClientEvvAuths([]); setClientContexts([]); }} title="Clock In" subtitle="GPS coordinates will be captured automatically">
            <FormField label="Staff Member" required>
              <select style={fieldStyle} value={clockForm.staff_id} onChange={e => setClockForm(p => ({ ...p, staff_id: e.target.value }))}>
                <option value="">Select staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required>
              <select style={fieldStyle} value={clockForm.person_id} onChange={e => handleEvvClientChange(e.target.value)}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>

            {/* v19.2 — Service Context picker (shown only when client has active context memberships) */}
            {clockForm.person_id && clientContexts.length > 0 && (
              <FormField label={`Service Context (${clientContexts.length} available)`}>
                <select style={fieldStyle} value={clockForm.context_id} onChange={e => handleEvvContextChange(e.target.value)}>
                  <option value="">(no context — link by client only)</option>
                  {clientContexts.map(c => {
                    const meta = DELIVERY_TYPE_META[c.delivery_type] || {};
                    const codeLabel = c.service_code_definitions?.code ? ` · ${c.service_code_definitions.code}` : "";
                    return <option key={c.id} value={c.id}>{c.name} ({meta.label || c.delivery_type}{codeLabel})</option>;
                  })}
                </select>
                {clockForm.context_id && (
                  <div style={{ marginTop: 4, fontSize: 11, color: CB.teal, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                    {icons.checkCircle({ size: 11, color: CB.teal })}
                    Context will be linked to this EVV session{clientContexts.find(c => c.id === clockForm.context_id)?.service_code_definitions?.evv_required ? " — service code auto-filled" : ""}
                  </div>
                )}
              </FormField>
            )}

              <FormField label="Service Code (EVV)" required>
                <select style={fieldStyle} value={clockForm.service_code_id} onChange={e => setClockForm(p => ({ ...p, service_code_id: e.target.value }))}>
                  <option value="">{clockForm.person_id ? (evvCodesForDropdown.length > 0 ? "Select code..." : "No EVV auths for this client") : "Select client first..."}</option>
                  {evvCodesForDropdown.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                </select>
                {clockForm.person_id && clientEvvAuths.length > 0 && (
                  <div style={{ marginTop: 4, fontSize: 11, color: CB.teal, fontWeight: 600 }}>
                    {icons.checkCircle({ size: 11, color: CB.teal })} Showing {clientEvvAuths.length} authorized EVV code{clientEvvAuths.length !== 1 ? "s" : ""} for this client
                  </div>
                )}
                {clockForm.person_id && clientEvvAuths.length === 0 && (
                  <div style={{ marginTop: 4, fontSize: 11, color: CB.amber, fontWeight: 600 }}>
                    {icons.alertTriangle({ size: 11, color: CB.amber })} No EVV authorizations found — showing all EVV codes
                  </div>
                )}
              </FormField>

            {gpsStatus && (
              <div style={{
                display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
                borderRadius: 10, marginBottom: 16,
                background: gpsStatus === "found" ? "rgba(46,125,50,0.06)" : gpsStatus === "error" ? "rgba(229,57,53,0.06)" : "rgba(26,115,232,0.06)",
                border: `1px solid ${gpsStatus === "found" ? CB.green : gpsStatus === "error" ? CB.red : CB.blue}20`,
              }}>
                {gpsStatus === "locating" && <Spinner size={14} color={CB.blue} />}
                {gpsStatus === "found" && icons.checkCircle({ size: 16, color: CB.green })}
                {gpsStatus === "error" && icons.alertTriangle({ size: 16, color: CB.red })}
                <span style={{ fontSize: 13, fontWeight: 600, color: gpsStatus === "found" ? CB.green : gpsStatus === "error" ? CB.red : CB.blue }}>
                  {gpsStatus === "locating" ? "Acquiring GPS..." : gpsStatus === "found" ? "GPS location captured" : "GPS error — check permissions"}
                </span>
              </div>
            )}

            {/* v19.3 — competency warning */}
            {evvCompetency && evvCompetency.results.length > 0 && !evvCompetency.isFullyQualified && (
              <div style={{
                background: evvCompetency.complete.length === 0 ? `${CB.red}10` : `${CB.amber}12`,
                border: `1px solid ${evvCompetency.complete.length === 0 ? CB.red : CB.amber}40`,
                borderLeft: `3px solid ${evvCompetency.complete.length === 0 ? CB.red : CB.amber}`,
                borderRadius: 8, padding: "10px 14px", marginTop: 12, marginBottom: 4, display: "flex", gap: 10, alignItems: "flex-start",
              }}>
                <div style={{ paddingTop: 1, flexShrink: 0 }}>
                  {icons.alertTriangle({ size: 16, color: evvCompetency.complete.length === 0 ? CB.red : CB.amber })}
                </div>
                <div style={{ flex: 1, fontSize: 12 }}>
                  <div style={{ fontWeight: 700, color: evvCompetency.complete.length === 0 ? CB.red : CB.amber, marginBottom: 3 }}>
                    Training gap — {evvCompetency.complete.length}/{evvCompetency.results.length} decks complete
                  </div>
                  <div style={{ color: CB.textMid, lineHeight: 1.5 }}>
                    Missing: {evvCompetency.missing.map(m => m.deck.name).join(", ") || "none"}
                    {evvCompetency.expired.length > 0 && <><br />Expired: {evvCompetency.expired.map(e => e.deck.name).join(", ")}</>}
                  </div>
                </div>
              </div>
            )}
            {evvCompetency && evvCompetency.results.length > 0 && evvCompetency.isFullyQualified && (
              <div style={{
                background: `${CB.green}10`,
                border: `1px solid ${CB.green}40`,
                borderLeft: `3px solid ${CB.green}`,
                borderRadius: 8, padding: "8px 14px", marginTop: 12, marginBottom: 4, display: "flex", gap: 10, alignItems: "center", fontSize: 12,
              }}>
                {icons.checkCircle({ size: 14, color: CB.green })}
                <span style={{ color: CB.green, fontWeight: 700 }}>Fully qualified</span>
                <span style={{ color: CB.textMid }}>— all {evvCompetency.results.length} required decks complete</span>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
              <SecondaryButton onClick={() => setShowClockIn(false)}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleClockIn} loading={clockingIn} color={CB.blue}>
                {icons.crosshair({ size: 16 })} Clock In with GPS
              </PrimaryButton>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 7: COMPLIANCE DASHBOARD — Real-time audit readiness
    // ═══════════════════════════════════════════════════════════════
    function CompliancePage() {
      const [loading, setLoading] = useState(true);
      const [scores, setScores] = useState(null);
      const [issues, setIssues] = useState([]);
      const [tab, setTab] = useState("audit");
      const perms = usePermissions();

      useEffect(() => { runAudit(); }, []);

      const runAudit = async () => {
        setLoading(true);
        try {
          const [staffRes, clientRes, trainingRes, topicRes, authRes, noteRes, evvRes] = await Promise.all([
            supabase.from("staff").select("id, first_name, last_name, role, hire_date, is_active").eq("is_active", true),
            supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true),
            supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at"),
            supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification"),
            supabase.from("person_service_authorizations").select("id, person_id, service_code_id, authorized_units, used_units, end_date, service_code_definitions(code)"),
            supabase.from("service_notes").select("id, person_id, service_code_id, service_date, status").order("service_date", { ascending: false }).limit(500),
            supabase.from("evv_sessions").select("id, staff_id, person_id, clock_in_at, clock_out_at, clock_in_lat, clock_in_lng, geofence_valid").order("clock_in_at", { ascending: false }).limit(200),
          ]);

          const staff = staffRes.data || [];
          const clients = clientRes.data || [];
          const trainings = trainingRes.data || [];
          const topics = topicRes.data || [];
          const auths = authRes.data || [];
          const notes = noteRes.data || [];
          const evvSessions = evvRes.data || [];
          const now = new Date();
          const flaggedIssues = [];

          // ── TRAINING COMPLIANCE ──
          const requiredTopics = topics.filter(t => t.deadline_days || t.renewal_months);
          let trainingComplete = 0, trainingTotal = 0;
          staff.forEach(s => {
            const hireDate = s.hire_date ? new Date(s.hire_date + "T00:00:00") : null;
            requiredTopics.forEach(topic => {
              trainingTotal++;
              const completion = trainings.find(t => t.staff_id === s.id && t.training_topic_id === topic.id);
              if (completion) {
                if (completion.expires_at && new Date(completion.expires_at) < now) {
                  flaggedIssues.push({ severity: "high", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" expired ${new Date(completion.expires_at).toLocaleDateString()}` });
                } else {
                  trainingComplete++;
                }
              } else {
                if (hireDate && topic.deadline_days) {
                  const deadline = new Date(hireDate);
                  deadline.setDate(deadline.getDate() + topic.deadline_days);
                  if (now > deadline) {
                    flaggedIssues.push({ severity: "high", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" overdue (due ${deadline.toLocaleDateString()})` });
                  } else {
                    const daysLeft = Math.ceil((deadline - now) / (1000*60*60*24));
                    if (daysLeft <= 14) {
                      flaggedIssues.push({ severity: "medium", category: "Training", message: `${s.first_name} ${s.last_name} — "${topic.topic_name}" due in ${daysLeft} days` });
                    }
                  }
                }
              }
            });
          });
          const trainingScore = trainingTotal > 0 ? Math.round((trainingComplete / trainingTotal) * 100) : 100;

          // ── AUTHORIZATION STATUS ──
          let authActive = 0, authTotal = auths.length;
          auths.forEach(a => {
            const expired = a.end_date && new Date(a.end_date + "T00:00:00") < now;
            const exhausted = a.used_units >= a.authorized_units;
            if (expired) {
              flaggedIssues.push({ severity: "high", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth expired for client (exp ${new Date(a.end_date + "T00:00:00").toLocaleDateString()})` });
            } else if (exhausted) {
              flaggedIssues.push({ severity: "medium", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth — all ${a.authorized_units} units used` });
            } else {
              authActive++;
              if (a.authorized_units && a.used_units / a.authorized_units > 0.8) {
                flaggedIssues.push({ severity: "low", category: "Authorizations", message: `${a.service_code_definitions?.code || "?"} auth — ${Math.round((a.used_units/a.authorized_units)*100)}% units used` });
              }
            }
          });
          const authScore = authTotal > 0 ? Math.round((authActive / authTotal) * 100) : 100;

          // ── SERVICE NOTE COVERAGE ──
          const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
          let docCovered = 0;
          clients.forEach(c => {
            const recentNotes = notes.filter(n => n.person_id === c.id && new Date(n.service_date + "T00:00:00") >= sevenDaysAgo);
            if (recentNotes.length > 0) { docCovered++; }
            else { flaggedIssues.push({ severity: "medium", category: "Documentation", message: `${c.first_name} ${c.last_name} — no service notes in the last 7 days` }); }
          });
          const docScore = clients.length > 0 ? Math.round((docCovered / clients.length) * 100) : 100;

          // ── EVV COMPLIANCE ──
          const recentEVV = evvSessions.filter(e => new Date(e.clock_in_at) >= sevenDaysAgo);
          let evvComplete = 0;
          recentEVV.forEach(e => {
            if (e.clock_out_at && e.clock_in_lat && e.clock_in_lng) { evvComplete++; }
            else {
              if (!e.clock_out_at) flaggedIssues.push({ severity: "high", category: "EVV", message: `Open EVV session (no clock-out) since ${new Date(e.clock_in_at).toLocaleDateString()}` });
              if (!e.clock_in_lat) flaggedIssues.push({ severity: "medium", category: "EVV", message: `Missing GPS on EVV session ${new Date(e.clock_in_at).toLocaleDateString()}` });
            }
          });
          const evvScore = recentEVV.length > 0 ? Math.round((evvComplete / recentEVV.length) * 100) : 100;

          const overall = Math.round((trainingScore * 0.3 + authScore * 0.2 + docScore * 0.25 + evvScore * 0.25));
          const severityOrder = { high: 0, medium: 1, low: 2 };
          flaggedIssues.sort((a, b) => severityOrder[a.severity] - severityOrder[b.severity]);

          setScores({ overall, trainingScore, authScore, docScore, evvScore, staffCount: staff.length, clientCount: clients.length, trainingTotal, trainingComplete });
          setIssues(flaggedIssues);
        } catch (e) { /* audit error */ }
        setLoading(false);
      };

      const ScoreRing = ({ score, size = 120 }) => {
        const radius = (size - 12) / 2;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (score / 100) * circumference;
        const color = score >= 80 ? CB.green : score >= 60 ? CB.amber : CB.red;
        return (
          <div style={{ textAlign: "center" }}>
            <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
              <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={CB.border} strokeWidth="8" />
              <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s ease" }} />
            </svg>
            <div style={{ marginTop: -size/2 - 14, marginBottom: size/2 - 30 }}>
              <div style={{ fontSize: size > 100 ? 32 : 22, fontWeight: 800, color: CB.navy }}>{score}%</div>
            </div>
          </div>
        );
      };

      const severityStyles = {
        high: { bg: "rgba(229,57,53,0.06)", border: `${CB.red}20`, color: CB.red, label: "CRITICAL" },
        medium: { bg: "rgba(245,127,23,0.06)", border: `${CB.amber}20`, color: CB.amber, label: "WARNING" },
        low: { bg: "rgba(26,115,232,0.06)", border: `${CB.blue}20`, color: CB.blue, label: "INFO" },
      };

      const deadlineSeverityColor = { critical: CB.red, high: CB.amber, medium: CB.blue };
      const deadlineCategories = [...new Set(SOW_DEADLINES.map(d => d.category))];
      const [dlFilter, setDlFilter] = useState("all");

      const filteredDeadlines = dlFilter === "all" ? SOW_DEADLINES : SOW_DEADLINES.filter(d => d.category === dlFilter);

      const CompTab = ({ value, label }) => (
        <button onClick={() => setTab(value)} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="Compliance Dashboard" subtitle="Real-time audit readiness — DHHS91172 SOW compliance scoring"
            action={
              <div style={{ display: "flex", gap: 8 }}>
                <SecondaryButton onClick={() => HopeHavenPDF.insuranceTracker()}>{icons.fileText({ size: 15 })} Insurance Tracker</SecondaryButton>
                <PrimaryButton onClick={runAudit} color={CB.navy}>{icons.refresh({ size: 16 })} Re-run Audit</PrimaryButton>
              </div>
            }
          />

          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <CompTab value="audit" label="Audit Scores" />
            <CompTab value="deadlines" label={`SOW Deadlines (${SOW_DEADLINES.length})`} />
          </div>

          {tab === "audit" && (
            <>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
              ) : scores && (
                <>
                  <RGrid cols={5} gap={18} style={{ marginBottom: 28 }}>
                    <div style={{
                      background: CB.white, borderRadius: 16, padding: "28px 20px",
                      border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                      display: "flex", flexDirection: "column", alignItems: "center", animation: "fadeIn 0.5s ease",
                    }}>
                      <ScoreRing score={scores.overall} size={130} />
                      <div style={{ fontSize: 15, fontWeight: 800, color: CB.navy, marginTop: 12 }}>Overall</div>
                      <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>Audit Readiness</div>
                    </div>
                    {[
                      { score: scores.trainingScore, label: "Training", sub: `${scores.trainingComplete}/${scores.trainingTotal} complete` },
                      { score: scores.authScore, label: "Authorizations", sub: "Active & valid" },
                      { score: scores.docScore, label: "Documentation", sub: "Notes last 7 days" },
                      { score: scores.evvScore, label: "EVV", sub: "GPS + clock-out" },
                    ].map((item, i) => (
                      <div key={i} style={{
                        background: CB.white, borderRadius: 16, padding: "24px 16px",
                        border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                        display: "flex", flexDirection: "column", alignItems: "center",
                        animation: `fadeIn 0.5s ease ${0.05 * (i + 1)}s both`,
                      }}>
                        <ScoreRing score={item.score} size={90} />
                        <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginTop: 8 }}>{item.label}</div>
                        <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>{item.sub}</div>
                      </div>
                    ))}
                  </RGrid>

                  <div style={{
                    background: CB.white, borderRadius: 16, padding: 24,
                    border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                    animation: "fadeIn 0.5s ease 0.3s both",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>
                        {issues.length > 0 ? `${issues.length} Issue${issues.length > 1 ? "s" : ""} Found` : "All Clear"}
                      </h3>
                      <div style={{ display: "flex", gap: 8 }}>
                        {["high", "medium", "low"].map(sev => {
                          const count = issues.filter(i => i.severity === sev).length;
                          if (!count) return null;
                          const s = severityStyles[sev];
                          return <Badge key={sev} text={`${count} ${s.label}`} color={s.color} />;
                        })}
                      </div>
                    </div>
                    {issues.length === 0 ? (
                      <div style={{ textAlign: "center", padding: "32px 0", color: CB.green }}>
                        {icons.checkCircle({ size: 32, color: CB.green })}
                        <p style={{ marginTop: 12, fontSize: 15, fontWeight: 600 }}>All compliance checks passed</p>
                      </div>
                    ) : (
                      <div style={{ maxHeight: 400, overflowY: "auto" }}>
                        {issues.map((issue, i) => {
                          const s = severityStyles[issue.severity];
                          return (
                            <div key={i} style={{
                              display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
                              borderRadius: 10, background: s.bg, border: `1px solid ${s.border}`,
                              marginBottom: 6, animation: `fadeIn 0.3s ease ${i * 0.02}s both`,
                            }}>
                              <Badge text={s.label} color={s.color} />
                              <Badge text={issue.category} color={CB.navy} />
                              <span style={{ fontSize: 13, color: CB.text, flex: 1 }}>{issue.message}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </>
              )}
            </>
          )}

          {tab === "deadlines" && (
            <div style={{ animation: "fadeIn 0.4s ease" }}>
              {/* Category filter pills */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                <button onClick={() => setDlFilter("all")} style={{
                  padding: "7px 14px", borderRadius: 8, border: `1px solid ${dlFilter === "all" ? CB.navy : CB.border}`,
                  background: dlFilter === "all" ? CB.navy : CB.white, color: dlFilter === "all" ? CB.white : CB.textMid,
                  fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                }}>All ({SOW_DEADLINES.length})</button>
                {deadlineCategories.map(cat => {
                  const count = SOW_DEADLINES.filter(d => d.category === cat).length;
                  return (
                    <button key={cat} onClick={() => setDlFilter(cat)} style={{
                      padding: "7px 14px", borderRadius: 8, border: `1px solid ${dlFilter === cat ? CB.teal : CB.border}`,
                      background: dlFilter === cat ? `${CB.teal}10` : CB.white, color: dlFilter === cat ? CB.teal : CB.textMid,
                      fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>{cat} ({count})</button>
                  );
                })}
              </div>

              {/* Deadline cards */}
              <div style={{ display: "grid", gap: 10 }}>
                {filteredDeadlines.map((dl, i) => (
                  <div key={dl.id} style={{
                    display: "flex", alignItems: "flex-start", gap: 16, padding: "16px 20px",
                    background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`,
                    boxShadow: "0 1px 3px rgba(10,30,51,0.04)",
                    animation: `fadeIn 0.3s ease ${i * 0.015}s both`,
                  }}>
                    <div style={{
                      width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                      background: `${deadlineSeverityColor[dl.severity] || CB.blue}12`,
                      display: "flex", alignItems: "center", justifyContent: "center", marginTop: 2,
                    }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: deadlineSeverityColor[dl.severity] || CB.blue }}>{dl.id}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{dl.title}</span>
                        <Badge text={dl.category} color={CB.teal} />
                        <Badge text={dl.severity.toUpperCase()} color={deadlineSeverityColor[dl.severity] || CB.blue} />
                        {dl.recurring && <Badge text="Recurring" color={CB.textMid} />}
                      </div>
                      <p style={{ fontSize: 13, color: CB.textMid, lineHeight: 1.5, margin: 0 }}>{dl.description}</p>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: CB.navy }}>{dl.frequency}</div>
                      {dl.daysToComplete !== null && (
                        <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>
                          {dl.daysToComplete === 0 ? "Immediate" : `Within ${dl.daysToComplete}d`}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INCIDENT REPORTING — DHHS-compliant incident documentation
    // ═══════════════════════════════════════════════════════════════
    const INCIDENT_TYPES = [
      { value: "injury_client", label: "Client Injury" },
      { value: "injury_staff", label: "Staff Injury" },
      { value: "behavioral", label: "Behavioral Event" },
      { value: "medication_error", label: "Medication Error" },
      { value: "rights_violation", label: "Rights Violation / Restriction" },
      { value: "property_damage", label: "Property Damage" },
      { value: "abuse_neglect", label: "Abuse / Neglect Allegation" },
      { value: "elopement", label: "Elopement / Missing Person" },
      { value: "emergency", label: "Emergency (Police/Fire/EMS)" },
      { value: "death", label: "Death" },
      { value: "other", label: "Other" },
    ];

    const INCIDENT_SEVERITY = [
      { value: "low", label: "Low", color: "#2E7D32", desc: "Minor, no injury or minimal impact" },
      { value: "medium", label: "Medium", color: "#F57F17", desc: "Moderate impact, may need follow-up" },
      { value: "high", label: "High", color: "#E53935", desc: "Serious injury, rights issue, or pattern" },
      { value: "critical", label: "Critical", color: "#7B1FA2", desc: "Immediate danger, reportable to DHHS" },
    ];

    function IncidentsPage() {
      const { orgId, staffProfile, role } = useAuth();
      const { addToast } = useToast();
      const perms = usePermissions();
      const { isMobile } = useMobile();
      const [incidents, setIncidents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [clients, setClients] = useState([]);
      const [staffList, setStaffList] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [viewing, setViewing] = useState(null);
      const [filter, setFilter] = useState("all"); // all, open, closed

      const blankForm = {
        incident_type: "", severity: "", person_id: "", occurred_at: new Date().toISOString().slice(0, 16),
        location: "", description: "", immediate_actions: "", injuries_desc: "",
        witnesses: "", notifications_sent: "", status: "open",
      };
      const [form, setForm] = useState(blankForm);
      const [saving, setSaving] = useState(false);
      const [reviewNotes, setReviewNotes] = useState("");

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [incRes, clientRes, staffRes] = await Promise.all([
          supabase.from("incidents").select("*, persons(first_name, last_name), reporter:staff!incidents_reported_by_fkey(first_name, last_name), reviewer:staff!incidents_reviewed_by_fkey(first_name, last_name)").eq("org_id", orgId).order("occurred_at", { ascending: false }),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
        ]);
        setIncidents(incRes.data || []);
        setClients(clientRes.data || []);
        setStaffList(staffRes.data || []);
        setLoading(false);
      };

      const handleSubmit = async () => {
        if (!form.incident_type) return addToast("Select incident type", "error");
        if (!form.severity) return addToast("Select severity level", "error");
        if (!form.description.trim()) return addToast("Description is required", "error");
        setSaving(true);
        const payload = {
          org_id: orgId,
          incident_type: form.incident_type,
          severity: form.severity,
          person_id: form.person_id || null,
          occurred_at: form.occurred_at,
          location: form.location || null,
          description: form.description,
          immediate_actions: form.immediate_actions || null,
          injuries_desc: form.injuries_desc || null,
          witnesses: form.witnesses || null,
          notifications_sent: form.notifications_sent || null,
          reported_by: staffProfile?.id || null,
          status: "open",
        };
        const { error, data: newIncident } = await supabase.from("incidents").insert(payload).select("id").single();
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Incident report filed", "success");
        // ── Auto-notify compliance director(s) ──
        try {
          const { data: compStaff } = await supabase.from("staff").select("id").in("role", ["compliance_director", "owner", "admin"]).eq("is_active", true);
          const senderName = staffProfile ? `${staffProfile.first_name} ${staffProfile.last_name}` : "System";
          const clientName = clients.find(c => c.id === form.person_id);
          const clientLabel = clientName ? `${clientName.first_name} ${clientName.last_name}` : "Unknown";
          const sevLabel = { minor: "Minor", moderate: "Moderate", serious: "Serious", critical: "Critical" }[form.severity] || form.severity;
          const typeLabel = INCIDENT_TYPES.find(t => t.value === form.incident_type)?.label || form.incident_type;
          for (const staff of (compStaff || [])) {
            if (staff.id === staffProfile?.id) continue;
            await supabase.from("messages").insert({
              org_id: orgId, sender_staff_id: staffProfile?.id, recipient_staff_id: staff.id,
              subject: `⚠ Incident Report: ${typeLabel} — ${sevLabel}`,
              body: `An incident report has been filed.\n\nType: ${typeLabel}\nSeverity: ${sevLabel}\nClient: ${clientLabel}\nDate: ${form.occurred_at}\nLocation: ${form.location || "N/A"}\n\nDescription: ${form.description.substring(0, 300)}${form.description.length > 300 ? "..." : ""}\n\nPlease review in the Incidents module.`,
              is_urgent: form.severity === "critical" || form.severity === "serious",
            });
          }
        } catch (e) { /* notification send error — non-blocking */ }
        setForm(blankForm);
        setShowForm(false);
        loadAll();
      };

      const updateStatus = async (id, status, reviewNotes) => {
        const update = { status, reviewed_by: staffProfile?.id, reviewed_at: new Date().toISOString() };
        if (reviewNotes) update.review_notes = reviewNotes;
        const { error } = await supabase.from("incidents").update(update).eq("id", id);
        if (error) return addToast(error.message, "error");
        addToast(`Incident ${status}`, "success");
        setViewing(null);
        loadAll();
      };

      const filtered = useMemo(() => {
        if (filter === "all") return incidents;
        if (filter === "open") return incidents.filter(i => i.status === "open" || i.status === "under_review");
        return incidents.filter(i => i.status === "closed" || i.status === "resolved");
      }, [incidents, filter]);

      const sevStyle = (sev) => INCIDENT_SEVERITY.find(s => s.value === sev) || INCIDENT_SEVERITY[0];
      const typeLabel = (t) => INCIDENT_TYPES.find(x => x.value === t)?.label || t;
      const statusColors = { open: CB.amber, under_review: CB.blue, resolved: CB.green, closed: CB.textLight };

      // ── Detail View ──
      if (viewing) {
        const inc = viewing;
        const sev = sevStyle(inc.severity);
        return (
          <div>
            <PageHeader title="Incident Report" subtitle={`#${inc.id?.slice(0, 8)} — Filed ${new Date(inc.created_at).toLocaleDateString()}`} action={
              <button onClick={() => setViewing(null)} style={{ padding: "10px 18px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10, fontSize: 13, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>← Back</button>
            } />
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {/* Header badges */}
              <div style={{ padding: "20px 24px", borderBottom: `1px solid ${CB.border}`, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
                <Badge text={typeLabel(inc.incident_type)} color={CB.navy} />
                <Badge text={sev.label} color={sev.color} />
                <Badge text={inc.status?.replace(/_/g, " ").toUpperCase()} color={statusColors[inc.status] || CB.textMid} />
                {inc.persons && <Badge text={`${inc.persons.first_name} ${inc.persons.last_name}`} color={CB.teal} />}
              </div>
              {/* Details */}
              <div style={{ padding: 24 }}>
                <RGrid cols={2} gap={20} style={{ marginBottom: 24 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Date & Time</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>{new Date(inc.occurred_at).toLocaleString()}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Location</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.location || "Not specified"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Reported By</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.reporter ? `${inc.reporter.first_name} ${inc.reporter.last_name}` : "Unknown"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Reviewed By</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.reviewer ? `${inc.reviewer.first_name} ${inc.reviewer.last_name}` : "Pending review"}</div>
                  </div>
                </RGrid>
                {[
                  { label: "Description", value: inc.description },
                  { label: "Immediate Actions Taken", value: inc.immediate_actions },
                  { label: "Injuries", value: inc.injuries_desc },
                  { label: "Witnesses", value: inc.witnesses },
                  { label: "Notifications Sent", value: inc.notifications_sent },
                  { label: "Review Notes", value: inc.review_notes },
                ].filter(s => s.value).map((section, i) => (
                  <div key={i} style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>{section.label}</div>
                    <div style={{ padding: "12px 16px", background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, color: CB.text, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{section.value}</div>
                  </div>
                ))}
              </div>
              {/* Review actions */}
              {perms.viewCompliance && inc.status !== "closed" && inc.status !== "resolved" && (
                <div style={{ padding: "20px 24px", borderTop: `1px solid ${CB.border}`, background: CB.cream }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 10 }}>Review Actions</div>
                  <textarea value={reviewNotes} onChange={e => setReviewNotes(e.target.value)} placeholder="Add review notes (optional)..."
                    style={{ ...fieldStyle, marginBottom: 12, minHeight: 72, resize: "vertical" }} />
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <button onClick={() => updateStatus(inc.id, "under_review", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.blue}15`, color: CB.blue, cursor: "pointer", fontFamily: "inherit" }}>Mark Under Review</button>
                    <button onClick={() => updateStatus(inc.id, "resolved", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.green}15`, color: CB.green, cursor: "pointer", fontFamily: "inherit" }}>Resolve</button>
                    <button onClick={() => updateStatus(inc.id, "closed", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.textLight}20`, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>Close</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div>
          <PageHeader title="Incident Reports" subtitle="DHHS-compliant incident documentation and tracking" action={
            <button onClick={() => setShowForm(true)} style={{ padding: "10px 20px", background: CB.red, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
              {icons.alertTriangle({ size: 16, color: CB.white })} Report Incident
            </button>
          } />

          {/* Filter tabs */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", gap: 4, background: CB.cream, padding: 4, borderRadius: 12 }}>
              {[{ v: "all", l: "All" }, { v: "open", l: "Open" }, { v: "closed", l: "Closed" }].map(t => (
                <button key={t.v} onClick={() => setFilter(t.v)} style={{
                  padding: "10px 20px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: filter === t.v ? CB.navy : "transparent", color: filter === t.v ? CB.white : CB.textMid,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{t.l}</button>
              ))}
            </div>
            <div style={{ fontSize: 13, color: CB.textMid }}>{filtered.length} incident{filtered.length !== 1 ? "s" : ""}</div>
          </div>

          {/* Incident list */}
          {loading ? <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div> : (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {filtered.length === 0 ? (
                <div style={{ padding: 48, textAlign: "center" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>No incidents reported</div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>Use the Report Incident button to file a new report</div>
                </div>
              ) : filtered.map((inc, i) => {
                const sev = sevStyle(inc.severity);
                return (
                  <div key={inc.id} onClick={() => setViewing(inc)} style={{
                    padding: "16px 24px", borderBottom: i < filtered.length - 1 ? `1px solid ${CB.border}` : "none",
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 16, transition: "background 0.1s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{
                      width: 8, height: 8, borderRadius: 4, background: sev.color, flexShrink: 0,
                    }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{typeLabel(inc.incident_type)}</span>
                        <Badge text={sev.label} color={sev.color} />
                        <Badge text={inc.status?.replace(/_/g, " ")} color={statusColors[inc.status] || CB.textMid} />
                      </div>
                      <div style={{ fontSize: 13, color: CB.textMid, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {inc.persons ? `${inc.persons.first_name} ${inc.persons.last_name} — ` : ""}{(inc.description || "").substring(0, 120)}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, color: CB.textLight }}>{new Date(inc.occurred_at).toLocaleDateString()}</div>
                      <div style={{ fontSize: 11, color: CB.textLight }}>{inc.reporter ? `${inc.reporter.first_name} ${inc.reporter.last_name}` : ""}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Report Incident Modal */}
          <Modal open={showForm} onClose={() => setShowForm(false)} title="Report Incident" subtitle="All fields are logged for DHHS compliance" width={760}>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Type */}
              <FormField label="Incident Type" required>
                <select value={form.incident_type} onChange={e => set("incident_type", e.target.value)} style={fieldStyle}>
                  <option value="">Select type...</option>
                  {INCIDENT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </FormField>
              {/* Severity */}
              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 8, display: "block" }}>Severity <span style={{ color: CB.red }}>*</span></label>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {INCIDENT_SEVERITY.map(s => (
                    <button key={s.value} onClick={() => set("severity", s.value)} style={{
                      padding: "10px 16px", borderRadius: 10, border: `2px solid ${form.severity === s.value ? s.color : CB.border}`,
                      background: form.severity === s.value ? `${s.color}12` : CB.white,
                      cursor: "pointer", fontFamily: "inherit", textAlign: "left", flex: 1, minWidth: 100,
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: s.color }}>{s.label}</div>
                      <div style={{ fontSize: 11, color: CB.textMid, marginTop: 2 }}>{s.desc}</div>
                    </button>
                  ))}
                </div>
              </div>
              {/* Client */}
              <FormField label="Client Involved">
                <select value={form.person_id} onChange={e => set("person_id", e.target.value)} style={fieldStyle}>
                  <option value="">No client / not applicable</option>
                  {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
                </select>
              </FormField>
              {/* Date/Time + Location */}
              <RGrid cols={2} gap={12}>
                <FormField label="Date & Time" required style={{ marginBottom: 0 }}>
                  <input type="datetime-local" value={form.occurred_at} onChange={e => set("occurred_at", e.target.value)} style={fieldStyle} />
                </FormField>
                <FormField label="Location" style={{ marginBottom: 0 }}>
                  <input value={form.location} onChange={e => set("location", e.target.value)} placeholder="Where did this occur?" style={fieldStyle} />
                </FormField>
              </RGrid>
              {/* Description */}
              <FormField label="Description" required>
                <textarea value={form.description} onChange={e => set("description", e.target.value)} rows={4}
                  placeholder="Describe what happened in detail..." style={{ ...fieldStyle, resize: "vertical", minHeight: 100 }} />
              </FormField>
              {/* Immediate Actions */}
              <FormField label="Immediate Actions Taken">
                <textarea value={form.immediate_actions} onChange={e => set("immediate_actions", e.target.value)} rows={3}
                  placeholder="What was done immediately in response?" style={{ ...fieldStyle, resize: "vertical" }} />
              </FormField>
              {/* Injuries */}
              <FormField label="Injuries">
                <input value={form.injuries_desc} onChange={e => set("injuries_desc", e.target.value)} placeholder="Describe any injuries sustained" style={fieldStyle} />
              </FormField>
              {/* Witnesses + Notifications */}
              <RGrid cols={2} gap={12}>
                <FormField label="Witnesses" style={{ marginBottom: 0 }}>
                  <input value={form.witnesses} onChange={e => set("witnesses", e.target.value)} placeholder="Names of witnesses" style={fieldStyle} />
                </FormField>
                <FormField label="Notifications Sent" style={{ marginBottom: 0 }}>
                  <input value={form.notifications_sent} onChange={e => set("notifications_sent", e.target.value)} placeholder="Guardian, SC, DHHS, police..." style={fieldStyle} />
                </FormField>
              </RGrid>
              {/* Submit */}
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                <button onClick={() => setShowForm(false)} style={{ padding: "10px 20px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10, fontSize: 14, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSubmit} disabled={saving} style={{
                  padding: "10px 24px", background: CB.red, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: saving ? "wait" : "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 8, opacity: saving ? 0.7 : 1,
                }}>{saving ? <Spinner size={14} color={CB.white} /> : icons.alertTriangle({ size: 15, color: CB.white })} File Report</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // NOTIFICATIONS & EXPIRATION ALERTS
    // ═══════════════════════════════════════════════════════════════
    function AlertsPage() {
      const [loading, setLoading] = useState(true);
      const [alerts, setAlerts] = useState([]);
      const [filter, setFilter] = useState("all"); // all, critical, warning, upcoming
      const [catFilter, setCatFilter] = useState("all"); // all, training, authorization, document
      const { isMobile } = useMobile();
      const { addToast } = useToast();

      useEffect(() => { loadAlerts(); }, []);

      const loadAlerts = async () => {
        setLoading(true);
        try {
          const [trainRes, topicRes, staffRes, authRes, clientRes, docRes, medRes, medLogRes] = await Promise.all([
            supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at, staff(first_name, last_name, is_active), training_topic_definitions(topic_name, category, renewal_months)"),
            supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification"),
            supabase.from("staff").select("id, first_name, last_name, hire_date, is_active").eq("is_active", true),
            supabase.from("person_service_authorizations").select("id, person_id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code), persons(first_name, last_name)"),
            supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true),
            supabase.from("documents").select("id, staff_id, person_id, doc_type, file_name, expires_at, uploaded_at").eq("is_archived", false).not("expires_at", "is", null),
            supabase.from("medications").select("id, person_id, medication_name, dosage, frequency, schedule_times, is_prn, is_active, persons(first_name, last_name)").eq("is_active", true),
            supabase.from("medication_logs").select("id, medication_id, person_id, scheduled_date, scheduled_time, status").gte("scheduled_date", new Date(new Date().setDate(new Date().getDate() - 3)).toISOString().split("T")[0]),
          ]);

          const trainings = trainRes.data || [];
          const topics = topicRes.data || [];
          const staff = staffRes.data || [];
          const auths = authRes.data || [];
          const docs = docRes.data || [];
          // v19.2.1 — hydrate staff/person lookups for docs client-side (PostgREST embed caused 400s)
          const staffById = Object.fromEntries(staff.map(s => [s.id, s]));
          const allClients = clientRes.data || [];
          const personById = Object.fromEntries(allClients.map(p => [p.id, p]));
          docs.forEach(d => {
            d.staff = d.staff_id ? staffById[d.staff_id] : null;
            d.persons = d.person_id ? personById[d.person_id] : null;
          });
          const now = new Date();
          const collected = [];

          const daysUntil = (dateStr) => {
            if (!dateStr) return Infinity;
            const d = new Date(dateStr.includes("T") ? dateStr : dateStr + "T00:00:00");
            return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
          };

          const urgency = (days) => {
            if (days <= 0) return "critical";
            if (days <= 30) return "warning";
            if (days <= 90) return "upcoming";
            return "ok";
          };

          // ── TRAINING EXPIRATIONS ──
          trainings.forEach(t => {
            if (!t.expires_at) return;
            if (t.staff && !t.staff.is_active) return;
            const days = daysUntil(t.expires_at);
            const urg = urgency(days);
            if (urg === "ok") return;
            const staffName = t.staff ? `${t.staff.first_name} ${t.staff.last_name}` : "Unknown";
            const topicName = t.training_topic_definitions?.topic_name || "Training";
            collected.push({
              id: `train-${t.id}`,
              category: "training",
              urgency: urg,
              days,
              title: topicName,
              subtitle: staffName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago (${new Date(t.expires_at).toLocaleDateString()})`
                : `Expires in ${days} day${days!==1?"s":""} (${new Date(t.expires_at).toLocaleDateString()})`,
              date: t.expires_at,
            });
          });

          // ── MISSING REQUIRED TRAININGS (overdue from hire date) ──
          const requiredTopics = topics.filter(t => t.deadline_days);
          staff.forEach(s => {
            if (!s.hire_date) return;
            const hireDate = new Date(s.hire_date + "T00:00:00");
            requiredTopics.forEach(topic => {
              const hasCompletion = trainings.find(t => t.staff_id === s.id && t.training_topic_id === topic.id);
              if (hasCompletion) return; // handled above or completed
              const deadline = new Date(hireDate);
              deadline.setDate(deadline.getDate() + topic.deadline_days);
              const days = daysUntil(deadline.toISOString());
              const urg = urgency(days);
              if (urg === "ok") return;
              collected.push({
                id: `train-missing-${s.id}-${topic.id}`,
                category: "training",
                urgency: urg,
                days,
                title: `${topic.topic_name} — Not Completed`,
                subtitle: `${s.first_name} ${s.last_name}`,
                detail: days <= 0
                  ? `Due ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago (${deadline.toLocaleDateString()})`
                  : `Due in ${days} day${days!==1?"s":""} (${deadline.toLocaleDateString()})`,
                date: deadline.toISOString(),
              });
            });
          });

          // ── SERVICE AUTHORIZATION EXPIRATIONS ──
          auths.forEach(a => {
            if (!a.end_date) return;
            const days = daysUntil(a.end_date);
            const urg = urgency(days);
            if (urg === "ok") return;
            const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown Client";
            const code = a.service_code_definitions?.code || "Service";
            collected.push({
              id: `auth-${a.id}`,
              category: "authorization",
              urgency: urg,
              days,
              title: `${code} Authorization`,
              subtitle: clientName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago — ${a.used_units || 0}/${a.authorized_units} units used`
                : `Expires in ${days} day${days!==1?"s":""} — ${a.used_units || 0}/${a.authorized_units} units used`,
              date: a.end_date,
            });
          });

          // ── AUTHORIZATION UTILIZATION WARNINGS ──
          auths.forEach(a => {
            if (!a.authorized_units || a.authorized_units === 0) return;
            const endDays = daysUntil(a.end_date);
            if (endDays <= 0) return; // already flagged as expired
            const pct = (a.used_units || 0) / a.authorized_units;
            if (pct >= 0.9 && pct < 1) {
              const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown";
              collected.push({
                id: `auth-util-${a.id}`,
                category: "authorization",
                urgency: "warning",
                days: endDays,
                title: `${a.service_code_definitions?.code || "Service"} — ${Math.round(pct*100)}% Used`,
                subtitle: clientName,
                detail: `${a.used_units}/${a.authorized_units} units consumed, ${endDays} day${endDays!==1?"s":""} remaining`,
                date: a.end_date,
              });
            } else if (pct >= 1) {
              const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown";
              collected.push({
                id: `auth-exh-${a.id}`,
                category: "authorization",
                urgency: "critical",
                days: 0,
                title: `${a.service_code_definitions?.code || "Service"} — Units Exhausted`,
                subtitle: clientName,
                detail: `All ${a.authorized_units} units used`,
                date: a.end_date,
              });
            }
          });

          // ── DOCUMENT EXPIRATIONS ──
          docs.forEach(d => {
            if (!d.expires_at) return;
            const days = daysUntil(d.expires_at);
            const urg = urgency(days);
            if (urg === "ok") return;
            const ownerName = d.staff ? `${d.staff.first_name} ${d.staff.last_name}` : d.persons ? `${d.persons.first_name} ${d.persons.last_name}` : "Unknown";
            collected.push({
              id: `doc-${d.id}`,
              category: "document",
              urgency: urg,
              days,
              title: (d.doc_type || "Document").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()),
              subtitle: ownerName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago`
                : `Expires in ${days} day${days!==1?"s":""} (${new Date(d.expires_at).toLocaleDateString()})`,
              date: d.expires_at,
            });
          });

          // ── MISSED MEDICATION DOSES (last 3 days) ──
          const meds = medRes.data || [];
          const medLogs = medLogRes.data || [];
          const threeDaysAgo = new Date(now); threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);
          const nowDateStr = now.toISOString().split("T")[0];
          const nowTimeStr = now.toTimeString().slice(0, 5);
          meds.filter(m => !m.is_prn && m.schedule_times?.length).forEach(med => {
            const clientName = med.persons ? `${med.persons.first_name} ${med.persons.last_name}` : "Unknown";
            for (let d = new Date(threeDaysAgo); d <= now; d.setDate(d.getDate() + 1)) {
              const dateStr = d.toISOString().split("T")[0];
              (med.schedule_times || []).forEach(time => {
                if (dateStr === nowDateStr && time > nowTimeStr) return;
                const hasLog = medLogs.find(l => l.medication_id === med.id && l.scheduled_date === dateStr && l.scheduled_time === time);
                if (!hasLog) {
                  collected.push({
                    id: `med-miss-${med.id}-${dateStr}-${time}`,
                    category: "medication",
                    urgency: "critical",
                    days: 0,
                    title: `${med.medication_name} ${med.dosage} — Missed`,
                    subtitle: clientName,
                    detail: `Not logged: ${dateStr} at ${time}`,
                    date: dateStr,
                  });
                } else if (hasLog.status === "refused" || hasLog.status === "held") {
                  collected.push({
                    id: `med-flag-${med.id}-${dateStr}-${time}`,
                    category: "medication",
                    urgency: "warning",
                    days: 0,
                    title: `${med.medication_name} ${med.dosage} — ${hasLog.status === "refused" ? "Refused" : "Held"}`,
                    subtitle: clientName,
                    detail: `${dateStr} at ${time}`,
                    date: dateStr,
                  });
                }
              });
            }
          });

          // Sort: critical first, then by days ascending
          const urgOrder = { critical: 0, warning: 1, upcoming: 2 };
          collected.sort((a, b) => urgOrder[a.urgency] - urgOrder[b.urgency] || a.days - b.days);
          setAlerts(collected);
        } catch (e) {
          addToast("Failed to load alerts", "error");
        }
        setLoading(false);
      };

      const filtered = alerts.filter(a => {
        if (filter !== "all" && a.urgency !== filter) return false;
        if (catFilter !== "all" && a.category !== catFilter) return false;
        return true;
      });

      const counts = { critical: 0, warning: 0, upcoming: 0 };
      alerts.forEach(a => { if (counts[a.urgency] !== undefined) counts[a.urgency]++; });

      const urgColors = { critical: CB.red, warning: CB.amber, upcoming: CB.blue };
      const urgLabels = { critical: "Critical", warning: "Warning", upcoming: "Upcoming" };
      const catIcons = { training: icons.book, authorization: icons.fileText, document: icons.shield, medication: icons.capsule };
      const catLabels = { training: "Training", authorization: "Authorization", document: "Document", medication: "Medication" };

      return (
        <div>
          <PageHeader title="Notifications & Alerts" subtitle="Expiration tracking — trainings, authorizations, documents"
            action={
              <button onClick={loadAlerts} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",
                borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
              >{icons.refresh({ size: 15 })} Refresh</button>
            }
          />
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <>
              {/* Summary Cards */}
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(3, 1fr)" : "repeat(3, 1fr)", gap: isMobile ? 10 : 16, marginBottom: isMobile ? 16 : 24 }}>
                {[
                  { key: "critical", label: "Critical", color: CB.red, icon: icons.alertTriangle, count: counts.critical },
                  { key: "warning", label: "30-Day Warning", color: CB.amber, icon: icons.clock, count: counts.warning },
                  { key: "upcoming", label: "60–90 Day", color: CB.blue, icon: icons.calendar, count: counts.upcoming },
                ].map((card, i) => (
                  <button key={card.key} onClick={() => setFilter(filter === card.key ? "all" : card.key)} style={{
                    background: filter === card.key ? `${card.color}10` : CB.white,
                    border: `1.5px solid ${filter === card.key ? card.color : CB.border}`,
                    borderRadius: 14, padding: isMobile ? "14px 10px" : "18px 20px", cursor: "pointer",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                    fontFamily: "inherit", boxShadow: CB.cardShadow,
                    animation: `fadeIn 0.4s ease ${i * 0.05}s both`, transition: "all 0.15s",
                  }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: `${card.color}14`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {card.icon({ size: 18, color: card.color })}
                    </div>
                    <span style={{ fontSize: 28, fontWeight: 800, color: card.count > 0 ? card.color : CB.textLight }}>{card.count}</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{card.label}</span>
                  </button>
                ))}
              </div>

              {/* Category Filter */}
              <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
                {[
                  { key: "all", label: "All Categories" },
                  { key: "training", label: "Trainings" },
                  { key: "authorization", label: "Authorizations" },
                  { key: "document", label: "Documents" },
                  { key: "medication", label: "Medications" },
                ].map(c => (
                  <button key={c.key} onClick={() => setCatFilter(c.key)} style={{
                    padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                    border: `1px solid ${catFilter === c.key ? CB.teal : CB.border}`,
                    background: catFilter === c.key ? `${CB.teal}10` : CB.white,
                    color: catFilter === c.key ? CB.tealDark : CB.textMid,
                    cursor: "pointer", transition: "all 0.15s",
                  }}>{c.label}</button>
                ))}
              </div>

              {/* Alert List */}
              {filtered.length === 0 ? (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 48, textAlign: "center",
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                }}>
                  <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.green}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                    {icons.checkCircle({ size: 28, color: CB.green })}
                  </div>
                  <h3 style={{ fontSize: 17, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>
                    {alerts.length === 0 ? "All Clear" : "No Matching Alerts"}
                  </h3>
                  <p style={{ fontSize: 14, color: CB.textMid }}>
                    {alerts.length === 0
                      ? "No expiring trainings, authorizations, or documents within the next 90 days."
                      : "Try adjusting your filters to see other alerts."}
                  </p>
                </div>
              ) : (
                <div style={{
                  background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`,
                  boxShadow: CB.cardShadow, overflow: "hidden",
                }}>
                  {filtered.map((alert, i) => (
                    <div key={alert.id} style={{
                      display: "flex", alignItems: isMobile ? "flex-start" : "center", gap: isMobile ? 12 : 16,
                      padding: isMobile ? "14px 16px" : "16px 24px",
                      borderBottom: i < filtered.length - 1 ? `1px solid ${CB.border}` : "none",
                      animation: `fadeIn 0.3s ease ${Math.min(i * 0.03, 0.5)}s both`,
                      flexDirection: isMobile ? "column" : "row",
                    }}>
                      {/* Urgency Dot + Category Icon */}
                      <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: isMobile ? "100%" : 220 }}>
                        <div style={{
                          width: 10, height: 10, borderRadius: "50%", flexShrink: 0,
                          background: urgColors[alert.urgency],
                          boxShadow: alert.urgency === "critical" ? `0 0 8px ${CB.red}60` : "none",
                          animation: alert.urgency === "critical" ? "pulse 2s ease-in-out infinite" : "none",
                        }} />
                        <div style={{
                          width: 34, height: 34, borderRadius: 9, flexShrink: 0,
                          background: `${urgColors[alert.urgency]}12`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          {(catIcons[alert.category] || icons.bell)({ size: 16, color: urgColors[alert.urgency] })}
                        </div>
                        <div style={{ minWidth: 0 }}>
