    // HIPAA-COMPLIANT MESSAGING — internal staff-to-staff messaging
    // ═══════════════════════════════════════════════════════════════
    function MessagingPage() {
      const { orgId, staffProfile } = useAuth();
      const { addToast } = useToast();
      const [tab, setTab] = useState("inbox"); // inbox | sent | compose
      const [messages, setMessages] = useState([]);
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedMsg, setSelectedMsg] = useState(null);
      const [showCompose, setShowCompose] = useState(false);
      const [replyTo, setReplyTo] = useState(null);
      const [searchQ, setSearchQ] = useState("");
      const [compose, setCompose] = useState({ recipient_staff_id: "", subject: "", body: "", is_urgent: false });
      const [thread, setThread] = useState([]);

      const myStaffId = staffProfile?.id;

      const fetchMessages = useCallback(async () => {
        if (!orgId || !myStaffId) return;
        setLoading(true);
        let query;
        if (tab === "inbox") {
          query = supabase.from("messages").select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId).eq("recipient_staff_id", myStaffId).order("sent_at", { ascending: false });
        } else {
          query = supabase.from("messages").select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId).eq("sender_staff_id", myStaffId).order("sent_at", { ascending: false });
        }
        const { data, error } = await query;
        if (error) addToast(error.message, "error");
        else setMessages(data || []);
        setLoading(false);
      }, [orgId, myStaffId, tab]);

      const fetchStaff = useCallback(async () => {
        if (!orgId) return;
        const { data } = await supabase.from("staff").select("id, first_name, last_name, role, is_active").eq("org_id", orgId).eq("is_active", true).order("last_name");
        setStaff((data || []).filter(s => s.id !== myStaffId));
      }, [orgId, myStaffId]);

      useEffect(() => { fetchMessages(); }, [fetchMessages]);
      useEffect(() => { fetchStaff(); }, [fetchStaff]);

      const markAsRead = async (msg) => {
        if (msg.read_at || msg.sender_staff_id === myStaffId) return;
        await supabase.from("messages").update({ read_at: new Date().toISOString() }).eq("id", msg.id);
        setMessages(prev => prev.map(m => m.id === msg.id ? { ...m, read_at: new Date().toISOString() } : m));
      };

      const openMessage = (msg) => {
        setSelectedMsg(msg);
        markAsRead(msg);
      };

      const handleSend = async () => {
        if (!compose.recipient_staff_id) return addToast("Select a recipient", "error");
        if (!compose.body.trim()) return addToast("Message body is required", "error");
        const payload = {
          org_id: orgId,
          sender_staff_id: myStaffId,
          recipient_staff_id: compose.recipient_staff_id,
          subject: compose.subject || "(No subject)",
          body: compose.body,
          is_urgent: compose.is_urgent,
          thread_id: replyTo?.thread_id || replyTo?.id || null,
        };
        const { error } = await supabase.from("messages").insert(payload);
        if (error) return addToast(error.message, "error");
        addToast("Message sent", "success");
        setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false });
        setShowCompose(false);
        setReplyTo(null);
        fetchMessages();
      };

      const handleReply = (msg) => {
        const other = msg.sender_staff_id === myStaffId ? msg.recipient : msg.sender;
        setReplyTo(msg);
        setCompose({
          recipient_staff_id: other?.id || "",
          subject: msg.subject?.startsWith("Re: ") ? msg.subject : `Re: ${msg.subject || ""}`,
          body: "",
          is_urgent: false,
        });
        setSelectedMsg(null);
        setShowCompose(true);
      };

      const unreadCount = useMemo(() => messages.filter(m => !m.read_at && tab === "inbox").length, [messages, tab]);

      const staffName = (s) => s ? `${s.first_name || ""} ${s.last_name || ""}`.trim() : "Unknown";
      const staffRoleLabel = (s) => s ? (STAFF_ROLES.find(r => r.value === s.role)?.label || s.role?.replace(/_/g, " ") || "") : "";

      const filtered = useMemo(() => {
        if (!searchQ.trim()) return messages;
        const q = searchQ.toLowerCase();
        return messages.filter(m =>
          (m.subject || "").toLowerCase().includes(q) ||
          (m.body || "").toLowerCase().includes(q) ||
          staffName(m.sender).toLowerCase().includes(q) ||
          staffName(m.recipient).toLowerCase().includes(q)
        );
      }, [messages, searchQ]);

      const formatTime = (iso) => {
        if (!iso) return "";
        const d = new Date(iso);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return "Just now";
        if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
        if (diff < 86400000) return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
        if (diff < 604800000) return d.toLocaleDateString([], { weekday: "short" });
        return d.toLocaleDateString([], { month: "short", day: "numeric" });
      };

      const TabBtn = ({ value, label, count }) => (
        <button onClick={() => { setTab(value); setSelectedMsg(null); }} style={{
          padding: "10px 20px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
          display: "flex", alignItems: "center", gap: 8, position: "relative",
        }}>
          {label}
          {count > 0 && (
            <span style={{ background: CB.red, color: CB.white, fontSize: 11, fontWeight: 800, padding: "2px 7px", borderRadius: 10, minWidth: 20, textAlign: "center" }}>{count}</span>
          )}
        </button>
      );

      // Load thread when a message is selected
      useEffect(() => {
        if (!selectedMsg || !orgId) { setThread([]); return; }
        const loadThread = async () => {
          const threadId = selectedMsg.thread_id || selectedMsg.id;
          const { data } = await supabase.from("messages")
            .select("*, sender:staff!messages_sender_staff_id_fkey(id,first_name,last_name,role), recipient:staff!messages_recipient_staff_id_fkey(id,first_name,last_name,role)")
            .eq("org_id", orgId)
            .or(`id.eq.${threadId},thread_id.eq.${threadId}`)
            .order("sent_at", { ascending: true });
          setThread(data || []);
        };
        loadThread();
      }, [selectedMsg?.id, orgId]);

      // ── Detail view ──
      if (selectedMsg) {
        const msg = selectedMsg;
        const isInbound = msg.recipient_staff_id === myStaffId;

        return (
          <div>
            <PageHeader title="Messages" subtitle="HIPAA-compliant internal messaging" action={
              <button onClick={() => { setShowCompose(true); setReplyTo(null); setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false }); }}
                style={{ padding: "10px 20px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
                {icons.edit({ size: 16, color: CB.white })} Compose
              </button>
            } />
            <button onClick={() => setSelectedMsg(null)} style={{
              padding: "8px 16px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 8,
              fontSize: 13, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit", marginBottom: 16,
              display: "flex", alignItems: "center", gap: 6,
            }}>← Back</button>
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {/* Header */}
              <div style={{ padding: "20px 24px", borderBottom: `1px solid ${CB.border}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                    {msg.is_urgent && <span style={{ background: "#FEF2F2", color: CB.red, fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 6 }}>URGENT</span>}
                    <h3 style={{ fontSize: 18, fontWeight: 800, color: CB.navy }}>{msg.subject || "(No subject)"}</h3>
                  </div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>
                    {isInbound ? `From: ${staffName(msg.sender)}` : `To: ${staffName(msg.recipient)}`}
                    <span style={{ margin: "0 8px", color: CB.border }}>•</span>
                    {staffRoleLabel(isInbound ? msg.sender : msg.recipient)}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 12, color: CB.textLight }}>{new Date(msg.sent_at).toLocaleString()}</div>
                  {msg.read_at && <div style={{ fontSize: 11, color: CB.green, marginTop: 2 }}>✓ Read {formatTime(msg.read_at)}</div>}
                </div>
              </div>
              {/* Thread */}
              <div style={{ maxHeight: 500, overflowY: "auto" }}>
                {(thread.length > 1 ? thread : [msg]).map((m, i) => (
                  <div key={m.id} style={{ padding: "16px 24px", borderBottom: i < (thread.length > 1 ? thread.length : 1) - 1 ? `1px solid ${CB.border}` : "none",
                    background: m.id === msg.id ? "#F0FDFA" : "transparent" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: m.sender_staff_id === myStaffId ? CB.teal : CB.navy }}>
                        {m.sender_staff_id === myStaffId ? "You" : staffName(m.sender)}
                      </span>
                      <span style={{ fontSize: 12, color: CB.textLight }}>{formatTime(m.sent_at)}</span>
                    </div>
                    <div style={{ fontSize: 14, color: CB.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{m.body}</div>
                  </div>
                ))}
              </div>
              {/* Reply bar */}
              <div style={{ padding: "16px 24px", borderTop: `1px solid ${CB.border}`, background: CB.cream }}>
                <button onClick={() => handleReply(msg)} style={{
                  padding: "10px 20px", background: CB.navy, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8,
                }}>
                  {icons.arrowRight({ size: 15, color: CB.white })} Reply
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <PageHeader title="Messages" subtitle="HIPAA-compliant internal messaging" action={
            <button onClick={() => { setShowCompose(true); setReplyTo(null); setCompose({ recipient_staff_id: "", subject: "", body: "", is_urgent: false }); }}
              style={{ padding: "10px 20px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
              {icons.edit({ size: 16, color: CB.white })} Compose
            </button>
          } />

          {/* HIPAA Notice */}
          <div style={{
            padding: "12px 18px", borderRadius: 10, background: "#FFFBEB", border: "1px solid #FDE68A",
            marginBottom: 20, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "#92400E",
          }}>
            {icons.lock({ size: 16, color: "#92400E" })}
            <span><strong>HIPAA Notice:</strong> Messages are encrypted and stored within your organization. Do not include PHI in subject lines. All messages are logged for compliance auditing.</span>
          </div>

          {/* Tabs + Search */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", gap: 4, background: CB.cream, padding: 4, borderRadius: 12 }}>
              <TabBtn value="inbox" label="Inbox" count={tab === "inbox" ? unreadCount : 0} />
              <TabBtn value="sent" label="Sent" />
              <TabBtn value="secure" label="Secure Email" />
            </div>
            <div style={{ position: "relative" }}>
              {icons.search({ size: 16, color: CB.textLight, style: { position: "absolute", left: 12, top: 11 } })}
              <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search messages..."
                style={{ ...fieldStyle, width: 260, paddingLeft: 36 }} />
            </div>
          </div>

          {/* Secure Email Tab */}
          {tab === "secure" && (() => {
            const SecureEmail = () => {
              const [secForm, setSecForm] = useState({ recipient_name: "", recipient_email: "", recipient_type: "sce", subject: "", body: "", include_phi: false });
              const templates = {
                sce: { label: "Support Coordinator", subject: "Service Update — [Client]", body: "Dear [SCE Name],\n\nI am writing to provide an update regarding services for [Client Name].\n\n[Details]\n\nPlease do not hesitate to contact us with questions.\n\nSincerely,\nHope Haven Services Inc." },
                physician: { label: "Physician", subject: "Medical Update — [Client]", body: "Dear Dr. [Name],\n\nThis letter is regarding your patient, [Client Name], who receives residential and community support services through Hope Haven Services Inc.\n\n[Medical details]\n\nPlease contact us at your earliest convenience.\n\nSincerely,\nHope Haven Services Inc." },
                family: { label: "Family / Guardian", subject: "Monthly Update — [Client]", body: "Dear [Family Member],\n\nWe hope this message finds you well. Below is an update on [Client Name]'s services and progress this month.\n\n[Update details]\n\nWarm regards,\nHope Haven Services Inc." },
                dspd: { label: "DSPD / State", subject: "Provider Communication — DHHS91172", body: "To Whom It May Concern,\n\nHope Haven Services Inc. (DHHS Contract #DHHS91172) is writing regarding:\n\n[Details]\n\nPlease contact us at hopehaven@hopehavenservices.org for any questions.\n\nSincerely,\nHope Haven Services Inc." },
              };
              const loadTemplate = (type) => {
                const t = templates[type];
                setSecForm(f => ({ ...f, recipient_type: type, subject: t.subject, body: t.body }));
              };
              const generateSecurePDF = () => {
                if (!secForm.subject || !secForm.body) return addToast("Subject and body required", "error");
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18); doc.setFont(undefined, "bold"); doc.text("Hope Haven Services Inc.", 20, 20);
                doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.text("DHHS Contract: DHHS91172 | hopehaven@hopehavenservices.org", 20, 27);
                doc.setFontSize(8); doc.text("CONFIDENTIAL — This communication may contain Protected Health Information (PHI)", 20, 33);
                doc.setLineWidth(0.5); doc.line(20, 36, 190, 36);
                let y = 44;
                doc.setFontSize(10); doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, y); y += 6;
                doc.text(`To: ${secForm.recipient_name || "Recipient"}`, 20, y); y += 6;
                if (secForm.recipient_email) { doc.text(`Email: ${secForm.recipient_email}`, 20, y); y += 6; }
                doc.text(`Re: ${secForm.subject}`, 20, y); y += 10;
                doc.setFontSize(10);
                const lines = doc.splitTextToSize(secForm.body, 170);
                lines.forEach(line => { if (y > 270) { doc.addPage(); y = 20; } doc.text(line, 20, y); y += 5; });
                y += 16; doc.line(20, y, 90, y); doc.text("Authorized Signature", 20, y + 5);
                doc.line(110, y, 190, y); doc.text("Date", 110, y + 5);
                const pages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= pages; i++) { doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150); doc.text(`Generated by Provly — HIPAA Secure Communication — Page ${i}/${pages}`, 20, 285); doc.setTextColor(0); }
                doc.save(`Secure_Letter_${secForm.recipient_type}_${new Date().toISOString().split("T")[0]}.pdf`);
                addToast("Secure PDF generated — check downloads", "success");
                // Log the communication
                if (myStaffId) {
                  supabase.from("messages").insert({
                    org_id: orgId, sender_staff_id: myStaffId, recipient_staff_id: myStaffId,
                    subject: `[Secure Email] ${secForm.subject}`,
                    body: `External secure communication sent to: ${secForm.recipient_name} (${secForm.recipient_email || "N/A"})\nType: ${templates[secForm.recipient_type]?.label || secForm.recipient_type}\n\n--- Message ---\n${secForm.body.substring(0, 500)}`,
                    is_urgent: false,
                  }).then(() => {});
                }
              };
              const copyToClipboard = () => {
                const text = `To: ${secForm.recipient_name} <${secForm.recipient_email}>\nSubject: ${secForm.subject}\n\n${secForm.body}\n\n---\nThis message was composed via Provly Secure Communications.\nHope Haven Services Inc. | DHHS91172`;
                navigator.clipboard.writeText(text);
                addToast("Copied to clipboard", "success");
              };
              const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };
              return (
                <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, padding: 24 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                    {icons.lock({ size: 18, color: CB.teal })}
                    <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, margin: 0 }}>Secure External Communication</h3>
                  </div>
                  <p style={{ fontSize: 13, color: CB.textMid, marginBottom: 16 }}>Compose secure letters to support coordinators, physicians, families, or DSPD. Generate as PDF for secure transmission.</p>
                  <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
                    {Object.entries(templates).map(([key, t]) => (
                      <button key={key} onClick={() => loadTemplate(key)} style={{
                        padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                        border: `1px solid ${secForm.recipient_type === key ? CB.teal : CB.border}`,
                        background: secForm.recipient_type === key ? `${CB.teal}10` : CB.white,
                        color: secForm.recipient_type === key ? CB.teal : CB.textMid, cursor: "pointer",
                      }}>{t.label}</button>
                    ))}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
                    <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Recipient Name</label><input style={fs} value={secForm.recipient_name} onChange={e => setSecForm(f => ({ ...f, recipient_name: e.target.value }))} placeholder="Dr. Smith, Andrea Farnsworth, etc." /></div>
                    <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Recipient Email</label><input style={fs} type="email" value={secForm.recipient_email} onChange={e => setSecForm(f => ({ ...f, recipient_email: e.target.value }))} placeholder="email@example.com" /></div>
                  </div>
                  <div style={{ marginBottom: 14 }}><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Subject</label><input style={fs} value={secForm.subject} onChange={e => setSecForm(f => ({ ...f, subject: e.target.value }))} /></div>
                  <div style={{ marginBottom: 14 }}><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Message Body</label><textarea style={{ ...fs, minHeight: 180, resize: "vertical" }} value={secForm.body} onChange={e => setSecForm(f => ({ ...f, body: e.target.value }))} /></div>
                  <div style={{ padding: "10px 16px", background: "#FFF8E1", borderRadius: 10, marginBottom: 16, display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "#92400E" }}>
                    {icons.alertTriangle({ size: 14, color: "#92400E" })}
                    <span><strong>PHI Warning:</strong> If this message contains Protected Health Information, transmit the PDF via encrypted email or hand-deliver. Do not send PHI over unencrypted channels.</span>
                  </div>
                  <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                    <button onClick={copyToClipboard} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Copy to Clipboard</button>
                    <button onClick={generateSecurePDF} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>{icons.lock({ size: 14 })} Generate Secure PDF</button>
                  </div>
                </div>
              );
            };
            return <SecureEmail />;
          })()}

          {/* Message list — only show for inbox/sent tabs */}
          {(tab === "inbox" || tab === "sent") && (
          <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
            {loading ? (
              <div style={{ padding: 40, textAlign: "center" }}><Spinner /></div>
            ) : filtered.length === 0 ? (
              <div style={{ padding: 48, textAlign: "center" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>{tab === "inbox" ? "📬" : "📤"}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>{searchQ ? "No messages found" : tab === "inbox" ? "Inbox is empty" : "No sent messages"}</div>
                <div style={{ fontSize: 13, color: CB.textMid }}>{searchQ ? "Try a different search" : "Compose a new message to get started"}</div>
              </div>
            ) : (
              filtered.map((msg, i) => {
                const isUnread = tab === "inbox" && !msg.read_at;
                const otherPerson = tab === "inbox" ? msg.sender : msg.recipient;
                return (
                  <div key={msg.id} onClick={() => openMessage(msg)} style={{
                    padding: "16px 24px", borderBottom: i < filtered.length - 1 ? `1px solid ${CB.border}` : "none",
                    cursor: "pointer", transition: "background 0.1s",
                    background: isUnread ? "#F0FDFA" : "transparent",
                    display: "flex", alignItems: "center", gap: 16,
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = isUnread ? "#E0F7FA" : CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = isUnread ? "#F0FDFA" : "transparent"}
                  >
                    {/* Avatar */}
                    <div style={{
                      width: 40, height: 40, borderRadius: 12, flexShrink: 0,
                      background: isUnread ? `linear-gradient(135deg, ${CB.teal}, ${CB.tealDark})` : CB.cream,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 15, fontWeight: 700, color: isUnread ? CB.white : CB.textMid,
                    }}>{(otherPerson?.first_name || "?")[0].toUpperCase()}</div>
                    {/* Content */}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                        <span style={{ fontSize: 14, fontWeight: isUnread ? 800 : 600, color: CB.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {staffName(otherPerson)}
                        </span>
                        {msg.is_urgent && <span style={{ background: "#FEF2F2", color: CB.red, fontSize: 10, fontWeight: 800, padding: "1px 6px", borderRadius: 4 }}>URGENT</span>}
                      </div>
                      <div style={{ fontSize: 13, fontWeight: isUnread ? 700 : 500, color: isUnread ? CB.text : CB.textMid, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {msg.subject || "(No subject)"}
                      </div>
                      <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {(msg.body || "").substring(0, 100)}
                      </div>
                    </div>
                    {/* Time + read */}
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, color: isUnread ? CB.teal : CB.textLight, fontWeight: isUnread ? 700 : 400 }}>{formatTime(msg.sent_at)}</div>
                      {tab === "sent" && msg.read_at && <div style={{ fontSize: 11, color: CB.green, marginTop: 2 }}>✓ Read</div>}
                      {tab === "sent" && !msg.read_at && <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>Delivered</div>}
                      {isUnread && <div style={{ width: 8, height: 8, borderRadius: 4, background: CB.teal, marginLeft: "auto", marginTop: 4 }} />}
                    </div>
                  </div>
                );
              })
            )}
          </div>
          )}

          {/* Compose Modal */}
          <Modal open={showCompose} onClose={() => { setShowCompose(false); setReplyTo(null); }} title={replyTo ? "Reply" : "New Message"} subtitle="Messages are encrypted and audit-logged" width={600}>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Recipient */}
              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 6, display: "block" }}>To</label>
                <select value={compose.recipient_staff_id} onChange={e => setCompose(p => ({ ...p, recipient_staff_id: e.target.value }))}
                  style={fieldStyle}>
                  <option value="">Select staff member...</option>
                  {staff.map(s => (
                    <option key={s.id} value={s.id}>{s.first_name} {s.last_name} — {STAFF_ROLES.find(r => r.value === s.role)?.label || s.role}</option>
                  ))}
                </select>
              </div>
              {/* Subject */}
              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 6, display: "block" }}>Subject</label>
                <input value={compose.subject} onChange={e => setCompose(p => ({ ...p, subject: e.target.value }))} placeholder="Brief subject (no PHI)" style={fieldStyle} />
                <div style={{ fontSize: 11, color: "#92400E", marginTop: 4 }}>⚠ Do not include client names or protected health information in the subject line.</div>
              </div>
              {/* Body */}
              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 6, display: "block" }}>Message</label>
                <textarea value={compose.body} onChange={e => setCompose(p => ({ ...p, body: e.target.value }))} rows={8}
                  placeholder="Type your message..." style={{ ...fieldStyle, resize: "vertical", minHeight: 140 }} />
              </div>
              {/* Urgent toggle */}
              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                <input type="checkbox" checked={compose.is_urgent} onChange={e => setCompose(p => ({ ...p, is_urgent: e.target.checked }))}
                  style={{ width: 18, height: 18, accentColor: CB.red }} />
                <span style={{ fontSize: 14, fontWeight: 600, color: CB.red }}>Mark as Urgent</span>
              </label>
              {/* Reply context */}
              {replyTo && (
                <div style={{ padding: "12px 16px", background: CB.cream, borderRadius: 10, borderLeft: `3px solid ${CB.teal}` }}>
                  <div style={{ fontSize: 12, color: CB.textMid, marginBottom: 4 }}>Replying to {staffName(replyTo.sender_staff_id === myStaffId ? replyTo.recipient : replyTo.sender)} — {formatTime(replyTo.sent_at)}</div>
                  <div style={{ fontSize: 13, color: CB.textMid, fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{(replyTo.body || "").substring(0, 150)}</div>
                </div>
              )}
              {/* Send button */}
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                <button onClick={() => { setShowCompose(false); setReplyTo(null); }} style={{
                  padding: "10px 20px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10,
                  fontSize: 14, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                }}>Cancel</button>
                <button onClick={handleSend} style={{
                  padding: "10px 24px", background: CB.teal, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8,
                }}>{icons.arrowRight({ size: 15, color: CB.white })} Send</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // UNIVERSAL PROVIDER DATA MIGRATION TOOL
    // ═══════════════════════════════════════════════════════════════
    const IMPORT_TYPES = {
      staff: {
        label: "Staff / Employees",
        table: "staff",
        icon: icons.users,
        fields: [
          { key: "first_name", label: "First Name", required: true },
          { key: "last_name", label: "Last Name", required: true },
          { key: "email", label: "Email" },
          { key: "phone", label: "Phone" },
          { key: "role", label: "Role", note: "dsp, rn, bcba, house_manager, etc." },
          { key: "hire_date", label: "Hire Date" },
          { key: "date_of_birth", label: "Date of Birth" },
          { key: "is_active", label: "Active Status", note: "true/false, yes/no, active/inactive" },
        ],
      },
      clients: {
        label: "Clients / Individuals",
        table: "persons",
        icon: icons.heart,
        fields: [
          { key: "first_name", label: "First Name", required: true },
          { key: "last_name", label: "Last Name", required: true },
          { key: "date_of_birth", label: "Date of Birth" },
          { key: "medicaid_number", label: "Medicaid Number" },
          { key: "pid", label: "PID / Person ID" },
          { key: "gender", label: "Gender" },
          { key: "phone", label: "Phone" },
          { key: "address", label: "Address" },
          { key: "city", label: "City" },
          { key: "state", label: "State" },
          { key: "zip", label: "ZIP" },
          { key: "is_active", label: "Active Status" },
        ],
      },
      trainings: {
        label: "Training Records",
        table: "staff_trainings",
        icon: icons.book,
        fields: [
          { key: "staff_email", label: "Staff Email", required: true, note: "Used to match existing staff" },
          { key: "topic_name", label: "Training Topic", required: true },
          { key: "completed_at", label: "Date Completed" },
          { key: "expires_at", label: "Expiration Date" },
          { key: "provider", label: "Training Provider" },
        ],
      },
    };

    // Auto-detect column mappings from common EHR headers
    const HEADER_ALIASES = {
      first_name: ["first name", "firstname", "first", "fname", "given name"],
      last_name: ["last name", "lastname", "last", "lname", "surname", "family name"],
      email: ["email", "email address", "emailaddress", "e-mail"],
      phone: ["phone", "phone number", "phonenumber", "telephone", "cell", "mobile"],
      role: ["role", "position", "title", "job title", "jobtitle"],
      hire_date: ["hire date", "hiredate", "start date", "startdate", "date hired", "datehired"],
      date_of_birth: ["date of birth", "dateofbirth", "dob", "birthdate", "birth date", "birthday"],
      is_active: ["active", "status", "is_active", "isactive", "active status"],
      medicaid_number: ["medicaid", "medicaid number", "medicaid id", "medicaidid", "medicaid_number"],
      pid: ["pid", "person id", "personid", "client id", "clientid", "individual id"],
      gender: ["gender", "sex"],
      address: ["address", "street", "street address", "address1", "address 1"],
      city: ["city", "town"],
      state: ["state", "st", "province"],
      zip: ["zip", "zipcode", "zip code", "postal", "postal code"],
      staff_email: ["staff email", "employee email", "email"],
      topic_name: ["topic", "training", "training topic", "course", "course name"],
      completed_at: ["completed", "completed date", "date completed", "completion date"],
      expires_at: ["expires", "expiration", "expiration date", "expires at"],
      provider: ["provider", "training provider", "vendor", "source"],
    };

    function autoMapColumns(csvHeaders, targetFields) {
      const mapping = {};
      targetFields.forEach(field => {
        const aliases = HEADER_ALIASES[field.key] || [field.key];
        const match = csvHeaders.find(h => {
          const norm = h.toLowerCase().trim();
          return aliases.includes(norm) || norm === field.key;
        });
        if (match) mapping[field.key] = match;
      });
      return mapping;
    }

    function parseValue(val, key) {
      if (val === null || val === undefined || val === "") return null;
      const v = String(val).trim();
      if (key === "is_active") {
        const lower = v.toLowerCase();
        if (["true", "yes", "active", "1", "y"].includes(lower)) return true;
        if (["false", "no", "inactive", "0", "n", "terminated"].includes(lower)) return false;
        return true;
      }
      if (key === "role") {
        const lower = v.toLowerCase().replace(/\s+/g, "_");
        const roleMap = { direct_support_professional: "dsp", dsp: "dsp", registered_nurse: "rn", rn: "rn", bcba: "bcba", administrator: "admin", admin: "admin", owner: "owner", house_manager: "house_manager", compliance_director: "compliance_director", residential_director: "residential_director", day_program_director: "day_program_director" };
        return roleMap[lower] || "dsp";
      }
      if (["hire_date", "date_of_birth", "completed_at", "expires_at"].includes(key)) {
        const d = new Date(v);
        return isNaN(d.getTime()) ? null : d.toISOString().split("T")[0];
      }
      return v;
    }

    function MigrationPage() {
      const { orgId } = useAuth();
      const { addToast } = useToast();
      const [step, setStep] = useState(0); // 0=type, 1=upload, 2=map, 3=preview, 4=importing, 5=done
      const [importType, setImportType] = useState(null);
      const [csvData, setCsvData] = useState(null); // { headers, rows }
      const [fileName, setFileName] = useState("");
      const [mapping, setMapping] = useState({});
      const [importing, setImporting] = useState(false);
      const [progress, setProgress] = useState({ done: 0, total: 0, errors: [] });
      const fileRef = useRef(null);

      const typeConfig = importType ? IMPORT_TYPES[importType] : null;

      const handleFile = (file) => {
        if (!file) return;
        setFileName(file.name);
        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: (result) => {
            if (!result.data || result.data.length === 0) return addToast("No data found in file", "error");
            const headers = result.meta.fields || Object.keys(result.data[0]);
            setCsvData({ headers, rows: result.data });
            const autoMap = autoMapColumns(headers, typeConfig.fields);
            setMapping(autoMap);
            setStep(2);
          },
          error: (err) => addToast("Failed to parse file: " + err.message, "error"),
        });
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer?.files?.[0];
        if (file) handleFile(file);
      };

      const mappedCount = typeConfig ? typeConfig.fields.filter(f => mapping[f.key]).length : 0;
      const requiredMapped = typeConfig ? typeConfig.fields.filter(f => f.required).every(f => mapping[f.key]) : false;

      const previewRows = useMemo(() => {
        if (!csvData || !typeConfig) return [];
        return csvData.rows.slice(0, 10).map(row => {
          const mapped = {};
          typeConfig.fields.forEach(f => {
            const csvCol = mapping[f.key];
            mapped[f.key] = csvCol ? parseValue(row[csvCol], f.key) : null;
          });
          return mapped;
        });
      }, [csvData, mapping, typeConfig]);

      const validationWarnings = useMemo(() => {
        if (!csvData || !typeConfig) return [];
        const warns = [];
        const reqFields = typeConfig.fields.filter(f => f.required);
        let missingCount = 0;
        csvData.rows.forEach((row, i) => {
          reqFields.forEach(f => {
            const csvCol = mapping[f.key];
            if (!csvCol || !row[csvCol] || !String(row[csvCol]).trim()) missingCount++;
          });
        });
        if (missingCount > 0) warns.push(`${missingCount} missing required field values — those rows will be skipped`);
        const unmapped = typeConfig.fields.filter(f => !mapping[f.key] && !f.required);
        if (unmapped.length > 0) warns.push(`${unmapped.length} optional fields not mapped: ${unmapped.map(f => f.label).join(", ")}`);
        return warns;
      }, [csvData, mapping, typeConfig]);

      const doImport = async () => {
        if (!csvData || !typeConfig || !orgId) return;
        setImporting(true);
        setStep(4);
        const errors = [];
        const reqFields = typeConfig.fields.filter(f => f.required);
        const validRows = csvData.rows.filter(row => {
          return reqFields.every(f => {
            const csvCol = mapping[f.key];
            return csvCol && row[csvCol] && String(row[csvCol]).trim();
          });
        });
        setProgress({ done: 0, total: validRows.length, errors: [] });

        // Batch import in chunks of 25
        const BATCH = 25;
        let done = 0;

        // For training imports, pre-fetch staff and topics
        let staffLookup = {}, topicLookup = {};
        if (importType === "trainings") {
          const { data: staffData } = await supabase.from("staff").select("id, email").eq("org_id", orgId);
          (staffData || []).forEach(s => { if (s.email) staffLookup[s.email.toLowerCase()] = s.id; });
          const { data: topicData } = await supabase.from("training_topic_definitions").select("id, name").eq("org_id", orgId);
          (topicData || []).forEach(t => { topicLookup[t.name.toLowerCase()] = t.id; });
        }

        for (let i = 0; i < validRows.length; i += BATCH) {
          const batch = validRows.slice(i, i + BATCH);
          const records = batch.map(row => {
            const rec = { org_id: orgId };
            typeConfig.fields.forEach(f => {
              if (f.key === "staff_email") return; // handled separately for trainings
              const csvCol = mapping[f.key];
              if (csvCol) rec[f.key] = parseValue(row[csvCol], f.key);
            });
            // Training-specific: resolve staff_id and topic_id
            if (importType === "trainings") {
              const email = mapping.staff_email ? String(row[mapping.staff_email] || "").toLowerCase().trim() : "";
              rec.staff_id = staffLookup[email] || null;
              const topicName = mapping.topic_name ? String(row[mapping.topic_name] || "").toLowerCase().trim() : "";
              rec.training_topic_id = topicLookup[topicName] || null;
              delete rec.topic_name;
              if (!rec.staff_id) { errors.push(`Row ${i + batch.indexOf(row) + 1}: Staff email "${email}" not found`); return null; }
            }
            return rec;
          }).filter(Boolean);

          if (records.length > 0) {
            const { error } = await supabase.from(typeConfig.table).insert(records);
            if (error) errors.push(`Batch ${Math.floor(i / BATCH) + 1}: ${error.message}`);
          }
          done += batch.length;
          setProgress({ done, total: validRows.length, errors: [...errors] });
        }

        setStep(5);
        setImporting(false);
        if (errors.length === 0) addToast(`Successfully imported ${validRows.length} ${typeConfig.label.toLowerCase()}`, "success");
        else addToast(`Import completed with ${errors.length} errors`, "warning");
      };

      const reset = () => {
        setStep(0); setImportType(null); setCsvData(null); setFileName("");
        setMapping({}); setProgress({ done: 0, total: 0, errors: [] });
      };

      return (
        <div>
          <PageHeader title="Data Migration" subtitle="Import data from AxisCare, Therap, or any CSV export" action={
            step > 0 && (
              <button onClick={reset} style={{ padding: "10px 18px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10, fontSize: 13, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}>
                {icons.refresh({ size: 14 })} Start Over
              </button>
            )
          } />

          {/* Progress steps */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 28 }}>
            {["Select Type", "Upload CSV", "Map Columns", "Preview", "Import"].map((label, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div style={{ width: 24, height: 2, background: i <= step ? CB.teal : CB.border }} />}
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 800, background: i < step ? CB.teal : i === step ? CB.navy : CB.cream,
                    color: i <= step ? CB.white : CB.textLight, border: `2px solid ${i <= step ? "transparent" : CB.border}`,
                  }}>{i < step ? "✓" : i + 1}</div>
                  <span style={{ fontSize: 12, fontWeight: 600, color: i === step ? CB.navy : CB.textLight, display: window.innerWidth < 600 ? "none" : "inline" }}>{label}</span>
                </div>
              </React.Fragment>
            ))}
          </div>

          {/* Step 0: Select Type */}
          {step === 0 && (
            <RGrid cols={3} gap={16}>
              {Object.entries(IMPORT_TYPES).map(([key, config]) => (
                <button key={key} onClick={() => { setImportType(key); setStep(1); }} style={{
                  padding: 24, borderRadius: 16, border: `1px solid ${CB.border}`, background: CB.white,
                  cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s",
                  boxShadow: CB.cardShadow, display: "flex", flexDirection: "column", gap: 12,
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.transform = "translateY(-2px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.transform = "none"; }}
                >
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: `${CB.teal}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {config.icon({ size: 22, color: CB.teal })}
                  </div>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>{config.label}</div>
                    <div style={{ fontSize: 13, color: CB.textMid, marginTop: 4 }}>{config.fields.length} fields • Import from any CSV</div>
                  </div>
                </button>
              ))}
            </RGrid>
          )}

          {/* Step 1: Upload */}
          {step === 1 && typeConfig && (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, padding: 32 }}>
              <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 8 }}>Upload {typeConfig.label} CSV</h3>
              <p style={{ fontSize: 13, color: CB.textMid, marginBottom: 24 }}>Export your data from AxisCare, Therap, or any system as a CSV file, then upload it here. We'll auto-detect the columns.</p>
              <div
                onDrop={handleDrop} onDragOver={e => e.preventDefault()}
                onClick={() => fileRef.current?.click()}
                style={{
                  border: `2px dashed ${CB.border}`, borderRadius: 16, padding: "48px 24px", textAlign: "center",
                  cursor: "pointer", transition: "all 0.2s", background: CB.cream,
                }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.background = "#F0FDFA"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.background = CB.cream; }}
              >
                <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" style={{ display: "none" }} onChange={e => handleFile(e.target.files?.[0])} />
                <div style={{ marginBottom: 12 }}>{icons.upload({ size: 36, color: CB.teal })}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>Drop CSV file here or click to browse</div>
                <div style={{ fontSize: 13, color: CB.textMid }}>Supports .csv, .tsv exports from AxisCare, Therap, and other DSPD platforms</div>
              </div>
              <div style={{ marginTop: 24 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 8 }}>Expected fields:</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {typeConfig.fields.map(f => (
                    <Badge key={f.key} text={`${f.label}${f.required ? " *" : ""}`} color={f.required ? CB.teal : CB.textLight} />
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Step 2: Map Columns */}
          {step === 2 && typeConfig && csvData && (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, padding: 32 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
                <div>
                  <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy }}>Map Columns</h3>
                  <p style={{ fontSize: 13, color: CB.textMid, marginTop: 2 }}>
                    <strong>{fileName}</strong> — {csvData.rows.length} rows, {csvData.headers.length} columns • {mappedCount}/{typeConfig.fields.length} fields mapped
                  </p>
                </div>
                <Badge text={requiredMapped ? "Ready to preview" : "Map required fields"} color={requiredMapped ? CB.green : CB.amber} />
              </div>
              <div style={{ display: "grid", gap: 12 }}>
                {typeConfig.fields.map(field => (
                  <div key={field.key} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: mapping[field.key] ? "#F0FDFA" : CB.cream, borderRadius: 10, border: `1px solid ${mapping[field.key] ? `${CB.teal}40` : CB.border}`, flexWrap: "wrap" }}>
                    <div style={{ width: 180, flexShrink: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy, display: "flex", alignItems: "center", gap: 6 }}>
                        {field.label} {field.required && <span style={{ color: CB.red, fontSize: 16 }}>*</span>}
                      </div>
                      {field.note && <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>{field.note}</div>}
                    </div>
                    <div style={{ fontSize: 13, color: CB.textLight, fontWeight: 600 }}>←</div>
                    <select value={mapping[field.key] || ""} onChange={e => setMapping(p => ({ ...p, [field.key]: e.target.value || undefined }))}
                      style={{ ...fieldStyle, flex: 1, minWidth: 180, background: CB.white }}>
                      <option value="">— Skip this field —</option>
                      {csvData.headers.map(h => <option key={h} value={h}>{h}</option>)}
                    </select>
                    {mapping[field.key] && (
                      <div style={{ fontSize: 12, color: CB.textMid, fontStyle: "italic", minWidth: 120 }}>
                        e.g. "{csvData.rows[0]?.[mapping[field.key]] || "—"}"
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 24 }}>
                <button onClick={() => setStep(3)} disabled={!requiredMapped} style={{
                  padding: "12px 24px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: requiredMapped ? CB.teal : CB.border, color: requiredMapped ? CB.white : CB.textLight,
                  cursor: requiredMapped ? "pointer" : "not-allowed", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 8,
                }}>Preview Data {icons.arrowRight({ size: 15, color: requiredMapped ? CB.white : CB.textLight })}</button>
              </div>
            </div>
          )}

          {/* Step 3: Preview */}
          {step === 3 && typeConfig && csvData && (
            <div>
              {validationWarnings.length > 0 && (
                <div style={{ marginBottom: 16, padding: "12px 18px", borderRadius: 10, background: "#FFFBEB", border: "1px solid #FDE68A", display: "flex", flexDirection: "column", gap: 4 }}>
                  {validationWarnings.map((w, i) => (
                    <div key={i} style={{ fontSize: 13, color: "#92400E", display: "flex", alignItems: "center", gap: 8 }}>
                      {icons.alertTriangle({ size: 14, color: "#92400E" })} {w}
                    </div>
                  ))}
                </div>
              )}
              <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
                <div style={{ padding: "16px 24px", borderBottom: `1px solid ${CB.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>Preview — first 10 of {csvData.rows.length} rows</div>
                </div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ background: CB.cream }}>
                        {typeConfig.fields.filter(f => mapping[f.key]).map(f => (
                          <th key={f.key} style={{ padding: "10px 14px", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", textAlign: "left", whiteSpace: "nowrap", borderBottom: `1px solid ${CB.border}` }}>{f.label}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {previewRows.map((row, ri) => (
                        <tr key={ri} style={{ borderBottom: `1px solid ${CB.border}` }}>
                          {typeConfig.fields.filter(f => mapping[f.key]).map(f => (
                            <td key={f.key} style={{ padding: "10px 14px", fontSize: 13, color: row[f.key] ? CB.text : CB.textLight, whiteSpace: "nowrap" }}>
                              {row[f.key] !== null && row[f.key] !== undefined ? String(row[f.key]) : "—"}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24 }}>
                <button onClick={() => setStep(2)} style={{ padding: "12px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: "transparent", fontSize: 14, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>← Back to Mapping</button>
                <button onClick={doImport} style={{
                  padding: "12px 24px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: CB.green, color: CB.white, cursor: "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 8,
                }}>{icons.upload({ size: 15, color: CB.white })} Import {csvData.rows.length} Records</button>
              </div>
            </div>
          )}

          {/* Step 4: Importing */}
          {step === 4 && (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, padding: 48, textAlign: "center" }}>
              <Spinner size={32} />
              <div style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginTop: 20 }}>Importing...</div>
              <div style={{ fontSize: 14, color: CB.textMid, marginTop: 4 }}>{progress.done} of {progress.total} records</div>
              <div style={{ width: "100%", maxWidth: 400, height: 8, background: CB.cream, borderRadius: 4, margin: "20px auto 0", overflow: "hidden" }}>
                <div style={{ width: `${progress.total ? (progress.done / progress.total * 100) : 0}%`, height: "100%", background: CB.teal, borderRadius: 4, transition: "width 0.3s" }} />
              </div>
            </div>
          )}

          {/* Step 5: Done */}
          {step === 5 && (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, padding: 48, textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 16, animation: "successPop 0.5s ease" }}>{progress.errors.length === 0 ? "✅" : "⚠️"}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: CB.navy, marginBottom: 8 }}>
                {progress.errors.length === 0 ? "Import Complete" : "Import Completed with Errors"}
              </div>
              <div style={{ fontSize: 15, color: CB.textMid, marginBottom: 24 }}>
                {progress.done} records processed from {fileName}
              </div>
              {progress.errors.length > 0 && (
                <div style={{ textAlign: "left", maxWidth: 500, margin: "0 auto 24px", padding: 16, background: "#FEF2F2", borderRadius: 10, border: "1px solid #FECACA", maxHeight: 200, overflowY: "auto" }}>
                  {progress.errors.map((err, i) => (
                    <div key={i} style={{ fontSize: 12, color: CB.red, marginBottom: 4 }}>{err}</div>
                  ))}
                </div>
              )}
              <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                <button onClick={reset} style={{
                  padding: "12px 24px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: CB.teal, color: CB.white, cursor: "pointer", fontFamily: "inherit",
                }}>Import More Data</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // CLAUDE AI INTELLIGENCE LAYER — shift handoffs & quarterly drafts
    // ═══════════════════════════════════════════════════════════════
    function AIPage() {
      const { addToast } = useToast();
      const [clients, setClients] = useState([]);
      const [selectedClient, setSelectedClient] = useState("");
      const [aiMode, setAiMode] = useState("handoff");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [dateRange, setDateRange] = useState(() => {
        const now = new Date();
        return {
          start: new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split("T")[0],
          end: now.toISOString().split("T")[0],
        };
      });

      useEffect(() => {
        supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name")
          .then(({ data }) => setClients(data || []));
      }, []);

      const generateHandoff = async () => {
        if (!selectedClient) return addToast("Select a client", "error");
        setLoading(true);
        setResult(null);

        // Get today's notes for this client
        const today = new Date().toISOString().split("T")[0];
        const { data: notes } = await supabase.from("service_notes")
          .select("service_date, start_time, end_time, duration_minutes, summary_note, status, staff!service_notes_staff_id_fkey(first_name, last_name), service_code_definitions(code, name)")
          .eq("person_id", selectedClient)
          .gte("service_date", today)
          .order("start_time");

        if (!notes || notes.length === 0) {
          addToast("No notes found for today — try generating a quarterly summary instead", "warning");
          setLoading(false);
          return;
        }

        const client = clients.find(c => c.id === selectedClient);
        const notesSummary = notes.map(n =>
          `${n.service_code_definitions?.code || "?"} (${n.start_time?.slice(0,5) || "?"}-${n.end_time?.slice(0,5) || "?"}) by ${n.staff?.first_name || "?"} ${n.staff?.last_name || ""}: ${n.summary_note || "No notes"}`
        ).join("\n\n");

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: `You are a DSPD compliance assistant for Hope Haven Services Inc. Generate a concise shift handoff summary for the incoming staff.\n\nClient: ${client?.first_name} ${client?.last_name}\nDate: ${today}\n\nToday's service notes:\n${notesSummary}\n\nProvide:\n1. Key events and observations from today\n2. Any behavioral concerns or notable changes\n3. Pending tasks or follow-ups for the next shift\n4. Medication or health notes if mentioned\n\nKeep it concise, professional, and actionable. Use bullet points.` }],
            }),
          });
          const data = await response.json();
          const text = data.content?.map(c => c.text || "").join("") || "No response generated";
          setResult({ type: "handoff", content: text, client: `${client?.first_name} ${client?.last_name}`, date: today, noteCount: notes.length });
        } catch (e) {
          addToast("AI generation failed — check API access", "error");
        }
        setLoading(false);
      };

      const generateQuarterly = async () => {
        if (!selectedClient) return addToast("Select a client", "error");
        setLoading(true);
        setResult(null);

        const { data: notes } = await supabase.from("service_notes")
          .select("service_date, duration_minutes, summary_note, service_code_definitions(code, name)")
          .eq("person_id", selectedClient)
          .gte("service_date", dateRange.start)
          .lte("service_date", dateRange.end)
          .order("service_date");

        if (!notes || notes.length === 0) {
          addToast("No notes found in this date range", "warning");
          setLoading(false);
          return;
        }

        const client = clients.find(c => c.id === selectedClient);
        const notesSummary = notes.map(n =>
          `${n.service_date} — ${n.service_code_definitions?.code || "?"}: ${(n.summary_note || "").substring(0, 300)}`
        ).join("\n\n");

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: `You are a DSPD compliance assistant for Hope Haven Services Inc. Generate a quarterly progress summary to send to the support coordinator.\n\nClient: ${client?.first_name} ${client?.last_name}\nPeriod: ${dateRange.start} to ${dateRange.end}\nTotal service notes: ${notes.length}\n\nService notes for this period:\n${notesSummary}\n\nGenerate a professional quarterly summary including:\n1. Overview of services provided (types, frequency)\n2. Progress on ISP goals\n3. Behavioral trends and observations\n4. Health and medical updates mentioned\n5. Recommendations for the upcoming quarter\n6. Any concerns or areas needing support coordinator attention\n\nFormat professionally for submission to DSPD support coordinators.` }],
            }),
          });
          const data = await response.json();
          const text = data.content?.map(c => c.text || "").join("") || "No response generated";
          setResult({ type: "quarterly", content: text, client: `${client?.first_name} ${client?.last_name}`, period: `${dateRange.start} to ${dateRange.end}`, noteCount: notes.length });
        } catch (e) {
          addToast("AI generation failed — check API access", "error");
        }
        setLoading(false);
      };

      const copyToClipboard = () => {
        if (result?.content) {
          navigator.clipboard.writeText(result.content);
          addToast("Copied to clipboard", "success");
        }
      };

      const ModeTab = ({ value, label }) => (
        <button onClick={() => { setAiMode(value); setResult(null); }} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: aiMode === value ? CB.navy : "transparent",
          color: aiMode === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="AI Intelligence" subtitle="Claude-powered shift handoffs and quarterly summary generation" />

          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <ModeTab value="handoff" label="Shift Handoff" />
            <ModeTab value="quarterly" label="Quarterly Summary" />
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "28px 32px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            <FormField label="Client" required>
              <select style={fieldStyle} value={selectedClient} onChange={e => { setSelectedClient(e.target.value); setResult(null); }}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>

            {aiMode === "quarterly" && (
              <div style={{ display: "flex", gap: 12, alignItems: "flex-end", marginBottom: 16 }}>
                <FormField label="Start Date" half>
                  <input style={fieldStyle} type="date" value={dateRange.start} onChange={e => setDateRange(p => ({ ...p, start: e.target.value }))} />
                </FormField>
                <FormField label="End Date" half>
                  <input style={fieldStyle} type="date" value={dateRange.end} onChange={e => setDateRange(p => ({ ...p, end: e.target.value }))} />
                </FormField>
              </div>
            )}

            <PrimaryButton
              onClick={aiMode === "handoff" ? generateHandoff : generateQuarterly}
              loading={loading}
              color={CB.navy}
            >
              {icons.zap({ size: 16 })} {aiMode === "handoff" ? "Generate Shift Handoff" : "Generate Quarterly Summary"}
            </PrimaryButton>

            {/* Result */}
            {result && (
              <div style={{
                marginTop: 24, padding: 24, borderRadius: 16,
                background: `linear-gradient(135deg, ${CB.navy}04, ${CB.teal}04)`,
                border: `1px solid ${CB.border}`, animation: "fadeIn 0.4s ease",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>
                      {result.type === "handoff" ? "Shift Handoff Summary" : "Quarterly Progress Summary"}
                    </div>
                    <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>
                      {result.client} — {result.type === "handoff" ? result.date : result.period} — {result.noteCount} notes analyzed
                    </div>
                  </div>
                  <button onClick={copyToClipboard} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
                    borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                    color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>{icons.save({ size: 14 })} Copy</button>
                </div>
                <div style={{
                  fontSize: 14, color: CB.text, lineHeight: 1.8, whiteSpace: "pre-wrap",
                  maxHeight: 500, overflowY: "auto", padding: "0 4px",
                }}>{result.content}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════

    // Reusable collapsible group for time-based content (year/month/day trees)

            <div style={{ flex: 1, minWidth: 0 }}>

              <div style={{ fontSize: 13, color: CB.textMid, fontWeight: 500 }}>{subtitle}</div>
