      { id: "org_compliance_report", name: "Organization Compliance Report", category: "Operations", desc: "Full compliance dashboard export with scores", entity: "org" },
    ];

    function DocEnginePage() {
      const [selectedTemplate, setSelectedTemplate] = useState(null);
      const [entityId, setEntityId] = useState("");
      const [staffList, setStaffList] = useState([]);
      const [clientList, setClientList] = useState([]);
      const [incidents, setIncidents] = useState([]);
      const [generating, setGenerating] = useState(false);
      const [catFilter, setCatFilter] = useState("all");
      const { isMobile } = useMobile();
      const { addToast } = useToast();
      const { orgId } = useAuth();

      useEffect(() => {
        Promise.all([
          supabase.from("staff").select("id, first_name, last_name, role, hire_date, is_active").eq("is_active", true).order("last_name"),
          supabase.from("persons").select("id, first_name, last_name, date_of_birth, medicaid_number, is_active").eq("is_active", true).order("last_name"),
          supabase.from("incidents").select("id, incident_type, severity, occurred_at, status, description").order("occurred_at", { ascending: false }).limit(50),
        ]).then(([s, c, inc]) => {
          setStaffList(s.data || []);
          setClientList(c.data || []);
          setIncidents(inc.data || []);
        });
      }, []);

      const pdfHeader = (doc, title, subtitle) => {
        doc.setFontSize(18); doc.setFont(undefined, "bold"); doc.text("Hope Haven Services Inc.", 20, 20);
        doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.text("DHHS Contract: DHHS91172", 20, 27);
        doc.setFontSize(14); doc.setFont(undefined, "bold"); doc.text(title, 20, 38);
        if (subtitle) { doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.text(subtitle, 20, 45); }
        doc.setLineWidth(0.5); doc.line(20, subtitle ? 48 : 42, 190, subtitle ? 48 : 42);
        return subtitle ? 55 : 48;
      };

      const pdfFooter = (doc) => {
        const pages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= pages; i++) {
          doc.setPage(i);
          doc.setFontSize(8); doc.setFont(undefined, "normal"); doc.setTextColor(150);
          doc.text(`Generated by Provly — ${new Date().toLocaleString()} — Page ${i} of ${pages}`, 20, 285);
          doc.setTextColor(0);
        }
      };

      const generatePDF = async () => {
        if (!selectedTemplate) return;
        const tmpl = selectedTemplate;
        setGenerating(true);
        const { jsPDF } = window.jspdf;

        try {
          // ═══ STAFF COVER SHEET ═══
          if (tmpl.id === "staff_cover_sheet") {
            const { data: staff } = await supabase.from("staff").select("*").eq("id", entityId).single();
            const { data: docs } = await supabase.from("documents").select("doc_type, file_name, uploaded_at, expires_at").eq("staff_id", entityId).eq("is_archived", false);
            if (!staff) { addToast("Staff not found", "error"); setGenerating(false); return; }
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Staff File Cover Sheet", `${staff.first_name} ${staff.last_name} — ${staff.role || "DSP"}`);
            doc.setFontSize(10);
            doc.text(`Hire Date: ${staff.hire_date || "N/A"}  |  Email: ${staff.email || "N/A"}  |  Phone: ${staff.phone || "N/A"}`, 20, y); y += 10;
            const uploadedTypes = new Set((docs || []).map(d => d.doc_type));
            const sections = {};
            STAFF_DOC_TYPES.forEach(dt => { if (!sections[dt.section]) sections[dt.section] = []; sections[dt.section].push(dt); });
            Object.entries(sections).forEach(([section, types]) => {
              doc.setFontSize(11); doc.setFont(undefined, "bold"); doc.text(section, 20, y); y += 6;
              doc.setFontSize(9); doc.setFont(undefined, "normal");
              types.forEach(t => {
                if (y > 270) { doc.addPage(); y = 20; }
                const has = uploadedTypes.has(t.value);
                const docRecord = (docs || []).find(d => d.doc_type === t.value);
                doc.text(`${has ? "☑" : "☐"} ${t.label}${t.required ? " *" : ""}${docRecord?.expires_at ? ` (exp: ${new Date(docRecord.expires_at).toLocaleDateString()})` : ""}`, 24, y); y += 5;
              });
              y += 4;
            });
            pdfFooter(doc); doc.save(`Staff_Cover_Sheet_${staff.last_name}_${staff.first_name}.pdf`);
          }

          // ═══ STAFF TRAINING LOG ═══
          else if (tmpl.id === "staff_training_log") {
            const { data: staff } = await supabase.from("staff").select("*").eq("id", entityId).single();
            const { data: trainings } = await supabase.from("staff_trainings").select("completed_at, expires_at, training_topic_definitions(topic_name, category)").eq("staff_id", entityId).order("completed_at", { ascending: false });
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Staff Training Log", `${staff.first_name} ${staff.last_name}`);
            doc.autoTable({
              startY: y, head: [["Training Topic", "Category", "Completed", "Expires", "Status"]],
              body: (trainings || []).map(t => {
                const exp = t.expires_at ? new Date(t.expires_at) : null;
                const status = !exp ? "No Expiry" : exp < new Date() ? "EXPIRED" : "Current";
                return [t.training_topic_definitions?.topic_name || "?", t.training_topic_definitions?.category || "", new Date(t.completed_at).toLocaleDateString(), exp ? exp.toLocaleDateString() : "N/A", status];
              }),
              styles: { fontSize: 8 }, headStyles: { fillColor: [10, 30, 51] },
            });
            pdfFooter(doc); doc.save(`Training_Log_${staff.last_name}.pdf`);
          }

          // ═══ STAFF COMPLIANCE SUMMARY ═══
          else if (tmpl.id === "staff_compliance") {
            const { data: staff } = await supabase.from("staff").select("*").eq("id", entityId).single();
            const { data: trainings } = await supabase.from("staff_trainings").select("completed_at, expires_at, training_topic_definitions(topic_name, category, deadline_days)").eq("staff_id", entityId);
            const { data: docs } = await supabase.from("documents").select("doc_type, expires_at").eq("staff_id", entityId).eq("is_archived", false);
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Staff Compliance Summary", `${staff.first_name} ${staff.last_name} — ${staff.role || "DSP"}`);
            const now = new Date();
            const totalReqDocs = STAFF_DOC_TYPES.filter(d => d.required).length;
            const uploadedReq = STAFF_DOC_TYPES.filter(d => d.required && (docs || []).some(ud => ud.doc_type === d.value)).length;
            const expiredDocs = (docs || []).filter(d => d.expires_at && new Date(d.expires_at) < now).length;
            const totalTrainings = (trainings || []).length;
            const expiredTrainings = (trainings || []).filter(t => t.expires_at && new Date(t.expires_at) < now).length;
            doc.setFontSize(10);
            doc.text(`Documents: ${uploadedReq}/${totalReqDocs} required uploaded  |  ${expiredDocs} expired`, 20, y); y += 6;
            doc.text(`Trainings: ${totalTrainings} completed  |  ${expiredTrainings} expired`, 20, y); y += 6;
            doc.text(`Doc Compliance: ${totalReqDocs > 0 ? Math.round((uploadedReq/totalReqDocs)*100) : 100}%  |  Training Compliance: ${totalTrainings > 0 ? Math.round(((totalTrainings-expiredTrainings)/totalTrainings)*100) : 0}%`, 20, y); y += 10;
            doc.autoTable({
              startY: y, head: [["Item", "Type", "Status", "Expires"]],
              body: [
                ...STAFF_DOC_TYPES.filter(d => d.required).map(d => {
                  const ud = (docs || []).find(x => x.doc_type === d.value);
                  return [d.label, "Document", ud ? (ud.expires_at && new Date(ud.expires_at) < now ? "EXPIRED" : "✓ On File") : "✗ Missing", ud?.expires_at ? new Date(ud.expires_at).toLocaleDateString() : "—"];
                }),
                ...(trainings || []).map(t => [t.training_topic_definitions?.topic_name || "?", "Training", t.expires_at && new Date(t.expires_at) < now ? "EXPIRED" : "Current", t.expires_at ? new Date(t.expires_at).toLocaleDateString() : "N/A"]),
              ],
              styles: { fontSize: 8 }, headStyles: { fillColor: [10, 30, 51] },
            });
            pdfFooter(doc); doc.save(`Compliance_Summary_${staff.last_name}.pdf`);
          }

          // ═══ CLIENT FACE SHEET ═══
          else if (tmpl.id === "client_face_sheet") {
            const { data: client } = await supabase.from("persons").select("*").eq("id", entityId).single();
            const { data: auths } = await supabase.from("person_service_authorizations").select("authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code)").eq("person_id", entityId);
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Client Face Sheet — Tab 1", `${client.first_name} ${client.last_name}`);
            doc.setFontSize(10);
            const fields = [
              ["Full Name", `${client.first_name} ${client.last_name}`], ["Date of Birth", client.date_of_birth || "N/A"],
              ["Medicaid #", client.medicaid_number || "N/A"], ["SSN", client.ssn ? "On file" : "N/A"],
              ["Address", client.address || "N/A"], ["Phone", client.phone || "N/A"],
              ["Emergency Contact", client.emergency_contact_name || "N/A"], ["Emergency Phone", client.emergency_contact_phone || "N/A"],
              ["Physician", client.physician_name || "N/A"], ["Physician Phone", client.physician_phone || "N/A"],
              ["Diagnosis", client.primary_diagnosis || "N/A"], ["Allergies", client.allergies || "None listed"],
              ["Support Coordinator", client.support_coordinator || "N/A"], ["Guardian", client.guardian_name || "Self"],
            ];
            fields.forEach(([label, val]) => {
              if (y > 270) { doc.addPage(); y = 20; }
              doc.setFont(undefined, "bold"); doc.text(`${label}:`, 20, y);
              doc.setFont(undefined, "normal"); doc.text(val, 70, y); y += 6;
            });
            if (auths?.length) {
              y += 6; doc.setFontSize(12); doc.setFont(undefined, "bold"); doc.text("Service Authorizations", 20, y); y += 8;
              doc.autoTable({
                startY: y, head: [["Code", "Units", "Used", "Rate", "Start", "End"]],
                body: auths.map(a => [a.service_code_definitions?.code || "?", a.authorized_units, a.used_units || 0, a.rate_per_unit ? `$${Number(a.rate_per_unit).toFixed(2)}` : "WS", a.start_date || "—", a.end_date || "—"]),
                styles: { fontSize: 8 }, headStyles: { fillColor: [0, 137, 123] },
              });
            }
            pdfFooter(doc); doc.save(`Face_Sheet_${client.last_name}_${client.first_name}.pdf`);
          }

          // ═══ CLIENT BINDER COVER ═══
          else if (tmpl.id === "client_binder_cover") {
            const { data: client } = await supabase.from("persons").select("*").eq("id", entityId).single();
            const { data: docs } = await supabase.from("documents").select("doc_type, file_name, uploaded_at, expires_at").eq("person_id", entityId).eq("is_archived", false);
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Client Binder Cover Sheet — Tabs 1–10", `${client.first_name} ${client.last_name}`);
            const uploadedTypes = new Set((docs || []).map(d => d.doc_type));
            const tabs = {};
            CLIENT_DOC_TYPES.forEach(dt => { const key = `Tab ${dt.tab}`; if (!tabs[key]) tabs[key] = []; tabs[key].push(dt); });
            Object.entries(tabs).forEach(([tabName, types]) => {
              if (y > 265) { doc.addPage(); y = 20; }
              doc.setFontSize(11); doc.setFont(undefined, "bold"); doc.text(tabName, 20, y); y += 6;
              doc.setFontSize(9); doc.setFont(undefined, "normal");
              types.forEach(t => {
                if (y > 275) { doc.addPage(); y = 20; }
                const has = uploadedTypes.has(t.value);
                doc.text(`${has ? "☑" : "☐"} ${t.label}${t.required ? " *" : ""}`, 24, y); y += 5;
              });
              y += 3;
            });
            pdfFooter(doc); doc.save(`Binder_Cover_${client.last_name}.pdf`);
          }

          // ═══ MEDICATION TRACKING SHEET ═══
          else if (tmpl.id === "mar_monthly") {
            const { data: client } = await supabase.from("persons").select("first_name, last_name").eq("id", entityId).single();
            const { data: meds } = await supabase.from("medications").select("*").eq("person_id", entityId).eq("is_active", true);
            const startDate = new Date(); startDate.setDate(1);
            const endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0);
            const { data: logs } = await supabase.from("medication_logs").select("medication_id, scheduled_date, scheduled_time, status").eq("person_id", entityId).gte("scheduled_date", startDate.toISOString().split("T")[0]).lte("scheduled_date", endDate.toISOString().split("T")[0]);
            const doc = new jsPDF("landscape");
            const monthName = startDate.toLocaleString("default", { month: "long", year: "numeric" });
            let y = pdfHeader(doc, `Medication Administration Record — ${monthName}`, `${client.first_name} ${client.last_name}`);
            const daysInMonth = endDate.getDate();
            const dayHeaders = Array.from({ length: daysInMonth }, (_, i) => String(i + 1));
            (meds || []).forEach(med => {
              if (y > 170) { doc.addPage(); y = 20; }
              doc.setFontSize(9); doc.setFont(undefined, "bold");
              doc.text(`${med.medication_name} ${med.dosage} — ${med.route} — ${med.frequency}`, 20, y); y += 5;
              (med.schedule_times || ["08:00"]).forEach(time => {
                const row = dayHeaders.map(d => {
                  const dateStr = `${startDate.getFullYear()}-${String(startDate.getMonth()+1).padStart(2,"0")}-${d.padStart(2,"0")}`;
                  const log = (logs || []).find(l => l.medication_id === med.id && l.scheduled_date === dateStr && l.scheduled_time === time);
                  return log ? { given: "✓", refused: "R", held: "H", not_available: "NA", self_administered: "SA" }[log.status] || "?" : "";
                });
                doc.autoTable({
                  startY: y, head: [[`${time}`, ...dayHeaders]], body: [["", ...row]],
                  styles: { fontSize: 6, cellPadding: 1.5 }, headStyles: { fillColor: [10, 30, 51], fontSize: 6 },
                  columnStyles: Object.fromEntries(dayHeaders.map((_, i) => [i + 1, { cellWidth: 7 }])),
                  margin: { left: 20 },
                });
                y = doc.lastAutoTable.finalY + 4;
              });
              y += 4;
            });
            doc.setFontSize(7); doc.text("Legend: ✓ = Given, R = Refused, H = Held, NA = Not Available, SA = Self-Administered", 20, y);
            pdfFooter(doc); doc.save(`MAR_${monthName.replace(" ","_")}_${client.last_name}.pdf`);
          }

          // ═══ PCSP QUARTERLY SUMMARY ═══
          else if (tmpl.id === "pcsp_summary") {
            const { data: client } = await supabase.from("persons").select("first_name, last_name").eq("id", entityId).single();
            const { data: goals } = await supabase.from("pcsp_goals").select("*").eq("person_id", entityId).neq("status", "discontinued");
            const { data: notes } = await supabase.from("pcsp_progress_notes").select("*, staff(first_name, last_name)").eq("person_id", entityId).order("note_date", { ascending: false });
            const doc = new jsPDF();
            const now = new Date(); const threeAgo = new Date(now); threeAgo.setMonth(threeAgo.getMonth() - 3);
            let y = pdfHeader(doc, "PCSP Quarterly Summary — Tab 6", `${client.first_name} ${client.last_name} — ${threeAgo.toLocaleDateString()} to ${now.toLocaleDateString()}`);
            (goals || []).forEach((g, gi) => {
              if (y > 250) { doc.addPage(); y = 20; }
              doc.setFontSize(11); doc.setFont(undefined, "bold"); doc.text(`Goal ${gi+1}: ${g.domain} [${g.status}]`, 20, y); y += 6;
              doc.setFontSize(9); doc.setFont(undefined, "normal");
              const lines = doc.splitTextToSize(g.goal_description, 170); lines.forEach(l => { doc.text(l, 20, y); y += 4; }); y += 2;
              if (g.target_criteria) { doc.text(`Target: ${g.target_criteria}`, 20, y); y += 5; }
              const gNotes = (notes || []).filter(n => n.goal_id === g.id && new Date(n.note_date) >= threeAgo);
              if (gNotes.length > 0) {
                const avg = (gNotes.reduce((s,n) => s + (n.progress_rating||0), 0) / gNotes.length).toFixed(1);
                doc.text(`Progress Notes: ${gNotes.length} | Avg Rating: ${avg}/5`, 20, y); y += 5;
                gNotes.slice(0, 4).forEach(n => {
                  if (y > 270) { doc.addPage(); y = 20; }
                  doc.text(`  ${n.note_date} [${n.progress_rating}/5]: ${n.narrative?.substring(0, 100) || ""}`, 24, y); y += 4;
                });
              } else { doc.text("  No progress notes this quarter.", 24, y); y += 4; }
              y += 6;
            });
            pdfFooter(doc); doc.save(`PCSP_Summary_${client.last_name}.pdf`);
          }

          // ═══ INCIDENT REPORT ═══
          else if (tmpl.id === "incident_report") {
            const { data: inc } = await supabase.from("incidents").select("*, persons(first_name, last_name), reporter:staff!incidents_reported_by_fkey(first_name, last_name), reviewer:staff!incidents_reviewed_by_fkey(first_name, last_name)").eq("id", entityId).single();
            if (!inc) { addToast("Incident not found", "error"); setGenerating(false); return; }
            const doc = new jsPDF();
            let y = pdfHeader(doc, `Incident Report — ${inc.incident_type?.replace(/_/g, " ") || "Unknown"}`, `Severity: ${inc.severity} | Status: ${inc.status}`);
            doc.setFontSize(10);
            const fields = [
              ["Date/Time", inc.occurred_at ? new Date(inc.occurred_at).toLocaleString() : "N/A"],
              ["Client", inc.persons ? `${inc.persons.first_name} ${inc.persons.last_name}` : "N/A"],
              ["Location", inc.location || "N/A"],
              ["Reported By", inc.reporter ? `${inc.reporter.first_name} ${inc.reporter.last_name}` : "N/A"],
              ["Filed", inc.created_at ? new Date(inc.created_at).toLocaleString() : "N/A"],
            ];
            fields.forEach(([l, v]) => { doc.setFont(undefined, "bold"); doc.text(`${l}:`, 20, y); doc.setFont(undefined, "normal"); doc.text(v, 60, y); y += 6; });
            y += 4; doc.setFont(undefined, "bold"); doc.text("Description:", 20, y); y += 5;
            doc.setFont(undefined, "normal"); const descLines = doc.splitTextToSize(inc.description || "", 170); descLines.forEach(l => { if (y > 270) { doc.addPage(); y = 20; } doc.text(l, 20, y); y += 4; });
            if (inc.immediate_actions) { y += 4; doc.setFont(undefined, "bold"); doc.text("Immediate Actions:", 20, y); y += 5; doc.setFont(undefined, "normal"); doc.splitTextToSize(inc.immediate_actions, 170).forEach(l => { doc.text(l, 20, y); y += 4; }); }
            if (inc.injuries_desc) { y += 4; doc.setFont(undefined, "bold"); doc.text("Injuries:", 20, y); y += 5; doc.setFont(undefined, "normal"); doc.text(inc.injuries_desc, 20, y); y += 4; }
            if (inc.review_notes) { y += 6; doc.setFont(undefined, "bold"); doc.text("Review Notes:", 20, y); y += 5; doc.setFont(undefined, "normal"); doc.splitTextToSize(inc.review_notes, 170).forEach(l => { doc.text(l, 20, y); y += 4; }); }
            y += 12; doc.line(20, y, 90, y); doc.text("Signature", 20, y + 4); doc.line(110, y, 190, y); doc.text("Date", 110, y + 4);
            pdfFooter(doc); doc.save(`Incident_Report_${inc.id?.slice(0, 8)}.pdf`);
          }

          // ═══ MONTHLY BILLING SUMMARY ═══
          else if (tmpl.id === "monthly_billing") {
            const monthStart = new Date(); monthStart.setDate(1); monthStart.setMonth(monthStart.getMonth() - 1);
            const monthEnd = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0);
            const monthLabel = monthStart.toLocaleString("default", { month: "long", year: "numeric" });
            const { data: claims } = await supabase.from("claim_submissions").select("*, persons(first_name, last_name), contracts(contract_number)").gte("service_date", monthStart.toISOString().split("T")[0]).lte("service_date", monthEnd.toISOString().split("T")[0]);
            const doc = new jsPDF();
            let y = pdfHeader(doc, `Monthly Billing Summary — ${monthLabel}`, `Hope Haven Services Inc. — DHHS91172`);
            const total = (claims || []).reduce((s, c) => s + Number(c.billed_amount || 0), 0);
            const paid = (claims || []).reduce((s, c) => s + Number(c.paid_amount || 0), 0);
            doc.setFontSize(10); doc.text(`Total Claims: ${(claims || []).length}  |  Billed: $${total.toFixed(2)}  |  Paid: $${paid.toFixed(2)}  |  Outstanding: $${(total - paid).toFixed(2)}`, 20, y); y += 8;
            doc.autoTable({

              body: (claims || []).map(c => [c.service_date || "—", c.persons ? `${c.persons.first_name} ${c.persons.last_name}` : "—", c.service_code || "—", c.contracts?.contract_number || "—", `$${Number(c.billed_amount||0).toFixed(2)}`, `$${Number(c.paid_amount||0).toFixed(2)}`, c.claim_status]),
              styles: { fontSize: 8 }, headStyles: { fillColor: [10, 30, 51] },
            });
            pdfFooter(doc); doc.save(`Billing_Summary_${monthLabel.replace(" ", "_")}.pdf`);
          }

          // ═══ EMERGENCY CONTACTS ═══
          else if (tmpl.id === "emergency_contacts") {
            const { data: client } = await supabase.from("persons").select("*").eq("id", entityId).single();
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Emergency Contact Sheet", `${client.first_name} ${client.last_name}`);
            doc.setFontSize(12);
            const contacts = [
              ["Primary Emergency Contact", client.emergency_contact_name, client.emergency_contact_phone, client.emergency_contact_relationship],
              ["Secondary Emergency Contact", client.emergency_contact2_name, client.emergency_contact2_phone, client.emergency_contact2_relationship],
              ["Physician", client.physician_name, client.physician_phone, "Primary Care"],
              ["Guardian/Representative", client.guardian_name, client.guardian_phone, client.guardian_relationship],
              ["Support Coordinator", client.support_coordinator, client.support_coordinator_phone, "SCE"],
            ];
            contacts.forEach(([label, name, phone, rel]) => {
              if (y > 260) { doc.addPage(); y = 20; }
              doc.setFont(undefined, "bold"); doc.setFontSize(11); doc.text(label, 20, y); y += 6;
              doc.setFont(undefined, "normal"); doc.setFontSize(10);
              doc.text(`Name: ${name || "N/A"}`, 24, y); y += 5;
              doc.text(`Phone: ${phone || "N/A"}`, 24, y); y += 5;
              doc.text(`Relationship: ${rel || "N/A"}`, 24, y); y += 8;
            });
            y += 8; doc.setFontSize(9); doc.setFont(undefined, "bold"); doc.text("In case of emergency, call 911 first.", 20, y);
            pdfFooter(doc); doc.save(`Emergency_Contacts_${client.last_name}.pdf`);
          }

          // ═══ RIGHTS ACKNOWLEDGMENT ═══
          else if (tmpl.id === "rights_ack") {
            const { data: client } = await supabase.from("persons").select("first_name, last_name").eq("id", entityId).single();
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Individual Rights Acknowledgment — Tab 7", `${client.first_name} ${client.last_name}`);
            doc.setFontSize(10);
            const rights = [
              "Be treated with dignity and respect at all times",
              "Be free from abuse, neglect, and exploitation",
              "Privacy regarding personal information and records",
              "Access to personal records upon request",
              "Participate in planning and making decisions about services",
              "Choose where to live, work, and spend time",
              "Manage personal finances or choose a representative",
              "Access medical care and treatment of choice",
              "File a grievance without fear of retaliation",
              "Communicate freely with family, friends, and advocates",
              "Be free from unnecessary restraints or restrictions",
              "Vote and participate in community activities",
            ];
            doc.setFont(undefined, "bold"); doc.text("As a person receiving services, you have the right to:", 20, y); y += 8;
            doc.setFont(undefined, "normal");
            rights.forEach((r, i) => { doc.text(`${i + 1}. ${r}`, 24, y); y += 6; });
            y += 12; doc.text("I acknowledge that I have been informed of my rights and understand them.", 20, y);
            y += 16; doc.line(20, y, 100, y); doc.text("Individual Signature", 20, y + 4);
            doc.line(120, y, 190, y); doc.text("Date", 120, y + 4);
            y += 16; doc.line(20, y, 100, y); doc.text("Staff Witness Signature", 20, y + 4);
            doc.line(120, y, 190, y); doc.text("Date", 120, y + 4);
            pdfFooter(doc); doc.save(`Rights_Acknowledgment_${client.last_name}.pdf`);
          }

          // ═══ BELONGINGS INVENTORY ═══
          else if (tmpl.id === "belongings_inventory") {
            const { data: client } = await supabase.from("persons").select("first_name, last_name").eq("id", entityId).single();
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Personal Belongings Inventory — Tab 8", `${client.first_name} ${client.last_name}`);
            doc.setFontSize(9); doc.text(`Date of Inventory: ${new Date().toLocaleDateString()}`, 20, y); y += 8;
            doc.autoTable({
              startY: y, head: [["#", "Item Description", "Condition", "Move-In", "Move-Out", "Notes"]],
              body: Array.from({ length: 20 }, (_, i) => [i + 1, "", "", "", "", ""]),
              styles: { fontSize: 8, minCellHeight: 10 }, headStyles: { fillColor: [10, 30, 51] },
            });
            y = doc.lastAutoTable.finalY + 12;
            doc.line(20, y, 100, y); doc.text("Individual Signature", 20, y + 4);
            doc.line(120, y, 190, y); doc.text("Date", 120, y + 4);
            y += 16; doc.line(20, y, 100, y); doc.text("Staff Witness Signature", 20, y + 4);
            doc.line(120, y, 190, y); doc.text("Date", 120, y + 4);
            pdfFooter(doc); doc.save(`Belongings_Inventory_${client.last_name}.pdf`);
          }

          // ═══ ORG COMPLIANCE REPORT ═══
          else if (tmpl.id === "org_compliance_report") {
            const { data: staffAll } = await supabase.from("staff").select("id, first_name, last_name, role, is_active").eq("is_active", true);
            const { data: clientAll } = await supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true);
            const { data: trainAll } = await supabase.from("staff_trainings").select("staff_id, expires_at");
            const { data: docAll } = await supabase.from("documents").select("staff_id, person_id, doc_type, expires_at").eq("is_archived", false);
            const doc = new jsPDF();
            let y = pdfHeader(doc, "Organization Compliance Report", `Hope Haven Services Inc. — ${new Date().toLocaleDateString()}`);
            doc.setFontSize(10);
            const now = new Date();
            const expTrainings = (trainAll || []).filter(t => t.expires_at && new Date(t.expires_at) < now).length;
            const expDocs = (docAll || []).filter(d => d.expires_at && new Date(d.expires_at) < now).length;
            doc.text(`Active Staff: ${(staffAll||[]).length}  |  Active Clients: ${(clientAll||[]).length}`, 20, y); y += 6;
            doc.text(`Expired Trainings: ${expTrainings}  |  Expired Documents: ${expDocs}`, 20, y); y += 10;
            doc.autoTable({
              startY: y, head: [["Staff Member", "Role", "Trainings", "Expired", "Req Docs", "On File"]],
              body: (staffAll || []).map(s => {
                const sTrains = (trainAll || []).filter(t => t.staff_id === s.id);
                const sExpired = sTrains.filter(t => t.expires_at && new Date(t.expires_at) < now).length;
                const reqDocs = STAFF_DOC_TYPES.filter(d => d.required).length;
                const onFile = STAFF_DOC_TYPES.filter(d => d.required && (docAll || []).some(ud => ud.staff_id === s.id && ud.doc_type === d.value)).length;
                return [`${s.first_name} ${s.last_name}`, s.role || "DSP", sTrains.length, sExpired, reqDocs, onFile];
              }),
              styles: { fontSize: 8 }, headStyles: { fillColor: [10, 30, 51] },
            });
            pdfFooter(doc); doc.save(`Org_Compliance_Report_${new Date().toISOString().split("T")[0]}.pdf`);
          }

          else {
            addToast("Template not yet implemented", "error");
            setGenerating(false); return;
          }

          addToast("PDF generated — check your downloads", "success");
        } catch (e) {
          addToast(`PDF generation failed: ${e.message}`, "error");
        }
        setGenerating(false);
      };

      const filteredTemplates = catFilter === "all" ? DOC_TEMPLATES : DOC_TEMPLATES.filter(t => t.category === catFilter);
      const categories = [...new Set(DOC_TEMPLATES.map(t => t.category))];

      const entitySelector = () => {
        if (!selectedTemplate) return null;
        const et = selectedTemplate.entity;
        if (et === "staff") return (
          <select value={entityId} onChange={e => setEntityId(e.target.value)} style={{ padding: "10px 16px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.white, minWidth: 240 }}>
            <option value="">Select staff member...</option>
            {staffList.map(s => <option key={s.id} value={s.id}>{s.last_name}, {s.first_name} — {s.role || "DSP"}</option>)}
          </select>
        );
        if (et === "client") return (
          <select value={entityId} onChange={e => setEntityId(e.target.value)} style={{ padding: "10px 16px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.white, minWidth: 240 }}>
            <option value="">Select client...</option>
            {clientList.map(c => <option key={c.id} value={c.id}>{c.last_name}, {c.first_name}</option>)}
          </select>
        );
        if (et === "incident") return (
          <select value={entityId} onChange={e => setEntityId(e.target.value)} style={{ padding: "10px 16px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.white, minWidth: 240 }}>
            <option value="">Select incident...</option>
            {incidents.map(i => <option key={i.id} value={i.id}>{new Date(i.occurred_at).toLocaleDateString()} — {i.incident_type?.replace(/_/g, " ")} [{i.severity}]</option>)}
          </select>
        );
        return null; // org-level templates don't need entity selection
      };

      return (
        <div>
          <PageHeader title="Document Engine" subtitle="Generate PDF documents from Hope Haven templates" />
          {/* Category Filter */}
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.white, borderRadius: 12, padding: 4, border: `1px solid ${CB.border}`, width: "fit-content", flexWrap: "wrap" }}>
            <button onClick={() => setCatFilter("all")} style={{ padding: "9px 18px", borderRadius: 9, border: "none", fontSize: 13, fontWeight: 600, fontFamily: "inherit", cursor: "pointer", background: catFilter === "all" ? CB.navy : "transparent", color: catFilter === "all" ? CB.white : CB.textMid }}>All ({DOC_TEMPLATES.length})</button>
            {categories.map(cat => <button key={cat} onClick={() => setCatFilter(cat)} style={{ padding: "9px 18px", borderRadius: 9, border: "none", fontSize: 13, fontWeight: 600, fontFamily: "inherit", cursor: "pointer", background: catFilter === cat ? CB.navy : "transparent", color: catFilter === cat ? CB.white : CB.textMid }}>{cat}</button>)}
          </div>

          {/* Template Grid */}
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(3, 1fr)", gap: 14, marginBottom: 24 }}>
            {filteredTemplates.map((t, i) => {
              const isSelected = selectedTemplate?.id === t.id;
              const catColor = { Staff: CB.blue, Client: CB.teal, Operations: CB.amber, Finance: CB.green }[t.category] || CB.navy;
              return (
                <button key={t.id} onClick={() => { setSelectedTemplate(isSelected ? null : t); setEntityId(""); }} style={{
                  background: isSelected ? `${catColor}08` : CB.white, borderRadius: 14, padding: 18,
                  border: `1.5px solid ${isSelected ? catColor : CB.border}`, cursor: "pointer",
                  textAlign: "left", fontFamily: "inherit", boxShadow: CB.cardShadow,
                  animation: `fadeIn 0.3s ease ${i * 0.03}s both`, transition: "all 0.15s",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <Badge text={t.category} color={catColor} />
                    {isSelected && <div style={{ width: 8, height: 8, borderRadius: "50%", background: catColor }} />}
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>{t.name}</div>
                  <div style={{ fontSize: 12, color: CB.textMid, lineHeight: 1.4 }}>{t.desc}</div>
                </button>
              );
            })}
          </div>

          {/* Generate Panel */}
          {selectedTemplate && (
            <div style={{
              background: CB.white, borderRadius: 16, padding: 24, border: `1px solid ${CB.border}`,
              boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
            }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>{selectedTemplate.name}</h3>
              <p style={{ fontSize: 13, color: CB.textMid, marginBottom: 16 }}>{selectedTemplate.desc}</p>
              <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                {entitySelector()}
                <button onClick={generatePDF} disabled={generating || (selectedTemplate.entity !== "org" && !entityId)} style={{
                  padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white,
                  fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                  opacity: (generating || (selectedTemplate.entity !== "org" && !entityId)) ? 0.5 : 1,
                  display: "flex", alignItems: "center", gap: 8,
                }}>
                  {generating ? <><Spinner size={14} color={CB.white} /> Generating...</> : <>{icons.fileText({ size: 16 })} Generate PDF</>}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // ORG UNITS — recursive tree builder (UPI-compatible structure)
    // ═══════════════════════════════════════════════════════════════
    function OrgUnitsPage({ hideHeader = false }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [units, setUnits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [addingTo, setAddingTo] = useState(false); // false = modal closed; null = adding root; id = adding child
      const [newUnit, setNewUnit] = useState({ name: "", unit_type: "group", address: "", city: "" });
      const [editingUnit, setEditingUnit] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => { loadUnits(); }, []);

      const loadUnits = async () => {
        setLoading(true);
        const { data } = await supabase.from("org_units").select("*").order("sort_order").order("name");
        setUnits(data || []);
        setLoading(false);
      };

      const buildTree = (parentId = null, depth = 0) => {
        return units.filter(u => u.parent_id === parentId).map(unit => ({
          ...unit, depth, children: buildTree(unit.id, depth + 1),
        }));
      };

      const flattenTree = (nodes) => {
        const result = [];
        nodes.forEach(n => { result.push(n); result.push(...flattenTree(n.children)); });
        return result;
      };

      const tree = buildTree();
      const flatTree = flattenTree(tree);

      const handleAdd = async () => {
        if (!newUnit.name) return addToast("Name is required", "error");
        setSaving(true);
        const { error } = await supabase.from("org_units").insert({
          org_id: orgId, parent_id: addingTo, name: newUnit.name,
          unit_type: newUnit.unit_type, address: newUnit.address || null, city: newUnit.city || null,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast(`"${newUnit.name}" added`, "success");
        setAddingTo(null);
        setNewUnit({ name: "", unit_type: "group", address: "", city: "" });
        loadUnits();
      };

      const handleDelete = async (unitId, unitName) => {
        const children = units.filter(u => u.parent_id === unitId);
        if (children.length > 0) return addToast("Remove child units first", "error");
        if (!confirm(`Delete "${unitName}"?`)) return;
        const { error } = await supabase.from("org_units").delete().eq("id", unitId);
        if (error) return addToast(error.message, "error");
        addToast(`"${unitName}" removed`, "success");
        loadUnits();
      };

      const handleEdit = async () => {
        if (!editingUnit || !editingUnit.name) return addToast("Name is required", "error");
        setSaving(true);
        const { error } = await supabase.from("org_units").update({
          name: editingUnit.name,
          unit_type: editingUnit.unit_type,
          address: editingUnit.address || null,
          city: editingUnit.city || null,
        }).eq("id", editingUnit.id);
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast(`"${editingUnit.name}" updated`, "success");
        setEditingUnit(null);
        loadUnits();
      };

      const typeIcons = { admin: icons.shield, region: icons.mapPin, program: icons.fileText, site: icons.heart, placement: icons.users, group: icons.dashboard };

      return (
        <div>
          {!hideHeader && (
            <PageHeader title="Organization Structure" subtitle="Build your org tree (UPI-compatible) — Administration → Regions → Programs → Sites"
              action={<PrimaryButton onClick={() => setAddingTo(null)} color={CB.navy}>{icons.plus({ size: 16 })} Add Root Unit</PrimaryButton>}
            />
          )}
          {hideHeader && (
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
              <PrimaryButton onClick={() => setAddingTo(null)} color={CB.navy}>{icons.plus({ size: 16 })} Add Root Unit</PrimaryButton>
            </div>
          )}
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <div style={{
              background: CB.white, borderRadius: 16, padding: 24,
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            }}>
              {flatTree.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0", color: CB.textLight }}>
                  <p style={{ fontSize: 15, marginBottom: 16 }}>No org units yet. Start by adding your Administration root.</p>
                  <PrimaryButton onClick={() => { setAddingTo(null); setNewUnit({ name: "Administration", unit_type: "admin", address: "", city: "" }); }} color={CB.navy}>
                    {icons.plus({ size: 16 })} Create Administration Root
                  </PrimaryButton>
                </div>
              ) : (
                <div style={{ display: "grid", gap: 2 }}>
                  {flatTree.map((unit, i) => (
                    <div key={unit.id} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 14px", paddingLeft: 14 + unit.depth * 28,
                      borderRadius: 10, animation: `fadeIn 0.2s ease ${i * 0.02}s both`,
                      transition: "all 0.15s", border: "1px solid transparent",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.background = `${CB.teal}08`; e.currentTarget.style.borderColor = `${CB.teal}20`; }}
                      onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        {unit.depth > 0 && (
                          <span style={{ color: CB.border, fontSize: 14, marginRight: -4 }}>└</span>
                        )}
                        <div style={{
                          width: 28, height: 28, borderRadius: 8,
                          background: `${unit.unit_type === "admin" ? CB.navy : unit.unit_type === "program" ? CB.teal : CB.blue}12`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          {(typeIcons[unit.unit_type] || icons.dashboard)({ size: 14, color: unit.unit_type === "admin" ? CB.navy : unit.unit_type === "program" ? CB.teal : CB.blue })}
                        </div>
                        <div>
                          <span style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>{unit.name}</span>
                          <span style={{ fontSize: 11, color: CB.textLight, marginLeft: 8 }}>{ORG_UNIT_TYPES.find(t => t.value === unit.unit_type)?.label || unit.unit_type}</span>
                          {unit.city && <span style={{ fontSize: 11, color: CB.textLight, marginLeft: 8 }}>— {unit.city}</span>}
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => setEditingUnit({ id: unit.id, name: unit.name, unit_type: unit.unit_type, address: unit.address || "", city: unit.city || "" })} title="Edit" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.blue, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.edit({ size: 12, color: CB.blue })}</button>
                        <button onClick={() => { setAddingTo(unit.id); setNewUnit({ name: "", unit_type: "group", address: "", city: "" }); }} title="Add child" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.teal, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.plus({ size: 12, color: CB.teal })}</button>
                        <button onClick={() => handleDelete(unit.id, unit.name)} title="Delete" style={{
                          padding: "4px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.red, cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                        }}>{icons.trash({ size: 12, color: CB.red })}</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Add Unit Modal */}
          <Modal open={addingTo !== undefined && addingTo !== false} onClose={() => setAddingTo(false)}
            title={addingTo === null ? "Add Root Unit" : `Add Child Unit`}
            subtitle={addingTo ? `Under: ${units.find(u => u.id === addingTo)?.name || ""}` : "Top-level organizational unit"}>
            <FormField label="Unit Name" required>
              <input style={fieldStyle} value={newUnit.name} onChange={e => setNewUnit(p => ({ ...p, name: e.target.value }))} placeholder="e.g. Residential Programs" />
            </FormField>
            <FormField label="Unit Type" required>
              <select style={fieldStyle} value={newUnit.unit_type} onChange={e => setNewUnit(p => ({ ...p, unit_type: e.target.value }))}>
                {ORG_UNIT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </FormField>
            <FormRow>
              <FormField label="City" half>
                <input style={fieldStyle} value={newUnit.city} onChange={e => setNewUnit(p => ({ ...p, city: e.target.value }))} placeholder="City" />
              </FormField>
              <FormField label="Address" half>
                <input style={fieldStyle} value={newUnit.address} onChange={e => setNewUnit(p => ({ ...p, address: e.target.value }))} placeholder="Street address" />
              </FormField>
            </FormRow>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
              <SecondaryButton onClick={() => setAddingTo(false)}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleAdd} loading={saving}>{icons.plus({ size: 16 })} Add Unit</PrimaryButton>
            </div>
          </Modal>

          {/* Edit Unit Modal */}
          <Modal open={!!editingUnit} onClose={() => setEditingUnit(null)} title="Edit Org Unit"
            subtitle={editingUnit ? `Editing: ${editingUnit.name}` : ""}>
            {editingUnit && (
              <>
                <FormField label="Unit Name" required>
                  <input style={fieldStyle} value={editingUnit.name} onChange={e => setEditingUnit(p => ({ ...p, name: e.target.value }))} placeholder="Unit name" />
                </FormField>
                <FormField label="Unit Type" required>
                  <select style={fieldStyle} value={editingUnit.unit_type} onChange={e => setEditingUnit(p => ({ ...p, unit_type: e.target.value }))}>
                    {ORG_UNIT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </FormField>
                <FormRow>
                  <FormField label="City" half>
                    <input style={fieldStyle} value={editingUnit.city} onChange={e => setEditingUnit(p => ({ ...p, city: e.target.value }))} placeholder="City" />
                  </FormField>
                  <FormField label="Address" half>
                    <input style={fieldStyle} value={editingUnit.address} onChange={e => setEditingUnit(p => ({ ...p, address: e.target.value }))} placeholder="Street address" />
                  </FormField>
                </FormRow>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
                  <SecondaryButton onClick={() => setEditingUnit(null)}>Cancel</SecondaryButton>
                  <PrimaryButton onClick={handleEdit} loading={saving}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                </div>
              </>
            )}
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // DOCUMENTS SECTION — reusable for staff and client forms
    // ═══════════════════════════════════════════════════════════════
    function DocumentsSection({ entityType, entityId, orgId, entityData }) {
      const { addToast } = useToast();
      const [docs, setDocs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [adding, setAdding] = useState(false);
      const [showGenerate, setShowGenerate] = useState(false);
      const [newDoc, setNewDoc] = useState({ doc_type: "", file_name: "", expires_at: "", notes: "" });

      const docTypes = entityType === "staff" ? STAFF_DOC_TYPES : CLIENT_DOC_TYPES;
      const requiredTypes = docTypes.filter(d => d.required);

      useEffect(() => {
        if (entityId) loadDocs();
        else { setDocs([]); setLoading(false); }
      }, [entityId]);

      const loadDocs = async () => {
        setLoading(true);
        const field = entityType === "staff" ? "staff_id" : "person_id";
        const { data } = await supabase.from("documents").select("*").eq(field, entityId).eq("is_archived", false).order("uploaded_at", { ascending: false });
        setDocs(data || []);
        setLoading(false);
      };

      const handleAdd = async () => {
        if (!newDoc.doc_type || !newDoc.file_name) return addToast("Document type and file name are required", "error");
        const field = entityType === "staff" ? "staff_id" : "person_id";
        const { error } = await supabase.from("documents").insert({
          org_id: orgId,
          [field]: entityId,
          doc_type: newDoc.doc_type,
          file_name: newDoc.file_name,
          file_url: `pending://${newDoc.file_name}`,
          expires_at: newDoc.expires_at || null,
          notes: newDoc.notes || null,
        });
        if (error) return addToast(error.message, "error");
        addToast("Document record added", "success");
        setAdding(false);
        setNewDoc({ doc_type: "", file_name: "", expires_at: "", notes: "" });
        loadDocs();
      };

      const removeDoc = async (docId) => {
        const { error } = await supabase.from("documents").update({ is_archived: true }).eq("id", docId);
        if (error) return addToast(error.message, "error");
        setDocs(prev => prev.filter(d => d.id !== docId));
        addToast("Document removed", "success");
      };

      const uploadedTypes = new Set(docs.map(d => d.doc_type));
      const missingRequired = requiredTypes.filter(t => !uploadedTypes.has(t.value));
      const completeness = requiredTypes.length > 0 ? Math.round(((requiredTypes.length - missingRequired.length) / requiredTypes.length) * 100) : 100;

      const now = new Date();

      return (
        <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>Documents</h3>
              <span style={{
                fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 6,
                background: completeness === 100 ? `${CB.green}12` : completeness >= 60 ? `${CB.amber}12` : `${CB.red}12`,
                color: completeness === 100 ? CB.green : completeness >= 60 ? CB.amber : CB.red,
              }}>{completeness}% complete</span>
            </div>
            {entityId && (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => setShowGenerate(!showGenerate)} style={{
                  padding: "5px 12px", borderRadius: 8, border: `1px dashed ${CB.teal}`,
                  background: showGenerate ? `${CB.teal}15` : `${CB.teal}08`, color: CB.teal, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4,
                }}>{icons.fileText({ size: 12, color: CB.teal })} Generate PDF</button>
                <button onClick={() => setAdding(!adding)} style={{
                  padding: "5px 12px", borderRadius: 8, border: `1px dashed ${CB.blue}`,
                  background: `${CB.blue}08`, color: CB.blue, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4,
                }}>{icons.plus({ size: 12, color: CB.blue })} Add Document</button>
              </div>
            )}
          </div>

          {/* Generate PDF forms panel */}
          {showGenerate && entityId && entityData && (
            <div style={{
              padding: 14, borderRadius: 10, marginBottom: 10,
              background: `${CB.teal}06`, border: `1px solid ${CB.teal}20`,
            }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: CB.teal, marginBottom: 10 }}>Generate Pre-Filled PDF Forms</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {entityType === "staff" && (
                  <>
                    <button onClick={() => { HopeHavenPDF.staffCoverSheet(entityData); addToast("Cover Sheet PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Cover Sheet</button>
                    <button onClick={() => { HopeHavenPDF.codeOfConduct(entityData); addToast("Code of Conduct PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Code of Conduct</button>
                    <button onClick={() => { HopeHavenPDF.medicaidExclusion(entityData); addToast("Medicaid Exclusion PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Medicaid Exclusion</button>
                    <button onClick={() => { HopeHavenPDF.trainingLog(entityData); addToast("Training Log PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Training Log</button>
                    <button onClick={() => { HopeHavenPDF.staffOnboardingPacket(entityData); addToast("Full packet downloading (4 PDFs)", "success"); }} style={{
                      padding: "6px 14px", borderRadius: 8, border: `2px solid ${CB.teal}`, background: `${CB.teal}08`,
                      color: CB.teal, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>⬇ Full Onboarding Packet</button>
                  </>
                )}
                {entityType === "client" && (
                  <>
                    <button onClick={() => { HopeHavenPDF.dailyServiceLog(entityData); addToast("Daily Service Log PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Daily Service Log</button>
                    <button onClick={() => { HopeHavenPDF.quarterlySummary(entityData); addToast("Quarterly Summary PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Quarterly Summary</button>
                    <button onClick={() => { HopeHavenPDF.rightsGrievance(entityData); addToast("Rights & Grievance PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Rights & Grievance</button>
                    <button onClick={() => { HopeHavenPDF.roomBoardAgreement(entityData); addToast("Room & Board PDF generated", "success"); }} style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      color: CB.navy, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>Room & Board</button>
                    <button onClick={() => { HopeHavenPDF.clientIntakePacket(entityData, { is_residential: true }); addToast("Full packet downloading (4 PDFs)", "success"); }} style={{
                      padding: "6px 14px", borderRadius: 8, border: `2px solid ${CB.teal}`, background: `${CB.teal}08`,
                      color: CB.teal, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    }}>⬇ Full Intake Packet</button>
                  </>
                )}
              </div>
              <div style={{ fontSize: 10, color: CB.textLight, marginTop: 8 }}>
                PDFs are pre-filled with {entityData.first_name}'s data. Print, sign, and scan back to upload.
              </div>
            </div>
          )}

          {!entityId && (
            <div style={{ fontSize: 13, color: CB.textLight, padding: "8px 0" }}>Save the record first, then add documents.</div>
          )}

          {/* Missing required docs warning */}
          {missingRequired.length > 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 10, marginBottom: 10,
              background: `${CB.amber}06`, border: `1px solid ${CB.amber}20`,
              fontSize: 12, color: CB.amber, fontWeight: 500,
            }}>
              {icons.alertTriangle({ size: 13, color: CB.amber })} Missing: {missingRequired.map(d => d.label).join(", ")}
            </div>
          )}

          {/* Existing documents */}
          {docs.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              {docs.map(doc => {
                const docDef = docTypes.find(d => d.value === doc.doc_type);
                const isExpired = doc.expires_at && new Date(doc.expires_at + "T00:00:00") < now;
                return (
                  <div key={doc.id} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "8px 12px", borderRadius: 8, marginBottom: 4,
                    background: isExpired ? `${CB.red}06` : CB.cream, border: `1px solid ${isExpired ? `${CB.red}20` : CB.border}`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                      {icons.fileText({ size: 14, color: isExpired ? CB.red : CB.teal })}
                      <span style={{ fontSize: 13, fontWeight: 600, color: CB.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc.file_name}</span>
                      <Badge text={docDef?.label || doc.doc_type} color={CB.textMid} />
                      {isExpired && <Badge text="Expired" color={CB.red} />}
                      {doc.expires_at && !isExpired && <span style={{ fontSize: 11, color: CB.textLight }}>exp {new Date(doc.expires_at + "T00:00:00").toLocaleDateString()}</span>}
                    </div>
                    <button onClick={() => removeDoc(doc.id)} style={{
                      padding: "3px 6px", borderRadius: 4, border: "none", background: "transparent",
                      color: CB.textLight, cursor: "pointer",
                    }}>{icons.trash({ size: 12, color: CB.textLight })}</button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Add document form */}
          {adding && entityId && (
            <div style={{ padding: 14, borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, marginBottom: 8 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <div style={{ flex: "1 1 180px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Document Type</label>
                  <select style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.doc_type} onChange={e => setNewDoc(p => ({ ...p, doc_type: e.target.value }))}>
                    <option value="">Select type...</option>
                    {(() => {
                      // Group by section (staff) or tab (client)
                      const groupKey = entityType === "staff" ? "section" : "tab";
                      const groups = {};
                      docTypes.forEach(d => {
                        const g = entityType === "staff" ? (d.section || "Other") : (d.tab ? `Tab ${d.tab}` : "Other");
                        if (!groups[g]) groups[g] = [];
                        groups[g].push(d);
                      });
                      return Object.entries(groups).map(([group, items]) => (
                        <optgroup key={group} label={group}>
                          {items.map(d => <option key={d.value} value={d.value}>{d.label}{d.required ? " *" : ""}</option>)}
                        </optgroup>
                      ));
                    })()}
                  </select>
                </div>
                <div style={{ flex: "1 1 160px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>File Name</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} value={newDoc.file_name} onChange={e => setNewDoc(p => ({ ...p, file_name: e.target.value }))} placeholder="document.pdf" />
                </div>
                <div style={{ flex: "0 0 130px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Expires</label>
                  <input style={{ ...fieldStyle, padding: "8px 10px", fontSize: 13 }} type="date" value={newDoc.expires_at} onChange={e => setNewDoc(p => ({ ...p, expires_at: e.target.value }))} />
                </div>
                <button onClick={handleAdd} style={{
                  padding: "8px 14px", borderRadius: 8, border: `2px dashed ${CB.blue}`, marginBottom: 16,
                  background: `${CB.blue}08`, color: CB.blue, fontSize: 12, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{icons.plus({ size: 12, color: CB.blue })} Add</button>
              </div>
              <div style={{ fontSize: 11, color: CB.textLight, marginTop: -8 }}>
                File upload connects to Supabase Storage in production — for now this logs the document record.
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // INTAKE WIZARD — multi-step client onboarding
    // ═══════════════════════════════════════════════════════════════
    function ClientIntakeWizard() {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [step, setStep] = useState(0);
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [complete, setComplete] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "",
        address: "", city: "", state: "UT", zip: "", phone: "",
        pid: "", gender: "", ssn_last4: "", primary_language: "English",
        guardian_name: "", guardian_phone: "", guardian_relation: "",
        emergency_name: "", emergency_phone: "", emergency_relation: "",
        support_coordinator: "", sc_phone: "", sc_email: "", sc_agency: "",
        diagnoses: "", medications_on_file: false, pcsp_on_file: false,
        admission_date: new Date().toISOString().split("T")[0],
        auths: [],
      });
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const addIntakeAuth = () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select code and enter units", "error");
        const sc = serviceCodes.find(s => s.id === newAuth.service_code_id);
        setForm(prev => ({ ...prev, auths: [...prev.auths, { ...newAuth, code: sc?.code, name: sc?.name }] }));
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      };

      const removeIntakeAuth = (idx) => {
        setForm(prev => ({ ...prev, auths: prev.auths.filter((_, i) => i !== idx) }));
      };

      const handleSubmit = async () => {
        if (!form.first_name || !form.last_name) return addToast("Name is required", "error");
        setSaving(true);
        // Step 1: Create person — persist all captured intake fields
        const personPayload = {
          org_id: orgId,
          first_name: form.first_name, last_name: form.last_name,
          date_of_birth: form.date_of_birth || null,
          medicaid_number: form.medicaid_number || null,
          is_active: true,
          // Contact / demographics
          address: form.address || null, city: form.city || null, state: form.state || null, zip: form.zip || null,
          phone: form.phone || null, gender: form.gender || null, primary_language: form.primary_language || null,
          // Guardian / emergency contacts
          guardian_name: form.guardian_name || null, guardian_phone: form.guardian_phone || null, guardian_relation: form.guardian_relation || null,
          emergency_contact_name: form.emergency_name || null, emergency_contact_phone: form.emergency_phone || null,
          // Support coordinator (mapped from intake's sc_* keys to canonical column names)
          support_coordinator: form.support_coordinator || null,
          support_coordinator_phone: form.sc_phone || null,
          support_coordinator_email: form.sc_email || null,
          support_coordinator_agency: form.sc_agency || null,
          // Clinical
          primary_diagnosis: form.diagnoses || null,
          admission_date: form.admission_date || null,
        };
        // Strip nulls so we never trigger NOT NULL on optional columns
        Object.keys(personPayload).forEach(k => { if (personPayload[k] === null) delete personPayload[k]; });

        let personData, personErr;
        ({ data: personData, error: personErr } = await supabase.from("persons").insert(personPayload).select());
        // If a column doesn't exist (older schema), retry with only core fields
        if (personErr && /column .* does not exist/i.test(personErr.message || "")) {
          const fallbackPayload = {
            org_id: orgId, first_name: form.first_name, last_name: form.last_name,
            date_of_birth: form.date_of_birth || null, medicaid_number: form.medicaid_number || null,
            is_active: true,
          };
          Object.keys(fallbackPayload).forEach(k => { if (fallbackPayload[k] === null) delete fallbackPayload[k]; });
          ({ data: personData, error: personErr } = await supabase.from("persons").insert(fallbackPayload).select());
          if (!personErr) addToast("Client created (some intake fields skipped — schema missing columns)", "warning");
        }
        if (personErr || !personData?.[0]) {
          addToast("Failed to create client: " + (personErr?.message || "unknown error"), "error");
          setSaving(false);
          return;
        }
        const personId = personData[0].id;

        // Step 2: Create auths
        if (form.auths.length > 0) {
          const authPayloads = form.auths.map(a => {
            const startDate = a.start_date || new Date().toISOString().split("T")[0];
            let endDate = a.end_date;
            if (!endDate) {
              const d = new Date(startDate + "T00:00:00");
              d.setFullYear(d.getFullYear() + 1);
              endDate = d.toISOString().split("T")[0];
            }
            return {
              org_id: orgId, person_id: personId,
              service_code_id: a.service_code_id,
              authorized_units: parseInt(a.authorized_units),
              used_units: 0,
              start_date: startDate,
              end_date: endDate,
              rate_per_unit: a.rate_per_unit ? parseFloat(a.rate_per_unit) : null,
            };
          });
          const { error: authErr } = await supabase.from("person_service_authorizations").insert(authPayloads);
          if (authErr) addToast("Client created but auth insert failed: " + authErr.message, "warning");
        }

        setSaving(false);
        setComplete(true);
        addToast(`${form.first_name} ${form.last_name} intake complete!`, "success");
      };

      const steps = [
        { label: "Personal Info", icon: icons.heart },
        { label: "Guardian & Contacts", icon: icons.mail },
        { label: "Medical & SC", icon: icons.shield },
        { label: "Service Auths", icon: icons.fileText },
        { label: "Review & Submit", icon: icons.checkCircle },
      ];

      if (complete) {
        return (
          <div>
            <div style={{
              background: CB.white, borderRadius: 20, padding: "60px 40px", textAlign: "center",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "successPop 0.4s ease",
            }}>
              <div style={{
                width: 72, height: 72, borderRadius: 20, background: `${CB.green}12`,
                display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20,
              }}>{icons.checkCircle({ size: 36, color: CB.green })}</div>
              <h3 style={{ fontSize: 22, fontWeight: 800, color: CB.navy, marginBottom: 8 }}>{form.first_name} {form.last_name}</h3>
              <p style={{ fontSize: 15, color: CB.textMid, marginBottom: 24 }}>
                Created with {form.auths.length} service authorization{form.auths.length !== 1 ? "s" : ""}
              </p>
              <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                <PrimaryButton onClick={() => HopeHavenPDF.clientIntakePacket(form, { pid: form.pid, sc_name: form.support_coordinator, sc_phone: form.sc_phone, is_residential: form.auths.some(a => ["RHS", "HHS", "PPS"].includes(a.code)) })} color={CB.navy}>
                  {icons.fileText({ size: 16 })} Download Intake Packet
                </PrimaryButton>
                <PrimaryButton onClick={() => { setComplete(false); setStep(0); setForm({ first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", address: "", city: "", state: "UT", zip: "", phone: "", pid: "", gender: "", ssn_last4: "", primary_language: "English", guardian_name: "", guardian_phone: "", guardian_relation: "", emergency_name: "", emergency_phone: "", emergency_relation: "", support_coordinator: "", sc_phone: "", sc_email: "", sc_agency: "", diagnoses: "", medications_on_file: false, pcsp_on_file: false, admission_date: new Date().toISOString().split("T")[0], auths: [] }); }}>
                  {icons.plus({ size: 16 })} Start Another Intake
                </PrimaryButton>
              </div>
            </div>
          </div>
        );
      }

      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      return (
        <div>

          {/* Step indicator */}
          <div style={{
            display: "flex", alignItems: "center", marginBottom: 28, padding: "16px 24px",
            background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          }}>
            {steps.map((s, i) => (
              <React.Fragment key={i}>
                <div onClick={() => i <= step && setStep(i)} style={{
                  display: "flex", alignItems: "center", gap: 8, cursor: i <= step ? "pointer" : "default",
                  opacity: i <= step ? 1 : 0.4, transition: "opacity 0.2s",
                }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: 10,
                    background: i === step ? CB.teal : i < step ? CB.green : CB.cream,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "background 0.2s",
                  }}>
                    {i < step ? icons.checkCircle({ size: 16, color: CB.white }) : s.icon({ size: 16, color: i === step ? CB.white : CB.textLight })}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: i === step ? 700 : 500, color: i === step ? CB.navy : CB.textMid }}>{s.label}</span>
                </div>
                {i < steps.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: i < step ? CB.green : CB.border, margin: "0 12px", borderRadius: 1, transition: "background 0.2s" }} />
                )}
              </React.Fragment>
            ))}
          </div>

          <div style={{
            background: CB.white, borderRadius: 20, padding: "32px 36px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.3s ease",
          }}>
            {/* Step 0: Personal Info */}
            {step === 0 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Personal Information</h3>
                <FormRow>
                  <FormField label="First Name" required half>
                    <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
                  </FormField>
                  <FormField label="Last Name" required half>
                    <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Date of Birth" half>
                    <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
                  </FormField>
                  <FormField label="Gender" half>
                    <select style={fieldStyle} value={form.gender} onChange={e => set("gender", e.target.value)}>
                      <option value="">Select...</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="nonbinary">Non-binary</option>
                      <option value="other">Other</option>
                    </select>
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="Medicaid Number" half>
                    <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
                  </FormField>
                  <FormField label="PID (Person ID)" half>
                    <input style={fieldStyle} value={form.pid} onChange={e => set("pid", e.target.value)} placeholder="DSPD Person ID" />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="SSN (Last 4 digits)" half>
                    <input style={fieldStyle} value={form.ssn_last4} onChange={e => set("ssn_last4", e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="XXXX" maxLength={4} />
                  </FormField>
                  <FormField label="Primary Language" half>
                    <input style={fieldStyle} value={form.primary_language} onChange={e => set("primary_language", e.target.value)} placeholder="English" />
                  </FormField>
                </FormRow>
                <FormField label="Address">
                  <input style={fieldStyle} value={form.address} onChange={e => set("address", e.target.value)} placeholder="Street address" />
                </FormField>
                <FormRow>
                  <FormField label="City" half>
                    <input style={fieldStyle} value={form.city} onChange={e => set("city", e.target.value)} placeholder="City" />
                  </FormField>
                  <FormField label="State" half>
                    <input style={fieldStyle} value={form.state} onChange={e => set("state", e.target.value)} placeholder="UT" maxLength={2} />
                  </FormField>
                </FormRow>
                <FormRow>
                  <FormField label="ZIP Code" half>
                    <input style={fieldStyle} value={form.zip} onChange={e => set("zip", e.target.value)} placeholder="84088" />
                  </FormField>
                  <FormField label="Phone" half>
                    <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
                  </FormField>
                </FormRow>
                <FormField label="Admission Date">
                  <input style={fieldStyle} type="date" value={form.admission_date} onChange={e => set("admission_date", e.target.value)} />
                </FormField>
              </>
            )}

            {/* Step 1: Guardian & Emergency Contacts */}
            {step === 1 && (
              <>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: CB.navy, marginBottom: 20 }}>Guardian & Emergency Contacts</h3>
                <div style={{ padding: "12px 16px", borderRadius: 10, background: `${CB.teal}06`, border: `1px solid ${CB.teal}20`, marginBottom: 20 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: CB.teal, marginBottom: 4 }}>Legal Guardian / Representative</div>
                  <div style={{ fontSize: 11, color: CB.textMid }}>If the person has a legal guardian, conservator, or representative payee</div>
                </div>
                <FormRow>
                  <FormField label="Guardian Name" half>
                    <input style={fieldStyle} value={form.guardian_name} onChange={e => set("guardian_name", e.target.value)} placeholder="Full name" />
                  </FormField>
