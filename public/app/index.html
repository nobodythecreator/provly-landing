      { id: "D38", category: "Operations", title: "Staff Performance Evaluations", description: "Complete annual performance evaluations for all staff", frequency: "Annual", daysToComplete: 365, recurring: true, severity: "medium" },
    ];

    function ServiceNoteForm({ open, onClose, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [saving, setSaving] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [clients, setClients] = useState([]);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [selectedCode, setSelectedCode] = useState(null);
      const [clientAuths, setClientAuths] = useState([]);
      const [contexts, setContexts] = useState([]); // v19.2
      const [contextMembers, setContextMembers] = useState({}); // v19.2 — {ctxId → [personId]}
      const [form, setForm] = useState({
        staff_id: "", co_staff_ids: [], person_id: "", service_code_id: "",
        context_id: "", // v19.2
        service_date: new Date().toISOString().split("T")[0],
        start_time: "", end_time: "", note_text: "", goal_id: "",
      });
      const [extraFields, setExtraFields] = useState({});
      const [goals, setGoals] = useState([]);

      useEffect(() => {
        if (open) {
          Promise.all([
            supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
            supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
            supabase.from("service_code_definitions").select("id, code, name").order("code"),
            // v19.2 — load active contexts
            supabase.from("service_delivery_contexts")
              .select("id, name, delivery_type, service_code_id, service_code_definitions(id, code, name)")
              .eq("is_active", true).order("name"),
          ]).then(([s, c, sc, ctx]) => {
            setStaffList(s.data || []);
            setClients(c.data || []);
            setServiceCodes(sc.data || []);
            const ctxList = ctx.error ? [] : (ctx.data || []);
            setContexts(ctxList);
            // Batch-load active members per context
            if (ctxList.length > 0) {
              const ids = ctxList.map(x => x.id);
              supabase.from("service_delivery_context_members")
                .select("context_id, person_id, is_active, end_date")
                .in("context_id", ids).then(({ data }) => {
                  const byCtx = {};
                  (data || []).forEach(m => {
                    if (m.is_active === false || m.end_date) return;
                    if (!byCtx[m.context_id]) byCtx[m.context_id] = [];
                    byCtx[m.context_id].push(m.person_id);
                  });
                  setContextMembers(byCtx);
                });
            }
          });
          setForm({ staff_id: "", co_staff_ids: [], person_id: "", service_code_id: "", context_id: "", service_date: new Date().toISOString().split("T")[0], start_time: "", end_time: "", note_text: "", goal_id: "" });
          setExtraFields({});
          setSelectedCode(null);
          setClientAuths([]);
          setGoals([]);
        }
      }, [open]);

      // Load client auths when person changes
      const handleClientChange = async (personId) => {
        setForm(prev => ({ ...prev, person_id: personId, goal_id: "" }));
        if (personId) {
          const [authData, goalData] = await Promise.all([
            supabase.from("person_service_authorizations").select("id, service_code_id, authorized_units, used_units, service_code_definitions(code)").eq("person_id", personId),
            supabase.from("pcsp_goals").select("id, domain, goal_description, status").eq("person_id", personId).in("status", ["active", "in_progress"]).order("domain"),
          ]);
          setClientAuths(authData.data || []);
          setGoals(goalData.data || []);
        } else {
          setClientAuths([]);
          setGoals([]);
        }
      };

      // Find the active auth for the selected client + code combo
      const activeAuth = useMemo(() => {
        if (!form.service_code_id || !clientAuths.length) return null;
        return clientAuths.find(a => a.service_code_id === form.service_code_id) || null;
      }, [form.service_code_id, clientAuths]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleCodeChange = (scId) => {
        set("service_code_id", scId);
        const code = serviceCodes.find(s => s.id === scId);
        setSelectedCode(code?.code || null);
        setExtraFields({});
      };

      // v19.2 — context picker: locks service code + filters clients to members
      const handleContextChange = (ctxId) => {
        const ctx = contexts.find(c => c.id === ctxId);
        if (ctx) {
          const memberIds = contextMembers[ctxId] || [];
          const personStillValid = memberIds.includes(form.person_id);
          setForm(prev => ({
            ...prev,
            context_id: ctxId,
            service_code_id: ctx.service_code_id || prev.service_code_id,
            person_id: personStillValid ? prev.person_id : "",
            goal_id: personStillValid ? prev.goal_id : "",
          }));
          // Sync selectedCode for dynamic field rendering
          if (ctx.service_code_definitions?.code) setSelectedCode(ctx.service_code_definitions.code);
          if (!personStillValid) {
            setClientAuths([]);
            setGoals([]);
          }
        } else {
          setForm(prev => ({ ...prev, context_id: "" }));
        }
      };

      // v19.2 — clients filtered to context members when a context is picked
      const visibleClients = useMemo(() => {
        if (!form.context_id) return clients;
        const memberIds = new Set(contextMembers[form.context_id] || []);
        return clients.filter(c => memberIds.has(c.id));
      }, [clients, form.context_id, contextMembers]);

      const selectedContext = contexts.find(c => c.id === form.context_id);

      const dynamicFields = SERVICE_NOTE_FIELDS[selectedCode] || [];

      const handleSave = async () => {
        if (!form.staff_id || !form.person_id || !form.service_code_id || !form.service_date) {
          return addToast("Primary staff, client, service code, and date are required", "error");
        }
        setSaving(true);
        // Calculate duration
        let duration_minutes = null;
        if (form.start_time && form.end_time) {
          const [sh, sm] = form.start_time.split(":").map(Number);
          const [eh, em] = form.end_time.split(":").map(Number);
          duration_minutes = (eh * 60 + em) - (sh * 60 + sm);
          if (duration_minutes < 0) duration_minutes += 1440;
        }
        // Combine note_text with extra fields
        let fullNote = form.note_text || "";
        if (Object.keys(extraFields).length > 0) {
          const sections = dynamicFields
            .filter(f => extraFields[f.key])
            .map(f => `[${f.label}]\n${extraFields[f.key]}`)
            .join("\n\n");
          fullNote = sections + (fullNote ? `\n\n[Additional Notes]\n${fullNote}` : "");
        }
        // Prepend goal reference if selected
        const selectedGoal = goals.find(g => g.id === form.goal_id);
        if (selectedGoal) {
          fullNote = `[PCSP Goal: ${selectedGoal.domain}]\n${selectedGoal.goal_description.substring(0, 120)}\n\n${fullNote}`;
        }

        // Build full staff_ids array: primary first, then co-staff, deduped
        const allStaffIds = [form.staff_id, ...form.co_staff_ids.filter(id => id && id !== form.staff_id)];

        const insertPayload = {
          org_id: orgId,
          staff_id: form.staff_id, // legacy single-staff column still populated for back-compat
          staff_ids: allStaffIds,  // new multi-staff array column
          person_id: form.person_id,
          service_code_id: form.service_code_id,
          service_date: form.service_date,
          start_time: form.start_time || null,
          end_time: form.end_time || null,
          duration_minutes,
          billable_units: calculateBillableUnits(selectedCode, duration_minutes),
          summary_note: fullNote,
          status: "draft",
        };
        if (form.goal_id) insertPayload.goal_id = form.goal_id;
        if (form.context_id) insertPayload.context_id = form.context_id; // v19.2

        let { error } = await supabase.from("service_notes").insert(insertPayload);

        // Schema fallback: if staff_ids column doesn't exist, retry without it
        if (error && /column .*staff_ids.* does not exist/i.test(error.message || "")) {
          delete insertPayload.staff_ids;
          const retry = await supabase.from("service_notes").insert(insertPayload);
          error = retry.error;
          if (!error && form.co_staff_ids.length > 0) {
            addToast("Note saved — co-staff not recorded (run v18.9 migration)", "warning");
          }
        }
        // v19.2 schema fallback: if context_id column doesn't exist, retry without it
        if (error && /column .*context_id.* does not exist/i.test(error.message || "")) {
          delete insertPayload.context_id;
          const retry = await supabase.from("service_notes").insert(insertPayload);
          error = retry.error;
          if (!error && form.context_id) {
            addToast("Note saved — context link not stored (run v19.2 migration)", "warning");
          }
        }

        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast(form.co_staff_ids.length > 0 ? `Service note saved with ${allStaffIds.length} staff` : "Service note saved", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="New Service Note" subtitle={selectedCode ? `Dynamic fields for ${selectedCode}` : "Select a service code to load specific fields"} width={760}>
          {/* v19.2 — Service Context picker (optional) */}
          {contexts.length > 0 && (
            <FormField label="Service Context">
              <select style={fieldStyle} value={form.context_id} onChange={e => handleContextChange(e.target.value)}>
                <option value="">(no context — pick client + code freely)</option>
                {contexts.map(c => {
                  const meta = DELIVERY_TYPE_META[c.delivery_type] || {};
                  const memberCount = (contextMembers[c.id] || []).length;
                  return (
                    <option key={c.id} value={c.id}>
                      {c.name} — {meta.label || c.delivery_type} ({memberCount} {memberCount === 1 ? "client" : "clients"})
                    </option>
                  );
                })}
              </select>
              {selectedContext && (
                <div style={{
                  marginTop: 6, padding: "8px 12px", borderRadius: 8,
                  background: `${DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal}10`,
                  border: `1px solid ${DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal}30`,
                  fontSize: 11, color: CB.textMid, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap",
                }}>
                  <span style={{ fontWeight: 700, color: DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal }}>
                    {DELIVERY_TYPE_META[selectedContext.delivery_type]?.label || selectedContext.delivery_type}
                  </span>
                  <span>·</span>
                  <span>Code <b>{selectedContext.service_code_definitions?.code || "?"}</b> locked</span>
                  <span>·</span>
                  <span>Clients filtered to <b>{visibleClients.length}</b> active member{visibleClients.length === 1 ? "" : "s"}</span>
                </div>
              )}
            </FormField>
          )}

          <FormRow>
            <FormField label="Primary Staff" required half>
              <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
                <option value="">Select primary staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required half>
              <select style={fieldStyle} value={form.person_id} onChange={e => handleClientChange(e.target.value)}>
                <option value="">{form.context_id && visibleClients.length === 0 ? "No active members in context" : "Select client..."}</option>
                {visibleClients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>
          </FormRow>

          {/* Co-Staff picker — for shifts with multiple DSPs (RHS, HHS, etc.) */}
          {form.staff_id && (
            <FormField label={form.co_staff_ids.length > 0 ? `Additional Staff on Shift (${form.co_staff_ids.length})` : "Additional Staff on Shift (optional)"}>
              <div style={{ padding: "10px 12px", background: CB.cream, border: `1px solid ${CB.border}`, borderRadius: 10 }}>
                {/* Selected co-staff as chips */}
                {form.co_staff_ids.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                    {form.co_staff_ids.map(coId => {
                      const s = staffList.find(x => x.id === coId);
                      if (!s) return null;
                      return (
                        <div key={coId} style={{
                          display: "flex", alignItems: "center", gap: 6, padding: "5px 4px 5px 10px",
                          background: CB.white, border: `1px solid ${CB.teal}30`, borderRadius: 20,
                          fontSize: 12, fontWeight: 600, color: CB.teal,
                        }}>
                          {s.first_name} {s.last_name}
                          <button onClick={() => setForm(p => ({ ...p, co_staff_ids: p.co_staff_ids.filter(id => id !== coId) }))} style={{
                            width: 18, height: 18, borderRadius: "50%", border: "none",
                            background: `${CB.teal}15`, color: CB.teal, cursor: "pointer",
                            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12,
                            fontFamily: "inherit", padding: 0, lineHeight: 1,
                          }}>×</button>
                        </div>
                      );
                    })}
                  </div>
                )}
                {/* Add co-staff dropdown */}
                <select style={{ ...fieldStyle, padding: "8px 12px", fontSize: 13, background: CB.white }}
                  value=""
                  onChange={e => {
                    if (!e.target.value) return;
                    setForm(p => ({ ...p, co_staff_ids: [...p.co_staff_ids, e.target.value] }));
                  }}>
                  <option value="">+ Add co-staff...</option>
                  {staffList
                    .filter(s => s.id !== form.staff_id && !form.co_staff_ids.includes(s.id))
                    .map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
                </select>
                {form.co_staff_ids.length === 0 && (
                  <div style={{ marginTop: 6, fontSize: 11, color: CB.textLight, fontStyle: "italic" }}>
                    For two-person shifts (e.g. RHS, HHS), add additional staff who worked the same shift.
                  </div>
                )}
              </div>
            </FormField>
          )}
          <FormField label="Service Code" required>
            <select
              style={{ ...fieldStyle, background: form.context_id ? "#F1F5F9" : fieldStyle.background, cursor: form.context_id ? "not-allowed" : "pointer" }}
              value={form.service_code_id}
              disabled={!!form.context_id}
              onChange={e => handleCodeChange(e.target.value)}
            >
              <option value="">Select service code...</option>
              {serviceCodes.map(sc => {
                // If client selected, mark which codes they have auths for
                const hasAuth = clientAuths.some(a => a.service_code_id === sc.id);
                return <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}{hasAuth ? " ✓" : ""}</option>;
              })}
            </select>
            {form.context_id && (
              <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight, fontStyle: "italic" }}>
                Locked to context's service code. Clear context to override.
              </div>
            )}
            {activeAuth && (
              <div style={{ marginTop: 6, fontSize: 12, color: CB.teal, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                {icons.checkCircle({ size: 13, color: CB.teal })}
                Auth: {activeAuth.used_units || 0}/{activeAuth.authorized_units} units used
                {activeAuth.rate_per_unit && perms.viewRates && <span>@ ${Number(activeAuth.rate_per_unit).toFixed(2)}/unit</span>}
              </div>
            )}
          </FormField>
          <FormRow>
            <FormField label="Service Date" required half>
              <input style={fieldStyle} type="date" value={form.service_date} onChange={e => set("service_date", e.target.value)} />
            </FormField>
            <FormField label="Start Time" half>
              <input style={fieldStyle} type="time" value={form.start_time} onChange={e => set("start_time", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="End Time" half>
              <input style={fieldStyle} type="time" value={form.end_time} onChange={e => set("end_time", e.target.value)} />
            </FormField>
            <FormField label="Duration / Units" half>
              <div style={{ ...fieldStyle, background: "#F1F5F9", color: CB.textMid, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                {(() => {
                  const rule = BILLING_RULES[selectedCode];
                  const authRate = activeAuth?.rate_per_unit ? Number(activeAuth.rate_per_unit) : null;
                  const effectiveRate = perms.viewRates && rule ? (rule.worksheet ? authRate : rule.rate) : null;

                  if (!rule) {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      return `${Math.floor(mins/60)}h ${mins%60}m → ${Math.ceil(mins/15)} units`;
                    }
                    return "Select a service code";
                  }
                  // Daily / Session — always 1 unit
                  if (rule.unit_type === "daily" || rule.unit_type === "session") {
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.teal}15`, color: CB.teal, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{rule.label}</span>
                        <span style={{ fontWeight: 600, color: CB.navy }}>1 unit</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : (perms.viewRates && rule.worksheet) ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  // Tiered daily
                  if (rule.unit_type === "tiered_daily") {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      const tier = getTieredRate(selectedCode, mins);
                      return (
                        <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered</span>
                          <span>{Math.floor(mins/60)}h {mins%60}m</span>
                          <span style={{ fontWeight: 700, color: CB.navy }}>→ 1 unit</span>
                          <span style={{ fontSize: 11, color: CB.textLight }}>({Math.ceil(mins/60)}hr tier{perms.viewRates && tier?.max_rate ? `, max $${tier.max_rate.toFixed(2)}` : ""})</span>
                        </span>
                      );
                    }
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered Daily</span>
                        <span style={{ fontSize: 12 }}>Enter times → rate by hours</span>
                      </span>
                    );
                  }
                  // Quarter hour
                  if (form.start_time && form.end_time) {
                    const [sh, sm] = form.start_time.split(":").map(Number);
                    const [eh, em] = form.end_time.split(":").map(Number);
                    let mins = (eh * 60 + em) - (sh * 60 + sm);
                    if (mins < 0) mins += 1440;
                    const units = Math.ceil(mins / 15);
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{Math.floor(mins/60)}h {mins%60}m</span>
                        <span style={{ fontWeight: 700, color: CB.navy }}>→ {units} unit{units !== 1 ? "s" : ""}</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : (perms.viewRates && rule.worksheet) ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  return "Enter start/end times";
                })()}
              </div>
            </FormField>
          </FormRow>

          {/* Dynamic fields per service code */}
          {dynamicFields.length > 0 && (
            <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <Badge text={selectedCode} color={CB.blue} />
                <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>Required Documentation</span>
              </div>
              {dynamicFields.map(field => (
                <FormField key={field.key} label={field.label}>
                  {field.type === "textarea" ? (
                    <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  ) : field.type === "select" ? (
                    <select style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))}>
                      <option value="">Select...</option>
                      {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  ) : (
                    <input style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  )}
                </FormField>
              ))}
            </div>
          )}

          {/* PCSP Goal Link */}
          {goals.length > 0 && (
            <FormField label="Link to PCSP Goal (optional)">
              <select style={fieldStyle} value={form.goal_id} onChange={e => set("goal_id", e.target.value)}>
                <option value="">No goal linked</option>
                {goals.map(g => <option key={g.id} value={g.id}>{g.domain} — {g.goal_description.substring(0, 60)}{g.goal_description.length > 60 ? "..." : ""}</option>)}
              </select>
            </FormField>
          )}
          <FormField label="Additional Notes">
            <textarea style={{ ...fieldStyle, minHeight: 64, resize: "vertical" }} value={form.note_text} onChange={e => set("note_text", e.target.value)} placeholder="Any additional observations or notes..." />
          </FormField>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} Save Note</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function ServiceNotesPage() {
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [viewing, setViewing] = useState(null);
      const [editing, setEditing] = useState(false);
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [viewMode, setViewMode] = useState("tree"); // "tree" | "flat"
      const [filterClient, setFilterClient] = useState("");
      const [filterCode, setFilterCode] = useState("");
      const { addToast } = useToast();
      const perms = usePermissions();

      useEffect(() => {
        loadNotes();
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      const loadNotes = async () => {
        setLoading(true);
        // v19.2 — try with context join, fall back if column/relationship missing
        const baseSel = "id, service_date, start_time, end_time, duration_minutes, billable_units, status, summary_note, service_code_id, staff_id, staff_ids, staff!service_notes_staff_id_fkey(first_name, last_name), persons(first_name, last_name), service_code_definitions(code, name)";
        const ctxSel = baseSel + ", context_id, service_delivery_contexts(id, name, delivery_type)";
        let res = await supabase.from("service_notes").select(ctxSel).order("service_date", { ascending: false }).limit(500);
        if (res.error && /(column|relationship).*context/i.test(res.error.message || "")) {
          res = await supabase.from("service_notes").select(baseSel).order("service_date", { ascending: false }).limit(500);
        }
        const { data, error } = res;
        if (error) { setLoading(false); return; }

        const rows = data || [];

        // Enrich with co-staff names: collect all staff_ids across rows, batch-fetch, map
        const coStaffIds = new Set();
        rows.forEach(r => {
          if (Array.isArray(r.staff_ids)) {
            r.staff_ids.forEach(id => {
              if (id && id !== r.staff_id) coStaffIds.add(id);
            });
          }
        });
        if (coStaffIds.size > 0) {
          const { data: coStaff } = await supabase.from("staff")
            .select("id, first_name, last_name")
            .in("id", [...coStaffIds]);
          const staffMap = {};
          (coStaff || []).forEach(s => { staffMap[s.id] = s; });
          rows.forEach(r => {
            if (Array.isArray(r.staff_ids) && r.staff_ids.length > 1) {
              r.co_staff = r.staff_ids
                .filter(id => id && id !== r.staff_id)
                .map(id => staffMap[id])
                .filter(Boolean);
            } else {
              r.co_staff = [];
            }
          });
        } else {
          rows.forEach(r => { r.co_staff = []; });
        }

        setNotes(rows);
        setLoading(false);
      };

      const openDetail = (note) => {
        setViewing(note);
        setEditing(false);
        setEditForm({
          summary_note: note.summary_note || "",
          status: note.status || "draft",
          start_time: note.start_time?.slice(0, 5) || "",
          end_time: note.end_time?.slice(0, 5) || "",
          service_code_id: note.service_code_id || "",
        });
      };

      const saveEdit = async () => {
        setSaving(true);
        let duration_minutes = null;
        if (editForm.start_time && editForm.end_time) {
          const [sh, sm] = editForm.start_time.split(":").map(Number);
          const [eh, em] = editForm.end_time.split(":").map(Number);
          duration_minutes = (eh * 60 + em) - (sh * 60 + sm);
          if (duration_minutes < 0) duration_minutes += 1440;
        }
        // Use edited code if changed, else fall back to viewing's original code
        const editedCodeDef = serviceCodes.find(sc => sc.id === editForm.service_code_id);
        const code = editedCodeDef?.code || viewing.service_code_definitions?.code;
        const updatePayload = {
          summary_note: editForm.summary_note,
          status: editForm.status,
          start_time: editForm.start_time || null,
          end_time: editForm.end_time || null,
          duration_minutes,
          billable_units: calculateBillableUnits(code, duration_minutes),
        };
        // Only include service_code_id if it changed
        if (editForm.service_code_id && editForm.service_code_id !== viewing.service_code_id) {
          updatePayload.service_code_id = editForm.service_code_id;
        }
        const { error } = await supabase.from("service_notes").update(updatePayload).eq("id", viewing.id);
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Service note updated", "success");
        setViewing(null);
        loadNotes();
      };

      const updateStatus = async (noteId, newStatus) => {
        const { error } = await supabase.from("service_notes").update({ status: newStatus }).eq("id", noteId);
        if (error) return addToast(error.message, "error");
        addToast(`Note marked as ${newStatus}`, "success");
        setViewing(prev => prev ? { ...prev, status: newStatus } : null);
        setEditForm(prev => ({ ...prev, status: newStatus }));
        loadNotes();
      };

      const statusColors = { draft: CB.amber, submitted: CB.blue, approved: CB.green, rejected: CB.red };
      const statusFlow = { draft: "submitted", submitted: "approved" };

      const columns = [
        { label: "Date", bold: true, render: (r) => r.service_date ? new Date(r.service_date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Staff", render: (r) => {
          const primary = r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—";
          if (!r.co_staff || r.co_staff.length === 0) return primary;
          return (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
              {primary}
              <span title={r.co_staff.map(s => `${s.first_name} ${s.last_name}`).join(", ")} style={{
                fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 10,
                background: `${CB.teal}12`, color: CB.teal, cursor: "help",
              }}>+{r.co_staff.length}</span>
            </span>
          );
        }},
        { label: "Client", render: (r) => r.persons ? `${r.persons.first_name} ${r.persons.last_name}` : "—" },
        { label: "Code", render: (r) => <Badge text={r.service_code_definitions?.code || "?"} color={CB.blue} /> },
        { label: "Context", render: (r) => {
          if (!r.service_delivery_contexts) return <span style={{ fontSize: 11, color: CB.textLight }}>—</span>;
          const meta = DELIVERY_TYPE_META[r.service_delivery_contexts.delivery_type] || {};
          return (
            <span style={{
              fontSize: 11, fontWeight: 700, padding: "3px 8px", borderRadius: 6,
              background: `${meta.color || CB.teal}15`, color: meta.color || CB.teal,
              display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap", maxWidth: 180,
            }} title={r.service_delivery_contexts.name}>
              <span style={{ width: 5, height: 5, borderRadius: "50%", background: meta.color || CB.teal, flexShrink: 0 }} />
              <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{r.service_delivery_contexts.name}</span>
            </span>
          );
        }},
        { label: "Time", render: (r) => r.start_time && r.end_time ? `${r.start_time.slice(0,5)} – ${r.end_time.slice(0,5)}` : "—" },
        { label: "Units", render: (r) => {
          const code = r.service_code_definitions?.code;
          const rule = BILLING_RULES[code];
          if (!rule) {
            const units = r.billable_units || (r.duration_minutes ? Math.ceil(r.duration_minutes / 15) : null);
            return units ? <span><span style={{ fontWeight: 600 }}>{units}</span> <span style={{ fontSize: 11, color: CB.textLight }}>qtr-hr</span></span> : "—";
          }
          if (rule.unit_type === "tiered_daily") {
            const tier = getTieredRate(code, r.duration_minutes);
            return (
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontWeight: 600 }}>1</span>
                <span style={{ fontSize: 11, color: CB.amber, fontWeight: 600 }}>
                  {tier ? `${Math.ceil((r.duration_minutes||0)/60)}hr tier` : "tiered"}
                </span>
              </span>
            );
          }
          const units = r.billable_units || calculateBillableUnits(code, r.duration_minutes);
          if (!units && units !== 0) return "—";
          return (
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontWeight: 600 }}>{units}</span>
              <span style={{ fontSize: 11, color: CB.textLight }}>{rule.label}</span>
              {rule.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700 }}>*</span>}
            </span>
          );
        }},
        { label: "Status", render: (r) => <Badge text={r.status || "draft"} color={statusColors[r.status] || CB.textLight} /> },
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openDetail(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.eye({ size: 13 })} View</button>
        )},
      ];

      // Derive filter options + filtered list
      const uniqueClients = useMemo(() => {
        const seen = new Map();
        notes.forEach(n => {
          if (n.persons && !seen.has(n.persons.first_name + n.persons.last_name)) {
            seen.set(n.persons.first_name + n.persons.last_name, `${n.persons.first_name} ${n.persons.last_name}`);
          }
        });
        return [...seen.values()].sort();
      }, [notes]);

      const uniqueCodes = useMemo(() => {
        const seen = new Set();
        notes.forEach(n => { if (n.service_code_definitions?.code) seen.add(n.service_code_definitions.code); });
        return [...seen].sort();
      }, [notes]);

      const filteredNotes = useMemo(() => {
        return notes.filter(n => {
          if (filterClient && n.persons && `${n.persons.first_name} ${n.persons.last_name}` !== filterClient) return false;
          if (filterCode && n.service_code_definitions?.code !== filterCode) return false;
          return true;
        });
      }, [notes, filterClient, filterCode]);

      // Build year → month → day tree from filtered notes
      const notesTree = useMemo(() => {
        const byYear = {};
        filteredNotes.forEach(n => {
          if (!n.service_date) return;
          const d = new Date(n.service_date + "T00:00:00");
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, "0");
          const day = String(d.getDate()).padStart(2, "0");
          const monthLabel = d.toLocaleString("en-US", { month: "long" });
          const dayLabel = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
          if (!byYear[y]) byYear[y] = { months: {}, total: 0 };
          if (!byYear[y].months[m]) byYear[y].months[m] = { label: monthLabel, days: {}, total: 0 };
          if (!byYear[y].months[m].days[day]) byYear[y].months[m].days[day] = { label: dayLabel, notes: [] };
          byYear[y].months[m].days[day].notes.push(n);
          byYear[y].months[m].total++;
          byYear[y].total++;
        });
        return byYear;
      }, [filteredNotes]);

      return (
        <div>
          <PageHeader title="Service Notes" subtitle="Dynamic documentation forms per service code — click any note to view or edit"
            action={<PrimaryButton onClick={() => setFormOpen(true)}>{icons.plus({ size: 16 })} New Service Note</PrimaryButton>}
          />

          {/* Filter + view toggle toolbar */}
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
            marginBottom: 16, padding: "12px 16px", background: CB.white, borderRadius: 12,
            border: `1px solid ${CB.border}`, flexWrap: "wrap",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6 }}>Filter</span>
              <select value={filterClient} onChange={e => setFilterClient(e.target.value)} style={{ ...fieldStyle, padding: "7px 12px", fontSize: 13, width: "auto", minWidth: 160 }}>
                <option value="">All clients</option>
                {uniqueClients.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select value={filterCode} onChange={e => setFilterCode(e.target.value)} style={{ ...fieldStyle, padding: "7px 12px", fontSize: 13, width: "auto", minWidth: 120 }}>
                <option value="">All codes</option>
                {uniqueCodes.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              {(filterClient || filterCode) && (
                <button onClick={() => { setFilterClient(""); setFilterCode(""); }} style={{
                  padding: "7px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                  color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                }}>Clear</button>
              )}
              <span style={{ fontSize: 12, color: CB.textMid, marginLeft: 4 }}>
                {filteredNotes.length} of {notes.length} {notes.length === 1 ? "note" : "notes"}
              </span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 4, background: CB.cream, padding: 3, borderRadius: 9, border: `1px solid ${CB.border}` }}>
              <button onClick={() => setViewMode("tree")} style={{
                padding: "6px 14px", borderRadius: 7, border: "none", fontSize: 12, fontWeight: 700, fontFamily: "inherit",
                cursor: "pointer", transition: "all 0.15s",
                background: viewMode === "tree" ? CB.navy : "transparent",
                color: viewMode === "tree" ? CB.white : CB.textMid,
              }}>Tree</button>
              <button onClick={() => setViewMode("flat")} style={{
                padding: "6px 14px", borderRadius: 7, border: "none", fontSize: 12, fontWeight: 700, fontFamily: "inherit",
                cursor: "pointer", transition: "all 0.15s",
                background: viewMode === "flat" ? CB.navy : "transparent",
                color: viewMode === "flat" ? CB.white : CB.textMid,
              }}>Flat</button>
            </div>
          </div>

          {/* Render: tree OR flat */}
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : filteredNotes.length === 0 ? (
            <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>
              {notes.length === 0 ? "No service notes yet — create your first one" : "No notes match the current filters"}
            </div>
          ) : viewMode === "flat" ? (
            <DataTable columns={columns} data={filteredNotes} loading={false} emptyMessage="No notes" onRowClick={openDetail} />
          ) : (() => {
            const years = Object.keys(notesTree).sort().reverse();
            return (
              <div>
                {years.map((y, yi) => (
                  <CollapsibleTimeGroup key={y} label={y} count={notesTree[y].total} defaultOpen={yi === 0} accentColor={CB.navy}>
                    {Object.keys(notesTree[y].months).sort().reverse().map((m, mi) => (
                      <CollapsibleTimeGroup key={m} label={notesTree[y].months[m].label} count={notesTree[y].months[m].total} defaultOpen={yi === 0 && mi === 0} accentColor={CB.blue}>
                        {Object.keys(notesTree[y].months[m].days).sort().reverse().map((day, di) => (
                          <CollapsibleTimeGroup key={day} label={notesTree[y].months[m].days[day].label} count={notesTree[y].months[m].days[day].notes.length} defaultOpen={yi === 0 && mi === 0 && di < 3} accentColor={CB.teal}>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              {notesTree[y].months[m].days[day].notes.map(n => (
                                <div key={n.id} onClick={() => openDetail(n)} style={{
                                  padding: "10px 14px", borderRadius: 10, background: CB.cream,
                                  border: `1px solid ${CB.border}`, cursor: "pointer",
                                  display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap",
                                  transition: "all 0.15s",
                                }}
                                  onMouseEnter={e => { e.currentTarget.style.borderColor = `${CB.teal}60`; e.currentTarget.style.background = CB.white; }}
                                  onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.background = CB.cream; }}
                                >
                                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                                    {n.service_code_definitions?.code && <Badge text={n.service_code_definitions.code} color={CB.blue} />}
                                    <span style={{ fontSize: 13, fontWeight: 600, color: CB.text }}>
                                      {n.persons ? `${n.persons.first_name} ${n.persons.last_name}` : "—"}
                                    </span>
                                    <span style={{ fontSize: 12, color: CB.textMid }}>
                                      {n.staff ? `${n.staff.first_name} ${n.staff.last_name}` : "—"}
                                      {n.co_staff && n.co_staff.length > 0 && (
                                        <span style={{ marginLeft: 4, fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 8, background: `${CB.teal}12`, color: CB.teal }}>+{n.co_staff.length}</span>
                                      )}
                                    </span>
                                    {n.start_time && n.end_time && (
                                      <span style={{ fontSize: 11, color: CB.textLight }}>{n.start_time.slice(0,5)}–{n.end_time.slice(0,5)}</span>
                                    )}
                                    {n.duration_minutes && <span style={{ fontSize: 11, color: CB.textLight }}>{n.duration_minutes}min</span>}
                                  </div>
                                  <Badge text={n.status || "draft"} color={statusColors[n.status] || CB.textLight} />
                                </div>
                              ))}
                            </div>
                          </CollapsibleTimeGroup>
                        ))}
                      </CollapsibleTimeGroup>
                    ))}
                  </CollapsibleTimeGroup>
                ))}
              </div>
            );
          })()}

          <ServiceNoteForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadNotes} />

          {/* Note Detail / Edit Modal */}
          <Modal open={!!viewing} onClose={() => setViewing(null)} title={editing ? "Edit Service Note" : "Service Note Detail"} width={760}
            subtitle={viewing ? `${viewing.persons?.first_name || ""} ${viewing.persons?.last_name || ""} — ${viewing.service_date || ""}` : ""}>
            {viewing && (
              <div>
                {/* Status bar with actions */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, padding: "12px 16px", borderRadius: 12, background: CB.cream, border: `1px solid ${CB.border}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {editing ? (
                      <select style={{ ...fieldStyle, padding: "6px 10px", fontSize: 12, fontWeight: 700, width: "auto", minWidth: 180, background: CB.white }}
                        value={editForm.service_code_id} onChange={e => setEditForm(p => ({ ...p, service_code_id: e.target.value }))}>
                        {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                      </select>
                    ) : (
                      <Badge text={viewing.service_code_definitions?.code || "?"} color={CB.blue} />
                    )}
                    <Badge text={editForm.status || viewing.status || "draft"} color={statusColors[editForm.status || viewing.status] || CB.textLight} />
                    <span style={{ fontSize: 13, color: CB.textMid }}>
                      by {viewing.staff?.first_name} {viewing.staff?.last_name}
                      {viewing.co_staff && viewing.co_staff.length > 0 && (
                        <> & {viewing.co_staff.map(s => `${s.first_name} ${s.last_name}`).join(", ")}</>
                      )}
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {!editing && statusFlow[viewing.status] && perms.viewCompliance && (
                      <button onClick={() => updateStatus(viewing.id, statusFlow[viewing.status])} style={{
                        padding: "6px 12px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
                        background: CB.green, color: CB.white, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.checkCircle({ size: 13, color: CB.white })} {viewing.status === "draft" ? "Submit" : "Approve"}</button>
                    )}
                    {!editing && viewing.status !== "approved" && (
                      <button onClick={() => { setEditing(true); }} style={{
                        padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, fontSize: 12, fontWeight: 700,
                        background: CB.white, color: CB.textMid, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.edit({ size: 13 })} Edit</button>
                    )}
                    {!editing && viewing.status === "submitted" && perms.viewCompliance && (
                      <button onClick={() => updateStatus(viewing.id, "rejected")} style={{
                        padding: "6px 12px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
                        background: `${CB.red}12`, color: CB.red, cursor: "pointer", fontFamily: "inherit",
                      }}>{icons.x({ size: 13, color: CB.red })} Reject</button>
                    )}
                  </div>
                </div>

                {/* Time and billing info */}
                <RGrid cols={3} gap={12} style={{ marginBottom: 20 }}>
                  {editing ? (
                    <>
                      <FormField label="Start Time" half style={{ marginBottom: 0 }}>
                        <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="time" value={editForm.start_time} onChange={e => setEditForm(p => ({ ...p, start_time: e.target.value }))} />
                      </FormField>
                      <FormField label="End Time" half style={{ marginBottom: 0 }}>
                        <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="time" value={editForm.end_time} onChange={e => setEditForm(p => ({ ...p, end_time: e.target.value }))} />
                      </FormField>
                      <FormField label="Status" half style={{ marginBottom: 0 }}>
                        <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={editForm.status} onChange={e => setEditForm(p => ({ ...p, status: e.target.value }))}>
                          {["draft", "submitted", "approved", "rejected"].map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </FormField>
                    </>
                  ) : (
                    <>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Time</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {viewing.start_time && viewing.end_time ? `${viewing.start_time.slice(0,5)} – ${viewing.end_time.slice(0,5)}` : "Not recorded"}
                        </div>
                      </div>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Duration</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {viewing.duration_minutes ? `${Math.floor(viewing.duration_minutes/60)}h ${viewing.duration_minutes%60}m` : "—"}
                        </div>
                      </div>
                      <div style={{ padding: 12, background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}` }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 4 }}>Billable</div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>
                          {getBillingLabel(viewing.service_code_definitions?.code, viewing.duration_minutes)}
                        </div>
                      </div>
                    </>
                  )}
                </RGrid>

                {/* Note content */}
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 8 }}>Service Note</div>
                  {editing ? (
                    <textarea style={{ ...fieldStyle, minHeight: 200, resize: "vertical", lineHeight: 1.7 }}
                      value={editForm.summary_note}
                      onChange={e => setEditForm(p => ({ ...p, summary_note: e.target.value }))}
                    />
                  ) : (
                    <div style={{
                      padding: "16px 20px", borderRadius: 12, background: CB.cream, border: `1px solid ${CB.border}`,
                      fontSize: 14, color: CB.text, lineHeight: 1.8, whiteSpace: "pre-wrap",
                      minHeight: 120, maxHeight: 400, overflowY: "auto",
                    }}>
                      {viewing.summary_note || "No notes recorded"}
                    </div>
                  )}
                </div>

                {/* Edit actions */}
                {editing && (
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
                    <SecondaryButton onClick={() => setEditing(false)}>Cancel</SecondaryButton>
                    <PrimaryButton onClick={saveEdit} loading={saving}>{icons.save({ size: 16 })} Save Changes</PrimaryButton>
                  </div>
                )}
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE — SERVICE DELIVERY CONTEXTS (v19.1)
    // "How services are actually delivered" — groups of clients receiving
    // a service at a location. A context is the scheduling unit that a
    // shift covers. Three types:
    //   residential — clients who LIVE at a location (RHS, HHS, PPS)
    //   day         — clients who attend a group program (DSG, SLN)
    //   individual  — single-client services (PBA, PM2, BC1-3, TFB, etc.)
    //
    // ─────────────────────────────────────────────────────────────────
    // v19.2 MIGRATION SQL — wires contexts into shifts, EVV, and notes.
    // Run in Supabase SQL editor. All writes have graceful fallbacks
    // if these columns aren't present, so the app keeps working pre-migration.
    //
    //   ALTER TABLE shifts        ADD COLUMN IF NOT EXISTS context_id UUID
    //     REFERENCES service_delivery_contexts(id) ON DELETE SET NULL;
    //   ALTER TABLE evv_sessions  ADD COLUMN IF NOT EXISTS context_id UUID
    //     REFERENCES service_delivery_contexts(id) ON DELETE SET NULL;
    //   ALTER TABLE service_notes ADD COLUMN IF NOT EXISTS context_id UUID
    //     REFERENCES service_delivery_contexts(id) ON DELETE SET NULL;
    //   CREATE INDEX IF NOT EXISTS idx_shifts_context ON shifts(context_id);
    //   CREATE INDEX IF NOT EXISTS idx_evv_context    ON evv_sessions(context_id);
    //   CREATE INDEX IF NOT EXISTS idx_notes_context  ON service_notes(context_id);
    // ═══════════════════════════════════════════════════════════════

    // Map service codes → delivery type default (used when auto-detecting
    // on context creation). User can override.
    const SERVICE_CODE_DELIVERY_TYPE = {
      RHS: "residential", HHS: "residential", PPS: "residential",
      DSG: "day", DSP: "day", DSI: "individual", SLN: "day", EPR: "day",
      MTP: "day", PAC: "day", COM: "day", ELS: "day",
      PBA: "individual", PM1: "individual", PM2: "individual",
      PN1: "individual", PN2: "individual",
      BC1: "individual", BC2: "individual", BC3: "individual",
      TFB: "individual", HSQ: "individual",
      RP2: "individual", RP3: "individual", RP4: "individual",
    };

    const DELIVERY_TYPE_META = {
      residential: { label: "Residential",   color: "#00897B", description: "Clients live here. RHS, HHS, PPS." },
      day:         { label: "Day / Group",   color: "#1A73E8", description: "Multiple clients receive service together. DSG, SLN, etc." },
      individual:  { label: "Individual",    color: "#F57F17", description: "Single-client service. PBA, PM2, BC, etc." },
    };

    function ServiceContextForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [orgUnits, setOrgUnits] = useState([]);
      const [form, setForm] = useState({
        name: "", service_code_id: "", org_unit_id: "",
        delivery_type: "residential", is_active: true,
      });

      useEffect(() => {
        if (!open) return;
        Promise.all([
          supabase.from("service_code_definitions").select("id, code, name").order("code"),
          supabase.from("org_units").select("id, name, unit_type").order("name"),
        ]).then(([sc, ou]) => {
          setServiceCodes(sc.data || []);
          setOrgUnits(ou.data || []);
        });
        if (editing) {
          setForm({
            name: editing.name || "",
            service_code_id: editing.service_code_id || "",
            org_unit_id: editing.org_unit_id || "",
            delivery_type: editing.delivery_type || "residential",
            is_active: editing.is_active !== false,
          });
        } else {
          setForm({ name: "", service_code_id: "", org_unit_id: "", delivery_type: "residential", is_active: true });
        }
      }, [open, editing]);

      // When service code changes, auto-suggest delivery type + help name the context
      const handleCodeChange = (scId) => {
        const sc = serviceCodes.find(x => x.id === scId);
        const suggestedType = sc && SERVICE_CODE_DELIVERY_TYPE[sc.code] ? SERVICE_CODE_DELIVERY_TYPE[sc.code] : form.delivery_type;
        setForm(p => ({ ...p, service_code_id: scId, delivery_type: suggestedType }));
        // If name is blank, try to suggest one
        if (!form.name && sc) {
          const unit = orgUnits.find(u => u.id === form.org_unit_id);
          const suggested = unit ? `${unit.name} — ${sc.name}` : sc.name;
          setForm(p => ({ ...p, service_code_id: scId, delivery_type: suggestedType, name: suggested }));
        }
      };

      const handleUnitChange = (unitId) => {
        const unit = orgUnits.find(u => u.id === unitId);
        const sc = serviceCodes.find(x => x.id === form.service_code_id);
        setForm(p => ({ ...p, org_unit_id: unitId }));
        if (!form.name && unit && sc) {
          setForm(p => ({ ...p, org_unit_id: unitId, name: `${unit.name} — ${sc.name}` }));
        }
      };

      const handleSave = async () => {
        if (!form.name.trim()) return addToast("Name is required", "error");
        if (!form.service_code_id) return addToast("Service code is required", "error");
        setSaving(true);
        const payload = {
          org_id: orgId,
          name: form.name.trim(),
          service_code_id: form.service_code_id,
          org_unit_id: form.org_unit_id || null,
          delivery_type: form.delivery_type,
          is_active: form.is_active,
        };
        Object.keys(payload).forEach(k => { if (payload[k] === null) delete payload[k]; });

        let result;
        if (editing) {
          result = await supabase.from("service_delivery_contexts").update(payload).eq("id", editing.id);
        } else {
          result = await supabase.from("service_delivery_contexts").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          if (/relation .*service_delivery_contexts.* does not exist/i.test(result.error.message || "")) {
            addToast("Contexts table not found — run v19.1 migration SQL first", "error");
          } else {
            addToast(result.error.message, "error");
          }
          return;
        }
        addToast(editing ? "Context updated" : "Context created", "success");
        onSaved();
        onClose();
      };

      const handleDelete = async () => {
        if (!editing) return;
        if (!window.confirm("Delete this context? Members will be unlinked. This cannot be undone.")) return;
        setDeleting(true);
        const { error } = await supabase.from("service_delivery_contexts").delete().eq("id", editing.id);
        setDeleting(false);
        if (error) return addToast(error.message, "error");
        addToast("Context deleted", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Service Context" : "New Service Context"} subtitle="Define a scheduling unit — a service being delivered to one or more clients" width={640}>
          <FormField label="Name" required>
            <input style={fieldStyle} value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} placeholder="e.g. West Jordan — Residential Habilitation Supports" />
          </FormField>

          <FormRow>
            <FormField label="Service Code" required half>
              <select style={fieldStyle} value={form.service_code_id} onChange={e => handleCodeChange(e.target.value)}>
                <option value="">Select service...</option>
                {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
              </select>
            </FormField>
            <FormField label="Delivery Type" half>
              <select style={fieldStyle} value={form.delivery_type} onChange={e => setForm(p => ({ ...p, delivery_type: e.target.value }))}>
                {Object.entries(DELIVERY_TYPE_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight }}>{DELIVERY_TYPE_META[form.delivery_type]?.description}</div>
            </FormField>
          </FormRow>

          <FormField label="Location (Org Unit)">
            <select style={fieldStyle} value={form.org_unit_id} onChange={e => handleUnitChange(e.target.value)}>
              <option value="">No fixed location (community-based)</option>
              {orgUnits.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
            </select>
            <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight }}>
              Required for residential. Optional for day programs. Usually blank for individual services delivered in the community.
            </div>
          </FormField>

          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.textLight) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(148,163,184,0.08)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.textLight) : CB.textMid,
                  }}>
                    <input type="radio" name="ctx_status" checked={form.is_active === val} onChange={() => setForm(p => ({ ...p, is_active: val }))} style={{ display: "none" }} />
                    {val ? "Active" : "Archived"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, marginTop: 8, flexWrap: "wrap" }}>
            {editing ? (
              <button onClick={handleDelete} disabled={deleting} style={{
                padding: "10px 18px", borderRadius: 10, border: `1px solid ${CB.red}30`, background: `${CB.red}08`,
                color: CB.red, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: deleting ? 0.6 : 1,
              }}>{icons.trash({ size: 14 })} Delete</button>
            ) : <span />}
            <div style={{ display: "flex", gap: 12 }}>
              <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Create"}</PrimaryButton>
            </div>
          </div>
        </Modal>
      );
    }

    function MembersModal({ open, onClose, context, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [members, setMembers] = useState([]);
      const [allClients, setAllClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [addClient, setAddClient] = useState("");
      const [addStartDate, setAddStartDate] = useState(fmtISODate(new Date()));

      const load = async () => {
        if (!context) return;
        setLoading(true);
        const [memRes, cliRes] = await Promise.all([
          supabase.from("service_delivery_context_members")
            .select("id, person_id, start_date, end_date, is_active, persons(first_name, last_name, date_of_birth)")
            .eq("context_id", context.id)
            .order("start_date", { ascending: false }),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
        ]);
        setMembers(memRes.data || []);
        setAllClients(cliRes.data || []);
        setLoading(false);
      };

      useEffect(() => { if (open) load(); }, [open, context]);

      const currentMemberIds = new Set(members.filter(m => m.is_active !== false && !m.end_date).map(m => m.person_id));
      const addable = allClients.filter(c => !currentMemberIds.has(c.id));

      const handleAdd = async () => {
        if (!addClient) return addToast("Select a client to add", "error");
        setSaving(true);
        const { error } = await supabase.from("service_delivery_context_members").insert({
          org_id: orgId,
          context_id: context.id,
          person_id: addClient,
          start_date: addStartDate,
          is_active: true,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Client added to context", "success");
        setAddClient("");
        load();
        onSaved && onSaved();
      };

      const handleEndMembership = async (memberId) => {
        const end = window.prompt("End date (YYYY-MM-DD):", fmtISODate(new Date()));
        if (!end) return;
        const { error } = await supabase.from("service_delivery_context_members")
          .update({ end_date: end, is_active: false }).eq("id", memberId);
        if (error) return addToast(error.message, "error");
        addToast("Membership ended", "success");
        load();
        onSaved && onSaved();
      };

      const handleRemove = async (memberId) => {
        if (!window.confirm("Permanently remove this membership record? Use 'End Membership' instead if you want to keep the history.")) return;
        const { error } = await supabase.from("service_delivery_context_members").delete().eq("id", memberId);
        if (error) return addToast(error.message, "error");
        addToast("Membership removed", "success");
        load();
        onSaved && onSaved();
      };

      if (!context) return null;
      const activeMembers = members.filter(m => m.is_active !== false && !m.end_date);
      const historical = members.filter(m => m.is_active === false || m.end_date);

      return (
        <Modal open={open} onClose={onClose} title={context.name} subtitle={`Members · ${DELIVERY_TYPE_META[context.delivery_type]?.label || context.delivery_type}`} width={680}>
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 40 }}><Spinner size={24} /></div>
          ) : (
            <>
              {/* Add member */}
              <div style={{ padding: "14px 16px", background: CB.cream, border: `1px solid ${CB.border}`, borderRadius: 12, marginBottom: 20 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 10 }}>Add Client to Context</div>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div style={{ flex: "2 1 200px" }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Client</label>
                    <select style={{ ...fieldStyle, padding: "8px 12px", fontSize: 13 }} value={addClient} onChange={e => setAddClient(e.target.value)}>
                      <option value="">Select client...</option>
                      {addable.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: "1 1 140px" }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Start Date</label>
                    <input type="date" style={{ ...fieldStyle, padding: "8px 12px", fontSize: 13 }} value={addStartDate} onChange={e => setAddStartDate(e.target.value)} />
                  </div>
                  <PrimaryButton onClick={handleAdd} loading={saving}>{icons.plus({ size: 14 })} Add</PrimaryButton>
                </div>
                {addable.length === 0 && <div style={{ marginTop: 8, fontSize: 12, color: CB.textLight, fontStyle: "italic" }}>All active clients are already members.</div>}
              </div>

              {/* Active members */}
              <h3 style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 10 }}>Current Members ({activeMembers.length})</h3>
              {activeMembers.length === 0 ? (
                <div style={{ padding: 20, textAlign: "center", color: CB.textLight, fontSize: 13, background: CB.white, borderRadius: 10, border: `1px solid ${CB.border}`, marginBottom: 20 }}>
                  No active members yet. Add clients above.
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 20 }}>
                  {activeMembers.map(m => (
                    <div key={m.id} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                      padding: "10px 14px", borderRadius: 10, background: CB.white, border: `1px solid ${CB.border}`,
                    }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: CB.navy }}>
                          {m.persons ? `${m.persons.first_name} ${m.persons.last_name}` : "(Unknown)"}
                        </div>
                        <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>
                          Since {m.start_date ? new Date(m.start_date + "T00:00:00").toLocaleDateString() : "—"}
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => handleEndMembership(m.id)} title="End membership (keeps history)" style={{
                          padding: "5px 10px", borderRadius: 6, border: `1px solid ${CB.amber}40`, background: `${CB.amber}08`,
                          color: CB.amber, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                        }}>End</button>
                        <button onClick={() => handleRemove(m.id)} title="Permanently delete record" style={{
                          padding: "5px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.red, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                        }}>{icons.trash({ size: 12 })}</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Historical */}
              {historical.length > 0 && (
                <>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: CB.textMid, marginBottom: 10 }}>Past Members ({historical.length})</h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {historical.map(m => (
                      <div key={m.id} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                        padding: "10px 14px", borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}`, opacity: 0.75,
                      }}>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: CB.textMid }}>
                            {m.persons ? `${m.persons.first_name} ${m.persons.last_name}` : "(Unknown)"}
                          </div>
                          <div style={{ fontSize: 11, color: CB.textLight, marginTop: 2 }}>
                            {m.start_date ? new Date(m.start_date + "T00:00:00").toLocaleDateString() : "?"} → {m.end_date ? new Date(m.end_date + "T00:00:00").toLocaleDateString() : "Archived"}
                          </div>
                        </div>
                        <button onClick={() => handleRemove(m.id)} style={{
                          padding: "5px 8px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                          color: CB.red, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                        }}>{icons.trash({ size: 12 })}</button>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 18 }}>
            <SecondaryButton onClick={onClose}>Done</SecondaryButton>
          </div>
        </Modal>
      );
    }

            <div style={{ padding: 60, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>
              <div style={{ marginBottom: 14 }}>{icons.dashboard({ size: 40, color: CB.textLight })}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: CB.navy, marginBottom: 8 }}>No service contexts defined yet.</p>
              <p style={{ fontSize: 13, color: CB.textMid, marginBottom: 14 }}>
                Contexts represent how you actually deliver services — a house, a day program, or an individual client's care plan.
              </p>
              <PrimaryButton onClick={openNew}>{icons.plus({ size: 14 })} Create First Context</PrimaryButton>
            </div>
          ) : (
            <div>
              {typeOrder.map(type => {
                const list = byType[type];
                if (!list || list.length === 0) return null;
                const meta = DELIVERY_TYPE_META[type] || { label: "Other", color: CB.textLight, description: "" };
                return (
                  <CollapsibleTimeGroup key={type} label={meta.label} count={list.length} defaultOpen={true} accentColor={meta.color}>
                    {meta.description && <div style={{ fontSize: 12, color: CB.textLight, fontStyle: "italic", marginBottom: 10 }}>{meta.description}</div>}
                    <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill, minmax(280px, 1fr))", gap: 10 }}>
                      {list.map(ctx => {
                        const count = memberCounts[ctx.id] || 0;
                        const isArchived = ctx.is_active === false;
                        return (
                          <div key={ctx.id} style={{
                            padding: "14px 16px", borderRadius: 12,
                            background: CB.white, border: `1px solid ${CB.border}`,
                            borderLeft: `4px solid ${meta.color}`,
                            opacity: isArchived ? 0.6 : 1,
                            transition: "all 0.15s", cursor: "default",
                          }}
                            onMouseEnter={e => { e.currentTarget.style.boxShadow = CB.cardShadow; e.currentTarget.style.transform = "translateY(-1px)"; }}
                            onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "translateY(0)"; }}
                          >
                            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, marginBottom: 8 }}>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy, marginBottom: 2 }}>{ctx.name}</div>
                                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                                  {ctx.service_code_definitions?.code && <Badge text={ctx.service_code_definitions.code} color={CB.blue} />}
                                  {isArchived && <Badge text="Archived" color={CB.textLight} />}
                                </div>
                                {ctx.org_units?.name && (
                                  <div style={{ fontSize: 11, color: CB.textLight, marginTop: 6, display: "flex", alignItems: "center", gap: 4 }}>
                                    {icons.mapPin({ size: 10, color: CB.textLight })} {ctx.org_units.name}
                                  </div>
                                )}
                              </div>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12, paddingTop: 10, borderTop: `1px solid ${CB.border}` }}>
                              <button onClick={() => setManagingMembers(ctx)} style={{
                                padding: "6px 12px", borderRadius: 8, border: `1px solid ${meta.color}30`, background: `${meta.color}08`,
                                color: meta.color, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                                display: "flex", alignItems: "center", gap: 6,
                              }}>
                                {icons.users({ size: 12 })}
                                {count} {count === 1 ? "member" : "members"}
                              </button>
                              <button onClick={() => openEdit(ctx)} style={{
                                padding: "5px 10px", borderRadius: 6, border: `1px solid ${CB.border}`, background: CB.white,
                                color: CB.textMid, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                              }}>{icons.edit({ size: 11 })} Edit</button>
