<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provly — DSPD Compliance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Outfit', 'Manrope', sans-serif; background: #FAFBFD; }
    ::selection { background: #00897B; color: white; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #00897B; outline-offset: -1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes successPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════
    // DESIGN TOKENS — matched exactly to landing page
    // ═══════════════════════════════════════════════════════════════
    const CB = {
      navy: "#0A1E33", navyLight: "#0F2B46", blue: "#1A73E8", blueLight: "#4A9AF5",
      teal: "#00897B", tealLight: "#26A69A", tealDark: "#00695C",
      cream: "#FAFBFD", warm: "#F8F6F3", white: "#FFFFFF",
      text: "#1A1A2E", textMid: "#4A5568", textLight: "#94A3B8",
      red: "#E53935", green: "#2E7D32", amber: "#F57F17",
      border: "#E2E8F0",
      cardShadow: "0 1px 3px rgba(10,30,51,0.08), 0 8px 32px rgba(10,30,51,0.06)",
      sidebarW: 260,
    };

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE CLIENT
    // ═══════════════════════════════════════════════════════════════
    const supabase = window.supabase.createClient(
      'https://zsrnqbmzgypldraifjho.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzcm5xYm16Z3lwbGRyYWlmamhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTc0NjcsImV4cCI6MjA4OTEzMzQ2N30.-vI3ZvtGKFyoZplqpTt4IxriWEnIPg-PH8eIing93bY'
    );

    // ═══════════════════════════════════════════════════════════════
    // AUTH CONTEXT
    // ═══════════════════════════════════════════════════════════════
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [orgId, setOrgId] = useState(null);

      const fetchOrgId = async () => {
        const { data, error } = await supabase.rpc('org_id');
        if (!error && data) setOrgId(data);
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) fetchOrgId();
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) fetchOrgId();
          else setOrgId(null);
        });
        return () => subscription.unsubscribe();
      }, []);

      const signIn = (email, password) => supabase.auth.signInWithPassword({ email, password });
      const signOut = () => supabase.auth.signOut();

      return (
        <AuthContext.Provider value={{ user, session, loading, signIn, signOut, orgId }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    // ═══════════════════════════════════════════════════════════════
    // TOAST CONTEXT — global notifications
    // ═══════════════════════════════════════════════════════════════
    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type = "success") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8 }}>
            {toasts.map(t => (
              <div key={t.id} style={{
                background: t.type === "error" ? CB.red : t.type === "warning" ? CB.amber : CB.green,
                color: CB.white, padding: "12px 20px", borderRadius: 12, fontSize: 14, fontWeight: 600,
                boxShadow: "0 8px 32px rgba(0,0,0,0.18)", animation: "successPop 0.3s ease",
                display: "flex", alignItems: "center", gap: 8, maxWidth: 360,
              }}>
                {t.type === "error" ? icons.alertTriangle({ size: 16, color: CB.white }) :
                 t.type === "warning" ? icons.clock({ size: 16, color: CB.white }) :
                 icons.checkCircle({ size: 16, color: CB.white })}
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() { return useContext(ToastContext); }

    // ═══════════════════════════════════════════════════════════════
    // SVG ICONS — consistent with landing page
    // ═══════════════════════════════════════════════════════════════
    const Icon = ({ d, size = 20, color = "currentColor", style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
        {typeof d === "string" ? <path d={d} /> : d}
      </svg>
    );

    const icons = {
      shield: (p={}) => <Icon {...p} d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />,
      dashboard: (p={}) => <Icon {...p} d={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>} />,
      users: (p={}) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      heart: (p={}) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />,
      fileText: (p={}) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />,
      checkCircle: (p={}) => <Icon {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
      alertTriangle: (p={}) => <Icon {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
      barChart: (p={}) => <Icon {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />,
      calendar: (p={}) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      zap: (p={}) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,
      lock: (p={}) => <Icon {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
      logout: (p={}) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      clock: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
      book: (p={}) => <Icon {...p} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>} />,
      search: (p={}) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
      chevDown: (p={}) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      mail: (p={}) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      mapPin: (p={}) => <Icon {...p} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />,
      arrowRight: (p={}) => <Icon {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
      plus: (p={}) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      refresh: (p={}) => <Icon {...p} d={<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>} />,
      x: (p={}) => <Icon {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
      edit: (p={}) => <Icon {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />,
      trash: (p={}) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,
      play: (p={}) => <Icon {...p} d={<polygon points="5 3 19 12 5 21 5 3"/>} />,
      stop: (p={}) => <Icon {...p} d={<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>} />,
      save: (p={}) => <Icon {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />,
      eye: (p={}) => <Icon {...p} d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
      crosshair: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></>} />,
    };

    // ═══════════════════════════════════════════════════════════════
    // SPINNER
    // ═══════════════════════════════════════════════════════════════
    function Spinner({ size = 20, color = CB.teal }) {
      return (
        <div style={{ width: size, height: size, border: `2.5px solid ${CB.border}`, borderTopColor: color, borderRadius: "50%", animation: "spin 0.6s linear infinite" }} />
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODAL COMPONENT — reusable overlay
    // ═══════════════════════════════════════════════════════════════
    function Modal({ open, onClose, title, subtitle, width = 520, children }) {
      if (!open) return null;
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(10,30,51,0.45)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 24, animation: "overlayIn 0.2s ease",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            width: "100%", maxWidth: width, maxHeight: "90vh",
            background: CB.white, borderRadius: 20, boxShadow: "0 24px 80px rgba(10,30,51,0.2)",
            animation: "modalIn 0.25s ease", display: "flex", flexDirection: "column",
          }}>
            {/* Header */}
            <div style={{
              padding: "22px 28px 18px", borderBottom: `1px solid ${CB.border}`,
              display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            }}>
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: CB.navy, letterSpacing: -0.5 }}>{title}</h2>
                {subtitle && <p style={{ fontSize: 13, color: CB.textMid, marginTop: 2 }}>{subtitle}</p>}
              </div>
              <button onClick={onClose} style={{
                width: 32, height: 32, borderRadius: 8, border: "none",
                background: CB.cream, cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center", transition: "all 0.15s",
              }}
                onMouseEnter={e => e.currentTarget.style.background = "#E2E8F0"}
                onMouseLeave={e => e.currentTarget.style.background = CB.cream}
              >
                {icons.x({ size: 16, color: CB.textMid })}
              </button>
            </div>
            {/* Body */}
            <div style={{ padding: "24px 28px 28px", overflowY: "auto", flex: 1 }}>
              {children}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // FORM FIELD COMPONENT
    // ═══════════════════════════════════════════════════════════════
    const fieldStyle = {
      width: "100%", padding: "11px 14px", borderRadius: 10,
      border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit",
      color: CB.text, background: CB.cream, transition: "border 0.2s",
    };

    function FormField({ label, required, children, half, style: wrapStyle }) {
      return (
        <div style={{ marginBottom: 16, width: half ? "calc(50% - 8px)" : "100%", ...wrapStyle }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: CB.text, marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5 }}>
            {label}{required && <span style={{ color: CB.red, marginLeft: 2 }}>*</span>}
          </label>
          {children}
        </div>
      );
    }

    function FormRow({ children }) {
      return <div style={{ display: "flex", gap: 16 }}>{children}</div>;
    }

    function PrimaryButton({ onClick, loading: btnLoading, children, disabled, fullWidth, color = CB.teal }) {
      return (
        <button onClick={onClick} disabled={disabled || btnLoading} style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
          padding: "12px 24px", borderRadius: 12, border: "none",
          background: disabled ? CB.textLight : `linear-gradient(135deg, ${color}, ${color}DD)`,
          color: CB.white, fontSize: 14, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: "inherit", boxShadow: `0 4px 16px ${color}40`,
          transition: "all 0.2s", width: fullWidth ? "100%" : "auto", opacity: disabled ? 0.6 : 1,
        }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.transform = "translateY(-1px)"; }}
          onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
        >
          {btnLoading ? <Spinner size={16} color={CB.white} /> : children}
        </button>
      );
    }

    function SecondaryButton({ onClick, children, color = CB.textMid }) {
      return (
        <button onClick={onClick} style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
          padding: "12px 24px", borderRadius: 12, border: `1px solid ${CB.border}`,
          background: CB.white, color, fontSize: 14, fontWeight: 600, cursor: "pointer",
          fontFamily: "inherit", transition: "all 0.15s",
        }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = color; }}
        >
          {children}
        </button>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN PAGE
    // ═══════════════════════════════════════════════════════════════
    function LoginPage() {
      const { signIn } = useAuth();
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setError("");
        setLoading(true);
        const { error: err } = await signIn(email, password);
        if (err) setError(err.message);
        setLoading(false);
      };

      return (
        <div style={{
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          background: `radial-gradient(ellipse at 30% 20%, rgba(0,137,123,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(26,115,232,0.04) 0%, transparent 50%), ${CB.cream}`,
          padding: 24,
        }}>
          <div style={{ position: "fixed", top: "15%", right: "10%", width: 350, height: 350, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,137,123,0.05) 0%, transparent 70%)", pointerEvents: "none" }} />
          <div style={{ position: "fixed", bottom: "10%", left: "10%", width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(26,115,232,0.04) 0%, transparent 70%)", pointerEvents: "none" }} />

          <div style={{ width: "100%", maxWidth: 420, animation: "fadeIn 0.5s ease" }}>
            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{
                width: 56, height: 56, borderRadius: 16,
                background: `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                marginBottom: 16, boxShadow: "0 4px 16px rgba(10,30,51,0.25)",
              }}>
                {icons.shield({ size: 28, color: CB.white })}
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1 }}>Provly</h1>
              <p style={{ fontSize: 14, color: CB.textLight, marginTop: 4, fontWeight: 500 }}>DSPD Compliance Platform</p>
            </div>

            <div style={{
              background: CB.white, borderRadius: 20, padding: "36px 32px",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>Welcome back</h2>
              <p style={{ fontSize: 14, color: CB.textMid, marginBottom: 28 }}>Sign in to your account</p>

              {error && (
                <div style={{
                  background: "rgba(229,57,53,0.08)", border: "1px solid rgba(229,57,53,0.2)",
                  borderRadius: 12, padding: "12px 16px", marginBottom: 20,
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  {icons.alertTriangle({ size: 16, color: CB.red })}
                  <span style={{ fontSize: 14, color: CB.red, fontWeight: 500 }}>{error}</span>
                </div>
              )}

              <div style={{ marginBottom: 18 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@provider.org" onKeyDown={e => e.key === "Enter" && handleSubmit(e)}
                  style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: `1px solid ${CB.border}`, fontSize: 15, fontFamily: "inherit", color: CB.text, background: CB.cream }} />
              </div>
              <div style={{ marginBottom: 28 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleSubmit(e)}

    // SHARED COMPONENTS — StatCard, DataTable, Badge, PageHeader
    // ═══════════════════════════════════════════════════════════════
    function StatCard({ label, value, icon, color = CB.teal, trend, delay = 0 }) {
      return (
        <div style={{
          background: CB.white, borderRadius: 16, padding: "24px 22px",
          border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          animation: `fadeIn 0.5s ease ${delay}s both`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: `${color}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {icon({ size: 20, color })}
            </div>
            {trend && (
              <span style={{ fontSize: 12, fontWeight: 700, color: trend > 0 ? CB.green : CB.red, background: trend > 0 ? "rgba(46,125,50,0.08)" : "rgba(229,57,53,0.08)", padding: "3px 8px", borderRadius: 6 }}>
                {trend > 0 ? "+" : ""}{trend}%
              </span>
            )}
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1, lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 13, color: CB.textLight, marginTop: 6, fontWeight: 500 }}>{label}</div>
        </div>
      );
    }

    function DataTable({ columns, data, loading, emptyMessage = "No data found", onRowClick }) {
      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>;
      return (
        <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: CB.cream }}>
                  {columns.map((col, i) => (
                    <th key={i} style={{ padding: "13px 18px", textAlign: "left", fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.8, borderBottom: `1px solid ${CB.border}`, whiteSpace: "nowrap" }}>
                      {col.label}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.length === 0 ? (
                  <tr><td colSpan={columns.length} style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14 }}>{emptyMessage}</td></tr>
                ) : data.map((row, ri) => (
                  <tr key={row.id || ri} style={{ borderBottom: `1px solid ${CB.border}`, cursor: onRowClick ? "pointer" : "default" }}
                    onClick={() => onRowClick && onRowClick(row)}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = CB.white}>
                    {columns.map((col, ci) => (
                      <td key={ci} style={{ padding: "14px 18px", fontSize: 14, color: CB.text, fontWeight: col.bold ? 600 : 400 }}>
                        {col.render ? col.render(row) : row[col.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function Badge({ text, color = CB.teal }) {
      return (
        <span style={{ display: "inline-block", fontSize: 12, fontWeight: 600, color, background: `${color}12`, padding: "3px 10px", borderRadius: 6, whiteSpace: "nowrap" }}>
          {text}
        </span>
      );
    }

    function PageHeader({ title, subtitle, action }) {
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28, animation: "fadeIn 0.4s ease" }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 800, color: CB.navy, letterSpacing: -0.8, lineHeight: 1.2 }}>{title}</h1>
            {subtitle && <p style={{ fontSize: 14, color: CB.textMid, marginTop: 4 }}>{subtitle}</p>}
          </div>
          {action}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 1: STAFF CRUD
    // ═══════════════════════════════════════════════════════════════
    const STAFF_ROLES = [
      { value: "dsp", label: "Direct Support Professional" },
      { value: "compliance_director", label: "Compliance Director" },
      { value: "residential_director", label: "Residential Director" },
      { value: "day_program_director", label: "Day Program Director" },
      { value: "admin", label: "Administrator" },
      { value: "bcba", label: "BCBA" },
      { value: "rn", label: "Registered Nurse" },
    ];

    function StaffForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", email: "", phone: "",
        role: "dsp", hire_date: "", date_of_birth: "", is_active: true,
      });

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "",
            last_name: editing.last_name || "",
            email: editing.email || "",
            phone: editing.phone || "",
            role: editing.role || "dsp",
            hire_date: editing.hire_date || "",
            date_of_birth: editing.date_of_birth || "",
            is_active: editing.is_active !== false,
          });
        } else {
          setForm({ first_name: "", last_name: "", email: "", phone: "", role: "dsp", hire_date: "", date_of_birth: "", is_active: true });
        }
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        if (!form.hire_date) return addToast("Hire date is required", "error");
        if (!form.date_of_birth) return addToast("Date of birth is required", "error");
        setSaving(true);
        const payload = { ...form };
        if (!payload.email) delete payload.email;
        if (!payload.phone) delete payload.phone;

        let result;
        if (editing) {
          result = await supabase.from("staff").update(payload).eq("id", editing.id);
        } else {
          payload.org_id = orgId;
          result = await supabase.from("staff").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          addToast(result.error.message, "error");
        } else {
          addToast(editing ? "Staff member updated" : "Staff member added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Staff Member" : "Add Staff Member"} subtitle="All fields marked * are required">
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Email" half>
              <input style={fieldStyle} type="email" value={form.email} onChange={e => set("email", e.target.value)} placeholder="email@example.com" />
            </FormField>
            <FormField label="Phone" half>
              <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Role" required half>
              <select style={fieldStyle} value={form.role} onChange={e => set("role", e.target.value)}>
                {STAFF_ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
              </select>
            </FormField>
            <FormField label="Date of Birth" required half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Hire Date" required half>
              <input style={fieldStyle} type="date" value={form.hire_date} onChange={e => set("hire_date", e.target.value)} />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                    transition: "all 0.15s",
                  }}>
                    <input type="radio" name="status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? icons.checkCircle({ size: 16, color: form.is_active === val ? CB.green : CB.textLight }) : icons.x({ size: 16, color: form.is_active === val ? CB.red : CB.textLight })}
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Add Staff"}</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function StaffPage() {
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);

      useEffect(() => { loadStaff(); }, []);

      const loadStaff = async () => {
        setLoading(true);
        const { data, error } = await supabase.from("staff").select("id, first_name, last_name, role, hire_date, date_of_birth, is_active, email, phone").order("last_name");
        if (!error) setStaff(data || []);
        setLoading(false);
      };

      const openEdit = (row) => { setEditing(row); setFormOpen(true); };
      const openAdd = () => { setEditing(null); setFormOpen(true); };

      const columns = [
        { label: "Name", bold: true, render: (r) => `${r.first_name} ${r.last_name}` },
        { label: "Role", render: (r) => <Badge text={STAFF_ROLES.find(x => x.value === r.role)?.label || r.role?.replace(/_/g, " ") || "—"} color={CB.navy} /> },
        { label: "Hire Date", render: (r) => r.hire_date ? new Date(r.hire_date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Status", render: (r) => <Badge text={r.is_active ? "Active" : "Inactive"} color={r.is_active ? CB.green : CB.textLight} /> },
        { label: "Email", render: (r) => r.email || "—" },
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openEdit(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.edit({ size: 13 })} Edit</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Staff" subtitle="Manage team members, credentials, and training compliance"
            action={
              <PrimaryButton onClick={openAdd}>{icons.plus({ size: 16 })} Add Staff</PrimaryButton>
            }
          />
          <DataTable columns={columns} data={staff} loading={loading} emptyMessage="No staff members found" />
          <StaffForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadStaff} editing={editing} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 2: CLIENT CRUD + AUTHORIZATION MANAGEMENT
    // ═══════════════════════════════════════════════════════════════
    function ClientForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true,
      });
      const [auths, setAuths] = useState([]);
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: "", end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "", last_name: editing.last_name || "",
            date_of_birth: editing.date_of_birth || "", medicaid_number: editing.medicaid_number || "",
            is_active: editing.is_active !== false,
          });
          setAuths(editing.person_service_authorizations || []);
        } else {
          setForm({ first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true });
          setAuths([]);
        }
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: "", end_date: "", rate_per_unit: "" });
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      // Get the code string for the selected new auth
      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      const addAuth = async () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select a service code and enter units", "error");
        if (!editing) return addToast("Save the client first, then add authorizations", "warning");
        const payload = {
          org_id: orgId,
          person_id: editing.id,
          service_code_id: newAuth.service_code_id,
          authorized_units: parseInt(newAuth.authorized_units),
          used_units: 0,
          start_date: newAuth.start_date || null,
          end_date: newAuth.end_date || null,
        };
        // Try to include rate_per_unit (requires DB column)
        if (newAuth.rate_per_unit) payload.rate_per_unit = parseFloat(newAuth.rate_per_unit);
        const { error } = await supabase.from("person_service_authorizations").insert(payload);
        if (error) {
          // If rate_per_unit column doesn't exist, retry without it
          if (error.message?.includes("rate_per_unit")) {
            delete payload.rate_per_unit;
            const retry = await supabase.from("person_service_authorizations").insert(payload);
            if (retry.error) return addToast(retry.error.message, "error");
            addToast("Authorization added (rate column needs DB setup — see console)", "warning");
            console.warn("Add rate_per_unit column: ALTER TABLE person_service_authorizations ADD COLUMN rate_per_unit NUMERIC(10,2);");
          } else {
            return addToast(error.message, "error");
          }
        } else {
          addToast("Authorization added", "success");
        }
        // Reload auths
        const { data } = await supabase.from("person_service_authorizations").select("id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code)").eq("person_id", editing.id);
        setAuths(data || []);
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: "", end_date: "", rate_per_unit: "" });
      };

      const removeAuth = async (authId) => {
        const { error } = await supabase.from("person_service_authorizations").delete().eq("id", authId);
        if (error) return addToast(error.message, "error");
        setAuths(prev => prev.filter(a => a.id !== authId));
        addToast("Authorization removed", "success");
      };

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        setSaving(true);
        const payload = { ...form };
        if (!payload.date_of_birth) delete payload.date_of_birth;
        if (!payload.medicaid_number) delete payload.medicaid_number;

        let result;
        if (editing) {
          result = await supabase.from("persons").update(payload).eq("id", editing.id);
        } else {
          payload.org_id = orgId;
          result = await supabase.from("persons").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          addToast(result.error.message, "error");
        } else {
          addToast(editing ? "Client updated" : "Client added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Client" : "Add Client"} subtitle="Person management and service authorizations" width={600}>
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Date of Birth" half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
            <FormField label="Medicaid Number" half>
              <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                  }}>
                    <input type="radio" name="client_status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          {/* Authorizations Section */}
          {editing && (
            <div style={{ marginTop: 8, padding: "20px 0 0", borderTop: `1px solid ${CB.border}` }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Service Authorizations</h3>
              {auths.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  {auths.map(a => {
                    const aCode = a.service_code_definitions?.code || serviceCodes.find(sc => sc.id === a.service_code_id)?.code || "?";
                    const aRule = BILLING_RULES[aCode];
                    return (
                    <div key={a.id} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 14px", borderRadius: 10, background: CB.cream, marginBottom: 6,
                      border: `1px solid ${CB.border}`,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <Badge text={aCode} color={CB.blue} />
                        {aRule && <span style={{ fontSize: 11, color: CB.textLight, fontWeight: 600 }}>{aRule.label}</span>}
                        {aRule?.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700, background: `${CB.amber}12`, padding: "1px 6px", borderRadius: 4 }}>WORKSHEET</span>}
                        <span style={{ fontSize: 13, color: CB.text, fontWeight: 600 }}>{a.used_units || 0} / {a.authorized_units} units</span>
                        {a.rate_per_unit && <span style={{ fontSize: 12, color: CB.teal, fontWeight: 700 }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                        {a.end_date && <span style={{ fontSize: 12, color: CB.textLight }}>exp {new Date(a.end_date + "T00:00:00").toLocaleDateString()}</span>}
                      </div>
                      <button onClick={() => removeAuth(a.id)} style={{
                        padding: "4px 8px", borderRadius: 6, border: "none", background: "rgba(229,57,53,0.08)",
                        color: CB.red, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                      }}>{icons.trash({ size: 13, color: CB.red })}</button>
                    </div>
                    );
                  })}
                </div>
              )}
              <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 140px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Service Code</label>
                  <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={newAuth.service_code_id} onChange={e => setNewAuth(p => ({ ...p, service_code_id: e.target.value }))}>
                    <option value="">Select...</option>
                    {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                  </select>
                </div>
                <div style={{ flex: "0 0 80px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Units</label>
                  <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="number" value={newAuth.authorized_units} onChange={e => setNewAuth(p => ({ ...p, authorized_units: e.target.value }))} placeholder="0" />
                </div>
                <div style={{ flex: "0 0 100px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: isWorksheet ? CB.amber : CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>
                    {isWorksheet ? "Rate *" : "Rate"}
                  </label>
                  <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13, borderColor: isWorksheet ? `${CB.amber}40` : CB.border }}
                    type="number" step="0.01" value={newAuth.rate_per_unit}
                    onChange={e => setNewAuth(p => ({ ...p, rate_per_unit: e.target.value }))}
                    placeholder={newAuthRule ? (isWorksheet ? `≤${newAuthRule.max_rate || "?"}` : `$${newAuthRule.rate || "?"}`) : "$0.00"} />
                </div>
                <div style={{ flex: "0 0 130px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>End Date</label>
                  <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="date" value={newAuth.end_date} onChange={e => setNewAuth(p => ({ ...p, end_date: e.target.value }))} />
                </div>
                <button onClick={addAuth} style={{
                  padding: "9px 14px", borderRadius: 10, border: "none",
                  background: CB.teal, color: CB.white, fontSize: 13, fontWeight: 700,
                  cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", marginBottom: 16,
                }}>{icons.plus({ size: 14 })} Add</button>
              </div>
              {isWorksheet && (
                <div style={{ fontSize: 12, color: CB.amber, fontWeight: 500, marginTop: -8, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                  {icons.alertTriangle({ size: 13, color: CB.amber })}
                  Worksheet service — rate is person-specific (max ${newAuthRule?.max_rate?.toFixed(2) || "N/A"}/unit). Enter the rate from the support coordinator's worksheet.
                </div>
              )}
              {newAuthRule && !isWorksheet && newAuthRule.rate && (
                <div style={{ fontSize: 12, color: CB.textLight, marginTop: -8, marginBottom: 8 }}>
                  Fixed rate: ${newAuthRule.rate.toFixed(2)} / {newAuthRule.label?.toLowerCase()}
                </div>
              )}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 16 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Add Client"}</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function ClientsPage() {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [scLookup, setScLookup] = useState({});

      useEffect(() => { loadClients(); }, []);

      const loadClients = async () => {
        setLoading(true);
        const [clientRes, scRes] = await Promise.all([
          supabase.from("persons")
            .select("id, first_name, last_name, date_of_birth, is_active, medicaid_number, person_service_authorizations(id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code))")
            .order("last_name"),
          supabase.from("service_code_definitions").select("id, code").order("code"),
        ]);
        if (!clientRes.error) setClients(clientRes.data || []);
        // Build lookup map as fallback for nested join failures
        const lookup = {};
        (scRes.data || []).forEach(sc => { lookup[sc.id] = sc.code; });
        setScLookup(lookup);
        setLoading(false);
      };

      const openEdit = (row) => { setEditing(row); setFormOpen(true); };
      const openAdd = () => { setEditing(null); setFormOpen(true); };

      const columns = [
        { label: "Name", bold: true, render: (r) => `${r.first_name} ${r.last_name}` },
        { label: "Medicaid #", render: (r) => r.medicaid_number || "—" },
        { label: "DOB", render: (r) => r.date_of_birth ? new Date(r.date_of_birth + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Status", render: (r) => <Badge text={r.is_active ? "Active" : "Inactive"} color={r.is_active ? CB.green : CB.textLight} /> },
        { label: "Authorizations", render: (r) => {
          const a = r.person_service_authorizations || [];
          return a.length > 0 ? (
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {a.map((x, i) => <Badge key={i} text={x.service_code_definitions?.code || scLookup[x.service_code_id] || "?"} color={CB.blue} />)}
            </div>
          ) : "—";
        }},
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openEdit(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.edit({ size: 13 })} Edit</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Clients" subtitle="Person management, authorizations, and service tracking"
            action={<PrimaryButton onClick={openAdd}>{icons.plus({ size: 16 })} Add Client</PrimaryButton>}
          />
          <DataTable columns={columns} data={clients} loading={loading} emptyMessage="No clients found" />
          <ClientForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadClients} editing={editing} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 3: TRAINING TRACKER — per-staff completion logging
    // ═══════════════════════════════════════════════════════════════
    function TrainingLogForm({ open, onClose, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [topics, setTopics] = useState([]);
      const [form, setForm] = useState({ staff_id: "", training_topic_id: "", completed_date: "", certificate_number: "" });

      useEffect(() => {
        if (open) {
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name").then(({ data }) => setStaffList(data || []));
          supabase.from("training_topic_definitions").select("id, topic_name, renewal_months").order("topic_name").then(({ data }) => {
            // Deduplicate by name
            const seen = new Map();
            (data || []).forEach(t => {
              const key = t.topic_name?.trim().toLowerCase();
              if (key && !seen.has(key)) seen.set(key, t);
            });
            setTopics(Array.from(seen.values()));
          });
          setForm({ staff_id: "", training_topic_id: "", completed_date: new Date().toISOString().split("T")[0], certificate_number: "" });
        }
      }, [open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.staff_id || !form.training_topic_id || !form.completed_date) return addToast("Staff, topic, and date are required", "error");
        setSaving(true);
        const topic = topics.find(t => t.id === form.training_topic_id);
        let expiration_date = null;
        if (topic?.renewal_months) {
          const d = new Date(form.completed_date);
          d.setMonth(d.getMonth() + topic.renewal_months);
          expiration_date = d.toISOString().split("T")[0];
        }
        const { error } = await supabase.from("staff_trainings").insert({
          org_id: orgId,
          staff_id: form.staff_id,
          training_topic_id: form.training_topic_id,
          completed_at: form.completed_date,
          expires_at: expiration_date,
          certificate_url: form.certificate_number || null,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Training logged successfully", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="Log Training Completion" subtitle="Record a staff member's completed training">
          <FormField label="Staff Member" required>
            <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
              <option value="">Select staff member...</option>
              {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
            </select>
          </FormField>
          <FormField label="Training Topic" required>
            <select style={fieldStyle} value={form.training_topic_id} onChange={e => set("training_topic_id", e.target.value)}>
              <option value="">Select topic...</option>
              {topics.map(t => <option key={t.id} value={t.id}>{t.topic_name}</option>)}
            </select>
          </FormField>
          <FormRow>
            <FormField label="Completion Date" required half>
              <input style={fieldStyle} type="date" value={form.completed_date} onChange={e => set("completed_date", e.target.value)} />
            </FormField>
            <FormField label="Certificate #" half>
              <input style={fieldStyle} value={form.certificate_number} onChange={e => set("certificate_number", e.target.value)} placeholder="Optional" />
            </FormField>
          </FormRow>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.checkCircle({ size: 16 })} Log Training</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function TrainingPage() {
      const [tab, setTab] = useState("completions");
      const [completions, setCompletions] = useState([]);
      const [topics, setTopics] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [compRes, topicRes] = await Promise.all([
          supabase.from("staff_trainings").select("id, completed_at, expires_at, certificate_url, staff(first_name, last_name), training_topic_definitions(topic_name, category)").order("completed_at", { ascending: false }).limit(100),
          supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification").order("category, topic_name"),
        ]);
        if (!compRes.error) setCompletions(compRes.data || []);
        if (!topicRes.error) {
          // Deduplicate topics by normalized name (DB may have duplicates from multiple seed runs)
          const raw = topicRes.data || [];
          const seen = new Map();
          raw.forEach(t => {
            const key = t.topic_name?.trim().toLowerCase();
            if (!key) return;
            if (!seen.has(key)) {
              seen.set(key, t);
            } else {
              // Keep the one with more data (has renewal_months, deadline_days, etc.)
              const existing = seen.get(key);
              const score = (x) => (x.renewal_months ? 1 : 0) + (x.deadline_days ? 1 : 0) + (x.requires_certification ? 1 : 0) + (x.category ? 1 : 0);
              if (score(t) > score(existing)) seen.set(key, t);
            }
          });
          setTopics(Array.from(seen.values()));
        }
        setLoading(false);
      };

      const categoryColors = { "30_day": CB.blue, "90_day": CB.amber, "180_day": CB.red, "abi": CB.teal, "annual": CB.navy, "ongoing": CB.textMid };

      const compColumns = [
        { label: "Staff Member", bold: true, render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Training", render: (r) => r.training_topic_definitions?.topic_name || "—" },
        { label: "Category", render: (r) => <Badge text={r.training_topic_definitions?.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.training_topic_definitions?.category] || CB.textLight} /> },
        { label: "Completed", render: (r) => r.completed_at ? new Date(r.completed_at).toLocaleDateString() : "—" },
        { label: "Expires", render: (r) => r.expires_at ? new Date(r.expires_at).toLocaleDateString() : "N/A" },
        { label: "Status", render: (r) => {
          if (!r.expires_at) return <Badge text="No Expiry" color={CB.textLight} />;
          const exp = new Date(r.expires_at);
          const now = new Date();
          const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
          if (daysLeft < 0) return <Badge text="Expired" color={CB.red} />;
          if (daysLeft < 30) return <Badge text="Expiring Soon" color={CB.amber} />;
          return <Badge text="Current" color={CB.green} />;
        }},
      ];

      const topicColumns = [
        { label: "Training Topic", bold: true, render: (r) => r.topic_name },
        { label: "Category", render: (r) => <Badge text={r.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.category] || CB.textLight} /> },
        { label: "Certification", render: (r) => r.requires_certification ? <Badge text="Cert Required" color={CB.red} /> : <Badge text="No Cert" color={CB.textLight} /> },
        { label: "Due Within", render: (r) => r.deadline_days ? `${r.deadline_days} days` : "—" },
        { label: "Renewal", render: (r) => r.renewal_months ? `Every ${r.renewal_months} mo` : "One-time" },
      ];

      const TabButton = ({ value, label }) => (
        <button onClick={() => setTab(value)} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="Training Tracker" subtitle="27 SOW-required training topics with automated deadline tracking"
            action={<PrimaryButton onClick={() => setFormOpen(true)}>{icons.plus({ size: 16 })} Log Training</PrimaryButton>}
          />
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <TabButton value="completions" label="Completions" />
            <TabButton value="topics" label="Topic Definitions" />
          </div>
          {tab === "completions" ? (
            <DataTable columns={compColumns} data={completions} loading={loading} emptyMessage="No training completions logged yet" />
          ) : (
            <DataTable columns={topicColumns} data={topics} loading={loading} emptyMessage="No training topics found" />
          )}
          <TrainingLogForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadAll} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════

    // DHHS91172 BILLING RULES — unit types from SOW Rate Table
    // worksheet: true = rate varies per person (negotiated by support coordinator)
    // max_rate = SOW ceiling; actual rate stored on person_service_authorizations
    // ═══════════════════════════════════════════════════════════════

      PPS:  { unit_type: "daily", label: "Daily", worksheet: true, max_rate: 372.92 },

      RHS:  { unit_type: "daily", label: "Daily", worksheet: true, max_rate: 592.29 },

      SED:  { unit_type: "daily", label: "Daily", rate: 55.67 },
      SEE:  { unit_type: "tiered_daily", label: "Daily (Tiered)", worksheet: true,
              tiers: [ { maxHours: 1, max_rate: 54.18 }, { maxHours: 2, max_rate: 77.68 }, { maxHours: 3, max_rate: 101.14 },
                        { maxHours: 4, max_rate: 124.64 }, { maxHours: 5, max_rate: 148.12 }, { maxHours: 6, max_rate: 171.60 } ] },
      SEI:  { unit_type: "tiered_daily", label: "Daily (Tiered)", worksheet: true,
              tiers: [ { maxHours: 1, max_rate: 54.18 }, { maxHours: 2, max_rate: 77.68 }, { maxHours: 3, max_rate: 101.14 },
                        { maxHours: 4, max_rate: 124.64 }, { maxHours: 5, max_rate: 148.12 }, { maxHours: 6, max_rate: 171.60 } ] },

      SLH:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 9.16 },

      CMP:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 6.85 },
    };

    // Get the effective rate for a service code — either fixed or from client auth
    function getEffectiveRate(serviceCode, authRate) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return null;
      // Worksheet services use the client-specific rate from their authorization
      if (rule.worksheet) return authRate || null;
      // Fixed rate codes use the SOW rate
      return rule.rate || null;
    }

    function calculateBillableUnits(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      switch (rule.unit_type) {
        case "quarter_hour":
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
        case "daily":
          return 1;
        case "session":
          return 1;
        case "tiered_daily":
          return 1;
        default:
          return durationMinutes ? Math.ceil(durationMinutes / 15) : null;
      }
    }

    function getTieredRate(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule || rule.unit_type !== "tiered_daily" || !rule.tiers) return null;
      const hours = Math.ceil((durationMinutes || 0) / 60);
      const tier = rule.tiers.find(t => hours <= t.maxHours) || rule.tiers[rule.tiers.length - 1];
      return tier;
    }

    function getBillingLabel(serviceCode, durationMinutes) {
      const rule = BILLING_RULES[serviceCode];
      if (!rule) return durationMinutes ? `${Math.ceil(durationMinutes / 15)} units (qtr-hr)` : "—";
      const units = calculateBillableUnits(serviceCode, durationMinutes);
      switch (rule.unit_type) {
        case "quarter_hour":
          return units != null ? `${units} unit${units !== 1 ? "s" : ""} (${rule.label})` : "—";
        case "daily":
          return `1 unit (${rule.label})`;
        case "session":
          return `1 unit (${rule.label})`;
        case "tiered_daily": {
          const tier = getTieredRate(serviceCode, durationMinutes);
          return tier ? `1 unit (${Math.ceil((durationMinutes||0)/60)}hr tier)` : `1 unit (${rule.label})`;
        }
        default:
          return "—";
      }
    }

    function ServiceNoteForm({ open, onClose, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [clients, setClients] = useState([]);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [selectedCode, setSelectedCode] = useState(null);
      const [clientAuths, setClientAuths] = useState([]);
      const [form, setForm] = useState({
        staff_id: "", person_id: "", service_code_id: "",
        service_date: new Date().toISOString().split("T")[0],
        start_time: "", end_time: "", note_text: "",
      });
      const [extraFields, setExtraFields] = useState({});

      useEffect(() => {
        if (open) {
          Promise.all([
            supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
            supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
            supabase.from("service_code_definitions").select("id, code, name").order("code"),
          ]).then(([s, c, sc]) => {
            setStaffList(s.data || []);
            setClients(c.data || []);
            setServiceCodes(sc.data || []);
          });
          setForm({ staff_id: "", person_id: "", service_code_id: "", service_date: new Date().toISOString().split("T")[0], start_time: "", end_time: "", note_text: "" });
          setExtraFields({});
          setSelectedCode(null);
          setClientAuths([]);
        }
      }, [open]);

      // Load client auths when person changes
      const handleClientChange = async (personId) => {
        setForm(prev => ({ ...prev, person_id: personId }));
        if (personId) {
          const { data } = await supabase.from("person_service_authorizations")
            .select("id, service_code_id, authorized_units, used_units, rate_per_unit, service_code_definitions(code)")
            .eq("person_id", personId);
          setClientAuths(data || []);
        } else {
          setClientAuths([]);
        }
      };

      // Find the active auth for the selected client + code combo
      const activeAuth = useMemo(() => {
        if (!form.service_code_id || !clientAuths.length) return null;
        return clientAuths.find(a => a.service_code_id === form.service_code_id) || null;
      }, [form.service_code_id, clientAuths]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleCodeChange = (scId) => {
        set("service_code_id", scId);
        const code = serviceCodes.find(s => s.id === scId);
        setSelectedCode(code?.code || null);
        setExtraFields({});
      };

      const dynamicFields = SERVICE_NOTE_FIELDS[selectedCode] || [];

      const handleSave = async () => {
        if (!form.staff_id || !form.person_id || !form.service_code_id || !form.service_date) {
          return addToast("Staff, client, service code, and date are required", "error");
        }
        setSaving(true);
        // Calculate duration
        let duration_minutes = null;
        if (form.start_time && form.end_time) {
          const [sh, sm] = form.start_time.split(":").map(Number);
          const [eh, em] = form.end_time.split(":").map(Number);
          duration_minutes = (eh * 60 + em) - (sh * 60 + sm);
          if (duration_minutes < 0) duration_minutes += 1440;
        }
        // Combine note_text with extra fields
        let fullNote = form.note_text || "";
        if (Object.keys(extraFields).length > 0) {
          const sections = dynamicFields
            .filter(f => extraFields[f.key])
            .map(f => `[${f.label}]\n${extraFields[f.key]}`)
            .join("\n\n");
          fullNote = sections + (fullNote ? `\n\n[Additional Notes]\n${fullNote}` : "");
        }

        const { error } = await supabase.from("service_notes").insert({
          org_id: orgId,
          staff_id: form.staff_id,
          person_id: form.person_id,
          service_code_id: form.service_code_id,
          service_date: form.service_date,
          start_time: form.start_time || null,
          end_time: form.end_time || null,
          duration_minutes,
          billable_units: calculateBillableUnits(selectedCode, duration_minutes),
          summary_note: fullNote,
          status: "draft",
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Service note saved", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="New Service Note" subtitle={selectedCode ? `Dynamic fields for ${selectedCode}` : "Select a service code to load specific fields"} width={640}>
          <FormRow>
            <FormField label="Staff Member" required half>
              <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
                <option value="">Select staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required half>
              <select style={fieldStyle} value={form.person_id} onChange={e => handleClientChange(e.target.value)}>
                <option value="">Select client...</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>
          </FormRow>
          <FormField label="Service Code" required>
            <select style={fieldStyle} value={form.service_code_id} onChange={e => handleCodeChange(e.target.value)}>
              <option value="">Select service code...</option>
              {serviceCodes.map(sc => {
                // If client selected, mark which codes they have auths for
                const hasAuth = clientAuths.some(a => a.service_code_id === sc.id);
                return <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}{hasAuth ? " ✓" : ""}</option>;
              })}
            </select>
            {activeAuth && (
              <div style={{ marginTop: 6, fontSize: 12, color: CB.teal, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                {icons.checkCircle({ size: 13, color: CB.teal })}
                Auth: {activeAuth.used_units || 0}/{activeAuth.authorized_units} units used
                {activeAuth.rate_per_unit && <span>@ ${Number(activeAuth.rate_per_unit).toFixed(2)}/unit</span>}
              </div>
            )}
          </FormField>
          <FormRow>
            <FormField label="Service Date" required half>
              <input style={fieldStyle} type="date" value={form.service_date} onChange={e => set("service_date", e.target.value)} />
            </FormField>
            <FormField label="Start Time" half>
              <input style={fieldStyle} type="time" value={form.start_time} onChange={e => set("start_time", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="End Time" half>
              <input style={fieldStyle} type="time" value={form.end_time} onChange={e => set("end_time", e.target.value)} />
            </FormField>
            <FormField label="Duration / Units" half>
              <div style={{ ...fieldStyle, background: "#F1F5F9", color: CB.textMid, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                {(() => {
                  const rule = BILLING_RULES[selectedCode];
                  const authRate = activeAuth?.rate_per_unit ? Number(activeAuth.rate_per_unit) : null;
                  const effectiveRate = rule ? (rule.worksheet ? authRate : rule.rate) : null;

                  if (!rule) {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      return `${Math.floor(mins/60)}h ${mins%60}m → ${Math.ceil(mins/15)} units`;
                    }
                    return "Select a service code";
                  }
                  // Daily / Session — always 1 unit
                  if (rule.unit_type === "daily" || rule.unit_type === "session") {
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.teal}15`, color: CB.teal, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{rule.label}</span>
                        <span style={{ fontWeight: 600, color: CB.navy }}>1 unit</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : rule.worksheet ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  // Tiered daily
                  if (rule.unit_type === "tiered_daily") {
                    if (form.start_time && form.end_time) {
                      const [sh, sm] = form.start_time.split(":").map(Number);
                      const [eh, em] = form.end_time.split(":").map(Number);
                      let mins = (eh * 60 + em) - (sh * 60 + sm);
                      if (mins < 0) mins += 1440;
                      const tier = getTieredRate(selectedCode, mins);
                      return (
                        <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered</span>
                          <span>{Math.floor(mins/60)}h {mins%60}m</span>
                          <span style={{ fontWeight: 700, color: CB.navy }}>→ 1 unit</span>
                          <span style={{ fontSize: 11, color: CB.textLight }}>({Math.ceil(mins/60)}hr tier, max ${tier?.max_rate?.toFixed(2) || "?"})</span>
                        </span>
                      );
                    }
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ background: `${CB.amber}15`, color: CB.amber, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Tiered Daily</span>
                        <span style={{ fontSize: 12 }}>Enter times → rate by hours</span>
                      </span>
                    );
                  }
                  // Quarter hour
                  if (form.start_time && form.end_time) {
                    const [sh, sm] = form.start_time.split(":").map(Number);
                    const [eh, em] = form.end_time.split(":").map(Number);
                    let mins = (eh * 60 + em) - (sh * 60 + sm);
                    if (mins < 0) mins += 1440;
                    const units = Math.ceil(mins / 15);
                    return (
                      <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{Math.floor(mins/60)}h {mins%60}m</span>
                        <span style={{ fontWeight: 700, color: CB.navy }}>→ {units} unit{units !== 1 ? "s" : ""}</span>
                        {effectiveRate ? (
                          <span style={{ fontSize: 12, color: CB.teal, fontWeight: 600 }}>@ ${effectiveRate.toFixed(2)}</span>
                        ) : rule.worksheet ? (
                          <span style={{ fontSize: 11, color: CB.amber }}>rate from auth</span>
                        ) : null}
                      </span>
                    );
                  }
                  return "Enter start/end times";
                })()}
              </div>
            </FormField>
          </FormRow>

          {/* Dynamic fields per service code */}
          {dynamicFields.length > 0 && (
            <div style={{ marginTop: 8, padding: "16px 0 0", borderTop: `1px solid ${CB.border}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <Badge text={selectedCode} color={CB.blue} />
                <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>Required Documentation</span>
              </div>
              {dynamicFields.map(field => (
                <FormField key={field.key} label={field.label}>
                  {field.type === "textarea" ? (
                    <textarea style={{ ...fieldStyle, minHeight: 72, resize: "vertical" }} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  ) : field.type === "select" ? (
                    <select style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))}>
                      <option value="">Select...</option>
                      {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  ) : (
                    <input style={fieldStyle} value={extraFields[field.key] || ""} onChange={e => setExtraFields(p => ({ ...p, [field.key]: e.target.value }))} placeholder={field.placeholder} />
                  )}
                </FormField>
              ))}
            </div>
          )}

          <FormField label="Additional Notes">
            <textarea style={{ ...fieldStyle, minHeight: 64, resize: "vertical" }} value={form.note_text} onChange={e => set("note_text", e.target.value)} placeholder="Any additional observations or notes..." />
          </FormField>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} Save Note</PrimaryButton>
          </div>
        </Modal>
      );
    }
