                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </CollapsibleTimeGroup>
                );
              })}
            </div>
          )}

          <ServiceContextForm open={showForm} onClose={() => setShowForm(false)} onSaved={load} editing={editing} />
          <MembersModal open={!!managingMembers} onClose={() => setManagingMembers(null)} context={managingMembers} onSaved={load} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE — SHIFT MANAGEMENT (v19.0)
    // Scheduling, weekly grid, gap detection, EVV/note linking
    // ═══════════════════════════════════════════════════════════════

    // Returns a Date for the Sunday (start) of the week containing `d`
    const weekStart = (d) => {
      const copy = new Date(d);
      copy.setHours(0, 0, 0, 0);
      copy.setDate(copy.getDate() - copy.getDay());
      return copy;
    };

    const fmtISODate = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };

    // Shift status → visual treatment
    const SHIFT_STATUS_STYLE = {
      scheduled:   { bg: "#1A73E810", border: "#1A73E8", text: "#1A73E8", label: "Scheduled" },
      in_progress: { bg: "#00897B18", border: "#00897B", text: "#00695C", label: "In Progress" },
      completed:   { bg: "#2E7D3218", border: "#2E7D32", text: "#1B5E20", label: "Completed" },
      missed:      { bg: "#E5393518", border: "#E53935", text: "#B71C1C", label: "No-Show" },
      cancelled:   { bg: "#94A3B818", border: "#94A3B8", text: "#475569", label: "Cancelled" },
    };

    function ShiftForm({ open, onClose, onSaved, editing, prefillDate, prefillStaffId, prefillContextId }) {
      const { addToast } = useToast();
      const { orgId, enforcement } = useAuth();
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [clients, setClients] = useState([]);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [contexts, setContexts] = useState([]); // v19.2 — active service delivery contexts
      const [contextMembers, setContextMembers] = useState({}); // v19.2 — { context_id → [person_id, ...] active members }
      // v19.3 — competency data for soft warnings
      const [decks, setDecks] = useState([]);
      const [deckSvcCodes, setDeckSvcCodes] = useState([]);
      const [deckCompletions, setDeckCompletions] = useState([]);
      const [form, setForm] = useState({
        staff_id: "", person_id: "", service_code_id: "",
        context_id: "", // v19.2
        scheduled_date: fmtISODate(new Date()),
        scheduled_start: "08:00", scheduled_end: "16:00",
        location: "", notes: "", status: "scheduled",
      });

      useEffect(() => {
        if (!open) return;
        Promise.all([
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("service_code_definitions").select("id, code, name").order("code"),
          // v19.2 — load active contexts with their service code and org unit
          supabase.from("service_delivery_contexts")
            .select("id, name, delivery_type, service_code_id, org_unit_id, service_code_definitions(id, code, name), org_units(name)")
            .eq("is_active", true).order("name"),
        ]).then(([s, c, sc, ctx]) => {
          setStaffList(s.data || []);
          setClients(c.data || []);
          setServiceCodes(sc.data || []);
          const ctxList = ctx.error ? [] : (ctx.data || []);
          setContexts(ctxList);
          // Batch-load active members per context
          if (ctxList.length > 0) {
            const ids = ctxList.map(x => x.id);
            supabase.from("service_delivery_context_members")
              .select("context_id, person_id, is_active, end_date, start_date")
              .in("context_id", ids).then(({ data }) => {
                const byCtx = {};
                (data || []).forEach(m => {
                  if (m.is_active === false || m.end_date) return;
                  if (!byCtx[m.context_id]) byCtx[m.context_id] = [];
                  byCtx[m.context_id].push(m.person_id);
                });
                setContextMembers(byCtx);
              });
          }
          // v19.3 — load decks + completions for competency checks (silent on error — tables may not exist)
          Promise.all([
            supabase.from("training_decks").select("id, name, deck_type, is_active"),
            supabase.from("training_deck_service_codes").select("deck_id, service_code_id"),
            supabase.from("staff_deck_completions").select("staff_id, deck_id, person_id, completed_at, expires_at"),
          ]).then(([d, m, c]) => {
            if (!d.error) setDecks(d.data || []);
            if (!m.error) setDeckSvcCodes(m.data || []);
            if (!c.error) setDeckCompletions(c.data || []);
          });
        });
        if (editing) {
          setForm({
            staff_id: editing.staff_id || "",
            person_id: editing.person_id || "",
            service_code_id: editing.service_code_id || "",
            context_id: editing.context_id || "",
            scheduled_date: editing.scheduled_date || fmtISODate(new Date()),
            scheduled_start: (editing.scheduled_start || "08:00").slice(0, 5),
            scheduled_end: (editing.scheduled_end || "16:00").slice(0, 5),
            location: editing.location || "",
            notes: editing.notes || "",
            status: editing.status || "scheduled",
          });
        } else {
          setForm({
            staff_id: prefillStaffId || "",
            person_id: "", service_code_id: "",
            context_id: prefillContextId || "",
            scheduled_date: prefillDate || fmtISODate(new Date()),
            scheduled_start: "08:00", scheduled_end: "16:00",
            location: "", notes: "", status: "scheduled",
          });
        }
      }, [open, editing, prefillDate, prefillStaffId, prefillContextId]);

      // v19.2 — when context changes, lock service code to the context's code
      const handleContextChange = (ctxId) => {
        const ctx = contexts.find(c => c.id === ctxId);
        if (ctx) {
          setForm(p => ({
            ...p,
            context_id: ctxId,
            service_code_id: ctx.service_code_id || p.service_code_id,
            // If current client isn't a member of the new context, clear it
            person_id: (contextMembers[ctxId] || []).includes(p.person_id) ? p.person_id : "",
          }));
        } else {
          setForm(p => ({ ...p, context_id: "" }));
        }
      };

      // v19.2 — clients filtered by context membership when a context is selected
      const visibleClients = useMemo(() => {
        if (!form.context_id) return clients;
        const memberIds = new Set(contextMembers[form.context_id] || []);
        return clients.filter(c => memberIds.has(c.id));
      }, [clients, form.context_id, contextMembers]);

      const selectedContext = contexts.find(c => c.id === form.context_id);

      // v19.3 — competency check for the currently-selected staff + service code + client
      const competency = useMemo(() => {
        if (!form.staff_id) return null;
        if (decks.length === 0) return null;
        const codeId = form.service_code_id || (selectedContext?.service_code_id) || null;
        return computeCompetency({
          staffId: form.staff_id,
          serviceCodeId: codeId,
          personId: form.person_id || null,
          decks, deckServiceCodes: deckSvcCodes, completions: deckCompletions,
          requirePersonSpecific: !!form.person_id,
        });
      }, [form.staff_id, form.service_code_id, form.person_id, selectedContext, decks, deckSvcCodes, deckCompletions]);

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handleSave = async () => {
        if (!form.staff_id || !form.person_id || !form.scheduled_date || !form.scheduled_start || !form.scheduled_end) {
          return addToast("Staff, client, date, start, and end times are all required", "error");
        }
        // v19.3 — enforce competency if org settings are set to "block"
        if (competency && !competency.isFullyQualified && enforcement) {
          // Determine which gap matters under which setting
          const personSpecificMissing = competency.missing.some(m => m.deck.deck_type === "person_specific" || m.scopePersonId);
          const generalMissing = competency.missing.some(m => m.deck.deck_type === "universal" || m.deck.deck_type === "service_code");
          const generalExpired = competency.expired.some(m => m.deck.deck_type === "universal" || m.deck.deck_type === "service_code");
          const personExpired = competency.expired.some(m => m.deck.deck_type === "person_specific" || m.scopePersonId);

          if (enforcement.training === "block" && (generalMissing || generalExpired)) {
            return addToast("Cannot save shift — staff is missing required universal or service-code training. Update Settings → Compliance Enforcement to allow.", "error");
          }
          if (enforcement.person_specific === "block" && (personSpecificMissing || personExpired)) {
            return addToast("Cannot save shift — staff has not completed person-specific training for this client. Update Settings → Compliance Enforcement to allow.", "error");
          }
        }
        setSaving(true);
        const payload = {
          org_id: orgId,
          staff_id: form.staff_id,
          person_id: form.person_id,
          service_code_id: form.service_code_id || null,
          context_id: form.context_id || null, // v19.2
          scheduled_date: form.scheduled_date,
          scheduled_start: form.scheduled_start,
          scheduled_end: form.scheduled_end,
          location: form.location || null,
          notes: form.notes || null,
          status: form.status,
        };
        // Strip null optional keys
        Object.keys(payload).forEach(k => { if (payload[k] === null) delete payload[k]; });

        const writeShift = async (p) => editing
          ? supabase.from("shifts").update(p).eq("id", editing.id)
          : supabase.from("shifts").insert(p);

        let result = await writeShift(payload);
        // v19.2 schema fallback: if context_id column doesn't exist, retry without it
        if (result.error && /column .*context_id.* does not exist/i.test(result.error.message || "")) {
          const { context_id, ...withoutCtx } = payload;
          result = await writeShift(withoutCtx);
          if (!result.error && form.context_id) {
            addToast("Shift saved — context link not stored (run v19.2 migration)", "warning");
          }
        }
        setSaving(false);
        if (result.error) {
          // Most likely: table doesn't exist yet
          if (/relation .*shifts.* does not exist/i.test(result.error.message || "")) {
            addToast("Shifts table not found — run v19.0 migration SQL first", "error");
          } else {
            addToast(result.error.message, "error");
          }
          return;
        }
        addToast(editing ? "Shift updated" : "Shift scheduled", "success");
        onSaved();
        onClose();
      };

      const handleDelete = async () => {
        if (!editing) return;
        if (!window.confirm("Delete this shift? This cannot be undone.")) return;
        setDeleting(true);
        const { error } = await supabase.from("shifts").delete().eq("id", editing.id);
        setDeleting(false);
        if (error) return addToast(error.message, "error");
        addToast("Shift deleted", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Shift" : "Schedule Shift"} subtitle="Assign a staff member to cover a client at a specific time" width={640}>
          {/* v19.3 — competency warning banner (soft, not blocking) */}
          {competency && competency.results.length > 0 && !competency.isFullyQualified && (
            <div style={{
              background: competency.complete.length === 0 ? `${CB.red}10` : `${CB.amber}12`,
              border: `1px solid ${competency.complete.length === 0 ? CB.red : CB.amber}40`,
              borderLeft: `3px solid ${competency.complete.length === 0 ? CB.red : CB.amber}`,
              borderRadius: 8, padding: "10px 14px", marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start",
            }}>
              <div style={{ paddingTop: 1, flexShrink: 0 }}>
                {icons.alertTriangle({ size: 16, color: competency.complete.length === 0 ? CB.red : CB.amber })}
              </div>
              <div style={{ flex: 1, fontSize: 12 }}>
                <div style={{ fontWeight: 700, color: competency.complete.length === 0 ? CB.red : CB.amber, marginBottom: 3 }}>
                  Training gap — {competency.complete.length}/{competency.results.length} decks complete
                </div>
                <div style={{ color: CB.textMid, lineHeight: 1.5 }}>
                  Missing: {competency.missing.map(m => m.deck.name).join(", ") || "none"}
                  {competency.expired.length > 0 && <><br />Expired: {competency.expired.map(e => e.deck.name).join(", ")}</>}
                </div>
                <div style={{ color: CB.textLight, fontSize: 11, marginTop: 4, fontStyle: "italic" }}>
                  Shift can still be saved. Review training before the shift date.
                </div>
              </div>
            </div>
          )}
          {competency && competency.results.length > 0 && competency.isFullyQualified && (
            <div style={{
              background: `${CB.green}10`,
              border: `1px solid ${CB.green}40`,
              borderLeft: `3px solid ${CB.green}`,
              borderRadius: 8, padding: "8px 14px", marginBottom: 14, display: "flex", gap: 10, alignItems: "center", fontSize: 12,
            }}>
              {icons.checkCircle({ size: 14, color: CB.green })}
              <span style={{ color: CB.green, fontWeight: 700 }}>Fully qualified</span>
              <span style={{ color: CB.textMid }}>— all {competency.results.length} required decks complete</span>
            </div>
          )}
          {/* v19.2 — Service Context picker (optional but recommended) */}
          {contexts.length > 0 && (
            <FormField label="Service Context">
              <select style={fieldStyle} value={form.context_id} onChange={e => handleContextChange(e.target.value)}>
                <option value="">(no context — free-form shift)</option>
                {contexts.map(c => {
                  const meta = DELIVERY_TYPE_META[c.delivery_type] || {};
                  const memberCount = (contextMembers[c.id] || []).length;
                  return (
                    <option key={c.id} value={c.id}>
                      {c.name} — {meta.label || c.delivery_type} ({memberCount} {memberCount === 1 ? "client" : "clients"})
                    </option>
                  );
                })}
              </select>
              {selectedContext && (
                <div style={{
                  marginTop: 6, padding: "8px 12px", borderRadius: 8,
                  background: `${DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal}10`,
                  border: `1px solid ${DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal}30`,
                  fontSize: 11, color: CB.textMid, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap",
                }}>
                  <span style={{ fontWeight: 700, color: DELIVERY_TYPE_META[selectedContext.delivery_type]?.color || CB.teal }}>
                    {DELIVERY_TYPE_META[selectedContext.delivery_type]?.label || selectedContext.delivery_type}
                  </span>
                  <span>·</span>
                  <span>Code <b>{selectedContext.service_code_definitions?.code || "?"}</b> locked</span>
                  <span>·</span>
                  <span>Client list filtered to <b>{visibleClients.length}</b> active member{visibleClients.length === 1 ? "" : "s"}</span>
                </div>
              )}
            </FormField>
          )}

          <FormRow>
            <FormField label="Staff" required half>
              <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
                <option value="">Select staff...</option>
                {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
            </FormField>
            <FormField label="Client" required half>
              <select style={fieldStyle} value={form.person_id} onChange={e => set("person_id", e.target.value)}>
                <option value="">{form.context_id && visibleClients.length === 0 ? "No active members in context" : "Select client..."}</option>
                {visibleClients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
              </select>
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Service Code" half>
              <select
                style={{ ...fieldStyle, background: form.context_id ? "#F1F5F9" : fieldStyle.background, cursor: form.context_id ? "not-allowed" : "pointer" }}
                value={form.service_code_id}
                disabled={!!form.context_id}
                onChange={e => set("service_code_id", e.target.value)}
              >
                <option value="">(optional — any code)</option>
                {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
              </select>
              {form.context_id && (
                <div style={{ marginTop: 4, fontSize: 11, color: CB.textLight, fontStyle: "italic" }}>
                  Locked to context's service code. Clear context to override.
                </div>
              )}
            </FormField>
            <FormField label="Location" half>
              <input style={fieldStyle} value={form.location} onChange={e => set("location", e.target.value)} placeholder="West Jordan, Home, etc." />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Date" required half>
              <input style={fieldStyle} type="date" value={form.scheduled_date} onChange={e => set("scheduled_date", e.target.value)} />
            </FormField>
            <FormField label="Status" half>
              <select style={fieldStyle} value={form.status} onChange={e => set("status", e.target.value)}>
                <option value="scheduled">Scheduled</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="missed">No-Show</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Start Time" required half>
              <input style={fieldStyle} type="time" value={form.scheduled_start} onChange={e => set("scheduled_start", e.target.value)} />
            </FormField>
            <FormField label="End Time" required half>
              <input style={fieldStyle} type="time" value={form.scheduled_end} onChange={e => set("scheduled_end", e.target.value)} />
            </FormField>
          </FormRow>
          <FormField label="Notes">
            <textarea style={{ ...fieldStyle, minHeight: 64, resize: "vertical" }} value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Any handoff notes, special instructions, etc." />
          </FormField>

          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, marginTop: 8, flexWrap: "wrap" }}>
            {editing ? (
              <button onClick={handleDelete} disabled={deleting} style={{
                padding: "10px 18px", borderRadius: 10, border: `1px solid ${CB.red}30`, background: `${CB.red}08`,
                color: CB.red, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: deleting ? 0.6 : 1,
              }}>{icons.trash({ size: 14 })} Delete Shift</button>
            ) : <span />}
            <div style={{ display: "flex", gap: 12 }}>
              <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
              <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Schedule"}</PrimaryButton>
            </div>
          </div>
        </Modal>
      );
    }

    function SchedulePage({ onNavigate }) {
      const { orgId } = useAuth();
      const { addToast } = useToast();
      const { isMobile } = useMobile();
      const [anchorDate, setAnchorDate] = useState(() => weekStart(new Date()));
      const [shifts, setShifts] = useState([]);
      const [evvSessions, setEvvSessions] = useState([]);
      const [staff, setStaff] = useState([]);
      const [clients, setClients] = useState([]);
      const [contexts, setContexts] = useState([]); // v19.2
      const [contextMembers, setContextMembers] = useState({}); // v19.2 — {ctxId → [personId]}
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [prefillDate, setPrefillDate] = useState(null);
      const [prefillStaffId, setPrefillStaffId] = useState(null);
      const [prefillContextId, setPrefillContextId] = useState(null); // v19.2
      const [filterStaff, setFilterStaff] = useState("");
      const [filterContext, setFilterContext] = useState(""); // v19.2
      const [viewMode, setViewMode] = useState(isMobile ? "list" : "grid"); // "grid" | "context" | "list"

      // Week boundaries
      const weekEndDate = useMemo(() => {
        const e = new Date(anchorDate);
        e.setDate(e.getDate() + 6);
        return e;
      }, [anchorDate]);

      const weekDays = useMemo(() => {
        return Array.from({ length: 7 }, (_, i) => {
          const d = new Date(anchorDate);
          d.setDate(d.getDate() + i);
          return d;
        });
      }, [anchorDate]);

      const loadWeek = async () => {
        setLoading(true);
        const startISO = fmtISODate(anchorDate);
        const endISO = fmtISODate(weekEndDate);

        // Shifts for this week — v19.2: include context data, graceful fallback if column/join not present
        const shiftSelect = "id, staff_id, person_id, service_code_id, context_id, scheduled_date, scheduled_start, scheduled_end, location, notes, status, staff(first_name, last_name), persons(first_name, last_name), service_code_definitions(code), service_delivery_contexts(id, name, delivery_type)";
        const shiftSelectLegacy = "id, staff_id, person_id, service_code_id, scheduled_date, scheduled_start, scheduled_end, location, notes, status, staff(first_name, last_name), persons(first_name, last_name), service_code_definitions(code)";
        let shiftRes = await supabase.from("shifts")
          .select(shiftSelect)
          .gte("scheduled_date", startISO)
          .lte("scheduled_date", endISO)
          .order("scheduled_start");

        if (shiftRes.error && /(column|relationship).*context/i.test(shiftRes.error.message || "")) {
          // context_id column or join not available — retry without it
          shiftRes = await supabase.from("shifts")
            .select(shiftSelectLegacy)
            .gte("scheduled_date", startISO)
            .lte("scheduled_date", endISO)
            .order("scheduled_start");
        }

        if (shiftRes.error) {
          if (/relation .*shifts.* does not exist/i.test(shiftRes.error.message || "")) {
            setShifts([]);
            setStaff([]);
            setClients([]);
            setEvvSessions([]);
            setContexts([]);
            setLoading(false);
            return; // empty state UI will prompt migration
          }
          addToast("Failed to load shifts: " + shiftRes.error.message, "error");
          setLoading(false);
          return;
        }

        // v19.2 — load active contexts + members (independent of shifts table presence)
        const ctxRes = await supabase.from("service_delivery_contexts")
          .select("id, name, delivery_type, service_code_id, service_code_definitions(code)")
          .eq("is_active", true).order("name");
        const ctxList = ctxRes.error ? [] : (ctxRes.data || []);
        setContexts(ctxList);

        if (ctxList.length > 0) {
          const ids = ctxList.map(x => x.id);
          const { data: memData } = await supabase.from("service_delivery_context_members")
            .select("context_id, person_id, is_active, end_date, start_date").in("context_id", ids);
          const byCtx = {};
          (memData || []).forEach(m => {
            if (m.is_active === false || m.end_date) return;
            if (!byCtx[m.context_id]) byCtx[m.context_id] = [];
            byCtx[m.context_id].push(m.person_id);
          });
          setContextMembers(byCtx);
        } else {
          setContextMembers({});
        }

        // EVV sessions that might correspond to shifts this week (for auto-match display)
        const weekStartUTC = new Date(startISO + "T00:00:00").toISOString();
        const weekEndUTC = new Date(endISO + "T23:59:59").toISOString();
        const evvRes = await supabase.from("evv_sessions")
          .select("id, staff_id, person_id, clock_in_at, clock_out_at")
          .gte("clock_in_at", weekStartUTC)
          .lte("clock_in_at", weekEndUTC);

        // Apply gap detection: any "scheduled" shift whose start has passed with no EVV clock-in for same staff+client within ±60min → mark missed in the local render
        const now = new Date();
        const evvByKey = {};
        (evvRes.data || []).forEach(s => {
          const key = `${s.staff_id}__${s.person_id}`;
          if (!evvByKey[key]) evvByKey[key] = [];
          evvByKey[key].push(s);
        });

        const enriched = (shiftRes.data || []).map(sh => {
          const start = new Date(`${sh.scheduled_date}T${sh.scheduled_start}`);
          const end = new Date(`${sh.scheduled_date}T${sh.scheduled_end}`);
          const key = `${sh.staff_id}__${sh.person_id}`;
          const matchingEvv = (evvByKey[key] || []).find(e => {
            const clockIn = new Date(e.clock_in_at);
            return Math.abs(clockIn - start) <= 60 * 60 * 1000; // within 1 hour
          });

          let derivedStatus = sh.status;
          // Auto-derivations (display-only; don't mutate DB here)
          if (sh.status === "scheduled") {
            if (matchingEvv && !matchingEvv.clock_out_at) derivedStatus = "in_progress";
            else if (matchingEvv && matchingEvv.clock_out_at) derivedStatus = "completed";
            else if (now > end) derivedStatus = "missed"; // end passed, no EVV → no-show
          }

          return { ...sh, derived_status: derivedStatus, evv_match: matchingEvv || null };
        });

        // Unique staff + clients from shifts for the grid axis
        const staffMap = new Map();
        const clientMap = new Map();
        enriched.forEach(sh => {
          if (sh.staff) staffMap.set(sh.staff_id, { id: sh.staff_id, ...sh.staff });
          if (sh.persons) clientMap.set(sh.person_id, { id: sh.person_id, ...sh.persons });
        });

        // Also pull full staff list (so the grid shows staff even with no shifts this week)
        const allStaffRes = await supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name");
        (allStaffRes.data || []).forEach(s => {
          if (!staffMap.has(s.id)) staffMap.set(s.id, s);
        });

        setShifts(enriched);
        setEvvSessions(evvRes.data || []);
        setStaff([...staffMap.values()]);
        setClients([...clientMap.values()]);
        setLoading(false);
      };

      useEffect(() => { loadWeek(); }, [anchorDate]);

      const goPrevWeek = () => { const d = new Date(anchorDate); d.setDate(d.getDate() - 7); setAnchorDate(d); };
      const goNextWeek = () => { const d = new Date(anchorDate); d.setDate(d.getDate() + 7); setAnchorDate(d); };
      const goToday = () => setAnchorDate(weekStart(new Date()));

      const openNew = (date, staffId, contextId) => {
        setEditing(null);
        setPrefillDate(date || fmtISODate(new Date()));
        setPrefillStaffId(staffId || null);
        setPrefillContextId(contextId || null);
        setShowForm(true);
      };

      const openEdit = (shift) => {
        setEditing(shift);
        setPrefillDate(null);
        setPrefillStaffId(null);
        setPrefillContextId(null);
        setShowForm(true);
      };

      // Filtered shifts based on staff + context filter (v19.2)
      const visibleShifts = useMemo(() => {
        return shifts.filter(s => {
          if (filterStaff && s.staff_id !== filterStaff) return false;
          if (filterContext && s.context_id !== filterContext) return false;
          return true;
        });
      }, [shifts, filterStaff, filterContext]);

      // Group visible shifts by staff × date for grid
      const shiftsByStaffDate = useMemo(() => {
        const m = {};
        visibleShifts.forEach(s => {
          const k = `${s.staff_id}__${s.scheduled_date}`;
          if (!m[k]) m[k] = [];
          m[k].push(s);
        });
        return m;
      }, [visibleShifts]);

      // v19.2 — group visible shifts by context × date for "By Context" view
      const shiftsByContextDate = useMemo(() => {
        const m = {};
        visibleShifts.forEach(s => {
          if (!s.context_id) return; // Skip shifts without a context
          const k = `${s.context_id}__${s.scheduled_date}`;
          if (!m[k]) m[k] = [];
          m[k].push(s);
        });
        return m;
      }, [visibleShifts]);

      // v19.2 — shifts without any context (for "Unassigned" row in By Context view)
      const uncontextedShifts = useMemo(() => {
        return visibleShifts.filter(s => !s.context_id);
      }, [visibleShifts]);

      // Weekly summary counts
      const summary = useMemo(() => {
        const s = { total: shifts.length, scheduled: 0, in_progress: 0, completed: 0, missed: 0, cancelled: 0 };
        shifts.forEach(sh => { s[sh.derived_status] = (s[sh.derived_status] || 0) + 1; });
        return s;
      }, [shifts]);

      const weekLabel = `${anchorDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })} – ${weekEndDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
      const isCurrentWeek = fmtISODate(anchorDate) === fmtISODate(weekStart(new Date()));

      // Filter staff shown in grid: those with shifts this week, OR all if filter not applied & grid has no shifts
      const staffInGrid = useMemo(() => {
        if (filterStaff) return staff.filter(s => s.id === filterStaff);
        const withShifts = new Set(shifts.map(s => s.staff_id));
        if (withShifts.size === 0) return staff; // show all if empty week
        return staff.filter(s => withShifts.has(s.id));
      }, [staff, shifts, filterStaff]);

      return (
        <div>
          <PageHeader title="Schedule" subtitle="Weekly shift planning, coverage, and gap detection"
            action={<PrimaryButton onClick={() => openNew()}>{icons.plus({ size: 16 })} New Shift</PrimaryButton>}
          />

          {/* Toolbar: week nav + filters + view mode */}
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
            marginBottom: 16, padding: "12px 16px", background: CB.white, borderRadius: 12,
            border: `1px solid ${CB.border}`, flexWrap: "wrap",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <button onClick={goPrevWeek} style={{
                padding: "7px 10px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}>‹</button>
              <button onClick={goToday} style={{
                padding: "7px 14px", borderRadius: 8, border: `1px solid ${CB.border}`,
                background: isCurrentWeek ? CB.navy : CB.white,
                color: isCurrentWeek ? CB.white : CB.textMid,
                fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>Today</button>
              <button onClick={goNextWeek} style={{
                padding: "7px 10px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}>›</button>
              <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginLeft: 8 }}>{weekLabel}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <select value={filterStaff} onChange={e => setFilterStaff(e.target.value)} style={{ ...fieldStyle, padding: "7px 12px", fontSize: 13, width: "auto", minWidth: 160 }}>
                <option value="">All staff</option>
                {staff.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
              </select>
              {contexts.length > 0 && (
                <select value={filterContext} onChange={e => setFilterContext(e.target.value)} style={{ ...fieldStyle, padding: "7px 12px", fontSize: 13, width: "auto", minWidth: 180 }}>
                  <option value="">All contexts</option>
                  {contexts.map(c => {
                    const meta = DELIVERY_TYPE_META[c.delivery_type] || {};
                    return <option key={c.id} value={c.id}>{c.name} ({meta.label || c.delivery_type})</option>;
                  })}
                </select>
              )}
              <div style={{ display: "flex", alignItems: "center", gap: 4, background: CB.cream, padding: 3, borderRadius: 9, border: `1px solid ${CB.border}` }}>
                <button onClick={() => setViewMode("grid")} style={{
                  padding: "6px 12px", borderRadius: 7, border: "none", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                  cursor: "pointer", background: viewMode === "grid" ? CB.navy : "transparent",
                  color: viewMode === "grid" ? CB.white : CB.textMid,
                }}>Grid</button>
                {contexts.length > 0 && (
                  <button onClick={() => setViewMode("context")} style={{
                    padding: "6px 12px", borderRadius: 7, border: "none", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                    cursor: "pointer", background: viewMode === "context" ? CB.navy : "transparent",
                    color: viewMode === "context" ? CB.white : CB.textMid,
                  }}>By Context</button>
                )}
                <button onClick={() => setViewMode("list")} style={{
                  padding: "6px 12px", borderRadius: 7, border: "none", fontSize: 11, fontWeight: 700, fontFamily: "inherit",
                  cursor: "pointer", background: viewMode === "list" ? CB.navy : "transparent",
                  color: viewMode === "list" ? CB.white : CB.textMid,
                }}>List</button>
              </div>
            </div>
          </div>

          {/* Week summary stat strip */}
          {!loading && shifts.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(5, 1fr)", gap: 10, marginBottom: 16 }}>
              {[
                { key: "total", label: "Total", color: CB.navy },
                { key: "scheduled", label: "Scheduled", color: CB.blue },
                { key: "in_progress", label: "In Progress", color: CB.teal },
                { key: "completed", label: "Completed", color: CB.green },
                { key: "missed", label: "No-Show", color: CB.red },
              ].map(s => (
                <div key={s.key} style={{
                  padding: "12px 14px", borderRadius: 10, background: CB.white,
                  border: `1px solid ${CB.border}`, textAlign: "center",
                }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: s.color }}>{summary[s.key] || 0}</div>
                  <div style={{ fontSize: 10, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : shifts.length === 0 && staff.length === 0 ? (
            // Empty state: migration probably hasn't been run
            <div style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14, background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}` }}>
              <div style={{ marginBottom: 14 }}>{icons.calendar({ size: 40, color: CB.textLight })}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: CB.navy, marginBottom: 8 }}>Schedule ready to go.</p>
              <p style={{ fontSize: 13, color: CB.textMid, marginBottom: 14 }}>If you're seeing this and expected shifts, the <code>shifts</code> table may not exist yet. Run the v19.0 migration SQL.</p>
              <PrimaryButton onClick={() => openNew()}>{icons.plus({ size: 14 })} Schedule First Shift</PrimaryButton>
            </div>
          ) : viewMode === "grid" && !isMobile ? (
            /* ── GRID VIEW ── */
            <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 900 }}>
                <thead>
                  <tr style={{ background: CB.cream }}>
                    <th style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: `1px solid ${CB.border}`, position: "sticky", left: 0, background: CB.cream, minWidth: 150 }}>Staff</th>
                    {weekDays.map(d => {
                      const isToday = fmtISODate(d) === fmtISODate(new Date());
                      return (
                        <th key={d.toISOString()} style={{
                          padding: "11px 10px", textAlign: "center", fontSize: 11, fontWeight: 700,
                          color: isToday ? CB.teal : CB.textLight, textTransform: "uppercase", letterSpacing: 0.6,
                          borderBottom: `1px solid ${CB.border}`, minWidth: 110,
                          background: isToday ? `${CB.teal}08` : "transparent",
                        }}>
                          <div>{d.toLocaleDateString("en-US", { weekday: "short" })}</div>
                          <div style={{ fontSize: 14, fontWeight: 800, color: isToday ? CB.teal : CB.navy, marginTop: 2 }}>{d.getDate()}</div>
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {staffInGrid.map(s => (
                    <tr key={s.id} style={{ borderBottom: `1px solid ${CB.border}` }}>
                      <td style={{ padding: "10px 14px", fontSize: 13, fontWeight: 600, color: CB.text, position: "sticky", left: 0, background: CB.white, borderRight: `1px solid ${CB.border}` }}>
                        {s.first_name} {s.last_name}
                      </td>
                      {weekDays.map(d => {
                        const dateStr = fmtISODate(d);
                        const cellShifts = shiftsByStaffDate[`${s.id}__${dateStr}`] || [];
                        return (
                          <td key={dateStr} onClick={() => cellShifts.length === 0 && openNew(dateStr, s.id)} style={{
                            padding: 6, verticalAlign: "top", cursor: cellShifts.length === 0 ? "pointer" : "default",
                            borderRight: `1px solid ${CB.border}`, minHeight: 60, height: 60,
                            background: cellShifts.length === 0 ? "transparent" : `${CB.cream}30`,
                          }}
                            onMouseEnter={e => { if (cellShifts.length === 0) e.currentTarget.style.background = `${CB.teal}06`; }}
                            onMouseLeave={e => { if (cellShifts.length === 0) e.currentTarget.style.background = "transparent"; }}
                          >
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                              {cellShifts.map(sh => {
                                const style = SHIFT_STATUS_STYLE[sh.derived_status] || SHIFT_STATUS_STYLE.scheduled;
                                return (
                                  <div key={sh.id} onClick={(e) => { e.stopPropagation(); openEdit(sh); }} style={{
                                    padding: "5px 8px", borderRadius: 6, cursor: "pointer",
                                    background: style.bg, border: `1px solid ${style.border}40`, borderLeft: `3px solid ${style.border}`,
                                    transition: "transform 0.1s, box-shadow 0.1s",
                                  }}
                                    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(10,30,51,0.08)"; }}
                                    onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
                                  >
                                    <div style={{ fontSize: 10, fontWeight: 700, color: style.text, display: "flex", alignItems: "center", gap: 4 }}>
                                      {sh.service_delivery_contexts && (
                                        <span title={`${sh.service_delivery_contexts.name} (${DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.label || sh.service_delivery_contexts.delivery_type})`}
                                          style={{ width: 6, height: 6, borderRadius: "50%", background: DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.color || CB.teal, flexShrink: 0 }} />
                                      )}
                                      {sh.scheduled_start.slice(0, 5)}–{sh.scheduled_end.slice(0, 5)}
                                    </div>
                                    <div style={{ fontSize: 11, fontWeight: 600, color: CB.navy, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                      {sh.persons ? `${sh.persons.first_name} ${sh.persons.last_name[0]}.` : "—"}
                                    </div>
                                    {sh.service_code_definitions?.code && (
                                      <div style={{ fontSize: 9, fontWeight: 700, color: style.text, marginTop: 1 }}>
                                        {sh.service_code_definitions.code}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                              {cellShifts.length === 0 && (
                                <div style={{ fontSize: 18, color: "transparent", textAlign: "center", padding: "10px 0", transition: "color 0.15s" }}
                                  onMouseEnter={e => e.currentTarget.style.color = CB.textLight}
                                  onMouseLeave={e => e.currentTarget.style.color = "transparent"}>+</div>
                              )}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ padding: "10px 16px", borderTop: `1px solid ${CB.border}`, fontSize: 11, color: CB.textLight, background: CB.cream }}>
                Click an empty cell to schedule. Click a shift to edit. Status auto-derives from EVV data where possible.
              </div>
            </div>
          ) : viewMode === "context" && !isMobile ? (
            /* ── BY-CONTEXT VIEW (v19.2) ── rows = contexts, columns = days */
            <div style={{ background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 960 }}>
                <thead>
                  <tr style={{ background: CB.cream }}>
                    <th style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.6, borderBottom: `1px solid ${CB.border}`, position: "sticky", left: 0, background: CB.cream, minWidth: 200 }}>Service Context</th>
                    {weekDays.map(d => {
                      const isToday = fmtISODate(d) === fmtISODate(new Date());
                      return (
                        <th key={d.toISOString()} style={{
                          padding: "11px 10px", textAlign: "center", fontSize: 11, fontWeight: 700,
                          color: isToday ? CB.teal : CB.textLight, textTransform: "uppercase", letterSpacing: 0.6,
                          borderBottom: `1px solid ${CB.border}`, minWidth: 120,
                          background: isToday ? `${CB.teal}08` : "transparent",
                        }}>
                          <div>{d.toLocaleDateString("en-US", { weekday: "short" })}</div>
                          <div style={{ fontSize: 14, fontWeight: 800, color: isToday ? CB.teal : CB.navy, marginTop: 2 }}>{d.getDate()}</div>
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {(filterContext ? contexts.filter(c => c.id === filterContext) : contexts).map(ctx => {
                    const meta = DELIVERY_TYPE_META[ctx.delivery_type] || {};
                    const memberCount = (contextMembers[ctx.id] || []).length;
                    return (
                      <tr key={ctx.id} style={{ borderBottom: `1px solid ${CB.border}` }}>
                        <td style={{ padding: "10px 14px", position: "sticky", left: 0, background: CB.white, borderRight: `1px solid ${CB.border}`, borderLeft: `3px solid ${meta.color || CB.teal}` }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>{ctx.name}</div>
                          <div style={{ fontSize: 10, fontWeight: 600, color: meta.color || CB.teal, marginTop: 2, display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ textTransform: "uppercase", letterSpacing: 0.5 }}>{meta.label || ctx.delivery_type}</span>
                            <span style={{ color: CB.textLight }}>·</span>
                            <span style={{ color: CB.textMid, fontWeight: 500 }}>{ctx.service_code_definitions?.code || "?"}</span>
                            <span style={{ color: CB.textLight }}>·</span>
                            <span style={{ color: CB.textMid, fontWeight: 500 }}>{memberCount} {memberCount === 1 ? "client" : "clients"}</span>
                          </div>
                        </td>
                        {weekDays.map(d => {
                          const dateStr = fmtISODate(d);
                          const cellShifts = shiftsByContextDate[`${ctx.id}__${dateStr}`] || [];
                          return (
                            <td key={dateStr} onClick={() => cellShifts.length === 0 && openNew(dateStr, null, ctx.id)} style={{
                              padding: 6, verticalAlign: "top", cursor: cellShifts.length === 0 ? "pointer" : "default",
                              borderRight: `1px solid ${CB.border}`, minHeight: 64, height: 64,
                              background: cellShifts.length === 0 ? "transparent" : `${CB.cream}30`,
                            }}
                              onMouseEnter={e => { if (cellShifts.length === 0) e.currentTarget.style.background = `${meta.color || CB.teal}08`; }}
                              onMouseLeave={e => { if (cellShifts.length === 0) e.currentTarget.style.background = "transparent"; }}
                            >
                              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                {cellShifts.map(sh => {
                                  const style = SHIFT_STATUS_STYLE[sh.derived_status] || SHIFT_STATUS_STYLE.scheduled;
                                  return (
                                    <div key={sh.id} onClick={(e) => { e.stopPropagation(); openEdit(sh); }} style={{
                                      padding: "5px 8px", borderRadius: 6, cursor: "pointer",
                                      background: style.bg, border: `1px solid ${style.border}40`, borderLeft: `3px solid ${style.border}`,
                                      transition: "transform 0.1s, box-shadow 0.1s",
                                    }}
                                      onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(10,30,51,0.08)"; }}
                                      onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
                                    >
                                      <div style={{ fontSize: 10, fontWeight: 700, color: style.text }}>
                                        {sh.scheduled_start.slice(0, 5)}–{sh.scheduled_end.slice(0, 5)}
                                      </div>
                                      <div style={{ fontSize: 11, fontWeight: 600, color: CB.navy, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                        {sh.staff ? `${sh.staff.first_name} ${sh.staff.last_name[0]}.` : "—"}
                                      </div>
                                      <div style={{ fontSize: 9, fontWeight: 600, color: CB.textMid, marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                        → {sh.persons ? `${sh.persons.first_name} ${sh.persons.last_name[0]}.` : "—"}
                                      </div>
                                    </div>
                                  );
                                })}
                                {cellShifts.length === 0 && (
                                  <div style={{ fontSize: 18, color: "transparent", textAlign: "center", padding: "12px 0", transition: "color 0.15s" }}
                                    onMouseEnter={e => e.currentTarget.style.color = CB.textLight}
                                    onMouseLeave={e => e.currentTarget.style.color = "transparent"}>+</div>
                                )}
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                  {/* Unassigned row — shifts with no context */}
                  {!filterContext && uncontextedShifts.length > 0 && (
                    <tr style={{ borderBottom: `1px solid ${CB.border}`, background: `${CB.cream}40` }}>
                      <td style={{ padding: "10px 14px", position: "sticky", left: 0, background: `${CB.cream}80`, borderRight: `1px solid ${CB.border}`, borderLeft: `3px solid ${CB.textLight}` }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: CB.textMid }}>No context</div>
                        <div style={{ fontSize: 10, fontWeight: 600, color: CB.textLight, marginTop: 2 }}>
                          {uncontextedShifts.length} shift{uncontextedShifts.length === 1 ? "" : "s"} without context
                        </div>
                      </td>
                      {weekDays.map(d => {
                        const dateStr = fmtISODate(d);
                        const cellShifts = uncontextedShifts.filter(s => s.scheduled_date === dateStr);
                        return (
                          <td key={dateStr} style={{
                            padding: 6, verticalAlign: "top",
                            borderRight: `1px solid ${CB.border}`, minHeight: 50,
                          }}>
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                              {cellShifts.map(sh => {
                                const style = SHIFT_STATUS_STYLE[sh.derived_status] || SHIFT_STATUS_STYLE.scheduled;
                                return (
                                  <div key={sh.id} onClick={() => openEdit(sh)} style={{
                                    padding: "4px 8px", borderRadius: 6, cursor: "pointer",
                                    background: CB.white, border: `1px dashed ${CB.border}`, borderLeft: `3px solid ${style.border}`,
                                  }}>
                                    <div style={{ fontSize: 10, fontWeight: 700, color: style.text }}>
                                      {sh.scheduled_start.slice(0, 5)}
                                    </div>
                                    <div style={{ fontSize: 10, fontWeight: 600, color: CB.navy, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                      {sh.staff ? sh.staff.last_name : "—"} → {sh.persons ? sh.persons.last_name : "—"}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  )}
                  {contexts.length === 0 && (
                    <tr>
                      <td colSpan={weekDays.length + 1} style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 13 }}>
                        No service contexts defined yet. <button onClick={() => onNavigate("contexts")} style={{ background: "none", border: "none", color: CB.teal, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>Create contexts →</button>
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
              <div style={{ padding: "10px 16px", borderTop: `1px solid ${CB.border}`, fontSize: 11, color: CB.textLight, background: CB.cream }}>
                Rows are service contexts. Click an empty cell to schedule a shift for that context on that day. Shifts without a context are grouped at the bottom.
              </div>
            </div>
          ) : (
            /* ── LIST VIEW ── (also used on mobile) */
            <div>
              {weekDays.map(d => {
                const dateStr = fmtISODate(d);
                const dayShifts = visibleShifts.filter(s => s.scheduled_date === dateStr).sort((a, b) => a.scheduled_start.localeCompare(b.scheduled_start));
                const isToday = dateStr === fmtISODate(new Date());
                const label = d.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
                return (
                  <CollapsibleTimeGroup key={dateStr} label={isToday ? `${label} · Today` : label} count={dayShifts.length} defaultOpen={isToday || dayShifts.length > 0} accentColor={isToday ? CB.teal : CB.blue}>
                    {dayShifts.length === 0 ? (
                      <div style={{ padding: "14px 16px", textAlign: "center", fontSize: 12, color: CB.textLight, background: CB.cream, borderRadius: 8 }}>
                        No shifts scheduled.
                        <button onClick={() => openNew(dateStr)} style={{
                          marginLeft: 10, padding: "4px 10px", borderRadius: 6, border: `1px solid ${CB.teal}40`,
                          background: `${CB.teal}10`, color: CB.teal, fontSize: 11, fontWeight: 600,
                          cursor: "pointer", fontFamily: "inherit",
                        }}>+ Add shift</button>
                      </div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {dayShifts.map(sh => {
                          const style = SHIFT_STATUS_STYLE[sh.derived_status] || SHIFT_STATUS_STYLE.scheduled;
                          return (
                            <div key={sh.id} onClick={() => openEdit(sh)} style={{
                              padding: "10px 14px", borderRadius: 10, background: CB.cream,
                              border: `1px solid ${CB.border}`, borderLeft: `4px solid ${style.border}`,
                              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between",
                              gap: 12, flexWrap: "wrap", transition: "all 0.15s",
                            }}
                              onMouseEnter={e => { e.currentTarget.style.background = CB.white; e.currentTarget.style.borderColor = style.border; }}
                              onMouseLeave={e => { e.currentTarget.style.background = CB.cream; e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.borderLeftColor = style.border; }}
                            >
                              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                                <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy, minWidth: 100 }}>
                                  {sh.scheduled_start.slice(0, 5)} – {sh.scheduled_end.slice(0, 5)}
                                </span>
                                <span style={{ fontSize: 13, color: CB.text, fontWeight: 600 }}>
                                  {sh.staff ? `${sh.staff.first_name} ${sh.staff.last_name}` : "—"}
                                </span>
                                <span style={{ fontSize: 12, color: CB.textMid }}>
                                  → {sh.persons ? `${sh.persons.first_name} ${sh.persons.last_name}` : "—"}
                                </span>
                                {sh.service_code_definitions?.code && <Badge text={sh.service_code_definitions.code} color={CB.blue} />}
                                {sh.service_delivery_contexts && (
                                  <span style={{
                                    fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6,
                                    background: `${DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.color || CB.teal}15`,
                                    color: DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.color || CB.teal,
                                    display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap",
                                  }} title={`Context: ${DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.label || sh.service_delivery_contexts.delivery_type}`}>
                                    <span style={{ width: 5, height: 5, borderRadius: "50%", background: DELIVERY_TYPE_META[sh.service_delivery_contexts.delivery_type]?.color || CB.teal }} />
                                    {sh.service_delivery_contexts.name}
                                  </span>
                                )}
                                {sh.location && <span style={{ fontSize: 11, color: CB.textLight }}>{icons.mapPin({ size: 10, color: CB.textLight })} {sh.location}</span>}
                              </div>
                              <Badge text={style.label} color={style.border} />
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </CollapsibleTimeGroup>
                );
              })}
            </div>
          )}

          <ShiftForm
            open={showForm}
            onClose={() => setShowForm(false)}
            onSaved={loadWeek}
            editing={editing}
            prefillDate={prefillDate}
            prefillStaffId={prefillStaffId}
            prefillContextId={prefillContextId}
          />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 5: EVV CLOCK IN / OUT — GPS-based with geofence
    // ═══════════════════════════════════════════════════════════════
    function EVVPage() {
      const { addToast } = useToast();
      const { orgId, enforcement } = useAuth();
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [staffList, setStaffList] = useState([]);
      const [clients, setClients] = useState([]);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [clockingIn, setClockingIn] = useState(false);
      const [clockingOut, setClockingOut] = useState(null);
      const [gpsStatus, setGpsStatus] = useState(null);
      const [showClockIn, setShowClockIn] = useState(false);
      const [clockForm, setClockForm] = useState({ staff_id: "", person_id: "", service_code_id: "", context_id: "" });
      const [viewing, setViewing] = useState(null);
      const [editingEVV, setEditingEVV] = useState(false);
      const [evvEditForm, setEvvEditForm] = useState({});
      const [savingEVV, setSavingEVV] = useState(false);
      const [clientEvvAuths, setClientEvvAuths] = useState([]);
      const [clientContexts, setClientContexts] = useState([]); // v19.2 — contexts the picked client is a member of
      // v19.3 — competency data
      const [decks, setDecks] = useState([]);
      const [deckSvcCodes, setDeckSvcCodes] = useState([]);
      const [deckCompletions, setDeckCompletions] = useState([]);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        // v19.2 — try to include context join; fall back if column/relationship not present
        const evvSelect = "id, clock_in_at, clock_out_at, clock_in_lat, clock_in_lng, clock_out_lat, clock_out_lng, geofence_valid, exceptions, context_id, staff(first_name, last_name), persons(first_name, last_name), service_code_definitions(code), service_delivery_contexts(id, name, delivery_type)";
        const evvSelectLegacy = "id, clock_in_at, clock_out_at, clock_in_lat, clock_in_lng, clock_out_lat, clock_out_lng, geofence_valid, exceptions, staff(first_name, last_name), persons(first_name, last_name), service_code_definitions(code)";
        let sessRes = await supabase.from("evv_sessions").select(evvSelect).order("clock_in_at", { ascending: false }).limit(50);
        if (sessRes.error && /(column|relationship).*context/i.test(sessRes.error.message || "")) {
          sessRes = await supabase.from("evv_sessions").select(evvSelectLegacy).order("clock_in_at", { ascending: false }).limit(50);
        }
        const [staffRes, clientRes, scRes] = await Promise.all([
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name"),
          supabase.from("service_code_definitions").select("id, code, name, evv_required").order("code"),
        ]);
        if (!sessRes.error) setSessions(sessRes.data || []);
        setStaffList(staffRes.data || []);
        setClients(clientRes.data || []);
        setServiceCodes((scRes.data || []).filter(sc => sc.evv_required));
        // v19.3 — load deck data for competency checks
        const [d, m, c] = await Promise.all([
          supabase.from("training_decks").select("id, name, deck_type, is_active"),
          supabase.from("training_deck_service_codes").select("deck_id, service_code_id"),
          supabase.from("staff_deck_completions").select("staff_id, deck_id, person_id, completed_at, expires_at"),
        ]);
        if (!d.error) setDecks(d.data || []);
        if (!m.error) setDeckSvcCodes(m.data || []);
        if (!c.error) setDeckCompletions(c.data || []);
        setLoading(false);
      };

      // v19.3 — competency for the in-progress clock-in
      const evvCompetency = useMemo(() => {
        if (!clockForm.staff_id) return null;
        if (decks.length === 0) return null;
        return computeCompetency({
          staffId: clockForm.staff_id,
          serviceCodeId: clockForm.service_code_id || null,
          personId: clockForm.person_id || null,
          decks, deckServiceCodes: deckSvcCodes, completions: deckCompletions,
          requirePersonSpecific: !!clockForm.person_id,
        });
      }, [clockForm.staff_id, clockForm.service_code_id, clockForm.person_id, decks, deckSvcCodes, deckCompletions]);

      // When client changes in clock-in form, load their authorized EVV codes + context memberships (v19.2)
      const handleEvvClientChange = async (personId) => {
        setClockForm(p => ({ ...p, person_id: personId, service_code_id: "", context_id: "" }));
        if (personId) {
          const [authRes, ctxRes] = await Promise.all([
            supabase.from("person_service_authorizations")
              .select("service_code_id, service_code_definitions(id, code, name, evv_required)")
              .eq("person_id", personId),
            // v19.2 — pull active context memberships for this client
            supabase.from("service_delivery_context_members")
              .select("context_id, is_active, end_date, service_delivery_contexts(id, name, delivery_type, service_code_id, is_active, service_code_definitions(id, code, name, evv_required))")
              .eq("person_id", personId),
          ]);
          // Only keep EVV-required codes from their auths
          const evvAuths = (authRes.data || []).filter(a => a.service_code_definitions?.evv_required);
          setClientEvvAuths(evvAuths.map(a => a.service_code_definitions));

          // v19.2 — keep only active memberships in active contexts
          if (ctxRes.error) {
            setClientContexts([]);
          } else {
            const active = (ctxRes.data || []).filter(m =>
              m.is_active !== false &&
              !m.end_date &&
              m.service_delivery_contexts &&
              m.service_delivery_contexts.is_active !== false
            );
            setClientContexts(active.map(m => m.service_delivery_contexts));
          }
        } else {
          setClientEvvAuths([]);
          setClientContexts([]);
        }
      };

      // v19.2 — when context picked, auto-fill its service code if EVV-required
      const handleEvvContextChange = (contextId) => {
        const ctx = clientContexts.find(c => c.id === contextId);
        setClockForm(p => ({
          ...p,
          context_id: contextId,
          service_code_id: ctx?.service_code_definitions?.evv_required ? ctx.service_code_id : p.service_code_id,
        }));
      };

      // Determine which codes to show in dropdown: client-filtered if client selected, else all EVV codes
      const evvCodesForDropdown = clockForm.person_id && clientEvvAuths.length > 0 ? clientEvvAuths : serviceCodes;

      // Force a fresh GPS fix — watchPosition is more reliable than getCurrentPosition
      // on mobile browsers that aggressively cache location
      const getGPS = () => new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
        setGpsStatus("locating");
        let resolved = false;
        const watchId = navigator.geolocation.watchPosition(
          pos => {
            if (resolved) return;
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("found");
            resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy });
          },
          err => {
            if (resolved) return;
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("error");
            reject(err);
          },
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
        // Safety timeout — clear watch if it hangs
        setTimeout(() => {
          if (!resolved) {
            resolved = true;
            navigator.geolocation.clearWatch(watchId);
            setGpsStatus("error");
            reject(new Error("GPS timeout — try again or check location permissions"));
          }
        }, 22000);
      });

      const handleClockIn = async () => {
        if (!clockForm.staff_id || !clockForm.person_id || !clockForm.service_code_id) {
          return addToast("Select staff, client, and service code", "error");
        }
        // v19.3 — enforce competency if "block" is set
        if (evvCompetency && !evvCompetency.isFullyQualified && enforcement) {
          const personSpecificMissing = evvCompetency.missing.some(m => m.deck.deck_type === "person_specific" || m.scopePersonId);
          const personExpired = evvCompetency.expired.some(m => m.deck.deck_type === "person_specific" || m.scopePersonId);
          const generalMissing = evvCompetency.missing.some(m => m.deck.deck_type === "universal" || m.deck.deck_type === "service_code");
          const generalExpired = evvCompetency.expired.some(m => m.deck.deck_type === "universal" || m.deck.deck_type === "service_code");
          if (enforcement.training === "block" && (generalMissing || generalExpired)) {
            return addToast("Cannot clock in — staff is missing required universal or service-code training.", "error");
          }
          if (enforcement.person_specific === "block" && (personSpecificMissing || personExpired)) {
            return addToast("Cannot clock in — staff has not completed person-specific training for this client.", "error");
          }
        }
        setClockingIn(true);
        try {
          const gps = await getGPS();
          const now = new Date();
          const nowISO = now.toISOString();

          // ── v19.0: look for a scheduled shift to link ──
          // Match: same staff+client, same day, scheduled_start within ±60 min of now, status still "scheduled"
          // v19.2: also inherit context_id from the matched shift
          let matchedShiftId = null;
          let matchedShiftContextId = null;
          try {
            const today = fmtISODate(now);
            const shiftSel = "id, scheduled_start, scheduled_end, status, context_id";
            const shiftSelLegacy = "id, scheduled_start, scheduled_end, status";
            let candidateRes = await supabase.from("shifts")
              .select(shiftSel)
              .eq("staff_id", clockForm.staff_id)
              .eq("person_id", clockForm.person_id)
              .eq("scheduled_date", today)
              .eq("status", "scheduled");
            if (candidateRes.error && /column .*context_id.* does not exist/i.test(candidateRes.error.message || "")) {
              candidateRes = await supabase.from("shifts")
                .select(shiftSelLegacy)
                .eq("staff_id", clockForm.staff_id)
                .eq("person_id", clockForm.person_id)
                .eq("scheduled_date", today)
                .eq("status", "scheduled");
            }
            const candidateShifts = candidateRes.data;
            if (Array.isArray(candidateShifts) && candidateShifts.length > 0) {
              const match = candidateShifts.find(sh => {
                const start = new Date(`${today}T${sh.scheduled_start}`);
                return Math.abs(now - start) <= 60 * 60 * 1000;
              });
              if (match) {
                matchedShiftId = match.id;
                matchedShiftContextId = match.context_id || null;
              }
            }
          } catch (e) {
            // Shifts table may not exist yet — ignore and proceed with EVV only
          }

          // v19.2 — context priority: explicitly picked > inherited from shift
          const effectiveContextId = clockForm.context_id || matchedShiftContextId || null;

          const evvPayload = {
            org_id: orgId,
            staff_id: clockForm.staff_id,
            person_id: clockForm.person_id,
            service_code_id: clockForm.service_code_id,
            clock_in_at: nowISO,
            clock_in_lat: gps.lat,
            clock_in_lng: gps.lng,
          };
          if (matchedShiftId) evvPayload.shift_id = matchedShiftId;
          if (effectiveContextId) evvPayload.context_id = effectiveContextId;

          let { error } = await supabase.from("evv_sessions").insert(evvPayload);
          // If shift_id column doesn't exist yet, retry without it
          if (error && /column .*shift_id.* does not exist/i.test(error.message || "")) {
            delete evvPayload.shift_id;
            const retry = await supabase.from("evv_sessions").insert(evvPayload);
            error = retry.error;
          }
          // v19.2 — if context_id column doesn't exist yet, retry without it
          if (error && /column .*context_id.* does not exist/i.test(error.message || "")) {
            delete evvPayload.context_id;
            const retry = await supabase.from("evv_sessions").insert(evvPayload);
            error = retry.error;
            if (!error && effectiveContextId) {
              addToast("Clocked in — context not stored (run v19.2 migration)", "warning");
            }
          }
          if (error) throw error;

          // If we matched a shift, advance its status to in_progress
          if (matchedShiftId) {
            await supabase.from("shifts").update({ status: "in_progress" }).eq("id", matchedShiftId);
            addToast(effectiveContextId ? "Clocked in — shift + context linked" : "Clocked in — shift linked", "success");
          } else if (effectiveContextId) {
            addToast("Clocked in — context linked", "success");
          } else {
            addToast("Clocked in successfully", "success");
          }
          setShowClockIn(false);
          loadAll();
        } catch (e) {
          addToast(e.message || "Clock-in failed", "error");
        }
        setClockingIn(false);
        setGpsStatus(null);
      };

      const handleClockOut = async (sessionId) => {
        setClockingOut(sessionId);
        try {
          const gps = await getGPS();
          // Check if this session is linked to a shift (graceful if column doesn't exist)
          let linkedShiftId = null;
          try {
            const { data: sess } = await supabase.from("evv_sessions").select("shift_id").eq("id", sessionId).maybeSingle();
            if (sess && sess.shift_id) linkedShiftId = sess.shift_id;
          } catch (e) { /* column may not exist — ignore */ }

          const { error } = await supabase.from("evv_sessions").update({
            clock_out_at: new Date().toISOString(),
            clock_out_lat: gps.lat,
            clock_out_lng: gps.lng,
          }).eq("id", sessionId);
          if (error) throw error;

          // Advance linked shift to "completed"
          if (linkedShiftId) {
            await supabase.from("shifts").update({ status: "completed" }).eq("id", linkedShiftId);
            addToast("Clocked out — shift marked completed", "success");
          } else {
            addToast("Clocked out successfully", "success");
          }
          loadAll();
        } catch (e) {
          addToast(e.message || "Clock-out failed", "error");
        }
        setClockingOut(null);
        setGpsStatus(null);
      };

      const activeSessions = sessions.filter(s => !s.clock_out_at);
      const completedSessions = sessions.filter(s => s.clock_out_at);

      const formatTime = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      };

      const formatDate = (iso) => {
        if (!iso) return "—";
        return new Date(iso).toLocaleDateString();
      };

      const openEVVDetail = (session) => {
        setViewing(session);
        setEditingEVV(false);
        setEvvEditForm({
          clock_in_at: session.clock_in_at?.slice(0, 16) || "",
          clock_out_at: session.clock_out_at?.slice(0, 16) || "",
          exceptions: session.exceptions || "",
        });
      };

      const saveEVVEdit = async () => {
        setSavingEVV(true);
        const updates = {};
        if (evvEditForm.clock_out_at) updates.clock_out_at = new Date(evvEditForm.clock_out_at).toISOString();
        if (evvEditForm.exceptions !== undefined) updates.exceptions = evvEditForm.exceptions || null;
        const { error } = await supabase.from("evv_sessions").update(updates).eq("id", viewing.id);
        setSavingEVV(false);
        if (error) return addToast(error.message, "error");
        addToast("EVV session updated", "success");
        setViewing(null);
        loadAll();
      };

      const columns = [
        { label: "Date", bold: true, render: (r) => formatDate(r.clock_in_at) },
        { label: "Staff", render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Client", render: (r) => r.persons ? `${r.persons.first_name} ${r.persons.last_name}` : "—" },
        { label: "Code", render: (r) => <Badge text={r.service_code_definitions?.code || "?"} color={CB.blue} /> },
        { label: "Context", render: (r) => {
          if (!r.service_delivery_contexts) return <span style={{ fontSize: 11, color: CB.textLight }}>—</span>;
          const meta = DELIVERY_TYPE_META[r.service_delivery_contexts.delivery_type] || {};
          return (
            <span style={{
              fontSize: 11, fontWeight: 700, padding: "3px 8px", borderRadius: 6,
              background: `${meta.color || CB.teal}15`, color: meta.color || CB.teal,
              display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap", maxWidth: 180,
            }} title={r.service_delivery_contexts.name}>
              <span style={{ width: 5, height: 5, borderRadius: "50%", background: meta.color || CB.teal, flexShrink: 0 }} />
              <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{r.service_delivery_contexts.name}</span>
            </span>
          );
        }},
        { label: "In", render: (r) => formatTime(r.clock_in_at) },
        { label: "Out", render: (r) => formatTime(r.clock_out_at) },
        { label: "GPS", render: (r) => {
          if (r.geofence_valid === true) return <Badge text="✓ Verified" color={CB.green} />;
