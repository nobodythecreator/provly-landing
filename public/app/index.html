                    <div style={{ fontSize: 26, fontWeight: 800, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Goals List */}
              {activeGoals.length === 0 ? (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 48, textAlign: "center",
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                }}>
                  <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.teal}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
                    {icons.crosshair({ size: 28, color: CB.teal })}
                  </div>
                  <p style={{ fontSize: 15, fontWeight: 600, color: CB.navy }}>No goals yet</p>
                  <p style={{ fontSize: 13, color: CB.textMid }}>Add ISP goals to start tracking progress.</p>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {activeGoals.map((goal, gi) => {
                    const statusDef = GOAL_STATUSES.find(s => s.value === goal.status);
                    const goalNotes = progressNotes.filter(n => n.goal_id === goal.id).slice(0, 5);
                    const isExpanded = expandedGoal === goal.id;
                    const avgRating = goalNotes.length > 0 ? (goalNotes.reduce((s,n) => s + (n.progress_rating||0), 0) / goalNotes.length).toFixed(1) : null;

                    return (
                      <div key={goal.id} style={{
                        background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`,
                        boxShadow: CB.cardShadow, overflow: "hidden",
                        animation: `fadeIn 0.4s ease ${gi * 0.05}s both`,
                      }}>
                        {/* Goal Header */}
                        <div onClick={() => setExpandedGoal(isExpanded ? null : goal.id)} style={{
                          padding: isMobile ? "16px" : "18px 24px", cursor: "pointer",
                          display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12,
                        }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                              <span style={{
                                padding: "3px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700,
                                background: `${CB.navy}10`, color: CB.navy, textTransform: "uppercase", letterSpacing: 0.5,
                              }}>{goal.domain}</span>
                              <span style={{
                                padding: "3px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700,
                                background: `${statusDef?.color || CB.textLight}14`, color: statusDef?.color || CB.textLight,
                              }}>{statusDef?.label || goal.status}</span>
                              {avgRating && (
                                <span style={{ fontSize: 12, color: CB.textMid, fontWeight: 600 }}>
                                  Avg: {avgRating}/5 ({goalNotes.length} notes)
                                </span>
                              )}
                            </div>
                            <p style={{ fontSize: 14, fontWeight: 600, color: CB.text, margin: 0, lineHeight: 1.4 }}>{goal.goal_description}</p>
                            {goal.target_date && (
                              <span style={{ fontSize: 12, color: CB.textLight, marginTop: 4, display: "inline-block" }}>
                                Target: {new Date(goal.target_date + "T00:00:00").toLocaleDateString()}
                              </span>
                            )}
                          </div>
                          <div style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s", flexShrink: 0 }}>
                            {icons.chevDown({ size: 18, color: CB.textLight })}
                          </div>
                        </div>

                        {/* Expanded Detail */}
                        {isExpanded && (
                          <div style={{ borderTop: `1px solid ${CB.border}` }}>
                            {/* Goal Details */}
                            <div style={{ padding: "16px 24px", background: CB.cream, display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12, fontSize: 13 }}>
                              {goal.objectives && <div><strong style={{ color: CB.textMid }}>Objectives:</strong><br/>{goal.objectives}</div>}
                              {goal.baseline && <div><strong style={{ color: CB.textMid }}>Baseline:</strong><br/>{goal.baseline}</div>}
                              {goal.target_criteria && <div><strong style={{ color: CB.textMid }}>Target Criteria:</strong><br/>{goal.target_criteria}</div>}
                              {goal.teaching_strategies && <div><strong style={{ color: CB.textMid }}>Teaching Strategies:</strong><br/>{goal.teaching_strategies}</div>}
                              {goal.support_needed && <div style={{ gridColumn: isMobile ? "1" : "1/3" }}><strong style={{ color: CB.textMid }}>Support Needed:</strong><br/>{goal.support_needed}</div>}
                            </div>

                            {/* Actions */}
                            <div style={{ padding: "12px 24px", display: "flex", gap: 8, borderTop: `1px solid ${CB.border}`, borderBottom: `1px solid ${CB.border}` }}>
                              <button onClick={() => setShowNoteForm(goal.id)} style={{
                                padding: "8px 16px", borderRadius: 8, border: "none", background: CB.teal, color: CB.white,
                                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6,
                              }}>{icons.plus({ size: 13 })} Log Progress</button>
                              <button onClick={() => { setEditingGoal(goal); setShowGoalForm(true); }} style={{
                                padding: "8px 16px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: CB.textMid,
                              }}>Edit Goal</button>
                            </div>

                            {/* Progress Notes Timeline */}
                            <div style={{ padding: "16px 24px" }}>
                              <h4 style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Progress Notes</h4>
                              {goalNotes.length === 0 ? (
                                <p style={{ fontSize: 13, color: CB.textLight, fontStyle: "italic" }}>No progress notes yet. Click "Log Progress" to add one.</p>
                              ) : (
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                  {goalNotes.map((note, ni) => {
                                    const ratingDef = PROGRESS_RATINGS.find(r => r.value === note.progress_rating);
                                    return (
                                      <div key={note.id} style={{
                                        display: "flex", gap: 12, padding: "10px 14px", borderRadius: 10,
                                        background: CB.cream, border: `1px solid ${CB.border}`,
                                      }}>
                                        <div style={{
                                          width: 32, height: 32, borderRadius: 8, flexShrink: 0,
                                          background: `${ratingDef?.color || CB.textLight}18`,
                                          display: "flex", alignItems: "center", justifyContent: "center",
                                          fontSize: 14, fontWeight: 800, color: ratingDef?.color || CB.textLight,
                                        }}>{note.progress_rating}</div>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ fontSize: 12, fontWeight: 600, color: ratingDef?.color || CB.textMid }}>{ratingDef?.label}</span>
                                            <span style={{ fontSize: 11, color: CB.textLight }}>
                                              {new Date(note.note_date + "T00:00:00").toLocaleDateString()}
                                              {note.staff && ` — ${note.staff.first_name} ${note.staff.last_name}`}
                                            </span>
                                          </div>
                                          <p style={{ fontSize: 13, color: CB.text, margin: 0, lineHeight: 1.4 }}>{note.narrative}</p>
                                          {note.data_point && (
                                            <div style={{ fontSize: 12, color: CB.teal, fontWeight: 600, marginTop: 4 }}>📊 {note.data_point}</div>
                                          )}
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {showGoalForm && <GoalForm />}
          {showNoteForm && <NoteForm goalId={showNoteForm} />}

          {/* Summary Modal */}
          {showSummary && (
            <Modal open={true} onClose={() => setShowSummary(false)} title="Quarterly PCSP Summary" width={700}>
              <div style={{ padding: "20px 28px 24px" }}>
                <pre style={{
                  whiteSpace: "pre-wrap", wordWrap: "break-word", fontSize: 12, lineHeight: 1.6,
                  background: CB.cream, padding: 20, borderRadius: 12, border: `1px solid ${CB.border}`,
                  maxHeight: "55vh", overflowY: "auto", fontFamily: "'Courier New', monospace",
                }}>{summaryText}</pre>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
                  <button onClick={() => { navigator.clipboard.writeText(summaryText); addToast("Copied to clipboard", "success"); }} style={{
                    padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                    color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Copy</button>
                  <button onClick={exportPDF} style={{
                    padding: "10px 20px", borderRadius: 10, border: "none", background: CB.navy, color: CB.white,
                    fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Export PDF</button>
                  <button onClick={() => setShowSummary(false)} style={{
                    padding: "10px 20px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white,
                    fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  }}>Close</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // BILLING & CLAIMS — real claim engine from service notes
    // ═══════════════════════════════════════════════════════════════
    function BillingPage({ embedded = false }) {
      const [claims, setClaims] = useState([]);
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(true);
      const [dateRange, setDateRange] = useState(() => {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split("T")[0];
        const end = now.toISOString().split("T")[0];
        return { start, end };
      });
      const perms = usePermissions();

      useEffect(() => { generateClaims(); }, [dateRange.start, dateRange.end]);

      const generateClaims = async () => {
        setLoading(true);
        try {
          // Pull all service notes in range with related data
          let query = supabase.from("service_notes")
            .select("id, service_date, start_time, end_time, duration_minutes, billable_units, status, staff!service_notes_staff_id_fkey(first_name, last_name), persons(id, first_name, last_name, medicaid_number), service_code_definitions(id, code, name)")
            .gte("service_date", dateRange.start)
            .lte("service_date", dateRange.end)
            .order("service_date", { ascending: false });

          const { data: notes } = await query;

          // Pull all auths for rate lookup
          const { data: auths } = await supabase.from("person_service_authorizations")
            .select("id, person_id, service_code_id, authorized_units, used_units, rate_per_unit, service_code_definitions(code)");

          const authMap = {};
          (auths || []).forEach(a => {
            const key = `${a.person_id}_${a.service_code_id}`;
            authMap[key] = a;
          });

          // Build claims from notes
          const claimRows = (notes || []).map(note => {
            const code = note.service_code_definitions?.code;
            const rule = BILLING_RULES[code];
            const authKey = `${note.persons?.id}_${note.service_code_definitions?.id}`;
            const auth = authMap[authKey];
            const authRate = auth?.rate_per_unit ? Number(auth.rate_per_unit) : null;

            let units = note.billable_units || calculateBillableUnits(code, note.duration_minutes);
            let rate = null;
            let amount = null;

            if (rule) {
              if (rule.unit_type === "tiered_daily" && note.duration_minutes) {
                const tier = getTieredRate(code, note.duration_minutes);
                rate = rule.worksheet ? authRate : (tier?.max_rate || null);
              } else {
                rate = rule.worksheet ? authRate : (rule.rate || null);
              }
              if (rate && units) amount = rate * units;
            }

            return {
              id: note.id,
              date: note.service_date,
              staff: note.staff ? `${note.staff.first_name} ${note.staff.last_name}` : "—",
              client: note.persons ? `${note.persons.first_name} ${note.persons.last_name}` : "—",
              medicaid: note.persons?.medicaid_number || "—",
              code,
              codeName: note.service_code_definitions?.name || "",
              units,
              rate,
              amount,
              status: note.status || "draft",
              worksheet: rule?.worksheet || false,
              unitType: rule?.unit_type || "quarter_hour",
              duration: note.duration_minutes,
            };
          });

          // Summary stats
          const totalClaims = claimRows.length;
          const totalAmount = claimRows.reduce((sum, c) => sum + (c.amount || 0), 0);
          const byStatus = { draft: 0, submitted: 0, approved: 0, rejected: 0 };
          claimRows.forEach(c => { byStatus[c.status] = (byStatus[c.status] || 0) + (c.amount || 0); });

          // Group by client for summary
          const byClient = {};
          claimRows.forEach(c => {
            if (!byClient[c.client]) byClient[c.client] = { client: c.client, medicaid: c.medicaid, notes: 0, amount: 0, codes: new Set() };
            byClient[c.client].notes++;
            byClient[c.client].amount += c.amount || 0;
            if (c.code) byClient[c.client].codes.add(c.code);
          });

          setClaims(claimRows);
          setSummary({ totalClaims, totalAmount, byStatus, byClient: Object.values(byClient) });
        } catch (e) { /* billing error */ }
        setLoading(false);
      };

      const exportCSV = () => {
        const headers = ["Date", "Staff", "Client", "Medicaid #", "Code", "Units", "Rate", "Amount", "Status"];
        const rows = claims.map(c => [
          c.date, c.staff, c.client, c.medicaid, c.code,
          c.units || "", c.rate ? c.rate.toFixed(2) : "", c.amount ? c.amount.toFixed(2) : "", c.status
        ]);
        const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `provly-claims-${dateRange.start}-to-${dateRange.end}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const statusColors = { draft: CB.amber, submitted: CB.blue, approved: CB.green, rejected: CB.red };

      const columns = [
        { label: "Date", bold: true, render: (r) => r.date ? new Date(r.date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Client", render: (r) => r.client },
        { label: "Code", render: (r) => (
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <Badge text={r.code || "?"} color={CB.blue} />
            {r.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700 }}>WS</span>}
          </div>
        )},
        { label: "Staff", render: (r) => r.staff },
        { label: "Units", render: (r) => {
          if (!r.units) return "—";
          const rule = BILLING_RULES[r.code];
          return (
            <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontWeight: 600 }}>{r.units}</span>
              <span style={{ fontSize: 11, color: CB.textLight }}>{rule?.label || "qtr-hr"}</span>
            </span>
          );
        }},
        ...(perms.viewRates ? [
          { label: "Rate", render: (r) => r.rate ? <span style={{ fontWeight: 600, color: CB.teal }}>${r.rate.toFixed(2)}</span> : <span style={{ color: CB.textLight }}>—</span> },
          { label: "Amount", render: (r) => r.amount ? <span style={{ fontWeight: 700, color: CB.navy }}>${r.amount.toFixed(2)}</span> : <span style={{ color: CB.textLight }}>—</span> },
        ] : []),
        { label: "Status", render: (r) => <Badge text={r.status} color={statusColors[r.status] || CB.textLight} /> },
      ];

      return (
        <div>
          {!embedded ? (
            <PageHeader title="Billing & Claims" subtitle="Auto-calculated claims from service notes with DHHS91172 rate table rules"
              action={
                <div style={{ display: "flex", gap: 8 }}>
                  <SecondaryButton onClick={exportCSV}>{icons.barChart({ size: 15 })} Export CSV</SecondaryButton>
                  <PrimaryButton onClick={generateClaims}>{icons.refresh({ size: 16 })} Recalculate</PrimaryButton>
                </div>
              }
            />
          ) : (
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginBottom: 16 }}>
              <SecondaryButton onClick={exportCSV}>{icons.barChart({ size: 15 })} Export CSV</SecondaryButton>
              <PrimaryButton onClick={generateClaims}>{icons.refresh({ size: 16 })} Recalculate</PrimaryButton>
            </div>
          )}

          {/* Date range filter */}
          <div style={{
            display: "flex", alignItems: "center", gap: 12, marginBottom: 20, padding: "14px 20px",
            background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`, boxShadow: "0 1px 3px rgba(10,30,51,0.04)",
          }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: CB.navy }}>{icons.calendar({ size: 16, color: CB.navy })} Period:</span>
            <input type="date" value={dateRange.start} onChange={e => setDateRange(p => ({ ...p, start: e.target.value }))} style={{ ...fieldStyle, width: 160, padding: "8px 12px", fontSize: 13 }} />
            <span style={{ color: CB.textLight, fontWeight: 600 }}>to</span>
            <input type="date" value={dateRange.end} onChange={e => setDateRange(p => ({ ...p, end: e.target.value }))} style={{ ...fieldStyle, width: 160, padding: "8px 12px", fontSize: 13 }} />
          </div>

          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : summary && (
            <>
              {/* Summary cards */}
              <RGrid cols={4} gap={18} style={{ marginBottom: 28 }}>
                <StatCard label="Total Claims" value={summary.totalClaims} icon={icons.fileText} color={CB.navy} delay={0} />
                {perms.viewRates && (
                  <StatCard label="Total Amount" value={`$${summary.totalAmount.toFixed(2)}`} icon={icons.barChart} color={CB.teal} delay={0.05} />
                )}
                <StatCard label="Approved" value={`$${(summary.byStatus.approved || 0).toFixed(2)}`} icon={icons.checkCircle} color={CB.green} delay={0.1} />
                <StatCard label="Pending" value={`$${((summary.byStatus.draft || 0) + (summary.byStatus.submitted || 0)).toFixed(2)}`} icon={icons.clock} color={CB.amber} delay={0.15} />
              </RGrid>

              {/* Per-client summary */}
              {perms.viewRates && summary.byClient.length > 0 && (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 24, marginBottom: 20,
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, animation: "fadeIn 0.4s ease",
                }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 16 }}>Revenue by Client</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
                    {summary.byClient.sort((a, b) => b.amount - a.amount).map((c, i) => (
                      <div key={i} style={{
                        padding: "14px 16px", borderRadius: 12, background: CB.cream,
                        border: `1px solid ${CB.border}`, animation: `fadeIn 0.3s ease ${i * 0.05}s both`,
                      }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{c.client}</div>
                        <div style={{ fontSize: 12, color: CB.textLight, marginTop: 2 }}>{c.notes} notes — {[...c.codes].join(", ")}</div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: CB.teal, marginTop: 8 }}>${c.amount.toFixed(2)}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Claims table */}
              <DataTable columns={columns} data={claims} loading={false} emptyMessage="No claims found for this period" />
            </>
          )}
        </div>
      );
    }


    // ═══════════════════════════════════════════════════════════════
    // FINANCIAL MANAGEMENT — payments, aging, claims, contracts, UPI import
    // ═══════════════════════════════════════════════════════════════
    const UPI_UNIT_MAP = { Q: "Quarter-Hour", D: "Daily", M: "Monthly", S: "Session", H: "Hourly" };

    function FinancePage() {
      const [tab, setTab] = useState("overview");
      const [contracts, setContracts] = useState([]);
      const [payments, setPayments] = useState([]);
      const [claims, setClaims] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showPaymentForm, setShowPaymentForm] = useState(false);
      const [showContractForm, setShowContractForm] = useState(false);
      const [showImport, setShowImport] = useState(false);
      const [editingContract, setEditingContract] = useState(null);
      const [importData, setImportData] = useState([]);
      const [importPreview, setImportPreview] = useState(false);
      const [importing, setImporting] = useState(false);
      const { isMobile } = useMobile();
      const { addToast } = useToast();
      const { orgId } = useAuth();

      useEffect(() => { loadFinanceData(); }, []);

      const loadFinanceData = async () => {
        setLoading(true);
        try {
          const [cRes, pRes, clRes] = await Promise.all([
            supabase.from("contracts").select("*").order("created_at", { ascending: false }),
            supabase.from("payments").select("*, contracts(contract_number, contract_name)").order("payment_date", { ascending: false }),
            supabase.from("claim_submissions").select("*, contracts(contract_number), persons(first_name, last_name)").order("service_date", { ascending: false }),
          ]);
          setContracts(cRes.data || []);
          setPayments(pRes.data || []);
          setClaims(clRes.data || []);
        } catch (e) { addToast("Failed to load financial data", "error"); }
        setLoading(false);
      };

      const totalBilled = claims.reduce((s, c) => s + Number(c.billed_amount || 0), 0);
      const totalPaid = claims.reduce((s, c) => s + Number(c.paid_amount || 0), 0);
      const totalPayments = payments.reduce((s, p) => s + Number(p.amount || 0), 0);
      const outstanding = totalBilled - totalPaid;
      const collectionRate = totalBilled > 0 ? ((totalPaid / totalBilled) * 100).toFixed(1) : "—";
      const now = new Date();

      const agingBuckets = { current: 0, thirty: 0, sixty: 0, over90: 0 };
      claims.filter(c => c.claim_status !== "paid" && c.claim_status !== "void").forEach(c => {
        const subDate = c.submitted_date ? new Date(c.submitted_date + "T00:00:00") : (c.service_date ? new Date(c.service_date + "T00:00:00") : now);
        const days = Math.floor((now - subDate) / 86400000);
        const amt = Number(c.billed_amount || 0) - Number(c.paid_amount || 0);
        if (days <= 30) agingBuckets.current += amt;
        else if (days <= 60) agingBuckets.thirty += amt;
        else if (days <= 90) agingBuckets.sixty += amt;
        else agingBuckets.over90 += amt;
      });

      // ── UPI CSV Import ──
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: (results) => {
            const rows = (results.data || []).filter(r => r.service_code && r.consumer_name);
            if (rows.length === 0) return addToast("No valid rows found in CSV", "error");
            const parsed = rows.map(r => {
              const units = Number(r.units) || 0;
              const rate = Number(r.rate) || 0;
              return {
                consumer_name: r.consumer_name?.trim() || "", consumer_pid: r.consumer_pid?.trim() || "",
                service_code: r.service_code?.trim() || "", rate, unit_type: r.unit_type?.trim() || "",
                unit_label: UPI_UNIT_MAP[r.unit_type?.trim()] || r.unit_type || "",
                service_start_date: r.service_start_date?.trim() || "", service_end_date: r.service_end_date?.trim() || "",
                units, remaining_units: Number(r.remaining_units) || 0, monthly_max_units: Number(r.monthly_max_units) || 0,
                sce: r.sce?.trim() || "", amount: units * rate, selected: true,
              };
            });
            setImportData(parsed);
            setImportPreview(true);
          },
          error: () => addToast("Failed to parse CSV", "error"),
        });
      };

      const importTotal = importData.filter(r => r.selected).reduce((s, r) => s + r.amount, 0);

      const submitImport = async () => {
        const selected = importData.filter(r => r.selected);
        if (selected.length === 0) return addToast("No rows selected", "error");
        setImporting(true);
        const contract = contracts.find(c => c.status === "active") || contracts[0];
        const { data: persons } = await supabase.from("persons").select("id, first_name, last_name");
        const personMap = {};
        (persons || []).forEach(p => {
          personMap[`${p.last_name} ${p.first_name}`.toLowerCase()] = p.id;
          personMap[`${p.first_name} ${p.last_name}`.toLowerCase()] = p.id;
        });
        const parseDate = (d) => { if (!d) return null; const p = d.split("/"); return p.length === 3 ? `${p[2]}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}` : d; };
        let success = 0, errors = 0;
        for (const row of selected) {
          const personId = personMap[row.consumer_name.toLowerCase()] || null;
          const { error } = await supabase.from("claim_submissions").insert({
            org_id: orgId, contract_id: contract?.id || null, person_id: personId,
            service_code: row.service_code, service_date: parseDate(row.service_start_date),
            billed_amount: row.amount, submitted_date: new Date().toISOString().split("T")[0],
            claim_status: "submitted",
            notes: `UPI Import — ${row.units} ${row.unit_label} @ $${row.rate} | PID: ${row.consumer_pid} | SCE: ${row.sce} | Remaining: ${row.remaining_units}/${row.monthly_max_units} max`,
          });
          if (error) errors++; else success++;
        }
        setImporting(false);
        addToast(`Imported ${success} claims${errors > 0 ? ` (${errors} failed)` : ""}`, success > 0 ? "success" : "error");
        setImportPreview(false); setImportData([]); setShowImport(false); loadFinanceData();
      };

      // ── Contract Form ──
      const ContractForm = () => {
        const [form, setForm] = useState(editingContract || { contract_number: "", contract_name: "", payer: "DHHS", effective_date: "", expiration_date: "", status: "active", notes: "" });
        const [saving, setSaving] = useState(false);
        const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };
        const handleSave = async () => {
          if (!form.contract_number) return addToast("Contract number required", "error");
          setSaving(true);
          const payload = { ...form, org_id: orgId }; delete payload.id; delete payload.created_at; delete payload.total_value;
          if (editingContract) { const { error } = await supabase.from("contracts").update(payload).eq("id", editingContract.id); if (error) { addToast(error.message, "error"); setSaving(false); return; } addToast("Contract updated", "success"); }
          else { const { error } = await supabase.from("contracts").insert(payload); if (error) { addToast(error.message, "error"); setSaving(false); return; } addToast("Contract added", "success"); }
          setSaving(false); setShowContractForm(false); setEditingContract(null); loadFinanceData();
        };
        return (
          <Modal open={true} onClose={() => { setShowContractForm(false); setEditingContract(null); }} title={editingContract ? "Edit Contract" : "Add Contract"} width={520}>
            <div style={{ padding: "20px 28px 24px", overflowY: "auto", maxHeight: "65vh" }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Contract Number *</label><input style={fs} value={form.contract_number} onChange={e => setForm(f => ({ ...f, contract_number: e.target.value }))} placeholder="e.g. DHHS91172" /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Payer</label><select style={fs} value={form.payer} onChange={e => setForm(f => ({ ...f, payer: e.target.value }))}><option>DHHS</option><option>DCFS</option><option>Medicaid</option><option>Private Pay</option><option>Insurance</option><option>Other</option></select></div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Contract Name</label><input style={fs} value={form.contract_name} onChange={e => setForm(f => ({ ...f, contract_name: e.target.value }))} placeholder="DSPD Community Supports Contract" /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Effective Date</label><input style={fs} type="date" value={form.effective_date} onChange={e => setForm(f => ({ ...f, effective_date: e.target.value }))} /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Expiration Date</label><input style={fs} type="date" value={form.expiration_date} onChange={e => setForm(f => ({ ...f, expiration_date: e.target.value }))} /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Status</label><select style={fs} value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))}><option value="active">Active</option><option value="pending">Pending</option><option value="expired">Expired</option><option value="terminated">Terminated</option></select></div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Notes</label><textarea style={{ ...fs, minHeight: 50 }} value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} /></div>
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => { setShowContractForm(false); setEditingContract(null); }} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>{saving ? "Saving..." : editingContract ? "Update" : "Add Contract"}</button>
              </div>
            </div>
          </Modal>
        );
      };

      // ── Payment Form ──
      const PaymentForm = () => {
        const [form, setForm] = useState({ contract_id: contracts[0]?.id || "", payment_date: new Date().toISOString().split("T")[0], amount: "", check_number: "", eft_trace: "", payer: "DHHS", payment_method: "EFT", remittance_id: "", notes: "" });
        const [saving, setSaving] = useState(false);
        const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };
        const handleSave = async () => {
          if (!form.amount || !form.payment_date) return addToast("Amount and date required", "error");
          setSaving(true);
          const { error } = await supabase.from("payments").insert({ ...form, org_id: orgId, amount: Number(form.amount), contract_id: form.contract_id || null });
          if (error) { addToast(error.message, "error"); setSaving(false); return; }
          addToast("Payment recorded", "success"); setSaving(false); setShowPaymentForm(false); loadFinanceData();
        };
        return (
          <Modal open={true} onClose={() => setShowPaymentForm(false)} title="Record Payment" width={520}>
            <div style={{ padding: "20px 28px 24px", overflowY: "auto", maxHeight: "65vh" }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Payment Date *</label><input style={fs} type="date" value={form.payment_date} onChange={e => setForm(f => ({ ...f, payment_date: e.target.value }))} /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Amount *</label><input style={fs} type="number" step="0.01" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} placeholder="0.00" /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Contract</label><select style={fs} value={form.contract_id} onChange={e => setForm(f => ({ ...f, contract_id: e.target.value }))}><option value="">Select contract...</option>{contracts.map(c => <option key={c.id} value={c.id}>{c.contract_number} — {c.contract_name || c.payer}</option>)}</select></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Payer</label><select style={fs} value={form.payer} onChange={e => setForm(f => ({ ...f, payer: e.target.value }))}><option>DHHS</option><option>DCFS</option><option>Medicaid</option><option>Private Pay</option><option>Insurance</option><option>Other</option></select></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Method</label><select style={fs} value={form.payment_method} onChange={e => setForm(f => ({ ...f, payment_method: e.target.value }))}><option value="EFT">EFT / ACH</option><option value="Check">Check</option><option value="Wire">Wire</option><option value="Other">Other</option></select></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>{form.payment_method === "Check" ? "Check Number" : "EFT Trace #"}</label><input style={fs} value={form.payment_method === "Check" ? form.check_number : form.eft_trace} onChange={e => setForm(f => form.payment_method === "Check" ? ({ ...f, check_number: e.target.value }) : ({ ...f, eft_trace: e.target.value }))} /></div>
                <div><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Remittance ID</label><input style={fs} value={form.remittance_id} onChange={e => setForm(f => ({ ...f, remittance_id: e.target.value }))} placeholder="ERA/EOP reference" /></div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}><label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Notes</label><textarea style={{ ...fs, minHeight: 50 }} value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} /></div>
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => setShowPaymentForm(false)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.green, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>{saving ? "Saving..." : "Record Payment"}</button>
              </div>
            </div>
          </Modal>
        );
      };

      const updateClaimStatus = async (claimId, newStatus, paidAmount) => {
        const updates = { claim_status: newStatus, updated_at: new Date().toISOString() };
        if (paidAmount !== undefined) updates.paid_amount = Number(paidAmount);
        const { error } = await supabase.from("claim_submissions").update(updates).eq("id", claimId);
        if (error) return addToast(error.message, "error");
        addToast(`Claim ${newStatus}`, "success"); loadFinanceData();
      };

      const exportAgingCSV = () => {
        const unpaid = claims.filter(c => c.claim_status !== "paid" && c.claim_status !== "void");
        const headers = ["Service Date","Submitted","Client","Code","Contract","Billed","Paid","Outstanding","Days","Bucket"];
        const rows = unpaid.map(c => { const d = c.submitted_date || c.service_date; const days = d ? Math.floor((now - new Date(d+"T00:00:00"))/86400000) : 0; const b = days<=30?"0-30":days<=60?"31-60":days<=90?"61-90":"90+"; const cl = c.persons?`${c.persons.first_name} ${c.persons.last_name}`:"—"; return [c.service_date,c.submitted_date||"—",cl,c.service_code||"—",c.contracts?.contract_number||"—",(c.billed_amount||0).toFixed(2),(c.paid_amount||0).toFixed(2),((c.billed_amount||0)-(c.paid_amount||0)).toFixed(2),days,b]; });
        const csv = [headers,...rows].map(r => r.map(v => `"${v}"`).join(",")).join("\n");
        const blob = new Blob([csv],{type:"text/csv"}); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download=`aging-report-${now.toISOString().split("T")[0]}.csv`; a.click(); URL.revokeObjectURL(url); addToast("Aging report exported","success");
      };

      const statusColors = { pending: CB.amber, submitted: CB.blue, paid: CB.green, partial: "#7B1FA2", denied: CB.red, appealed: "#E65100", void: CB.textLight };
      const tabs = [{ key:"overview",label:"Overview" },{ key:"billing",label:"Billing" },{ key:"claims",label:`Claims (${claims.length})` },{ key:"payments",label:`Payments (${payments.length})` },{ key:"aging",label:"Aging Report" },{ key:"contracts",label:`Contracts (${contracts.length})` }];

      return (
        <div>
          <PageHeader title="Finance" subtitle="Billing, claims, payments, aging, and contracts — unified financial operations"
            action={<div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {tab === "aging" && <button onClick={exportAgingCSV} style={{ display:"flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:10,border:`1px solid ${CB.border}`,background:CB.white,color:CB.textMid,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit" }}>{icons.barChart({size:14})} Export CSV</button>}
              {tab !== "billing" && <button onClick={() => setShowImport(true)} style={{ display:"flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:10,border:`1px solid ${CB.navy}`,background:`${CB.navy}08`,color:CB.navy,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit" }}>{icons.upload({size:14})} Import UPI</button>}
              {tab !== "billing" && <button onClick={() => setShowPaymentForm(true)} style={{ display:"flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:10,border:"none",background:CB.green,color:CB.white,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit" }}>{icons.dollar({size:14})} Record Payment</button>}
            </div>}
          />
          <div style={{ display:"flex",gap:4,marginBottom:20,background:CB.white,borderRadius:12,padding:4,border:`1px solid ${CB.border}`,width:"fit-content",flexWrap:"wrap" }}>
            {tabs.map(t => <button key={t.key} onClick={() => setTab(t.key)} style={{ padding:"9px 18px",borderRadius:9,border:"none",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer",transition:"all 0.15s",background:tab===t.key?CB.navy:"transparent",color:tab===t.key?CB.white:CB.textMid }}>{t.label}</button>)}
          </div>

          {loading ? <div style={{ display:"flex",justifyContent:"center",padding:80 }}><Spinner size={28} /></div> : (<>
            {/* ═══ OVERVIEW ═══ */}
            {tab === "overview" && (<>
              <div style={{ display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:isMobile?10:16,marginBottom:24 }}>
                {[{label:"Total Billed",value:`$${totalBilled.toFixed(2)}`,color:CB.navy,icon:icons.fileText},{label:"Total Received",value:`$${totalPayments.toFixed(2)}`,color:CB.green,icon:icons.checkCircle},{label:"Outstanding",value:`$${outstanding.toFixed(2)}`,color:outstanding>0?CB.amber:CB.green,icon:icons.clock},{label:"Collection Rate",value:`${collectionRate}%`,color:CB.teal,icon:icons.barChart}].map((s,i) => (
                  <div key={i} style={{ background:CB.white,borderRadius:14,padding:isMobile?"14px 12px":"18px 20px",border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,textAlign:"center",animation:`fadeIn 0.4s ease ${i*0.05}s both` }}>
                    <div style={{ width:36,height:36,borderRadius:10,background:`${s.color}12`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:8 }}>{s.icon({size:18,color:s.color})}</div>
                    <div style={{ fontSize:24,fontWeight:800,color:s.color }}>{s.value}</div>
                    <div style={{ fontSize:11,fontWeight:600,color:CB.textMid,textTransform:"uppercase",letterSpacing:0.5 }}>{s.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ background:CB.white,borderRadius:16,padding:24,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,marginBottom:20,animation:"fadeIn 0.5s ease 0.2s both" }}>
                <h3 style={{ fontSize:16,fontWeight:700,color:CB.navy,marginBottom:16 }}>Aging Summary</h3>
                <div style={{ display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:12 }}>
                  {[{label:"0–30 Days",value:agingBuckets.current,color:CB.green},{label:"31–60 Days",value:agingBuckets.thirty,color:CB.amber},{label:"61–90 Days",value:agingBuckets.sixty,color:"#E65100"},{label:"90+ Days",value:agingBuckets.over90,color:CB.red}].map((b,i) => (
                    <div key={i} style={{ padding:"14px 16px",borderRadius:12,background:`${b.color}08`,border:`1px solid ${b.color}20` }}><div style={{ fontSize:20,fontWeight:800,color:b.color }}>${b.value.toFixed(2)}</div><div style={{ fontSize:12,fontWeight:600,color:CB.textMid }}>{b.label}</div></div>
                  ))}
                </div>
              </div>
              <div style={{ background:CB.white,borderRadius:16,padding:24,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,animation:"fadeIn 0.5s ease 0.3s both" }}>
                <h3 style={{ fontSize:16,fontWeight:700,color:CB.navy,marginBottom:16 }}>Recent Payments</h3>
                {payments.length===0 ? <p style={{ fontSize:13,color:CB.textMid,fontStyle:"italic" }}>No payments recorded yet.</p> : (
                  <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                    {payments.slice(0,5).map(p => <div key={p.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:10,background:CB.cream,border:`1px solid ${CB.border}` }}><div><span style={{ fontWeight:700,color:CB.text,fontSize:14 }}>${Number(p.amount).toFixed(2)}</span><span style={{ color:CB.textMid,fontSize:12,marginLeft:10 }}>{p.contracts?.contract_number||p.payer}</span></div><div style={{ textAlign:"right" }}><div style={{ fontSize:12,color:CB.textMid }}>{new Date(p.payment_date+"T00:00:00").toLocaleDateString()}</div><div style={{ fontSize:11,color:CB.textLight }}>{p.payment_method} {p.check_number?`#${p.check_number}`:p.eft_trace||""}</div></div></div>)}
                  </div>
                )}
              </div>
            </>)}

            {/* ═══ BILLING (merged from standalone Billing page) ═══ */}
            {tab === "billing" && <BillingPage embedded={true} />}

            {/* ═══ CLAIMS ═══ */}
            {tab === "claims" && (
              <div style={{ background:CB.white,borderRadius:16,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,overflow:"hidden" }}>
                {claims.length===0 ? (
                  <div style={{ textAlign:"center",padding:48,color:CB.textMid }}>
                    <div style={{ width:56,height:56,borderRadius:16,background:`${CB.navy}10`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12 }}>{icons.upload({size:28,color:CB.navy})}</div>
                    <p style={{ fontSize:15,fontWeight:600,color:CB.navy }}>No claims yet</p>
                    <p style={{ fontSize:13 }}>Click "Import UPI" to upload your monthly UPI billing CSV.</p>
                  </div>
                ) : (
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
                      <thead><tr style={{ background:CB.navy }}>{["Date","Client","Code","Contract","Billed","Paid","Status","Actions"].map(h => <th key={h} style={{ padding:"10px 14px",textAlign:"left",color:CB.white,fontWeight:700,fontSize:12 }}>{h}</th>)}</tr></thead>
                      <tbody>
                        {claims.map((c,i) => { const sColor=statusColors[c.claim_status]||CB.textLight; return (
                          <tr key={c.id} style={{ borderBottom:`1px solid ${CB.border}`,background:i%2===0?CB.white:CB.cream }}>
                            <td style={{ padding:"10px 14px",fontWeight:600 }}>{c.service_date?new Date(c.service_date+"T00:00:00").toLocaleDateString():"—"}</td>
                            <td style={{ padding:"10px 14px" }}>{c.persons?`${c.persons.first_name} ${c.persons.last_name}`:"—"}</td>
                            <td style={{ padding:"10px 14px" }}><Badge text={c.service_code||"—"} color={CB.blue} /></td>
                            <td style={{ padding:"10px 14px",fontSize:12,color:CB.textMid }}>{c.contracts?.contract_number||"—"}</td>
                            <td style={{ padding:"10px 14px",fontWeight:700 }}>${Number(c.billed_amount||0).toFixed(2)}</td>
                            <td style={{ padding:"10px 14px",fontWeight:600,color:CB.green }}>${Number(c.paid_amount||0).toFixed(2)}</td>
                            <td style={{ padding:"10px 14px" }}><Badge text={c.claim_status} color={sColor} /></td>
                            <td style={{ padding:"10px 14px" }}><select value={c.claim_status} onChange={e => { const ns=e.target.value; if(ns==="paid"){const a=prompt("Paid amount:",c.billed_amount);if(a)updateClaimStatus(c.id,ns,a);} else if(ns==="partial"){const a=prompt("Partial amount:");if(a)updateClaimStatus(c.id,ns,a);} else updateClaimStatus(c.id,ns); }} style={{ padding:"4px 8px",borderRadius:6,border:`1px solid ${CB.border}`,fontSize:11,fontFamily:"inherit",background:CB.white }}>{["pending","submitted","paid","partial","denied","appealed","void"].map(s => <option key={s} value={s}>{s}</option>)}</select></td>
                          </tr>);
                        })}
                      </tbody>
                    </table>
                    <div style={{ padding:"12px 20px",borderTop:`1px solid ${CB.border}`,background:`${CB.navy}06`,display:"flex",justifyContent:"space-between",fontSize:14 }}><span style={{ fontWeight:600,color:CB.textMid }}>{claims.length} claims</span><span style={{ fontWeight:800,color:CB.navy }}>Total: ${totalBilled.toFixed(2)}</span></div>
                  </div>
                )}
              </div>
            )}

            {/* ═══ PAYMENTS ═══ */}
            {tab === "payments" && (
              <div style={{ background:CB.white,borderRadius:16,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,overflow:"hidden" }}>
                {payments.length===0 ? <div style={{ textAlign:"center",padding:48,color:CB.textMid }}><p style={{ fontSize:15,fontWeight:600 }}>No payments recorded yet</p></div> : (
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
                      <thead><tr style={{ background:CB.navy }}>{["Date","Amount","Payer","Contract","Method","Reference","Remittance"].map(h => <th key={h} style={{ padding:"10px 14px",textAlign:"left",color:CB.white,fontWeight:700,fontSize:12 }}>{h}</th>)}</tr></thead>
                      <tbody>{payments.map((p,i) => <tr key={p.id} style={{ borderBottom:`1px solid ${CB.border}`,background:i%2===0?CB.white:CB.cream }}><td style={{ padding:"10px 14px",fontWeight:600 }}>{new Date(p.payment_date+"T00:00:00").toLocaleDateString()}</td><td style={{ padding:"10px 14px",fontWeight:800,color:CB.green,fontSize:15 }}>${Number(p.amount).toFixed(2)}</td><td style={{ padding:"10px 14px" }}>{p.payer}</td><td style={{ padding:"10px 14px",fontSize:12 }}>{p.contracts?.contract_number||"—"}</td><td style={{ padding:"10px 14px" }}><Badge text={p.payment_method} color={CB.blue} /></td><td style={{ padding:"10px 14px",fontSize:12,color:CB.textMid }}>{p.check_number?`Chk #${p.check_number}`:p.eft_trace||"—"}</td><td style={{ padding:"10px 14px",fontSize:12,color:CB.textMid }}>{p.remittance_id||"—"}</td></tr>)}</tbody>
                    </table>
                    <div style={{ padding:"12px 20px",borderTop:`1px solid ${CB.border}`,background:`${CB.green}06`,display:"flex",justifyContent:"space-between",fontSize:14 }}><span style={{ fontWeight:600,color:CB.textMid }}>Total Received</span><span style={{ fontWeight:800,color:CB.green }}>${totalPayments.toFixed(2)}</span></div>
                  </div>
                )}
              </div>
            )}

            {/* ═══ AGING ═══ */}
            {tab === "aging" && (() => {
              const unpaid = claims.filter(c => c.claim_status!=="paid"&&c.claim_status!=="void").map(c => { const d=c.submitted_date||c.service_date; const days=d?Math.floor((now-new Date(d+"T00:00:00"))/86400000):0; const bucket=days<=30?"0–30":days<=60?"31–60":days<=90?"61–90":"90+"; const bc=days<=30?CB.green:days<=60?CB.amber:days<=90?"#E65100":CB.red; return {...c,days,bucket,bucketColor:bc,outstanding:Number(c.billed_amount||0)-Number(c.paid_amount||0)}; }).sort((a,b) => b.days-a.days);
              return (
                <div style={{ background:CB.white,borderRadius:16,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,overflow:"hidden" }}>
                  {unpaid.length===0 ? <div style={{ textAlign:"center",padding:48 }}><div style={{ width:56,height:56,borderRadius:16,background:`${CB.green}12`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12 }}>{icons.checkCircle({size:28,color:CB.green})}</div><p style={{ fontSize:15,fontWeight:600,color:CB.navy }}>No outstanding claims</p></div> : (
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
                        <thead><tr style={{ background:CB.navy }}>{["Service Date","Client","Code","Contract","Billed","Paid","Outstanding","Days","Bucket","Status"].map(h => <th key={h} style={{ padding:"10px 14px",textAlign:"left",color:CB.white,fontWeight:700,fontSize:12 }}>{h}</th>)}</tr></thead>
                        <tbody>{unpaid.map((c,i) => <tr key={c.id} style={{ borderBottom:`1px solid ${CB.border}`,background:i%2===0?CB.white:CB.cream }}><td style={{ padding:"10px 14px",fontWeight:600 }}>{c.service_date?new Date(c.service_date+"T00:00:00").toLocaleDateString():"—"}</td><td style={{ padding:"10px 14px" }}>{c.persons?`${c.persons.first_name} ${c.persons.last_name}`:"—"}</td><td style={{ padding:"10px 14px" }}><Badge text={c.service_code||"—"} color={CB.blue} /></td><td style={{ padding:"10px 14px",fontSize:12 }}>{c.contracts?.contract_number||"—"}</td><td style={{ padding:"10px 14px" }}>${Number(c.billed_amount||0).toFixed(2)}</td><td style={{ padding:"10px 14px",color:CB.green }}>${Number(c.paid_amount||0).toFixed(2)}</td><td style={{ padding:"10px 14px",fontWeight:700,color:c.bucketColor }}>${c.outstanding.toFixed(2)}</td><td style={{ padding:"10px 14px",fontWeight:700,color:c.bucketColor }}>{c.days}</td><td style={{ padding:"10px 14px" }}><Badge text={c.bucket} color={c.bucketColor} /></td><td style={{ padding:"10px 14px" }}><Badge text={c.claim_status} color={statusColors[c.claim_status]} /></td></tr>)}</tbody>
                      </table>
                      <div style={{ padding:"12px 20px",borderTop:`1px solid ${CB.border}`,background:`${CB.amber}06`,display:"flex",justifyContent:"space-between",fontSize:14 }}><span style={{ fontWeight:600,color:CB.textMid }}>Total Outstanding</span><span style={{ fontWeight:800,color:CB.red }}>${unpaid.reduce((s,c)=>s+c.outstanding,0).toFixed(2)}</span></div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* ═══ CONTRACTS ═══ */}
            {tab === "contracts" && (
              <div>
                <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:16 }}><button onClick={() => {setEditingContract(null);setShowContractForm(true);}} style={{ padding:"10px 20px",borderRadius:10,border:"none",background:CB.teal,color:CB.white,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8 }}>{icons.plus({size:15})} Add Contract</button></div>
                {contracts.length===0 ? <div style={{ textAlign:"center",padding:48,background:CB.white,borderRadius:16,border:`1px solid ${CB.border}` }}><p style={{ fontSize:15,fontWeight:600,color:CB.navy }}>No contracts yet</p><p style={{ fontSize:13,color:CB.textMid }}>Add your DHHS, DCFS, or other payer contracts.</p></div> : (
                  <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                    {contracts.map((c,i) => { const sColor=c.status==="active"?CB.green:c.status==="pending"?CB.amber:c.status==="expired"?CB.red:CB.textLight; const cc=claims.filter(cl=>cl.contract_id===c.id); const cp=payments.filter(p=>p.contract_id===c.id); const billed=cc.reduce((s,cl)=>s+Number(cl.billed_amount||0),0); const received=cp.reduce((s,p)=>s+Number(p.amount||0),0);
                      return (<div key={c.id} style={{ background:CB.white,borderRadius:14,padding:isMobile?16:20,border:`1px solid ${CB.border}`,boxShadow:CB.cardShadow,animation:`fadeIn 0.4s ease ${i*0.05}s both` }}>
                        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12 }}>
                          <div><div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:4 }}><span style={{ fontSize:18,fontWeight:800,color:CB.navy }}>{c.contract_number}</span><Badge text={c.status} color={sColor} /></div><div style={{ fontSize:13,color:CB.textMid }}>{c.contract_name||c.payer}</div>{c.effective_date&&<div style={{ fontSize:12,color:CB.textLight,marginTop:2 }}>{new Date(c.effective_date+"T00:00:00").toLocaleDateString()}{c.expiration_date&&` — ${new Date(c.expiration_date+"T00:00:00").toLocaleDateString()}`}</div>}</div>
                          <button onClick={() => {setEditingContract(c);setShowContractForm(true);}} style={{ padding:"6px 14px",borderRadius:8,border:`1px solid ${CB.border}`,background:CB.white,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:CB.textMid }}>Edit</button>
                        </div>
                        <div style={{ display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10 }}>
                          {[{label:"Claims",value:cc.length,color:CB.navy},{label:"Billed",value:`$${billed.toFixed(2)}`,color:CB.blue},{label:"Received",value:`$${received.toFixed(2)}`,color:CB.green},{label:"Outstanding",value:`$${(billed-received).toFixed(2)}`,color:billed-received>0?CB.amber:CB.green}].map((s,si) => <div key={si} style={{ padding:"10px 14px",borderRadius:10,background:CB.cream,textAlign:"center" }}><div style={{ fontSize:16,fontWeight:800,color:s.color }}>{s.value}</div><div style={{ fontSize:11,fontWeight:600,color:CB.textMid }}>{s.label}</div></div>)}
                        </div>
                      </div>);
                    })}
                  </div>
                )}
              </div>
            )}
          </>)}

          {showContractForm && <ContractForm />}
          {showPaymentForm && <PaymentForm />}

          {/* ═══ UPI IMPORT MODAL ═══ */}
          {showImport && (
            <Modal open={true} onClose={() => {setShowImport(false);setImportPreview(false);setImportData([]);}} title="Import UPI Billing CSV" subtitle="Upload your monthly UPI export to create claims automatically" width={isMobile?"100%":800}>
              <div style={{ padding:"20px 28px 24px",overflowY:"auto",maxHeight:"70vh" }}>
                {!importPreview ? (
                  <div>
                    <div style={{ border:`2px dashed ${CB.border}`,borderRadius:16,padding:40,textAlign:"center",background:CB.cream,marginBottom:16 }}>
                      <div style={{ width:56,height:56,borderRadius:16,background:`${CB.navy}10`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12 }}>{icons.upload({size:28,color:CB.navy})}</div>
                      <p style={{ fontSize:15,fontWeight:600,color:CB.navy,marginBottom:8 }}>Upload UPI CSV</p>
                      <p style={{ fontSize:13,color:CB.textMid,marginBottom:16 }}>File should contain: consumer_name, consumer_pid, service_code, rate, unit_type, units, service_start_date, service_end_date</p>
                      <input type="file" accept=".csv" onChange={handleFileUpload} style={{ fontSize:14 }} />
                    </div>
                    <div style={{ fontSize:12,color:CB.textLight,padding:"8px 12px",background:`${CB.navy}06`,borderRadius:10 }}>Expected format: UPI monthly billing export (e.g. <strong>2026-03HopeHavenServices.csv</strong>)</div>
                  </div>
                ) : (
                  <div>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10 }}>
                      <div><span style={{ fontSize:14,fontWeight:700,color:CB.navy }}>{importData.length} service lines</span><span style={{ fontSize:13,color:CB.textMid,marginLeft:10 }}>{new Set(importData.map(r=>r.consumer_name)).size} clients — {new Set(importData.map(r=>r.service_code)).size} service codes</span></div>
                      <div style={{ fontSize:20,fontWeight:800,color:CB.teal }}>${importTotal.toLocaleString("en-US",{minimumFractionDigits:2})}</div>
                    </div>
                    <div style={{ overflowX:"auto",marginBottom:16 }}>
                      <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
                        <thead><tr style={{ background:CB.navy }}><th style={{ padding:"8px 10px",color:CB.white,fontWeight:700,textAlign:"center",width:30 }}><input type="checkbox" checked={importData.every(r=>r.selected)} onChange={e => setImportData(d=>d.map(r=>({...r,selected:e.target.checked})))} /></th>{["Client","PID","Code","Rate","Type","Units","Remaining","SCE","Amount"].map(h => <th key={h} style={{ padding:"8px 10px",textAlign:"left",color:CB.white,fontWeight:700 }}>{h}</th>)}</tr></thead>
                        <tbody>{importData.map((r,i) => <tr key={i} style={{ borderBottom:`1px solid ${CB.border}`,background:r.selected?(i%2===0?CB.white:CB.cream):`${CB.red}06`,opacity:r.selected?1:0.5 }}><td style={{ padding:"8px 10px",textAlign:"center" }}><input type="checkbox" checked={r.selected} onChange={e => setImportData(d=>d.map((x,j)=>j===i?{...x,selected:e.target.checked}:x))} /></td><td style={{ padding:"8px 10px",fontWeight:600 }}>{r.consumer_name}</td><td style={{ padding:"8px 10px",color:CB.textMid }}>{r.consumer_pid}</td><td style={{ padding:"8px 10px" }}><Badge text={r.service_code} color={CB.blue} /></td><td style={{ padding:"8px 10px",fontWeight:600 }}>${r.rate.toFixed(2)}</td><td style={{ padding:"8px 10px",color:CB.textMid }}>{r.unit_label}</td><td style={{ padding:"8px 10px",fontWeight:700 }}>{r.units}</td><td style={{ padding:"8px 10px",fontSize:11,color:r.remaining_units<50?CB.amber:CB.textMid }}>{r.remaining_units}/{r.monthly_max_units}</td><td style={{ padding:"8px 10px",fontSize:11,color:CB.textMid }}>{r.sce}</td><td style={{ padding:"8px 10px",fontWeight:800,color:CB.navy }}>${r.amount.toLocaleString("en-US",{minimumFractionDigits:2})}</td></tr>)}</tbody>
                      </table>
                    </div>
                    <div style={{ marginBottom:16 }}>
                      <h4 style={{ fontSize:13,fontWeight:700,color:CB.navy,marginBottom:8 }}>Per-Client Totals</h4>
                      <div style={{ display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(3,1fr)",gap:10 }}>
                        {[...new Set(importData.filter(r=>r.selected).map(r=>r.consumer_name))].map(name => { const cr=importData.filter(r=>r.selected&&r.consumer_name===name); const ct=cr.reduce((s,r)=>s+r.amount,0);
                          return <div key={name} style={{ padding:"12px 16px",borderRadius:10,background:CB.cream,border:`1px solid ${CB.border}` }}><div style={{ fontSize:14,fontWeight:700,color:CB.navy }}>{name}</div><div style={{ fontSize:11,color:CB.textMid }}>{cr.length} services — {cr.map(r=>r.service_code).join(", ")}</div><div style={{ fontSize:18,fontWeight:800,color:CB.teal,marginTop:4 }}>${ct.toLocaleString("en-US",{minimumFractionDigits:2})}</div></div>;
                        })}
                      </div>
                    </div>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap" }}>
                      <button onClick={() => {setImportPreview(false);setImportData([]);}} style={{ padding:"10px 20px",borderRadius:10,border:`1px solid ${CB.border}`,background:CB.white,color:CB.textMid,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit" }}>Upload Different File</button>
                      <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                        <span style={{ fontSize:14,fontWeight:700,color:CB.navy }}>{importData.filter(r=>r.selected).length} of {importData.length} selected</span>
                        <button onClick={submitImport} disabled={importing} style={{ padding:"10px 28px",borderRadius:10,border:"none",background:CB.teal,color:CB.white,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:importing?0.7:1 }}>{importing?"Importing...":`Import ${importData.filter(r=>r.selected).length} Claims — $${importTotal.toLocaleString("en-US",{minimumFractionDigits:2})}`}</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </Modal>
          )}
        </div>
      );
    }



    // ═══════════════════════════════════════════════════════════════
    // DOCUMENT ENGINE — PDF generation from Hope Haven templates
    // ═══════════════════════════════════════════════════════════════
    const DOC_TEMPLATES = [
      { id: "staff_cover_sheet", name: "Staff File Cover Sheet", category: "Staff", desc: "Sections A–D checklist with completion status", entity: "staff" },

      { id: "rights_ack", name: "Rights Acknowledgment", category: "Client", desc: "Tab 7 — Individual rights form for signature", entity: "client" },
