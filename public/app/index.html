<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provly — DSPD Compliance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Outfit', 'Manrope', sans-serif; background: #FAFBFD; }
    ::selection { background: #00897B; color: white; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #00897B; outline-offset: -1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes successPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 767px) {
      /* Touch-friendly inputs */
      input, select, textarea { font-size: 16px !important; min-height: 44px; }

      /* Tighter table cells on mobile */
      th, td { padding: 10px 12px !important; font-size: 13px !important; }

      /* Prevent zoom on input focus (iOS) */
      input[type="text"], input[type="email"], input[type="password"],
      input[type="number"], input[type="tel"], input[type="date"],
      select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════
    // DESIGN TOKENS — matched exactly to landing page
    // ═══════════════════════════════════════════════════════════════
    const CB = {
      navy: "#0A1E33", navyLight: "#0F2B46", blue: "#1A73E8", blueLight: "#4A9AF5",
      teal: "#00897B", tealLight: "#26A69A", tealDark: "#00695C",
      cream: "#FAFBFD", warm: "#F8F6F3", white: "#FFFFFF",
      text: "#1A1A2E", textMid: "#4A5568", textLight: "#94A3B8",
      red: "#E53935", green: "#2E7D32", amber: "#F57F17",
      border: "#E2E8F0",
      cardShadow: "0 1px 3px rgba(10,30,51,0.08), 0 8px 32px rgba(10,30,51,0.06)",
      sidebarW: 260,
    };

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE CLIENT
    // ═══════════════════════════════════════════════════════════════
    const supabase = window.supabase.createClient(
      'https://zsrnqbmzgypldraifjho.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzcm5xYm16Z3lwbGRyYWlmamhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTc0NjcsImV4cCI6MjA4OTEzMzQ2N30.-vI3ZvtGKFyoZplqpTt4IxriWEnIPg-PH8eIing93bY'
    );

    // ═══════════════════════════════════════════════════════════════
    // AUTH CONTEXT
    // ═══════════════════════════════════════════════════════════════
    const AuthContext = createContext(null);

    // ═══════════════════════════════════════════════════════════════
    // ROLE-BASED ACCESS CONTROL
    // ═══════════════════════════════════════════════════════════════
    const ROLE_LEVELS = {
      owner: 100, admin: 90, compliance_director: 80,
      residential_director: 70, day_program_director: 70,
      house_manager: 50, bcba: 60, rn: 60, dsp: 10,
    };

    const ROLE_PERMISSIONS = {
      owner:                { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: true, editClients: true, viewAudit: true, runReports: true, manageRoles: true, intake: true },
      admin:                { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: true, editClients: true, viewAudit: true, runReports: true, manageRoles: false, intake: true },
      compliance_director:  { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: false, editClients: true, viewAudit: true, runReports: true, manageRoles: false, intake: true },
      residential_director: { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: true, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      day_program_director: { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: true, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      house_manager:        { viewRates: false, viewBilling: false, viewCompliance: false, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      bcba:                 { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: true, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: true, manageRoles: false, intake: false },
      rn:                   { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: true, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: true, manageRoles: false, intake: false },
      dsp:                  { viewRates: false, viewBilling: false, viewCompliance: false, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: false, manageRoles: false, intake: false },
    };

    // Nav items each role can see
    const ROLE_NAV = {
      owner:                ["dashboard", "staff", "clients", "intake", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "billing", "messages", "ai", "migration", "settings"],
      admin:                ["dashboard", "staff", "clients", "intake", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "billing", "messages", "ai", "migration", "settings"],
      compliance_director:  ["dashboard", "staff", "clients", "intake", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "billing", "messages", "ai"],
      residential_director: ["dashboard", "clients", "training", "notes", "evv", "incidents", "alerts", "medications", "goals", "messages"],
      day_program_director: ["dashboard", "clients", "training", "notes", "evv", "incidents", "alerts", "medications", "goals", "messages"],
      house_manager:        ["dashboard", "clients", "notes", "evv", "incidents", "medications", "goals", "messages"],
      bcba:                 ["dashboard", "clients", "notes", "compliance", "incidents", "goals", "messages"],
      rn:                   ["dashboard", "clients", "notes", "incidents", "medications", "goals", "messages"],
      dsp:                  ["notes", "evv", "incidents", "medications", "goals", "messages"],
    };

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [orgId, setOrgId] = useState(null);
      const [staffProfile, setStaffProfile] = useState(null);

      const fetchOrgId = async () => {
        const { data, error } = await supabase.rpc('org_id');
        if (!error && data) setOrgId(data);
      };

      const fetchStaffProfile = async (email) => {
        const { data } = await supabase.from("staff").select("id, first_name, last_name, role, is_active").eq("email", email).maybeSingle();
        // If no staff record found, default to owner (for the main admin account)
        setStaffProfile(data || { role: "owner", first_name: "Admin", last_name: "" });
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) {
            fetchOrgId();
            fetchStaffProfile(session.user.email);
          }
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) {
            fetchOrgId();
            fetchStaffProfile(session.user.email);
          } else {
            setOrgId(null);
            setStaffProfile(null);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      const role = staffProfile?.role || "owner";
      const permissions = ROLE_PERMISSIONS[role] || ROLE_PERMISSIONS.dsp;
      const navItems = ROLE_NAV[role] || ROLE_NAV.dsp;

      const signIn = (email, password) => supabase.auth.signInWithPassword({ email, password });
      const signOut = () => supabase.auth.signOut();

      return (
        <AuthContext.Provider value={{ user, session, loading, signIn, signOut, orgId, staffProfile, role, permissions, navItems }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }
    function usePermissions() { const { permissions } = useAuth(); return permissions || ROLE_PERMISSIONS.dsp; }

    // ═══════════════════════════════════════════════════════════════
    // RESPONSIVE HOOKS
    // ═══════════════════════════════════════════════════════════════
    function useMobile() {
      const [width, setWidth] = useState(window.innerWidth);
      useEffect(() => {
        const onResize = () => setWidth(window.innerWidth);
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);
      return { isMobile: width < 768, isTablet: width < 1024, width };
    }

    // ═══════════════════════════════════════════════════════════════
    // TOAST CONTEXT — global notifications
    // ═══════════════════════════════════════════════════════════════
    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type = "success") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8 }}>
            {toasts.map(t => (
              <div key={t.id} style={{
                background: t.type === "error" ? CB.red : t.type === "warning" ? CB.amber : CB.green,
                color: CB.white, padding: "12px 20px", borderRadius: 12, fontSize: 14, fontWeight: 600,
                boxShadow: "0 8px 32px rgba(0,0,0,0.18)", animation: "successPop 0.3s ease",
                display: "flex", alignItems: "center", gap: 8, maxWidth: 360,
              }}>
                {t.type === "error" ? icons.alertTriangle({ size: 16, color: CB.white }) :
                 t.type === "warning" ? icons.clock({ size: 16, color: CB.white }) :
                 icons.checkCircle({ size: 16, color: CB.white })}
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() { return useContext(ToastContext); }

    // ═══════════════════════════════════════════════════════════════
    // SVG ICONS — consistent with landing page
    // ═══════════════════════════════════════════════════════════════
    const Icon = ({ d, size = 20, color = "currentColor", style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
        {typeof d === "string" ? <path d={d} /> : d}
      </svg>
    );

    const icons = {
      shield: (p={}) => <Icon {...p} d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />,
      dashboard: (p={}) => <Icon {...p} d={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>} />,
      users: (p={}) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      heart: (p={}) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />,
      fileText: (p={}) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />,
      checkCircle: (p={}) => <Icon {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
      alertTriangle: (p={}) => <Icon {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
      barChart: (p={}) => <Icon {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />,
      calendar: (p={}) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      zap: (p={}) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,
      lock: (p={}) => <Icon {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
      logout: (p={}) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      clock: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
      book: (p={}) => <Icon {...p} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>} />,
      search: (p={}) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
      chevDown: (p={}) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      mail: (p={}) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      mapPin: (p={}) => <Icon {...p} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />,
      arrowRight: (p={}) => <Icon {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
      plus: (p={}) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      refresh: (p={}) => <Icon {...p} d={<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>} />,
      x: (p={}) => <Icon {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
      edit: (p={}) => <Icon {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />,
      trash: (p={}) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,
      play: (p={}) => <Icon {...p} d={<polygon points="5 3 19 12 5 21 5 3"/>} />,
      stop: (p={}) => <Icon {...p} d={<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>} />,
      save: (p={}) => <Icon {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />,
      eye: (p={}) => <Icon {...p} d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
      crosshair: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></>} />,
      menu: (p={}) => <Icon {...p} d={<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>} />,
      upload: (p={}) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />,
      bell: (p={}) => <Icon {...p} d={<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>} />,
      capsule: (p={}) => <Icon {...p} d={<><rect x="6" y="2" width="12" height="20" rx="6" ry="6" transform="rotate(45 12 12)"/><line x1="7.76" y1="7.76" x2="16.24" y2="16.24"/></>} />,
    };

    // ═══════════════════════════════════════════════════════════════
    // SPINNER
    // ═══════════════════════════════════════════════════════════════
    function Spinner({ size = 20, color = CB.teal }) {
      return (
        <div style={{ width: size, height: size, border: `2.5px solid ${CB.border}`, borderTopColor: color, borderRadius: "50%", animation: "spin 0.6s linear infinite" }} />
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODAL COMPONENT — reusable overlay
    // ═══════════════════════════════════════════════════════════════
    function Modal({ open, onClose, title, subtitle, width = 520, children }) {
      const { isMobile } = useMobile();
      if (!open) return null;
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(10,30,51,0.45)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center",
          padding: isMobile ? 0 : 24, animation: "overlayIn 0.2s ease",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            width: "100%", maxWidth: isMobile ? "100%" : width, maxHeight: isMobile ? "92vh" : "90vh",
            background: CB.white, borderRadius: isMobile ? "20px 20px 0 0" : 20, boxShadow: "0 24px 80px rgba(10,30,51,0.2)",
            animation: "modalIn 0.25s ease", display: "flex", flexDirection: "column",
          }}>
            {/* Header */}
            <div style={{
              padding: "22px 28px 18px", borderBottom: `1px solid ${CB.border}`,
              display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            }}>
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: CB.navy, letterSpacing: -0.5 }}>{title}</h2>
                {subtitle && <p style={{ fontSize: 13, color: CB.textMid, marginTop: 2 }}>{subtitle}</p>}
              </div>
              <button onClick={onClose} style={{
                width: 32, height: 32, borderRadius: 8, border: "none",
                background: CB.cream, cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center", transition: "all 0.15s",
              }}

    function StatCard({ label, value, icon, color = CB.teal, trend, delay = 0 }) {
      return (
        <div style={{
          background: CB.white, borderRadius: 16, padding: "24px 22px",
          border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          animation: `fadeIn 0.5s ease ${delay}s both`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>

              {icon({ size: 20, color })}
            </div>
            {trend && (
              <span style={{ fontSize: 12, fontWeight: 700, color: trend > 0 ? CB.green : CB.red, background: trend > 0 ? "rgba(46,125,50,0.08)" : "rgba(229,57,53,0.08)", padding: "3px 8px", borderRadius: 6 }}>
                {trend > 0 ? "+" : ""}{trend}%
              </span>
            )}
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1, lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 13, color: CB.textLight, marginTop: 6, fontWeight: 500 }}>{label}</div>

    function DataTable({ columns, data, loading, emptyMessage = "No data found", onRowClick }) {
      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>;
      return (
        <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: CB.cream }}>
                  {columns.map((col, i) => (
                    <th key={i} style={{ padding: "13px 18px", textAlign: "left", fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.8, borderBottom: `1px solid ${CB.border}`, whiteSpace: "nowrap" }}>
                      {col.label}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.length === 0 ? (
                  <tr><td colSpan={columns.length} style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14 }}>{emptyMessage}</td></tr>
                ) : data.map((row, ri) => (
                  <tr key={row.id || ri} style={{ borderBottom: `1px solid ${CB.border}`, cursor: onRowClick ? "pointer" : "default" }}
                    onClick={() => onRowClick && onRowClick(row)}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = CB.white}>
                    {columns.map((col, ci) => (
                      <td key={ci} style={{ padding: "14px 18px", fontSize: 14, color: CB.text, fontWeight: col.bold ? 600 : 400 }}>
                        {col.render ? col.render(row) : row[col.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function Badge({ text, color = CB.teal }) {
      return (
        <span style={{ display: "inline-block", fontSize: 12, fontWeight: 600, color, background: `${color}12`, padding: "3px 10px", borderRadius: 6, whiteSpace: "nowrap" }}>

        </span>

    // Responsive grid: cols={4} renders 4 on desktop, 2 on tablet, 1 on phone
    function RGrid({ cols = 4, gap = 18, children, style = {} }) {
      const { isMobile, isTablet } = useMobile();
      const actualCols = isMobile ? (cols <= 2 ? 1 : 2) : isTablet ? Math.min(cols, 2) : cols;
      return (
        <div style={{ display: "grid", gridTemplateColumns: `repeat(${actualCols}, 1fr)`, gap: isMobile ? Math.min(gap, 12) : gap, ...style }}>
          {children}
        </div>
      );

    // ═══════════════════════════════════════════════════════════════
    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════════════
    function DashboardPage() {
      const [stats, setStats] = useState({ staff: 0, clients: 0, trainings: 0, auths: 0 });
      const [upcomingAlerts, setUpcomingAlerts] = useState([]);
      const [loading, setLoading] = useState(true);
      const { isMobile, isTablet } = useMobile();

      useEffect(() => { loadDashboard(); }, []);

      const loadDashboard = async () => {
        setLoading(true);
        try {
          const in30 = new Date(); in30.setDate(in30.getDate() + 30);
          const nowISO = new Date().toISOString();
          const [staffRes, clientRes, trainingRes, authRes, expTrainRes, expAuthRes, expDocRes] = await Promise.all([
            supabase.from("staff").select("id", { count: "exact", head: true }).eq("is_active", true),
            supabase.from("persons").select("id", { count: "exact", head: true }).eq("is_active", true),
            supabase.from("staff_trainings").select("id, expires_at").lt("expires_at", nowISO),
            supabase.from("person_service_authorizations").select("id", { count: "exact", head: true }),
            supabase.from("staff_trainings").select("id, expires_at, staff(first_name, last_name), training_topic_definitions(topic_name)").lt("expires_at", in30.toISOString()).order("expires_at", { ascending: true }).limit(5),
            supabase.from("person_service_authorizations").select("id, end_date, service_code_definitions(code), persons(first_name, last_name)").lt("end_date", in30.toISOString().split("T")[0]).order("end_date", { ascending: true }).limit(5),
            supabase.from("documents").select("id, doc_type, expires_at, staff(first_name, last_name), persons(first_name, last_name)").eq("is_archived", false).not("expires_at", "is", null).lt("expires_at", in30.toISOString()).order("expires_at", { ascending: true }).limit(5),
          ]);
          setStats({
            staff: staffRes.count || 0,
            clients: clientRes.count || 0,
            trainings: trainingRes.data?.length || 0,
            auths: authRes.count || 0,
          });
          // Combine upcoming alerts
          const now = new Date();
          const combined = [];
          (expTrainRes.data || []).forEach(t => {
            const days = Math.ceil((new Date(t.expires_at) - now) / 86400000);
            combined.push({ type: "training", days, label: t.training_topic_definitions?.topic_name || "Training", who: t.staff ? `${t.staff.first_name} ${t.staff.last_name}` : "?" });
          });
          (expAuthRes.data || []).forEach(a => {
            const days = Math.ceil((new Date(a.end_date + "T00:00:00") - now) / 86400000);
            combined.push({ type: "auth", days, label: a.service_code_definitions?.code || "Auth", who: a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "?" });
          });
          (expDocRes.data || []).forEach(d => {
            const days = Math.ceil((new Date(d.expires_at) - now) / 86400000);
            combined.push({ type: "doc", days, label: (d.doc_type || "Document").replace(/_/g, " "), who: d.staff ? `${d.staff.first_name} ${d.staff.last_name}` : d.persons ? `${d.persons.first_name} ${d.persons.last_name}` : "?" });
          });
          combined.sort((a, b) => a.days - b.days);
          setUpcomingAlerts(combined.slice(0, 6));
        } catch (e) { /* dashboard load error */ }
        setLoading(false);
      };

      return (
        <div>
          <PageHeader title="Dashboard" subtitle="Hope Haven Services Inc. — DHHS91172"
            action={
              <button onClick={loadDashboard} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",
                borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
              >{icons.refresh({ size: 15 })} Refresh</button>
            }
          />
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: isMobile ? 12 : 18, marginBottom: isMobile ? 20 : 28 }}>
                <StatCard label="Active Staff" value={stats.staff} icon={icons.users} color={CB.blue} delay={0} />
                <StatCard label="Active Clients" value={stats.clients} icon={icons.heart} color={CB.teal} delay={0.05} />
                <StatCard label="Overdue Trainings" value={stats.trainings} icon={icons.alertTriangle} color={stats.trainings > 0 ? CB.red : CB.green} delay={0.1} />
                <StatCard label="Authorizations" value={stats.auths} icon={icons.fileText} color={CB.navy} delay={0.15} />
              </div>
              <div style={{
                background: CB.white, borderRadius: 16, padding: 24,
                border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                animation: "fadeIn 0.5s ease 0.2s both",
              }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 16 }}>Quick Actions</h3>
                <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: 12 }}>
                  {[
                    { label: "New Service Note", icon: icons.fileText, color: CB.teal },
                    { label: "Clock In (EVV)", icon: icons.mapPin, color: CB.blue },
                    { label: "Log Incident", icon: icons.alertTriangle, color: CB.amber },
                    { label: "Run Compliance Check", icon: icons.shield, color: CB.navy },
                  ].map((action, i) => (
                    <button key={i} style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "14px 16px",
                      borderRadius: 12, border: `1px solid ${CB.border}`, background: CB.cream,
                      cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600,
                      color: CB.text, transition: "all 0.15s",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = action.color; e.currentTarget.style.background = `${action.color}08`; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.background = CB.cream; }}
                    >
                      <div style={{ width: 32, height: 32, borderRadius: 8, background: `${action.color}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {action.icon({ size: 16, color: action.color })}
                      </div>
                      {action.label}
                    </button>
                  ))}
                </div>
              </div>
              {/* Upcoming Alerts Panel */}
              {upcomingAlerts.length > 0 && (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 24, marginTop: isMobile ? 16 : 20,
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                  animation: "fadeIn 0.5s ease 0.3s both",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      {icons.bell({ size: 16, color: CB.amber })}
                      <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>Upcoming Expirations</h3>
                    </div>
                    <span style={{ fontSize: 12, color: CB.textLight, fontWeight: 600 }}>Next 30 days</span>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                    {upcomingAlerts.map((a, i) => {
                      const color = a.days <= 0 ? CB.red : a.days <= 7 ? CB.amber : CB.blue;
                      return (
                        <div key={i} style={{
                          display: "flex", alignItems: "center", gap: 12, padding: "10px 0",
                          borderBottom: i < upcomingAlerts.length - 1 ? `1px solid ${CB.border}` : "none",
                        }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 }} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <span style={{ fontSize: 13, fontWeight: 600, color: CB.text }}>{a.label}</span>
                            <span style={{ fontSize: 12, color: CB.textMid, marginLeft: 8 }}>{a.who}</span>
                          </div>
                          <span style={{
                            fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 12,
                            background: `${color}14`, color: color, whiteSpace: "nowrap",
                          }}>
                            {a.days <= 0 ? `${Math.abs(a.days)}d overdue` : `${a.days}d`}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 1: STAFF CRUD
    // ═══════════════════════════════════════════════════════════════
    const STAFF_ROLES = [
      { value: "owner", label: "Owner" },
      { value: "admin", label: "Administrator" },
      { value: "compliance_director", label: "Compliance Director" },
      { value: "residential_director", label: "Residential Director" },
      { value: "day_program_director", label: "Day Program Director" },
      { value: "house_manager", label: "House Manager" },
      { value: "dsp", label: "Direct Support Professional" },
      { value: "bcba", label: "BCBA" },
      { value: "rn", label: "Registered Nurse" },
    ];

    function StaffForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", email: "", phone: "",
        role: "dsp", hire_date: "", date_of_birth: "", is_active: true,
      });

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "",
            last_name: editing.last_name || "",
            email: editing.email || "",
            phone: editing.phone || "",
            role: editing.role || "dsp",
            hire_date: editing.hire_date || "",
            date_of_birth: editing.date_of_birth || "",
            is_active: editing.is_active !== false,
          });
        } else {
          setForm({ first_name: "", last_name: "", email: "", phone: "", role: "dsp", hire_date: "", date_of_birth: "", is_active: true });
        }
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        if (!form.hire_date) return addToast("Hire date is required", "error");
        if (!form.date_of_birth) return addToast("Date of birth is required", "error");
        setSaving(true);
        const payload = { ...form };
        if (!payload.email) delete payload.email;
        if (!payload.phone) delete payload.phone;

        let result;
        if (editing) {
          result = await supabase.from("staff").update(payload).eq("id", editing.id);
        } else {
          payload.org_id = orgId;
          result = await supabase.from("staff").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          addToast(result.error.message, "error");
        } else {
          addToast(editing ? "Staff member updated" : "Staff member added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Staff Member" : "Add Staff Member"} subtitle="All fields marked * are required">
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Email" half>
              <input style={fieldStyle} type="email" value={form.email} onChange={e => set("email", e.target.value)} placeholder="email@example.com" />
            </FormField>
            <FormField label="Phone" half>
              <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Role" required half>
              <select style={fieldStyle} value={form.role} onChange={e => set("role", e.target.value)}>
                {STAFF_ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
              </select>
            </FormField>
            <FormField label="Date of Birth" required half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Hire Date" required half>
              <input style={fieldStyle} type="date" value={form.hire_date} onChange={e => set("hire_date", e.target.value)} />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                    transition: "all 0.15s",
                  }}>
                    <input type="radio" name="status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? icons.checkCircle({ size: 16, color: form.is_active === val ? CB.green : CB.textLight }) : icons.x({ size: 16, color: form.is_active === val ? CB.red : CB.textLight })}
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          {/* Documents section */}
          {editing && <DocumentsSection entityType="staff" entityId={editing.id} orgId={orgId} entityData={editing} />}

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Add Staff"}</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function StaffPage() {
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);

      useEffect(() => { loadStaff(); }, []);

      const loadStaff = async () => {
        setLoading(true);
        const { data, error } = await supabase.from("staff").select("id, first_name, last_name, role, hire_date, date_of_birth, is_active, email, phone").order("last_name");
        if (!error) setStaff(data || []);
        setLoading(false);
      };

      const openEdit = (row) => { setEditing(row); setFormOpen(true); };
      const openAdd = () => { setEditing(null); setFormOpen(true); };

      const columns = [
        { label: "Name", bold: true, render: (r) => `${r.first_name} ${r.last_name}` },
        { label: "Role", render: (r) => <Badge text={STAFF_ROLES.find(x => x.value === r.role)?.label || r.role?.replace(/_/g, " ") || "—"} color={CB.navy} /> },
        { label: "Hire Date", render: (r) => r.hire_date ? new Date(r.hire_date + "T00:00:00").toLocaleDateString() : "—" },
        { label: "Status", render: (r) => <Badge text={r.is_active ? "Active" : "Inactive"} color={r.is_active ? CB.green : CB.textLight} /> },
        { label: "Email", render: (r) => r.email || "—" },
        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openEdit(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.edit({ size: 13 })} Edit</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Staff" subtitle="Manage team members, credentials, and training compliance"
            action={
              <PrimaryButton onClick={openAdd}>{icons.plus({ size: 16 })} Add Staff</PrimaryButton>
            }
          />
          <DataTable columns={columns} data={staff} loading={loading} emptyMessage="No staff members found" />
          <StaffForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadStaff} editing={editing} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODULE 2: CLIENT CRUD + AUTHORIZATION MANAGEMENT
    // ═══════════════════════════════════════════════════════════════
    function ClientForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true,
      });
      const [auths, setAuths] = useState([]);
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "", last_name: editing.last_name || "",
            date_of_birth: editing.date_of_birth || "", medicaid_number: editing.medicaid_number || "",
            is_active: editing.is_active !== false,
          });
          setAuths(editing.person_service_authorizations || []);
        } else {
          setForm({ first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true });
          setAuths([]);
        }
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      // Get the code string for the selected new auth
      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      const addAuth = async () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select a service code and enter units", "error");
        if (!editing) return addToast("Save the client first, then add authorizations", "warning");

        const startDate = newAuth.start_date || new Date().toISOString().split("T")[0];
        let endDate = newAuth.end_date;
        if (!endDate) {
          const d = new Date(startDate + "T00:00:00");
          d.setFullYear(d.getFullYear() + 1);
          endDate = d.toISOString().split("T")[0];
        }

        const payload = {
          org_id: orgId,
          person_id: editing.id,
          service_code_id: newAuth.service_code_id,
          authorized_units: parseInt(newAuth.authorized_units),
          used_units: 0,
          start_date: startDate,
          end_date: endDate,
        };

        const { error, data: insertData, status, statusText } = await supabase.from("person_service_authorizations").insert(payload).select();

        if (error) {
          return addToast("Failed: " + error.message, "error");
        }

        if (!insertData || insertData.length === 0) {
          addToast("Insert blocked — check RLS policies on person_service_authorizations", "error");
        } else {
          addToast("Authorization added", "success");
        }

        // Reload auths
        const { data: authData } = await supabase.from("person_service_authorizations").select("id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code)").eq("person_id", editing.id);
        setAuths(authData || []);
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      };

      const removeAuth = async (authId) => {
        const { error } = await supabase.from("person_service_authorizations").delete().eq("id", authId);
        if (error) return addToast(error.message, "error");
        setAuths(prev => prev.filter(a => a.id !== authId));
        addToast("Authorization removed", "success");
      };

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        setSaving(true);
        const payload = { ...form };
        if (!payload.date_of_birth) delete payload.date_of_birth;
        if (!payload.medicaid_number) delete payload.medicaid_number;

        let result;
        if (editing) {
          result = await supabase.from("persons").update(payload).eq("id", editing.id);
        } else {
          payload.org_id = orgId;
          result = await supabase.from("persons").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          addToast(result.error.message, "error");
        } else {
          addToast(editing ? "Client updated" : "Client added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Client" : "Add Client"} subtitle="Person management and service authorizations" width={600}>
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Date of Birth" half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
            <FormField label="Medicaid Number" half>
              <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                  }}>
                    <input type="radio" name="client_status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          {/* Authorizations Section */}
          {editing && (
            <div style={{ marginTop: 8, padding: "20px 0 0", borderTop: `1px solid ${CB.border}` }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 12 }}>Service Authorizations</h3>
              {auths.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  {auths.map(a => {
                    const aCode = a.service_code_definitions?.code || serviceCodes.find(sc => sc.id === a.service_code_id)?.code || "?";
                    const aRule = BILLING_RULES[aCode];
                    return (
                    <div key={a.id} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 14px", borderRadius: 10, background: CB.cream, marginBottom: 6,
                      border: `1px solid ${CB.border}`,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <Badge text={aCode} color={CB.blue} />
                        {aRule && <span style={{ fontSize: 11, color: CB.textLight, fontWeight: 600 }}>{aRule.label}</span>}
                        {aRule?.worksheet && <span style={{ fontSize: 10, color: CB.amber, fontWeight: 700, background: `${CB.amber}12`, padding: "1px 6px", borderRadius: 4 }}>WORKSHEET</span>}
                        <span style={{ fontSize: 13, color: CB.text, fontWeight: 600 }}>{a.used_units || 0} / {a.authorized_units} units</span>
                        {perms.viewRates && a.rate_per_unit && <span style={{ fontSize: 12, color: CB.teal, fontWeight: 700 }}>@ ${Number(a.rate_per_unit).toFixed(2)}</span>}
                        {a.end_date && <span style={{ fontSize: 12, color: CB.textLight }}>exp {new Date(a.end_date + "T00:00:00").toLocaleDateString()}</span>}
                      </div>
                      <button onClick={() => removeAuth(a.id)} style={{
                        padding: "4px 8px", borderRadius: 6, border: "none", background: "rgba(229,57,53,0.08)",
                        color: CB.red, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                      }}>{icons.trash({ size: 13, color: CB.red })}</button>
                    </div>
                    );
                  })}
                </div>
              )}
              <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 140px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Service Code</label>
                  <select style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} value={newAuth.service_code_id} onChange={e => setNewAuth(p => ({ ...p, service_code_id: e.target.value }))}>
                    <option value="">Select...</option>
                    {serviceCodes.map(sc => <option key={sc.id} value={sc.id}>{sc.code} — {sc.name}</option>)}
                  </select>
                </div>
                <div style={{ flex: "0 0 80px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>Units</label>
                  <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13 }} type="number" value={newAuth.authorized_units} onChange={e => setNewAuth(p => ({ ...p, authorized_units: e.target.value }))} placeholder="0" />
                </div>
                {perms.viewRates && (
                <div style={{ flex: "0 0 100px" }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: isWorksheet ? CB.amber : CB.textLight, marginBottom: 4, textTransform: "uppercase" }}>
                    {isWorksheet ? "Rate *" : "Rate"}
                  </label>
                  <input style={{ ...fieldStyle, padding: "9px 12px", fontSize: 13, borderColor: isWorksheet ? `${CB.amber}40` : CB.border }}
                    type="number" step="0.01" value={newAuth.rate_per_unit}
                    onChange={e => setNewAuth(p => ({ ...p, rate_per_unit: e.target.value }))}
                    placeholder={newAuthRule ? (isWorksheet ? `≤${newAuthRule.max_rate || "?"}` : `$${newAuthRule.rate || "?"}`) : "$0.00"} />
                </div>
                )}

      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [scLookup, setScLookup] = useState({});

      useEffect(() => { loadClients(); }, []);

      const loadClients = async () => {
        setLoading(true);
        const [clientRes, scRes] = await Promise.all([
          supabase.from("persons")

        { label: "DOB", render: (r) => r.date_of_birth ? new Date(r.date_of_birth + "T00:00:00").toLocaleDateString() : "—" },

        { label: "", render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openEdit(r); }} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
            borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
            color: CB.textMid, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = CB.teal; e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
          >{icons.edit({ size: 13 })} Edit</button>
        )},
      ];

      return (
        <div>
          <PageHeader title="Clients" subtitle="Person management, authorizations, and service tracking"
            action={<PrimaryButton onClick={openAdd}>{icons.plus({ size: 16 })} Add Client</PrimaryButton>}

    // ═══════════════════════════════════════════════════════════════
    // MODULE 3: TRAINING TRACKER — per-staff completion logging
    // ═══════════════════════════════════════════════════════════════
    function TrainingLogForm({ open, onClose, onSaved }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [topics, setTopics] = useState([]);
      const [form, setForm] = useState({ staff_id: "", training_topic_id: "", completed_date: "", certificate_number: "" });

      useEffect(() => {
        if (open) {
          supabase.from("staff").select("id, first_name, last_name").eq("is_active", true).order("last_name").then(({ data }) => setStaffList(data || []));
          supabase.from("training_topic_definitions").select("id, topic_name, renewal_months").order("topic_name").then(({ data }) => {
            // Deduplicate by name
            const seen = new Map();
            (data || []).forEach(t => {
              const key = t.topic_name?.trim().toLowerCase();
              if (key && !seen.has(key)) seen.set(key, t);
            });
            setTopics(Array.from(seen.values()));
          });
          setForm({ staff_id: "", training_topic_id: "", completed_date: new Date().toISOString().split("T")[0], certificate_number: "" });
        }
      }, [open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.staff_id || !form.training_topic_id || !form.completed_date) return addToast("Staff, topic, and date are required", "error");
        setSaving(true);
        const topic = topics.find(t => t.id === form.training_topic_id);
        let expiration_date = null;
        if (topic?.renewal_months) {
          const d = new Date(form.completed_date);
          d.setMonth(d.getMonth() + topic.renewal_months);
          expiration_date = d.toISOString().split("T")[0];
        }
        const { error } = await supabase.from("staff_trainings").insert({
          org_id: orgId,
          staff_id: form.staff_id,
          training_topic_id: form.training_topic_id,
          completed_at: form.completed_date,
          expires_at: expiration_date,
          certificate_url: form.certificate_number || null,
        });
        setSaving(false);
        if (error) return addToast(error.message, "error");
        addToast("Training logged successfully", "success");
        onSaved();
        onClose();
      };

      return (
        <Modal open={open} onClose={onClose} title="Log Training Completion" subtitle="Record a staff member's completed training">
          <FormField label="Staff Member" required>
            <select style={fieldStyle} value={form.staff_id} onChange={e => set("staff_id", e.target.value)}>
              <option value="">Select staff member...</option>
              {staffList.map(s => <option key={s.id} value={s.id}>{s.first_name} {s.last_name}</option>)}
            </select>
          </FormField>
          <FormField label="Training Topic" required>
            <select style={fieldStyle} value={form.training_topic_id} onChange={e => set("training_topic_id", e.target.value)}>
              <option value="">Select topic...</option>
              {topics.map(t => <option key={t.id} value={t.id}>{t.topic_name}</option>)}
            </select>
          </FormField>
          <FormRow>
            <FormField label="Completion Date" required half>
              <input style={fieldStyle} type="date" value={form.completed_date} onChange={e => set("completed_date", e.target.value)} />
            </FormField>
            <FormField label="Certificate #" half>
              <input style={fieldStyle} value={form.certificate_number} onChange={e => set("certificate_number", e.target.value)} placeholder="Optional" />
            </FormField>
          </FormRow>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.checkCircle({ size: 16 })} Log Training</PrimaryButton>
          </div>
        </Modal>
      );
    }

    function TrainingPage() {
      const [tab, setTab] = useState("bystaff");
      const [completions, setCompletions] = useState([]);
      const [topics, setTopics] = useState([]);
      const [staff, setStaff] = useState([]);
      const [allTrainings, setAllTrainings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [selectedStaff, setSelectedStaff] = useState(null);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [compRes, topicRes, staffRes] = await Promise.all([
          supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at, certificate_url, staff(first_name, last_name), training_topic_definitions(topic_name, category)").order("completed_at", { ascending: false }).limit(200),
          supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification").order("category, topic_name"),
          supabase.from("staff").select("id, first_name, last_name, role, hire_date, is_active").eq("is_active", true).order("last_name"),
        ]);
        if (!compRes.error) { setCompletions(compRes.data || []); setAllTrainings(compRes.data || []); }
        if (!topicRes.error) {
          const raw = topicRes.data || [];
          const seen = new Map();
          raw.forEach(t => {
            const key = t.topic_name?.trim().toLowerCase();
            if (!key) return;
            if (!seen.has(key)) seen.set(key, t);
            else {
              const existing = seen.get(key);
              const score = (x) => (x.renewal_months ? 1 : 0) + (x.deadline_days ? 1 : 0) + (x.requires_certification ? 1 : 0) + (x.category ? 1 : 0);
              if (score(t) > score(existing)) seen.set(key, t);
            }
          });
          setTopics(Array.from(seen.values()));
        }
        if (!staffRes.error) setStaff(staffRes.data || []);
        setLoading(false);
      };

      const categoryColors = { "30_day": CB.blue, "90_day": CB.amber, "180_day": CB.red, "abi": CB.teal, "annual": CB.navy, "ongoing": CB.textMid };

      const compColumns = [
        { label: "Staff Member", bold: true, render: (r) => r.staff ? `${r.staff.first_name} ${r.staff.last_name}` : "—" },
        { label: "Training", render: (r) => r.training_topic_definitions?.topic_name || "—" },
        { label: "Category", render: (r) => <Badge text={r.training_topic_definitions?.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.training_topic_definitions?.category] || CB.textLight} /> },
        { label: "Completed", render: (r) => r.completed_at ? new Date(r.completed_at).toLocaleDateString() : "—" },
        { label: "Expires", render: (r) => r.expires_at ? new Date(r.expires_at).toLocaleDateString() : "N/A" },
        { label: "Status", render: (r) => {
          if (!r.expires_at) return <Badge text="No Expiry" color={CB.textLight} />;
          const exp = new Date(r.expires_at);
          const now = new Date();
          const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
          if (daysLeft < 0) return <Badge text="Expired" color={CB.red} />;
          if (daysLeft < 30) return <Badge text="Expiring Soon" color={CB.amber} />;
          return <Badge text="Current" color={CB.green} />;
        }},
      ];

      const topicColumns = [
        { label: "Training Topic", bold: true, render: (r) => r.topic_name },
        { label: "Category", render: (r) => <Badge text={r.category?.replace(/_/g, " ") || "—"} color={categoryColors[r.category] || CB.textLight} /> },
        { label: "Certification", render: (r) => r.requires_certification ? <Badge text="Cert Required" color={CB.red} /> : <Badge text="No Cert" color={CB.textLight} /> },
        { label: "Due Within", render: (r) => r.deadline_days ? `${r.deadline_days} days` : "—" },
        { label: "Renewal", render: (r) => r.renewal_months ? `Every ${r.renewal_months} mo` : "One-time" },
      ];

      // Build per-staff training matrix
      const getStaffTrainingStatus = (staffMember) => {
        const now = new Date();
        const hireDate = staffMember.hire_date ? new Date(staffMember.hire_date + "T00:00:00") : null;
        const requiredTopics = topics.filter(t => t.deadline_days || t.renewal_months);
        return requiredTopics.map(topic => {
          const completion = allTrainings.find(t => t.staff_id === staffMember.id && t.training_topic_id === topic.id);
          let status = "missing";
          let dueDate = null;
          if (completion) {
            if (completion.expires_at && new Date(completion.expires_at) < now) status = "expired";
            else status = "current";
          } else if (hireDate && topic.deadline_days) {
            dueDate = new Date(hireDate);
            dueDate.setDate(dueDate.getDate() + topic.deadline_days);
            if (now > dueDate) status = "overdue";
            else {
              const daysLeft = Math.ceil((dueDate - now) / (1000*60*60*24));
              status = daysLeft <= 14 ? "due_soon" : "missing";
            }
          }
          return { topic, completion, status, dueDate };
        });
      };

      const statusIcons = {
        current: { color: CB.green, label: "✓ Current" },
        missing: { color: CB.textLight, label: "— Missing" },
        overdue: { color: CB.red, label: "✗ Overdue" },
        expired: { color: CB.red, label: "✗ Expired" },
        due_soon: { color: CB.amber, label: "⚠ Due Soon" },
      };

      const TabButton = ({ value, label }) => (
        <button onClick={() => setTab(value)} style={{
          padding: "9px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 700,
          background: tab === value ? CB.navy : "transparent",
          color: tab === value ? CB.white : CB.textMid,
          cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
        }}>{label}</button>
      );

      return (
        <div>
          <PageHeader title="Training Tracker" subtitle="27 SOW-required training topics — view by staff member, completion log, or topic definitions"
            action={<PrimaryButton onClick={() => setFormOpen(true)}>{icons.plus({ size: 16 })} Log Training</PrimaryButton>}
          />
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.cream, padding: 4, borderRadius: 10, width: "fit-content" }}>
            <TabButton value="bystaff" label="By Staff" />
            <TabButton value="completions" label="Completions" />
            <TabButton value="topics" label="Topic Definitions" />
          </div>

          {tab === "bystaff" && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              {loading ? (
                <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>
              ) : (
                <div style={{ display: "grid", gap: 12 }}>
                  {staff.map((s, si) => {
                    const matrix = getStaffTrainingStatus(s);
                    const complete = matrix.filter(m => m.status === "current").length;
                    const issues = matrix.filter(m => ["overdue", "expired", "due_soon"].includes(m.status)).length;
                    const isExpanded = selectedStaff === s.id;

                    return (
                      <div key={s.id} style={{
                        background: CB.white, borderRadius: 14, border: `1px solid ${CB.border}`,
                        boxShadow: "0 1px 3px rgba(10,30,51,0.04)", overflow: "hidden",
                        animation: `fadeIn 0.3s ease ${si * 0.03}s both`,
                      }}>
                        {/* Staff row header */}
                        <div onClick={() => setSelectedStaff(isExpanded ? null : s.id)} style={{
                          display: "flex", alignItems: "center", justifyContent: "space-between",
                          padding: "14px 20px", cursor: "pointer", transition: "background 0.15s",
                        }}
                          onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                          onMouseLeave={e => e.currentTarget.style.background = CB.white}
                        >
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{
                              width: 36, height: 36, borderRadius: 10,
                              background: issues > 0 ? `${CB.red}12` : `${CB.green}12`,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: 14, fontWeight: 700, color: issues > 0 ? CB.red : CB.green,
                            }}>{s.first_name?.[0]}{s.last_name?.[0]}</div>
                            <div>
                              <div style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{s.first_name} {s.last_name}</div>
                              <div style={{ fontSize: 12, color: CB.textLight }}>{STAFF_ROLES.find(r => r.value === s.role)?.label || s.role} — hired {s.hire_date ? new Date(s.hire_date + "T00:00:00").toLocaleDateString() : "?"}</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 13, fontWeight: 700, color: issues > 0 ? CB.red : CB.green }}>{complete}/{matrix.length}</span>
                            {issues > 0 && <Badge text={`${issues} issue${issues > 1 ? "s" : ""}`} color={CB.red} />}
                            <span style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "flex" }}>
                              {icons.chevDown({ size: 16, color: CB.textLight })}
                            </span>
                          </div>
                        </div>

                        {/* Expanded training matrix */}
                        {isExpanded && (
                          <div style={{ padding: "0 20px 16px", borderTop: `1px solid ${CB.border}` }}>
                            <div style={{ display: "grid", gap: 4, marginTop: 12 }}>
                              {matrix.map((m, i) => {
                                const si = statusIcons[m.status];
                                return (
                                  <div key={i} style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between",
                                    padding: "8px 12px", borderRadius: 8,
                                    background: m.status === "overdue" || m.status === "expired" ? `${CB.red}06` : m.status === "due_soon" ? `${CB.amber}06` : "transparent",
                                  }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1 }}>
                                      <Badge text={m.topic.category?.replace(/_/g, " ") || "—"} color={categoryColors[m.topic.category] || CB.textLight} />
                                      <span style={{ fontSize: 13, color: CB.text }}>{m.topic.topic_name}</span>
                                    </div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                      {m.completion?.completed_at && <span style={{ fontSize: 11, color: CB.textLight }}>{new Date(m.completion.completed_at).toLocaleDateString()}</span>}
                                      <span style={{ fontSize: 12, fontWeight: 700, color: si.color }}>{si.label}</span>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {tab === "completions" && (
            <DataTable columns={compColumns} data={completions} loading={loading} emptyMessage="No training completions logged yet" />
          )}
          {tab === "topics" && (
            <DataTable columns={topicColumns} data={topics} loading={loading} emptyMessage="No training topics found" />
          )}
          <TrainingLogForm open={formOpen} onClose={() => setFormOpen(false)} onSaved={loadAll} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════

                        { maxHours: 4, max_rate: 124.64 }, { maxHours: 5, max_rate: 148.12 }, { maxHours: 6, max_rate: 171.60 } ] },

      // Family & Individual Training — quarter hour, fixed
      TFB:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 8.67 },

      ELS:  { unit_type: "quarter_hour", label: "Quarter-Hour", rate: 6.25 },

    // ═══════════════════════════════════════════════════════════════
    // PDF DOCUMENT ENGINE — generates Hope Haven forms from data
    // Uses jsPDF + autoTable for client-side PDF generation
    // ═══════════════════════════════════════════════════════════════
    const HopeHavenPDF = {
      // Shared constants
      HEADER_COLOR: [10, 30, 51],   // CB.navy
      ACCENT_COLOR: [0, 137, 123],  // CB.teal
      LIGHT_BG: [250, 251, 253],
      COMPANY: "HOPE HAVEN SERVICES INC.",
      ADDRESS: "4974 W Mellow Way, South Jordan, UT 84009",
      PHONE: "801-558-8070",

      // Utility: add company header to any PDF
      _header(doc, title, subtitle) {
        const w = doc.internal.pageSize.getWidth();
        doc.setFillColor(...this.HEADER_COLOR);
        doc.rect(0, 0, w, 38, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16);
        doc.setFont("helvetica", "bold");
        doc.text(this.COMPANY, 20, 18);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(title, 20, 30);
        if (subtitle) { doc.setFontSize(8); doc.text(subtitle, w - 20, 30, { align: "right" }); }
        doc.setTextColor(0, 0, 0);
        return 48; // y offset after header
      },

      // Utility: field row — label on top, value below with underline
      _fieldRow(doc, y, fields, opts = {}) {
        const w = doc.internal.pageSize.getWidth() - 40;
        const colW = w / fields.length;
        fields.forEach((f, i) => {
          const x = 20 + i * colW;
          doc.setFontSize(8);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(100, 100, 100);
          doc.text(f.label + ":", x, y);
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(0, 0, 0);
          doc.text(String(f.value || ""), x, y + 6);
          // Underline
          const lineY = y + 8;
          doc.setDrawColor(200, 200, 200);
          doc.line(x, lineY, x + colW - 8, lineY);
        });
        return y + 18;
      },

      // Utility: section heading
      _sectionHead(doc, y, text) {
        doc.setFillColor(...this.ACCENT_COLOR);
        doc.rect(20, y, doc.internal.pageSize.getWidth() - 40, 8, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.text(text, 24, y + 6);
        doc.setTextColor(0, 0, 0);
        doc.setFont("helvetica", "normal");
        return y + 14;
      },

      // Utility: signature block
      _signatures(doc, y, signers) {
        y = this._sectionHead(doc, y, "SIGNATURES");
        signers.forEach(s => {
          doc.setFontSize(8);
          doc.setTextColor(100, 100, 100);
          doc.text(s.label + ":", 20, y + 4);
          doc.setDrawColor(0, 0, 0);
          doc.line(80, y + 4, 200, y + 4);
          doc.text("Date:", 210, y + 4);
          doc.line(230, y + 4, 300, y + 4);
          y += 14;
        });
        return y;
      },

      _download(doc, filename) {
        doc.save(filename);
      },

      // ──────────────────────────────────────────────
      // STAFF FORM: Personnel File Cover Sheet
      // ──────────────────────────────────────────────
      staffCoverSheet(staff) {
        const doc = new jspdf.jsPDF();
        let y = this._header(doc, "Staff Personnel File Cover Sheet");
        y = this._fieldRow(doc, y, [
          { label: "Employee Name", value: `${staff.first_name || ""} ${staff.last_name || ""}` },
          { label: "Hire Date", value: staff.hire_date || "" },
        ]);
        y = this._fieldRow(doc, y, [
          { label: "Position/Title", value: STAFF_ROLES.find(r => r.value === staff.role)?.label || staff.role?.replace(/_/g, " ") || "" },
          { label: "Status", value: staff.is_active !== false ? "Active" : "Inactive" },
        ]);
        y = this._fieldRow(doc, y, [
          { label: "Phone", value: staff.phone || "" },
          { label: "Email", value: staff.email || "" },
        ]);
        y += 6;
        y = this._sectionHead(doc, y, "PERSONNEL FILE CONTENTS CHECKLIST");
        const sections = [
          { title: "SECTION A: CREDENTIALS", items: ["Educational transcripts", "Degrees/Diplomas", "Professional licenses", "Relevant certifications", "Letters of recommendation"] },
          { title: "SECTION B: HIRE PAPERWORK", items: ["Employment application", "Resume", "DHHS Code of Conduct (signed)", "Medicaid Exclusion verification", "Background check (BCI)", "I-9 Employment Eligibility", "W-4 Tax Withholding", "Direct deposit authorization", "Emergency contact information", "Driver's license copy", "Auto insurance verification"] },
          { title: "SECTION C: TRAINING", items: ["General training log (24 topics)", "Emergency Mgmt Plan training", "Person-specific training", "ACRE/USU (if EPR)", "ABI training (if ABI)"] },
          { title: "SECTION D: CERTIFICATIONS", items: ["First Aid — Initial", "First Aid — Current", "CPR — Initial", "CPR — Current"] },
        ];
        sections.forEach(sec => {
          doc.setFontSize(9); doc.setFont("helvetica", "bold"); doc.setTextColor(...this.HEADER_COLOR);
