<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provly — DSPD Compliance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- v19.4: pdf-lib for audit-fidelity Hope Haven form generation -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Outfit', 'Manrope', sans-serif; background: #FAFBFD; }
    ::selection { background: #00897B; color: white; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #00897B; outline-offset: -1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes successPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 767px) {
      /* Touch-friendly inputs */
      input, select, textarea { font-size: 16px !important; min-height: 44px; }

      /* Tighter table cells on mobile */
      th, td { padding: 10px 12px !important; font-size: 13px !important; }

      /* Prevent zoom on input focus (iOS) */
      input[type="text"], input[type="email"], input[type="password"],
      input[type="number"], input[type="tel"], input[type="date"],
      select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════
    // DESIGN TOKENS — matched exactly to landing page
    // ═══════════════════════════════════════════════════════════════
    const CB = {
      navy: "#0A1E33", navyLight: "#0F2B46", blue: "#1A73E8", blueLight: "#4A9AF5",
      teal: "#00897B", tealLight: "#26A69A", tealDark: "#00695C",
      cream: "#FAFBFD", warm: "#F8F6F3", white: "#FFFFFF",
      text: "#1A1A2E", textMid: "#4A5568", textLight: "#94A3B8",
      red: "#E53935", green: "#2E7D32", amber: "#F57F17",
      border: "#E2E8F0",
      cardShadow: "0 1px 3px rgba(10,30,51,0.08), 0 8px 32px rgba(10,30,51,0.06)",
      sidebarW: 260,
    };

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE CLIENT
    // ═══════════════════════════════════════════════════════════════
    const supabase = window.supabase.createClient(
      'https://zsrnqbmzgypldraifjho.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzcm5xYm16Z3lwbGRyYWlmamhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTc0NjcsImV4cCI6MjA4OTEzMzQ2N30.-vI3ZvtGKFyoZplqpTt4IxriWEnIPg-PH8eIing93bY'
    );

    // ═══════════════════════════════════════════════════════════════
    // AUTH CONTEXT
    // ═══════════════════════════════════════════════════════════════
    const AuthContext = createContext(null);

    // ═══════════════════════════════════════════════════════════════
    // ROLE-BASED ACCESS CONTROL
    // ═══════════════════════════════════════════════════════════════
    const ROLE_LEVELS = {
      owner: 100, admin: 90, compliance_director: 80,
      residential_director: 70, day_program_director: 70,
      house_manager: 50, bcba: 60, rn: 60, dsp: 10,
    };

    const ROLE_PERMISSIONS = {
      owner:                { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: true, editClients: true, viewAudit: true, runReports: true, manageRoles: true, intake: true },
      admin:                { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: true, editClients: true, viewAudit: true, runReports: true, manageRoles: false, intake: true },
      compliance_director:  { viewRates: true, viewBilling: true, viewCompliance: true, viewAllClients: true, viewAllStaff: true, editStaff: false, editClients: true, viewAudit: true, runReports: true, manageRoles: false, intake: true },
      residential_director: { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: true, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      day_program_director: { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: true, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      house_manager:        { viewRates: false, viewBilling: false, viewCompliance: false, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: false, manageRoles: false, intake: false },
      bcba:                 { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: true, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: true, manageRoles: false, intake: false },
      rn:                   { viewRates: false, viewBilling: false, viewCompliance: true, viewAllClients: true, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: true, manageRoles: false, intake: false },
      dsp:                  { viewRates: false, viewBilling: false, viewCompliance: false, viewAllClients: false, viewAllStaff: false, editStaff: false, editClients: false, viewAudit: false, runReports: false, manageRoles: false, intake: false },
    };

    // Nav items each role can see
    const ROLE_NAV = {
      owner:                ["dashboard", "staff", "clients", "intake", "schedule", "contexts", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "finance", "docs", "messages", "ai", "migration", "settings"],
      admin:                ["dashboard", "staff", "clients", "intake", "schedule", "contexts", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "finance", "docs", "messages", "ai", "migration", "settings"],
      compliance_director:  ["dashboard", "staff", "clients", "intake", "schedule", "contexts", "training", "notes", "evv", "compliance", "incidents", "alerts", "medications", "goals", "finance", "docs", "messages", "ai"],
      residential_director: ["dashboard", "clients", "schedule", "contexts", "training", "notes", "evv", "incidents", "alerts", "medications", "goals", "docs", "messages"],
      day_program_director: ["dashboard", "clients", "schedule", "contexts", "training", "notes", "evv", "incidents", "alerts", "medications", "goals", "docs", "messages"],
      house_manager:        ["dashboard", "clients", "schedule", "notes", "evv", "incidents", "medications", "goals", "messages"],
      bcba:                 ["dashboard", "clients", "notes", "compliance", "incidents", "goals", "messages"],
      rn:                   ["dashboard", "clients", "schedule", "notes", "incidents", "medications", "goals", "messages"],
      dsp:                  ["dashboard", "schedule", "notes", "evv", "incidents", "medications", "goals", "messages"],
    };

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [orgId, setOrgId] = useState(null);
      const [staffProfile, setStaffProfile] = useState(null);
      // v19.3 — org-level enforcement settings (defaults match Soft/Warn/Warn)
      const [enforcement, setEnforcement] = useState({
        role: "soft", training: "warn", person_specific: "warn",
      });

      const fetchOrgId = async () => {
        const { data, error } = await supabase.rpc('org_id');
        if (!error && data) {
          setOrgId(data);
          // Try to load enforcement settings — graceful fallback if columns don't exist yet
          const { data: org } = await supabase.from("organizations")
            .select("enforcement_role, enforcement_training, enforcement_person_specific")
            .eq("id", data).maybeSingle();
          if (org) {
            setEnforcement({
              role: org.enforcement_role || "soft",
              training: org.enforcement_training || "warn",
              person_specific: org.enforcement_person_specific || "warn",
            });
          }
        }
      };

      const fetchStaffProfile = async (email) => {
        const { data } = await supabase.from("staff").select("id, first_name, last_name, role, is_active").eq("email", email).maybeSingle();
        // If no staff record found, default to owner (for the main admin account)
        setStaffProfile(data || { role: "owner", first_name: "Admin", last_name: "" });
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) {
            fetchOrgId();
            fetchStaffProfile(session.user.email);
          }
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setUser(session?.user ?? null);
          if (session?.user) {
            fetchOrgId();
            fetchStaffProfile(session.user.email);
          } else {
            setOrgId(null);
            setStaffProfile(null);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      const role = staffProfile?.role || "owner";
      const permissions = ROLE_PERMISSIONS[role] || ROLE_PERMISSIONS.dsp;
      const navItems = ROLE_NAV[role] || ROLE_NAV.dsp;

      const signIn = (email, password) => supabase.auth.signInWithPassword({ email, password });
      const signOut = () => supabase.auth.signOut();

      return (
        <AuthContext.Provider value={{ user, session, loading, signIn, signOut, orgId, staffProfile, role, permissions, navItems, enforcement }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }
    function usePermissions() { const { permissions } = useAuth(); return permissions || ROLE_PERMISSIONS.dsp; }

    // ═══════════════════════════════════════════════════════════════
    // RESPONSIVE HOOKS
    // ═══════════════════════════════════════════════════════════════
    function useMobile() {
      const [width, setWidth] = useState(window.innerWidth);
      useEffect(() => {
        const onResize = () => setWidth(window.innerWidth);
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);
      return { isMobile: width < 768, isTablet: width < 1024, width };
    }

    // ═══════════════════════════════════════════════════════════════
    // TOAST CONTEXT — global notifications
    // ═══════════════════════════════════════════════════════════════
    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type = "success") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8 }}>
            {toasts.map(t => (
              <div key={t.id} style={{
                background: t.type === "error" ? CB.red : t.type === "warning" ? CB.amber : CB.green,
                color: CB.white, padding: "12px 20px", borderRadius: 12, fontSize: 14, fontWeight: 600,
                boxShadow: "0 8px 32px rgba(0,0,0,0.18)", animation: "successPop 0.3s ease",
                display: "flex", alignItems: "center", gap: 8, maxWidth: 360,
              }}>
                {t.type === "error" ? icons.alertTriangle({ size: 16, color: CB.white }) :
                 t.type === "warning" ? icons.clock({ size: 16, color: CB.white }) :
                 icons.checkCircle({ size: 16, color: CB.white })}
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() { return useContext(ToastContext); }

    // ═══════════════════════════════════════════════════════════════
    // SVG ICONS — consistent with landing page
    // ═══════════════════════════════════════════════════════════════

        {typeof d === "string" ? <path d={d} /> : d}
      </svg>
    );

    const icons = {
      shield: (p={}) => <Icon {...p} d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />,

      users: (p={}) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      heart: (p={}) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />,
      fileText: (p={}) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />,
      checkCircle: (p={}) => <Icon {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
      alertTriangle: (p={}) => <Icon {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
      barChart: (p={}) => <Icon {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />,
      calendar: (p={}) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      zap: (p={}) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,

      logout: (p={}) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      clock: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
      book: (p={}) => <Icon {...p} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>} />,
      search: (p={}) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
      chevDown: (p={}) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      mail: (p={}) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      mapPin: (p={}) => <Icon {...p} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />,
      arrowRight: (p={}) => <Icon {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
      plus: (p={}) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      refresh: (p={}) => <Icon {...p} d={<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>} />,

      edit: (p={}) => <Icon {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />,
      trash: (p={}) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,

      menu: (p={}) => <Icon {...p} d={<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>} />,
      upload: (p={}) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />,
      bell: (p={}) => <Icon {...p} d={<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>} />,
      capsule: (p={}) => <Icon {...p} d={<><rect x="6" y="2" width="12" height="20" rx="6" ry="6" transform="rotate(45 12 12)"/><line x1="7.76" y1="7.76" x2="16.24" y2="16.24"/></>} />,
      dollar: (p={}) => <Icon {...p} d={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />,
      settings: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />,
    };

    // ═══════════════════════════════════════════════════════════════
    // SPINNER
    // ═══════════════════════════════════════════════════════════════
    function Spinner({ size = 20, color = CB.teal }) {
      return (
        <div style={{ width: size, height: size, border: `2.5px solid ${CB.border}`, borderTopColor: color, borderRadius: "50%", animation: "spin 0.6s linear infinite" }} />
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MODAL COMPONENT — reusable overlay
    // ═══════════════════════════════════════════════════════════════
    function Modal({ open, onClose, title, subtitle, width = 680, children }) {
      const { isMobile } = useMobile();
      if (!open) return null;
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, zIndex: 1000,
          background: "rgba(10,30,51,0.45)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center",
          padding: isMobile ? 0 : 24, animation: "overlayIn 0.2s ease",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            width: "100%", maxWidth: isMobile ? "100%" : width, maxHeight: isMobile ? "94vh" : "92vh",
            background: CB.white, borderRadius: isMobile ? "20px 20px 0 0" : 20, boxShadow: "0 24px 80px rgba(10,30,51,0.2)",
            animation: "modalIn 0.25s ease", display: "flex", flexDirection: "column",
          }}>
            {/* Header */}
            <div style={{
              padding: "22px 28px 18px", borderBottom: `1px solid ${CB.border}`,
              display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            }}>
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: CB.navy, letterSpacing: -0.5 }}>{title}</h2>
                {subtitle && <p style={{ fontSize: 13, color: CB.textMid, marginTop: 2 }}>{subtitle}</p>}
              </div>
              <button onClick={onClose} style={{
                width: 32, height: 32, borderRadius: 8, border: "none",
                background: CB.cream, cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center", transition: "all 0.15s",
              }}
                onMouseEnter={e => e.currentTarget.style.background = "#E2E8F0"}
                onMouseLeave={e => e.currentTarget.style.background = CB.cream}
              >
                {icons.x({ size: 16, color: CB.textMid })}
              </button>
            </div>
            {/* Body */}
            <div style={{ padding: "24px 28px 28px", overflowY: "auto", flex: 1 }}>
              {children}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // FORM FIELD COMPONENT
    // ═══════════════════════════════════════════════════════════════
    const fieldStyle = {
      width: "100%", padding: "11px 14px", borderRadius: 10,
      border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit",
      color: CB.text, background: CB.cream, transition: "border 0.2s",
    };

    function FormField({ label, required, children, half, style: wrapStyle }) {
      return (
        <div style={{ marginBottom: 16, width: half ? "calc(50% - 8px)" : "100%", ...wrapStyle }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: CB.text, marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5 }}>
            {label}{required && <span style={{ color: CB.red, marginLeft: 2 }}>*</span>}
          </label>
          {children}
        </div>
      );
    }

    function FormRow({ children }) {
      return <div style={{ display: "flex", gap: 16 }}>{children}</div>;
    }

    function PrimaryButton({ onClick, loading: btnLoading, children, disabled, fullWidth, color = CB.teal }) {
      return (
        <button onClick={onClick} disabled={disabled || btnLoading} style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
          padding: "12px 24px", borderRadius: 12, border: "none",
          background: disabled ? CB.textLight : `linear-gradient(135deg, ${color}, ${color}DD)`,
          color: CB.white, fontSize: 14, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: "inherit", boxShadow: `0 4px 16px ${color}40`,
          transition: "all 0.2s", width: fullWidth ? "100%" : "auto", opacity: disabled ? 0.6 : 1,
        }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.transform = "translateY(-1px)"; }}
          onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
        >
          {btnLoading ? <Spinner size={16} color={CB.white} /> : children}
        </button>
      );
    }

    function SecondaryButton({ onClick, children, color = CB.textMid }) {
      return (
        <button onClick={onClick} style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
          padding: "12px 24px", borderRadius: 12, border: `1px solid ${CB.border}`,
          background: CB.white, color, fontSize: 14, fontWeight: 600, cursor: "pointer",
          fontFamily: "inherit", transition: "all 0.15s",
        }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = color; }}
        >
          {children}
        </button>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN PAGE
    // ═══════════════════════════════════════════════════════════════
    function LoginPage() {
      const { signIn } = useAuth();
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setError("");
        setLoading(true);
        const { error: err } = await signIn(email, password);
        if (err) setError(err.message);
        setLoading(false);
      };

      return (
        <div style={{
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          background: `radial-gradient(ellipse at 30% 20%, rgba(0,137,123,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(26,115,232,0.04) 0%, transparent 50%), ${CB.cream}`,
          padding: 24,
        }}>
          <div style={{ position: "fixed", top: "15%", right: "10%", width: 350, height: 350, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,137,123,0.05) 0%, transparent 70%)", pointerEvents: "none" }} />
          <div style={{ position: "fixed", bottom: "10%", left: "10%", width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(26,115,232,0.04) 0%, transparent 70%)", pointerEvents: "none" }} />

          <div style={{ width: "100%", maxWidth: 420, animation: "fadeIn 0.5s ease" }}>
            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{
                width: 56, height: 56, borderRadius: 16,
                background: `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                marginBottom: 16, boxShadow: "0 4px 16px rgba(10,30,51,0.25)",
              }}>
                {icons.shield({ size: 28, color: CB.white })}
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1 }}>Provly</h1>
              <p style={{ fontSize: 14, color: CB.textLight, marginTop: 4, fontWeight: 500 }}>DSPD Compliance Platform</p>
            </div>

            <div style={{
              background: CB.white, borderRadius: 20, padding: "36px 32px",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>Welcome back</h2>
              <p style={{ fontSize: 14, color: CB.textMid, marginBottom: 28 }}>Sign in to your account</p>

              {error && (
                <div style={{
                  background: "rgba(229,57,53,0.08)", border: "1px solid rgba(229,57,53,0.2)",
                  borderRadius: 12, padding: "12px 16px", marginBottom: 20,
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  {icons.alertTriangle({ size: 16, color: CB.red })}
                  <span style={{ fontSize: 14, color: CB.red, fontWeight: 500 }}>{error}</span>
                </div>
              )}

              <div style={{ marginBottom: 18 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@provider.org" onKeyDown={e => e.key === "Enter" && handleSubmit(e)}
                  style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: `1px solid ${CB.border}`, fontSize: 15, fontFamily: "inherit", color: CB.text, background: CB.cream }} />
              </div>
              <div style={{ marginBottom: 28 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleSubmit(e)}
                  style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: `1px solid ${CB.border}`, fontSize: 15, fontFamily: "inherit", color: CB.text, background: CB.cream }} />
              </div>

              <button onClick={handleSubmit} disabled={loading} style={{
                width: "100%", padding: "14px 24px", borderRadius: 14, border: "none",
                background: loading ? CB.textLight : `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
                color: CB.white, fontSize: 16, fontWeight: 700, cursor: loading ? "wait" : "pointer",
                fontFamily: "inherit", letterSpacing: 0.3, boxShadow: "0 4px 16px rgba(10,30,51,0.25)",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
              }}
                onMouseEnter={e => { if (!loading) e.currentTarget.style.transform = "translateY(-1px)"; }}
                onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
              >
                {loading ? <Spinner size={18} color={CB.white} /> : "Sign In"}
              </button>
            </div>

            <div style={{ textAlign: "center", marginTop: 24 }}>
              <p style={{ fontSize: 13, color: CB.textLight }}>
                A <span style={{ fontWeight: 600, color: CB.textMid }}>Hope Haven Services Inc.</span> Product
              </p>
              <a href="/" style={{ fontSize: 13, color: CB.teal, textDecoration: "none", marginTop: 8, display: "inline-block", fontWeight: 500 }}>← Back to getprovly.com</a>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    function Sidebar({ active, onNavigate, isMobile, isOpen, onClose }) {
      const { user, signOut, staffProfile, role, navItems: allowedNav } = useAuth();

      // v19.3 — sidebar reorganized into 6 collapsible groups.
      // Each group lists items in the order they appear inside the group.
      // Items are filtered by `allowedNav` (role-based) before rendering.
      const NAV_GROUPS = [
        {
          key: "overview",
          label: "Overview",
          icon: icons.dashboard,
          items: [
            { key: "dashboard", label: "Dashboard", icon: icons.dashboard },
          ],
        },
        {
          key: "people",
          label: "People",
          icon: icons.users,
          items: [
            { key: "clients", label: "Clients", icon: icons.heart },
            { key: "staff",   label: "Staff",   icon: icons.users },
            { key: "intake",  label: "Intake",  icon: icons.plus },
          ],
        },
        {
          key: "services",
          label: "Services",
          icon: icons.calendar,
          items: [
            { key: "schedule", label: "Schedule",         icon: icons.calendar },
            { key: "contexts", label: "Service Contexts", icon: icons.dashboard },
            { key: "evv",      label: "EVV",              icon: icons.mapPin },
            { key: "notes",    label: "Service Notes",    icon: icons.fileText },
          ],
        },
        {
          key: "care",
          label: "Care",
          icon: icons.heart,
          items: [
            { key: "goals",       label: "PCSP Goals",  icon: icons.crosshair },
            { key: "medications", label: "Medications", icon: icons.capsule },
            { key: "incidents",   label: "Incidents",   icon: icons.alertTriangle },
            { key: "alerts",      label: "Alerts",      icon: icons.bell },
          ],
        },
        {
          key: "operations",
          label: "Operations",
          icon: icons.shield,
          items: [
            { key: "compliance", label: "Compliance",   icon: icons.shield },
            { key: "training",   label: "Training",     icon: icons.book },
            { key: "finance",    label: "Finance",      icon: icons.dollar },
            { key: "docs",       label: "Audit Center", icon: icons.fileText },
          ],
        },
        {
          key: "system",
          label: "System",
          icon: icons.lock,
          items: [
            { key: "messages",  label: "Messages",       icon: icons.mail },
            { key: "ai",        label: "AI Intelligence",icon: icons.zap },
            { key: "migration", label: "Data Migration", icon: icons.upload },
            { key: "settings",  label: "Settings",       icon: icons.settings },
          ],
        },
      ];

      // Collapsed/expanded state — persist across reloads via localStorage
      const [collapsedGroups, setCollapsedGroups] = useState(() => {
        try {
          const saved = localStorage.getItem("provly.sidebar.collapsed");
          return saved ? JSON.parse(saved) : {};
        } catch { return {}; }
      });
      const toggleGroup = (key) => {
        setCollapsedGroups(prev => {
          const next = { ...prev, [key]: !prev[key] };
          try { localStorage.setItem("provly.sidebar.collapsed", JSON.stringify(next)); } catch {}
          return next;
        });
      };

      // Filter groups/items by role permissions
      const visibleGroups = NAV_GROUPS
        .map(g => ({ ...g, items: g.items.filter(it => allowedNav.includes(it.key)) }))
        .filter(g => g.items.length > 0);

      // If the active page lives in a collapsed group, auto-expand it
      useEffect(() => {
        const owning = visibleGroups.find(g => g.items.some(it => it.key === active));
        if (owning && collapsedGroups[owning.key]) {
          setCollapsedGroups(prev => {
            const next = { ...prev, [owning.key]: false };
            try { localStorage.setItem("provly.sidebar.collapsed", JSON.stringify(next)); } catch {}
            return next;
          });
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [active]);

      const displayName = staffProfile ? `${staffProfile.first_name || ""} ${staffProfile.last_name || ""}`.trim() : user?.email?.split("@")[0] || "User";
      const roleLabel = STAFF_ROLES.find(r => r.value === role)?.label || role?.replace(/_/g, " ") || "User";

      const handleNav = (key) => {
        onNavigate(key);
        if (isMobile && onClose) onClose();
      };

      if (isMobile && !isOpen) return null;

      const sidebar = (
        <aside style={{
          width: isMobile ? 280 : CB.sidebarW, minHeight: "100vh", background: CB.navy,
          display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, bottom: 0,
          zIndex: isMobile ? 1001 : 50, transition: "transform 0.25s ease",
        }}>
          <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealDark})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {icons.shield({ size: 20, color: CB.white })}
              </div>
              <div style={{ display: "flex", flexDirection: "column", lineHeight: 1 }}>
                <span style={{ fontSize: 20, fontWeight: 800, color: CB.white, letterSpacing: -0.5 }}>Provly</span>
                <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.4)", letterSpacing: 0.4, marginTop: 4 }}>v19.4.3</span>
              </div>
            </div>
            {isMobile && (
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                {icons.x({ size: 20, color: "rgba(255,255,255,0.6)" })}
              </button>
            )}
          </div>
          <nav style={{ flex: 1, padding: "12px 10px", overflowY: "auto" }}>
            {visibleGroups.map((group, gi) => {
              const isCollapsed = !!collapsedGroups[group.key];
              const hasActive = group.items.some(it => it.key === active);
              // Overview (single-item) groups render their item directly without a header
              if (group.items.length === 1 && group.key === "overview") {
                const item = group.items[0];
                const isActive = active === item.key;
                return (
                  <button key={item.key} onClick={() => handleNav(item.key)} style={{
                    width: "100%", display: "flex", alignItems: "center", gap: 12,
                    padding: "11px 14px", borderRadius: 10, border: "none",
                    background: isActive ? "rgba(0,137,123,0.15)" : "transparent",
                    color: isActive ? CB.tealLight : "rgba(255,255,255,0.55)",
                    fontSize: 14, fontWeight: isActive ? 600 : 500, fontFamily: "inherit",
                    cursor: "pointer", transition: "all 0.15s", textAlign: "left",
                    marginBottom: 8, animation: `slideIn 0.3s ease ${gi * 0.03}s both`,
                  }}
                    onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.85)"; }}}
                    onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(255,255,255,0.55)"; }}}
                  >
                    {item.icon({ size: 18 })} {item.label}
                  </button>
                );
              }
              return (
                <div key={group.key} style={{ marginBottom: 4, animation: `slideIn 0.3s ease ${gi * 0.04}s both` }}>
                  <button onClick={() => toggleGroup(group.key)} style={{
                    width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "8px 14px 8px 10px", borderRadius: 8, border: "none",
                    background: "transparent", color: hasActive ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.38)",
                    fontSize: 10, fontWeight: 800, fontFamily: "inherit", letterSpacing: 0.8,
                    textTransform: "uppercase", cursor: "pointer", textAlign: "left",
                    transition: "color 0.15s",
                  }}
                    onMouseEnter={e => { e.currentTarget.style.color = "rgba(255,255,255,0.85)"; }}
                    onMouseLeave={e => { e.currentTarget.style.color = hasActive ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.38)"; }}
                  >
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {group.icon({ size: 12 })}
                      {group.label}
                    </span>
                    <span style={{ fontSize: 9, transition: "transform 0.15s", transform: isCollapsed ? "rotate(-90deg)" : "rotate(0deg)" }}>▾</span>
                  </button>
                  {!isCollapsed && (
                    <div style={{ marginTop: 2, marginBottom: 6 }}>
                      {group.items.map((item, i) => {
                        const isActive = active === item.key;
                        return (
                          <button key={item.key} onClick={() => handleNav(item.key)} style={{
                            width: "100%", display: "flex", alignItems: "center", gap: 12,
                            padding: "9px 14px 9px 22px", borderRadius: 10, border: "none",
                            background: isActive ? "rgba(0,137,123,0.15)" : "transparent",
                            color: isActive ? CB.tealLight : "rgba(255,255,255,0.55)",
                            fontSize: 13, fontWeight: isActive ? 600 : 500, fontFamily: "inherit",
                            cursor: "pointer", transition: "all 0.15s", textAlign: "left",
                            marginBottom: 1,
                          }}
                            onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.85)"; }}}
                            onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(255,255,255,0.55)"; }}}
                          >
                            {item.icon({ size: 16 })} {item.label}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>
          <div style={{ padding: "16px 16px 20px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <div style={{
                width: 34, height: 34, borderRadius: 10,
                background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealLight})`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 14, fontWeight: 700, color: CB.white,
              }}>{(staffProfile?.first_name || user?.email)?.[0]?.toUpperCase() || "U"}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.9)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {displayName}
                </div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontWeight: 500 }}>{roleLabel}</div>
              </div>
            </div>
            <button onClick={signOut} style={{
              width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)",
              background: "transparent", color: "rgba(255,255,255,0.5)", fontSize: 13,
              fontWeight: 600, fontFamily: "inherit", cursor: "pointer", transition: "all 0.15s",
            }}

    function StatCard({ label, value, icon, color = CB.teal, trend, delay = 0, onClick }) {
      const clickable = typeof onClick === "function";
      return (
        <div
          onClick={onClick}
          style={{
            background: CB.white, borderRadius: 16, padding: "24px 22px",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            animation: `fadeIn 0.5s ease ${delay}s both`,
            cursor: clickable ? "pointer" : "default",
            transition: "transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease",
          }}
          onMouseEnter={e => {
            if (!clickable) return;
            e.currentTarget.style.transform = "translateY(-2px)";
            e.currentTarget.style.boxShadow = "0 4px 6px rgba(10,30,51,0.08), 0 12px 40px rgba(10,30,51,0.10)";
            e.currentTarget.style.borderColor = `${color}40`;
          }}
          onMouseLeave={e => {
            if (!clickable) return;
            e.currentTarget.style.transform = "translateY(0)";
            e.currentTarget.style.boxShadow = CB.cardShadow;
            e.currentTarget.style.borderColor = CB.border;
          }}
        >
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: `${color}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {icon({ size: 20, color })}
            </div>
            {trend && (
              <span style={{ fontSize: 12, fontWeight: 700, color: trend > 0 ? CB.green : CB.red, background: trend > 0 ? "rgba(46,125,50,0.08)" : "rgba(229,57,53,0.08)", padding: "3px 8px", borderRadius: 6 }}>
                {trend > 0 ? "+" : ""}{trend}%
              </span>
            )}
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1, lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 13, color: CB.textLight, marginTop: 6, fontWeight: 500 }}>{label}</div>
        </div>
      );
    }

    function DataTable({ columns, data, loading, emptyMessage = "No data found", onRowClick }) {
      if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div>;
      return (
        <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: CB.cream }}>
                  {columns.map((col, i) => (
                    <th key={i} style={{ padding: "13px 18px", textAlign: "left", fontSize: 12, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.8, borderBottom: `1px solid ${CB.border}`, whiteSpace: "nowrap" }}>
                      {col.label}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.length === 0 ? (
                  <tr><td colSpan={columns.length} style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14 }}>{emptyMessage}</td></tr>
                ) : data.map((row, ri) => (
                  <tr key={row.id || ri} style={{ borderBottom: `1px solid ${CB.border}`, cursor: onRowClick ? "pointer" : "default" }}
                    onClick={() => onRowClick && onRowClick(row)}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = CB.white}>
                    {columns.map((col, ci) => (
                      <td key={ci} style={{ padding: "14px 18px", fontSize: 14, color: CB.text, fontWeight: col.bold ? 600 : 400 }}>
                        {col.render ? col.render(row) : row[col.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function Badge({ text, color = CB.teal }) {
      return (
        <span style={{ display: "inline-block", fontSize: 12, fontWeight: 600, color, background: `${color}12`, padding: "3px 10px", borderRadius: 6, whiteSpace: "nowrap" }}>

    // Responsive grid: cols={4} renders 4 on desktop, 2 on tablet, 1 on phone
    function RGrid({ cols = 4, gap = 18, children, style = {} }) {
      const { isMobile, isTablet } = useMobile();
      const actualCols = isMobile ? (cols <= 2 ? 1 : 2) : isTablet ? Math.min(cols, 2) : cols;
      return (
        <div style={{ display: "grid", gridTemplateColumns: `repeat(${actualCols}, 1fr)`, gap: isMobile ? Math.min(gap, 12) : gap, ...style }}>

      const { isMobile, isTablet } = useMobile();

      useEffect(() => { loadDashboard(); }, []);

      const loadDashboard = async () => {
        setLoading(true);
        try {
          const in30 = new Date(); in30.setDate(in30.getDate() + 30);
          const nowISO = new Date().toISOString();
          const [staffRes, clientRes, trainingRes, authRes, expTrainRes, expAuthRes, expDocRes] = await Promise.all([
            supabase.from("staff").select("id", { count: "exact", head: true }).eq("is_active", true),
            supabase.from("persons").select("id", { count: "exact", head: true }).eq("is_active", true),
            supabase.from("staff_trainings").select("id, expires_at").lt("expires_at", nowISO),
            supabase.from("person_service_authorizations").select("id", { count: "exact", head: true }),
            supabase.from("staff_trainings").select("id, expires_at, staff(first_name, last_name), training_topic_definitions(topic_name)").lt("expires_at", in30.toISOString()).order("expires_at", { ascending: true }).limit(5),
            supabase.from("person_service_authorizations").select("id, end_date, service_code_definitions(code), persons(first_name, last_name)").lt("end_date", in30.toISOString().split("T")[0]).order("end_date", { ascending: true }).limit(5),
            // v19.2.1 hotfix: split the join — some FKs weren't resolvable by PostgREST, causing 400
            supabase.from("documents").select("id, doc_type, expires_at, staff_id, person_id").eq("is_archived", false).not("expires_at", "is", null).lt("expires_at", in30.toISOString()).order("expires_at", { ascending: true }).limit(5),
          ]);
          // v19.2.1 — hydrate document names client-side
          const docs = expDocRes.data || [];
          const staffIds = [...new Set(docs.map(d => d.staff_id).filter(Boolean))];
          const personIds = [...new Set(docs.map(d => d.person_id).filter(Boolean))];
          const [staffLookup, personLookup] = await Promise.all([
            staffIds.length ? supabase.from("staff").select("id, first_name, last_name").in("id", staffIds) : Promise.resolve({ data: [] }),
            personIds.length ? supabase.from("persons").select("id, first_name, last_name").in("id", personIds) : Promise.resolve({ data: [] }),
          ]);
          const staffById = Object.fromEntries((staffLookup.data || []).map(s => [s.id, s]));
          const personById = Object.fromEntries((personLookup.data || []).map(p => [p.id, p]));
          docs.forEach(d => {
            d.staff = d.staff_id ? staffById[d.staff_id] : null;
            d.persons = d.person_id ? personById[d.person_id] : null;
          });

          setStats({
            staff: staffRes.count || 0,
            clients: clientRes.count || 0,
            trainings: trainingRes.data?.length || 0,
            auths: authRes.count || 0,
          });
          // Combine upcoming alerts
          const now = new Date();
          const combined = [];
          (expTrainRes.data || []).forEach(t => {
            const days = Math.ceil((new Date(t.expires_at) - now) / 86400000);
            combined.push({ type: "training", days, label: t.training_topic_definitions?.topic_name || "Training", who: t.staff ? `${t.staff.first_name} ${t.staff.last_name}` : "?" });

          });
          docs.forEach(d => {

            combined.push({ type: "doc", days, label: (d.doc_type || "Document").replace(/_/g, " "), who: d.staff ? `${d.staff.first_name} ${d.staff.last_name}` : d.persons ? `${d.persons.first_name} ${d.persons.last_name}` : "?" });
          });
          combined.sort((a, b) => a.days - b.days);

    // ── Competency computation helpers ───────────────────────────────
    // Given a staff member, a service code, and optionally a person,
    // determine which decks they should have completed and which are
    // missing or expired.
    function computeCompetency({ staffId, serviceCodeId, personId, decks, deckServiceCodes, completions, requirePersonSpecific = true }) {
      const today = new Date().toISOString().split("T")[0];
      const required = [];
      // 1. Universal decks (all active decks of type 'universal')
      decks.filter(d => d.is_active !== false && d.deck_type === "universal").forEach(d => required.push({ deck: d, scopePersonId: null }));
      // 2. Service-code decks (all decks mapped to this code)
      if (serviceCodeId) {
        const deckIds = deckServiceCodes.filter(m => m.service_code_id === serviceCodeId).map(m => m.deck_id);
        decks.filter(d => d.is_active !== false && d.deck_type === "service_code" && deckIds.includes(d.id)).forEach(d => required.push({ deck: d, scopePersonId: null }));
      }
      // 3. Person-specific decks (one completion per person per deck)
      if (personId && requirePersonSpecific) {
        decks.filter(d => d.is_active !== false && d.deck_type === "person_specific").forEach(d => required.push({ deck: d, scopePersonId: personId }));
      }
      // Match each required deck to a completion for this staff
      const results = required.map(({ deck, scopePersonId }) => {
        const match = completions.find(c =>
          c.staff_id === staffId &&
          c.deck_id === deck.id &&
          ((scopePersonId == null && c.person_id == null) || c.person_id === scopePersonId)
        );
        if (!match) return { deck, scopePersonId, status: "missing", completion: null };
        if (match.expires_at && match.expires_at < today) return { deck, scopePersonId, status: "expired", completion: match };
        return { deck, scopePersonId, status: "complete", completion: match };
      });
      const missing = results.filter(r => r.status === "missing");
      const expired = results.filter(r => r.status === "expired");
      const complete = results.filter(r => r.status === "complete");
      return {
        results,
        missing,
        expired,
        complete,
        isFullyQualified: missing.length === 0 && expired.length === 0,
        pctComplete: required.length === 0 ? 1 : complete.length / required.length,
      };
    }

    function StaffForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        first_name: "", last_name: "", email: "", phone: "",
        role: "dsp", hire_date: "", date_of_birth: "", is_active: true,
      });

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "",
            last_name: editing.last_name || "",
            email: editing.email || "",
            phone: editing.phone || "",
            role: editing.role || "dsp",
            hire_date: editing.hire_date || "",
            date_of_birth: editing.date_of_birth || "",
            is_active: editing.is_active !== false,
          });
        } else {
          setForm({ first_name: "", last_name: "", email: "", phone: "", role: "dsp", hire_date: "", date_of_birth: "", is_active: true });
        }
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        if (!form.hire_date) return addToast("Hire date is required", "error");
        if (!form.date_of_birth) return addToast("Date of birth is required", "error");
        setSaving(true);

        let result;
        if (editing) {
          // Build diff payload — only send fields that actually changed.
          // This avoids triggering RLS/CHECK constraints on unchanged columns
          // (e.g. role enum mismatches when role wasn't even modified).
          const diff = {};
          const fields = ["first_name", "last_name", "email", "phone", "role", "hire_date", "date_of_birth", "is_active"];
          fields.forEach(k => {
            const before = editing[k] ?? (k === "is_active" ? true : "");
            const after = form[k] ?? (k === "is_active" ? true : "");
            if (before !== after) {
              diff[k] = (after === "" && (k === "email" || k === "phone")) ? null : after;
            }
          });
          if (Object.keys(diff).length === 0) {
            setSaving(false);
            addToast("No changes to save", "info");
            onClose();
            return;
          }
          result = await supabase.from("staff").update(diff).eq("id", editing.id);
        } else {
          const payload = { ...form, org_id: orgId };
          if (!payload.email) delete payload.email;
          if (!payload.phone) delete payload.phone;
          result = await supabase.from("staff").insert(payload);
        }
        setSaving(false);
        if (result.error) {
          // Surface DB constraint errors clearly
          const msg = result.error.message || "Save failed";
          if (msg.toLowerCase().includes("role") || msg.includes("check") || msg.includes("enum")) {
            addToast(`Role update blocked by database: ${msg}. Verify the role value is allowed in the staff.role column constraint.`, "error");
          } else {
            addToast(msg, "error");
          }
        } else {
          addToast(editing ? "Staff member updated" : "Staff member added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Staff Member" : "Add Staff Member"} subtitle="All fields marked * are required" width={720}>
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Email" half>
              <input style={fieldStyle} type="email" value={form.email} onChange={e => set("email", e.target.value)} placeholder="email@example.com" />
            </FormField>
            <FormField label="Phone" half>
              <input style={fieldStyle} type="tel" value={form.phone} onChange={e => set("phone", e.target.value)} placeholder="(801) 555-0000" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Role" required half>
              <select style={fieldStyle} value={form.role} onChange={e => set("role", e.target.value)}>
                {STAFF_ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
              </select>
            </FormField>
            <FormField label="Date of Birth" required half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Hire Date" required half>
              <input style={fieldStyle} type="date" value={form.hire_date} onChange={e => set("hire_date", e.target.value)} />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                    transition: "all 0.15s",
                  }}>
                    <input type="radio" name="status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? icons.checkCircle({ size: 16, color: form.is_active === val ? CB.green : CB.textLight }) : icons.x({ size: 16, color: form.is_active === val ? CB.red : CB.textLight })}
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          {/* Documents section */}
          {editing && <DocumentsSection entityType="staff" entityId={editing.id} orgId={orgId} entityData={editing} />}

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, marginTop: 8 }}>
            <SecondaryButton onClick={onClose}>Cancel</SecondaryButton>
            <PrimaryButton onClick={handleSave} loading={saving}>{icons.save({ size: 16 })} {editing ? "Update" : "Add Staff"}</PrimaryButton>
          </div>
        </Modal>
      );
    }

    // MODULE 2: CLIENT CRUD + AUTHORIZATION MANAGEMENT
    // ═══════════════════════════════════════════════════════════════
    function ClientForm({ open, onClose, onSaved, editing }) {
      const { addToast } = useToast();
      const { orgId } = useAuth();
      const perms = usePermissions();
      const [saving, setSaving] = useState(false);
      const [serviceCodes, setServiceCodes] = useState([]);
      const [form, setForm] = useState({
        first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true,
        support_coordinator: "", support_coordinator_phone: "", support_coordinator_email: "", support_coordinator_agency: "",
        guardian_name: "", guardian_phone: "", guardian_relation: "",
        emergency_contact_name: "", emergency_contact_phone: "",
        physician_name: "", physician_phone: "",
        address: "", city: "", state: "UT", zip: "", phone: "",
      });
      const [auths, setAuths] = useState([]);
      const [newAuth, setNewAuth] = useState({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });

      useEffect(() => {
        supabase.from("service_code_definitions").select("id, code, name").order("code").then(({ data }) => setServiceCodes(data || []));
      }, []);

      useEffect(() => {
        if (editing) {
          setForm({
            first_name: editing.first_name || "", last_name: editing.last_name || "",
            date_of_birth: editing.date_of_birth || "", medicaid_number: editing.medicaid_number || "",
            is_active: editing.is_active !== false,
            support_coordinator: editing.support_coordinator || "",
            support_coordinator_phone: editing.support_coordinator_phone || "",
            support_coordinator_email: editing.support_coordinator_email || "",
            support_coordinator_agency: editing.support_coordinator_agency || "",
            guardian_name: editing.guardian_name || "",
            guardian_phone: editing.guardian_phone || "",
            guardian_relation: editing.guardian_relation || "",
            emergency_contact_name: editing.emergency_contact_name || "",
            emergency_contact_phone: editing.emergency_contact_phone || "",
            physician_name: editing.physician_name || "",
            physician_phone: editing.physician_phone || "",
            address: editing.address || "",
            city: editing.city || "",
            state: editing.state || "UT",
            zip: editing.zip || "",
            phone: editing.phone || "",
          });
          setAuths(editing.person_service_authorizations || []);
        } else {
          setForm({
            first_name: "", last_name: "", date_of_birth: "", medicaid_number: "", is_active: true,
            support_coordinator: "", support_coordinator_phone: "", support_coordinator_email: "", support_coordinator_agency: "",
            guardian_name: "", guardian_phone: "", guardian_relation: "",
            emergency_contact_name: "", emergency_contact_phone: "",
            physician_name: "", physician_phone: "",
            address: "", city: "", state: "UT", zip: "", phone: "",
          });
          setAuths([]);
        }
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      }, [editing, open]);

      const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

      // Get the code string for the selected new auth
      const newAuthCode = serviceCodes.find(sc => sc.id === newAuth.service_code_id)?.code;
      const newAuthRule = BILLING_RULES[newAuthCode];
      const isWorksheet = newAuthRule?.worksheet;

      const addAuth = async () => {
        if (!newAuth.service_code_id || !newAuth.authorized_units) return addToast("Select a service code and enter units", "error");
        if (!editing) return addToast("Save the client first, then add authorizations", "warning");

        const startDate = newAuth.start_date || new Date().toISOString().split("T")[0];
        let endDate = newAuth.end_date;
        if (!endDate) {
          const d = new Date(startDate + "T00:00:00");
          d.setFullYear(d.getFullYear() + 1);
          endDate = d.toISOString().split("T")[0];
        }

        const payload = {
          org_id: orgId,
          person_id: editing.id,
          service_code_id: newAuth.service_code_id,
          authorized_units: parseInt(newAuth.authorized_units),
          used_units: 0,
          start_date: startDate,
          end_date: endDate,
        };

        const { error, data: insertData, status, statusText } = await supabase.from("person_service_authorizations").insert(payload).select();

        if (error) {
          return addToast("Failed: " + error.message, "error");
        }

        if (!insertData || insertData.length === 0) {
          addToast("Insert blocked — check RLS policies on person_service_authorizations", "error");
        } else {
          addToast("Authorization added", "success");
        }

        // Reload auths
        const { data: authData } = await supabase.from("person_service_authorizations").select("id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code)").eq("person_id", editing.id);
        setAuths(authData || []);
        setNewAuth({ service_code_id: "", authorized_units: "", start_date: new Date().toISOString().split("T")[0], end_date: "", rate_per_unit: "" });
      };

      const removeAuth = async (authId) => {
        const { error } = await supabase.from("person_service_authorizations").delete().eq("id", authId);
        if (error) return addToast(error.message, "error");
        setAuths(prev => prev.filter(a => a.id !== authId));
        addToast("Authorization removed", "success");
      };

      const handleSave = async () => {
        if (!form.first_name || !form.last_name) return addToast("First and last name are required", "error");
        setSaving(true);
        const payload = { ...form };
        // Strip all empty optional fields so we don't write empty strings into nullable columns
        const optionalKeys = [
          "date_of_birth", "medicaid_number",
          "support_coordinator", "support_coordinator_phone", "support_coordinator_email", "support_coordinator_agency",
          "guardian_name", "guardian_phone", "guardian_relation",
          "emergency_contact_name", "emergency_contact_phone",
          "physician_name", "physician_phone",
          "address", "city", "zip", "phone",
        ];
        optionalKeys.forEach(k => { if (!payload[k]) delete payload[k]; });

        let result;
        if (editing) {
          result = await supabase.from("persons").update(payload).eq("id", editing.id);
        } else {
          payload.org_id = orgId;
          result = await supabase.from("persons").insert(payload);
        }

        // Schema fallback: if any column doesn't exist yet, retry with core fields only
        if (result.error && /column .* does not exist/i.test(result.error.message || "")) {
          const core = {
            first_name: form.first_name, last_name: form.last_name,
            date_of_birth: form.date_of_birth || null,
            medicaid_number: form.medicaid_number || null,
            is_active: form.is_active,
          };
          Object.keys(core).forEach(k => { if (core[k] === null) delete core[k]; });
          if (editing) {
            result = await supabase.from("persons").update(core).eq("id", editing.id);
          } else {
            core.org_id = orgId;
            result = await supabase.from("persons").insert(core);
          }
          if (!result.error) addToast("Saved with core fields only — some contact columns missing from schema", "warning");
        }

        setSaving(false);
        if (result.error) {
          addToast(result.error.message, "error");
        } else {
          addToast(editing ? "Client updated" : "Client added", "success");
          onSaved();
          onClose();
        }
      };

      return (
        <Modal open={open} onClose={onClose} title={editing ? "Edit Client" : "Add Client"} subtitle="Person management and service authorizations" width={760}>
          <FormRow>
            <FormField label="First Name" required half>
              <input style={fieldStyle} value={form.first_name} onChange={e => set("first_name", e.target.value)} placeholder="First name" />
            </FormField>
            <FormField label="Last Name" required half>
              <input style={fieldStyle} value={form.last_name} onChange={e => set("last_name", e.target.value)} placeholder="Last name" />
            </FormField>
          </FormRow>
          <FormRow>
            <FormField label="Date of Birth" half>
              <input style={fieldStyle} type="date" value={form.date_of_birth} onChange={e => set("date_of_birth", e.target.value)} />
            </FormField>
            <FormField label="Medicaid Number" half>
              <input style={fieldStyle} value={form.medicaid_number} onChange={e => set("medicaid_number", e.target.value)} placeholder="Medicaid ID" />
            </FormField>
          </FormRow>
          {editing && (
            <FormField label="Status">
              <div style={{ display: "flex", gap: 12 }}>
                {[true, false].map(val => (
                  <label key={String(val)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "10px 16px",
                    borderRadius: 10, border: `1px solid ${form.is_active === val ? (val ? CB.green : CB.red) : CB.border}`,
                    background: form.is_active === val ? (val ? "rgba(46,125,50,0.06)" : "rgba(229,57,53,0.06)") : CB.white,
                    cursor: "pointer", fontSize: 14, fontWeight: 600, color: form.is_active === val ? (val ? CB.green : CB.red) : CB.textMid,
                  }}>
                    <input type="radio" name="client_status" checked={form.is_active === val} onChange={() => set("is_active", val)} style={{ display: "none" }} />
                    {val ? "Active" : "Inactive"}
                  </label>
                ))}
              </div>
            </FormField>
          )}

          {/* Support Coordinator */}
          <div style={{ marginTop: 8, padding: "20px 0 0", borderTop: `1px solid ${CB.border}` }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>Support Coordinator</h3>
            <p style={{ fontSize: 12, color: CB.textLight, marginBottom: 14 }}>DSPD-assigned coordinator for this client. Used in face sheets, quarterly reports, and SC correspondence.</p>
            <FormRow>
              <FormField label="Coordinator Name" half>
                <input style={fieldStyle} value={form.support_coordinator} onChange={e => set("support_coordinator", e.target.value)} placeholder="Coordinator's full name" />
              </FormField>
              <FormField label="Agency" half>

    function ClientProfileModal({ open, onClose, client, onEdit, scLookup, onViewFull }) {

      const fmtDate = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString() : null;
      const age = client.date_of_birth ? Math.floor((new Date() - new Date(client.date_of_birth + "T00:00:00")) / (365.25 * 86400000)) : null;
      const auths = client.person_service_authorizations || [];

      return (
        <Modal open={open} onClose={onClose} title={`${client.first_name} ${client.last_name}`} subtitle={client.is_active ? "Active client" : "Inactive client"} width={680}>
          {/* Identity strip */}

              {(client.first_name?.[0] || "") + (client.last_name?.[0] || "")}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 4 }}>
                <Badge text={client.is_active ? "Active" : "Inactive"} color={client.is_active ? CB.green : CB.textLight} />
                {client.medicaid_number && <Badge text={`MA: ${client.medicaid_number}`} color={CB.navy} />}

              </div>
              {client.support_coordinator && <div style={{ fontSize: 12, color: CB.textMid }}>SC: {client.support_coordinator}{client.support_coordinator_agency ? ` (${client.support_coordinator_agency})` : ""}</div>}

          </div>

          <ProfileSection title="Identity">
            <ProfileField label="Full Name" value={`${client.first_name} ${client.last_name}`} />
            <ProfileField label="Date of Birth" value={fmtDate(client.date_of_birth)} />

            <ProfileField label="Status" value={client.is_active ? "Active" : "Inactive"} />

            <ProfileField label="Agency" value={client.support_coordinator_agency} />
            <ProfileField label="Phone" value={client.support_coordinator_phone} />
            <ProfileField label="Email" value={client.support_coordinator_email} />

          {auths.length > 0 && (

              <h3 style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 12, textTransform: "uppercase", letterSpacing: 0.8 }}>Service Authorizations ({auths.length})</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {auths.map(a => {
                  const code = a.service_code_definitions?.code || (scLookup && scLookup[a.service_code_id]) || "?";
                  const pct = a.authorized_units > 0 ? Math.min(100, (a.used_units / a.authorized_units) * 100) : 0;
                  const barColor = pct >= 90 ? CB.red : pct >= 75 ? CB.amber : CB.teal;
                  return (
                    <div key={a.id} style={{ padding: "12px 14px", borderRadius: 10, background: CB.cream, border: `1px solid ${CB.border}` }}>

    function ClientsPage({ onNavigate }) {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [formOpen, setFormOpen] = useState(false);
      const [editing, setEditing] = useState(null);
      const [scLookup, setScLookup] = useState({});
      const [viewing, setViewing] = useState(null);

      useEffect(() => { loadClients(); }, []);

      const loadClients = async () => {
        setLoading(true);
        const [clientRes, scRes] = await Promise.all([
          supabase.from("persons")
            .select("id, first_name, last_name, date_of_birth, is_active, medicaid_number, support_coordinator, support_coordinator_phone, support_coordinator_email, support_coordinator_agency, guardian_name, guardian_phone, guardian_relation, emergency_contact_name, emergency_contact_phone, physician_name, physician_phone, address, city, state, zip, phone, person_service_authorizations(id, service_code_id, authorized_units, used_units, start_date, end_date, service_code_definitions(code))")
            .order("last_name"),
          supabase.from("service_code_definitions").select("id, code").order("code"),
        ]);
        if (clientRes.error) {
          // Client load error
        } else {
          setClients(clientRes.data || []);
        }
        // Build lookup map as fallback for nested join failures
        const lookup = {};
        (scRes.data || []).forEach(sc => { lookup[sc.id] = sc.code; });
        setScLookup(lookup);
        setLoading(false);
      };

      const openEdit = (row) => { setEditing(row); setFormOpen(true); };
      const openAdd = () => { setEditing(null); setFormOpen(true); };
      const openProfile = (row) => setViewing(row);

      const columns = [
        { label: "Name", bold: true, render: (r) => (
          <button onClick={(e) => { e.stopPropagation(); openProfile(r); }} style={{
            background: "none", border: "none", padding: 0, cursor: "pointer", fontFamily: "inherit",
            fontSize: 14, fontWeight: 600, color: CB.navy, textAlign: "left",
            transition: "color 0.15s",
          }}
            onMouseEnter={e => { e.currentTarget.style.color = CB.teal; }}
            onMouseLeave={e => { e.currentTarget.style.color = CB.navy; }}
