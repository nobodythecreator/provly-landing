              <button onClick={() => setViewing(null)} style={{ padding: "10px 18px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10, fontSize: 13, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>← Back</button>
            } />
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {/* Header badges */}
              <div style={{ padding: "20px 24px", borderBottom: `1px solid ${CB.border}`, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
                <Badge text={typeLabel(inc.incident_type)} color={CB.navy} />
                <Badge text={sev.label} color={sev.color} />
                <Badge text={inc.status?.replace(/_/g, " ").toUpperCase()} color={statusColors[inc.status] || CB.textMid} />
                {inc.persons && <Badge text={`${inc.persons.first_name} ${inc.persons.last_name}`} color={CB.teal} />}
              </div>
              {/* Details */}
              <div style={{ padding: 24 }}>
                <RGrid cols={2} gap={20} style={{ marginBottom: 24 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Date & Time</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: CB.navy }}>{new Date(inc.occurred_at).toLocaleString()}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Location</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.location || "Not specified"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Reported By</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.reporter ? `${inc.reporter.first_name} ${inc.reporter.last_name}` : "Unknown"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>Reviewed By</div>
                    <div style={{ fontSize: 14, color: CB.text }}>{inc.reviewer ? `${inc.reviewer.first_name} ${inc.reviewer.last_name}` : "Pending review"}</div>
                  </div>
                </RGrid>
                {[
                  { label: "Description", value: inc.description },
                  { label: "Immediate Actions Taken", value: inc.immediate_actions },
                  { label: "Injuries", value: inc.injuries_desc },
                  { label: "Witnesses", value: inc.witnesses },
                  { label: "Notifications Sent", value: inc.notifications_sent },
                  { label: "Review Notes", value: inc.review_notes },
                ].filter(s => s.value).map((section, i) => (
                  <div key={i} style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: CB.textLight, textTransform: "uppercase", marginBottom: 6 }}>{section.label}</div>
                    <div style={{ padding: "12px 16px", background: CB.cream, borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, color: CB.text, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{section.value}</div>
                  </div>
                ))}
              </div>
              {/* Review actions */}
              {perms.viewCompliance && inc.status !== "closed" && inc.status !== "resolved" && (
                <div style={{ padding: "20px 24px", borderTop: `1px solid ${CB.border}`, background: CB.cream }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 10 }}>Review Actions</div>
                  <textarea value={reviewNotes} onChange={e => setReviewNotes(e.target.value)} placeholder="Add review notes (optional)..."
                    style={{ ...fieldStyle, marginBottom: 12, minHeight: 72, resize: "vertical" }} />
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <button onClick={() => updateStatus(inc.id, "under_review", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.blue}15`, color: CB.blue, cursor: "pointer", fontFamily: "inherit" }}>Mark Under Review</button>
                    <button onClick={() => updateStatus(inc.id, "resolved", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.green}15`, color: CB.green, cursor: "pointer", fontFamily: "inherit" }}>Resolve</button>
                    <button onClick={() => updateStatus(inc.id, "closed", reviewNotes)} style={{ padding: "10px 18px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, background: `${CB.textLight}20`, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>Close</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div>
          <PageHeader title="Incident Reports" subtitle="DHHS-compliant incident documentation and tracking" action={
            <button onClick={() => setShowForm(true)} style={{ padding: "10px 20px", background: CB.red, color: CB.white, border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8 }}>
              {icons.alertTriangle({ size: 16, color: CB.white })} Report Incident
            </button>
          } />

          {/* Filter tabs */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div style={{ display: "flex", gap: 4, background: CB.cream, padding: 4, borderRadius: 12 }}>
              {[{ v: "all", l: "All" }, { v: "open", l: "Open" }, { v: "closed", l: "Closed" }].map(t => (
                <button key={t.v} onClick={() => setFilter(t.v)} style={{
                  padding: "10px 20px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: filter === t.v ? CB.navy : "transparent", color: filter === t.v ? CB.white : CB.textMid,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{t.l}</button>
              ))}
            </div>
            <div style={{ fontSize: 13, color: CB.textMid }}>{filtered.length} incident{filtered.length !== 1 ? "s" : ""}</div>
          </div>

          {/* Incident list */}
          {loading ? <div style={{ display: "flex", justifyContent: "center", padding: 48 }}><Spinner size={24} /></div> : (
            <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
              {filtered.length === 0 ? (
                <div style={{ padding: 48, textAlign: "center" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: CB.navy }}>No incidents reported</div>
                  <div style={{ fontSize: 13, color: CB.textMid }}>Use the Report Incident button to file a new report</div>
                </div>
              ) : filtered.map((inc, i) => {
                const sev = sevStyle(inc.severity);
                return (
                  <div key={inc.id} onClick={() => setViewing(inc)} style={{
                    padding: "16px 24px", borderBottom: i < filtered.length - 1 ? `1px solid ${CB.border}` : "none",
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 16, transition: "background 0.1s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{
                      width: 8, height: 8, borderRadius: 4, background: sev.color, flexShrink: 0,
                    }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: CB.navy }}>{typeLabel(inc.incident_type)}</span>
                        <Badge text={sev.label} color={sev.color} />
                        <Badge text={inc.status?.replace(/_/g, " ")} color={statusColors[inc.status] || CB.textMid} />
                      </div>
                      <div style={{ fontSize: 13, color: CB.textMid, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {inc.persons ? `${inc.persons.first_name} ${inc.persons.last_name} — ` : ""}{(inc.description || "").substring(0, 120)}
                      </div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 12, color: CB.textLight }}>{new Date(inc.occurred_at).toLocaleDateString()}</div>
                      <div style={{ fontSize: 11, color: CB.textLight }}>{inc.reporter ? `${inc.reporter.first_name} ${inc.reporter.last_name}` : ""}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Report Incident Modal */}
          <Modal open={showForm} onClose={() => setShowForm(false)} title="Report Incident" subtitle="All fields are logged for DHHS compliance" width={640}>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Type */}
              <FormField label="Incident Type" required>
                <select value={form.incident_type} onChange={e => set("incident_type", e.target.value)} style={fieldStyle}>
                  <option value="">Select type...</option>
                  {INCIDENT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </FormField>
              {/* Severity */}
              <div>
                <label style={{ fontSize: 13, fontWeight: 700, color: CB.navy, marginBottom: 8, display: "block" }}>Severity <span style={{ color: CB.red }}>*</span></label>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {INCIDENT_SEVERITY.map(s => (
                    <button key={s.value} onClick={() => set("severity", s.value)} style={{
                      padding: "10px 16px", borderRadius: 10, border: `2px solid ${form.severity === s.value ? s.color : CB.border}`,
                      background: form.severity === s.value ? `${s.color}12` : CB.white,
                      cursor: "pointer", fontFamily: "inherit", textAlign: "left", flex: 1, minWidth: 100,
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: s.color }}>{s.label}</div>
                      <div style={{ fontSize: 11, color: CB.textMid, marginTop: 2 }}>{s.desc}</div>
                    </button>
                  ))}
                </div>
              </div>
              {/* Client */}
              <FormField label="Client Involved">
                <select value={form.person_id} onChange={e => set("person_id", e.target.value)} style={fieldStyle}>
                  <option value="">No client / not applicable</option>
                  {clients.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
                </select>
              </FormField>
              {/* Date/Time + Location */}
              <RGrid cols={2} gap={12}>
                <FormField label="Date & Time" required style={{ marginBottom: 0 }}>
                  <input type="datetime-local" value={form.occurred_at} onChange={e => set("occurred_at", e.target.value)} style={fieldStyle} />
                </FormField>
                <FormField label="Location" style={{ marginBottom: 0 }}>
                  <input value={form.location} onChange={e => set("location", e.target.value)} placeholder="Where did this occur?" style={fieldStyle} />
                </FormField>
              </RGrid>
              {/* Description */}
              <FormField label="Description" required>
                <textarea value={form.description} onChange={e => set("description", e.target.value)} rows={4}
                  placeholder="Describe what happened in detail..." style={{ ...fieldStyle, resize: "vertical", minHeight: 100 }} />
              </FormField>
              {/* Immediate Actions */}
              <FormField label="Immediate Actions Taken">
                <textarea value={form.immediate_actions} onChange={e => set("immediate_actions", e.target.value)} rows={3}
                  placeholder="What was done immediately in response?" style={{ ...fieldStyle, resize: "vertical" }} />
              </FormField>
              {/* Injuries */}
              <FormField label="Injuries">
                <input value={form.injuries_desc} onChange={e => set("injuries_desc", e.target.value)} placeholder="Describe any injuries sustained" style={fieldStyle} />
              </FormField>
              {/* Witnesses + Notifications */}
              <RGrid cols={2} gap={12}>
                <FormField label="Witnesses" style={{ marginBottom: 0 }}>
                  <input value={form.witnesses} onChange={e => set("witnesses", e.target.value)} placeholder="Names of witnesses" style={fieldStyle} />
                </FormField>
                <FormField label="Notifications Sent" style={{ marginBottom: 0 }}>
                  <input value={form.notifications_sent} onChange={e => set("notifications_sent", e.target.value)} placeholder="Guardian, SC, DHHS, police..." style={fieldStyle} />
                </FormField>
              </RGrid>
              {/* Submit */}
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 8 }}>
                <button onClick={() => setShowForm(false)} style={{ padding: "10px 20px", background: "transparent", border: `1px solid ${CB.border}`, borderRadius: 10, fontSize: 14, fontWeight: 600, color: CB.textMid, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSubmit} disabled={saving} style={{
                  padding: "10px 24px", background: CB.red, color: CB.white, border: "none", borderRadius: 10,
                  fontSize: 14, fontWeight: 700, cursor: saving ? "wait" : "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 8, opacity: saving ? 0.7 : 1,
                }}>{saving ? <Spinner size={14} color={CB.white} /> : icons.alertTriangle({ size: 15, color: CB.white })} File Report</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // NOTIFICATIONS & EXPIRATION ALERTS
    // ═══════════════════════════════════════════════════════════════
    function AlertsPage() {
      const [loading, setLoading] = useState(true);
      const [alerts, setAlerts] = useState([]);
      const [filter, setFilter] = useState("all"); // all, critical, warning, upcoming
      const [catFilter, setCatFilter] = useState("all"); // all, training, authorization, document
      const { isMobile } = useMobile();
      const { addToast } = useToast();

      useEffect(() => { loadAlerts(); }, []);

      const loadAlerts = async () => {
        setLoading(true);
        try {
          const [trainRes, topicRes, staffRes, authRes, clientRes, docRes] = await Promise.all([
            supabase.from("staff_trainings").select("id, staff_id, training_topic_id, completed_at, expires_at, staff(first_name, last_name, is_active), training_topic_definitions(topic_name, category, renewal_months)"),
            supabase.from("training_topic_definitions").select("id, topic_name, category, deadline_days, renewal_months, requires_certification"),
            supabase.from("staff").select("id, first_name, last_name, hire_date, is_active").eq("is_active", true),
            supabase.from("person_service_authorizations").select("id, person_id, service_code_id, authorized_units, used_units, start_date, end_date, rate_per_unit, service_code_definitions(code), persons(first_name, last_name)"),
            supabase.from("persons").select("id, first_name, last_name, is_active").eq("is_active", true),
            supabase.from("documents").select("id, staff_id, person_id, doc_type, file_name, expires_at, uploaded_at, staff(first_name, last_name), persons(first_name, last_name)").eq("is_archived", false).not("expires_at", "is", null),
          ]);

          const trainings = trainRes.data || [];
          const topics = topicRes.data || [];
          const staff = staffRes.data || [];
          const auths = authRes.data || [];
          const docs = docRes.data || [];
          const now = new Date();
          const collected = [];

          const daysUntil = (dateStr) => {
            if (!dateStr) return Infinity;
            const d = new Date(dateStr.includes("T") ? dateStr : dateStr + "T00:00:00");
            return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
          };

          const urgency = (days) => {
            if (days <= 0) return "critical";
            if (days <= 30) return "warning";
            if (days <= 90) return "upcoming";
            return "ok";
          };

          // ── TRAINING EXPIRATIONS ──
          trainings.forEach(t => {
            if (!t.expires_at) return;
            if (t.staff && !t.staff.is_active) return;
            const days = daysUntil(t.expires_at);
            const urg = urgency(days);
            if (urg === "ok") return;
            const staffName = t.staff ? `${t.staff.first_name} ${t.staff.last_name}` : "Unknown";
            const topicName = t.training_topic_definitions?.topic_name || "Training";
            collected.push({
              id: `train-${t.id}`,
              category: "training",
              urgency: urg,
              days,
              title: topicName,
              subtitle: staffName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago (${new Date(t.expires_at).toLocaleDateString()})`
                : `Expires in ${days} day${days!==1?"s":""} (${new Date(t.expires_at).toLocaleDateString()})`,
              date: t.expires_at,
            });
          });

          // ── MISSING REQUIRED TRAININGS (overdue from hire date) ──
          const requiredTopics = topics.filter(t => t.deadline_days);
          staff.forEach(s => {
            if (!s.hire_date) return;
            const hireDate = new Date(s.hire_date + "T00:00:00");
            requiredTopics.forEach(topic => {
              const hasCompletion = trainings.find(t => t.staff_id === s.id && t.training_topic_id === topic.id);
              if (hasCompletion) return; // handled above or completed
              const deadline = new Date(hireDate);
              deadline.setDate(deadline.getDate() + topic.deadline_days);
              const days = daysUntil(deadline.toISOString());
              const urg = urgency(days);
              if (urg === "ok") return;
              collected.push({
                id: `train-missing-${s.id}-${topic.id}`,
                category: "training",
                urgency: urg,
                days,
                title: `${topic.topic_name} — Not Completed`,
                subtitle: `${s.first_name} ${s.last_name}`,
                detail: days <= 0
                  ? `Due ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago (${deadline.toLocaleDateString()})`
                  : `Due in ${days} day${days!==1?"s":""} (${deadline.toLocaleDateString()})`,
                date: deadline.toISOString(),
              });
            });
          });

          // ── SERVICE AUTHORIZATION EXPIRATIONS ──
          auths.forEach(a => {
            if (!a.end_date) return;
            const days = daysUntil(a.end_date);
            const urg = urgency(days);
            if (urg === "ok") return;
            const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown Client";
            const code = a.service_code_definitions?.code || "Service";
            collected.push({
              id: `auth-${a.id}`,
              category: "authorization",
              urgency: urg,
              days,
              title: `${code} Authorization`,
              subtitle: clientName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago — ${a.used_units || 0}/${a.authorized_units} units used`
                : `Expires in ${days} day${days!==1?"s":""} — ${a.used_units || 0}/${a.authorized_units} units used`,
              date: a.end_date,
            });
          });

          // ── AUTHORIZATION UTILIZATION WARNINGS ──
          auths.forEach(a => {
            if (!a.authorized_units || a.authorized_units === 0) return;
            const endDays = daysUntil(a.end_date);
            if (endDays <= 0) return; // already flagged as expired
            const pct = (a.used_units || 0) / a.authorized_units;
            if (pct >= 0.9 && pct < 1) {
              const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown";
              collected.push({
                id: `auth-util-${a.id}`,
                category: "authorization",
                urgency: "warning",
                days: endDays,
                title: `${a.service_code_definitions?.code || "Service"} — ${Math.round(pct*100)}% Used`,
                subtitle: clientName,
                detail: `${a.used_units}/${a.authorized_units} units consumed, ${endDays} day${endDays!==1?"s":""} remaining`,
                date: a.end_date,
              });
            } else if (pct >= 1) {
              const clientName = a.persons ? `${a.persons.first_name} ${a.persons.last_name}` : "Unknown";
              collected.push({
                id: `auth-exh-${a.id}`,
                category: "authorization",
                urgency: "critical",
                days: 0,
                title: `${a.service_code_definitions?.code || "Service"} — Units Exhausted`,
                subtitle: clientName,
                detail: `All ${a.authorized_units} units used`,
                date: a.end_date,
              });
            }
          });

          // ── DOCUMENT EXPIRATIONS ──
          docs.forEach(d => {
            if (!d.expires_at) return;
            const days = daysUntil(d.expires_at);
            const urg = urgency(days);
            if (urg === "ok") return;
            const ownerName = d.staff ? `${d.staff.first_name} ${d.staff.last_name}` : d.persons ? `${d.persons.first_name} ${d.persons.last_name}` : "Unknown";
            collected.push({
              id: `doc-${d.id}`,
              category: "document",
              urgency: urg,
              days,
              title: (d.doc_type || "Document").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()),
              subtitle: ownerName,
              detail: days <= 0
                ? `Expired ${Math.abs(days)} day${Math.abs(days)!==1?"s":""} ago`
                : `Expires in ${days} day${days!==1?"s":""} (${new Date(d.expires_at).toLocaleDateString()})`,
              date: d.expires_at,
            });
          });

          // Sort: critical first, then by days ascending
          const urgOrder = { critical: 0, warning: 1, upcoming: 2 };
          collected.sort((a, b) => urgOrder[a.urgency] - urgOrder[b.urgency] || a.days - b.days);
          setAlerts(collected);
        } catch (e) {
          addToast("Failed to load alerts", "error");
        }
        setLoading(false);
      };

      const filtered = alerts.filter(a => {
        if (filter !== "all" && a.urgency !== filter) return false;
        if (catFilter !== "all" && a.category !== catFilter) return false;
        return true;
      });

      const counts = { critical: 0, warning: 0, upcoming: 0 };
      alerts.forEach(a => { if (counts[a.urgency] !== undefined) counts[a.urgency]++; });

      const urgColors = { critical: CB.red, warning: CB.amber, upcoming: CB.blue };
      const urgLabels = { critical: "Critical", warning: "Warning", upcoming: "Upcoming" };
      const catIcons = { training: icons.book, authorization: icons.fileText, document: icons.shield };
      const catLabels = { training: "Training", authorization: "Authorization", document: "Document" };

      return (
        <div>
          <PageHeader title="Notifications & Alerts" subtitle="Expiration tracking — trainings, authorizations, documents"
            action={
              <button onClick={loadAlerts} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",
                borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
              >{icons.refresh({ size: 15 })} Refresh</button>
            }
          />
          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <>
              {/* Summary Cards */}
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(3, 1fr)" : "repeat(3, 1fr)", gap: isMobile ? 10 : 16, marginBottom: isMobile ? 16 : 24 }}>
                {[
                  { key: "critical", label: "Critical", color: CB.red, icon: icons.alertTriangle, count: counts.critical },
                  { key: "warning", label: "30-Day Warning", color: CB.amber, icon: icons.clock, count: counts.warning },
                  { key: "upcoming", label: "60–90 Day", color: CB.blue, icon: icons.calendar, count: counts.upcoming },
                ].map((card, i) => (
                  <button key={card.key} onClick={() => setFilter(filter === card.key ? "all" : card.key)} style={{
                    background: filter === card.key ? `${card.color}10` : CB.white,
                    border: `1.5px solid ${filter === card.key ? card.color : CB.border}`,
                    borderRadius: 14, padding: isMobile ? "14px 10px" : "18px 20px", cursor: "pointer",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                    fontFamily: "inherit", boxShadow: CB.cardShadow,
                    animation: `fadeIn 0.4s ease ${i * 0.05}s both`, transition: "all 0.15s",
                  }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: `${card.color}14`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {card.icon({ size: 18, color: card.color })}
                    </div>
                    <span style={{ fontSize: 28, fontWeight: 800, color: card.count > 0 ? card.color : CB.textLight }}>{card.count}</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: CB.textMid, textTransform: "uppercase", letterSpacing: 0.5 }}>{card.label}</span>
                  </button>
                ))}
              </div>

              {/* Category Filter */}
              <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
                {[
                  { key: "all", label: "All Categories" },
                  { key: "training", label: "Trainings" },
                  { key: "authorization", label: "Authorizations" },
                  { key: "document", label: "Documents" },
                ].map(c => (
                  <button key={c.key} onClick={() => setCatFilter(c.key)} style={{
                    padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                    border: `1px solid ${catFilter === c.key ? CB.teal : CB.border}`,
                    background: catFilter === c.key ? `${CB.teal}10` : CB.white,
                    color: catFilter === c.key ? CB.tealDark : CB.textMid,
                    cursor: "pointer", transition: "all 0.15s",
                  }}>{c.label}</button>
                ))}
              </div>

              {/* Alert List */}
              {filtered.length === 0 ? (
                <div style={{
                  background: CB.white, borderRadius: 16, padding: 48, textAlign: "center",
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                }}>
                  <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.green}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                    {icons.checkCircle({ size: 28, color: CB.green })}
                  </div>
                  <h3 style={{ fontSize: 17, fontWeight: 700, color: CB.navy, marginBottom: 6 }}>
                    {alerts.length === 0 ? "All Clear" : "No Matching Alerts"}
                  </h3>
                  <p style={{ fontSize: 14, color: CB.textMid }}>
                    {alerts.length === 0
                      ? "No expiring trainings, authorizations, or documents within the next 90 days."
                      : "Try adjusting your filters to see other alerts."}
                  </p>
                </div>
              ) : (
                <div style={{
                  background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`,
                  boxShadow: CB.cardShadow, overflow: "hidden",
                }}>
                  {filtered.map((alert, i) => (
                    <div key={alert.id} style={{
                      display: "flex", alignItems: isMobile ? "flex-start" : "center", gap: isMobile ? 12 : 16,
                      padding: isMobile ? "14px 16px" : "16px 24px",
                      borderBottom: i < filtered.length - 1 ? `1px solid ${CB.border}` : "none",
                      animation: `fadeIn 0.3s ease ${Math.min(i * 0.03, 0.5)}s both`,
                      flexDirection: isMobile ? "column" : "row",
                    }}>
                      {/* Urgency Dot + Category Icon */}
                      <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: isMobile ? "100%" : 220 }}>
                        <div style={{
                          width: 10, height: 10, borderRadius: "50%", flexShrink: 0,
                          background: urgColors[alert.urgency],
                          boxShadow: alert.urgency === "critical" ? `0 0 8px ${CB.red}60` : "none",
                          animation: alert.urgency === "critical" ? "pulse 2s ease-in-out infinite" : "none",
                        }} />
                        <div style={{
                          width: 34, height: 34, borderRadius: 9, flexShrink: 0,
                          background: `${urgColors[alert.urgency]}12`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          {(catIcons[alert.category] || icons.bell)({ size: 16, color: urgColors[alert.urgency] })}
                        </div>
                        <div style={{ minWidth: 0 }}>
                          <div style={{ fontSize: 14, fontWeight: 700, color: CB.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {alert.title}
                          </div>
                          <div style={{ fontSize: 12, color: CB.textMid }}>{alert.subtitle}</div>
                        </div>
                      </div>

                      {/* Detail */}
                      <div style={{ flex: 1, fontSize: 13, color: CB.textMid, minWidth: 0 }}>
                        {alert.detail}
                      </div>

                      {/* Badge */}
                      <div style={{
                        padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700,
                        background: `${urgColors[alert.urgency]}14`, color: urgColors[alert.urgency],
                        whiteSpace: "nowrap", textTransform: "uppercase", letterSpacing: 0.5,
                        flexShrink: 0,
                      }}>
                        {alert.days <= 0 ? "Expired" : `${alert.days}d`}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Summary footer */}
              {alerts.length > 0 && (
                <div style={{ marginTop: 16, padding: "12px 20px", background: `${CB.navy}08`, borderRadius: 12, fontSize: 13, color: CB.textMid, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                  <span>{alerts.length} total alert{alerts.length !== 1 ? "s" : ""} across {new Set(alerts.map(a => a.category)).size} categories</span>
                  <span>Showing {filtered.length} of {alerts.length}</span>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MEDICATION TRACKING — MAR, med pass logging, missed dose flags
    // ═══════════════════════════════════════════════════════════════
    const MED_ROUTES = ["Oral", "Topical", "Sublingual", "Inhalation", "Injection", "Rectal", "Transdermal", "Ophthalmic", "Otic", "Nasal", "Other"];
    const MED_FREQUENCIES = ["Once daily", "Twice daily", "Three times daily", "Four times daily", "Every morning", "Every evening", "Every bedtime", "Weekly", "As needed (PRN)", "Other"];
    const MED_LOG_STATUS = [
      { value: "given", label: "Given", color: "#2E7D32" },
      { value: "refused", label: "Refused", color: "#E53935" },
      { value: "held", label: "Held", color: "#F57F17" },
      { value: "not_available", label: "Not Available", color: "#7B1FA2" },
      { value: "self_administered", label: "Self-Administered", color: "#1565C0" },
    ];
    const DEFAULT_TIMES = { "Once daily": ["08:00"], "Twice daily": ["08:00","20:00"], "Three times daily": ["08:00","12:00","18:00"], "Four times daily": ["06:00","12:00","18:00","22:00"], "Every morning": ["08:00"], "Every evening": ["18:00"], "Every bedtime": ["21:00"], "Weekly": ["08:00"] };

    function MedicationsPage() {
      const [tab, setTab] = useState("mar"); // mar, medications, missed
      const [clients, setClients] = useState([]);
      const [selectedClient, setSelectedClient] = useState("");
      const [medications, setMedications] = useState([]);
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showMedForm, setShowMedForm] = useState(false);
      const [editingMed, setEditingMed] = useState(null);
      const [showLogModal, setShowLogModal] = useState(null); // { medication, date, time }
      const [marDate, setMarDate] = useState(new Date().toISOString().split("T")[0]);
      const { isMobile } = useMobile();
      const { addToast } = useToast();
      const { orgId, staffProfile } = useAuth();

      useEffect(() => { loadClients(); }, []);
      useEffect(() => { if (selectedClient) loadMedData(); }, [selectedClient, marDate]);

      const loadClients = async () => {
        const { data } = await supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name");
        setClients(data || []);
        if (data?.length) setSelectedClient(data[0].id);
        setLoading(false);
      };

      const loadMedData = async () => {
        setLoading(true);
        try {
          // Get 7-day window for MAR
          const startDate = new Date(marDate + "T00:00:00");
          const endDate = new Date(startDate); endDate.setDate(endDate.getDate() + 6);
          const [medRes, logRes] = await Promise.all([
            supabase.from("medications").select("*").eq("person_id", selectedClient).eq("is_active", true).order("medication_name"),
            supabase.from("medication_logs").select("*, staff(first_name, last_name)").eq("person_id", selectedClient).gte("scheduled_date", startDate.toISOString().split("T")[0]).lte("scheduled_date", endDate.toISOString().split("T")[0]),
          ]);
          setMedications(medRes.data || []);
          setLogs(logRes.data || []);
        } catch (e) { addToast("Failed to load medication data", "error"); }
        setLoading(false);
      };

      // ── Medication Form ──
      const MedForm = () => {
        const [form, setForm] = useState(editingMed || {
          medication_name: "", dosage: "", route: "Oral", frequency: "Once daily",
          schedule_times: ["08:00"], prescribed_by: "", pharmacy: "", rx_number: "",
          start_date: new Date().toISOString().split("T")[0], end_date: "",
          is_prn: false, prn_reason: "", special_instructions: "", is_active: true,
        });
        const [saving, setSaving] = useState(false);

        useEffect(() => {
          if (!editingMed && DEFAULT_TIMES[form.frequency]) {
            setForm(f => ({ ...f, schedule_times: DEFAULT_TIMES[form.frequency] || f.schedule_times }));
          }
        }, [form.frequency]);

        const handleSave = async () => {
          if (!form.medication_name || !form.dosage) return addToast("Name and dosage required", "error");
          setSaving(true);
          const payload = { ...form, person_id: selectedClient, org_id: orgId };
          delete payload.id; delete payload.created_at;
          if (editingMed) {
            const { error } = await supabase.from("medications").update(payload).eq("id", editingMed.id);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
            addToast("Medication updated", "success");
          } else {
            const { error } = await supabase.from("medications").insert(payload);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
            addToast("Medication added", "success");
          }
          setSaving(false); setShowMedForm(false); setEditingMed(null); loadMedData();
        };

        const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };
        const addTime = () => setForm(f => ({ ...f, schedule_times: [...(f.schedule_times || []), "12:00"] }));
        const removeTime = (idx) => setForm(f => ({ ...f, schedule_times: f.schedule_times.filter((_, i) => i !== idx) }));
        const updateTime = (idx, val) => setForm(f => ({ ...f, schedule_times: f.schedule_times.map((t, i) => i === idx ? val : t) }));

        return (
          <Modal open={true} onClose={() => { setShowMedForm(false); setEditingMed(null); }} title={editingMed ? "Edit Medication" : "Add Medication"} width={560}>
            <div style={{ padding: "20px 28px 24px", overflowY: "auto", maxHeight: "65vh" }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Medication Name *</label>
                  <input style={fs} value={form.medication_name} onChange={e => setForm(f => ({ ...f, medication_name: e.target.value }))} placeholder="e.g. Lisinopril" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Dosage *</label>
                  <input style={fs} value={form.dosage} onChange={e => setForm(f => ({ ...f, dosage: e.target.value }))} placeholder="e.g. 10mg" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Route</label>
                  <select style={fs} value={form.route} onChange={e => setForm(f => ({ ...f, route: e.target.value }))}>
                    {MED_ROUTES.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Frequency</label>
                  <select style={fs} value={form.frequency} onChange={e => setForm(f => ({ ...f, frequency: e.target.value }))}>
                    {MED_FREQUENCIES.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Prescribed By</label>
                  <input style={fs} value={form.prescribed_by} onChange={e => setForm(f => ({ ...f, prescribed_by: e.target.value }))} placeholder="Dr. Name" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Pharmacy</label>
                  <input style={fs} value={form.pharmacy} onChange={e => setForm(f => ({ ...f, pharmacy: e.target.value }))} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Rx Number</label>
                  <input style={fs} value={form.rx_number} onChange={e => setForm(f => ({ ...f, rx_number: e.target.value }))} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Start Date</label>
                  <input style={fs} type="date" value={form.start_date} onChange={e => setForm(f => ({ ...f, start_date: e.target.value }))} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>End Date</label>
                  <input style={fs} type="date" value={form.end_date} onChange={e => setForm(f => ({ ...f, end_date: e.target.value }))} />
                </div>
              </div>
              {/* Schedule Times */}
              {form.frequency !== "As needed (PRN)" && (
                <div style={{ marginTop: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid }}>Scheduled Times</label>
                    <button onClick={addTime} style={{ fontSize: 12, fontWeight: 600, color: CB.teal, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>+ Add Time</button>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {(form.schedule_times || []).map((t, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <input type="time" style={{ ...fs, width: 120, padding: "6px 10px" }} value={t} onChange={e => updateTime(i, e.target.value)} />
                        {form.schedule_times.length > 1 && (
                          <button onClick={() => removeTime(i)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: CB.red, fontSize: 16 }}>×</button>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* PRN toggle */}
              <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10 }}>
                <input type="checkbox" checked={form.is_prn} onChange={e => setForm(f => ({ ...f, is_prn: e.target.checked, frequency: e.target.checked ? "As needed (PRN)" : f.frequency }))} />
                <label style={{ fontSize: 13, fontWeight: 600, color: CB.textMid }}>PRN (As Needed)</label>
              </div>
              {form.is_prn && (
                <div style={{ marginTop: 10 }}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>PRN Reason</label>
                  <input style={fs} value={form.prn_reason} onChange={e => setForm(f => ({ ...f, prn_reason: e.target.value }))} placeholder="e.g. Pain, Anxiety, Nausea" />
                </div>
              )}
              <div style={{ marginTop: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Special Instructions</label>
                <textarea style={{ ...fs, minHeight: 60 }} value={form.special_instructions} onChange={e => setForm(f => ({ ...f, special_instructions: e.target.value }))} placeholder="Take with food, etc." />
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => { setShowMedForm(false); setEditingMed(null); }} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Saving..." : editingMed ? "Update" : "Add Medication"}
                </button>
              </div>
            </div>
          </Modal>
        );
      };

      // ── Med Pass Log Modal ──
      const LogModal = () => {
        if (!showLogModal) return null;
        const { medication, date, time } = showLogModal;
        const existing = logs.find(l => l.medication_id === medication.id && l.scheduled_date === date && l.scheduled_time === time);
        const [status, setStatus] = useState(existing?.status || "given");
        const [notes, setNotes] = useState(existing?.notes || "");
        const [saving, setSaving] = useState(false);

        const handleLog = async () => {
          setSaving(true);
          const payload = {
            org_id: orgId, medication_id: medication.id, person_id: selectedClient,
            staff_id: staffProfile?.id || null, scheduled_date: date, scheduled_time: time,
            administered_at: status === "given" || status === "self_administered" ? new Date().toISOString() : null,
            status, notes,
          };
          if (existing) {
            const { error } = await supabase.from("medication_logs").update(payload).eq("id", existing.id);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
          } else {
            const { error } = await supabase.from("medication_logs").insert(payload);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
          }
          addToast(`Med pass logged: ${medication.medication_name} — ${status}`, "success");
          setSaving(false); setShowLogModal(null); loadMedData();
        };

        return (
          <Modal open={true} onClose={() => setShowLogModal(null)} title="Log Med Pass" subtitle={`${medication.medication_name} ${medication.dosage}`} width={420}>
            <div style={{ padding: "20px 28px 24px" }}>
              <div style={{ fontSize: 13, color: CB.textMid, marginBottom: 16 }}>
                <strong>{date}</strong> at <strong>{time}</strong>
              </div>
              <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 8 }}>Status</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                {MED_LOG_STATUS.map(s => (
                  <button key={s.value} onClick={() => setStatus(s.value)} style={{
                    padding: "8px 16px", borderRadius: 10, fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                    border: `1.5px solid ${status === s.value ? s.color : CB.border}`,
                    background: status === s.value ? `${s.color}14` : CB.white,
                    color: status === s.value ? s.color : CB.textMid, cursor: "pointer",
                  }}>{s.label}</button>
                ))}
              </div>
              <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Notes</label>
              <textarea style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream, minHeight: 60 }} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional notes..." />
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => setShowLogModal(null)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleLog} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Saving..." : "Log Med Pass"}
                </button>
              </div>
            </div>
          </Modal>
        );
      };

      // ── MAR Grid (7 days × medications × times) ──
      const MARView = () => {
        const startDate = new Date(marDate + "T00:00:00");
        const days = Array.from({ length: 7 }, (_, i) => {
          const d = new Date(startDate); d.setDate(d.getDate() + i);
          return d.toISOString().split("T")[0];
        });
        const scheduledMeds = medications.filter(m => !m.is_prn && m.schedule_times?.length);

        if (!scheduledMeds.length) return (
          <div style={{ textAlign: "center", padding: 48, color: CB.textMid }}>
            <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.teal}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
              {icons.capsule({ size: 28, color: CB.teal })}
            </div>
            <p style={{ fontSize: 15, fontWeight: 600 }}>No scheduled medications for this client</p>
            <p style={{ fontSize: 13 }}>Add medications in the Medications tab first.</p>
          </div>
        );

        const getLog = (medId, date, time) => logs.find(l => l.medication_id === medId && l.scheduled_date === date && l.scheduled_time === time);

        const statusIcon = (log, isPast) => {
          if (!log && !isPast) return { bg: `${CB.textLight}10`, color: CB.textLight, text: "—" };
          if (!log && isPast) return { bg: `${CB.red}12`, color: CB.red, text: "!" };
          const s = MED_LOG_STATUS.find(x => x.value === log.status);
          const abbr = { given: "✓", refused: "R", held: "H", not_available: "N/A", self_administered: "SA" };
          return { bg: `${s?.color || CB.textLight}18`, color: s?.color || CB.textLight, text: abbr[log.status] || "?" };
        };

        const nowStr = new Date().toISOString().split("T")[0];
        const nowTime = new Date().toTimeString().slice(0, 5);

        return (
          <div style={{ overflowX: "auto" }}>
            {/* Week navigation */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <button onClick={() => { const d = new Date(marDate + "T00:00:00"); d.setDate(d.getDate() - 7); setMarDate(d.toISOString().split("T")[0]); }}
                style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, color: CB.textMid }}>← Prev Week</button>
              <input type="date" value={marDate} onChange={e => setMarDate(e.target.value)}
                style={{ padding: "6px 12px", borderRadius: 8, border: `1px solid ${CB.border}`, fontSize: 13, fontFamily: "inherit" }} />
              <button onClick={() => { const d = new Date(marDate + "T00:00:00"); d.setDate(d.getDate() + 7); setMarDate(d.toISOString().split("T")[0]); }}
                style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, color: CB.textMid }}>Next Week →</button>
              <button onClick={() => setMarDate(new Date().toISOString().split("T")[0])}
                style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${CB.teal}`, background: `${CB.teal}08`, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, color: CB.teal }}>Today</button>
            </div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: CB.navy }}>
                  <th style={{ padding: "10px 14px", textAlign: "left", color: CB.white, fontWeight: 700, fontSize: 12, position: "sticky", left: 0, background: CB.navy, zIndex: 2, minWidth: 160 }}>Medication</th>
                  <th style={{ padding: "10px 8px", color: "rgba(255,255,255,0.7)", fontWeight: 600, fontSize: 11, minWidth: 40 }}>Time</th>
                  {days.map(d => {
                    const dt = new Date(d + "T00:00:00");
                    const isToday = d === nowStr;
                    return <th key={d} style={{ padding: "10px 6px", color: isToday ? CB.tealLight : "rgba(255,255,255,0.7)", fontWeight: isToday ? 700 : 600, fontSize: 11, minWidth: 52, background: isToday ? "rgba(0,137,123,0.15)" : "transparent" }}>
                      {dt.toLocaleDateString("en-US", { weekday: "short" })}<br/>{dt.getMonth()+1}/{dt.getDate()}
                    </th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {scheduledMeds.map((med, mi) => (
                  (med.schedule_times || []).map((time, ti) => (
                    <tr key={`${med.id}-${ti}`} style={{ borderBottom: `1px solid ${CB.border}`, background: mi % 2 === 0 ? CB.white : CB.cream }}>
                      {ti === 0 ? (
                        <td rowSpan={med.schedule_times.length} style={{ padding: "8px 14px", fontWeight: 600, color: CB.text, position: "sticky", left: 0, background: mi % 2 === 0 ? CB.white : CB.cream, zIndex: 1, borderRight: `1px solid ${CB.border}` }}>
                          <div>{med.medication_name}</div>
                          <div style={{ fontSize: 11, color: CB.textMid, fontWeight: 400 }}>{med.dosage} — {med.route}</div>
                        </td>
                      ) : null}
                      <td style={{ padding: "6px 8px", textAlign: "center", fontSize: 12, fontWeight: 600, color: CB.textMid }}>{time}</td>
                      {days.map(d => {
                        const log = getLog(med.id, d, time);
                        const isPast = d < nowStr || (d === nowStr && time < nowTime);
                        const si = statusIcon(log, isPast);
                        return (
                          <td key={d} style={{ padding: "4px", textAlign: "center" }}>
                            <button onClick={() => setShowLogModal({ medication: med, date: d, time })} style={{
                              width: 36, height: 30, borderRadius: 6, border: "none", cursor: "pointer",
                              background: si.bg, color: si.color, fontWeight: 800, fontSize: 12,
                              fontFamily: "inherit", transition: "all 0.1s",
                            }}
                              title={log ? `${log.status}${log.notes ? ": " + log.notes : ""}` : isPast ? "Missed — click to log" : "Click to log"}
                              onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.15)"; }}
                              onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}
                            >{si.text}</button>
                          </td>
                        );
                      })}
                    </tr>
                  ))
                ))}
              </tbody>
            </table>
            {/* Legend */}
            <div style={{ display: "flex", gap: 16, marginTop: 14, flexWrap: "wrap", fontSize: 12, color: CB.textMid }}>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 14, borderRadius: 4, background: `${CB.green}18`, color: CB.green, fontWeight: 800, fontSize: 10, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>✓</span> Given</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 14, borderRadius: 4, background: `${CB.red}12`, color: CB.red, fontWeight: 800, fontSize: 10, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>!</span> Missed</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 14, borderRadius: 4, background: "#E5393518", color: "#E53935", fontWeight: 800, fontSize: 10, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>R</span> Refused</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 14, borderRadius: 4, background: "#F57F1718", color: "#F57F17", fontWeight: 800, fontSize: 10, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>H</span> Held</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 14, borderRadius: 4, background: "#1565C018", color: "#1565C0", fontWeight: 800, fontSize: 10, display: "inline-flex", alignItems: "center", justifyContent: "center" }}>SA</span> Self-Admin</span>
            </div>
          </div>
        );
      };

      // ── Medications List Tab ──
      const MedsList = () => (
        <div>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
            <button onClick={() => { setEditingMed(null); setShowMedForm(true); }} style={{
              padding: "10px 20px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white,
              fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 8,
            }}>{icons.plus({ size: 15 })} Add Medication</button>
          </div>
          {medications.length === 0 ? (
            <div style={{ textAlign: "center", padding: 48, color: CB.textMid }}>
              <p style={{ fontSize: 15, fontWeight: 600 }}>No medications for this client</p>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {medications.map(med => (
                <div key={med.id} style={{
                  background: CB.white, borderRadius: 14, padding: isMobile ? 16 : 20,
                  border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                  display: "flex", justifyContent: "space-between", alignItems: isMobile ? "flex-start" : "center",
                  flexDirection: isMobile ? "column" : "row", gap: 12,
                }}>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                      <span style={{ fontSize: 15, fontWeight: 700, color: CB.navy }}>{med.medication_name}</span>
                      <span style={{ fontSize: 12, padding: "2px 10px", borderRadius: 12, background: med.is_prn ? `${CB.amber}14` : `${CB.teal}12`, color: med.is_prn ? CB.amber : CB.teal, fontWeight: 600 }}>
                        {med.is_prn ? "PRN" : med.frequency}
                      </span>
                    </div>
                    <div style={{ fontSize: 13, color: CB.textMid }}>
                      {med.dosage} — {med.route}
                      {med.prescribed_by && <span> — Rx: {med.prescribed_by}</span>}
                    </div>
                    {!med.is_prn && med.schedule_times?.length > 0 && (
                      <div style={{ fontSize: 12, color: CB.textLight, marginTop: 4 }}>
                        Times: {med.schedule_times.join(", ")}
                      </div>
                    )}
                    {med.special_instructions && (
                      <div style={{ fontSize: 12, color: CB.amber, fontWeight: 600, marginTop: 4 }}>⚠ {med.special_instructions}</div>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => { setEditingMed(med); setShowMedForm(true); }} style={{
                      padding: "8px 14px", borderRadius: 8, border: `1px solid ${CB.border}`, background: CB.white,
                      fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: CB.textMid,
                    }}>Edit</button>
                    <button onClick={async () => {
                      if (!confirm("Discontinue this medication?")) return;
                      await supabase.from("medications").update({ is_active: false }).eq("id", med.id);
                      addToast("Medication discontinued", "success"); loadMedData();
                    }} style={{
                      padding: "8px 14px", borderRadius: 8, border: `1px solid ${CB.red}30`, background: `${CB.red}08`,
                      fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: CB.red,
                    }}>Discontinue</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      // ── Missed Doses Tab ──
      const MissedDoses = () => {
        const now = new Date();
        const nowStr = now.toISOString().split("T")[0];
        const nowTime = now.toTimeString().slice(0, 5);
        const sevenAgo = new Date(now); sevenAgo.setDate(sevenAgo.getDate() - 7);
        const startStr = sevenAgo.toISOString().split("T")[0];

        // Build expected passes for last 7 days
        const missed = [];
        const scheduledMeds = medications.filter(m => !m.is_prn && m.schedule_times?.length);
        for (let d = new Date(sevenAgo); d <= now; d.setDate(d.getDate() + 1)) {
          const dateStr = d.toISOString().split("T")[0];
          scheduledMeds.forEach(med => {
            (med.schedule_times || []).forEach(time => {
              if (dateStr === nowStr && time > nowTime) return; // future today
              const log = logs.find(l => l.medication_id === med.id && l.scheduled_date === dateStr && l.scheduled_time === time);
              if (!log) {
                missed.push({ medication: med, date: dateStr, time });
              } else if (log.status === "refused" || log.status === "held" || log.status === "not_available") {
                missed.push({ medication: med, date: dateStr, time, status: log.status, notes: log.notes });
              }
            });
          });
        }

        // Need to re-fetch logs for the 7-day window if marDate is different
        // For now use what we have (MAR window might differ)

        return (
          <div>
            {missed.length === 0 ? (
              <div style={{ textAlign: "center", padding: 48 }}>
                <div style={{ width: 56, height: 56, borderRadius: 16, background: `${CB.green}12`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
                  {icons.checkCircle({ size: 28, color: CB.green })}
                </div>
                <p style={{ fontSize: 15, fontWeight: 600, color: CB.navy }}>No missed doses in the last 7 days</p>
              </div>
            ) : (
              <div style={{ background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow, overflow: "hidden" }}>
                <div style={{ padding: "14px 20px", background: `${CB.red}08`, borderBottom: `1px solid ${CB.border}`, display: "flex", alignItems: "center", gap: 10 }}>
                  {icons.alertTriangle({ size: 16, color: CB.red })}
                  <span style={{ fontSize: 14, fontWeight: 700, color: CB.red }}>{missed.length} missed or flagged dose{missed.length !== 1 ? "s" : ""} — last 7 days</span>
                </div>
                {missed.map((m, i) => {
                  const statusDef = m.status ? MED_LOG_STATUS.find(s => s.value === m.status) : null;
                  return (
                    <div key={i} style={{
                      display: "flex", alignItems: isMobile ? "flex-start" : "center", gap: 14, padding: "12px 20px",
                      borderBottom: i < missed.length - 1 ? `1px solid ${CB.border}` : "none",
                      flexDirection: isMobile ? "column" : "row",
                    }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: statusDef?.color || CB.red, flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <span style={{ fontWeight: 700, color: CB.text, fontSize: 14 }}>{m.medication.medication_name}</span>
                        <span style={{ color: CB.textMid, fontSize: 13, marginLeft: 8 }}>{m.medication.dosage}</span>
                      </div>
                      <span style={{ fontSize: 13, color: CB.textMid, minWidth: 120 }}>{m.date} at {m.time}</span>
                      <span style={{
                        padding: "3px 12px", borderRadius: 12, fontSize: 11, fontWeight: 700,
                        background: `${statusDef?.color || CB.red}14`, color: statusDef?.color || CB.red,
                        textTransform: "uppercase",
                      }}>{statusDef?.label || "Not Logged"}</span>
                      {!m.status && (
                        <button onClick={() => setShowLogModal({ medication: m.medication, date: m.date, time: m.time })} style={{
                          padding: "6px 14px", borderRadius: 8, border: `1px solid ${CB.teal}`, background: `${CB.teal}08`,
                          fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: CB.teal,
                        }}>Log Now</button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      const clientName = clients.find(c => c.id === selectedClient);

      return (
        <div>
          <PageHeader title="Medication Tracking" subtitle={clientName ? `${clientName.first_name} ${clientName.last_name} — MAR & Med Pass` : "Select a client"} />
          {/* Client Selector */}
          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
            <select value={selectedClient} onChange={e => setSelectedClient(e.target.value)} style={{
              padding: "10px 16px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit",
              background: CB.white, minWidth: 220,
            }}>
              <option value="">Select client...</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.last_name}, {c.first_name}</option>)}
            </select>
          </div>
          {/* Tabs */}
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CB.white, borderRadius: 12, padding: 4, border: `1px solid ${CB.border}`, width: "fit-content" }}>
            {[
              { key: "mar", label: "MAR" },
              { key: "medications", label: "Medications" },
              { key: "missed", label: "Missed Doses" },
            ].map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                padding: "9px 20px", borderRadius: 9, border: "none", fontSize: 13, fontWeight: 600,
                fontFamily: "inherit", cursor: "pointer", transition: "all 0.15s",
                background: tab === t.key ? CB.navy : "transparent", color: tab === t.key ? CB.white : CB.textMid,
              }}>{t.label}</button>
            ))}
          </div>
          {!selectedClient ? (
            <div style={{ textAlign: "center", padding: 48, color: CB.textMid }}>
              <p style={{ fontSize: 15, fontWeight: 600 }}>Select a client to view medications</p>
            </div>
          ) : loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <div style={{ background: CB.white, borderRadius: 16, padding: isMobile ? 16 : 24, border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow }}>
              {tab === "mar" && <MARView />}
              {tab === "medications" && <MedsList />}
              {tab === "missed" && <MissedDoses />}
            </div>
          )}
          {showMedForm && <MedForm />}
          <LogModal />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PCSP GOAL TRACKING — ISP goals, progress notes, AI summary
    // ═══════════════════════════════════════════════════════════════
    const ISP_DOMAINS = [
      "Community Living", "Health & Safety", "Employment", "Education",
      "Social & Relationships", "Self-Advocacy", "Communication",
      "Daily Living Skills", "Behavioral", "Financial Literacy", "Other"
    ];
    const GOAL_STATUSES = [
      { value: "active", label: "Active", color: "#2E7D32" },
      { value: "in_progress", label: "In Progress", color: "#1565C0" },
      { value: "met", label: "Met", color: "#00897B" },
      { value: "partially_met", label: "Partially Met", color: "#F57F17" },
      { value: "not_met", label: "Not Met", color: "#E53935" },
      { value: "discontinued", label: "Discontinued", color: "#94A3B8" },
    ];
    const PROGRESS_RATINGS = [
      { value: 1, label: "No Progress", color: "#E53935" },
      { value: 2, label: "Minimal", color: "#F57F17" },
      { value: 3, label: "Moderate", color: "#1565C0" },
      { value: 4, label: "Significant", color: "#00897B" },
      { value: 5, label: "Goal Met", color: "#2E7D32" },
    ];

    function PCSPGoalsPage() {
      const [clients, setClients] = useState([]);
      const [selectedClient, setSelectedClient] = useState("");
      const [goals, setGoals] = useState([]);
      const [progressNotes, setProgressNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showGoalForm, setShowGoalForm] = useState(false);
      const [editingGoal, setEditingGoal] = useState(null);
      const [expandedGoal, setExpandedGoal] = useState(null);
      const [showNoteForm, setShowNoteForm] = useState(null); // goal_id
      const [showSummary, setShowSummary] = useState(false);
      const [summaryText, setSummaryText] = useState("");
      const [generatingSummary, setGeneratingSummary] = useState(false);
      const [tab, setTab] = useState("goals"); // goals, summary
      const { isMobile } = useMobile();
      const { addToast } = useToast();
      const { orgId, staffProfile } = useAuth();

      useEffect(() => { loadClients(); }, []);
      useEffect(() => { if (selectedClient) loadGoalData(); }, [selectedClient]);

      const loadClients = async () => {
        const { data } = await supabase.from("persons").select("id, first_name, last_name").eq("is_active", true).order("last_name");
        setClients(data || []);
        if (data?.length) setSelectedClient(data[0].id);
        setLoading(false);
      };

      const loadGoalData = async () => {
        setLoading(true);
        try {
          const [goalRes, noteRes] = await Promise.all([
            supabase.from("pcsp_goals").select("*").eq("person_id", selectedClient).order("created_at", { ascending: false }),
            supabase.from("pcsp_progress_notes").select("*, staff(first_name, last_name)").eq("person_id", selectedClient).order("note_date", { ascending: false }),
          ]);
          setGoals(goalRes.data || []);
          setProgressNotes(noteRes.data || []);
        } catch (e) { addToast("Failed to load goals", "error"); }
        setLoading(false);
      };

      // ── Goal Form ──
      const GoalForm = () => {
        const [form, setForm] = useState(editingGoal || {
          domain: "Community Living", goal_description: "", objectives: "",
          baseline: "", target_criteria: "", target_date: "", status: "active",
          teaching_strategies: "", support_needed: "",
        });
        const [saving, setSaving] = useState(false);
        const fs = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${CB.border}`, fontSize: 14, fontFamily: "inherit", background: CB.cream };

        const handleSave = async () => {
          if (!form.goal_description || !form.domain) return addToast("Domain and goal description required", "error");
          setSaving(true);
          const payload = { ...form, person_id: selectedClient, org_id: orgId };
          delete payload.id; delete payload.created_at; delete payload.updated_at;
          if (editingGoal) {
            const { error } = await supabase.from("pcsp_goals").update(payload).eq("id", editingGoal.id);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
            addToast("Goal updated", "success");
          } else {
            const { error } = await supabase.from("pcsp_goals").insert(payload);
            if (error) { addToast(error.message, "error"); setSaving(false); return; }
            addToast("Goal created", "success");
          }
          setSaving(false); setShowGoalForm(false); setEditingGoal(null); loadGoalData();
        };

        return (
          <Modal open={true} onClose={() => { setShowGoalForm(false); setEditingGoal(null); }} title={editingGoal ? "Edit Goal" : "Add ISP Goal"} width={600}>
            <div style={{ padding: "20px 28px 24px", overflowY: "auto", maxHeight: "65vh" }}>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>ISP Domain *</label>
                  <select style={fs} value={form.domain} onChange={e => setForm(f => ({ ...f, domain: e.target.value }))}>
                    {ISP_DOMAINS.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Status</label>
                  <select style={fs} value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))}>
                    {GOAL_STATUSES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                  </select>
                </div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Goal Description *</label>
                  <textarea style={{ ...fs, minHeight: 70 }} value={form.goal_description} onChange={e => setForm(f => ({ ...f, goal_description: e.target.value }))} placeholder="Individual will..." />
                </div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Measurable Objectives</label>
                  <textarea style={{ ...fs, minHeight: 60 }} value={form.objectives} onChange={e => setForm(f => ({ ...f, objectives: e.target.value }))} placeholder="1. Objective A&#10;2. Objective B" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Baseline</label>
                  <input style={fs} value={form.baseline} onChange={e => setForm(f => ({ ...f, baseline: e.target.value }))} placeholder="Current performance level" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Target Criteria</label>
                  <input style={fs} value={form.target_criteria} onChange={e => setForm(f => ({ ...f, target_criteria: e.target.value }))} placeholder="80% of opportunities over 3 months" />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Target Date</label>
                  <input style={fs} type="date" value={form.target_date} onChange={e => setForm(f => ({ ...f, target_date: e.target.value }))} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Teaching Strategies</label>
                  <input style={fs} value={form.teaching_strategies} onChange={e => setForm(f => ({ ...f, teaching_strategies: e.target.value }))} placeholder="Modeling, prompting, etc." />
                </div>
                <div style={{ gridColumn: isMobile ? "1" : "1/3" }}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: CB.textMid, display: "block", marginBottom: 4 }}>Support Needed</label>
                  <textarea style={{ ...fs, minHeight: 50 }} value={form.support_needed} onChange={e => setForm(f => ({ ...f, support_needed: e.target.value }))} placeholder="Staff assistance, adaptive equipment, etc." />
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
                <button onClick={() => { setShowGoalForm(false); setEditingGoal(null); }} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white, color: CB.textMid, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{ padding: "10px 24px", borderRadius: 10, border: "none", background: CB.teal, color: CB.white, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Saving..." : editingGoal ? "Update Goal" : "Add Goal"}
                </button>
              </div>
            </div>
          </Modal>
        );
      };
