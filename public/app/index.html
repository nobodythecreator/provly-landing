<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provly — DSPD Compliance Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Outfit', 'Manrope', sans-serif; background: #FAFBFD; }
    ::selection { background: #00897B; color: white; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #00897B; outline-offset: -1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback } = React;

    // ═══════════════════════════════════════════════════════════════
    // DESIGN TOKENS — matched exactly to landing page
    // ═══════════════════════════════════════════════════════════════
    const CB = {
      navy: "#0A1E33", navyLight: "#0F2B46", blue: "#1A73E8", blueLight: "#4A9AF5",
      teal: "#00897B", tealLight: "#26A69A", tealDark: "#00695C",
      cream: "#FAFBFD", warm: "#F8F6F3", white: "#FFFFFF",
      text: "#1A1A2E", textMid: "#4A5568", textLight: "#94A3B8",
      red: "#E53935", green: "#2E7D32", amber: "#F57F17",
      border: "#E2E8F0",
      cardShadow: "0 1px 3px rgba(10,30,51,0.08), 0 8px 32px rgba(10,30,51,0.06)",
      sidebarW: 260,
    };

    // ═══════════════════════════════════════════════════════════════
    // SUPABASE CLIENT
    // ═══════════════════════════════════════════════════════════════
    const supabase = window.supabase.createClient(
      'https://zsrnqbmzgypldraifjho.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzcm5xYm16Z3lwbGRyYWlmamhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTc0NjcsImV4cCI6MjA4OTEzMzQ2N30.-vI3ZvtGKFyoZplqpTt4IxriWEnIPg-PH8eIing93bY'
    );

    // ═══════════════════════════════════════════════════════════════
    // AUTH CONTEXT
    // ═══════════════════════════════════════════════════════════════
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setUser(session?.user ?? null);
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      const signIn = (email, password) => supabase.auth.signInWithPassword({ email, password });
      const signOut = () => supabase.auth.signOut();

      return (
        <AuthContext.Provider value={{ user, session, loading, signIn, signOut }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    // ═══════════════════════════════════════════════════════════════
    // SVG ICONS — consistent with landing page
    // ═══════════════════════════════════════════════════════════════
    const Icon = ({ d, size = 20, color = "currentColor", style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
        {typeof d === "string" ? <path d={d} /> : d}
      </svg>
    );

    const icons = {
      shield: (p={}) => <Icon {...p} d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />,
      dashboard: (p={}) => <Icon {...p} d={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>} />,
      users: (p={}) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      heart: (p={}) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />,
      fileText: (p={}) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />,
      checkCircle: (p={}) => <Icon {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
      alertTriangle: (p={}) => <Icon {...p} d={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />,
      barChart: (p={}) => <Icon {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />,
      calendar: (p={}) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      zap: (p={}) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,
      lock: (p={}) => <Icon {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
      logout: (p={}) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      clock: (p={}) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
      book: (p={}) => <Icon {...p} d={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>} />,
      search: (p={}) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
      chevDown: (p={}) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      mail: (p={}) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      mapPin: (p={}) => <Icon {...p} d={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />,
      arrowRight: (p={}) => <Icon {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
      plus: (p={}) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      refresh: (p={}) => <Icon {...p} d={<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>} />,
    };

    // ═══════════════════════════════════════════════════════════════
    // SPINNER
    // ═══════════════════════════════════════════════════════════════
    function Spinner({ size = 20, color = CB.teal }) {
      return (
        <div style={{ width: size, height: size, border: `2.5px solid ${CB.border}`, borderTopColor: color, borderRadius: "50%", animation: "spin 0.6s linear infinite" }} />
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN PAGE
    // ═══════════════════════════════════════════════════════════════
    function LoginPage() {
      const { signIn } = useAuth();
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setError("");
        setLoading(true);
        const { error: err } = await signIn(email, password);
        if (err) setError(err.message);
        setLoading(false);
      };

      return (
        <div style={{
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          background: `radial-gradient(ellipse at 30% 20%, rgba(0,137,123,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(26,115,232,0.04) 0%, transparent 50%), ${CB.cream}`,
          padding: 24,
        }}>
          {/* Decorative orbs — same as landing hero */}
          <div style={{ position: "fixed", top: "15%", right: "10%", width: 350, height: 350, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,137,123,0.05) 0%, transparent 70%)", pointerEvents: "none" }} />
          <div style={{ position: "fixed", bottom: "10%", left: "10%", width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(26,115,232,0.04) 0%, transparent 70%)", pointerEvents: "none" }} />

          <div style={{
            width: "100%", maxWidth: 420, animation: "fadeIn 0.5s ease",
          }}>
            {/* Logo */}
            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{
                width: 56, height: 56, borderRadius: 16,
                background: `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                marginBottom: 16, boxShadow: "0 4px 16px rgba(10,30,51,0.25)",
              }}>
                {icons.shield({ size: 28, color: CB.white })}
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1 }}>Provly</h1>
              <p style={{ fontSize: 14, color: CB.textLight, marginTop: 4, fontWeight: 500 }}>
                DSPD Compliance Platform
              </p>
            </div>

            {/* Card */}
            <div style={{
              background: CB.white, borderRadius: 20, padding: "36px 32px",
              border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: CB.navy, marginBottom: 4 }}>Welcome back</h2>
              <p style={{ fontSize: 14, color: CB.textMid, marginBottom: 28 }}>Sign in to your account</p>

              {error && (
                <div style={{
                  background: "rgba(229,57,53,0.08)", border: "1px solid rgba(229,57,53,0.2)",
                  borderRadius: 12, padding: "12px 16px", marginBottom: 20,
                  display: "flex", alignItems: "center", gap: 10,
                }}>
                  {icons.alertTriangle({ size: 16, color: CB.red })}
                  <span style={{ fontSize: 14, color: CB.red, fontWeight: 500 }}>{error}</span>
                </div>
              )}

              <div style={{ marginBottom: 18 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Email</label>
                <input
                  type="email" value={email} onChange={e => setEmail(e.target.value)}
                  placeholder="you@provider.org"
                  onKeyDown={e => e.key === "Enter" && handleSubmit(e)}
                  style={{
                    width: "100%", padding: "12px 16px", borderRadius: 12,
                    border: `1px solid ${CB.border}`, fontSize: 15, fontFamily: "inherit",
                    color: CB.text, background: CB.cream, transition: "border 0.2s",
                  }}
                />
              </div>

              <div style={{ marginBottom: 28 }}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: CB.text, marginBottom: 6 }}>Password</label>
                <input
                  type="password" value={password} onChange={e => setPassword(e.target.value)}
                  placeholder="••••••••"
                  onKeyDown={e => e.key === "Enter" && handleSubmit(e)}
                  style={{
                    width: "100%", padding: "12px 16px", borderRadius: 12,
                    border: `1px solid ${CB.border}`, fontSize: 15, fontFamily: "inherit",
                    color: CB.text, background: CB.cream, transition: "border 0.2s",
                  }}
                />
              </div>

              <button
                onClick={handleSubmit} disabled={loading}
                style={{
                  width: "100%", padding: "14px 24px", borderRadius: 14, border: "none",
                  background: loading ? CB.textLight : `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
                  color: CB.white, fontSize: 16, fontWeight: 700, cursor: loading ? "wait" : "pointer",
                  fontFamily: "inherit", letterSpacing: 0.3, transition: "all 0.2s",
                  boxShadow: "0 4px 16px rgba(10,30,51,0.25)",
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
                }}
                onMouseEnter={e => { if (!loading) e.currentTarget.style.transform = "translateY(-1px)"; }}
                onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
              >
                {loading ? <Spinner size={18} color={CB.white} /> : "Sign In"}
              </button>
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", marginTop: 24 }}>
              <p style={{ fontSize: 13, color: CB.textLight }}>
                A <span style={{ fontWeight: 600, color: CB.textMid }}>Hope Haven Services Inc.</span> Product
              </p>
              <a href="/" style={{ fontSize: 13, color: CB.teal, textDecoration: "none", marginTop: 8, display: "inline-block", fontWeight: 500 }}
                onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                onMouseLeave={e => e.currentTarget.style.textDecoration = "none"}>
                ← Back to getprovly.com
              </a>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    function Sidebar({ active, onNavigate }) {
      const { user, signOut } = useAuth();

      const navItems = [
        { key: "dashboard", label: "Dashboard", icon: icons.dashboard },
        { key: "staff", label: "Staff", icon: icons.users },
        { key: "clients", label: "Clients", icon: icons.heart },
        { key: "training", label: "Training", icon: icons.book },
        { key: "notes", label: "Service Notes", icon: icons.fileText },
        { key: "evv", label: "EVV", icon: icons.mapPin },
        { key: "compliance", label: "Compliance", icon: icons.shield },
        { key: "billing", label: "Billing", icon: icons.barChart },
      ];

      return (
        <aside style={{
          width: CB.sidebarW, minHeight: "100vh", background: CB.navy,
          display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, bottom: 0,
          zIndex: 50,
        }}>
          {/* Brand */}
          <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10,
                background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealDark})`,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {icons.shield({ size: 20, color: CB.white })}
              </div>
              <span style={{ fontSize: 20, fontWeight: 800, color: CB.white, letterSpacing: -0.5 }}>Provly</span>
            </div>
          </div>

          {/* Navigation */}
          <nav style={{ flex: 1, padding: "16px 12px", overflowY: "auto" }}>
            {navItems.map((item, i) => {
              const isActive = active === item.key;
              return (
                <button
                  key={item.key}
                  onClick={() => onNavigate(item.key)}
                  style={{
                    width: "100%", display: "flex", alignItems: "center", gap: 12,
                    padding: "11px 14px", borderRadius: 10, border: "none",
                    background: isActive ? "rgba(0,137,123,0.15)" : "transparent",
                    color: isActive ? CB.tealLight : "rgba(255,255,255,0.55)",
                    fontSize: 14, fontWeight: isActive ? 600 : 500, fontFamily: "inherit",
                    cursor: "pointer", transition: "all 0.15s", textAlign: "left",
                    marginBottom: 2, animation: `slideIn 0.3s ease ${i * 0.03}s both`,
                  }}
                  onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.85)"; }}}
                  onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(255,255,255,0.55)"; }}}
                >
                  {item.icon({ size: 18 })}
                  {item.label}
                </button>
              );
            })}
          </nav>

          {/* User footer */}
          <div style={{ padding: "16px 16px 20px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <div style={{
                width: 34, height: 34, borderRadius: 10,
                background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealLight})`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 14, fontWeight: 700, color: CB.white,
              }}>
                {user?.email?.[0]?.toUpperCase() || "U"}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.9)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {user?.email?.split("@")[0] || "User"}
                </div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontWeight: 500 }}>Owner</div>
              </div>
            </div>
            <button
              onClick={signOut}
              style={{
                width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)",
                background: "transparent", color: "rgba(255,255,255,0.5)", fontSize: 13,
                fontWeight: 600, fontFamily: "inherit", cursor: "pointer", transition: "all 0.15s",
              }}
              onMouseEnter={e => { e.currentTarget.style.background = "rgba(229,57,53,0.1)"; e.currentTarget.style.color = "#f87171"; e.currentTarget.style.borderColor = "rgba(229,57,53,0.2)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(255,255,255,0.5)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; }}
            >
              {icons.logout({ size: 15 })} Sign Out
            </button>
          </div>
        </aside>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // STAT CARD COMPONENT
    // ═══════════════════════════════════════════════════════════════
    function StatCard({ label, value, icon, color = CB.teal, trend, delay = 0 }) {
      return (
        <div style={{
          background: CB.white, borderRadius: 16, padding: "24px 22px",
          border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
          animation: `fadeIn 0.5s ease ${delay}s both`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div style={{
              width: 40, height: 40, borderRadius: 12,
              background: `${color}12`, display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              {icon({ size: 20, color })}
            </div>
            {trend && (
              <span style={{
                fontSize: 12, fontWeight: 700, color: trend > 0 ? CB.green : CB.red,
                background: trend > 0 ? "rgba(46,125,50,0.08)" : "rgba(229,57,53,0.08)",
                padding: "3px 8px", borderRadius: 6,
              }}>
                {trend > 0 ? "+" : ""}{trend}%
              </span>
            )}
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, color: CB.navy, letterSpacing: -1, lineHeight: 1 }}>{value}</div>
          <div style={{ fontSize: 13, color: CB.textLight, marginTop: 6, fontWeight: 500 }}>{label}</div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // DATA TABLE COMPONENT
    // ═══════════════════════════════════════════════════════════════
    function DataTable({ columns, data, loading, emptyMessage = "No data found" }) {
      if (loading) {
        return (
          <div style={{ display: "flex", justifyContent: "center", padding: 48 }}>
            <Spinner size={24} />
          </div>
        );
      }
      return (
        <div style={{
          background: CB.white, borderRadius: 16, border: `1px solid ${CB.border}`,
          boxShadow: CB.cardShadow, overflow: "hidden",
        }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: CB.cream }}>
                  {columns.map((col, i) => (
                    <th key={i} style={{
                      padding: "13px 18px", textAlign: "left", fontSize: 12, fontWeight: 700,
                      color: CB.textLight, textTransform: "uppercase", letterSpacing: 0.8,
                      borderBottom: `1px solid ${CB.border}`, whiteSpace: "nowrap",
                    }}>
                      {col.label}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.length === 0 ? (
                  <tr><td colSpan={columns.length} style={{ padding: 40, textAlign: "center", color: CB.textLight, fontSize: 14 }}>{emptyMessage}</td></tr>
                ) : data.map((row, ri) => (
                  <tr key={ri} style={{ borderBottom: `1px solid ${CB.border}` }}
                    onMouseEnter={e => e.currentTarget.style.background = CB.cream}
                    onMouseLeave={e => e.currentTarget.style.background = CB.white}>
                    {columns.map((col, ci) => (
                      <td key={ci} style={{ padding: "14px 18px", fontSize: 14, color: CB.text, fontWeight: col.bold ? 600 : 400 }}>
                        {col.render ? col.render(row) : row[col.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // STATUS BADGE
    // ═══════════════════════════════════════════════════════════════
    function Badge({ text, color = CB.teal }) {
      return (
        <span style={{
          display: "inline-block", fontSize: 12, fontWeight: 600, color,
          background: `${color}12`, padding: "3px 10px", borderRadius: 6, whiteSpace: "nowrap",
        }}>
          {text}
        </span>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PAGE HEADER
    // ═══════════════════════════════════════════════════════════════
    function PageHeader({ title, subtitle, action }) {
      return (
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "flex-start",
          marginBottom: 28, animation: "fadeIn 0.4s ease",
        }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 800, color: CB.navy, letterSpacing: -0.8, lineHeight: 1.2 }}>{title}</h1>
            {subtitle && <p style={{ fontSize: 14, color: CB.textMid, marginTop: 4 }}>{subtitle}</p>}
          </div>
          {action}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // DASHBOARD PAGE
    // ═══════════════════════════════════════════════════════════════
    function DashboardPage() {
      const [stats, setStats] = useState({ staff: 0, clients: 0, trainings: 0, auths: 0 });
      const [loading, setLoading] = useState(true);
      const [recentAlerts, setRecentAlerts] = useState([]);

      useEffect(() => {
        loadDashboard();
      }, []);

      const loadDashboard = async () => {
        setLoading(true);
        try {
          const [staffRes, clientRes, trainingRes, authRes] = await Promise.all([
            supabase.from("staff_members").select("id", { count: "exact", head: true }),
            supabase.from("persons").select("id", { count: "exact", head: true }),
            supabase.from("staff_trainings").select("id, status").eq("status", "overdue"),
            supabase.from("service_authorizations").select("id", { count: "exact", head: true }),
          ]);
          setStats({
            staff: staffRes.count || 0,
            clients: clientRes.count || 0,
            trainings: trainingRes.data?.length || 0,
            auths: authRes.count || 0,
          });
        } catch (e) {
          console.error("Dashboard load error:", e);
        }
        setLoading(false);
      };

      return (
        <div>
          <PageHeader
            title="Dashboard"
            subtitle="Hope Haven Services Inc. — DHHS91172"
            action={
              <button onClick={loadDashboard} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 18px",
                borderRadius: 10, border: `1px solid ${CB.border}`, background: CB.white,
                color: CB.textMid, fontSize: 13, fontWeight: 600, cursor: "pointer",
                fontFamily: "inherit", transition: "all 0.15s",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = CB.navy; e.currentTarget.style.color = CB.navy; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.color = CB.textMid; }}
              >
                {icons.refresh({ size: 15 })} Refresh
              </button>
            }
          />

          {loading ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><Spinner size={28} /></div>
          ) : (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 18, marginBottom: 28 }}>
                <StatCard label="Active Staff" value={stats.staff} icon={icons.users} color={CB.blue} delay={0} />
                <StatCard label="Active Clients" value={stats.clients} icon={icons.heart} color={CB.teal} delay={0.05} />
                <StatCard label="Overdue Trainings" value={stats.trainings} icon={icons.alertTriangle} color={stats.trainings > 0 ? CB.red : CB.green} delay={0.1} />
                <StatCard label="Authorizations" value={stats.auths} icon={icons.fileText} color={CB.navy} delay={0.15} />
              </div>

              {/* Quick Actions */}
              <div style={{
                background: CB.white, borderRadius: 16, padding: 24,
                border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
                animation: "fadeIn 0.5s ease 0.2s both",
              }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: CB.navy, marginBottom: 16 }}>Quick Actions</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  {[
                    { label: "New Service Note", icon: icons.fileText, color: CB.teal },
                    { label: "Clock In (EVV)", icon: icons.mapPin, color: CB.blue },
                    { label: "Log Incident", icon: icons.alertTriangle, color: CB.amber },
                    { label: "Run Compliance Check", icon: icons.shield, color: CB.navy },
                  ].map((action, i) => (
                    <button key={i} style={{
                      display: "flex", alignItems: "center", gap: 10,
                      padding: "14px 16px", borderRadius: 12, border: `1px solid ${CB.border}`,
                      background: CB.cream, cursor: "pointer", fontFamily: "inherit",
                      fontSize: 13, fontWeight: 600, color: CB.text, transition: "all 0.15s",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = action.color; e.currentTarget.style.background = `${action.color}08`; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = CB.border; e.currentTarget.style.background = CB.cream; }}
                    >
                      <div style={{
                        width: 32, height: 32, borderRadius: 8,
                        background: `${action.color}12`, display: "flex",
                        alignItems: "center", justifyContent: "center",
                      }}>
                        {action.icon({ size: 16, color: action.color })}
                      </div>
                      {action.label}
                    </button>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // STAFF PAGE
    // ═══════════════════════════════════════════════════════════════
    function StaffPage() {
      const [staff, setStaff] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadStaff();
      }, []);

      const loadStaff = async () => {
        setLoading(true);
        const { data, error } = await supabase
          .from("staff_members")
          .select("id, first_name, last_name, role, hire_date, status, email, phone")
          .order("last_name");
        if (!error) setStaff(data || []);
        setLoading(false);
      };

      const columns = [
        { label: "Name", key: "name", bold: true, render: (r) => `${r.first_name} ${r.last_name}` },
        { label: "Role", key: "role", render: (r) => <Badge text={r.role?.replace(/_/g, " ") || "—"} color={CB.navy} /> },
        { label: "Hire Date", key: "hire_date", render: (r) => r.hire_date ? new Date(r.hire_date).toLocaleDateString() : "—" },
        { label: "Status", key: "status", render: (r) => <Badge text={r.status || "active"} color={r.status === "active" ? CB.green : CB.textLight} /> },
        { label: "Email", key: "email", render: (r) => r.email || "—" },
      ];

      return (
        <div>
          <PageHeader
            title="Staff"
            subtitle="Manage team members, credentials, and training compliance"
            action={
              <button style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 20px",
                borderRadius: 12, border: "none",
                background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealDark})`,
                color: CB.white, fontSize: 14, fontWeight: 700, cursor: "pointer",
                fontFamily: "inherit", boxShadow: "0 4px 16px rgba(0,137,123,0.25)",
                transition: "all 0.2s",
              }}
                onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
                onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
              >
                {icons.plus({ size: 16 })} Add Staff
              </button>
            }
          />
          <DataTable columns={columns} data={staff} loading={loading} emptyMessage="No staff members found" />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // CLIENTS PAGE
    // ═══════════════════════════════════════════════════════════════
    function ClientsPage() {
      const [clients, setClients] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadClients();
      }, []);

      const loadClients = async () => {
        setLoading(true);
        const { data, error } = await supabase
          .from("persons")
          .select("id, first_name, last_name, date_of_birth, status, medicaid_id, service_authorizations(id, service_code_id, authorized_units, used_units)")
          .order("last_name");
        if (!error) setClients(data || []);
        setLoading(false);
      };

      const columns = [
        { label: "Name", bold: true, render: (r) => `${r.first_name} ${r.last_name}` },
        { label: "Medicaid ID", render: (r) => r.medicaid_id || "—" },
        { label: "DOB", render: (r) => r.date_of_birth ? new Date(r.date_of_birth).toLocaleDateString() : "—" },
        { label: "Status", render: (r) => <Badge text={r.status || "active"} color={r.status === "active" ? CB.green : CB.textLight} /> },
        { label: "Authorizations", render: (r) => {
          const auths = r.service_authorizations || [];
          return auths.length > 0 ? (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {auths.map((a, i) => <Badge key={i} text={a.service_code_id?.substring(0, 3)?.toUpperCase() || "?"} color={CB.blue} />)}
            </div>
          ) : "—";
        }},
      ];

      return (
        <div>
          <PageHeader
            title="Clients"
            subtitle="Person management, authorizations, and service tracking"
            action={
              <button style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 20px",
                borderRadius: 12, border: "none",
                background: `linear-gradient(135deg, ${CB.teal}, ${CB.tealDark})`,
                color: CB.white, fontSize: 14, fontWeight: 700, cursor: "pointer",
                fontFamily: "inherit", boxShadow: "0 4px 16px rgba(0,137,123,0.25)",
                transition: "all 0.2s",
              }}
                onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
                onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
              >
                {icons.plus({ size: 16 })} Add Client
              </button>
            }
          />
          <DataTable columns={columns} data={clients} loading={loading} emptyMessage="No clients found" />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // TRAINING PAGE
    // ═══════════════════════════════════════════════════════════════
    function TrainingPage() {
      const [trainings, setTrainings] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadTrainings();
      }, []);

      const loadTrainings = async () => {
        setLoading(true);
        const { data, error } = await supabase
          .from("training_topics")
          .select("id, name, category, required_within_days, recertification_months, is_required")
          .order("category, name");
        if (!error) setTrainings(data || []);
        setLoading(false);
      };

      const categoryColors = {
        "onboarding": CB.blue,
        "safety": CB.red,
        "clinical": CB.teal,
        "rights": CB.amber,
        "operations": CB.navy,
      };

      const columns = [
        { label: "Training Topic", bold: true, render: (r) => r.name },
        { label: "Category", render: (r) => <Badge text={r.category || "—"} color={categoryColors[r.category] || CB.textLight} /> },
        { label: "Required", render: (r) => r.is_required ? <Badge text="Required" color={CB.red} /> : <Badge text="Optional" color={CB.textLight} /> },
        { label: "Due Within", render: (r) => r.required_within_days ? `${r.required_within_days} days` : "—" },
        { label: "Recertification", render: (r) => r.recertification_months ? `Every ${r.recertification_months} mo` : "One-time" },
      ];

      return (
        <div>
          <PageHeader
            title="Training Tracker"
            subtitle="27 SOW-required training topics with automated deadline tracking"
          />
          <DataTable columns={columns} data={trainings} loading={loading} emptyMessage="No training topics found" />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // COMING SOON STUB
    // ═══════════════════════════════════════════════════════════════
    function ComingSoon({ title, subtitle, icon }) {
      return (
        <div>
          <PageHeader title={title} subtitle={subtitle} />
          <div style={{
            background: CB.white, borderRadius: 20, padding: "80px 40px", textAlign: "center",
            border: `1px solid ${CB.border}`, boxShadow: CB.cardShadow,
            animation: "fadeIn 0.5s ease",
          }}>
            <div style={{
              width: 64, height: 64, borderRadius: 16,
              background: `linear-gradient(135deg, ${CB.teal}12, ${CB.tealLight}12)`,
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              marginBottom: 20,
            }}>
              {icon ? icon({ size: 28, color: CB.teal }) : icons.zap({ size: 28, color: CB.teal })}
            </div>
            <h3 style={{ fontSize: 20, fontWeight: 700, color: CB.navy, marginBottom: 8 }}>Coming Soon</h3>
            <p style={{ fontSize: 15, color: CB.textMid, maxWidth: 400, margin: "0 auto", lineHeight: 1.7 }}>
              This module is under active development. It will be available in the next sprint.
            </p>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // APP SHELL
    // ═══════════════════════════════════════════════════════════════
    function AppShell() {
      const [page, setPage] = useState("dashboard");

      const renderPage = () => {
        switch (page) {
          case "dashboard": return <DashboardPage />;
          case "staff": return <StaffPage />;
          case "clients": return <ClientsPage />;
          case "training": return <TrainingPage />;
          case "notes": return <ComingSoon title="Service Notes" subtitle="Dynamic forms per service code — auto-loads RHS, DSI, MTP fields" icon={icons.fileText} />;
          case "evv": return <ComingSoon title="EVV" subtitle="GPS clock in/out for all 9 EVV-required codes with geofence validation" icon={icons.mapPin} />;
          case "compliance": return <ComingSoon title="Compliance Dashboard" subtitle="Real-time audit readiness score with 38 SOW deadline tracking" icon={icons.shield} />;
          case "billing": return <ComingSoon title="Billing & Claims" subtitle="Auto-calculated units from service notes with Article 2 billing rules" icon={icons.barChart} />;
          default: return <DashboardPage />;
        }
      };

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: CB.cream }}>
          <Sidebar active={page} onNavigate={setPage} />
          <main style={{
            marginLeft: CB.sidebarW, flex: 1, padding: "32px 36px",
            maxWidth: `calc(100vw - ${CB.sidebarW}px)`,
          }}>
            {renderPage()}
          </main>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // APP ROOT
    // ═══════════════════════════════════════════════════════════════
    function App() {
      const { user, loading } = useAuth();

      if (loading) {
        return (
          <div style={{
            minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
            background: CB.cream, flexDirection: "column", gap: 16,
          }}>
            <div style={{
              width: 48, height: 48, borderRadius: 14,
              background: `linear-gradient(135deg, ${CB.navy}, ${CB.navyLight})`,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              {icons.shield({ size: 24, color: CB.white })}
            </div>
            <Spinner size={22} />
          </div>
        );
      }

      return user ? <AppShell /> : <LoginPage />;
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    ReactDOM.render(
      <AuthProvider><App /></AuthProvider>,
      document.getElementById("root")
    );
  </script>
</body>
</html>
